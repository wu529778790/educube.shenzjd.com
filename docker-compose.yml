services:
  educube:
    build: .
    ports:
      - "3000:3000"
    environment:
      # AI 提供商（OpenAI 兼容协议）
      - AI_PROVIDER=openai
      # 从宿主环境注入，避免将密钥写入仓库
      - AI_API_KEY=${AI_API_KEY:?AI_API_KEY is required}
      # GLM Coding Plan 专属端点
      - AI_BASE_URL=https://open.bigmodel.cn/api/coding/paas/v4
      # 模型名称
      - AI_MODEL=GLM-5-Turbo
      # 最大 token
      - AI_MAX_TOKENS=16000
      # API 超时（毫秒）
      - AI_TIMEOUT=300000
    volumes:
      - educube-data:/app/data
      - educube-gen:/app/public/tools/gen
    restart: unless-stopped

volumes:
  educube-data:
  educube-gen:
