services:
  educube:
    build: .
    ports:
      - "3000:3000"
    environment:
      # AI 提供商（使用 Anthropic 协议）
      - AI_PROVIDER=anthropic
      # 智谱 API Key
      - AI_API_KEY=c271d51f0d4a4b3fbc9fd1849a6a0a01.JFI7iQFzWLbJTxIq
      # 智谱 Coding Plan Anthropic 端点
      - AI_BASE_URL=https://open.bigmodel.cn/api/anthropic
      # 模型名称（Anthropic 兼容模式会映射到智谱模型）
      - AI_MODEL=claude-sonnet-4-20250514
      # 最大 token
      - AI_MAX_TOKENS=16000
      # API 超时（毫秒）
      - AI_TIMEOUT=300000
    volumes:
      - educube-data:/app/data
      - educube-gen:/app/public/tools/gen
    restart: unless-stopped

volumes:
  educube-data:
  educube-gen:
