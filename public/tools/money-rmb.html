<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>认识人民币 — 教立方</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
*{box-sizing:border-box}body{font-family:var(--edu-font);margin:0}
.tool{width:100vw;height:100vh;display:flex;flex-direction:column;background:var(--edu-bg)}
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#fff;border-bottom:1px solid var(--edu-border)}
.toolbar h1{font-size:15px;color:var(--edu-primary);margin:0}
.toolbar span{font-size:11px;color:var(--edu-text-muted);background:#f1f5f9;padding:2px 8px;border-radius:12px}
.main{flex:1;display:grid;grid-template-columns:1fr 280px;overflow:hidden}
.canvas-wrap{position:relative;overflow:hidden;background:linear-gradient(135deg,#fef3c7,#fffbeb)}
.canvas-wrap canvas{width:100%;height:100%;display:block}
.panel{background:#fff;border-left:1px solid var(--edu-border);padding:12px;display:flex;flex-direction:column;gap:8px;overflow:auto}
.section{display:flex;flex-direction:column;gap:4px}
.label{font-size:10px;font-weight:700;color:#64748b;letter-spacing:.05em}
.divider{height:1px;background:var(--edu-border)}
.btn{padding:6px 12px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--edu-font);transition:all .15s}
.btn.active{background:var(--edu-primary);color:#fff}
.btn-default{background:#f1f5f9;color:#334155}
.btn-default:hover{background:#e2e8f0}
.row{display:flex;gap:4px;flex-wrap:wrap}

.total-box{text-align:center;padding:10px;background:#fef3c7;border:2px solid #fde68a;border-radius:12px}
.total-box .amount{font-size:28px;font-weight:800;color:#92400e}
.total-box .sub{font-size:11px;color:#b45309;margin-top:2px}

.money-btn{padding:8px 12px;border:2px solid #e2e8f0;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;background:#fff;font-family:var(--edu-font);transition:all .15s;min-width:60px}
.money-btn:hover{border-color:#f59e0b;background:#fffbeb}
.money-btn .val{font-size:14px;font-weight:800;color:#92400e}

.quiz-card{background:#fef3c7;border:2px solid #fde68a;border-radius:12px;padding:10px;text-align:center}
.quiz-q{font-size:14px;font-weight:700;color:#92400e}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.quiz-opt{padding:8px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;background:#fff;font-family:var(--edu-font)}
.quiz-opt:hover{border-color:#f59e0b}
.quiz-opt.correct{background:#dcfce7;border-color:#22c55e}
.quiz-opt.wrong{background:#fef2f2;border-color:#ef4444}
.quiz-result{font-size:12px;font-weight:700;margin-top:4px;min-height:18px}

.info{font-size:11px;line-height:1.8;color:#334155;background:#fff;border:1px solid #fde68a;border-radius:8px;padding:8px 10px}
.info b{color:#92400e}
</style>
</head>
<body>
<div class="tool">
  <div class="toolbar"><h1>💰 认识人民币</h1><span>一年级下册 · 第五单元</span></div>
  <div class="main">
    <div class="canvas-wrap"><canvas id="cv"></canvas></div>
    <div class="panel">
      <div class="total-box">
        <div class="amount" id="total-display">0 元 0 角 = 0.00 元</div>
        <div class="sub" id="total-hint">点击下面的钱币来凑钱</div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">纸币</div>
        <div class="row">
          <button class="money-btn" onclick="addMoney(100)">💯<div class="val">100元</div></button>
          <button class="money-btn" onclick="addMoney(50)">💰<div class="val">50元</div></button>
          <button class="money-btn" onclick="addMoney(20)">💵<div class="val">20元</div></button>
          <button class="money-btn" onclick="addMoney(10)">💷<div class="val">10元</div></button>
          <button class="money-btn" onclick="addMoney(5)">💶<div class="val">5元</div></button>
          <button class="money-btn" onclick="addMoney(1)">💴<div class="val">1元</div></button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">硬币</div>
        <div class="row">
          <button class="money-btn" onclick="addMoney(5)">🪙<div class="val">5角</div></button>
          <button class="money-btn" onclick="addMoney(1)">🪙<div class="val">1角</div></button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">换算练习</div>
        <div class="row">
          <button class="btn btn-default" onclick="setTarget(10)">凑10元</button>
          <button class="btn btn-default" onclick="setTarget(5)">凑5元</button>
          <button class="btn btn-default" onclick="setTarget(1)">凑1元</button>
          <button class="btn btn-default" onclick="clearMoney()">清空</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">人民币测验</div>
        <div class="quiz-card" id="quiz-card"></div>
      </div>
      <div class="divider"></div>
      <div class="info">
        <b>人民币知识</b><br/>
        ● <strong>1元 = 10角 = 100分</strong><br/>
        ● <strong>1角 = 10分</strong><br/>
        ● 纸币面值：1、5、10、20、50、100元<br/>
        ● 硬币面值：1角、5角、1元
      </div>
    </div>
  </div>
</div>
<script>
var cv, ctx, _money = [], _target = null;

function init() {
  cv = document.getElementById('cv');
  ctx = cv.getContext('2d');
  window.addEventListener('resize', resize);
  resize();
  updateDisplay();
  nextQuiz();
}

function resize() {
  var r = cv.parentElement.getBoundingClientRect();
  cv.width = r.width * devicePixelRatio;
  cv.height = r.height * devicePixelRatio;
  cv.style.width = r.width + 'px';
  cv.style.height = r.height + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  draw();
}

function addMoney(val) {
  _money.push(val);
  updateDisplay();
  draw();
}

function clearMoney() {
  _money = [];
  _target = null;
  updateDisplay();
  draw();
}

function setTarget(t) {
  _target = t;
  _money = [];
  updateDisplay();
  draw();
}

function getTotal() {
  var total = 0;
  _money.forEach(function(v) { total += v; });
  return total;
}

function updateDisplay() {
  var total = getTotal();
  var yuan = Math.floor(total / 10);
  var jiao = total % 10;
  document.getElementById('total-display').textContent = yuan + ' 元 ' + jiao + ' 角 = ' + (total / 10).toFixed(1) + ' 元';

  if (_target !== null) {
    var targetJiao = _target * 10;
    if (total === targetJiao) {
      document.getElementById('total-hint').textContent = '🎉 太棒了！正好凑够 ' + _target + ' 元！';
      document.getElementById('total-hint').style.color = '#16a34a';
    } else if (total < targetJiao) {
      document.getElementById('total-hint').textContent = '目标 ' + _target + ' 元，还差 ' + ((targetJiao - total) / 10).toFixed(1) + ' 元';
      document.getElementById('total-hint').style.color = '#b45309';
    } else {
      document.getElementById('total-hint').textContent = '超过目标了！多了 ' + ((total - targetJiao) / 10).toFixed(1) + ' 元';
      document.getElementById('total-hint').style.color = '#ef4444';
    }
  } else {
    document.getElementById('total-hint').textContent = '点击下面的钱币来凑钱';
    document.getElementById('total-hint').style.color = '#b45309';
  }
}

function draw() {
  var w = cv.width / devicePixelRatio, h = cv.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  // Title
  ctx.fillStyle = '#92400e';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('我的钱包', w / 2, 28);

  if (_money.length === 0) {
    ctx.fillStyle = '#94a3b8';
    ctx.font = '14px sans-serif';
    ctx.fillText('点击右侧钱币添加到钱包', w / 2, h / 2);
    if (_target !== null) {
      ctx.fillStyle = '#b45309';
      ctx.font = 'bold 14px sans-serif';
      ctx.fillText('目标：凑 ' + _target + ' 元', w / 2, h / 2 + 30);
    }
    return;
  }

  // Draw money items as cards
  var cardW = Math.min(80, (w - 20) / 5);
  var cardH = cardW * 0.65;
  var cols = Math.max(1, Math.floor((w - 20) / (cardW + 8)));

  _money.forEach(function(val, i) {
    var col = i % cols, row = Math.floor(i / cols);
    var x = 10 + col * (cardW + 8);
    var y = 50 + row * (cardH + 8);

    var yuan = Math.floor(val / 10);
    var jiao = val % 10;
    var label = jiao > 0 ? jiao + '角' : yuan + '元';
    var emoji = yuan >= 50 ? '💰' : yuan >= 10 ? '💵' : yuan >= 1 ? '💴' : '🪙';

    // Card
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.roundRect(x, y, cardW, cardH, 8); ctx.fill();
    ctx.strokeStyle = '#fde68a'; ctx.lineWidth = 2; ctx.stroke();

    // Emoji
    ctx.font = Math.max(14, cardW * 0.3) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(emoji, x + cardW / 2, y + cardH * 0.45);

    // Value
    ctx.fillStyle = '#92400e';
    ctx.font = 'bold ' + Math.max(10, cardW * 0.17) + 'px sans-serif';
    ctx.fillText(label, x + cardW / 2, y + cardH * 0.78);
  });

  // Total bar
  var total = getTotal();
  var barY = h - 50;
  ctx.fillStyle = '#fef3c7';
  ctx.beginPath(); ctx.roundRect(10, barY, w - 20, 36, 10); ctx.fill();
  ctx.strokeStyle = '#fde68a'; ctx.lineWidth = 2; ctx.stroke();

  ctx.fillStyle = '#92400e'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('总计：' + (total / 10).toFixed(1) + ' 元（' + _money.length + '张/枚）', w / 2, barY + 23);

  // Target progress bar
  if (_target !== null) {
    var targetJiao = _target * 10;
    var progress = Math.min(total / targetJiao, 1.5);
    var barW = w - 40;
    ctx.fillStyle = '#e2e8f0';
    ctx.beginPath(); ctx.roundRect(20, barY - 20, barW, 12, 6); ctx.fill();
    var fillColor = total >= targetJiao ? '#22c55e' : '#f59e0b';
    ctx.fillStyle = fillColor;
    ctx.beginPath(); ctx.roundRect(20, barY - 20, Math.min(barW * progress, barW), 12, 6); ctx.fill();
  }
}

// ===== Quiz =====
var _quizQs = [
  { q: '1元等于多少角？', opts: ['5角', '10角', '20角', '100角'], ans: 1 },
  { q: '5角 + 5角 = ？', opts: ['5角', '10角（1元）', '15角', '1角'], ans: 1 },
  { q: '3元5角 = ？角', opts: ['35角', '53角', '8角', '305角'], ans: 0 },
  { q: '买一个2元的笔，付5元，找回？', opts: ['2元', '3元', '5元', '1元'], ans: 1 },
  { q: '1角等于多少分？', opts: ['1分', '5分', '10分', '100分'], ans: 2 },
  { q: '10元 = ？张5元', opts: ['1张', '2张', '5张', '10张'], ans: 1 },
];
var _qi = 0, _score = 0;

function nextQuiz() {
  if (_qi >= _quizQs.length) {
    document.getElementById('quiz-card').innerHTML = '<div class="quiz-q">测验完成！答对 ' + _score + ' / ' + _quizQs.length + ' 题</div>';
    return;
  }
  var q = _quizQs[_qi];
  var html = '<div class="quiz-q">' + q.q + '</div><div class="quiz-opts">';
  q.opts.forEach(function(o, i) { html += '<button class="quiz-opt" onclick="answer(' + i + ')">' + o + '</button>'; });
  html += '</div><div class="quiz-result" id="qr"></div>';
  document.getElementById('quiz-card').innerHTML = html;
}

function answer(idx) {
  var q = _quizQs[_qi];
  var opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(function(b, i) { b.onclick = null; b.style.cursor = 'default';
    if (i === q.ans) b.classList.add('correct');
    if (i === idx && i !== q.ans) b.classList.add('wrong');
  });
  var r = document.getElementById('qr');
  if (idx === q.ans) { r.textContent = '✓ 正确！'; r.style.color = '#16a34a'; _score++; }
  else { r.textContent = '✗ 正确答案：' + q.opts[q.ans]; r.style.color = '#ef4444'; }
  _qi++; setTimeout(nextQuiz, 1200);
}

init();
</script>
</body>
</html>
