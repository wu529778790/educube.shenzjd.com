<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>组合图形面积 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 270px; height: 100%; }
    .canvas-area { padding: 20px; overflow-y: auto; background: linear-gradient(135deg, #fff7ed 0%, #fdfaf4 100%); display: flex; flex-direction: column; align-items: center; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 12px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #fed7aa; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    canvas { border-radius: 12px; background: #fff; cursor: crosshair; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .result-card { background: #fff; border: 2px solid #f97316; border-radius: 14px; padding: 14px 16px; width: 100%; max-width: 500px; margin-top: 14px; }
    .result-total { font-size: 22px; font-weight: 800; color: #f97316; text-align: center; margin-top: 8px; }
    .preset-btn { padding: 7px 0; border-radius: 8px; font-size: 13px; font-weight: 600; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; }
    .preset-btn:hover, .preset-btn.active { border-color: #f97316; color: #f97316; background: #fff7ed; }
    .mode-btn { padding: 6px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; flex:1; }
    .mode-btn:hover { border-color: #0ea5e9; }
    .mode-btn.active { background: #1a3a5c; color: #fff; border-color: #1a3a5c; }
    .anim-step { padding: 3px 8px; border-radius: 6px; margin: 2px 0; font-size: 13px; transition: background .3s; }
    .anim-step.highlight { background: #fef3c7; font-weight: 700; }
    .anim-step.done { background: #dcfce7; }
    .builder-btn { padding: 5px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; }
    .builder-btn:hover { border-color: #0ea5e9; color: #0ea5e9; }
    .builder-btn.sel { background: #0ea5e9; color: #fff; border-color: #0ea5e9; }
    .decomp-btn { padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; }
    .decomp-btn:hover { border-color: #f97316; }
    .decomp-btn.active { background: #f97316; color: #fff; border-color: #f97316; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">🔷 组合图形面积</div>
      <div class="edu-toolbar-subtitle">上册 · 第六单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
      <button class="edu-btn edu-btn-accent" id="animBtn" onclick="animateCalc()">逐步计算</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="cvs" width="500" height="360"></canvas>
        <div class="result-card" id="resultCard"></div>
      </div>
      <div class="control-panel">
        <!-- Mode switch -->
        <div class="ctrl-section">
          <div class="ctrl-label">模式</div>
          <div style="display:flex;gap:6px">
            <button class="mode-btn active" id="modeDecomp" onclick="setMode('decomp')">分割线</button>
            <button class="mode-btn" id="modeBuild" onclick="setMode('build')">自由拼图</button>
          </div>
        </div>
        <div class="divider"></div>
        <!-- Preset shapes -->
        <div class="ctrl-section" id="presetSection">
          <div class="ctrl-label">选择图形</div>
          <button class="preset-btn active" onclick="loadShape('lshape')">L 形</button>
          <button class="preset-btn" onclick="loadShape('house')">房子形</button>
          <button class="preset-btn" onclick="loadShape('arrow')">箭头形</button>
          <button class="preset-btn" onclick="loadShape('tshape')">T 形</button>
          <button class="preset-btn" onclick="loadShape('flag')">旗帜形</button>
        </div>
        <!-- Decomposition method -->
        <div class="ctrl-section" id="decompSection">
          <div class="ctrl-label">分解方法</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap" id="decompBtns"></div>
        </div>
        <!-- Builder tools (hidden by default) -->
        <div class="ctrl-section" id="buildSection" style="display:none">
          <div class="ctrl-label">添加图形</div>
          <div style="display:flex;gap:6px">
            <button class="builder-btn sel" id="addRect" onclick="setBuildTool('rect')">长方形</button>
            <button class="builder-btn" id="addTri" onclick="setBuildTool('tri')">三角形</button>
          </div>
          <div style="display:flex;gap:6px;margin-top:4px">
            <button class="edu-btn edu-btn-outline" style="font-size:12px;padding:5px 10px" onclick="clearBuilder()">清空画布</button>
            <button class="edu-btn edu-btn-outline" style="font-size:12px;padding:5px 10px" onclick="undoBuild()">撤销</button>
          </div>
        </div>
        <div class="divider"></div>
        <!-- Calculation animation area -->
        <div class="ctrl-section">
          <div class="ctrl-label">计算过程</div>
          <div id="calcSteps" class="info-box" style="min-height:60px"></div>
        </div>
        <div class="divider"></div>
        <div class="info-box" id="infoBox">
          <b>操作指南</b><br/>
          ● 在图形上<b>点击两点</b>画分割线<br/>
          ● 同一图形可用不同方式分割<br/>
          ● 点击「逐步计算」看动画<br/>
          ● 切换「自由拼图」创建自定义图形
        </div>
      </div>
    </div>
  </div>
</div>
<script>
/* ===== Constants & State ===== */
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
const G = 30;           // grid size in px
const OX = 40, OY = 25; // grid origin
const COLS = 14, ROWS = 10;
const COLORS = ['#fed7aa','#bfdbfe','#bbf7d0','#e9d5ff','#fce7f3','#fef08a','#a5f3fc','#fda4af'];

let mode = 'decomp';       // 'decomp' | 'build'
let buildTool = 'rect';    // 'rect' | 'tri'
let currentShape = 'lshape';
let splitLines = [];        // {x1,y1,x2,y2} in grid coords
let splitClick = null;      // first click point {gx, gy}
let buildParts = [];        // user-placed shapes
let buildDrag = null;       // {type, gx, gy} preview
let animating = false;
let animStep = -1;
let hoverCell = null;

/* ===== Preset shapes with multiple decompositions ===== */
const presets = {
  lshape: {
    name: 'L 形',
    decomps: [
      { label: '横切', desc: '分成两个长方形', parts: [
        { type:'rect', gx:0, gy:0, w:3, h:6 },
        { type:'rect', gx:3, gy:3, w:4, h:3 }
      ]},
      { label: '竖切', desc: '分成两个长方形', parts: [
        { type:'rect', gx:0, gy:0, w:3, h:3 },
        { type:'rect', gx:0, gy:0, w:7, h:3 }
      ]},
      { label: '添补', desc: '大长方形减缺口', subtract: true, parts: [
        { type:'rect', gx:0, gy:0, w:7, h:6 },
        { type:'rect', gx:3, gy:0, w:4, h:3, subtract:true }
      ]}
    ],
    outline: [[0,0],[3,0],[3,3],[7,3],[7,6],[0,6]]
  },
  house: {
    name: '房子形',
    decomps: [
      { label: '分割', desc: '长方形 + 三角形', parts: [
        { type:'rect', gx:1, gy:3, w:6, h:4 },
        { type:'tri', gx:1, gy:0, w:6, h:3 }
      ]},
      { label: '添补', desc: '大长方形减两个三角形', subtract: true, parts: [
        { type:'rect', gx:1, gy:0, w:6, h:7 },
        { type:'tri', gx:1, gy:0, w:3, h:3, subtract:true },
        { type:'tri', gx:4, gy:0, w:3, h:3, subtract:true }
      ]}
    ],
    outline: [[1,0],[4,0],[7,0],[7,7],[1,7],[1,3]]
  },
  arrow: {
    name: '箭头形',
    decomps: [
      { label: '三分割', desc: '长方形 + 两三角形', parts: [
        { type:'rect', gx:3, gy:2, w:2, h:6 },
        { type:'tri', gx:1, gy:0, w:3, h:2 },
        { type:'tri', gx:4, gy:0, w:3, h:2 }
      ]},
      { label: '添补', desc: '大长方形减两角', subtract: true, parts: [
        { type:'rect', gx:1, gy:0, w:6, h:8 },
        { type:'tri', gx:1, gy:0, w:2, h:2, subtract:true },
        { type:'tri', gx:5, gy:0, w:2, h:2, subtract:true }
      ]}
    ],
    outline: [[3,0],[1,0],[1,2],[3,2],[3,0]]
  },
  tshape: {
    name: 'T 形',
    decomps: [
      { label: '横切', desc: '上下两个长方形', parts: [
        { type:'rect', gx:0, gy:0, w:8, h:2 },
        { type:'rect', gx:3, gy:2, w:2, h:5 }
      ]},
      { label: '竖切', desc: '左中右三部分', parts: [
        { type:'rect', gx:0, gy:0, w:3, h:2 },
        { type:'rect', gx:3, gy:0, w:2, h:7 },
        { type:'rect', gx:5, gy:0, w:3, h:2 }
      ]}
    ],
    outline: [[0,0],[8,0],[8,2],[5,2],[5,7],[3,7],[3,2],[0,2]]
  },
  flag: {
    name: '旗帜形',
    decomps: [
      { label: '添补', desc: '大长方形减缺口', subtract: true, parts: [
        { type:'rect', gx:0, gy:0, w:5, h:7 },
        { type:'rect', gx:3, gy:4, w:2, h:3, subtract:true }
      ]},
      { label: '分割', desc: '两个长方形', parts: [
        { type:'rect', gx:0, gy:0, w:3, h:7 },
        { type:'rect', gx:3, gy:0, w:2, h:4 }
      ]}
    ],
    outline: [[0,0],[5,0],[5,4],[3,4],[3,7],[0,7]]
  }
};

let activeDecomp = 0;

/* ===== Drawing ===== */
function gridToPixel(gx, gy) { return [OX + gx * G, OY + gy * G]; }
function pixelToGrid(px, py) { return [Math.round((px - OX) / G), Math.round((py - OY) / G)]; }

function drawGrid() {
  ctx.strokeStyle = '#e8ecf1';
  ctx.lineWidth = 1;
  for (let i = 0; i <= COLS; i++) {
    const x = OX + i * G;
    ctx.beginPath(); ctx.moveTo(x, OY); ctx.lineTo(x, OY + ROWS * G); ctx.stroke();
  }
  for (let j = 0; j <= ROWS; j++) {
    const y = OY + j * G;
    ctx.beginPath(); ctx.moveTo(OX, y); ctx.lineTo(OX + COLS * G, y); ctx.stroke();
  }
}

function drawRectPart(p, colorIdx, label) {
  const [x, y] = gridToPixel(p.gx, p.gy);
  const w = p.w * G, h = p.h * G;
  if (p.subtract) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(x, y, w, h);
    ctx.setLineDash([5, 4]);
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);
    ctx.setLineDash([]);
    // X marks
    ctx.strokeStyle = '#ef444488';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + w, y + h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + w, y); ctx.lineTo(x, y + h); ctx.stroke();
  } else {
    ctx.fillStyle = COLORS[colorIdx % COLORS.length] || COLORS[0];
    ctx.globalAlpha = animating && animStep >= 0 && animStep !== colorIdx ? 0.25 : 0.7;
    ctx.fillRect(x, y, w, h);
    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#334155';
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);
  }
  // Label
  ctx.fillStyle = '#334155';
  ctx.font = 'bold 15px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w / 2, y + h / 2);
  // Dimensions
  ctx.font = 'bold 11px sans-serif';
  ctx.fillStyle = '#64748b';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText(p.w + ' cm', x + w / 2, y - 3);
  ctx.save();
  ctx.translate(x - 3, y + h / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textBaseline = 'bottom';
  ctx.fillText(p.h + ' cm', 0, 0);
  ctx.restore();
}

function drawTriPart(p, colorIdx, label) {
  const [x, y] = gridToPixel(p.gx, p.gy);
  const w = p.w * G, h = p.h * G;
  ctx.beginPath();
  ctx.moveTo(x + w / 2, y);
  ctx.lineTo(x + w, y + h);
  ctx.lineTo(x, y + h);
  ctx.closePath();
  if (p.subtract) {
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.setLineDash([5, 4]);
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.setLineDash([]);
  } else {
    ctx.fillStyle = COLORS[colorIdx % COLORS.length] || COLORS[0];
    ctx.globalAlpha = animating && animStep >= 0 && animStep !== colorIdx ? 0.25 : 0.7;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#334155';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  ctx.fillStyle = '#334155';
  ctx.font = 'bold 15px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w / 2, y + h * 0.65);
  ctx.font = 'bold 11px sans-serif';
  ctx.fillStyle = '#64748b';
  ctx.textBaseline = 'top';
  ctx.fillText(p.w + ' cm', x + w / 2, y + h + 3);
  // Height indicator
  ctx.textBaseline = 'bottom';
  ctx.fillText('h=' + p.h, x - 3, y + h / 2);
}

function drawSplitLines() {
  splitLines.forEach((ln, i) => {
    const [x1, y1] = gridToPixel(ln.x1, ln.y1);
    const [x2, y2] = gridToPixel(ln.x2, ln.y2);
    ctx.beginPath();
    ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
    ctx.strokeStyle = '#f97316';
    ctx.lineWidth = 2.5;
    ctx.setLineDash([8, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
    // Endpoints
    [{ px: x1, py: y1 }, { px: x2, py: y2 }].forEach(pt => {
      ctx.beginPath();
      ctx.arc(pt.px, pt.py, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#f97316';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
    });
  });
  // Pending first click marker
  if (splitClick) {
    const [cx, cy] = gridToPixel(splitClick.gx, splitClick.gy);
    ctx.beginPath();
    ctx.arc(cx, cy, 6, 0, Math.PI * 2);
    ctx.fillStyle = '#f9731688';
    ctx.fill();
    ctx.strokeStyle = '#f97316';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

function drawBuildPreview() {
  if (!buildDrag || !hoverCell) return;
  const [hx, hy] = hoverCell;
  const [px, py] = gridToPixel(hx, hy);
  ctx.globalAlpha = 0.4;
  if (buildTool === 'rect') {
    ctx.fillStyle = '#0ea5e9';
    ctx.fillRect(px, py, G, G);
    ctx.strokeStyle = '#0ea5e9';
    ctx.lineWidth = 2;
    ctx.strokeRect(px, py, G, G);
  } else {
    ctx.beginPath();
    ctx.moveTo(px + G / 2, py);
    ctx.lineTo(px + G, py + G);
    ctx.lineTo(px, py + G);
    ctx.closePath();
    ctx.fillStyle = '#22c55e';
    ctx.fill();
    ctx.strokeStyle = '#22c55e';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawBuildParts() {
  buildParts.forEach((p, i) => {
    const [x, y] = gridToPixel(p.gx, p.gy);
    const w = p.w * G, h = p.h * G;
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.globalAlpha = 0.6;
    if (p.type === 'rect') {
      ctx.fillRect(x, y, w, h);
      ctx.globalAlpha = 1;
      ctx.strokeStyle = '#334155';
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, w, h);
      // Dimensions
      ctx.font = 'bold 10px sans-serif';
      ctx.fillStyle = '#334155';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.w + '×' + p.h, x + w / 2, y + h / 2);
    } else {
      ctx.beginPath();
      ctx.moveTo(x + w / 2, y); ctx.lineTo(x + w, y + h); ctx.lineTo(x, y + h); ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.strokeStyle = '#334155'; ctx.lineWidth = 2; ctx.stroke();
      ctx.font = 'bold 10px sans-serif';
      ctx.fillStyle = '#334155';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(p.w + '×' + p.h, x + w / 2, y + h * 0.65);
    }
  });
}

function draw() {
  ctx.clearRect(0, 0, cvs.width, cvs.height);
  drawGrid();
  if (mode === 'decomp') {
    drawDecompMode();
  } else {
    drawBuildMode();
  }
}

function drawDecompMode() {
  const shape = presets[currentShape];
  const decomp = shape.decomps[activeDecomp];
  decomp.parts.forEach((p, i) => {
    const circled = ['\u2460','\u2461','\u2462','\u2463','\u2464','\u2465','\u2466','\u2467'];
    const label = p.subtract ? '\u2212' : circled[i] || (i + 1);
    if (p.type === 'rect') drawRectPart(p, i, label);
    else drawTriPart(p, i, label);
  });
  drawSplitLines();
}

function drawBuildMode() {
  drawBuildParts();
  drawBuildPreview();
}

/* ===== Calculation ===== */
function calcPartArea(p) {
  if (p.type === 'rect') return p.w * p.h;
  return p.w * p.h / 2;
}

function updateCalcDisplay() {
  const el = document.getElementById('calcSteps');
  if (mode === 'build') {
    updateBuildCalc(el);
    return;
  }
  const shape = presets[currentShape];
  const decomp = shape.decomps[activeDecomp];
  const isSubtract = decomp.subtract;
  let html = `<div style="margin-bottom:4px;font-weight:700">${shape.name} - ${decomp.desc}</div>`;
  let total = 0;
  decomp.parts.forEach((p, i) => {
    const area = calcPartArea(p);
    const dim = p.type === 'rect'
      ? `${p.w}\u00d7${p.h}`
      : `${p.w}\u00d7${p.h}\u00f72`;
    const sign = (isSubtract && p.subtract) ? '\u2212' : (i > 0 && !isSubtract ? '+' : '');
    const cls = animating ? (animStep === i ? 'anim-step highlight' : (animStep > i ? 'anim-step done' : 'anim-step')) : 'anim-step';
    html += `<div class="${cls}">${sign} ${dim} = ${area} cm\u00b2</div>`;
    total += p.subtract ? -area : area;
  });
  if (animating && animStep >= decomp.parts.length) {
    html += `<div class="anim-step highlight" style="color:#f97316;font-weight:800;margin-top:4px">\u603b\u9762\u79ef = ${total} cm\u00b2</div>`;
  } else if (!animating) {
    html += `<div style="font-weight:700;color:#f97316;margin-top:4px">\u603b\u9762\u79ef = ${total} cm\u00b2</div>`;
  }
  el.innerHTML = html;
  document.getElementById('resultCard').innerHTML = `<div style="font-size:15px;font-weight:700">${shape.name} \u00b7 ${decomp.desc}</div>
    <div style="font-size:14px;color:#334155;margin-top:6px">${isSubtract ? '\u6dfb\u8865\u6cd5' : '\u5206\u5272\u6cd5'}\uff1a${decomp.parts.map((p, i) => {
      const d = p.type === 'rect' ? `${p.w}\u00d7${p.h}` : `${p.w}\u00d7${p.h}\u00f72`;
      const s = p.subtract ? '\u2212' : '';
      return `${s}${d}=${calcPartArea(p)}`;
    }).join('  ')}</div>
    <div class="result-total">\u603b\u9762\u79ef = ${total} cm\u00b2</div>`;
}

function updateBuildCalc(el) {
  if (buildParts.length === 0) {
    el.innerHTML = '<div style="color:#64748b">在画布上点击放置图形</div>';
    document.getElementById('resultCard').innerHTML = '';
    return;
  }
  let html = '<div style="font-weight:700;margin-bottom:4px">自定义图形</div>';
  let total = 0;
  buildParts.forEach((p, i) => {
    const area = calcPartArea(p);
    const dim = p.type === 'rect' ? `${p.w}\u00d7${p.h}` : `${p.w}\u00d7${p.h}\u00f72`;
    const sign = i > 0 ? '+' : '';
    html += `<div class="anim-step">${sign} ${dim} = ${area} cm\u00b2</div>`;
    total += area;
  });
  html += `<div style="font-weight:700;color:#f97316;margin-top:4px">\u603b\u9762\u79ef = ${total} cm\u00b2</div>`;
  el.innerHTML = html;
  document.getElementById('resultCard').innerHTML = `<div style="font-size:15px;font-weight:700">\u81ea\u5b9a\u4e49\u56fe\u5f62 (${buildParts.length}\u4e2a\u90e8\u5206)</div>
    <div class="result-total">\u603b\u9762\u79ef = ${total} cm\u00b2</div>`;
}

/* ===== Animation ===== */
function animateCalc() {
  if (animating) return;
  if (mode === 'build') { updateCalcDisplay(); return; }
  animating = true;
  animStep = -1;
  document.getElementById('animBtn').textContent = '\u8ba1\u7b97\u4e2d...';
  const decomp = presets[currentShape].decomps[activeDecomp];
  const steps = decomp.parts.length + 1;
  let i = 0;
  const timer = setInterval(() => {
    animStep = i;
    draw();
    updateCalcDisplay();
    i++;
    if (i >= steps) {
      clearInterval(timer);
      setTimeout(() => {
        animating = false;
        animStep = -1;
        document.getElementById('animBtn').textContent = '\u9010\u6b65\u8ba1\u7b97';
        draw();
        updateCalcDisplay();
      }, 1200);
    }
  }, 800);
}

/* ===== Decomposition buttons ===== */
function renderDecompBtns() {
  const shape = presets[currentShape];
  const el = document.getElementById('decompBtns');
  el.innerHTML = '';
  shape.decomps.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'decomp-btn' + (i === activeDecomp ? ' active' : '');
    btn.textContent = d.label;
    btn.title = d.desc;
    btn.onclick = () => { activeDecomp = i; splitLines = []; splitClick = null; renderDecompBtns(); draw(); updateCalcDisplay(); };
    el.appendChild(btn);
  });
}

/* ===== Preset loading ===== */
function loadShape(key) {
  currentShape = key;
  activeDecomp = 0;
  splitLines = [];
  splitClick = null;
  animating = false;
  animStep = -1;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(presets[key].name.replace('形', '')) || b.onclick.toString().includes(key)));
  document.querySelectorAll('#presetSection .preset-btn').forEach(b => {
    b.classList.remove('active');
    if (b.getAttribute('onclick') && b.getAttribute('onclick').includes(key)) b.classList.add('active');
  });
  renderDecompBtns();
  draw();
  updateCalcDisplay();
}

/* ===== Mode switching ===== */
function setMode(m) {
  mode = m;
  document.getElementById('modeDecomp').classList.toggle('active', m === 'decomp');
  document.getElementById('modeBuild').classList.toggle('active', m === 'build');
  document.getElementById('presetSection').style.display = m === 'decomp' ? '' : 'none';
  document.getElementById('decompSection').style.display = m === 'decomp' ? '' : 'none';
  document.getElementById('buildSection').style.display = m === 'build' ? '' : 'none';
  cvs.style.cursor = m === 'build' ? 'pointer' : 'crosshair';
  splitLines = []; splitClick = null;
  draw();
  updateCalcDisplay();
}

function setBuildTool(t) {
  buildTool = t;
  document.getElementById('addRect').classList.toggle('sel', t === 'rect');
  document.getElementById('addTri').classList.toggle('sel', t === 'tri');
}

function clearBuilder() { buildParts = []; draw(); updateCalcDisplay(); }
function undoBuild() { buildParts.pop(); draw(); updateCalcDisplay(); }

/* ===== Mouse interaction ===== */
function getMouseGrid(e) {
  const rect = cvs.getBoundingClientRect();
  const sx = cvs.width / rect.width, sy = cvs.height / rect.height;
  const px = (e.clientX - rect.left) * sx, py = (e.clientY - rect.top) * sy;
  return pixelToGrid(px, py);
}

cvs.addEventListener('mousemove', (e) => {
  const [gx, gy] = getMouseGrid(e);
  if (gx >= 0 && gx < COLS && gy >= 0 && gy < ROWS) {
    hoverCell = [gx, gy];
  } else {
    hoverCell = null;
  }
  if (mode === 'build') draw();
});

cvs.addEventListener('click', (e) => {
  const [gx, gy] = getMouseGrid(e);
  if (gx < 0 || gx >= COLS || gy < 0 || gy >= ROWS) return;

  if (mode === 'build') {
    buildParts.push({ type: buildTool, gx, gy, w: buildTool === 'rect' ? 2 : 3, h: buildTool === 'rect' ? 2 : 2 });
    draw();
    updateCalcDisplay();
    return;
  }

  // Decomposition split-line mode
  if (!splitClick) {
    splitClick = { gx, gy };
    draw();
  } else {
    const dx = Math.abs(gx - splitClick.gx);
    const dy = Math.abs(gy - splitClick.gy);
    if (dx > 0 || dy > 0) {
      splitLines.push({ x1: splitClick.gx, y1: splitClick.gy, x2: gx, y2: gy });
    }
    splitClick = null;
    draw();
  }
});

cvs.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  // Right-click: undo last split line
  if (mode === 'decomp' && splitLines.length > 0) {
    splitLines.pop();
    draw();
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    splitClick = null;
    draw();
  }
  if (e.key === 'z' && e.ctrlKey && mode === 'build') {
    undoBuild();
  }
});

/* ===== Drag to resize builder shapes ===== */
let dragPart = null;
let dragStart = null;

cvs.addEventListener('mousedown', (e) => {
  if (mode !== 'build') return;
  const [gx, gy] = getMouseGrid(e);
  // Check if clicking on existing part to resize
  for (let i = buildParts.length - 1; i >= 0; i--) {
    const p = buildParts[i];
    if (p.type === 'rect') {
      if (gx >= p.gx && gx < p.gx + p.w && gy >= p.gy && gy < p.gy + p.h) {
        // Click on bottom-right corner to resize
        if (gx === p.gx + p.w - 1 && gy === p.gy + p.h - 1) {
          dragPart = i;
          dragStart = { gx, gy, ow: p.w, oh: p.h };
        }
        return;
      }
    }
  }
});

cvs.addEventListener('mousemove', (e) => {
  if (dragPart === null) return;
  const [gx, gy] = getMouseGrid(e);
  const p = buildParts[dragPart];
  const dx = gx - dragStart.gx;
  const dy = gy - dragStart.gy;
  p.w = Math.max(1, dragStart.ow + dx);
  p.h = Math.max(1, dragStart.oh + dy);
  draw();
  updateCalcDisplay();
});

cvs.addEventListener('mouseup', () => {
  dragPart = null;
  dragStart = null;
});

/* ===== Init ===== */
function resetAll() {
  splitLines = [];
  splitClick = null;
  animating = false;
  animStep = -1;
  document.getElementById('animBtn').textContent = '\u9010\u6b65\u8ba1\u7b97';
  buildParts = [];
  if (mode === 'build') setMode('decomp');
  loadShape('lshape');
}
renderDecompBtns();
draw();
updateCalcDisplay();
</script>
</body>
</html>
