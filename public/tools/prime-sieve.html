<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>质数与合数</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
  .main-layout { display:grid; grid-template-columns:1fr 280px; height:100%; }
  .canvas-area { position:relative; background:linear-gradient(135deg,#fffbeb,#fef3c7); overflow:hidden; }
  .control-panel {
    background:#fff; border-left:1px solid #e2e8f0;
    padding:16px; display:flex; flex-direction:column; gap:12px; overflow:auto;
  }
  .ctrl-section { display:flex; flex-direction:column; gap:6px; }
  .ctrl-label { font-size:11px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.05em; }
  .divider { height:1px; background:#e2e8f0; }
  .sieve-btn {
    padding:8px 12px; border-radius:8px; font-size:13px; font-weight:700;
    cursor:pointer; border:2px solid #e2e8f0; background:#fff; color:#64748b;
    transition:all .2s; font-family:var(--edu-font); text-align:center;
  }
  .sieve-btn:hover:not(.done):not(.active) { border-color:#EAB308; }
  .sieve-btn.active { background:#EAB308; color:#fff; border-color:#EAB308; }
  .sieve-btn.done { background:#f1f5f9; color:#94a3b8; border-color:#e2e8f0; cursor:default; }
  .info-box {
    background:#fffbeb; border:1px solid #fde68a; border-radius:10px;
    padding:10px 12px; font-size:12px; color:#64748b; line-height:1.9;
  }
  .info-box strong { color:#D97706; }
  .prime-list { display:flex; flex-wrap:wrap; gap:4px; }
  .prime-tag {
    display:inline-block; padding:2px 7px; border-radius:4px; font-size:11px;
    font-weight:600; background:#fef3c7; color:#D97706;
  }
</style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="edu-toolbar-title">🔬 质数与合数</span>
      <span class="edu-toolbar-subtitle">五下·第二单元</span>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-outline" onclick="resetSieve()">重置</button>
      <button class="edu-btn edu-btn-primary" onclick="autoSieve()">自动筛</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="main-canvas" class="edu-canvas-full"></canvas>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">筛法步骤（点击筛除）</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
            <button class="sieve-btn" id="sb-2" onclick="sieveStep(2)">筛 2 的倍数</button>
            <button class="sieve-btn" id="sb-3" onclick="sieveStep(3)">筛 3 的倍数</button>
            <button class="sieve-btn" id="sb-5" onclick="sieveStep(5)">筛 5 的倍数</button>
            <button class="sieve-btn" id="sb-7" onclick="sieveStep(7)">筛 7 的倍数</button>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">统计</div>
          <div class="info-box">
            <div>质数个数：<strong id="prime-count">0</strong></div>
            <div>合数个数：<strong id="comp-count">0</strong></div>
            <div>已筛步骤：<strong id="step-count">0</strong></div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">质数列表</div>
          <div class="prime-list" id="prime-list"></div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">知识卡片</div>
          <div class="info-box" style="background:#fff;border-color:#e2e8f0;font-size:11px;line-height:1.7;">
            <strong>质数</strong>：只能被 1 和自身整除的大于 1 的自然数。<br/>
            <strong>合数</strong>：除了 1 和自身还有其他因数的自然数。<br/>
            <strong>1</strong> 既不是质数，也不是合数。<br/>
            <strong>埃氏筛法</strong>：依次划去 2、3、5、7 的倍数，剩余即为质数。
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../edu-lib/edu-tools.js"></script>
<script>
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
let W, H;
// state: 0=未筛, 1=合数(已筛), 2=质数
const state = new Array(101).fill(0);
state[0] = -1; // unused
state[1] = -1; // neither
const sieveSteps = [2, 3, 5, 7];
let stepsDone = [];

function sieveStep(n) {
  if (stepsDone.includes(n)) return;
  stepsDone.push(n);
  state[n] = 2; // mark as prime
  for (let i = n * 2; i <= 100; i += n) {
    if (state[i] !== 2) state[i] = 1;
  }
  document.getElementById('sb-' + n).classList.add('done');
  updateStats();
  render();
}

function autoSieve() {
  let delay = 0;
  sieveSteps.forEach(n => {
    if (!stepsDone.includes(n)) {
      setTimeout(() => sieveStep(n), delay);
      delay += 600;
    }
  });
}

function resetSieve() {
  for (let i = 0; i <= 100; i++) state[i] = (i === 0 || i === 1) ? -1 : 0;
  stepsDone = [];
  sieveSteps.forEach(n => document.getElementById('sb-' + n).classList.remove('done'));
  updateStats();
  render();
}

function updateStats() {
  let primes = 0, comps = 0;
  const primeList = [];
  for (let i = 2; i <= 100; i++) {
    if (state[i] === 2 || (stepsDone.length === sieveSteps.length && state[i] === 0)) {
      primes++;
      primeList.push(i);
    }
    if (state[i] === 1) comps++;
  }
  // After all steps, remaining unsieved are prime
  if (stepsDone.length === sieveSteps.length) {
    for (let i = 2; i <= 100; i++) {
      if (state[i] === 0) state[i] = 2;
    }
    primes = 0; comps = 0; primeList.length = 0;
    for (let i = 2; i <= 100; i++) {
      if (state[i] === 2) { primes++; primeList.push(i); }
      else if (state[i] === 1) comps++;
    }
  }
  document.getElementById('prime-count').textContent = primes;
  document.getElementById('comp-count').textContent = comps;
  document.getElementById('step-count').textContent = stepsDone.length + '/' + sieveSteps.length;
  document.getElementById('prime-list').innerHTML = primeList.map(p => `<span class="prime-tag">${p}</span>`).join('');
}

function render() {
  const dpr = window.devicePixelRatio || 1;
  W = canvas.clientWidth; H = canvas.clientHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const cols = 10;
  const margin = 40;
  const gap = 3;
  const cellW = Math.min((W - margin * 2 - gap * (cols - 1)) / cols, 55);
  const cellH = cellW;
  const totalW = cols * cellW + (cols - 1) * gap;
  const totalH = 10 * cellH + 9 * gap;
  const ox = (W - totalW) / 2;
  const oy = (H - totalH) / 2;

  ctx.font = 'bold 14px sans-serif'; ctx.fillStyle = '#1e293b'; ctx.textAlign = 'center';
  ctx.fillText('埃拉托斯特尼筛法（1~100）', W / 2, oy - 20);

  for (let i = 1; i <= 100; i++) {
    const row = Math.floor((i - 1) / cols);
    const col = (i - 1) % cols;
    const x = ox + col * (cellW + gap);
    const y = oy + row * (cellH + gap);
    const s = state[i];

    if (s === -1) {
      // 1: special
      ctx.fillStyle = '#f1f5f9';
      ctx.fillRect(x, y, cellW, cellH);
      ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 1;
      ctx.strokeRect(x, y, cellW, cellH);
      ctx.fillStyle = '#94a3b8'; ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'center'; ctx.fillText(i, x + cellW / 2, y + cellH / 2 + 5);
    } else if (s === 2) {
      // Prime - gold
      const grad = ctx.createLinearGradient(x, y, x + cellW, y + cellH);
      grad.addColorStop(0, '#fbbf24'); grad.addColorStop(1, '#f59e0b');
      ctx.fillStyle = grad;
      ctx.fillRect(x, y, cellW, cellH);
      ctx.strokeStyle = '#D97706'; ctx.lineWidth = 1.5;
      ctx.strokeRect(x, y, cellW, cellH);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'center'; ctx.fillText(i, x + cellW / 2, y + cellH / 2 + 5);
    } else if (s === 1) {
      // Composite - crossed out
      ctx.fillStyle = '#fee2e2';
      ctx.fillRect(x, y, cellW, cellH);
      ctx.strokeStyle = '#fca5a5'; ctx.lineWidth = 1;
      ctx.strokeRect(x, y, cellW, cellH);
      // Cross line
      ctx.strokeStyle = '#ef444480'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(x + 4, y + 4); ctx.lineTo(x + cellW - 4, y + cellH - 4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + cellW - 4, y + 4); ctx.lineTo(x + 4, y + cellH - 4); ctx.stroke();
      ctx.fillStyle = '#94a3b880'; ctx.font = '12px sans-serif';
      ctx.textAlign = 'center'; ctx.fillText(i, x + cellW / 2, y + cellH / 2 + 4);
    } else {
      // Unsieved
      ctx.fillStyle = '#fff';
      ctx.fillRect(x, y, cellW, cellH);
      ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1;
      ctx.strokeRect(x, y, cellW, cellH);
      ctx.fillStyle = '#64748b'; ctx.font = '13px sans-serif';
      ctx.textAlign = 'center'; ctx.fillText(i, x + cellW / 2, y + cellH / 2 + 5);
    }
  }

  // Legend
  const ly = oy + totalH + 16;
  const items = [
    { color: '#fbbf24', label: '质数' },
    { color: '#fee2e2', label: '合数（已筛）' },
    { color: '#fff', border: '#e2e8f0', label: '未筛' },
    { color: '#f1f5f9', label: '1（非质非合）' },
  ];
  ctx.font = '12px sans-serif';
  let lx = W / 2 - items.length * 55;
  items.forEach(it => {
    ctx.fillStyle = it.color;
    ctx.fillRect(lx, ly, 14, 14);
    ctx.strokeStyle = it.border || '#D97706'; ctx.lineWidth = 1;
    ctx.strokeRect(lx, ly, 14, 14);
    ctx.fillStyle = '#64748b'; ctx.textAlign = 'left';
    ctx.fillText(it.label, lx + 18, ly + 12);
    lx += 115;
  });
}

window.addEventListener('resize', render);
updateStats();
setTimeout(render, 50);
</script>
</body>
</html>
