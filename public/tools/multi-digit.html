<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三位数乘两位数 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 260px; height: 100%; }
    .canvas-area { padding: 24px; overflow-y: auto; background: linear-gradient(135deg, #eff6ff 0%, #fdfaf4 100%); }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 14px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .preset-btn { padding: 8px 0; border-radius: 8px; font-size: 14px; font-weight: 700; font-family: 'Courier New', monospace; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; }
    .preset-btn:hover { border-color: #3b82f6; color: #3b82f6; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #bfdbfe; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .section-title { font-size: 14px; font-weight: 700; color: #334155; margin-bottom: 12px; text-align: center; }

    /* 输入区域 */
    .input-area { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
    .num-input { width: 80px; padding: 8px 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 20px; font-weight: 800; font-family: 'Courier New', monospace; text-align: center; background: #fff; }
    .num-input:focus { border-color: #3b82f6; outline: none; }
    .op-label { font-size: 24px; font-weight: 800; color: #64748b; }
    .calc-btn { padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 700; background: #3b82f6; color: #fff; border: none; cursor: pointer; transition: all .15s; }
    .calc-btn:hover { background: #2563eb; }

    /* 竖式 */
    .vertical-calc { display: flex; flex-direction: column; align-items: flex-end; margin: 0 auto 20px; font-family: 'Courier New', monospace; font-size: 24px; font-weight: 700; }
    .vc-row { display: flex; gap: 2px; min-height: 36px; align-items: center; }
    .vc-cell { width: 28px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 4px; transition: all .3s; }
    .vc-cell.highlight { background: #dbeafe; color: #2563eb; }
    .vc-cell.partial { background: #fef3c7; color: #92400e; }
    .vc-cell.result { background: #dcfce7; color: #166534; }
    .vc-cell.carry { background: #fee2e2; color: #dc2626; font-size: 14px; }
    .vc-line { width: 100%; height: 2px; background: #1e293b; margin: 4px 0; }
    .vc-op { color: #64748b; margin-right: 8px; min-width: 20px; text-align: center; }
    .vc-label { font-size: 12px; color: #64748b; margin-right: 8px; font-weight: 600; text-align: right; }

    /* 面积模型 */
    .area-model { display: flex; justify-content: center; margin-bottom: 20px; }
    .area-model canvas { border-radius: 12px; }

    /* 分步 */
    .step-controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 16px; }
    .step-btn { padding: 6px 16px; border-radius: 8px; border: 1.5px solid #e2e8f0; background: #fff; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
    .step-btn:hover { border-color: #3b82f6; color: #3b82f6; }
    .step-info { text-align: center; font-size: 14px; font-weight: 600; color: #334155; margin-bottom: 12px; min-height: 24px; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div class="edu-toolbar-title">✖ 三位数乘两位数</div>
    <div class="edu-toolbar-subtitle">上册 · 第四单元</div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <div class="input-area">
          <input type="number" class="num-input" id="inputA" value="145" min="100" max="999" />
          <span class="op-label">×</span>
          <input type="number" class="num-input" id="inputB" value="12" min="10" max="99" />
          <button class="calc-btn" onclick="calculate()">计算</button>
        </div>

        <!-- 竖式 -->
        <div class="section-title">竖式计算</div>
        <div class="step-controls">
          <button class="step-btn" onclick="prevStep()">上一步</button>
          <button class="step-btn" onclick="nextStep()">下一步</button>
          <button class="step-btn" onclick="showAll()">显示全部</button>
        </div>
        <div class="step-info" id="stepInfo">点击"下一步"开始分步计算</div>
        <div class="vertical-calc" id="verticalCalc"></div>

        <!-- 面积模型 -->
        <div class="section-title">面积模型</div>
        <div class="area-model">
          <canvas id="areaCanvas" width="500" height="320"></canvas>
        </div>
      </div>

      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">预设例题</div>
          <button class="preset-btn" onclick="loadExample(145,12)">145 × 12</button>
          <button class="preset-btn" onclick="loadExample(234,56)">234 × 56</button>
          <button class="preset-btn" onclick="loadExample(308,25)">308 × 25</button>
          <button class="preset-btn" onclick="loadExample(420,30)">420 × 30</button>
          <button class="preset-btn" onclick="loadExample(175,48)">175 × 48</button>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <b>计算方法</b><br/>
          ● 先用两位数的个位去乘三位数<br/>
          ● 再用两位数的十位去乘三位数（注意对齐十位）<br/>
          ● 最后把两个部分积加起来<br/>
          ● 注意进位不要遗漏
        </div>
      </div>
    </div>
  </div>
</div>
<script>
let a = 145, b = 12;
let currentStep = 0; // 0=未开始, 1=个位乘, 2=十位乘, 3=相加
const stepTexts = [
  '点击"下一步"开始分步计算',
  '第一步：用个位上的数去乘',
  '第二步：用十位上的数去乘',
  '第三步：把两个部分积加起来',
];

function loadExample(pa, pb) {
  document.getElementById('inputA').value = pa;
  document.getElementById('inputB').value = pb;
  calculate();
}

function calculate() {
  a = parseInt(document.getElementById('inputA').value) || 100;
  b = parseInt(document.getElementById('inputB').value) || 10;
  a = Math.max(100, Math.min(999, a));
  b = Math.max(10, Math.min(99, b));
  currentStep = 0;
  renderVertical();
  drawAreaModel();
  document.getElementById('stepInfo').textContent = stepTexts[0];
}

function nextStep() {
  if (currentStep < 3) { currentStep++; document.getElementById('stepInfo').textContent = stepTexts[currentStep]; }
  renderVertical();
}
function prevStep() {
  if (currentStep > 0) { currentStep--; document.getElementById('stepInfo').textContent = stepStepTexts[currentStep]; }
  renderVertical();
}
function showAll() {
  currentStep = 3;
  document.getElementById('stepInfo').textContent = stepTexts[3];
  renderVertical();
}

function renderVertical() {
  const container = document.getElementById('verticalCalc');
  const aStr = String(a);
  const bStr = String(b);
  const product = a * b;
  const prodStr = String(product);

  // 部分积
  const onesDigit = parseInt(bStr[1]);
  const tensDigit = parseInt(bStr[0]);
  const partial1 = a * onesDigit;
  const partial2 = a * tensDigit;
  const p1Str = String(partial1);
  const p2Str = String(partial2 + '0'); // 实际是 partial2 * 10，但展示时末尾加0
  const p2Value = partial2 * 10;

  const maxLen = Math.max(aStr.length + 1, bStr.length + 1, p1Str.length + 1, p2Str.length + 1, prodStr.length + 1) + 1;

  let html = '';

  // 第一行：被乘数
  html += '<div class="vc-row">';
  html += '<div class="vc-label"></div>';
  for (let i = 0; i < maxLen - aStr.length; i++) html += '<div class="vc-cell"></div>';
  for (let i = 0; i < aStr.length; i++) html += `<div class="vc-cell">${aStr[i]}</div>`;
  html += '</div>';

  // 第二行：× 乘数
  html += '<div class="vc-row">';
  html += '<div class="vc-label"></div>';
  for (let i = 0; i < maxLen - bStr.length - 1; i++) html += '<div class="vc-cell"></div>';
  html += '<div class="vc-cell vc-op">×</div>';
  for (let i = 0; i < bStr.length; i++) html += `<div class="vc-cell">${bStr[i]}</div>`;
  html += '</div>';

  // 分隔线
  html += '<div class="vc-line"></div>';

  // 第一个部分积：个位 × 被乘数
  if (currentStep >= 1) {
    html += '<div class="vc-row">';
    html += '<div class="vc-label">个位×</div>';
    for (let i = 0; i < maxLen - p1Str.length; i++) html += '<div class="vc-cell"></div>';
    for (let i = 0; i < p1Str.length; i++) html += `<div class="vc-cell partial">${p1Str[i]}</div>`;
    html += '</div>';
  }

  // 第二个部分积：十位 × 被乘数（左移一位）
  if (currentStep >= 2) {
    const p2Display = String(partial2);
    html += '<div class="vc-row">';
    html += '<div class="vc-label">十位×</div>';
    for (let i = 0; i < maxLen - p2Display.length - 1; i++) html += '<div class="vc-cell"></div>';
    for (let i = 0; i < p2Display.length; i++) html += `<div class="vc-cell partial">${p2Display[i]}</div>`;
    html += '<div class="vc-cell partial">0</div>';
    html += '</div>';
  }

  // 分隔线2
  if (currentStep >= 3) {
    html += '<div class="vc-line"></div>';
    // 结果
    html += '<div class="vc-row">';
    html += '<div class="vc-label">=</div>';
    for (let i = 0; i < maxLen - prodStr.length; i++) html += '<div class="vc-cell"></div>';
    for (let i = 0; i < prodStr.length; i++) html += `<div class="vc-cell result">${prodStr[i]}</div>`;
    html += '</div>';
  }

  container.innerHTML = html;
}

function drawAreaModel() {
  const canvas = document.getElementById('areaCanvas');
  const dpr = window.devicePixelRatio || 1;
  const w = 500, h = 320;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const aStr = String(a);
  const bStr = String(b);
  const hundreds = parseInt(aStr[0]) * 100;
  const tens = parseInt(aStr[1]) * 10;
  const ones = parseInt(aStr[2]);
  const bTens = parseInt(bStr[0]) * 10;
  const bOnes = parseInt(bStr[1]);

  const pad = 50;
  const drawW = w - pad * 2 - 40;
  const drawH = h - pad * 2 - 20;
  const x0 = pad + 40, y0 = pad;

  // 背景
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, w, h);

  const parts = [
    { w: hundreds, h: bTens, color: '#dbeafe', label: `${hundreds}×${bTens}`, value: hundreds * bTens },
    { w: tens, h: bTens, color: '#fce7f3', label: `${tens}×${bTens}`, value: tens * bTens },
    { w: ones, h: bTens, color: '#fef3c7', label: `${ones}×${bTens}`, value: ones * bTens },
    { w: hundreds, h: bOnes, color: '#d1fae5', label: `${hundreds}×${bOnes}`, value: hundreds * bOnes },
    { w: tens, h: bOnes, color: '#ede9fe', label: `${tens}×${bOnes}`, value: tens * bOnes },
    { w: ones, h: bOnes, color: '#fee2e2', label: `${ones}×${bOnes}`, value: ones * bOnes },
  ];

  const totalW = hundreds + tens + ones;
  const totalH = bTens + bOnes;

  let cx = x0;
  // 上半部分 (bTens)
  let cy = y0;
  const scaleW = drawW / totalW;
  const scaleH = drawH / totalH;

  // 画6个区域
  const sections = [
    { x: x0, y: y0, w: hundreds * scaleW, h: bTens * scaleH, color: '#dbeafe', label: `${hundreds}×${bTens}=${hundreds*bTens}` },
    { x: x0 + hundreds * scaleW, y: y0, w: tens * scaleW, h: bTens * scaleH, color: '#fce7f3', label: `${tens}×${bTens}=${tens*bTens}` },
    { x: x0 + (hundreds + tens) * scaleW, y: y0, w: ones * scaleW, h: bTens * scaleH, color: '#fef3c7', label: `${ones}×${bTens}=${ones*bTens}` },
    { x: x0, y: y0 + bTens * scaleH, w: hundreds * scaleW, h: bOnes * scaleH, color: '#d1fae5', label: `${hundreds}×${bOnes}=${hundreds*bOnes}` },
    { x: x0 + hundreds * scaleW, y: y0 + bTens * scaleH, w: tens * scaleW, h: bOnes * scaleH, color: '#ede9fe', label: `${tens}×${bOnes}=${tens*bOnes}` },
    { x: x0 + (hundreds + tens) * scaleW, y: y0 + bTens * scaleH, w: ones * scaleW, h: bOnes * scaleH, color: '#fee2e2', label: `${ones}×${bOnes}=${ones*bOnes}` },
  ];

  sections.forEach(s => {
    ctx.fillStyle = s.color;
    ctx.fillRect(s.x, s.y, s.w, s.h);
    ctx.strokeStyle = '#94a3b8';
    ctx.lineWidth = 1;
    ctx.strokeRect(s.x, s.y, s.w, s.h);
    // 标签
    ctx.fillStyle = '#1e293b';
    ctx.font = 'bold 12px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (s.w > 40 && s.h > 20) {
      ctx.fillText(s.label, s.x + s.w/2, s.y + s.h/2);
    }
  });

  // 外框
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 2;
  ctx.strokeRect(x0, y0, totalW * scaleW, totalH * scaleH);

  // 横轴标注
  ctx.fillStyle = '#3b82f6';
  ctx.font = 'bold 13px "Microsoft YaHei", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`${a} (被乘数)`, x0 + totalW * scaleW / 2, y0 + totalH * scaleH + 20);

  // 纵轴标注
  ctx.save();
  ctx.translate(x0 - 14, y0 + totalH * scaleH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillStyle = '#f97316';
  ctx.fillText(`${b} (乘数)`, 0, 0);
  ctx.restore();

  // 顶部尺寸
  ctx.fillStyle = '#64748b';
  ctx.font = '11px "Microsoft YaHei", sans-serif';
  ctx.textAlign = 'center';
  let lx = x0;
  [hundreds, tens, ones].forEach((v, i) => {
    ctx.fillText(v, lx + v * scaleW / 2, y0 - 8);
    lx += v * scaleW;
  });
  // 左侧尺寸
  let ly = y0;
  [bTens, bOnes].forEach((v, i) => {
    ctx.textAlign = 'right';
    ctx.fillText(v, x0 - 8, ly + v * scaleH / 2 + 4);
    ly += v * scaleH;
  });
}

// 初始化
calculate();
</script>
</body>
</html>
