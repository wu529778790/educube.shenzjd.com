<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>约分与通分 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 260px; height: 100%; }
    .canvas-area { padding: 24px; overflow-y: auto; background: linear-gradient(135deg, #f0fdf4 0%, #fdfaf4 100%); display: flex; flex-direction: column; align-items: center; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 14px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #bbf7d0; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .tab-bar { display: flex; gap: 6px; margin-bottom: 12px; }
    .tab-btn { padding: 6px 14px; border-radius: 8px; border: 1.5px solid #e2e8f0; background: #fff; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
    .tab-btn.active { background: #22c55e; color: #fff; border-color: #22c55e; }
    .frac-input { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .frac-input input { width: 55px; text-align: center; font-size: 20px; font-weight: 800; border: 2px solid #e2e8f0; border-radius: 8px; padding: 4px; font-family: 'Courier New', monospace; }
    .frac-input .fline { width: 55px; height: 3px; background: #334155; border-radius: 2px; }
    .input-row { display: flex; align-items: center; gap: 12px; margin: 10px 0; justify-content: center; }
    .step-card { background: #fff; border: 2px solid #22c55e; border-radius: 14px; padding: 20px; width: 100%; max-width: 440px; }
    .step-line { margin: 6px 0; font-size: 16px; line-height: 2; font-family: 'Courier New', monospace; }
    .step-line .hl { color: #22c55e; font-weight: 700; }
    .step-line .op { color: #ef4444; font-weight: 700; }
    .result-box { background: #f0fdf4; border: 2px solid #22c55e; border-radius: 12px; padding: 12px; text-align: center; margin-top: 10px; }
    .result-big { font-size: 28px; font-weight: 800; color: #22c55e; }
    .preset-btn { padding: 8px 0; border-radius: 8px; font-size: 13px; font-weight: 600; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; }
    .preset-btn:hover { border-color: #22c55e; color: #22c55e; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">✂ 约分与通分</div>
      <div class="edu-toolbar-subtitle">下册 · 第四单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-primary" onclick="solve()">计算</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <div class="tab-bar">
          <button class="tab-btn active" onclick="switchMode('simplify')">约分</button>
          <button class="tab-btn" onclick="switchMode('common')">通分</button>
        </div>
        <div id="inputArea"></div>
        <div class="step-card" id="stepCard"></div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">预设</div>
          <button class="preset-btn" onclick="loadS(12,18)">约 12/18</button>
          <button class="preset-btn" onclick="loadS(15,25)">约 15/25</button>
          <button class="preset-btn" onclick="loadC(2,3,1,4)">通 ⅔ ¼</button>
          <button class="preset-btn" onclick="loadC(3,4,5,6)">通 ¾ ⅚</button>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <b>约分与通分</b><br/>
          ● 约分：分子分母同除以公因数<br/>
          ● 最简分数：分子分母互质<br/>
          ● 通分：化成相同分母<br/>
          ● 找最小公倍数作公分母
        </div>
      </div>
    </div>
  </div>
</div>
<script>
let currentMode = 'simplify';

function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while (b) { [a, b] = [b, a % b]; } return a; }

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', ['simplify','common'][i] === mode));
  renderInput();
  solve();
}

function renderInput() {
  const area = document.getElementById('inputArea');
  if (currentMode === 'simplify') {
    area.innerHTML = `<div class="input-row"><div class="frac-input"><input type="number" id="sn" value="12" min="1" oninput="solve()"/><div class="fline"></div><input type="number" id="sd" value="18" min="1" oninput="solve()"/></div></div>`;
  } else {
    area.innerHTML = `<div class="input-row"><div class="frac-input"><input type="number" id="cn1" value="2" min="1" oninput="solve()"/><div class="fline"></div><input type="number" id="cd1" value="3" min="1" oninput="solve()"/></div><span style="font-size:24px;font-weight:700;color:#94a3b8">和</span><div class="frac-input"><input type="number" id="cn2" value="1" min="1" oninput="solve()"/><div class="fline"></div><input type="number" id="cd2" value="4" min="1" oninput="solve()"/></div></div>`;
  }
}

function solve() {
  const card = document.getElementById('stepCard');
  if (currentMode === 'simplify') {
    const n = parseInt(document.getElementById('sn')?.value) || 1;
    const d = parseInt(document.getElementById('sd')?.value) || 1;
    const g = gcd(n, d);
    const rn = n / g, rd = d / g;

    // Find common factors step by step
    let steps = [];
    let cn = n, cd = d;
    for (let f = 2; f <= Math.min(cn, cd); f++) {
      while (cn % f === 0 && cd % f === 0) {
        steps.push({ from: `${cn}/${cd}`, factor: f, to: `${cn/f}/${cd/f}` });
        cn /= f; cd /= f;
      }
    }

    let html = `<div style="font-size:16px;font-weight:700;margin-bottom:8px">约分过程</div>`;
    html += `<div class="step-line">原分数：<span class="hl">${n}/${d}</span></div>`;
    steps.forEach((s, i) => {
      html += `<div class="step-line"><span class="op">÷${s.factor}</span> → ${s.to}</div>`;
    });
    if (steps.length === 0) html += `<div class="step-line">已经是最简分数！</div>`;
    html += `<div class="result-box"><div class="result-big">${rn}/${rd}</div><div style="font-size:13px;color:#64748b">= ${n}/${d} 的最简分数</div></div>`;
    if (g > 1) html += `<div style="font-size:13px;color:#64748b;margin-top:6px">公因数：${g}，分子分母同除以 ${g}</div>`;
    card.innerHTML = html;
  } else {
    const n1 = parseInt(document.getElementById('cn1')?.value) || 1;
    const d1 = parseInt(document.getElementById('cd1')?.value) || 1;
    const n2 = parseInt(document.getElementById('cn2')?.value) || 1;
    const d2 = parseInt(document.getElementById('cd2')?.value) || 1;
    const g = gcd(d1, d2);
    const lcd = d1 * d2 / g;
    const rn1 = n1 * (lcd / d1), rd1 = lcd;
    const rn2 = n2 * (lcd / d2), rd2 = lcd;

    card.innerHTML = `
      <div style="font-size:16px;font-weight:700;margin-bottom:8px">通分过程</div>
      <div class="step-line">${n1}/${d1} 和 ${n2}/${d2}</div>
      <div class="step-line">分母 ${d1} 和 ${d2} 的最大公因数 = <span class="hl">${g}</span></div>
      <div class="step-line">最小公倍数 = ${d1}×${d2}÷${g} = <span class="hl">${lcd}</span></div>
      <div class="step-line"><span class="op">${n1}/${d1}</span> = ${n1}×${lcd/d1} / ${d1}×${lcd/d1} = <span class="hl">${rn1}/${rd1}</span></div>
      <div class="step-line"><span class="op">${n2}/${d2}</span> = ${n2}×${lcd/d2} / ${d2}×${lcd/d2} = <span class="hl">${rn2}/${rd2}</span></div>
      <div class="result-box"><div class="result-big">${rn1}/${rd1} 和 ${rn2}/${rd2}</div></div>
    `;
  }
}

function loadS(n, d) { switchMode('simplify'); setTimeout(() => { document.getElementById('sn').value = n; document.getElementById('sd').value = d; solve(); }, 50); }
function loadC(a, b, c, d) { switchMode('common'); setTimeout(() => { document.getElementById('cn1').value = a; document.getElementById('cd1').value = b; document.getElementById('cn2').value = c; document.getElementById('cd2').value = d; solve(); }, 50); }

function resetAll() { switchMode('simplify'); }
renderInput();
solve();
</script>
</body>
</html>
