<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>可能性 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 280px; height: 100%; }
    .canvas-area { padding: 16px; overflow-y: auto; background: linear-gradient(135deg, #faf5ff 0%, #fdfaf4 100%); display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 12px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 5px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: .05em; margin-bottom: 2px; }
    .divider { height: 1px; background: #e2e8f0; }

    /* Drum machine */
    .drum-wrap { position: relative; width: 220px; height: 180px; margin: 0 auto; }
    .drum-svg { width: 100%; height: 100%; }
    .drum-ball { position: absolute; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: #fff; pointer-events: none; }

    /* Ejected ball */
    .eject-ball { position: absolute; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; color: #fff; box-shadow: 0 4px 14px rgba(0,0,0,.25); z-index: 10; pointer-events: none; }

    /* Prediction buttons */
    .predict-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .predict-btn { padding: 8px 18px; border-radius: 10px; font-size: 14px; font-weight: 700; color: #fff; border: 3px solid transparent; cursor: pointer; transition: all .15s; opacity: .55; }
    .predict-btn:hover { opacity: .85; }
    .predict-btn.selected { opacity: 1; border-color: #1e293b; transform: scale(1.08); }

    /* Histogram */
    .histogram-card { background: #fff; border: 2px solid #8b5cf6; border-radius: 14px; padding: 14px; width: 100%; max-width: 520px; }
    .hist-bars { display: flex; gap: 16px; align-items: flex-end; justify-content: center; height: 120px; padding-top: 8px; }
    .hist-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; max-width: 100px; }
    .hist-col .bar-wrap { width: 100%; height: 100px; display: flex; flex-direction: column; justify-content: flex-end; position: relative; }
    .hist-col .expected { position: absolute; left: 0; right: 0; border-top: 2px dashed #f97316; z-index: 2; }
    .hist-col .actual { border-radius: 6px 6px 0 0; transition: height .3s ease; min-width: 32px; margin: 0 auto; }
    .hist-col .label { font-size: 12px; font-weight: 700; }
    .hist-col .pct { font-size: 11px; color: #64748b; }

    /* Trial card */
    .trial-card { background: #fff; border: 2px solid #22c55e; border-radius: 14px; padding: 14px; width: 100%; max-width: 520px; }
    .trial-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 6px; }
    .trial-stat { text-align: center; padding: 6px 14px; background: #f8fafc; border-radius: 10px; }
    .trial-stat .num { font-size: 22px; font-weight: 800; }
    .trial-stat .pct { font-size: 12px; color: #64748b; }

    /* Color row with slider */
    .color-row { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
    .color-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }
    .color-row .name { font-size: 12px; font-weight: 700; width: 28px; }
    .color-row input[type=range] { flex: 1; min-width: 60px; }
    .color-row .cnt { font-size: 14px; font-weight: 800; width: 20px; text-align: center; }
    .preset-btn { padding: 7px 0; border-radius: 8px; font-size: 12px; font-weight: 600; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; width: 100%; }
    .preset-btn:hover { border-color: #8b5cf6; color: #8b5cf6; }
    .info-box { background: #fff; border: 1px solid #e9d5ff; border-radius: 10px; padding: 10px 12px; font-size: 11px; line-height: 1.8; color: #334155; }

    /* Score badge */
    .score-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #fff; box-shadow: 0 2px 6px rgba(245,158,11,.3); }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">🎲 可能性</div>
      <div class="edu-toolbar-subtitle">上册 · 第四单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-primary" onclick="drawOne()">摸一次</button>
      <button class="edu-btn edu-btn-accent" onclick="drawMany()">摸100次</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <!-- Drum machine -->
        <div class="drum-wrap" id="drumWrap">
          <svg class="drum-svg" viewBox="0 0 220 180">
            <defs>
              <radialGradient id="drumGrad" cx="50%" cy="40%"><stop offset="0%" stop-color="#e2e8f0"/><stop offset="100%" stop-color="#cbd5e1"/></radialGradient>
            </defs>
            <ellipse cx="110" cy="90" rx="90" ry="70" fill="url(#drumGrad)" stroke="#94a3b8" stroke-width="2"/>
            <ellipse cx="110" cy="90" rx="60" ry="45" fill="none" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 3"/>
            <text x="110" y="95" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="600">摇奖机</text>
          </svg>
          <div id="drumBalls"></div>
        </div>

        <!-- Ejected ball container -->
        <div id="ejectZone" style="position:relative;width:60px;height:60px"></div>

        <!-- Prediction game -->
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center">
          <span style="font-size:13px;font-weight:700;color:#64748b">预测下一个：</span>
          <div class="predict-row" id="predictRow"></div>
          <span class="score-badge" id="scoreBadge">🎯 0 / 0</span>
        </div>

        <!-- Histogram -->
        <div class="histogram-card">
          <div style="font-size:14px;font-weight:700;margin-bottom:6px">频率分布 <span style="font-size:11px;color:#f97316">--- 理论值</span></div>
          <div class="hist-bars" id="histBars"></div>
        </div>

        <!-- Trial stats -->
        <div class="trial-card" id="trialCard"></div>
      </div>

      <!-- Right panel -->
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">球的数量（拖动调整）</div>
          <div class="color-row"><div class="color-dot" style="background:#ef4444"></div><span class="name">红</span>
            <input type="range" id="redN" min="0" max="10" value="3" oninput="onSlider()"/>
            <span class="cnt" id="redCnt">3</span></div>
          <div class="color-row"><div class="color-dot" style="background:#3b82f6"></div><span class="name">蓝</span>
            <input type="range" id="blueN" min="0" max="10" value="2" oninput="onSlider()"/>
            <span class="cnt" id="blueCnt">2</span></div>
          <div class="color-row"><div class="color-dot" style="background:#22c55e"></div><span class="name">绿</span>
            <input type="range" id="greenN" min="0" max="10" value="1" oninput="onSlider()"/>
            <span class="cnt" id="greenCnt">1</span></div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">预设方案</div>
          <button class="preset-btn" onclick="loadPreset(3,2,1)">3红 2蓝 1绿</button>
          <button class="preset-btn" onclick="loadPreset(1,1,0)">1红 1蓝</button>
          <button class="preset-btn" onclick="loadPreset(5,0,0)">5个全红</button>
          <button class="preset-btn" onclick="loadPreset(2,2,2)">均等分配</button>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <b>可能性知识</b><br/>
          ● P(红) = 红球数 &divide; 总球数<br/>
          ● 概率在 0 ~ 1 之间<br/>
          ● 试验次数越多，越接近理论值<br/>
          ● 先预测再摸球，看看你的直觉准吗？
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ====== State ====== */
const COLORS = { red:'#ef4444', blue:'#3b82f6', green:'#22c55e' };
const NAMES  = { red:'红', blue:'蓝', green:'绿' };
let trials = [];
let prediction = null;      // 'red' | 'blue' | 'green' | null
let scoreCorrect = 0;
let scoreTotal = 0;
let spinning = false;
let bulkRunning = false;

/* ====== Helpers ====== */
function getBallCounts() {
  return {
    red:   parseInt(document.getElementById('redN').value)   || 0,
    blue:  parseInt(document.getElementById('blueN').value)  || 0,
    green: parseInt(document.getElementById('greenN').value) || 0
  };
}
function totalCount(c) { return c.red + c.blue + c.green; }

/* ====== Probability designer (slider feedback) ====== */
function onSlider() {
  const c = getBallCounts();
  document.getElementById('redCnt').textContent  = c.red;
  document.getElementById('blueCnt').textContent = c.blue;
  document.getElementById('greenCnt').textContent = c.green;
  trials = []; scoreCorrect = 0; scoreTotal = 0;
  prediction = null;
  renderAll();
}

function loadPreset(r, b, g) {
  document.getElementById('redN').value   = r;
  document.getElementById('blueN').value  = b;
  document.getElementById('greenN').value = g;
  trials = []; scoreCorrect = 0; scoreTotal = 0;
  prediction = null;
  onSlider();
}

function resetAll() { loadPreset(3, 2, 1); }

/* ====== Render: drum balls ====== */
function renderDrumBalls() {
  const c = getBallCounts();
  const total = totalCount(c);
  const wrap = document.getElementById('drumBalls');
  let html = '';
  let idx = 0;
  for (const key of ['red','blue','green']) {
    for (let i = 0; i < c[key]; i++) {
      const angle = (idx / Math.max(total,1)) * Math.PI * 2 + Date.now() * 0.0003;
      const rx = 55, ry = 42;
      const cx = 110 + Math.cos(angle) * rx - 9;
      const cy = 90  + Math.sin(angle) * ry - 9;
      html += `<div class="drum-ball" style="width:18px;height:18px;background:${COLORS[key]};left:${cx}px;top:${cy}px">${NAMES[key]}</div>`;
      idx++;
    }
  }
  wrap.innerHTML = html;
}

/* ====== Render: prediction buttons ====== */
function renderPredict() {
  const c = getBallCounts();
  const row = document.getElementById('predictRow');
  let html = '';
  for (const key of ['red','blue','green']) {
    if (c[key] === 0) continue;
    const sel = prediction === key ? 'selected' : '';
    html += `<button class="predict-btn ${sel}" style="background:${COLORS[key]}" onclick="setPrediction('${key}')">${NAMES[key]}</button>`;
  }
  row.innerHTML = html;
  document.getElementById('scoreBadge').textContent = `🎯 ${scoreCorrect} / ${scoreTotal}`;
}

function setPrediction(color) {
  prediction = (prediction === color) ? null : color;
  renderPredict();
}

/* ====== Render: histogram ====== */
function renderHistogram() {
  const c = getBallCounts();
  const total = Math.max(totalCount(c), 1);
  const tLen = Math.max(trials.length, 1);
  const container = document.getElementById('histBars');
  let html = '';
  for (const key of ['red','blue','green']) {
    if (c[key] === 0) continue;
    const expected = c[key] / total;
    const actual = trials.length ? trials.filter(t => t === key).length / tLen : 0;
    const expPx = Math.round(expected * 100);
    const actPx = Math.round(actual * 100);
    const count = trials.filter(t => t === key).length;
    html += `<div class="hist-col">
      <div class="pct">${trials.length ? (actual*100).toFixed(1)+'%' : '—'}</div>
      <div class="bar-wrap">
        <div class="expected" style="bottom:${expPx}%"></div>
        <div class="actual" style="height:${actPx}px;background:${COLORS[key]};opacity:.85"></div>
      </div>
      <div class="label" style="color:${COLORS[key]}">${NAMES[key]}</div>
      <div class="pct">${count}次</div>
    </div>`;
  }
  container.innerHTML = html;
}

/* ====== Render: trial card ====== */
function renderTrialCard() {
  const c = getBallCounts();
  const total = totalCount(c);
  const tLen = trials.length;
  if (tLen === 0) {
    document.getElementById('trialCard').innerHTML = '<div style="text-align:center;color:#94a3b8;padding:8px">点击 "摸一次" 开始试验</div>';
    return;
  }
  let html = `<div style="font-size:14px;font-weight:700;margin-bottom:4px">试验统计（共 ${tLen} 次）</div><div class="trial-row">`;
  for (const key of ['red','blue','green']) {
    if (c[key] === 0) continue;
    const cnt = trials.filter(t => t === key).length;
    const pct = (cnt / tLen * 100).toFixed(1);
    const exp = (c[key] / total * 100).toFixed(1);
    html += `<div class="trial-stat"><div class="num" style="color:${COLORS[key]}">${cnt}</div><div class="pct">${pct}%</div><div style="font-size:10px;color:#94a3b8">理论 ${exp}%</div></div>`;
  }
  html += '</div>';
  document.getElementById('trialCard').innerHTML = html;
}

/* ====== Master render ====== */
function renderAll() {
  renderDrumBalls(); renderPredict(); renderHistogram(); renderTrialCard();
}

/* ====== Ball drawing logic ====== */
function pickColor() {
  const c = getBallCounts();
  const total = totalCount(c);
  if (total === 0) return null;
  const r = Math.random() * total;
  if (r < c.red) return 'red';
  if (r < c.red + c.blue) return 'blue';
  return 'green';
}

/* ====== Animated drum spin ====== */
function animateDrumSpin(callback) {
  if (spinning) return;
  spinning = true;
  const balls = document.querySelectorAll('.drum-ball');
  let frame = 0;
  const frames = 24;
  const interval = setInterval(() => {
    balls.forEach((el, i) => {
      const total = balls.length || 1;
      const speed = 0.15 + frame * 0.01;
      const angle = (i / total) * Math.PI * 2 + frame * speed;
      const rx = 55, ry = 42;
      el.style.left = (110 + Math.cos(angle) * rx - 9) + 'px';
      el.style.top  = (90  + Math.sin(angle) * ry - 9) + 'px';
    });
    frame++;
    if (frame >= frames) { clearInterval(interval); spinning = false; callback(); }
  }, 25);
}

/* ====== Eject ball with bounce ====== */
function ejectBall(color, onFinish) {
  const zone = document.getElementById('ejectZone');
  const rect = zone.getBoundingClientRect();
  const ball = document.createElement('div');
  ball.className = 'eject-ball';
  ball.style.background = COLORS[color];
  ball.textContent = NAMES[color];
  zone.appendChild(ball);

  let y = -80, vy = 0, gravity = 1.2, bounce = 0.55, grounded = false, bounces = 0;
  const ground = 8;
  function step() {
    vy += gravity;
    y += vy;
    if (y >= ground) { y = ground; vy = -vy * bounce; bounces++; }
    if (bounces >= 3) { grounded = true; y = ground; }
    ball.style.transform = `translateY(${y}px)`;
    if (!grounded) requestAnimationFrame(step);
    else { setTimeout(() => { ball.remove(); if (onFinish) onFinish(); }, 300); }
  }
  requestAnimationFrame(step);
}

/* ====== Draw one ====== */
function drawOne() {
  const c = getBallCounts();
  if (totalCount(c) === 0 || spinning) return;
  const color = pickColor();
  if (!color) return;

  // Check prediction
  if (prediction !== null) {
    scoreTotal++;
    if (prediction === color) scoreCorrect++;
  }
  trials.push(color);

  animateDrumSpin(() => {
    ejectBall(color, () => { renderAll(); });
    renderHistogram(); renderTrialCard(); renderPredict();
  });
}

/* ====== Draw many (bulk) ====== */
function drawMany() {
  const c = getBallCounts();
  if (totalCount(c) === 0 || bulkRunning) return;
  bulkRunning = true;
  let drawn = 0;
  const batch = 5; // draw 5 at a time for speed

  function runBatch() {
    if (drawn >= 100) { bulkRunning = false; renderAll(); return; }
    for (let i = 0; i < batch && drawn < 100; i++) {
      const color = pickColor();
      if (!color) { bulkRunning = false; renderAll(); return; }
      if (prediction !== null) { scoreTotal++; if (prediction === color) scoreCorrect++; }
      trials.push(color);
      drawn++;
    }
    renderHistogram(); renderTrialCard(); renderPredict();
    requestAnimationFrame(runBatch);
  }
  runBatch();
}

/* ====== Background drum animation ====== */
let drumAnimId;
function animateDrumIdle() {
  const balls = document.querySelectorAll('.drum-ball');
  const t = Date.now() * 0.0008;
  balls.forEach((el, i) => {
    const total = balls.length || 1;
    const angle = (i / total) * Math.PI * 2 + t;
    const rx = 55, ry = 42;
    el.style.left = (110 + Math.cos(angle) * rx - 9) + 'px';
    el.style.top  = (90  + Math.sin(angle) * ry - 9) + 'px';
  });
  drumAnimId = requestAnimationFrame(animateDrumIdle);
}

/* ====== Init ====== */
renderAll();
animateDrumIdle();
</script>
</body>
</html>
