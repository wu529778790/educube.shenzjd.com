<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>三角形分类演示</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
  .main-layout {
    display: grid;
    grid-template-columns: 1fr 220px;
    height: 100%;
    gap: 0;
  }
  .canvas-area {
    position: relative;
    background: #fff;
    overflow: hidden;
  }
  .control-panel {
    background: #fdfaf4;
    border-left: 1px solid #e2e8f0;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow: auto;
  }
  .ctrl-section { display: flex; flex-direction: column; gap: 8px; }
  .ctrl-label {
    font-size: 11px;
    font-weight: 700;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .classify-result {
    background: #fff;
    border: 2px solid #a855f7;
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }
  .classify-by-angle {
    font-size: 15px;
    font-weight: 700;
    color: #7c3aed;
    margin-bottom: 4px;
  }
  .classify-by-side {
    font-size: 13px;
    color: #64748b;
  }
  .angle-info {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }
  .angle-card {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 8px 4px;
    text-align: center;
  }
  .angle-card .label { font-size: 10px; color: #94a3b8; }
  .angle-card .value { font-size: 16px; font-weight: 700; color: #a855f7; }
  .side-info {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }
  .side-card {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 8px 4px;
    text-align: center;
  }
  .side-card .label { font-size: 10px; color: #94a3b8; }
  .side-card .value { font-size: 14px; font-weight: 700; color: #7c3aed; }
  .preset-btn {
    padding: 7px 0;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid #e2e8f0;
    background: #fff;
    color: #64748b;
    transition: all 0.15s;
    font-family: var(--edu-font);
    text-align: center;
  }
  .preset-btn:hover { border-color: #a855f7; color: #a855f7; }
  .divider { height: 1px; background: #e2e8f0; }
  .info-box {
    background: #fff;
    border: 1px solid #e9d5ff;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    color: #64748b;
    line-height: 1.8;
  }
  .info-box strong { color: #7c3aed; }
  .hint-label {
    position: absolute;
    top: 14px;
    left: 14px;
    background: rgba(168,85,247,0.1);
    border: 1px solid rgba(168,85,247,0.3);
    border-radius: 10px;
    padding: 6px 12px;
    font-size: 12px;
    color: #6b21a8;
  }
</style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="edu-toolbar-title">🔺 三角形分类演示</span>
      <span class="edu-toolbar-subtitle">下册·三角形</span>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-primary" onclick="resetTriangle()">重置</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" id="btn-labels" onclick="toggleAngleLabels()">显示角度</button>
    </div>
  </div>

  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="canvas" class="edu-canvas-full"></canvas>
        <div class="hint-label">拖拽顶点改变三角形形状</div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">分类结果</div>
          <div class="classify-result">
            <div class="classify-by-angle" id="by-angle">锐角三角形</div>
            <div class="classify-by-side" id="by-side">不等边三角形</div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">三个角</div>
          <div class="angle-info">
            <div class="angle-card"><div class="label">角A</div><div class="value" id="ang-a">60°</div></div>
            <div class="angle-card"><div class="label">角B</div><div class="value" id="ang-b">60°</div></div>
            <div class="angle-card"><div class="label">角C</div><div class="value" id="ang-c">60°</div></div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">三条边</div>
          <div class="side-info">
            <div class="side-card"><div class="label">边AB</div><div class="value" id="side-ab">—</div></div>
            <div class="side-card"><div class="label">边BC</div><div class="value" id="side-bc">—</div></div>
            <div class="side-card"><div class="label">边AC</div><div class="value" id="side-ac">—</div></div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">预设三角形</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
            <button class="preset-btn" onclick="loadPreset('equilateral')">等边</button>
            <button class="preset-btn" onclick="loadPreset('isosceles')">等腰</button>
            <button class="preset-btn" onclick="loadPreset('right')">直角</button>
            <button class="preset-btn" onclick="loadPreset('obtuse')">钝角</button>
            <button class="preset-btn" onclick="loadPreset('scalene')">不等边</button>
            <button class="preset-btn" onclick="loadPreset('iso-right')">等腰直角</button>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">分类知识</div>
          <div class="info-box">
            <strong>按角分：</strong><br/>
            三个角都是锐角 → 锐角三角形<br/>
            有一个直角 → 直角三角形<br/>
            有一个钝角 → 钝角三角形<br/><br/>
            <strong>按边分：</strong><br/>
            三条边相等 → 等边三角形<br/>
            两条边相等 → 等腰三角形<br/>
            三条边都不相等 → 不等边三角形
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../edu-lib/edu-tools.js"></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
let showAngleLabels = true;
let dragIdx = -1;

// 三角形三个顶点
let vertices = [
  { x: 0.5, y: 0.2 },
  { x: 0.25, y: 0.7 },
  { x: 0.75, y: 0.7 }
];

const COLORS = ['#3b82f6', '#ef4444', '#22c55e'];

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = canvas.clientWidth;
  H = canvas.clientHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function dist(p1, p2) {
  return Math.sqrt((p1.x - p2.x) ** 2 + (p1.y - p2.y) ** 2);
}

function angleAtVertex(v0, v1, v2) {
  const ax = v1.x - v0.x, ay = v1.y - v0.y;
  const bx = v2.x - v0.x, by = v2.y - v0.y;
  const cosVal = (ax * bx + ay * by) / (Math.sqrt(ax*ax + ay*ay) * Math.sqrt(bx*bx + by*by));
  return (Math.acos(Math.max(-1, Math.min(1, cosVal))) * 180) / Math.PI;
}

function classify() {
  const a = dist(vertices[1], vertices[2]);
  const b = dist(vertices[0], vertices[2]);
  const c = dist(vertices[0], vertices[1]);
  const sides = [a, b, c].sort((x, y) => x - y);

  const angA = angleAtVertex(vertices[0], vertices[1], vertices[2]);
  const angB = angleAtVertex(vertices[1], vertices[0], vertices[2]);
  const angC = angleAtVertex(vertices[2], vertices[0], vertices[1]);
  const angles = [angA, angB, angC];

  // 按角分类
  const maxAng = Math.max(...angles);
  const minAng = Math.min(...angles);
  let byAngle = '锐角三角形';
  if (Math.abs(maxAng - 90) < 1) byAngle = '直角三角形';
  else if (maxAng > 90) byAngle = '钝角三角形';

  // 按边分类
  const eq = (v1, v2) => Math.abs(v1 - v2) < 0.02 * Math.max(v1, v2);
  let bySide = '不等边三角形';
  if (eq(a, b) && eq(b, c)) bySide = '等边三角形';
  else if (eq(a, b) || eq(b, c) || eq(a, c)) bySide = '等腰三角形';

  return { byAngle, bySide, angles: [angA, angB, angC], sides: [a, b, c] };
}

function render() {
  resize();
  ctx.clearRect(0, 0, W, H);
  drawGrid(ctx, W, H, 40, '#f1f5f9');

  const pts = vertices.map(v => ({ x: v.x * W, y: v.y * H }));
  const info = classify();

  // 填充
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  ctx.lineTo(pts[1].x, pts[1].y);
  ctx.lineTo(pts[2].x, pts[2].y);
  ctx.closePath();
  ctx.fillStyle = 'rgba(168,85,247,0.1)';
  ctx.fill();

  // 边
  ctx.strokeStyle = '#7c3aed';
  ctx.lineWidth = 3;
  ctx.stroke();

  // 顶点圆点和标注
  const labels = ['A', 'B', 'C'];
  pts.forEach((p, i) => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 12, 0, Math.PI * 2);
    ctx.fillStyle = COLORS[i];
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // 字母标注
    const dir = { x: p.x - (pts[0].x + pts[1].x + pts[2].x) / 3, y: p.y - (pts[0].y + pts[1].y + pts[2].y) / 3 };
    const dLen = Math.sqrt(dir.x * dir.x + dir.y * dir.y) || 1;
    ctx.fillStyle = COLORS[i];
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(labels[i], p.x + (dir.x / dLen) * 24, p.y + (dir.y / dLen) * 24);
  });

  // 角度标注
  if (showAngleLabels) {
    const angles = info.angles;
    pts.forEach((p, i) => {
      const v1 = pts[(i + 1) % 3];
      const v2 = pts[(i + 2) % 3];
      const a1 = Math.atan2(v1.y - p.y, v1.x - p.x);
      const a2 = Math.atan2(v2.y - p.y, v2.x - p.x);

      // 弧线
      let startA = a1, endA = a2;
      if (endA - startA > Math.PI) endA -= 2 * Math.PI;
      if (startA - endA > Math.PI) startA -= 2 * Math.PI;

      ctx.beginPath();
      ctx.arc(p.x, p.y, 25, Math.min(startA, endA), Math.max(startA, endA));
      ctx.strokeStyle = COLORS[i];
      ctx.lineWidth = 2;
      ctx.stroke();

      // 角度数字
      const midA = (startA + endA) / 2;
      const lx = p.x + Math.cos(midA) * 42;
      const ly = p.y + Math.sin(midA) * 42;
      ctx.fillStyle = COLORS[i];
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(Math.round(angles[i]) + '°', lx, ly);
    });
  }

  // 直角标记
  const angles = info.angles;
  angles.forEach((ang, i) => {
    if (Math.abs(ang - 90) < 2) {
      const p = pts[i];
      const v1 = pts[(i + 1) % 3];
      const v2 = pts[(i + 2) % 3];
      const d1 = { x: (v1.x - p.x), y: (v1.y - p.y) };
      const d2 = { x: (v2.x - p.x), y: (v2.y - p.y) };
      const len1 = Math.sqrt(d1.x*d1.x + d1.y*d1.y);
      const len2 = Math.sqrt(d2.x*d2.x + d2.y*d2.y);
      const s = 15;
      const n1 = { x: p.x + (d1.x/len1)*s, y: p.y + (d1.y/len1)*s };
      const n2 = { x: p.x + (d2.x/len2)*s, y: p.y + (d2.y/len2)*s };
      const corner = { x: n1.x + (n2.x - p.x), y: n1.y + (n2.y - p.y) };
      ctx.beginPath();
      ctx.moveTo(n1.x, n1.y);
      ctx.lineTo(corner.x, corner.y);
      ctx.lineTo(n2.x, n2.y);
      ctx.strokeStyle = COLORS[i];
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  });

  // 更新面板
  document.getElementById('by-angle').textContent = info.byAngle;
  document.getElementById('by-side').textContent = info.bySide;
  document.getElementById('ang-a').textContent = Math.round(info.angles[0]) + '°';
  document.getElementById('ang-b').textContent = Math.round(info.angles[1]) + '°';
  document.getElementById('ang-c').textContent = Math.round(info.angles[2]) + '°';
  const maxSide = Math.max(...info.sides);
  document.getElementById('side-ab').textContent = (info.sides[2] / maxSide * 100).toFixed(0);
  document.getElementById('side-bc').textContent = (info.sides[0] / maxSide * 100).toFixed(0);
  document.getElementById('side-ac').textContent = (info.sides[1] / maxSide * 100).toFixed(0);
}

function toggleAngleLabels() {
  showAngleLabels = !showAngleLabels;
  const btn = document.getElementById('btn-labels');
  btn.textContent = showAngleLabels ? '隐藏角度' : '显示角度';
  btn.classList.toggle('edu-btn-active', showAngleLabels);
  render();
}

function resetTriangle() {
  vertices = [
    { x: 0.5, y: 0.2 },
    { x: 0.25, y: 0.7 },
    { x: 0.75, y: 0.7 }
  ];
  render();
}

function loadPreset(type) {
  switch (type) {
    case 'equilateral':
      vertices = [
        { x: 0.5, y: 0.18 },
        { x: 0.28, y: 0.72 },
        { x: 0.72, y: 0.72 }
      ];
      break;
    case 'isosceles':
      vertices = [
        { x: 0.5, y: 0.18 },
        { x: 0.28, y: 0.72 },
        { x: 0.72, y: 0.72 }
      ];
      vertices[2].x = 0.78;
      break;
    case 'right':
      vertices = [
        { x: 0.3, y: 0.2 },
        { x: 0.3, y: 0.7 },
        { x: 0.75, y: 0.7 }
      ];
      break;
    case 'obtuse':
      vertices = [
        { x: 0.2, y: 0.3 },
        { x: 0.8, y: 0.3 },
        { x: 0.75, y: 0.75 }
      ];
      break;
    case 'scalene':
      vertices = [
        { x: 0.35, y: 0.15 },
        { x: 0.2, y: 0.75 },
        { x: 0.82, y: 0.6 }
      ];
      break;
    case 'iso-right':
      vertices = [
        { x: 0.5, y: 0.18 },
        { x: 0.18, y: 0.78 },
        { x: 0.82, y: 0.78 }
      ];
      vertices[1].x = 0.3;
      vertices[1].y = 0.78;
      vertices[2].x = 0.3;
      vertices[2].y = 0.3;
      break;
  }
  render();
}

// 拖拽
canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / W;
  const my = (e.clientY - rect.top) / H;
  for (let i = 0; i < 3; i++) {
    const d = Math.sqrt((mx - vertices[i].x) ** 2 + (my - vertices[i].y) ** 2);
    if (d < 0.05) { dragIdx = i; return; }
  }
});

canvas.addEventListener('mousemove', e => {
  if (dragIdx < 0) { canvas.style.cursor = 'default'; return; }
  canvas.style.cursor = 'grabbing';
  const rect = canvas.getBoundingClientRect();
  vertices[dragIdx].x = Math.max(0.05, Math.min(0.95, (e.clientX - rect.left) / W));
  vertices[dragIdx].y = Math.max(0.05, Math.min(0.95, (e.clientY - rect.top) / H));
  render();
});

canvas.addEventListener('mouseup', () => { dragIdx = -1; });
canvas.addEventListener('mouseleave', () => { dragIdx = -1; });

// 触摸
canvas.addEventListener('touchstart', e => {
  const rect = canvas.getBoundingClientRect();
  const tx = (e.touches[0].clientX - rect.left) / W;
  const ty = (e.touches[0].clientY - rect.top) / H;
  for (let i = 0; i < 3; i++) {
    const d = Math.sqrt((tx - vertices[i].x) ** 2 + (ty - vertices[i].y) ** 2);
    if (d < 0.07) { dragIdx = i; return; }
  }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  if (dragIdx < 0) return;
  const rect = canvas.getBoundingClientRect();
  vertices[dragIdx].x = Math.max(0.05, Math.min(0.95, (e.touches[0].clientX - rect.left) / W));
  vertices[dragIdx].y = Math.max(0.05, Math.min(0.95, (e.touches[0].clientY - rect.top) / H));
  render();
}, { passive: true });

canvas.addEventListener('touchend', () => { dragIdx = -1; });

window.addEventListener('resize', render);
render();
</script>
</body>
</html>
