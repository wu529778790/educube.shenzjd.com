<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>长方体表面最短路径 — 教立方</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<script src="../edu-lib/three.min.js"></script>
<script src="../edu-lib/OrbitControls.js"></script>
<script src="../edu-lib/edu-3d.js"></script>
<script src="../edu-lib/edu-tools.js"></script>
<style>
  .main-layout { display:grid; grid-template-columns:1fr 300px; height:100%; }
  .canvas-area { position:relative; background:linear-gradient(135deg,#f0fdf4,#fdfaf4); overflow:hidden; }
  .canvas-area canvas { width:100%; height:100%; display:block; }
  .control-panel { background:#fff; border-left:1px solid #e2e8f0; padding:14px; display:flex; flex-direction:column; gap:10px; overflow:auto; }
  .ctrl-section { display:flex; flex-direction:column; gap:6px; }
  .ctrl-label { font-size:11px; font-weight:700; color:#64748b; letter-spacing:.05em; }
  .divider { height:1px; background:#e2e8f0; }

  .path-btn {
    padding:8px 10px; border-radius:8px; font-size:11px; font-weight:700;
    cursor:pointer; border:2px solid #e2e8f0; background:#fff; color:#64748b;
    transition:all .15s; font-family:var(--edu-font); text-align:center;
  }
  .path-btn:hover { border-color:#16a34a; }
  .path-btn.active { background:#dcfce7; color:#166534; border-color:#16a34a; }
  .path-btn .p-dist { font-size:10px; color:#64748b; margin-top:2px; }

  .unfold-btn {
    width:100%; padding:10px; border:none; border-radius:10px; font-size:14px; font-weight:700;
    cursor:pointer; font-family:var(--edu-font); transition:all .15s;
    background:#16a34a; color:#fff;
  }
  .unfold-btn:hover { background:#15803d; }

  .slider-row { display:flex; align-items:center; gap:8px; }
  .slider-row label { font-size:11px; font-weight:600; color:#334155; min-width:20px; }
  .slider-row input[type=range] { flex:1; accent-color:#16a34a; }
  .slider-row .val { font-size:12px; font-weight:700; color:#16a34a; min-width:30px; text-align:right; }

  .calc-box {
    background:#f0fdf4; border:1.5px solid #86efac; border-radius:10px;
    padding:10px 12px; font-size:12px; line-height:2; color:#334155;
  }
  .calc-box .formula { font-weight:700; color:#166534; }
  .calc-box .highlight { font-weight:800; color:#dc2626; font-size:14px; }

  .result-card {
    background:#fef3c7; border:2px solid #fbbf24; border-radius:12px;
    padding:12px; text-align:center;
  }
  .result-label { font-size:12px; color:#92400e; }
  .result-val { font-size:22px; font-weight:800; color:#b45309; margin:4px 0; }
  .result-note { font-size:11px; color:#78350f; line-height:1.6; }

  .info-box { background:#fff; border:1px solid #bbf7d0; border-radius:10px; padding:10px 12px; font-size:11px; line-height:1.8; color:#334155; }
  .info-box strong { color:#16a34a; }

  .orbit-hint {
    position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,.85); padding:6px 14px; border-radius:20px;
    font-size:11px; color:#64748b; pointer-events:none;
  }
</style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="edu-toolbar-title">🐛 长方体表面最短路径</span>
      <span class="edu-toolbar-subtitle">八年级下册 · 勾股定理</span>
    </div>
    <div class="edu-toolbar-actions">
      <button class="unfold-btn" id="btn-toggle" onclick="toggleUnfold()">📄 展开长方体</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="c3d"></canvas>
        <div class="orbit-hint">拖拽旋转 · 双指缩放</div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">长方体尺寸</div>
          <div class="slider-row">
            <label>a</label>
            <input type="range" id="sl-a" min="1" max="5" step="0.5" value="3" oninput="onParam()">
            <span class="val" id="val-a">3</span>
          </div>
          <div class="slider-row">
            <label>b</label>
            <input type="range" id="sl-b" min="1" max="5" step="0.5" value="2" oninput="onParam()">
            <span class="val" id="val-b">2</span>
          </div>
          <div class="slider-row">
            <label>c</label>
            <input type="range" id="sl-c" min="1" max="5" step="0.5" value="4" oninput="onParam()">
            <span class="val" id="val-c">4</span>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">选择路径（A→B 的不同走法）</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px" id="path-btns"></div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">路径计算</div>
          <div class="calc-box" id="calc-box">选择一条路径查看计算过程</div>
        </div>
        <div class="divider"></div>
        <div class="result-card">
          <div class="result-label">最短路径长度</div>
          <div class="result-val" id="min-dist">—</div>
          <div class="result-note" id="min-note">比较所有路径，取最短</div>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <strong>解题方法</strong><br/>
          ● 蚂蚁从A走到B，只能沿<strong>表面</strong>爬行<br/>
          ● 将长方体<strong>展开</strong>成平面<br/>
          ● 在展开图上用<strong>勾股定理</strong>求直线距离<br/>
          ● 比较所有展开方式的距离，取最短<br/>
          ● 共有 3 种不同的展开方式
        </div>
      </div>
    </div>
  </div>
</div>
<script>
var _scene, _camera, _renderer, _controls;
var _boxGroup, _pathGroup, _unfoldGroup;
var _a = 3, _b = 2, _c = 4;
var _currentPath = -1;
var _isUnfolded = false;
var _animId = null;

// Correct path definitions for surface shortest path on a box
// Box dimensions: a (x), b (z), c (y). A=(0,0,0), B=(a,c,b)
// 6 paths from 6 adjacent face pairs (one containing A, one containing B)
function getPaths(a, b, c) {
  return [
    {
      name: '路径1',
      desc: '前面+右面',
      d: Math.sqrt((a + b) * (a + b) + c * c),
      formula: 'd = √[(a+b)² + c²]',
      flatLabel: '(a+b) 与 c',
      dim1: a + b, dim2: c,
      color: 0xef4444,
      // 3D surface polyline: A -> fold point on shared edge -> B
      foldPoint: function() { return [a, c * a / (a + b), 0]; },
      // Unfolded path endpoints (relative to center)
      unfoldA: null, unfoldB: null
    },
    {
      name: '路径2',
      desc: '前面+上面',
      d: Math.sqrt((b + c) * (b + c) + a * a),
      formula: 'd = √[(b+c)² + a²]',
      flatLabel: '(b+c) 与 a',
      dim1: b + c, dim2: a,
      color: 0x3b82f6,
      foldPoint: function() { return [a * c / (c + b), c, 0]; },
      unfoldA: null, unfoldB: null
    },
    {
      name: '路径3',
      desc: '左面+后面',
      d: Math.sqrt((a + b) * (a + b) + c * c),
      formula: 'd = √[(a+b)² + c²]',
      flatLabel: '(a+b) 与 c',
      dim1: a + b, dim2: c,
      color: 0x8b5cf6,
      foldPoint: function() { return [0, c * b / (a + b), b]; },
      unfoldA: null, unfoldB: null
    },
    {
      name: '路径4',
      desc: '左面+上面',
      d: Math.sqrt((a + c) * (a + c) + b * b),
      formula: 'd = √[(a+c)² + b²]',
      flatLabel: '(a+c) 与 b',
      dim1: a + c, dim2: b,
      color: 0xf97316,
      foldPoint: function() { return [0, c, b * c / (a + c)]; },
      unfoldA: null, unfoldB: null
    },
    {
      name: '路径5',
      desc: '底面+右面',
      d: Math.sqrt((a + c) * (a + c) + b * b),
      formula: 'd = √[(a+c)² + b²]',
      flatLabel: '(a+c) 与 b',
      dim1: a + c, dim2: b,
      color: 0x06b6d4,
      foldPoint: function() { return [a, 0, b * a / (a + c)]; },
      unfoldA: null, unfoldB: null
    },
    {
      name: '路径6',
      desc: '底面+后面',
      d: Math.sqrt((b + c) * (b + c) + a * a),
      formula: 'd = √[(b+c)² + a²]',
      flatLabel: '(b+c) 与 a',
      dim1: b + c, dim2: a,
      color: 0xf43f5e,
      foldPoint: function() { return [a * b / (b + c), 0, b]; },
      unfoldA: null, unfoldB: null
    },
  ];
}

function init() {
  var canvas = document.getElementById('c3d');
  var r = Edu3D.createScene(canvas, { bg: 0xf0fdf4, camX: 7, camY: 5, camZ: 7 });
  _scene = r.scene; _camera = r.camera; _renderer = r.renderer; _controls = r.controls;
  Edu3D.addLights(_scene);
  Edu3D.addGrid(_scene, 10, 10);

  _boxGroup = new THREE.Group();
  _scene.add(_boxGroup);
  _pathGroup = new THREE.Group();
  _scene.add(_pathGroup);
  _unfoldGroup = new THREE.Group();
  _scene.add(_unfoldGroup);

  buildAll();
  Edu3D.startLoop(_scene, _camera, _renderer, _controls);
}

function clearGroup(g) { while (g.children.length) g.remove(g.children[0]); }

function buildAll() {
  clearGroup(_boxGroup);
  clearGroup(_pathGroup);
  clearGroup(_unfoldGroup);
  _isUnfolded = false;
  _currentPath = -1;
  document.getElementById('btn-toggle').textContent = '📄 展开长方体';
  _boxGroup.visible = true;
  _unfoldGroup.visible = false;

  var a = _a, b = _b, c = _c;

  // Build box
  var boxGeo = new THREE.BoxGeometry(a, c, b);
  var boxMat = new THREE.MeshLambertMaterial({ color: 0x86efac, transparent: true, opacity: 0.25 });
  var box = new THREE.Mesh(boxGeo, boxMat);
  box.position.set(a / 2, c / 2, b / 2);
  box.castShadow = true;
  box.add(new THREE.LineSegments(
    new THREE.EdgesGeometry(boxGeo),
    new THREE.LineBasicMaterial({ color: 0x166534 })
  ));
  _boxGroup.add(box);

  // Labels
  _boxGroup.add(makeLabel('A', -0.3, -0.3, -0.3, '#dc2626', 0.5));
  _boxGroup.add(makeLabel('B', a + 0.3, c + 0.3, b + 0.3, '#dc2626', 0.5));
  _boxGroup.add(makeLabel('a=' + a, a / 2, -0.4, b + 0.5, '#166534', 0.35));
  _boxGroup.add(makeLabel('b=' + b, a + 0.5, -0.4, b / 2, '#166534', 0.35));
  _boxGroup.add(makeLabel('c=' + c, -0.5, c / 2, b + 0.5, '#166534', 0.35));

  // Dots at A and B
  var dotGeo = new THREE.SphereGeometry(0.12, 12, 12);
  var dotMatA = new THREE.MeshBasicMaterial({ color: 0xdc2626 });
  var dotA = new THREE.Mesh(dotGeo, dotMatA);
  dotA.position.set(0, 0, 0);
  _boxGroup.add(dotA);
  var dotB = new THREE.Mesh(dotGeo.clone(), dotMatA.clone());
  dotB.position.set(a, c, b);
  _boxGroup.add(dotB);

  buildPathBtns();
  updateMinDist();
}

function makeLabel(text, x, y, z, color, scale) {
  var lbl = Edu3D.textSprite(text, { color: color, scale: scale });
  lbl.position.set(x, y, z);
  return lbl;
}

function buildPathBtns() {
  var paths = getPaths(_a, _b, _c);
  var container = document.getElementById('path-btns');
  container.innerHTML = '';
  paths.forEach(function(p, idx) {
    var btn = document.createElement('button');
    btn.className = 'path-btn' + (idx === _currentPath ? ' active' : '');
    btn.id = 'pb-' + idx;
    btn.innerHTML = p.name + '<div class="p-dist">' + p.desc + '<br/>d≈' + p.d.toFixed(2) + '</div>';
    btn.onclick = (function(i) { return function() { selectPath(i); }; })(idx);
    container.appendChild(btn);
  });
}

function selectPath(idx) {
  _currentPath = idx;
  clearGroup(_pathGroup);

  var paths = getPaths(_a, _b, _c);
  var p = paths[idx];
  var a = _a, b = _b, c = _c;

  // Highlight selected button
  paths.forEach(function(_, i) {
    var btn = document.getElementById('pb-' + i);
    if (btn) btn.classList.toggle('active', i === idx);
  });

  // Draw surface path as 2-segment polyline on the box surface
  var fp = p.foldPoint();
  var lineMat = new THREE.LineBasicMaterial({ color: p.color, linewidth: 3 });
  var pts = [
    new THREE.Vector3(0, 0, 0),       // A
    new THREE.Vector3(fp[0], fp[1], fp[2]), // fold point on shared edge
    new THREE.Vector3(a, c, b)          // B
  ];
  var lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
  var line = new THREE.Line(lineGeo, lineMat);
  _pathGroup.add(line);

  // Draw spheres at fold point for visibility
  var foldDot = new THREE.Mesh(
    new THREE.SphereGeometry(0.08, 12, 12),
    new THREE.MeshBasicMaterial({ color: p.color })
  );
  foldDot.position.set(fp[0], fp[1], fp[2]);
  _pathGroup.add(foldDot);

  // Update calculation
  var box = document.getElementById('calc-box');
  var d1sq = p.dim1 * p.dim1, d2sq = p.dim2 * p.dim2;
  box.innerHTML =
    '<span class="formula">' + p.formula + '</span><br/>' +
    '= √[' + p.dim1 + '² + ' + p.dim2 + '²]<br/>' +
    '= √[' + d1sq + ' + ' + d2sq + ']<br/>' +
    '= √' + (d1sq + d2sq) + '<br/>' +
    '<span class="highlight">≈ ' + p.d.toFixed(2) + '</span>';
}

function updateMinDist() {
  var paths = getPaths(_a, _b, _c);
  var minD = Infinity, minIdx = 0;
  paths.forEach(function(p, i) {
    if (p.d < minD) { minD = p.d; minIdx = i; }
  });

  document.getElementById('min-dist').textContent = '≈ ' + minD.toFixed(2);
  document.getElementById('min-note').innerHTML =
    '最短路径为 <strong>' + paths[minIdx].name + '</strong>（' + paths[minIdx].desc + '）<br/>' +
    paths[minIdx].formula;
}

function toggleUnfold() {
  _isUnfolded = !_isUnfolded;
  document.getElementById('btn-toggle').textContent = _isUnfolded ? '📦 折叠回长方体' : '📄 展开长方体';

  if (_isUnfolded) {
    _boxGroup.visible = false;
    _pathGroup.visible = false;
    buildUnfolded();
    _unfoldGroup.visible = true;
  } else {
    _unfoldGroup.visible = false;
    _boxGroup.visible = true;
    _pathGroup.visible = true;
  }
}

function buildUnfolded() {
  clearGroup(_unfoldGroup);
  var a = _a, b = _b, c = _c;
  var gap = 0.08;

  // Cross layout: [top] [left][front][right][back] [bottom]
  var faces = [
    { name: '前', w: a, h: c, x: 0, z: 0, color: 0x86efac },
    { name: '右', w: b, h: c, x: a + gap, z: 0, color: 0x6ee7b7 },
    { name: '后', w: a, h: c, x: a + b + gap * 2, z: 0, color: 0x86efac },
    { name: '左', w: b, h: c, x: -b - gap, z: 0, color: 0x6ee7b7 },
    { name: '上', w: a, h: b, x: 0, z: -(b + gap), color: 0xfbbf24 },
    { name: '下', w: a, h: b, x: 0, z: c + gap, color: 0xfde68a },
  ];

  var totalW = (b + gap) + a + (b + gap) + a;
  var totalH = (b + gap) + c + (b + gap);
  var offsetX = -totalW / 2;
  var offsetZ = -totalH / 2;

  faces.forEach(function(f) {
    var geo = new THREE.PlaneGeometry(f.w - 0.02, f.h - 0.02);
    var mat = new THREE.MeshLambertMaterial({ color: f.color, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });
    var mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.set(offsetX + f.x + f.w / 2, 0.01, offsetZ + f.z + f.h / 2);
    mesh.add(new THREE.LineSegments(
      new THREE.EdgesGeometry(geo),
      new THREE.LineBasicMaterial({ color: 0x166534, transparent: true, opacity: 0.4 })
    ));
    var lbl = Edu3D.textSprite(f.name, { color: '#166534', scale: 0.35 });
    lbl.position.y = 0.05;
    mesh.add(lbl);
    _unfoldGroup.add(mesh);
  });

  // A and B positions on unfolded layout
  // A = (0,0,0) = bottom-left-front = on front face bottom-left corner
  var aPos = new THREE.Vector3(offsetX + 0, 0.05, offsetZ + c);
  // B = (a,c,b) = on front face top-right corner (in this unfolding)
  var bPos = new THREE.Vector3(offsetX + a, 0.05, offsetZ + 0);

  addDot(aPos, 0xdc2626, 'A');
  addDot(bPos, 0x2563eb, 'B');

  // Draw the selected path as a straight line on the unfolded faces
  if (_currentPath >= 0) {
    var paths = getPaths(a, b, c);
    var p = paths[_currentPath];
    var linePts = getUnfoldedLinePoints(_currentPath, a, b, c, offsetX, offsetZ);
    if (linePts.length >= 2) {
      var lineGeo = new THREE.BufferGeometry().setFromPoints(linePts);
      var lineMat = new THREE.LineBasicMaterial({ color: p.color, linewidth: 3 });
      _unfoldGroup.add(new THREE.Line(lineGeo, lineMat));

      // Draw dashed guide lines showing the right triangle
      var guideMat = new THREE.LineDashedMaterial({ color: 0x94a3b8, dashSize: 0.15, gapSize: 0.1, linewidth: 1 });
      var hGuide = new THREE.BufferGeometry().setFromPoints([linePts[0], new THREE.Vector3(linePts[1].x, 0.05, linePts[0].z)]);
      var hLine = new THREE.Line(hGuide, guideMat);
      hLine.computeLineDistances();
      _unfoldGroup.add(hLine);
      var vGuide = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(linePts[1].x, 0.05, linePts[0].z), linePts[1]]);
      var vLine = new THREE.Line(vGuide, guideMat);
      vLine.computeLineDistances();
      _unfoldGroup.add(vLine);
    }
  }

  _unfoldGroup.position.y = 1;
}

function getUnfoldedLinePoints(pathIdx, a, b, c, ox, oz) {
  // For each path, compute the unfolded straight line from A to B
  // The unfolding is always centered around the "front" face in our cross layout
  var A, B;
  switch (pathIdx) {
    case 0: // front + right: A at front-bottom-left, B at right-top-right
      A = new THREE.Vector3(ox, 0.05, oz + c);
      B = new THREE.Vector3(ox + a + b, 0.05, oz);
      break;
    case 1: // front + top: A at front-bottom-left, B at top face
      A = new THREE.Vector3(ox, 0.05, oz + c);
      B = new THREE.Vector3(ox + a, 0.05, oz - b);
      break;
    case 2: // left + back: A at left-bottom, B at back-top
      A = new THREE.Vector3(ox, 0.05, oz + c);  // A on left face bottom-left
      B = new THREE.Vector3(ox + a + b + gap + a, 0.05, oz);  // B on back face
      break;
    case 3: // left + top: A on left face, B on top face
      A = new THREE.Vector3(ox, 0.05, oz + c);  // A on left face bottom
      B = new THREE.Vector3(ox + a, 0.05, oz - b);  // B on top face top-right
      break;
    case 4: // bottom + right: A on bottom face, B on right face
      A = new THREE.Vector3(ox, 0.05, oz + c + gap + b);  // A on bottom face
      B = new THREE.Vector3(ox + a + b, 0.05, oz + c);  // B on right face top
      break;
    case 5: // bottom + back: A on bottom face, B on back face
      A = new THREE.Vector3(ox, 0.05, oz + c + gap + b);  // A on bottom face
      B = new THREE.Vector3(ox + a, 0.05, oz);  // B on back face
      break;
    default:
      return [];
  }
  return [A, B];
}

function addDot(pos, color, label) {
  var dotGeo = new THREE.SphereGeometry(0.12, 12, 12);
  var dot = new THREE.Mesh(dotGeo, new THREE.MeshBasicMaterial({ color: color }));
  dot.position.copy(pos);
  _unfoldGroup.add(dot);

  var lbl = Edu3D.textSprite(label, { color: '#' + color.toString(16).padStart(6, '0'), scale: 0.4 });
  lbl.position.copy(pos);
  lbl.position.y = 0.3;
  _unfoldGroup.add(lbl);
}

function onParam() {
  _a = parseFloat(document.getElementById('sl-a').value);
  _b = parseFloat(document.getElementById('sl-b').value);
  _c = parseFloat(document.getElementById('sl-c').value);
  document.getElementById('val-a').textContent = _a;
  document.getElementById('val-b').textContent = _b;
  document.getElementById('val-c').textContent = _c;
  buildAll();
}

function resetAll() {
  _a = 3; _b = 2; _c = 4;
  document.getElementById('sl-a').value = _a;
  document.getElementById('sl-b').value = _b;
  document.getElementById('sl-c').value = _c;
  document.getElementById('val-a').textContent = _a;
  document.getElementById('val-b').textContent = _b;
  document.getElementById('val-c').textContent = _c;
  _isUnfolded = false;
  buildAll();
}

init();
</script>
</body>
</html>
