<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数与形规律 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 260px; height: 100%; }
    .canvas-area { padding: 24px; overflow-y: auto; background: linear-gradient(135deg, #eff6ff 0%, #fdfaf4 100%); display: flex; flex-direction: column; align-items: center; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 14px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #bfdbfe; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .preset-btn { padding: 8px 0; border-radius: 8px; font-size: 13px; font-weight: 600; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; }
    .preset-btn:hover { border-color: #3b82f6; color: #3b82f6; }
    .step-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: #fff; border-radius: 8px; border: 1px solid #e2e8f0; margin: 4px 0; }
    .step-n { font-size: 18px; font-weight: 800; color: #3b82f6; min-width: 24px; }
    .step-sum { font-size: 16px; font-weight: 700; color: #334155; }
    .step-eq { font-size: 16px; font-weight: 700; color: #22c55e; }
    .slider-row { display: flex; align-items: center; gap: 10px; }
    .slider-row input { flex: 1; }
    .slider-row .value-display { min-width: 24px; }
    canvas#dotCanvas { border-radius: 12px; background: #fff; border: 1px solid #e2e8f0; margin: 12px 0; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">🔢 数与形规律</div>
      <div class="edu-toolbar-subtitle">上册 · 数学广角</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-accent" onclick="animateStep()">逐步动画</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <div style="font-size:16px;font-weight:700;color:#334155;margin-bottom:4px">连续奇数和 = 正方形数</div>
        <div style="font-size:13px;color:#64748b;margin-bottom:12px">1 + 3 + 5 + ... + (2n-1) = n²</div>

        <div class="slider-row" style="width:300px;margin-bottom:12px">
          <span style="font-size:13px;font-weight:600">层数 n</span>
          <input type="range" id="nSlider" min="1" max="10" value="4" oninput="update()"/>
          <span class="value-display" id="nVal">4</span>
        </div>

        <canvas id="dotCanvas" width="420" height="420"></canvas>

        <!-- 公式验证 -->
        <div id="stepsList" style="width:420px;margin-top:8px"></div>
      </div>

      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">规律选择</div>
          <button class="preset-btn" onclick="setPattern('odd')" id="btnOdd" style="border-color:#3b82f6;color:#3b82f6">奇数和 = n²</button>
          <button class="preset-btn" onclick="setPattern('tri')">三角形数</button>
          <button class="preset-btn" onclick="setPattern('sq')">平方数列</button>
        </div>
        <div class="divider"></div>
        <div class="info-box" id="patternInfo">
          <b>奇数和规律</b><br/>
          ● 1 = 1²<br/>
          ● 1 + 3 = 2²<br/>
          ● 1 + 3 + 5 = 3²<br/>
          ● 1 + 3 + 5 + 7 = 4²<br/>
          ● 从1开始连续n个奇数的和=n²
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../edu-lib/edu-tools.js"></script>
<script>
let pattern = 'odd';
let N = 4;
let animLayers = 0;
let animId = null;

function setPattern(p) {
  pattern = p;
  document.getElementById('btnOdd').style.borderColor = p === 'odd' ? '#3b82f6' : '#e2e8f0';
  document.getElementById('btnOdd').style.color = p === 'odd' ? '#3b82f6' : '#334155';
  update();
}

function update() {
  N = parseInt(document.getElementById('nSlider').value);
  document.getElementById('nVal').textContent = N;
  drawDots();
  drawSteps();
  updateInfo();
}

function drawDots() {
  const canvas = document.getElementById('dotCanvas');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = 420 * dpr;
  canvas.height = 420 * dpr;
  canvas.style.width = '420px';
  canvas.style.height = '420px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const size = 420;
  const padding = 30;
  const dotSize = Math.max(4, Math.min(12, 120 / N));

  ctx.clearRect(0, 0, size, size);

  const layers = animLayers > 0 ? Math.min(animLayers, N) : N;

  if (pattern === 'odd') {
    // L形排列：每层用不同颜色
    const colors = ['#3b82f6','#ef4444','#22c55e','#f97316','#8b5cf6','#eab308','#06b6d4','#ec4899','#14b8a6','#6366f1'];
    for (let layer = 1; layer <= layers; layer++) {
      ctx.fillStyle = colors[(layer - 1) % colors.length];
      // 画L形：顶部一行 + 左侧一列
      const oddNum = 2 * layer - 1;
      // 上方 (layer-1) 个点
      for (let i = 0; i < layer; i++) {
        const x = padding + (layer - 1) * dotSize * 2 + dotSize;
        const y = padding + i * dotSize * 2 + dotSize;
        ctx.beginPath();
        ctx.arc(x, y, dotSize, 0, Math.PI * 2);
        ctx.fill();
      }
      // 右侧 (layer-1) 个点
      for (let i = 0; i < layer - 1; i++) {
        const x = padding + i * dotSize * 2 + dotSize;
        const y = padding + (layer - 1) * dotSize * 2 + dotSize;
        ctx.beginPath();
        ctx.arc(x, y, dotSize, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // 标注
    ctx.fillStyle = '#1a3a5c';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    let sum = 0;
    for (let i = 1; i <= layers; i++) {
      sum += 2 * i - 1;
      const x = padding + (i - 1) * dotSize * 2 + dotSize;
      ctx.fillText(2 * i - 1, x, size - 10);
    }
    ctx.fillText('= ' + sum, padding + layers * dotSize * 2 + 10, size - 10);

  } else if (pattern === 'tri') {
    // 三角形数
    const colors = ['#3b82f6','#ef4444','#22c55e','#f97316','#8b5cf6','#eab308'];
    let dotIdx = 0;
    for (let row = 0; row < layers; row++) {
      ctx.fillStyle = colors[row % colors.length];
      for (let col = 0; col <= row; col++) {
        const x = size / 2 - row * dotSize + col * dotSize * 2;
        const y = padding + row * dotSize * 2 + dotSize;
        ctx.beginPath();
        ctx.arc(x, y, dotSize, 0, Math.PI * 2);
        ctx.fill();
        dotIdx++;
      }
    }
    ctx.fillStyle = '#1a3a5c';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`三角形数：${layers * (layers + 1) / 2}`, size / 2, size - 10);

  } else if (pattern === 'sq') {
    // 平方数点阵
    const colors = ['#3b82f6','#ef4444','#22c55e','#f97316','#8b5cf6'];
    for (let layer = 1; layer <= layers; layer++) {
      ctx.fillStyle = colors[(layer - 1) % colors.length];
      for (let r = 0; r < layer; r++) {
        for (let c = 0; c < layer; c++) {
          const x = padding + c * dotSize * 2 + dotSize;
          const y = padding + r * dotSize * 2 + dotSize;
          ctx.beginPath();
          ctx.arc(x, y, dotSize, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
    ctx.fillStyle = '#1a3a5c';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`${layers}² = ${layers * layers}`, size / 2, size - 10);
  }
}

function drawSteps() {
  const el = document.getElementById('stepsList');
  el.innerHTML = '';
  const layers = animLayers > 0 ? Math.min(animLayers, N) : N;

  if (pattern === 'odd') {
    let sum = 0;
    for (let i = 1; i <= layers; i++) {
      sum += 2 * i - 1;
      const row = document.createElement('div');
      row.className = 'step-row';
      row.innerHTML = `<span class="step-n">${i}</span>
        <span class="step-sum">${Array.from({length:i},(_,j)=>2*j+1).join(' + ')}</span>
        <span class="step-eq">= ${i}² = ${sum}</span>`;
      el.appendChild(row);
    }
  } else if (pattern === 'tri') {
    let sum = 0;
    for (let i = 1; i <= layers; i++) {
      sum += i;
      const row = document.createElement('div');
      row.className = 'step-row';
      row.innerHTML = `<span class="step-n">${i}</span>
        <span class="step-sum">${Array.from({length:i},(_,j)=>j+1).join(' + ')}</span>
        <span class="step-eq">= ${sum}</span>`;
      el.appendChild(row);
    }
  } else {
    for (let i = 1; i <= layers; i++) {
      const row = document.createElement('div');
      row.className = 'step-row';
      row.innerHTML = `<span class="step-n">${i}</span>
        <span class="step-sum">${i} × ${i}</span>
        <span class="step-eq">= ${i * i}</span>`;
      el.appendChild(row);
    }
  }
}

function updateInfo() {
  const box = document.getElementById('patternInfo');
  if (pattern === 'odd') {
    box.innerHTML = '<b>奇数和规律</b><br/>● 1 = 1²<br/>● 1 + 3 = 2²<br/>● 1 + 3 + 5 = 3²<br/>● 从1开始连续n个奇数的和=n²';
  } else if (pattern === 'tri') {
    box.innerHTML = '<b>三角形数</b><br/>● 1 = 1<br/>● 1 + 2 = 3<br/>● 1 + 2 + 3 = 6<br/>● 第n个三角形数 = n(n+1)/2';
  } else {
    box.innerHTML = '<b>平方数列</b><br/>● 1² = 1<br/>● 2² = 4<br/>● 3² = 9<br/>● n² = n × n';
  }
}

function animateStep() {
  if (animId) cancelAnimationFrame(animId);
  animLayers = 0;
  function step() {
    animLayers++;
    drawDots();
    drawSteps();
    if (animLayers < N) {
      animId = setTimeout(step, 500);
    } else {
      animLayers = 0;
    }
  }
  step();
}

function resetAll() {
  N = 4;
  document.getElementById('nSlider').value = 4;
  animLayers = 0;
  pattern = 'odd';
  update();
}

update();
</script>
</body>
</html>
