<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>小数的意义</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
  .main-layout {
    display: grid;
    grid-template-columns: 1fr 280px;
    height: 100%;
  }
  .canvas-area { position: relative; background: #fff; overflow: hidden; }
  .control-panel {
    background: #fdfaf4; border-left: 1px solid #e2e8f0;
    padding: 16px; display: flex; flex-direction: column; gap: 14px; overflow: auto;
  }
  .ctrl-section { display: flex; flex-direction: column; gap: 8px; }
  .ctrl-label {
    font-size: 11px; font-weight: 700; color: #64748b;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .divider { height: 1px; background: #e2e8f0; }
  .info-box {
    background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
    padding: 10px 12px; font-size: 12px; color: #64748b; line-height: 1.8;
  }
  .info-box strong { color: #0ea5e9; }
  .tab-btn {
    padding: 7px 10px; border-radius: 8px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1.5px solid #e2e8f0; background: #fff; color: #64748b;
    text-align: center; transition: all 0.15s; font-family: var(--edu-font);
  }
  .tab-btn:hover:not(.active) { border-color: #0ea5e9; }
  .tab-btn.active { background: #0ea5e9; color: #fff; border-color: #0ea5e9; }
  .decimal-big {
    text-align: center; font-size: 36px; font-weight: 800; color: #0ea5e9; line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .decimal-frac {
    text-align: center; font-size: 16px; color: #64748b; margin-top: 4px;
  }
  .hint-text { font-size: 11px; color: #94a3b8; }
</style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="edu-toolbar-title">🔢 小数的意义</span>
      <span class="edu-toolbar-subtitle">下册·小数的意义和性质</span>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-outline" onclick="resetDecimal()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="main-canvas" class="edu-canvas-full"></canvas>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">精度选择</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
            <button class="tab-btn active" id="tb-tenths" onclick="setPrecision('tenths')">十分位 (0.1)</button>
            <button class="tab-btn" id="tb-hundredths" onclick="setPrecision('hundredths')">百分位 (0.01)</button>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">小数值</div>
          <div class="decimal-big"><span id="dec-val">0.3</span></div>
          <div class="decimal-frac" id="frac-val">= 3/10</div>
          <input type="range" id="dec-slider" min="0" max="10" step="1" value="3"
            style="width:100%;" oninput="setDecimal(parseInt(this.value))"/>
          <div style="display:flex;justify-content:space-between;font-size:11px;color:#94a3b8;">
            <span>0</span><span>0.5</span><span>1</span>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">表示方式</div>
          <div class="info-box">
            <div>小数：<strong id="info-decimal">0.3</strong></div>
            <div>分数：<strong id="info-fraction">3/10</strong></div>
            <div>含义：<strong id="info-meaning">把 1 平均分成 10 份，取 3 份</strong></div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">知识卡片</div>
          <div class="info-box" style="font-size:11px;line-height:1.7;">
            <strong>小数的意义</strong>：分母是 10、100、1000……的分数可以用小数表示。<br/>
            <strong>十分位</strong>：把 1 平均分成 10 份，每份是 0.1（十分之一）。<br/>
            <strong>百分位</strong>：把 0.1 再平均分成 10 份，每份是 0.01（百分之一）。
          </div>
        </div>
        <div class="hint-text">拖动滑块改变小数值，方格图实时更新。</div>
      </div>
    </div>
  </div>
</div>
<script src="../edu-lib/edu-tools.js"></script>
<script>
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
let W, H;
let precision = 'tenths'; // 'tenths' or 'hundredths'
let value = 3; // tenths: 0-10, hundredths: 0-100

function setPrecision(p) {
  precision = p;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(p === 'tenths' ? 'tb-tenths' : 'tb-hundredths').classList.add('active');
  const slider = document.getElementById('dec-slider');
  if (p === 'tenths') {
    slider.min = 0; slider.max = 10; slider.step = 1;
    value = Math.min(value, 10);
    slider.value = value;
  } else {
    slider.min = 0; slider.max = 100; slider.step = 1;
    value = Math.min(value * 10, 100);
    slider.value = value;
  }
  updateInfo();
  render();
}

function setDecimal(v) {
  value = v;
  updateInfo();
  render();
}

function resetDecimal() {
  precision = 'tenths';
  value = 3;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tb-tenths').classList.add('active');
  const slider = document.getElementById('dec-slider');
  slider.min = 0; slider.max = 10; slider.step = 1; slider.value = 3;
  updateInfo();
  render();
}

function updateInfo() {
  let decimal, fraction, meaning;
  if (precision === 'tenths') {
    decimal = (value / 10).toFixed(1);
    fraction = value + '/10';
    meaning = `把 1 平均分成 10 份，取 ${value} 份`;
  } else {
    decimal = (value / 100).toFixed(2);
    fraction = value + '/100';
    meaning = `把 1 平均分成 100 份，取 ${value} 份`;
  }
  document.getElementById('dec-val').textContent = decimal;
  document.getElementById('frac-val').textContent = '= ' + fraction;
  document.getElementById('info-decimal').textContent = decimal;
  document.getElementById('info-fraction').textContent = fraction;
  document.getElementById('info-meaning').textContent = meaning;
}

function render() {
  const dpr = window.devicePixelRatio || 1;
  W = canvas.clientWidth; H = canvas.clientHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  drawGrid(ctx, W, H, 40, '#e2e8f020');

  if (precision === 'tenths') {
    drawTenths();
  } else {
    drawHundredths();
  }
}

function drawTenths() {
  // draw 10 large squares in a row
  const margin = 40;
  const gap = 6;
  const availW = W - margin * 2;
  const availH = H - 100;
  const sqSize = Math.min((availW - gap * 9) / 10, availH * 0.7, 80);
  const totalW = sqSize * 10 + gap * 9;
  const startX = (W - totalW) / 2;
  const startY = H * 0.3;

  // Title
  ctx.font = 'bold 15px ' + getComputedStyle(document.body).fontFamily;
  ctx.fillStyle = '#1e293b';
  ctx.textAlign = 'center';
  ctx.fillText('把 "1" 平均分成 10 份', W / 2, startY - 30);

  for (let i = 0; i < 10; i++) {
    const x = startX + i * (sqSize + gap);
    const filled = i < value;

    // filled square
    if (filled) {
      ctx.fillStyle = '#0ea5e930';
      ctx.fillRect(x, startY, sqSize, sqSize);
      // border
      ctx.strokeStyle = '#0ea5e9';
      ctx.lineWidth = 2.5;
      ctx.strokeRect(x, startY, sqSize, sqSize);
    } else {
      ctx.fillStyle = '#f1f5f9';
      ctx.fillRect(x, startY, sqSize, sqSize);
      ctx.strokeStyle = '#cbd5e1';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x, startY, sqSize, sqSize);
    }

    // number label
    ctx.font = 'bold ' + Math.max(11, sqSize * 0.2) + 'px ' + getComputedStyle(document.body).fontFamily;
    ctx.fillStyle = filled ? '#0ea5e9' : '#94a3b8';
    ctx.textAlign = 'center';
    ctx.fillText((i + 1) + '', x + sqSize / 2, startY + sqSize + 18);

    // value label inside
    if (sqSize > 40) {
      ctx.font = Math.max(10, sqSize * 0.18) + 'px ' + getComputedStyle(document.body).fontFamily;
      ctx.fillStyle = filled ? '#0ea5e9' : '#94a3b8';
      ctx.fillText('0.' + (i + 1), x + sqSize / 2, startY + sqSize / 2 + 4);
    }
  }

  // whole number bracket
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 2;
  const bY = startY - 12;
  ctx.beginPath();
  ctx.moveTo(startX, bY);
  ctx.lineTo(startX, bY - 6);
  ctx.lineTo(startX + totalW, bY - 6);
  ctx.lineTo(startX + totalW, bY);
  ctx.stroke();
  ctx.font = 'bold 13px ' + getComputedStyle(document.body).fontFamily;
  ctx.fillStyle = '#1e293b';
  ctx.textAlign = 'center';
  ctx.fillText('= 1（整体）', startX + totalW / 2, bY - 12);

  // result
  ctx.font = 'bold 20px ' + getComputedStyle(document.body).fontFamily;
  ctx.fillStyle = '#0ea5e9';
  ctx.textAlign = 'center';
  const dec = (value / 10).toFixed(1);
  ctx.fillText(`${value} 份 = ${dec} = ${value}/10`, W / 2, startY + sqSize + 50);
}

function drawHundredths() {
  // draw 10x10 grid
  const margin = 40;
  const availW = W - margin * 2;
  const availH = H - 120;
  const sqSize = Math.min((availW - 90) / 10, (availH - 80) / 10, 45);
  const gridSize = sqSize * 10;
  const startX = (W - gridSize) / 2;
  const startY = (H - gridSize) / 2 - 20;

  // Title
  ctx.font = 'bold 15px ' + getComputedStyle(document.body).fontFamily;
  ctx.fillStyle = '#1e293b';
  ctx.textAlign = 'center';
  ctx.fillText('把 "1" 平均分成 100 份（每小格 = 0.01）', W / 2, startY - 30);

  for (let row = 0; row < 10; row++) {
    for (let col = 0; col < 10; col++) {
      const idx = row * 10 + col;
      const x = startX + col * sqSize;
      const y = startY + row * sqSize;
      const filled = idx < value;

      if (filled) {
        ctx.fillStyle = '#0ea5e935';
        ctx.fillRect(x, y, sqSize, sqSize);
        ctx.strokeStyle = '#0ea5e960';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(x, y, sqSize, sqSize);
      } else {
        ctx.fillStyle = '#f8fafc';
        ctx.fillRect(x, y, sqSize, sqSize);
        ctx.strokeStyle = '#e2e8f0';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(x, y, sqSize, sqSize);
      }
    }
  }

  // outer border
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 2;
  ctx.strokeRect(startX, startY, gridSize, gridSize);

  // row/column labels (tenths)
  ctx.font = Math.max(9, sqSize * 0.25) + 'px ' + getComputedStyle(document.body).fontFamily;
  ctx.fillStyle = '#64748b';
  ctx.textAlign = 'right';
  for (let row = 0; row < 10; row++) {
    ctx.fillText((row * 10) + '', startX - 6, startY + row * sqSize + sqSize / 2 + 3);
  }
  ctx.textAlign = 'center';
  for (let col = 0; col < 10; col++) {
    ctx.fillText((col + 1) + '', startX + col * sqSize + sqSize / 2, startY + gridSize + 14);
  }

  // highlight tenth boundaries
  ctx.strokeStyle = '#0ea5e980';
  ctx.lineWidth = 1.5;
  for (let i = 1; i < 10; i++) {
    ctx.beginPath();
    ctx.moveTo(startX + i * sqSize, startY);
    ctx.lineTo(startX + i * sqSize, startY + gridSize);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(startX, startY + i * sqSize);
    ctx.lineTo(startX + gridSize, startY + i * sqSize);
    ctx.stroke();
  }

  // result
  const dec = (value / 100).toFixed(2);
  ctx.font = 'bold 20px ' + getComputedStyle(document.body).fontFamily;
  ctx.fillStyle = '#0ea5e9';
  ctx.textAlign = 'center';
  ctx.fillText(`${value} 格 = ${dec} = ${value}/100`, W / 2, startY + gridSize + 50);
}

window.addEventListener('resize', render);
updateInfo();
setTimeout(render, 50);
</script>
</body>
</html>
