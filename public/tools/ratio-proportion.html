<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>比和比例 — 教立方</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
  * { box-sizing:border-box; }
  body { font-family:var(--edu-font); margin:0; }
  .tool { width:100vw; height:100vh; display:flex; flex-direction:column; background:var(--edu-bg); }
  .toolbar { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:#fff; border-bottom:1px solid var(--edu-border); }
  .toolbar h1 { font-size:15px; color:var(--edu-primary); margin:0; }
  .toolbar span { font-size:11px; color:var(--edu-text-muted); background:#f1f5f9; padding:2px 8px; border-radius:12px; }
  .main { flex:1; display:grid; grid-template-columns:1fr 290px; overflow:hidden; }
  .canvas-wrap { position:relative; overflow:hidden; background:linear-gradient(135deg,#f3e8ff,#faf5ff); }
  .canvas-wrap canvas { width:100%; height:100%; display:block; }
  .panel { background:#fff; border-left:1px solid var(--edu-border); padding:12px; display:flex; flex-direction:column; gap:8px; overflow:auto; }
  .section { display:flex; flex-direction:column; gap:4px; }
  .label { font-size:10px; font-weight:700; color:#64748b; letter-spacing:.05em; }
  .divider { height:1px; background:var(--edu-border); }
  .btn { padding:6px 12px; border:none; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer; font-family:var(--edu-font); transition:all .15s; }
  .btn.active { background:var(--edu-primary); color:#fff; }
  .btn-default { background:#f1f5f9; color:#334155; }
  .btn-default:hover { background:#e2e8f0; }
  .row { display:flex; gap:4px; flex-wrap:wrap; }
  .num-input { width:44px; padding:4px 6px; border:2px solid #d1d5db; border-radius:6px; font-size:14px; font-weight:700; text-align:center; font-family:var(--edu-font); }
  .num-input:focus { border-color:#8b5cf6; outline:none; }

  .ratio-display { text-align:center; padding:10px; background:#faf5ff; border:2px solid #d8b4fe; border-radius:12px; }
  .ratio-display .val { font-size:26px; font-weight:800; color:#6d28d9; }
  .ratio-display .eq { font-size:12px; color:#7c3aed; margin-top:4px; }

  .quiz-card { background:#faf5ff; border:2px solid #c084fc; border-radius:12px; padding:10px; text-align:center; }
  .quiz-q { font-size:13px; font-weight:700; color:#6d28d9; }
  .quiz-opts { display:grid; grid-template-columns:1fr 1fr; gap:4px; margin-top:6px; }
  .quiz-opt { padding:6px; border:2px solid #e2e8f0; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; background:#fff; font-family:var(--edu-font); }
  .quiz-opt:hover { border-color:#8b5cf6; }
  .quiz-opt.correct { background:#dcfce7; border-color:#22c55e; }
  .quiz-opt.wrong { background:#fef2f2; border-color:#ef4444; }
  .quiz-result { font-size:11px; font-weight:700; margin-top:4px; min-height:16px; }

  .info { font-size:11px; line-height:1.8; color:#334155; background:#fff; border:1px solid #d8b4fe; border-radius:8px; padding:8px 10px; }
  .info b { color:#6d28d9; }
</style>
</head>
<body>
<div class="tool">
  <div class="toolbar">
    <h1>⚖️ 比和比例</h1>
    <span>六年级上册 · 第四单元</span>
  </div>
  <div class="main">
    <div class="canvas-wrap"><canvas id="cv"></canvas></div>
    <div class="panel">
      <div class="ratio-display">
        <div class="val" id="ratio-val">3 : 2</div>
        <div class="eq" id="ratio-eq">比值为 1.5</div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">输入比</div>
        <div class="row" style="align-items:center">
          <span style="font-size:13px;font-weight:700">A =</span>
          <input class="num-input" id="inp-a" value="3" onchange="onInput()"/>
          <span style="font-size:16px;font-weight:800;color:#6d28d9">:</span>
          <span style="font-size:13px;font-weight:700">B =</span>
          <input class="num-input" id="inp-b" value="2" onchange="onInput()"/>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">缩放比（乘/除同一个数）</div>
        <div class="row" style="align-items:center">
          <button class="btn btn-default" onclick="scaleRatio(2)">×2</button>
          <button class="btn btn-default" onclick="scaleRatio(3)">×3</button>
          <button class="btn btn-default" onclick="scaleRatio(0.5)">÷2</button>
          <button class="btn btn-default" onclick="scaleRatio(1)">最简比</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">比例（两个比相等）</div>
        <div class="row" style="align-items:center">
          <input class="num-input" id="inp-c" value="6" onchange="onInput()"/>
          <span style="font-size:13px;font-weight:700">:</span>
          <input class="num-input" id="inp-d" value="4" onchange="onInput()"/>
          <button class="btn btn-default" onclick="checkProp()">验证</button>
        </div>
        <div id="prop-result" style="font-size:11px;font-weight:700;text-align:center;min-height:16px"></div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">比例尺示例</div>
        <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:6px;font-size:11px;line-height:1.6" id="scale-info"></div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">比和比例测验</div>
        <div class="quiz-card" id="quiz-card"></div>
      </div>
      <div class="divider"></div>
      <div class="info">
        <b>比和比例小知识</b><br/>
        ● <strong>比</strong>：两个数相除，如 a:b<br/>
        ● <strong>比值</strong>：比的前项÷后项<br/>
        ● <strong>最简比</strong>：前后项互质<br/>
        ● <strong>比例</strong>：两个比相等，如 a:b = c:d<br/>
        ● 比例的基本性质：内项积 = 外项积
      </div>
    </div>
  </div>
</div>
<script>
var cv, ctx;
var _a = 3, _b = 2, _c = 6, _d = 4;

function init() {
  cv = document.getElementById('cv');
  ctx = cv.getContext('2d');
  window.addEventListener('resize', resize);
  resize();
  onInput();
  nextQuiz();
}

function resize() {
  var r = cv.parentElement.getBoundingClientRect();
  cv.width = r.width * devicePixelRatio;
  cv.height = r.height * devicePixelRatio;
  cv.style.width = r.width + 'px';
  cv.style.height = r.height + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  draw();
}

function gcd(a, b) { a = Math.abs(Math.round(a)); b = Math.abs(Math.round(b)); return b === 0 ? a : gcd(b, a % b); }

function onInput() {
  _a = parseInt(document.getElementById('inp-a').value) || 1;
  _b = parseInt(document.getElementById('inp-b').value) || 1;
  _c = parseInt(document.getElementById('inp-c').value) || 1;
  _d = parseInt(document.getElementById('inp-d').value) || 1;

  var ratio = (_a / _b);
  document.getElementById('ratio-val').textContent = _a + ' : ' + _b;
  document.getElementById('ratio-eq').innerHTML = '比值为 <strong>' + (Number.isInteger(ratio) ? ratio : ratio.toFixed(2)) + '</strong> · 最简比 <strong>' + simplify(_a, _b) + '</strong>';

  updateScale();
  draw();
}

function simplify(a, b) {
  var g = gcd(a, b);
  return (a / g) + ' : ' + (b / g);
}

function scaleRatio(factor) {
  if (factor === 1) {
    var g = gcd(_a, _b);
    _a /= g; _b /= g;
  } else {
    _a *= factor; _b *= factor;
  }
  _a = Math.round(_a); _b = Math.round(_b);
  document.getElementById('inp-a').value = _a;
  document.getElementById('inp-b').value = _b;
  onInput();
}

function checkProp() {
  var cross1 = _a * _d, cross2 = _b * _c;
  var el = document.getElementById('prop-result');
  if (cross1 === cross2) {
    el.textContent = '✓ 成比例！' + _a + '×' + _d + ' = ' + _b + '×' + _c + ' = ' + cross1;
    el.style.color = '#16a34a';
  } else {
    el.textContent = '✗ 不成比例。' + _a + '×' + _d + '=' + cross1 + ' ≠ ' + _b + '×' + _c + '=' + cross2;
    el.style.color = '#ef4444';
  }
  draw();
}

function updateScale() {
  var scaleRatio = '1:' + Math.round(_b * 100 / _a);
  var realLen = (_a / _b * 100).toFixed(0);
  document.getElementById('scale-info').innerHTML =
    '比例尺 <strong>' + scaleRatio + '</strong><br>' +
    '图上 ' + _b + 'cm → 实际 ' + realLen + 'cm<br>' +
    '图上 ' + _a + 'cm → 实际 ' + (parseFloat(realLen) * _a / _b).toFixed(0) + 'cm';
}

function draw() {
  var w = cv.width / devicePixelRatio, h = cv.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  // === Bar comparison ===
  var barY = 30;
  var maxBar = w * 0.7;
  var maxVal = Math.max(_a, _b, 1);
  var unitW = maxBar / maxVal;
  var bx = (w - maxBar) / 2;

  ctx.fillStyle = '#6d28d9';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('比的可视化：' + _a + ' : ' + _b, w / 2, barY);
  barY += 24;

  // A bar
  ctx.fillStyle = '#8b5cf6';
  ctx.fillRect(bx, barY, _a * unitW, 40);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  if (_a * unitW > 30) ctx.fillText('A = ' + _a, bx + _a * unitW / 2, barY + 25);
  ctx.fillStyle = '#6d28d9';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('A', bx - 8, barY + 25);

  barY += 50;

  // B bar
  ctx.fillStyle = '#a78bfa';
  ctx.fillRect(bx, barY, _b * unitW, 40);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  if (_b * unitW > 30) ctx.fillText('B = ' + _b, bx + _b * unitW / 2, barY + 25);
  ctx.fillStyle = '#7c3aed';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('B', bx - 8, barY + 25);

  barY += 60;

  // === Grid comparison ===
  ctx.fillStyle = '#334155';
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('方块对比（每格代表1份）', w / 2, barY);
  barY += 20;

  var cellSize = Math.min((w - 80) / Math.max(_a, _b, 1), 30);
  cellSize = Math.max(cellSize, 15);
  var ga = (_a * cellSize);
  var gb = (_b * cellSize);
  var gx = (w - Math.max(ga, gb)) / 2;

  for (var i = 0; i < _a; i++) {
    ctx.fillStyle = '#8b5cf6';
    ctx.fillRect(gx + i * cellSize + 1, barY, cellSize - 2, cellSize - 2);
  }
  barY += cellSize + 4;
  for (var i = 0; i < _b; i++) {
    ctx.fillStyle = '#a78bfa';
    ctx.fillRect(gx + i * cellSize + 1, barY, cellSize - 2, cellSize - 2);
  }

  barY += cellSize + 20;

  // === Proportion cross check ===
  ctx.fillStyle = '#334155';
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('比例验证：' + _a + ':' + _b + ' = ' + _c + ':' + _d + ' ？', w / 2, barY);
  barY += 22;

  var cross1 = _a * _d, cross2 = _b * _c;
  var isEqual = cross1 === cross2;

  // Cross multiplication diagram
  var dx = w / 2, dy = barY + 40;
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';

  // Left side
  ctx.fillStyle = '#8b5cf6';
  ctx.fillText(_a, dx - 50, dy - 15);
  ctx.fillStyle = '#a78bfa';
  ctx.fillText(_b, dx - 50, dy + 15);

  // Colon
  ctx.fillStyle = '#334155';
  ctx.font = 'bold 14px monospace';
  ctx.fillText(':', dx - 50, dy);

  // Equals
  ctx.font = 'bold 16px monospace';
  ctx.fillText('=', dx, dy);

  // Right side
  ctx.font = 'bold 18px monospace';
  ctx.fillStyle = '#8b5cf6';
  ctx.fillText(_c, dx + 50, dy - 15);
  ctx.fillStyle = '#a78bfa';
  ctx.fillText(_d, dx + 50, dy + 15);
  ctx.fillStyle = '#334155';
  ctx.font = 'bold 14px monospace';
  ctx.fillText(':', dx + 50, dy);

  // Cross lines
  ctx.strokeStyle = '#dc2626';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 3]);
  ctx.beginPath();
  ctx.moveTo(dx - 38, dy - 15);
  ctx.lineTo(dx + 38, dy + 15);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(dx - 38, dy + 15);
  ctx.lineTo(dx + 38, dy - 15);
  ctx.stroke();
  ctx.setLineDash([]);

  // Result
  ctx.fillStyle = isEqual ? '#16a34a' : '#ef4444';
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(_a + '×' + _d + ' = ' + cross1 + '    ' + _b + '×' + _c + ' = ' + cross2 + '    ' + (isEqual ? '✓ 相等' : '✗ 不等'), dx, dy + 45);
}

// ===== Quiz =====
var _quizQs = [
  { q: '化简比 12:8 的结果是什么？', opts: ['6:4', '3:2', '12:8', '4:3'], ans: 1 },
  { q: '比值是什么意思？', opts: ['前项+后项', '前项×后项', '前项÷后项', '后项÷前项'], ans: 2 },
  { q: '3:4 = 9:? 中 ? 应该填什么？', opts: ['6', '8', '12', '16'], ans: 2 },
  { q: '下面哪组能组成比例？', opts: ['2:3 和 4:5', '1:2 和 3:6', '2:5 和 4:8', '3:4 和 6:9'], ans: 1 },
  { q: '比例的基本性质是什么？', opts: ['内项=外项', '内项积=外项积', '前项=后项', '比值=1'], ans: 1 },
  { q: '把 0.5:0.3 化成最简整数比是？', opts: ['5:3', '1:0.6', '50:30', '0.5:0.3'], ans: 0 },
];
var _qi = 0, _score = 0;

function nextQuiz() {
  if (_qi >= _quizQs.length) {
    document.getElementById('quiz-card').innerHTML =
      '<div class="quiz-q">测验完成！答对 ' + _score + ' / ' + _quizQs.length + ' 题</div>';
    return;
  }
  var q = _quizQs[_qi];
  var html = '<div class="quiz-q">第' + (_qi + 1) + '题：' + q.q + '</div><div class="quiz-opts">';
  q.opts.forEach(function(o, i) {
    html += '<button class="quiz-opt" onclick="answer(' + i + ')">' + o + '</button>';
  });
  html += '</div><div class="quiz-result" id="qr"></div>';
  document.getElementById('quiz-card').innerHTML = html;
}

function answer(idx) {
  var q = _quizQs[_qi];
  var opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(function(b, i) {
    b.onclick = null; b.style.cursor = 'default';
    if (i === q.ans) b.classList.add('correct');
    if (i === idx && i !== q.ans) b.classList.add('wrong');
  });
  var r = document.getElementById('qr');
  if (idx === q.ans) { r.textContent = '✓ 正确！'; r.style.color = '#16a34a'; _score++; }
  else { r.textContent = '✗ 正确答案：' + q.opts[q.ans]; r.style.color = '#ef4444'; }
  _qi++;
  setTimeout(nextQuiz, 1200);
}

init();
</script>
<script src="../edu-lib/edu-tools.js"></script>
</body>
</html>
