<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>找次品 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display:grid; grid-template-columns:1fr 270px; height:100%; }
    .canvas-area { padding:16px 24px; overflow-y:auto; background:linear-gradient(135deg,#fff7ed,#fdfaf4); display:flex; flex-direction:column; align-items:center; gap:10px; }
    .control-panel { background:#fdfaf4; border-left:1px solid #e2e8f0; padding:14px; display:flex; flex-direction:column; gap:12px; overflow:auto; }
    .ctrl-section { display:flex; flex-direction:column; gap:6px; }
    .ctrl-label { font-size:11px; font-weight:700; color:#64748b; letter-spacing:.05em; }
    .divider { height:1px; background:#e2e8f0; }
    .info-box { background:#fff; border:1px solid #fed7aa; border-radius:10px; padding:10px 12px; font-size:12px; line-height:1.8; color:#334155; }
    .info-box b { color:#f97316; }
    .preset-btn { padding:8px 0; border-radius:8px; font-size:13px; font-weight:600; background:#fff; border:1.5px solid #e2e8f0; cursor:pointer; transition:all .15s; font-family:var(--edu-font); }
    .preset-btn:hover { border-color:#f97316; color:#f97316; }
    .preset-btn.active { background:#f97316; color:#fff; border-color:#f97316; }
    /* Ball pool */
    .pool-area { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; padding:10px 16px; min-height:60px; align-items:center; }
    .ball { width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:800; color:#fff; background:linear-gradient(135deg,#94a3b8,#64748b); cursor:grab; transition:transform .15s,box-shadow .15s,opacity .3s; box-shadow:0 3px 8px rgba(0,0,0,.15); user-select:none; }
    .ball:hover { transform:scale(1.12); box-shadow:0 4px 14px rgba(0,0,0,.2); }
    .ball:active { cursor:grabbing; }
    .ball.found { background:linear-gradient(135deg,#ef4444,#dc2626)!important; animation:glow .8s ease infinite alternate; }
    @keyframes glow { from{box-shadow:0 0 8px rgba(239,68,68,.4)} to{box-shadow:0 0 20px rgba(239,68,68,.7);transform:scale(1.08)} }
    /* Balance scale */
    .scale-wrapper { position:relative; width:420px; height:220px; margin:4px 0; }
    .scale-base { position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:80px; height:18px; background:#78716c; border-radius:4px 4px 8px 8px; }
    .scale-pillar { position:absolute; bottom:18px; left:50%; transform:translateX(-50%); width:8px; height:60px; background:linear-gradient(#a8a29e,#78716c); border-radius:2px; }
    .scale-beam { position:absolute; bottom:78px; left:50%; transform:translateX(-50%); width:360px; height:6px; background:#a8a29e; border-radius:3px; transform-origin:center; transition:transform .9s cubic-bezier(.34,1.56,.64,1); }
    .scale-beam.tilt-left { transform:translateX(-50%) rotate(-14deg); }
    .scale-beam.tilt-right { transform:translateX(-50%) rotate(14deg); }
    .pan-container { position:absolute; top:6px; width:150px; min-height:80px; display:flex; flex-direction:column; align-items:center; }
    .pan-container.left { left:0; }
    .pan-container.right { right:0; }
    .pan-chain { width:2px; height:22px; background:#a8a29e; }
    .pan-plate { width:140px; min-height:56px; border:2.5px dashed #94a3b8; border-radius:0 0 16px 16px; background:#f8fafc; display:flex; flex-wrap:wrap; gap:4px; justify-content:center; align-items:center; padding:6px 8px; transition:all .4s; }
    .pan-plate.drag-over { border-color:#f97316; background:#fff7ed; border-style:solid; }
    .pan-plate .ball { width:36px; height:36px; font-size:13px; }
    .pan-label { font-size:12px; font-weight:700; color:#94a3b8; margin-top:4px; }
    .weigh-indicator { position:absolute; top:-24px; left:50%; transform:translateX(-50%); font-size:14px; font-weight:800; opacity:0; transition:opacity .5s .6s; white-space:nowrap; }
    .weigh-indicator.show { opacity:1; }
    .weigh-indicator.left-heavy { color:#3b82f6; }
    .weigh-indicator.right-heavy { color:#f97316; }
    .weigh-indicator.balanced { color:#22c55e; }
    /* Step log */
    .step-log { width:100%; max-width:440px; display:flex; flex-direction:column; gap:6px; max-height:160px; overflow-y:auto; padding:4px 0; }
    .step-entry { background:#fff; border-radius:10px; padding:8px 12px; font-size:13px; line-height:1.6; border-left:4px solid #f97316; animation:fade-in .3s ease; }
    .step-entry .hl { color:#f97316; font-weight:700; }
    .step-entry .ok { color:#22c55e; font-weight:700; }
    @keyframes fade-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .result-banner { background:linear-gradient(135deg,#22c55e,#16a34a); color:#fff; border-radius:12px; padding:14px 24px; text-align:center; font-size:18px; font-weight:800; animation:pop-in .4s cubic-bezier(.34,1.56,.64,1); box-shadow:0 6px 20px rgba(34,197,94,.3); }
    @keyframes pop-in { from{transform:scale(.5);opacity:0} to{transform:scale(1);opacity:1} }
    .drag-ghost { position:fixed; pointer-events:none; z-index:999; width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:800; color:#fff; background:linear-gradient(135deg,#f97316,#ea580c); box-shadow:0 8px 24px rgba(249,115,22,.4); opacity:.9; }
    .drag-ghost.pan-ball { width:36px; height:36px; font-size:13px; }
    .ball.solve-pick { outline:3px solid #f97316; outline-offset:2px; animation:solve-bounce .5s ease; }
    @keyframes solve-bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.25)} }
    .counter-badge { display:inline-flex; align-items:center; gap:4px; background:#f1f5f9; border-radius:20px; padding:3px 10px; font-size:12px; font-weight:700; color:#64748b; }
    .counter-badge strong { color:#f97316; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">找次品</div>
      <div class="edu-toolbar-subtitle">下册 · 数学广角</div>
    </div>
    <div class="edu-toolbar-actions">
      <div class="counter-badge">称量 <strong id="weighCount">0</strong> 次</div>
      <div class="counter-badge">最少 <strong id="minWeigh">-</strong> 次</div>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-primary" id="btnWeigh" onclick="doWeigh()">称量</button>
      <button class="edu-btn edu-btn-accent" id="btnSolve" onclick="autoSolve()">自动求解</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetGame()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <!-- Ball pool -->
        <div style="font-size:13px;font-weight:700;color:#64748b">物品池（拖拽到天平左/右盘）</div>
        <div class="pool-area" id="pool"></div>
        <!-- Balance scale -->
        <div class="scale-wrapper" id="scaleWrapper">
          <div class="scale-base"></div>
          <div class="scale-pillar"></div>
          <div class="scale-beam" id="beam">
            <div class="weigh-indicator" id="indicator"></div>
            <div class="pan-container left">
              <div class="pan-chain"></div>
              <div class="pan-plate" id="panL" data-side="left"></div>
              <div class="pan-label">左盘</div>
            </div>
            <div class="pan-container right">
              <div class="pan-chain"></div>
              <div class="pan-plate" id="panR" data-side="right"></div>
              <div class="pan-label">右盘</div>
            </div>
          </div>
        </div>
        <!-- Step log -->
        <div class="step-log" id="stepLog"></div>
        <div id="resultArea"></div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">难度选择</div>
          <button class="preset-btn" data-n="3" onclick="setDifficulty(3)">3 个物品（入门）</button>
          <button class="preset-btn" data-n="5" onclick="setDifficulty(5)">5 个物品（简单）</button>
          <button class="preset-btn" data-n="8" onclick="setDifficulty(8)">8 个物品（中等）</button>
          <button class="preset-btn active" data-n="9" onclick="setDifficulty(9)">9 个物品（挑战）</button>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">次品位置</div>
          <div style="font-size:13px;color:#64748b" id="fakeInfo">系统随机隐藏，等待发现</div>
        </div>
        <div class="ctrl-section">
          <div class="ctrl-label">操作提示</div>
          <div style="font-size:12px;color:#64748b;line-height:1.6" id="hintText">
            拖拽物品到天平的左盘或右盘，然后点击"称量"查看结果。
          </div>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <b>找次品策略</b><br/>
          ● 把物品分成 3 组<br/>
          ● 尽量让 3 组一样多<br/>
          ● 称两组，确定次品在哪组<br/>
          ● 重复以上步骤<br/>
          ● n 个物品最少 ⌈log₃n⌉ 次
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ====== State ====== */
let totalBalls = 9;
let fakeIdx = -1;           // hidden, randomly chosen
let weighCount = 0;
let found = false;
let solving = false;
let leftPan = [];           // ball indices on left pan
let rightPan = [];          // ball indices on right pan

/* ====== Drag & Drop State ====== */
let dragId = null;
let dragFrom = null;        // 'pool','left','right'
let ghostEl = null;

/* ====== Difficulty & Reset ====== */
function setDifficulty(n) {
  document.querySelectorAll('.preset-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.n) === n);
  });
  totalBalls = n;
  resetGame();
}

function resetGame() {
  solving = false;
  found = false;
  weighCount = 0;
  fakeIdx = Math.floor(Math.random() * totalBalls);
  leftPan = [];
  rightPan = [];
  document.getElementById('weighCount').textContent = '0';
  document.getElementById('minWeigh').textContent = Math.ceil(Math.log(totalBalls) / Math.log(3));
  document.getElementById('fakeInfo').textContent = '系统随机隐藏，等待发现';
  document.getElementById('hintText').textContent = '拖拽物品到天平的左盘或右盘，然后点击"称量"查看结果。';
  document.getElementById('stepLog').innerHTML = '';
  document.getElementById('resultArea').innerHTML = '';
  document.getElementById('indicator').className = 'weigh-indicator';
  document.getElementById('indicator').textContent = '';
  document.getElementById('beam').className = 'scale-beam';
  document.getElementById('btnWeigh').disabled = false;
  document.getElementById('btnSolve').disabled = false;
  renderPool();
  renderPans();
}

/* ====== Render Ball Pool ====== */
function renderPool() {
  const pool = document.getElementById('pool');
  pool.innerHTML = '';
  for (let i = 0; i < totalBalls; i++) {
    if (leftPan.includes(i) || rightPan.includes(i)) continue;
    pool.appendChild(makeBall(i, false));
  }
}

/* ====== Render Pans ====== */
function renderPans() {
  const panL = document.getElementById('panL');
  const panR = document.getElementById('panR');
  panL.innerHTML = '';
  panR.innerHTML = '';
  if (leftPan.length === 0) {
    panL.innerHTML = '<span style="color:#cbd5e1;font-size:12px">拖入物品</span>';
  } else {
    leftPan.forEach(i => panL.appendChild(makeBall(i, true)));
  }
  if (rightPan.length === 0) {
    panR.innerHTML = '<span style="color:#cbd5e1;font-size:12px">拖入物品</span>';
  } else {
    rightPan.forEach(i => panR.appendChild(makeBall(i, true)));
  }
}

/* ====== Create a Ball Element ====== */
function makeBall(idx, isPan) {
  const el = document.createElement('div');
  el.className = 'ball';
  if (found && idx === fakeIdx) el.classList.add('found');
  el.textContent = idx + 1;
  el.dataset.idx = idx;
  el.dataset.source = isPan ? (leftPan.includes(idx) ? 'left' : 'right') : 'pool';

  /* Drag start */
  el.addEventListener('pointerdown', e => startDrag(e, idx, el.dataset.source));
  return el;
}

/* ====== Drag System ====== */
function startDrag(e, idx, from) {
  if (found || solving) return;
  e.preventDefault();
  dragId = idx;
  dragFrom = from;

  /* Remove from source */
  if (from === 'left') leftPan = leftPan.filter(x => x !== idx);
  else if (from === 'right') rightPan = rightPan.filter(x => x !== idx);

  /* Create ghost */
  const isPan = (from !== 'pool');
  ghostEl = document.createElement('div');
  ghostEl.className = 'drag-ghost' + (isPan ? ' pan-ball' : '');
  ghostEl.textContent = idx + 1;
  document.body.appendChild(ghostEl);
  moveGhost(e);

  renderPool();
  renderPans();

  document.addEventListener('pointermove', onDragMove);
  document.addEventListener('pointerup', onDragEnd);
}

function moveGhost(e) {
  if (!ghostEl) return;
  ghostEl.style.left = (e.clientX - 24) + 'px';
  ghostEl.style.top = (e.clientY - 24) + 'px';
}

function onDragMove(e) {
  moveGhost(e);
  /* Highlight drop zones */
  const panL = document.getElementById('panL');
  const panR = document.getElementById('panR');
  panL.classList.toggle('drag-over', isOver(e, panL));
  panR.classList.toggle('drag-over', isOver(e, panR));
}

function onDragEnd(e) {
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup', onDragEnd);
  const panL = document.getElementById('panL');
  const panR = document.getElementById('panR');
  panL.classList.remove('drag-over');
  panR.classList.remove('drag-over');

  if (ghostEl) { ghostEl.remove(); ghostEl = null; }

  /* Determine drop target */
  if (isOver(e, panL)) {
    leftPan.push(dragId);
  } else if (isOver(e, panR)) {
    rightPan.push(dragId);
  }
  /* else return to pool (already removed from source) */

  dragId = null;
  dragFrom = null;
  renderPool();
  renderPans();
}

function isOver(e, el) {
  const r = el.getBoundingClientRect();
  return e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
}

/* ====== Weigh ====== */
function doWeigh() {
  if (found || solving) return;
  if (leftPan.length === 0 && rightPan.length === 0) {
    showToast('请先将物品拖到天平上');
    return;
  }
  if (leftPan.length !== rightPan.length) {
    showToast('左右盘物品数量不同，仍可称量');
  }
  weighCount++;
  document.getElementById('weighCount').textContent = weighCount;

  const leftHasFake = leftPan.includes(fakeIdx);
  const rightHasFake = rightPan.includes(fakeIdx);
  const beam = document.getElementById('beam');
  const indicator = document.getElementById('indicator');

  /* Clear previous */
  beam.className = 'scale-beam';
  indicator.className = 'weigh-indicator';
  indicator.textContent = '';

  /* Animate after a frame */
  requestAnimationFrame(() => {
    if (leftHasFake) {
      beam.classList.add('tilt-left');
      indicator.textContent = '左盘重！次品在左盘';
      indicator.className = 'weigh-indicator show left-heavy';
      addStep(`第${weighCount}次：左盘 {${label(leftPan)}} vs 右盘 {${label(rightPan)}} → <span class="hl">左盘重</span>，次品在左盘`);
    } else if (rightHasFake) {
      beam.classList.add('tilt-right');
      indicator.textContent = '右盘重！次品在右盘';
      indicator.className = 'weigh-indicator show right-heavy';
      addStep(`第${weighCount}次：左盘 {${label(leftPan)}} vs 右盘 {${label(rightPan)}} → <span class="hl">右盘重</span>，次品在右盘`);
    } else {
      indicator.textContent = '平衡！次品不在盘中';
      indicator.className = 'weigh-indicator show balanced';
      addStep(`第${weighCount}次：左盘 {${label(leftPan)}} vs 右盘 {${label(rightPan)}} → <span class="ok">平衡</span>，次品在未称物品中`);
    }
  });

  /* Return balls to pool after short delay */
  setTimeout(() => {
    leftPan = [];
    rightPan = [];
    renderPool();
    renderPans();
  }, 1200);
}

function label(arr) {
  return arr.map(i => i + 1).join(',');
}

/* ====== Toast ====== */
function showToast(msg) {
  const old = document.querySelector('.toast-msg');
  if (old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast-msg';
  t.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:100;animation:fade-in .3s ease';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

/* ====== Add Step to Log ====== */
function addStep(html) {
  const log = document.getElementById('stepLog');
  const entry = document.createElement('div');
  entry.className = 'step-entry';
  entry.innerHTML = html;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
}

/* ====== Auto Solver ====== */
async function autoSolve() {
  if (solving || found) return;
  solving = true;
  document.getElementById('btnWeigh').disabled = true;
  document.getElementById('btnSolve').disabled = true;
  resetGameState();

  let candidates = Array.from({ length: totalBalls }, (_, i) => i);

  while (candidates.length > 1) {
    const groups = split3(candidates);
    const gA = groups[0], gB = groups[1], gC = groups[2];

    /* Show balls going onto pans */
    leftPan = [...gA];
    rightPan = [...gB];
    renderPool();
    renderPans();

    /* Highlight picked balls */
    [...gA, ...gB].forEach(idx => {
      const b = document.querySelector(`.ball[data-idx="${idx}"]`);
      if (b) b.classList.add('solve-pick');
    });

    await sleep(700);

    /* Perform weighing */
    weighCount++;
    document.getElementById('weighCount').textContent = weighCount;

    const aHas = gA.includes(fakeIdx);
    const bHas = gB.includes(fakeIdx);

    const beam = document.getElementById('beam');
    const indicator = document.getElementById('indicator');
    beam.className = 'scale-beam';
    indicator.className = 'weigh-indicator';
    indicator.textContent = '';

    await sleep(50);

    if (aHas) {
      beam.classList.add('tilt-left');
      indicator.textContent = '左盘重！';
      indicator.className = 'weigh-indicator show left-heavy';
      addStep(`第${weighCount}次：{${label(gA)}} vs {${label(gB)}} → <span class="hl">左盘重</span>，次品在 {${label(gA)}}`);
      candidates = gA;
    } else if (bHas) {
      beam.classList.add('tilt-right');
      indicator.textContent = '右盘重！';
      indicator.className = 'weigh-indicator show right-heavy';
      addStep(`第${weighCount}次：{${label(gA)}} vs {${label(gB)}} → <span class="hl">右盘重</span>，次品在 {${label(gB)}}`);
      candidates = gB;
    } else {
      indicator.textContent = '平衡！';
      indicator.className = 'weigh-indicator show balanced';
      addStep(`第${weighCount}次：{${label(gA)}} vs {${label(gB)}} → <span class="ok">平衡</span>，次品在 {${label(gC)}}`);
      candidates = gC;
    }

    await sleep(1100);

    /* Clear pans */
    document.querySelectorAll('.ball.solve-pick').forEach(b => b.classList.remove('solve-pick'));
    leftPan = [];
    rightPan = [];
    renderPool();
    renderPans();
    beam.className = 'scale-beam';
    indicator.className = 'weigh-indicator';
    indicator.textContent = '';

    await sleep(400);
  }

  /* Found! */
  found = true;
  const fakeBall = candidates[0];
  fakeIdx = fakeBall;
  renderPool();

  const minW = Math.ceil(Math.log(totalBalls) / Math.log(3));
  const efficiency = weighCount <= minW ? '最优解！' : `（最少 ${minW} 次）`;

  document.getElementById('resultArea').innerHTML =
    `<div class="result-banner">找到次品！第 ${fakeBall + 1} 号 共称了 ${weighCount} 次 ${efficiency}</div>`;
  document.getElementById('fakeInfo').textContent = `次品是第 ${fakeBall + 1} 号`;

  solving = false;
}

/* Reset only game state, keep difficulty */
function resetGameState() {
  found = false;
  weighCount = 0;
  leftPan = [];
  rightPan = [];
  document.getElementById('weighCount').textContent = '0';
  document.getElementById('stepLog').innerHTML = '';
  document.getElementById('resultArea').innerHTML = '';
  const beam = document.getElementById('beam');
  beam.className = 'scale-beam';
  const indicator = document.getElementById('indicator');
  indicator.className = 'weigh-indicator';
  indicator.textContent = '';
  document.getElementById('btnWeigh').disabled = false;
  document.getElementById('btnSolve').disabled = false;
  fakeIdx = Math.floor(Math.random() * totalBalls);
}

/* Split array into 3 roughly equal groups */
function split3(arr) {
  const n = arr.length;
  const s = Math.floor(n / 3);
  const r = n % 3;
  const a = arr.slice(0, s + (r > 0 ? 1 : 0));
  const b = arr.slice(a.length, a.length + s + (r > 1 ? 1 : 0));
  const c = arr.slice(a.length + b.length);
  return [a, b, c];
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ====== Init ====== */
resetGame();
</script>
</body>
</html>
