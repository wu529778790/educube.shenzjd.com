<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分数除法 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 260px; height: 100%; }
    .canvas-area { padding: 24px; overflow-y: auto; background: linear-gradient(135deg, #fce7f3 0%, #fdfaf4 100%); display: flex; flex-direction: column; align-items: center; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 14px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #fbcfe8; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .preset-btn { padding: 8px 0; border-radius: 8px; font-size: 14px; font-weight: 700; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; }
    .preset-btn:hover { border-color: #ec4899; color: #ec4899; }
    .fraction-input { display: flex; align-items: center; gap: 6px; font-size: 20px; font-weight: 700; }
    .frac-box { display: flex; flex-direction: column; align-items: center; min-width: 50px; }
    .frac-box input { width: 50px; text-align: center; font-size: 18px; font-weight: 700; border: 1.5px solid #e2e8f0; border-radius: 6px; padding: 4px; font-family: 'Courier New', monospace; }
    .frac-box .frac-line { width: 50px; height: 2px; background: #334155; margin: 2px 0; }
    .op-symbol { font-size: 24px; font-weight: 800; color: #ec4899; }
    .equals { font-size: 24px; font-weight: 800; color: #22c55e; }
    .result-display { text-align: center; margin-top: 16px; }
    .result-frac { font-size: 32px; font-weight: 800; color: #1e293b; display: flex; align-items: center; justify-content: center; gap: 4px; }
    .step-box { background: #fff; border: 2px solid #ec4899; border-radius: 12px; padding: 14px 20px; font-size: 14px; line-height: 2; margin-top: 16px; max-width: 500px; width: 100%; }
    .highlight-pink { color: #ec4899; font-weight: 700; }
    .highlight-green { color: #22c55e; font-weight: 700; }
    /* 颠倒动画 */
    .flip-demo { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
    .flip-frac { font-size: 22px; font-weight: 700; transition: all .3s; padding: 8px 12px; background: #fff; border-radius: 8px; border: 2px solid #e2e8f0; }
    .flip-frac.flipped { border-color: #ec4899; background: #fdf2f8; transform: scaleX(-1); }
    .flip-arrow { font-size: 20px; color: #ec4899; font-weight: 700; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">➗ 分数除法</div>
      <div class="edu-toolbar-subtitle">上册 · 第三单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-primary" onclick="calculate()">计算</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <!-- 输入 -->
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
          <div class="fraction-input">
            <div class="frac-box">
              <input type="number" id="n1" value="2" min="0" max="99" onchange="calculate()"/>
              <div class="frac-line"></div>
              <input type="number" id="d1" value="3" min="1" max="99" onchange="calculate()"/>
            </div>
          </div>
          <div class="op-symbol">÷</div>
          <div class="fraction-input">
            <div class="frac-box">
              <input type="number" id="n2" value="3" min="0" max="99" onchange="calculate()"/>
              <div class="frac-line"></div>
              <input type="number" id="d2" value="4" min="1" max="99" onchange="calculate()"/>
            </div>
          </div>
          <div class="equals">=</div>
          <div class="result-display" style="margin-top:0">
            <div class="result-frac" id="resultFrac"></div>
          </div>
        </div>

        <!-- 颠倒演示 -->
        <div style="font-size:14px;font-weight:700;color:#334155;margin-bottom:8px">颠倒相乘演示</div>
        <div class="flip-demo" id="flipDemo">
          <div class="flip-frac" id="frac1Show">⅔</div>
          <span style="font-size:20px;font-weight:700">÷</span>
          <div class="flip-frac" id="frac2Show">¾</div>
          <span style="font-size:20px;font-weight:700">=</span>
          <div class="flip-frac" id="frac1Show2">⅔</div>
          <span style="font-size:20px;font-weight:700">×</span>
          <div class="flip-frac flipped" id="frac2Flipped"><span style="transform:scaleX(-1);display:inline-block">⅘</span></div>
        </div>

        <!-- 步骤 -->
        <div class="step-box" id="stepsBox">点击"计算"查看步骤</div>
      </div>

      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">预设例子</div>
          <button class="preset-btn" onclick="loadExample(2,3,3,4)">⅔ ÷ ¾</button>
          <button class="preset-btn" onclick="loadExample(1,2,2,5)">½ ÷ ⅖</button>
          <button class="preset-btn" onclick="loadExample(4,5,2,3)">⅘ ÷ ⅔</button>
          <button class="preset-btn" onclick="loadExample(5,6,3,1)">⅚ ÷ 3（分数÷整数）</button>
          <button class="preset-btn" onclick="loadExample(4,1,2,3)">4 ÷ ⅔（整数÷分数）</button>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <b>分数除法规则</b><br/>
          ● 甲数÷乙数 = 甲数×乙数的倒数<br/>
          ● 倒数：分子分母互换位置<br/>
          ● 整数可以看成分母为1的分数<br/>
          ● 除以一个数 = 乘以它的倒数<br/>
          ● 0 没有倒数，不能做除数
        </div>
      </div>
    </div>
  </div>
</div>
<script>
function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while (b) { [a, b] = [b, a % b]; } return a; }
function simplify(n, d) {
  if (n === 0) return [0, 1];
  if (d < 0) { n = -n; d = -d; }
  const g = gcd(n, d);
  return [n / g, d / g];
}
function fracStr(n, d) { return d === 1 ? `${n}` : `${n}/${d}`; }

function loadExample(a, b, c, d_) {
  document.getElementById('n1').value = a;
  document.getElementById('d1').value = b;
  document.getElementById('n2').value = c;
  document.getElementById('d2').value = d_;
  calculate();
}

function calculate() {
  let n1 = parseInt(document.getElementById('n1').value) || 0;
  let d1 = parseInt(document.getElementById('d1').value) || 1;
  let n2 = parseInt(document.getElementById('n2').value) || 0;
  let d2 = parseInt(document.getElementById('d2').value) || 1;

  // 颠倒相乘
  const rn = n1 * d2;
  const rd = d1 * n2;
  const [sn, sd] = rd === 0 ? [0, 1] : simplify(rn, rd);

  // 结果显示
  const resEl = document.getElementById('resultFrac');
  if (rd === 0) {
    resEl.innerHTML = '<span style="font-size:24px;color:#ef4444">除数不能为0</span>';
  } else if (sn === 0) {
    resEl.innerHTML = '<span style="font-size:28px">0</span>';
  } else if (sd === 1) {
    resEl.innerHTML = `<span style="font-size:28px">${sn}</span>`;
  } else {
    const whole = Math.floor(Math.abs(sn) / sd);
    const rem = Math.abs(sn) % sd;
    if (whole > 0 && rem > 0) {
      const sign = sn < 0 ? '-' : '';
      resEl.innerHTML = `${sign}${whole}<div class="frac-box"><span>${rem}</span><div class="frac-line" style="width:50px"></div><span>${sd}</span></div>`;
    } else if (whole > 0) {
      resEl.innerHTML = `<span style="font-size:28px">${sn}</span>`;
    } else {
      resEl.innerHTML = `<div class="frac-box"><span>${sn}</span><div class="frac-line" style="width:50px"></div><span>${sd}</span></div>`;
    }
  }

  // 颠倒演示
  document.getElementById('frac1Show').textContent = fracStr(n1, d1);
  document.getElementById('frac2Show').textContent = fracStr(n2, d2);
  document.getElementById('frac1Show2').textContent = fracStr(n1, d1);
  document.getElementById('frac2Flipped').innerHTML =
    `<span style="transform:scaleX(-1);display:inline-block">${fracStr(d2, n2)}</span>`;

  // 步骤
  const stepsBox = document.getElementById('stepsBox');
  if (rd === 0) {
    stepsBox.innerHTML = '<span style="color:#ef4444">错误：0 没有倒数，不能做除数！</span>';
    return;
  }
  const isIntDiv = d2 === 1;
  const isFracDiv = d1 === 1 && n1 > 0;
  let steps = '';
  if (isIntDiv) {
    steps += `<b>分数÷整数</b><br/>`;
    steps += `① ${fracStr(n1,d1)} ÷ ${n2}<br/>`;
    steps += `② 将整数变为分数：${n2} = ${n2}/1<br/>`;
    steps += `③ 取除数倒数：${n2}/1 → <span class="highlight-pink">1/${n2}</span><br/>`;
    steps += `④ 变乘法：${fracStr(n1,d1)} × 1/${n2}<br/>`;
  } else if (isFracDiv) {
    steps += `<b>整数÷分数</b><br/>`;
    steps += `① ${n1} ÷ ${fracStr(n2,d2)}<br/>`;
    steps += `② 将整数变为分数：${n1} = ${n1}/1<br/>`;
    steps += `③ 取除数倒数：<span class="highlight-pink">${fracStr(d2,n2)}</span><br/>`;
    steps += `④ 变乘法：${n1}/1 × ${fracStr(d2,n2)}<br/>`;
  } else {
    steps += `<b>分数÷分数</b><br/>`;
    steps += `① ${fracStr(n1,d1)} ÷ ${fracStr(n2,d2)}<br/>`;
    steps += `② 取除数倒数：<span class="highlight-pink">${fracStr(d2,n2)}</span><br/>`;
    steps += `③ 变乘法：${fracStr(n1,d1)} × ${fracStr(d2,n2)}<br/>`;
  }
  steps += `⑤ 计算：${n1}×${d2} = <b>${rn}</b>，${d1}×${n2} = <b>${rd}</b><br/>`;
  steps += `⑥ 结果：${fracStr(rn,rd)}`;
  if (rn !== sn || rd !== sd) {
    const g = gcd(Math.abs(rn), Math.abs(rd));
    steps += `<br/>⑦ 化简（÷${g}）：<span class="highlight-green">${fracStr(sn,sd)}</span>`;
  } else {
    steps += `<br/><span class="highlight-green">已是最简分数</span>`;
  }
  stepsBox.innerHTML = steps;
}

function resetAll() {
  document.getElementById('n1').value = 1;
  document.getElementById('d1').value = 2;
  document.getElementById('n2').value = 1;
  document.getElementById('d2').value = 3;
  calculate();
}

calculate();
</script>
</body>
</html>
