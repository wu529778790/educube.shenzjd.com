<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>圆柱的表面积与体积 — 教立方</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<script src="../edu-lib/three.min.js"></script>
<script src="../edu-lib/OrbitControls.js"></script>
<script src="../edu-lib/edu-3d.js"></script>
<style>
  .main-layout { display:grid; grid-template-columns:1fr 280px; height:100%; }
  .canvas-area { position:relative; background:linear-gradient(135deg,#faf5ff,#fdfaf4); overflow:hidden; }
  .canvas-area canvas { width:100%; height:100%; display:block; }
  .control-panel { background:#fdfaf4; border-left:1px solid #e2e8f0; padding:14px; display:flex; flex-direction:column; gap:10px; overflow:auto; }
  .ctrl-section { display:flex; flex-direction:column; gap:6px; }
  .ctrl-label { font-size:11px; font-weight:700; color:#64748b; letter-spacing:.05em; }
  .divider { height:1px; background:#e2e8f0; }
  .slider-row { display:flex; align-items:center; gap:8px; }
  .slider-row label { font-size:12px; font-weight:600; color:#64748b; min-width:20px; }
  .slider-row input[type=range] { flex:1; }
  .slider-row .val { font-size:14px; font-weight:700; color:#8b5cf6; min-width:36px; text-align:right; }
  .info-box { background:#fff; border:1px solid #e9d5ff; border-radius:10px; padding:10px 12px; font-size:12px; line-height:1.8; color:#334155; }
  .formula-line { display:flex; justify-content:space-between; align-items:center; padding:5px 0; border-bottom:1px solid #f1f5f9; font-size:13px; }
  .formula-line:last-child { border-bottom:none; }
  .formula-name { color:#64748b; }
  .formula-calc { font-family:'Courier New',monospace; font-weight:600; color:#334155; font-size:12px; }
  .formula-result { font-weight:800; color:#8b5cf6; min-width:70px; text-align:right; }
  .bar-visual { width:100%; height:28px; border-radius:14px; overflow:hidden; display:flex; }
  .orbit-hint {
    position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,.85); padding:6px 14px; border-radius:20px;
    font-size:11px; color:#64748b; pointer-events:none;
  }
</style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="edu-toolbar-title">📐 圆柱的表面积与体积</span>
      <span class="edu-toolbar-subtitle">下册 · 第三单元</span>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="c3d"></canvas>
        <div class="orbit-hint">拖拽旋转 · 滚轮缩放</div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">底面半径 r（cm）</div>
          <div class="slider-row"><label>r</label><input type="range" id="sr" min="1" max="5" value="2" step="0.5" oninput="rebuild()"/><span class="val" id="vr">2</span></div>
        </div>
        <div class="ctrl-section">
          <div class="ctrl-label">高 h（cm）</div>
          <div class="slider-row"><label>h</label><input type="range" id="sh" min="1" max="8" value="4" step="0.5" oninput="rebuild()"/><span class="val" id="vh">4</span></div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">计算结果</div>
          <div id="calcCard"></div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">表面积组成</div>
          <div class="bar-visual" id="areaBar"></div>
          <div style="display:flex;gap:12px;font-size:11px;margin-top:4px">
            <span style="color:#8b5cf6">■ 侧面积</span>
            <span style="color:#0ea5e9">■ 上底面</span>
            <span style="color:#22c55e">■ 下底面</span>
          </div>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <strong>圆柱公式</strong><br/>
          ● 底面周长 C = 2πr<br/>
          ● 底面积 S底 = πr²<br/>
          ● 侧面积 S侧 = 2πrh<br/>
          ● 表面积 S = 2πr² + 2πrh = 2πr(r+h)<br/>
          ● 体积 V = πr²h = 底面积 × 高
        </div>
      </div>
    </div>
  </div>
</div>
<script>
var _scene, _camera, _renderer, _controls;
var _cylMesh, _cylEdges, _labelGroup;

function init() {
  var canvas = document.getElementById('c3d');
  var r = Edu3D.createScene(canvas, { bg: 0xfaf5ff, camX: 8, camY: 5, camZ: 8 });
  _scene = r.scene; _camera = r.camera; _renderer = r.renderer; _controls = r.controls;
  Edu3D.addLights(_scene);
  Edu3D.addGrid(_scene, 12, 12);

  _labelGroup = new THREE.Group();
  _scene.add(_labelGroup);

  rebuild();
  Edu3D.startLoop(_scene, _camera, _renderer, _controls);
}

function rebuild() {
  var radius = parseFloat(document.getElementById('sr').value);
  var height = parseFloat(document.getElementById('sh').value);
  document.getElementById('vr').textContent = radius;
  document.getElementById('vh').textContent = height;

  if (_cylMesh) { _scene.remove(_cylMesh); _scene.remove(_cylEdges); }
  while (_labelGroup.children.length) _labelGroup.remove(_labelGroup.children[0]);

  // 圆柱
  var geo = new THREE.CylinderGeometry(radius, radius, height, 32);
  var mat = new THREE.MeshLambertMaterial({ color: 0x8b5cf6, transparent: true, opacity: 0.45 });
  _cylMesh = new THREE.Mesh(geo, mat);
  _cylMesh.position.y = height / 2;
  _cylMesh.castShadow = true;
  _scene.add(_cylMesh);

  _cylEdges = Edu3D.edges(geo, 0x6d28d9);
  _cylEdges.position.copy(_cylMesh.position);
  _scene.add(_cylEdges);

  // 标注
  var hLabel = Edu3D.textSprite('h=' + height, { color: '#ef4444', scale: 0.5 });
  hLabel.position.set(radius + 1.2, height / 2, 0);
  _labelGroup.add(hLabel);

  var rLabel = Edu3D.textSprite('r=' + radius, { color: '#22c55e', scale: 0.4 });
  rLabel.position.set(radius / 2, height + 0.6, 0);
  _labelGroup.add(rLabel);

  // 计算
  var C = 2 * Math.PI * radius;
  var Sbase = Math.PI * radius * radius;
  var Slateral = 2 * Math.PI * radius * height;
  var S = 2 * Sbase + Slateral;
  var V = Sbase * height;

  var card = document.getElementById('calcCard');
  card.innerHTML =
    '<div class="formula-line"><span class="formula-name">底面周长 C</span><span class="formula-calc">2π×' + radius + '</span><span class="formula-result">' + C.toFixed(2) + '</span></div>' +
    '<div class="formula-line"><span class="formula-name">底面积 S底</span><span class="formula-calc">π×' + radius + '²</span><span class="formula-result">' + Sbase.toFixed(2) + '</span></div>' +
    '<div class="formula-line"><span class="formula-name">侧面积 S侧</span><span class="formula-calc">2π×' + radius + '×' + height + '</span><span class="formula-result">' + Slateral.toFixed(2) + '</span></div>' +
    '<div class="formula-line" style="background:#faf5ff;border-radius:6px;padding:8px"><span class="formula-name" style="font-weight:700">表面积 S</span><span class="formula-calc">2πr(r+h)</span><span class="formula-result" style="font-size:15px">' + S.toFixed(2) + '</span></div>' +
    '<div class="formula-line" style="background:#f0fdf4;border-radius:6px;padding:8px"><span class="formula-name" style="font-weight:700">体积 V</span><span class="formula-calc">π×' + radius + '²×' + height + '</span><span class="formula-result" style="font-size:15px;color:#22c55e">' + V.toFixed(2) + '</span></div>';

  // 面积占比条
  var bar = document.getElementById('areaBar');
  var slPct = (Slateral / S * 100);
  var s1Pct = (Sbase / S * 100);
  bar.innerHTML =
    '<div style="width:' + slPct + '%;background:#8b5cf6;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:600">侧 ' + slPct.toFixed(0) + '%</div>' +
    '<div style="width:' + s1Pct + '%;background:#0ea5e9;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:600">上 ' + s1Pct.toFixed(0) + '%</div>' +
    '<div style="width:' + s1Pct + '%;background:#22c55e;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:600">下 ' + s1Pct.toFixed(0) + '%</div>';
}

function resetAll() {
  document.getElementById('sr').value = 2;
  document.getElementById('sh').value = 4;
  rebuild();
}

init();
</script>
</body>
</html>
