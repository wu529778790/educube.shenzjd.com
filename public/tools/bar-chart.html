<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>条形统计图制作</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
  .main-layout {
    display: grid;
    grid-template-columns: 1fr 280px;
    height: 100%;
  }
  .canvas-area { position: relative; background: #fff; overflow: hidden; }
  .control-panel {
    background: #fdfaf4; border-left: 1px solid #e2e8f0;
    padding: 16px; display: flex; flex-direction: column; gap: 12px; overflow: auto;
  }
  .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
  .ctrl-label {
    font-size: 11px; font-weight: 700; color: #64748b;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .divider { height: 1px; background: #e2e8f0; }
  .data-row {
    display: flex; align-items: center; gap: 6px;
  }
  .data-label {
    font-size: 12px; font-weight: 600; color: #1e293b; min-width: 36px;
  }
  .data-input {
    flex: 1; padding: 5px 8px; border: 1.5px solid #e2e8f0; border-radius: 6px;
    font-size: 13px; font-family: var(--edu-font); outline: none; width: 60px;
    text-align: center;
  }
  .data-input:focus { border-color: #0ea5e9; }
  .info-box {
    background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
    padding: 10px 12px; font-size: 12px; color: #64748b; line-height: 1.8;
  }
  .info-box strong { color: #0ea5e9; }
  .preset-btn {
    padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
    cursor: pointer; border: 1.5px solid #e2e8f0; background: #fff; color: #64748b;
    transition: all 0.15s; font-family: var(--edu-font); text-align: center;
  }
  .preset-btn:hover { border-color: #0ea5e9; color: #0ea5e9; }
  .color-dot {
    width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="edu-toolbar-title">📊 条形统计图制作</span>
      <span class="edu-toolbar-subtitle">上册·条形统计图</span>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-outline" onclick="resetData()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="main-canvas" class="edu-canvas-full"></canvas>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">标题</div>
          <input class="data-input" id="chart-title" style="width:100%;text-align:left;" value="四年级同学最喜欢的运动" oninput="render()"/>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">数据输入</div>
          <div id="data-rows"></div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">快捷预设</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
            <button class="preset-btn" onclick="loadPreset('sport')">最喜欢运动</button>
            <button class="preset-btn" onclick="loadPreset('weather')">天气统计</button>
            <button class="preset-btn" onclick="loadPreset('fruit')">最喜欢水果</button>
            <button class="preset-btn" onclick="loadPreset('score')">考试成绩</button>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">统计信息</div>
          <div class="info-box">
            <div>最多：<strong id="stat-max">—</strong></div>
            <div>最少：<strong id="stat-min">—</strong></div>
            <div>平均：<strong id="stat-avg">—</strong></div>
            <div>合计：<strong id="stat-sum">—</strong></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../edu-lib/edu-tools.js"></script>
<script>
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
let W, H;

const COLORS = ['#3b82f6', '#ef4444', '#22c55e', '#f97316', '#8b5cf6', '#ec4899', '#0ea5e9', '#eab308'];

const PRESETS = {
  sport: {
    title: '四年级同学最喜欢的运动',
    items: [
      { label: '乒乓球', value: 18 },
      { label: '足球', value: 12 },
      { label: '跳绳', value: 15 },
      { label: '游泳', value: 9 },
      { label: '篮球', value: 14 }
    ]
  },
  weather: {
    title: '九月份天气统计',
    items: [
      { label: '晴天', value: 15 },
      { label: '多云', value: 8 },
      { label: '阴天', value: 4 },
      { label: '雨天', value: 3 }
    ]
  },
  fruit: {
    title: '同学们最喜欢的水果',
    items: [
      { label: '苹果', value: 12 },
      { label: '香蕉', value: 8 },
      { label: '橘子', value: 10 },
      { label: '葡萄', value: 6 },
      { label: '草莓', value: 14 }
    ]
  },
  score: {
    title: '数学考试各分数段人数',
    items: [
      { label: '90-100', value: 15 },
      { label: '80-89', value: 12 },
      { label: '70-79', value: 8 },
      { label: '60-69', value: 3 },
      { label: '60以下', value: 2 }
    ]
  }
};

let data = JSON.parse(JSON.stringify(PRESETS.sport));

function buildDataRows() {
  const container = document.getElementById('data-rows');
  container.innerHTML = '';
  data.items.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'data-row';
    row.innerHTML = `
      <span class="color-dot" style="background:${COLORS[i % COLORS.length]}"></span>
      <input class="data-input" style="width:60px;text-align:center;" value="${item.label}" data-idx="${i}" data-field="label" oninput="updateData(this)"/>
      <input class="data-input" style="width:50px;" type="number" min="0" value="${item.value}" data-idx="${i}" data-field="value" oninput="updateData(this)"/>
      <span style="font-size:11px;color:#94a3b8;">人</span>
    `;
    container.appendChild(row);
  });
}

function updateData(el) {
  const idx = parseInt(el.dataset.idx);
  const field = el.dataset.field;
  if (field === 'value') data.items[idx].value = Math.max(0, parseInt(el.value) || 0);
  else data.items[idx].label = el.value;
  render();
}

function loadPreset(key) {
  data = JSON.parse(JSON.stringify(PRESETS[key]));
  document.getElementById('chart-title').value = data.title;
  buildDataRows();
  render();
}

function resetData() {
  loadPreset('sport');
}

function updateStats() {
  const vals = data.items.map(d => d.value);
  const maxV = Math.max(...vals);
  const minV = Math.min(...vals);
  const sum = vals.reduce((a, b) => a + b, 0);
  const avg = vals.length ? sum / vals.length : 0;
  const maxItem = data.items.find(d => d.value === maxV);
  const minItem = data.items.find(d => d.value === minV);
  document.getElementById('stat-max').textContent = maxItem ? `${maxItem.label}（${maxV}人）` : '—';
  document.getElementById('stat-min').textContent = minItem ? `${minItem.label}（${minV}人）` : '—';
  document.getElementById('stat-avg').textContent = fmt(avg, 1) + ' 人';
  document.getElementById('stat-sum').textContent = sum + ' 人';
}

function render() {
  const dpr = window.devicePixelRatio || 1;
  W = canvas.clientWidth; H = canvas.clientHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const title = document.getElementById('chart-title').value;
  const padL = 60, padR = 30, padT = 50, padB = 60;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  const vals = data.items.map(d => d.value);
  const maxVal = Math.max(...vals, 1);
  // nice scale
  const step = Math.ceil(maxVal / 5);
  const scaleMax = step * 5;

  // title
  ctx.font = 'bold 16px ' + getComputedStyle(document.body).fontFamily;
  ctx.fillStyle = '#1e293b';
  ctx.textAlign = 'center';
  ctx.fillText(title, W / 2, 30);

  // axes
  ctx.strokeStyle = '#64748b';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(padL, padT);
  ctx.lineTo(padL, H - padB);
  ctx.lineTo(W - padR, H - padB);
  ctx.stroke();

  // Y axis labels and grid
  ctx.font = '12px ' + getComputedStyle(document.body).fontFamily;
  ctx.fillStyle = '#64748b';
  ctx.textAlign = 'right';
  for (let i = 0; i <= 5; i++) {
    const v = step * i;
    const y = H - padB - (v / scaleMax) * chartH;
    ctx.fillText(v, padL - 8, y + 4);
    if (i > 0) {
      ctx.beginPath();
      ctx.moveTo(padL, y);
      ctx.lineTo(W - padR, y);
      ctx.strokeStyle = '#e2e8f0';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }

  // bars
  const n = data.items.length;
  if (n === 0) return;
  const barGap = chartW * 0.08;
  const totalGap = barGap * (n + 1);
  const barW = (chartW - totalGap) / n;

  data.items.forEach((item, i) => {
    const x = padL + barGap + i * (barW + barGap);
    const barH = (item.value / scaleMax) * chartH;
    const y = H - padB - barH;
    const color = COLORS[i % COLORS.length];

    // bar with gradient
    const grad = ctx.createLinearGradient(x, y, x, H - padB);
    grad.addColorStop(0, color);
    grad.addColorStop(1, color + '80');
    ctx.fillStyle = grad;
    ctx.beginPath();
    const r = 4;
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + barW - r, y);
    ctx.quadraticCurveTo(x + barW, y, x + barW, y + r);
    ctx.lineTo(x + barW, H - padB);
    ctx.lineTo(x, H - padB);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.fill();

    // value on top
    ctx.font = 'bold 13px ' + getComputedStyle(document.body).fontFamily;
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.fillText(item.value, x + barW / 2, y - 8);

    // label below
    ctx.font = '12px ' + getComputedStyle(document.body).fontFamily;
    ctx.fillStyle = '#64748b';
    ctx.fillText(item.label, x + barW / 2, H - padB + 18);
  });

  // axis labels
  ctx.font = '12px ' + getComputedStyle(document.body).fontFamily;
  ctx.fillStyle = '#94a3b8';
  ctx.textAlign = 'center';
  ctx.fillText('数量（人）', padL - 5, padT - 10);

  updateStats();
}

window.addEventListener('resize', render);
setTimeout(() => { buildDataRows(); render(); }, 50);
</script>
</body>
</html>
