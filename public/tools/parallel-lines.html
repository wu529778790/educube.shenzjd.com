<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>相交线与平行线 — 教立方</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
  *{box-sizing:border-box}body{font-family:var(--edu-font);margin:0}
  .tool{width:100vw;height:100vh;display:flex;flex-direction:column;background:var(--edu-bg)}
  .toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#fff;border-bottom:1px solid var(--edu-border)}
  .toolbar h1{font-size:15px;color:var(--edu-primary);margin:0}
  .toolbar span{font-size:11px;color:var(--edu-text-muted);background:#f1f5f9;padding:2px 8px;border-radius:12px}
  .main{flex:1;display:grid;grid-template-columns:1fr 290px;overflow:hidden}
  .canvas-wrap{position:relative;overflow:hidden;background:linear-gradient(135deg,#ecfdf5,#f0fdf4)}
  .canvas-wrap canvas{width:100%;height:100%;display:block}
  .panel{background:#fff;border-left:1px solid var(--edu-border);padding:12px;display:flex;flex-direction:column;gap:8px;overflow:auto}
  .section{display:flex;flex-direction:column;gap:4px}
  .label{font-size:10px;font-weight:700;color:#64748b;letter-spacing:.05em}
  .divider{height:1px;background:var(--edu-border)}
  .btn{padding:6px 12px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--edu-font);transition:all .15s}
  .btn.active{background:var(--edu-primary);color:#fff}
  .btn-default{background:#f1f5f9;color:#334155}
  .btn-default:hover{background:#e2e8f0}
  .row{display:flex;gap:4px;flex-wrap:wrap}
  .slider-row{display:flex;align-items:center;gap:6px}
  .slider-row label{font-size:11px;font-weight:700;min-width:36px}
  .slider-row input[type=range]{flex:1}
  .slider-row .val{font-size:12px;font-weight:800;min-width:32px;text-align:right;color:#166534}

  .angle-card{text-align:center;padding:8px;background:#f0fdf4;border:2px solid #86efac;border-radius:10px;font-size:11px;line-height:1.8}
  .angle-card .pair{display:flex;justify-content:space-between;padding:2px 0}
  .angle-card .eq{color:#166534;font-weight:800}
  .angle-card .neq{color:#dc2626;font-weight:800}

  .quiz-card{background:#f0fdf4;border:2px solid #86efac;border-radius:12px;padding:10px;text-align:center}
  .quiz-q{font-size:13px;font-weight:700;color:#166534}
  .quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px}
  .quiz-opt{padding:6px;border:2px solid #e2e8f0;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;font-family:var(--edu-font)}
  .quiz-opt:hover{border-color:#22c55e}
  .quiz-opt.correct{background:#dcfce7;border-color:#22c55e}
  .quiz-opt.wrong{background:#fef2f2;border-color:#ef4444}
  .quiz-result{font-size:11px;font-weight:700;margin-top:4px;min-height:16px}

  .info{font-size:11px;line-height:1.8;color:#334155;background:#fff;border:1px solid #bbf7d0;border-radius:8px;padding:8px 10px}
  .info b{color:#166534}
</style>
</head>
<body>
<div class="tool">
  <div class="toolbar">
    <h1>📐 相交线与平行线</h1>
    <span>七年级下册 · 第一单元</span>
  </div>
  <div class="main">
    <div class="canvas-wrap"><canvas id="cv"></canvas></div>
    <div class="panel">
      <div class="section">
        <div class="label">模式切换</div>
        <div class="row">
          <button class="btn active" id="m-intersect" onclick="setMode('intersect')">✖ 相交线</button>
          <button class="btn btn-default" id="m-parallel" onclick="setMode('parallel')">∥ 平行线</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">调节角度</div>
        <div class="slider-row">
          <label>角度α</label>
          <input type="range" id="sl-a" min="10" max="170" value="60" oninput="setAngle(parseInt(this.value))"/>
          <div class="val" id="sl-a-val">60°</div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="angle-card" id="angle-info"></div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">快捷角度</div>
        <div class="row">
          <button class="btn btn-default" onclick="setAngle(30)">30°</button>
          <button class="btn btn-default" onclick="setAngle(45)">45°</button>
          <button class="btn btn-default" onclick="setAngle(60)">60°</button>
          <button class="btn btn-default" onclick="setAngle(90)">90°</button>
          <button class="btn btn-default" onclick="setAngle(120)">120°</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">测验</div>
        <div class="quiz-card" id="quiz-card"></div>
      </div>
      <div class="divider"></div>
      <div class="info">
        <b>相交线与平行线</b><br/>
        ● <strong>对顶角</strong>：相等（∠1=∠3, ∠2=∠4）<br/>
        ● <strong>邻补角</strong>：互补（∠1+∠2=180°）<br/>
        ● 两直线平行→<strong>同位角</strong>相等<br/>
        ● 两直线平行→<strong>内错角</strong>相等<br/>
        ● 两直线平行→<strong>同旁内角</strong>互补
      </div>
    </div>
  </div>
</div>
<script>
var cv, ctx;
var _mode = 'intersect';
var _angle = 60;

function init() {
  cv = document.getElementById('cv');
  ctx = cv.getContext('2d');
  window.addEventListener('resize', resize);
  resize();
  setAngle(60);
  nextQuiz();
}

function resize() {
  var r = cv.parentElement.getBoundingClientRect();
  cv.width = r.width * devicePixelRatio;
  cv.height = r.height * devicePixelRatio;
  cv.style.width = r.width + 'px';
  cv.style.height = r.height + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  draw();
}

function setMode(m) {
  _mode = m;
  document.getElementById('m-intersect').className = 'btn ' + (m === 'intersect' ? 'active' : 'btn-default');
  document.getElementById('m-parallel').className = 'btn ' + (m === 'parallel' ? 'active' : 'btn-default');
  updateInfo();
  draw();
}

function setAngle(a) {
  _angle = a;
  document.getElementById('sl-a').value = a;
  document.getElementById('sl-a-val').textContent = a + '°';
  updateInfo();
  draw();
}

function updateInfo() {
  var a = _angle, b = 180 - a;
  if (_mode === 'intersect') {
    document.getElementById('angle-info').innerHTML =
      '<div class="pair"><span>∠1 = ' + a + '°</span><span class="eq">∠3 = ' + a + '°（对顶角）</span></div>' +
      '<div class="pair"><span>∠2 = ' + b + '°</span><span class="eq">∠4 = ' + b + '°（对顶角）</span></div>' +
      '<div class="pair"><span>∠1+∠2 = ' + (a + b) + '°</span><span class="eq">邻补角互补 ✓</span></div>';
  } else {
    document.getElementById('angle-info').innerHTML =
      '<div class="pair"><span>∠1 = ' + a + '°（同位角）</span><span class="eq">∠5 = ' + a + '° 相等 ✓</span></div>' +
      '<div class="pair"><span>∠3 = ' + b + '°（内错角）</span><span class="eq">∠5 = ' + a + '° 不对应</span></div>' +
      '<div class="pair"><span>∠2 = ' + a + '°（内错角）</span><span class="eq">∠6 = ' + a + '° 相等 ✓</span></div>' +
      '<div class="pair"><span>∠3+∠6 = ' + (b + a) + '°</span><span class="eq">同旁内角互补 ✓</span></div>';
  }
}

function draw() {
  var w = cv.width / devicePixelRatio, h = cv.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  if (_mode === 'intersect') drawIntersect(w, h);
  else drawParallel(w, h);
}

function drawIntersect(w, h) {
  var cx = w / 2, cy = h / 2;
  var len = Math.min(w, h) * 0.38;
  var aRad = _angle * Math.PI / 180;

  // Line 1: horizontal
  ctx.strokeStyle = '#3b82f6';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(cx - len, cy);
  ctx.lineTo(cx + len, cy);
  ctx.stroke();

  // Line 2: at angle
  ctx.strokeStyle = '#ef4444';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(cx - Math.cos(aRad) * len, cy - Math.sin(aRad) * len);
  ctx.lineTo(cx + Math.cos(aRad) * len, cy + Math.sin(aRad) * len);
  ctx.stroke();

  // Angle arcs and labels
  var arcR = 35;
  var angles = [
    { start: 0, end: aRad, label: '∠1', val: _angle, color: '#8b5cf6' },
    { start: aRad, end: Math.PI, label: '∠2', val: 180 - _angle, color: '#f59e0b' },
    { start: Math.PI, end: Math.PI + aRad, label: '∠3', val: _angle, color: '#22c55e' },
    { start: Math.PI + aRad, end: Math.PI * 2, label: '∠4', val: 180 - _angle, color: '#3b82f6' },
  ];

  angles.forEach(function(ang) {
    ctx.strokeStyle = ang.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, arcR, -ang.end, -ang.start);
    ctx.stroke();

    var midA = -(ang.start + ang.end) / 2;
    var lr = arcR + 18;
    ctx.fillStyle = ang.color;
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ang.label + '=' + ang.val + '°', cx + Math.cos(midA) * lr, cy + Math.sin(midA) * lr);
  });

  // Center dot
  ctx.fillStyle = '#334155';
  ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI * 2); ctx.fill();

  // Line labels
  ctx.fillStyle = '#3b82f6';
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('l₁', cx + len - 10, cy - 10);
  ctx.fillStyle = '#ef4444';
  ctx.fillText('l₂', cx + Math.cos(aRad) * len - 20, cy + Math.sin(aRad) * len - 10);

  // Vertex label
  ctx.fillStyle = '#334155';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('O', cx + 8, cy - 8);
}

function drawParallel(w, h) {
  var cx = w / 2, cy = h / 2;
  var lineLen = w * 0.75;
  var gap = Math.min(h * 0.25, 120);
  var aRad = _angle * Math.PI / 180;

  // Parallel lines
  var y1 = cy - gap, y2 = cy + gap;
  ctx.strokeStyle = '#3b82f6';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(cx - lineLen / 2, y1); ctx.lineTo(cx + lineLen / 2, y1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx - lineLen / 2, y2); ctx.lineTo(cx + lineLen / 2, y2); ctx.stroke();

  // Parallel arrows
  ctx.fillStyle = '#3b82f6';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('l₁ ∥ l₂', cx - lineLen / 2 - 8, cy);

  // Transversal
  var tx0 = cx - Math.cos(aRad) * lineLen * 0.5;
  var ty0 = cy - gap - Math.sin(aRad) * lineLen * 0.3;
  var tx1 = cx + Math.cos(aRad) * lineLen * 0.5;
  var ty1 = cy + gap + Math.sin(aRad) * lineLen * 0.3;
  ctx.strokeStyle = '#ef4444';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(tx0, ty0); ctx.lineTo(tx1, ty1); ctx.stroke();

  ctx.fillStyle = '#ef4444';
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('l₃（截线）', tx1 + 8, ty1);

  // Find intersection points
  // Line 1 (y = y1): parametric t on transversal
  var dx = tx1 - tx0, dy = ty1 - ty0;
  var t1 = (y1 - ty0) / dy;
  var ix1 = tx0 + dx * t1, iy1 = y1;
  var t2 = (y2 - ty0) / dy;
  var ix2 = tx0 + dx * t2, iy2 = y2;

  // Draw angle arcs at intersection 1 (top)
  drawAngleAtIntersection(ix1, iy1, aRad, true);
  // Draw angle arcs at intersection 2 (bottom)
  drawAngleAtIntersection(ix2, iy2, aRad, false);

  // Intersection dots
  ctx.fillStyle = '#334155';
  ctx.beginPath(); ctx.arc(ix1, iy1, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(ix2, iy2, 4, 0, Math.PI * 2); ctx.fill();
}

function drawAngleAtIntersection(ix, iy, aRad, isTop) {
  var arcR = 28;
  // Transversal direction
  var tAngle = aRad; // angle of transversal from horizontal

  // 8 angles: top intersection has ∠1-∠4, bottom has ∠5-∠8
  // Top-left: 180 - angle, Top-right: angle, Bottom-right: 180 - angle, Bottom-left: angle
  var a = Math.round(aRad * 180 / Math.PI);
  var b = 180 - a;

  // Draw colored arcs for key angles
  var dir = isTop ? 1 : 1;
  var sign = isTop ? -1 : 1;

  // Corresponding angles (same position, different intersection)
  // ∠1 (top, upper-left) and ∠5 (bottom, upper-left) are corresponding
  // ∠3 (top, lower-left) and ∠6 (bottom, upper-right) are alternate interior

  var arcConfigs = isTop ? [
    { start: Math.PI, end: Math.PI + aRad, color: '#8b5cf6', label: '∠1', val: b },  // upper left
    { start: Math.PI + aRad, end: 2 * Math.PI, color: '#f59e0b', label: '∠2', val: a },  // upper right
    { start: 0, end: aRad, color: '#22c55e', label: '∠3', val: b },  // lower right
    { start: aRad, end: Math.PI, color: '#3b82f6', label: '∠4', val: a },  // lower left
  ] : [
    { start: Math.PI, end: Math.PI + aRad, color: '#8b5cf6', label: '∠5', val: b },
    { start: Math.PI + aRad, end: 2 * Math.PI, color: '#f59e0b', label: '∠6', val: a },
    { start: 0, end: aRad, color: '#22c55e', label: '∠7', val: b },
    { start: aRad, end: Math.PI, color: '#3b82f6', label: '∠8', val: a },
  ];

  arcConfigs.forEach(function(ac) {
    ctx.strokeStyle = ac.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(ix, iy, arcR, -ac.end, -ac.start);
    ctx.stroke();

    var midA = -(ac.start + ac.end) / 2;
    var lr = arcR + 18;
    ctx.fillStyle = ac.color;
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ac.label, ix + Math.cos(midA) * lr, iy + Math.sin(midA) * lr);
  });
}

// ===== Quiz =====
var _quizQs = [
  { q: '两条直线相交，∠1=70°，则∠2=？', opts: ['70°', '110°', '180°', '90°'], ans: 1 },
  { q: '对顶角有什么关系？', opts: ['互补', '相等', '互余', '无关'], ans: 1 },
  { q: '两直线平行，同位角是什么关系？', opts: ['互补', '互余', '相等', '不确定'], ans: 2 },
  { q: '两直线平行，同旁内角之和等于？', opts: ['90°', '180°', '360°', '不确定'], ans: 1 },
  { q: '内错角相等能推出什么结论？', opts: ['两线垂直', '两线平行', '两线相交', '无法判断'], ans: 1 },
  { q: '∠1和∠2是邻补角，∠1=50°，∠2=？', opts: ['50°', '130°', '90°', '40°'], ans: 1 },
];
var _qi = 0, _score = 0;

function nextQuiz() {
  if (_qi >= _quizQs.length) {
    document.getElementById('quiz-card').innerHTML =
      '<div class="quiz-q">测验完成！答对 ' + _score + ' / ' + _quizQs.length + ' 题</div>';
    return;
  }
  var q = _quizQs[_qi];
  var html = '<div class="quiz-q">第' + (_qi + 1) + '题：' + q.q + '</div><div class="quiz-opts">';
  q.opts.forEach(function(o, i) { html += '<button class="quiz-opt" onclick="answer(' + i + ')">' + o + '</button>'; });
  html += '</div><div class="quiz-result" id="qr"></div>';
  document.getElementById('quiz-card').innerHTML = html;
}

function answer(idx) {
  var q = _quizQs[_qi];
  var opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(function(b, i) {
    b.onclick = null; b.style.cursor = 'default';
    if (i === q.ans) b.classList.add('correct');
    if (i === idx && i !== q.ans) b.classList.add('wrong');
  });
  var r = document.getElementById('qr');
  if (idx === q.ans) { r.textContent = '✓ 正确！'; r.style.color = '#16a34a'; _score++; }
  else { r.textContent = '✗ 正确答案：' + q.opts[q.ans]; r.style.color = '#ef4444'; }
  _qi++;
  setTimeout(nextQuiz, 1200);
}

init();
</script>
</body>
</html>
