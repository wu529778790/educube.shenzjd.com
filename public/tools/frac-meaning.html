<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分数的意义 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout{display:grid;grid-template-columns:1fr 260px;height:100%}
    .canvas-area{padding:16px 24px;overflow-y:auto;background:linear-gradient(135deg,#fff7ed,#fdfaf4);display:flex;flex-direction:column;align-items:center}
    .control-panel{background:#fdfaf4;border-left:1px solid #e2e8f0;padding:14px;display:flex;flex-direction:column;gap:12px;overflow:auto}
    .ctrl-section{display:flex;flex-direction:column;gap:6px}
    .ctrl-label{font-size:11px;font-weight:700;color:#64748b;letter-spacing:.05em}
    .divider{height:1px;background:#e2e8f0}
    .info-box{background:#fff;border:1px solid #fed7aa;border-radius:10px;padding:10px 12px;font-size:12px;line-height:1.8;color:#334155}
    .info-box strong{color:#f97316}
    .slider-row{display:flex;align-items:center;gap:10px}
    .slider-row input{flex:1}
    .slider-row .value-display{min-width:40px;font-weight:700}
    canvas{border-radius:12px;background:#fff;cursor:pointer;touch-action:none}
    .frac-display{font-size:48px;font-weight:800;font-family:'Courier New',monospace;color:#f97316;text-align:center;margin:10px 0;line-height:1}
    .frac-display .frac-line,.game-frac .gf-line{display:block;border-radius:2px;margin:3px auto}
    .frac-display .frac-line{width:80px;height:4px;background:#334155;margin:4px auto}
    .equiv-row{display:flex;gap:10px;font-size:15px;font-weight:700;justify-content:center;margin:4px 0;flex-wrap:wrap}
    .equiv-row span{padding:4px 10px;background:#fff;border-radius:8px;transition:all .3s}
    .equiv-anim{animation:pop .4s ease}
    @keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
    .preset-btn{padding:8px 0;border-radius:8px;font-size:13px;font-weight:600;background:#fff;border:1.5px solid #e2e8f0;cursor:pointer;transition:all .15s}
    .preset-btn:hover{border-color:#f97316;color:#f97316}
    .tab-bar{display:flex;gap:6px;margin-bottom:10px}
    .tab-btn,.shape-btn{border-radius:8px;border:1.5px solid #e2e8f0;background:#fff;cursor:pointer;font-weight:600;transition:all .15s}
    .tab-btn{padding:6px 14px;font-size:13px}
    .shape-btn{padding:5px 12px;font-size:12px}
    .tab-btn.active,.shape-btn.active{background:#f97316;color:#fff;border-color:#f97316}
    .game-card{background:#fff;border:2px solid #f97316;border-radius:14px;padding:18px;width:100%;max-width:460px;text-align:center}
    .game-frac{font-size:42px;font-weight:800;font-family:'Courier New',monospace;display:inline-block;line-height:1;margin:0 12px}
    .game-frac .gf-line{width:60px;height:3px;background:#334155}
    .game-vs{font-size:28px;font-weight:800;color:#94a3b8;vertical-align:middle;margin:0 10px}
    .game-btns{display:flex;gap:12px;justify-content:center;margin-top:14px}
    .game-btns button{padding:10px 28px;border-radius:10px;font-size:16px;font-weight:700;border:2px solid #e2e8f0;background:#fff;cursor:pointer;transition:all .15s}
    .game-btns button:hover{transform:scale(1.05)}
    .game-btns button:active{transform:scale(.97)}
    .score-bar{font-size:14px;font-weight:700;margin-bottom:10px;color:#334155}
    .score-bar .pts{color:#f97316;font-size:18px}
    .feedback{font-size:20px;font-weight:800;min-height:30px;margin-top:8px}
    .fb-ok{color:#22c55e;animation:pop .4s ease}
    .fb-no{color:#ef4444;animation:pop .4s ease}
    .paint-hint{font-size:11px;color:#94a3b8;margin-top:2px}
    .shape-bar{display:flex;gap:6px;margin-bottom:8px}
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">½ 分数的意义</div>
      <div class="edu-toolbar-subtitle">下册 · 第四单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <div class="tab-bar">
          <button class="tab-btn active" onclick="setMode('paint')">涂色探究</button>
          <button class="tab-btn" onclick="setMode('equiv')">等值分数</button>
          <button class="tab-btn" onclick="setMode('game')">比大小</button>
        </div>
        <div id="panelPaint">
          <div class="shape-bar">
            <button class="shape-btn active" onclick="setShape('circle',this)">圆形</button>
            <button class="shape-btn" onclick="setShape('rect',this)">长方形</button>
            <button class="shape-btn" onclick="setShape('line',this)">数轴</button>
          </div>
          <canvas id="cvsPaint" width="440" height="260"></canvas>
          <div class="paint-hint">点击扇形/格子可涂色或取消，也可拖拽滑动涂色</div>
          <div class="frac-display" id="fracDisplay"></div>
          <div class="equiv-row" id="valueRow"></div>
        </div>
        <div id="panelEquiv" style="display:none">
          <div style="font-size:14px;font-weight:700;color:#334155;margin-bottom:6px">拖动滑块改变分子，观察等值分数</div>
          <canvas id="cvsEquiv" width="440" height="160"></canvas>
          <div class="frac-display" id="equivDisplay" style="margin:10px 0"></div>
          <div class="equiv-row" id="equivList"></div>
        </div>
        <div id="panelGame" style="display:none">
          <div class="game-card" id="gameCard"></div>
        </div>
      </div>
      <div class="control-panel">
        <div id="ctrlPaint">
          <div class="ctrl-section">
            <div class="ctrl-label">分母（分成几份）</div>
            <div class="slider-row"><input type="range" id="denSlider" min="2" max="12" value="4" oninput="onSlider()"/><span class="value-display" id="denVal">4</span></div>
          </div>
          <div class="ctrl-section">
            <div class="ctrl-label">涂色份数</div>
            <div class="slider-row"><input type="range" id="numSlider" min="0" max="12" value="3" oninput="onSlider()"/><span class="value-display" id="numVal">3</span></div>
          </div>
          <div class="divider"></div>
          <div class="ctrl-section">
            <div class="ctrl-label">预设分数</div>
            <button class="preset-btn" onclick="load(2,1)">½</button>
            <button class="preset-btn" onclick="load(4,3)">¾</button>
            <button class="preset-btn" onclick="load(5,2)">⅖</button>
            <button class="preset-btn" onclick="load(8,5)">⅝</button>
          </div>
        </div>
        <div id="ctrlEquiv" style="display:none">
          <div class="ctrl-section">
            <div class="ctrl-label">基础分母</div>
            <div class="slider-row"><input type="range" id="eqBD" min="2" max="8" value="2" oninput="updEquiv()"/><span class="value-display" id="eqBDv">2</span></div>
          </div>
          <div class="ctrl-section">
            <div class="ctrl-label">分子（拖动观察）</div>
            <div class="slider-row"><input type="range" id="eqN" min="1" max="8" value="1" oninput="updEquiv()"/><span class="value-display" id="eqNv">1</span></div>
          </div>
          <div class="ctrl-section">
            <div class="ctrl-label">放大倍数</div>
            <div class="slider-row"><input type="range" id="eqS" min="1" max="6" value="1" oninput="updEquiv()"/><span class="value-display" id="eqSv">1</span></div>
          </div>
        </div>
        <div id="ctrlGame" style="display:none">
          <div class="ctrl-section">
            <button class="edu-btn edu-btn-primary" style="width:100%" onclick="newRound()">下一题</button>
          </div>
          <div class="ctrl-section" style="margin-top:4px">
            <div class="ctrl-label">难度</div>
            <div id="diffBtns" style="display:flex;gap:6px">
              <button class="shape-btn active" onclick="setDiff(1,this)">简单</button>
              <button class="shape-btn" onclick="setDiff(2,this)">中等</button>
              <button class="shape-btn" onclick="setDiff(3,this)">困难</button>
            </div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <strong>分数的意义</strong><br/>
          ● 把单位"1"平均分成若干份<br/>
          ● 表示其中一份或几份的数<br/>
          ● 分母：平均分成的份数<br/>
          ● 分子：取出的份数<br/>
          ● 分数单位：几分之一<br/>
          ● 等值分数：值相等的分数
        </div>
      </div>
    </div>
  </div>
</div>
<script>
/* State */
let mode='paint', shape='circle', den=4, num=3;
let painted=new Array(12).fill(false);
let isDrag=false, dragVal=true;
let gDiff=1, gF1={n:1,d:2}, gF2={n:1,d:3}, gScore=0, gTotal=0, gDone=false;

/* Helpers */
const $=id=>document.getElementById(id);
function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b]}return a||1}
function rInt(a,b){return a+Math.floor(Math.random()*(b-a+1))}

/* ===== Paint Canvas ===== */
const cvsP=$('cvsPaint'), ctxP=cvsP.getContext('2d');

function getCellAt(mx,my){
  const W=cvsP.width,H=cvsP.height;
  if(shape==='circle'){
    const cx=W/2,cy=H/2,r=100,dx=mx-cx,dy=my-cy;
    if(dx*dx+dy*dy>r*r)return -1;
    let a=Math.atan2(dy,dx)+Math.PI/2;if(a<0)a+=Math.PI*2;
    return Math.floor(a/(Math.PI*2)*den);
  }else if(shape==='rect'){
    const rw=360,rh=100,rx=(W-rw)/2,ry=(H-rh)/2;
    if(mx<rx||mx>rx+rw||my<ry||my>ry+rh)return -1;
    return Math.floor((mx-rx)/(rw/den));
  }else{
    const pad=40,ly=H/2,len=W-80;
    if(my<ly-30||my>ly+30||mx<pad||mx>pad+len)return -1;
    return Math.floor((mx-pad)/(len/den));
  }
}
function syncPaint(){for(let i=0;i<12;i++)painted[i]=i<num}
function recountNum(){
  let c=0;for(let i=0;i<den;i++)if(painted[i])c++;
  num=c;$('numSlider').value=num;$('numSlider').max=den;
}

cvsP.addEventListener('pointerdown',e=>{
  if(mode!=='paint')return;
  const r=cvsP.getBoundingClientRect(),sx=cvsP.width/r.width,sy=cvsP.height/r.height;
  const mx=(e.clientX-r.left)*sx,my=(e.clientY-r.top)*sy;
  const c=getCellAt(mx,my);if(c<0||c>=den)return;
  isDrag=true;dragVal=!painted[c];painted[c]=dragVal;
  recountNum();drawPaint();updFrac();e.preventDefault();
});
cvsP.addEventListener('pointermove',e=>{
  if(!isDrag||mode!=='paint')return;
  const r=cvsP.getBoundingClientRect(),sx=cvsP.width/r.width,sy=cvsP.height/r.height;
  const mx=(e.clientX-r.left)*sx,my=(e.clientY-r.top)*sy;
  const c=getCellAt(mx,my);if(c<0||c>=den||painted[c]===dragVal)return;
  painted[c]=dragVal;recountNum();drawPaint();updFrac();e.preventDefault();
});
window.addEventListener('pointerup',()=>{isDrag=false});

function drawPaint(){
  const W=cvsP.width,H=cvsP.height;ctxP.clearRect(0,0,W,H);
  const FILLED='#fdba74',EMPTY='#f1f5f9',LINE='#334155';
  if(shape==='circle'){
    const cx=W/2,cy=H/2,r=100;
    for(let i=0;i<den;i++){
      const a1=-Math.PI/2+(i/den)*Math.PI*2,a2=-Math.PI/2+((i+1)/den)*Math.PI*2;
      ctxP.beginPath();ctxP.moveTo(cx,cy);ctxP.arc(cx,cy,r,a1,a2);ctxP.closePath();
      ctxP.fillStyle=painted[i]?FILLED:EMPTY;ctxP.fill();
      ctxP.strokeStyle=LINE;ctxP.lineWidth=1.5;ctxP.stroke();
    }
    ctxP.beginPath();ctxP.arc(cx,cy,r,0,Math.PI*2);ctxP.strokeStyle=LINE;ctxP.lineWidth=2.5;ctxP.stroke();
  }else if(shape==='rect'){
    const rw=360,rh=100,rx=(W-rw)/2,ry=(H-rh)/2;
    for(let i=0;i<den;i++){
      const x=rx+i*(rw/den);
      ctxP.fillStyle=painted[i]?FILLED:EMPTY;ctxP.fillRect(x,ry,rw/den,rh);
      ctxP.strokeStyle=LINE;ctxP.lineWidth=1.5;ctxP.strokeRect(x,ry,rw/den,rh);
    }
    ctxP.strokeStyle=LINE;ctxP.lineWidth=2.5;ctxP.strokeRect(rx,ry,rw,rh);
  }else{
    const pad=40,ly=H/2,len=W-80;
    ctxP.beginPath();ctxP.moveTo(pad,ly);ctxP.lineTo(pad+len,ly);ctxP.strokeStyle=LINE;ctxP.lineWidth=2;ctxP.stroke();
    ctxP.beginPath();ctxP.moveTo(pad+len,ly);ctxP.lineTo(pad+len-8,ly-5);ctxP.lineTo(pad+len-8,ly+5);ctxP.closePath();ctxP.fillStyle=LINE;ctxP.fill();
    for(let i=0;i<=den;i++){
      const x=pad+(i/den)*len;
      ctxP.beginPath();ctxP.moveTo(x,ly-8);ctxP.lineTo(x,ly+8);ctxP.strokeStyle=LINE;ctxP.lineWidth=1.5;ctxP.stroke();
      ctxP.fillStyle='#64748b';ctxP.font='bold 11px sans-serif';ctxP.textAlign='center';
      ctxP.fillText(i===0?'0':i===den?'1':`${i}/${den}`,x,ly+24);
    }
    for(let i=0;i<den;i++){
      if(!painted[i])continue;
      ctxP.fillStyle='rgba(251,146,60,0.35)';
      ctxP.fillRect(pad+(i/den)*len,ly-10,(len/den),20);
    }
    let pc=0;for(let i=0;i<den;i++)if(painted[i])pc++;
    if(pc>0){
      const xp=pad+(pc/den)*len;
      ctxP.beginPath();ctxP.arc(xp,ly,6,0,Math.PI*2);ctxP.fillStyle='#f97316';ctxP.fill();
      ctxP.strokeStyle='#fff';ctxP.lineWidth=2;ctxP.stroke();
    }
  }
}

function updFrac(){
  const n=Math.max(num,0);
  $('denVal').textContent=den;$('numVal').textContent=n;
  $('fracDisplay').innerHTML=`<span>${n}</span><span class="frac-line"></span><span>${den}</span>`;
  const p=den>0?(n/den*100).toFixed(1):'0.0', d=den>0?(n/den).toFixed(4):'0';
  $('valueRow').innerHTML=`<span style="color:#f97316">${n}/${den}</span><span style="color:#3b82f6">${d}</span><span style="color:#22c55e">${p}%</span>`;
}

/* ===== Equivalent Fractions ===== */
const cvsE=$('cvsEquiv'),ctxE=cvsE.getContext('2d');

function updEquiv(){
  let bd=+$('eqBD').value,bn=+$('eqN').value,sc=+$('eqS').value;
  if(bn>bd){bn=bd;$('eqN').value=bd}
  $('eqBDv').textContent=bd;$('eqNv').textContent=bn;$('eqSv').textContent=sc;
  const sd=bd*sc,sn=bn*sc,g=gcd(bn,bd),sn2=bn/g,sd2=bd/g;
  // Draw bars
  const W=cvsE.width,H=cvsE.height;ctxE.clearRect(0,0,W,H);
  function bar(y,d,n,col,lbl){
    const bx=30,bw=W-60;
    for(let i=0;i<d;i++){
      const x=bx+i*(bw/d);ctxE.fillStyle=i<n?col:'#f1f5f9';ctxE.fillRect(x,y,bw/d,36);
      ctxE.strokeStyle='#94a3b8';ctxE.lineWidth=1;ctxE.strokeRect(x,y,bw/d,36);
    }
    ctxE.fillStyle='#334155';ctxE.font='bold 12px sans-serif';ctxE.textAlign='center';
    ctxE.fillText(lbl,bx+bw/2,y+50);
  }
  bar(20,bd,bn,'#fdba74',`${bn}/${bd}`);
  if(sc>1)bar(76,sd,sn,'#7dd3fc',`${sn}/${sd}`);
  $('equivDisplay').innerHTML=`<span>${bn}</span><span class="frac-line"></span><span>${bd}</span>`;
  let h='';
  if(sc>1)h+=`<span class="equiv-anim" style="color:#f97316">${bn}/${bd}</span><span style="color:#94a3b8;font-size:20px">=</span><span class="equiv-anim" style="color:#0ea5e9">${sn}/${sd}</span>`;
  if(g>1&&(sn2!==bn||sd2!==bd))h+=`<span style="color:#94a3b8;font-size:20px">=</span><span class="equiv-anim" style="color:#22c55e">${sn2}/${sd2}（最简）</span>`;
  if(!h)h=`<span style="color:#64748b">调整滑块探索等值分数</span>`;
  $('equivList').innerHTML=h;
}

/* ===== Compare Game ===== */
function genFracs(){
  const mx=gDiff===1?6:gDiff===2?9:12;
  const d1=rInt(2,mx),n1=rInt(1,d1);let d2,n2;
  if(gDiff===1){d2=d1;n2=rInt(1,d1);while(n2===n1)n2=rInt(1,d1)}
  else{d2=rInt(2,mx);n2=rInt(1,d2);while(n1/d1===n2/d2){d2=rInt(2,mx);n2=rInt(1,d2)}}
  return{f1:{n:n1,d:d1},f2:{n:n2,d:d2}};
}

function newRound(){gDone=false;const{f1,f2}=genFracs();gF1=f1;gF2=f2;renderG()}

function renderG(){
  const f1=gF1,f2=gF2;
  $('gameCard').innerHTML=`
    <div class="score-bar">得分：<span class="pts">${gScore}</span> / ${gTotal}</div>
    <div style="display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap">
      <div class="game-frac" style="color:#f97316"><span>${f1.n}</span><span class="gf-line"></span><span>${f1.d}</span></div>
      <span class="game-vs">?</span>
      <div class="game-frac" style="color:#0ea5e9"><span>${f2.n}</span><span class="gf-line"></span><span>${f2.d}</span></div>
    </div>
    <div class="feedback" id="gFb"></div>
    <div class="game-btns">
      <button onclick="ans('lt')" ${gDone?'disabled':''}>&lt; 小于</button>
      <button onclick="ans('eq')" ${gDone?'disabled':''} style="border-color:#3b82f6;color:#3b82f6">= 等于</button>
      <button onclick="ans('gt')" ${gDone?'disabled':''}>&gt; 大于</button>
    </div>`;
}

function ans(a){
  if(gDone)return;gDone=true;gTotal++;
  const v1=gF1.n/gF1.d,v2=gF2.n/gF2.d;
  const ok=v1>v2?'gt':v1<v2?'lt':'eq';
  const correct=a===ok;if(correct)gScore++;
  const fb=$('gFb'),sym=ok==='gt'?'>':ok==='lt'?'<':'=';
  fb.className='feedback '+(correct?'fb-ok':'fb-no');
  fb.textContent=correct?'回答正确！':`答错了！ ${gF1.n}/${gF1.d} ${sym} ${gF2.n}/${gF2.d}`;
  renderG();
}

/* ===== Mode / Controls ===== */
const panels=['panelPaint','panelEquiv','panelGame'],ctrls=['ctrlPaint','ctrlEquiv','ctrlGame'];
function setMode(m){
  mode=m;
  document.querySelectorAll('.tab-bar')[0].querySelectorAll('.tab-btn').forEach((b,i)=>
    b.classList.toggle('active',['paint','equiv','game'][i]===m));
  const idx={paint:0,equiv:1,game:2}[m];
  panels.forEach((p,i)=>$(p).style.display=i===idx?'':'none');
  ctrls.forEach((c,i)=>$(c).style.display=i===idx?'':'none');
  if(m==='paint'){drawPaint();updFrac()}
  if(m==='equiv')updEquiv();
  if(m==='game'){if(!gTotal)newRound();else renderG()}
}
function setShape(s,btn){
  shape=s;btn.parentElement.querySelectorAll('.shape-btn').forEach((b,i)=>
    b.classList.toggle('active',['circle','rect','line'][i]===s));
  drawPaint();
}
function setDiff(d,btn){
  gDiff=d;btn.parentElement.querySelectorAll('.shape-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');newRound();
}
function onSlider(){
  den=+$('denSlider').value;num=+$('numSlider').value;
  $('numSlider').max=den;if(num>den){num=den;$('numSlider').value=den}
  syncPaint();drawPaint();updFrac();
}
function load(d,n){
  $('denSlider').value=d;$('numSlider').max=d;$('numSlider').value=n;
  den=d;num=n;syncPaint();drawPaint();updFrac();
}
function resetAll(){load(4,3);gScore=0;gTotal=0;setMode('paint')}

/* Init */
syncPaint();drawPaint();updFrac();
</script>
</body>
</html>
