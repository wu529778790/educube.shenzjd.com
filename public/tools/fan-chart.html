<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>扇形统计图 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 290px; height: 100%; }
    .canvas-area { padding: 20px; overflow-y: auto; background: linear-gradient(135deg, #ecfdf5 0%, #fdfaf4 100%); display: flex; flex-direction: column; align-items: center; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 12px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #bbf7d0; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .preset-btn { padding: 6px 0; border-radius: 8px; font-size: 12px; font-weight: 600; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; }
    .preset-btn:hover { border-color: #06b6d4; color: #06b6d4; }
    .data-row { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
    .data-row input { width: 54px; text-align: center; font-size: 13px; font-weight: 600; border: 1.5px solid #e2e8f0; border-radius: 6px; padding: 3px; background: #fff; font-family: var(--edu-font); }
    .data-row input:focus { border-color: var(--edu-accent2); outline: none; }
    .data-row .color-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .data-row .name { width: 48px; font-size: 12px; font-weight: 600; }
    .data-row .pct { font-size: 11px; color: #64748b; min-width: 38px; }
    canvas#chart { max-width: 380px; max-height: 380px; cursor: default; }
    .mode-tabs { display: flex; gap: 4px; background: #f1f5f9; border-radius: 8px; padding: 3px; }
    .mode-tab { flex: 1; padding: 6px 0; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; background: transparent; color: #64748b; font-family: var(--edu-font); }
    .mode-tab.active { background: #fff; color: var(--edu-primary); box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    .chart-toggle { display: flex; gap: 4px; }
    .chart-toggle .edu-btn { flex: 1; justify-content: center; font-size: 12px; padding: 6px 8px; }
    .challenge-score { font-size: 18px; font-weight: 700; color: var(--edu-accent); text-align: center; }
    .guess-input { width: 48px; text-align: center; font-size: 13px; font-weight: 600; border: 1.5px solid #e2e8f0; border-radius: 6px; padding: 3px; font-family: var(--edu-font); }
    .guess-input:focus { border-color: var(--edu-accent); outline: none; }
    .guess-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; font-size: 12px; }
    .guess-row .result { font-weight: 700; min-width: 20px; text-align: center; }
    .hint-text { font-size: 11px; color: #94a3b8; text-align: center; margin-top: 4px; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">扇形统计图</div>
      <div class="edu-toolbar-subtitle">上册 · 第七单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <div class="mode-tabs">
        <button class="mode-tab active" onclick="setMode('edit')">编辑</button>
        <button class="mode-tab" onclick="setMode('animate')">演示</button>
        <button class="mode-tab" onclick="setMode('challenge')">挑战</button>
      </div>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="chart" width="380" height="380"></canvas>
        <div id="legend" style="display:flex;gap:14px;margin-top:10px;flex-wrap:wrap;justify-content:center"></div>
        <div id="hintBar" class="hint-text"></div>
      </div>

      <div class="control-panel">
        <!-- Edit mode panel -->
        <div id="panelEdit">
          <div class="ctrl-section">
            <div class="ctrl-label">图表类型</div>
            <div class="chart-toggle">
              <button class="edu-btn edu-btn-active" id="btnPie" onclick="setChartType('pie')">饼图</button>
              <button class="edu-btn edu-btn-outline" id="btnBar" onclick="setChartType('bar')">柱状图</button>
            </div>
          </div>
          <div class="divider"></div>
          <div class="ctrl-section">
            <div class="ctrl-label">数据输入（实时更新）</div>
            <div id="dataInputs"></div>
          </div>
          <div class="divider"></div>
          <div class="ctrl-section">
            <div class="ctrl-label">预设数据</div>
            <button class="preset-btn" onclick="loadPreset('sport')">课外活动喜好</button>
            <button class="preset-btn" onclick="loadPreset('traffic')">出行方式</button>
            <button class="preset-btn" onclick="loadPreset('fruit')">水果喜好</button>
          </div>
          <div class="divider"></div>
          <div class="info-box">
            <b>扇形统计图知识</b><br/>
            ● 用圆表示总数，扇形表示各部分<br/>
            ● 扇形面积占比 = 该部分占总数的百分比<br/>
            ● 圆心角 = 百分比 x 360°<br/>
            ● 所有百分比之和 = 100%<br/>
            ● 拖拽扇形边界可调整比例
          </div>
        </div>

        <!-- Animate mode panel -->
        <div id="panelAnimate" style="display:none">
          <div class="ctrl-section">
            <div class="ctrl-label">动画控制</div>
            <button class="edu-btn edu-btn-accent" style="width:100%" onclick="playAnimation()">播放构建动画</button>
            <div style="margin-top:6px">
              <label style="font-size:11px;color:#64748b">动画速度</label>
              <input type="range" min="0.5" max="3" step="0.1" value="1" style="width:100%" id="animSpeed">
            </div>
          </div>
          <div class="divider"></div>
          <div class="info-box">
            <b>动画演示说明</b><br/>
            点击"播放构建动画"观看扇形图逐步构建过程。<br/>
            每个扇形按顺序展开，直观展示各部分与整体的关系。
          </div>
        </div>

        <!-- Challenge mode panel -->
        <div id="panelChallenge" style="display:none">
          <div class="ctrl-section">
            <div class="ctrl-label">百分比挑战</div>
            <div class="challenge-score">得分: <span id="scoreVal">0</span></div>
            <div id="guessInputs" style="margin-top:8px"></div>
            <button class="edu-btn edu-btn-accent" style="width:100%;margin-top:8px" onclick="submitGuess()">提交答案</button>
            <button class="edu-btn edu-btn-outline" style="width:100%;margin-top:4px" onclick="newChallenge()">新一轮</button>
          </div>
          <div class="divider"></div>
          <div id="challengeFeedback" class="info-box" style="display:none"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const COLORS = ['#ef4444','#3b82f6','#22c55e','#f97316','#8b5cf6','#eab308','#06b6d4','#ec4899'];
const CX = 190, CY = 190, R = 145, IR = R * 0.35;
const W = 380, H = 380;

let data = [
  { name: '足球', value: 12 },
  { name: '篮球', value: 8 },
  { name: '游泳', value: 6 },
  { name: '跑步', value: 4 },
  { name: '其他', value: 10 },
];

let mode = 'edit';        // edit | animate | challenge
let chartType = 'pie';    // pie | bar
let morphT = 1;           // 0=bar, 1=pie (morph progress)
let morphTarget = 1;
let animProgress = 1;     // 0..1 build animation
let animRunning = false;
let challengeData = null;
let challengeScore = 0;
let challengeRound = 0;

// Drag state
let dragging = false;
let dragIndex = -1;

// Cached angles for smooth transitions
let displayAngles = [];
let targetAngles = [];

function getTotal() { return data.reduce((s, d) => s + d.value, 0); }

function calcAngles(arr) {
  const total = arr.reduce((s, d) => s + d.value, 0);
  if (total === 0) return arr.map(() => 0);
  return arr.map(d => (d.value / total) * Math.PI * 2);
}

function initAngles() {
  targetAngles = calcAngles(data);
  if (displayAngles.length !== data.length) displayAngles = targetAngles.slice();
}

function lerpAngles() {
  targetAngles = calcAngles(data);
  while (displayAngles.length < targetAngles.length) displayAngles.push(0);
  while (displayAngles.length > targetAngles.length) displayAngles.pop();
  for (let i = 0; i < displayAngles.length; i++) {
    displayAngles[i] += (targetAngles[i] - displayAngles[i]) * 0.18;
    if (Math.abs(displayAngles[i] - targetAngles[i]) < 0.001) displayAngles[i] = targetAngles[i];
  }
}

function buildInputs() {
  const el = document.getElementById('dataInputs');
  el.innerHTML = '';
  const total = getTotal();
  data.forEach((d, i) => {
    const pct = total > 0 ? (d.value / total * 100).toFixed(1) : '0.0';
    const row = document.createElement('div');
    row.className = 'data-row';
    row.innerHTML = `<div class="color-dot" style="background:${COLORS[i%COLORS.length]}"></div>
      <input type="text" class="name" value="${d.name}" oninput="onDataEdit(${i},'name',this.value)"/>
      <input type="number" value="${d.value}" min="0" max="999" oninput="onDataEdit(${i},'value',this.value)"/>
      <span class="pct">${pct}%</span>`;
    el.appendChild(row);
  });
}

function onDataEdit(i, field, val) {
  if (field === 'value') {
    data[i].value = Math.max(0, parseInt(val) || 0);
  } else {
    data[i].name = val;
  }
  initAngles();
}

// ─── Drawing ───
function draw() {
  const canvas = document.getElementById('chart');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  if (mode === 'challenge' && challengeData) {
    drawSlices(ctx, calcAngles(challengeData), challengeData, false, true);
  } else {
    lerpAngles();
    const arr = (mode === 'challenge') ? data : data;
    const angles = displayAngles;
    const mp = morphT;
    if (mp >= 0.99) {
      drawSlices(ctx, angles, data, true, false);
    } else {
      drawMorph(ctx, angles, data, mp);
    }
  }
}

function drawSlices(ctx, angles, arr, showLabels, hidePercent) {
  const total = arr.reduce((s, d) => s + d.value, 0);
  let start = -Math.PI / 2;
  const buildEnd = Math.PI * 2 * animProgress;

  angles.forEach((sweep, i) => {
    if (sweep < 0.0001) { start += sweep; return; }
    const effectiveSweep = Math.min(sweep, Math.max(0, buildEnd - (start + Math.PI / 2)));
    if (effectiveSweep < 0.0001) { start += sweep; return; }

    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, start, start + effectiveSweep);
    ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    if (showLabels && effectiveSweep > 0.05) {
      const mid = start + effectiveSweep / 2;
      const lr = R * 0.68;
      const lx = CX + lr * Math.cos(mid);
      const ly = CY + lr * Math.sin(mid);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(arr[i].name, lx, ly - 8);
      if (!hidePercent) {
        const pct = total > 0 ? (arr[i].value / total * 100).toFixed(1) : '0.0';
        ctx.fillText(pct + '%', lx, ly + 8);
      }
    }
    start += sweep;
  });

  // Donut hole
  ctx.beginPath();
  ctx.arc(CX, CY, IR, 0, Math.PI * 2);
  ctx.fillStyle = '#fdfbf7';
  ctx.fill();
  if (showLabels || animProgress >= 1) {
    ctx.fillStyle = '#1a3a5c';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('总计', CX, CY - 10);
    ctx.fillText(total.toString(), CX, CY + 12);
  }

  // Drag handles (edit mode, pie only)
  if (mode === 'edit' && chartType === 'pie' && animProgress >= 1) {
    start = -Math.PI / 2;
    angles.forEach((sweep, i) => {
      if (sweep < 0.01) { start += sweep; return; }
      const hx = CX + R * Math.cos(start);
      const hy = CY + R * Math.sin(start);
      ctx.beginPath();
      ctx.arc(hx, hy, 6, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.strokeStyle = COLORS[(i) % COLORS.length];
      ctx.lineWidth = 2.5;
      ctx.stroke();
      start += sweep;
    });
  }
}

function drawMorph(ctx, angles, arr, t) {
  // t: 0 = bar, 1 = pie
  const total = arr.reduce((s, d) => s + d.value, 0);
  if (total === 0) return;
  const maxVal = Math.max(...arr.map(d => d.value));
  const barW = (W - 60) / arr.length;
  const barMaxH = H - 80;

  let pieStart = -Math.PI / 2;
  angles.forEach((sweep, i) => {
    if (sweep < 0.0001) return;
    const pct = arr[i].value / total;
    const barH = (arr[i].value / maxVal) * barMaxH;
    const barX = 30 + i * barW + barW * 0.15;
    const barWid = barW * 0.7;
    const barY = H - 40 - barH;

    // Pie slice vertices
    const pStart = pieStart;
    const pEnd = pieStart + sweep;
    const steps = 20;
    const piePts = [];
    piePts.push({ x: CX, y: CY });
    for (let s = 0; s <= steps; s++) {
      const a = pStart + (pEnd - pStart) * s / steps;
      piePts.push({ x: CX + R * Math.cos(a), y: CY + R * Math.sin(a) });
    }
    piePts.push({ x: CX, y: CY });

    // Bar vertices
    const barPts = [
      { x: barX, y: H - 40 },
      { x: barX, y: barY },
      { x: barX + barWid, y: barY },
      { x: barX + barWid, y: H - 40 }
    ];

    // Interpolate
    const nPie = piePts.length;
    const nBar = barPts.length;
    const n = Math.max(nPie, nBar);
    ctx.beginPath();
    for (let s = 0; s < n; s++) {
      const pi = Math.min(s, nPie - 1);
      const bi = Math.min(s * (nBar - 1) / (n - 1) | 0, nBar - 1);
      const x = barPts[bi].x * (1 - t) + piePts[pi].x * t;
      const y = barPts[bi].y * (1 - t) + piePts[pi].y * t;
      if (s === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Label
    const lp = t;
    const barLx = barX + barWid / 2, barLy = barY - 12;
    const pieMid = pStart + sweep / 2;
    const pieLx = CX + R * 0.68 * Math.cos(pieMid);
    const pieLy = CY + R * 0.68 * Math.sin(pieMid);
    const lx = barLx * (1 - lp) + pieLx * lp;
    const ly = barLy * (1 - lp) + pieLy * lp;
    ctx.fillStyle = t < 0.5 ? '#333' : '#fff';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (t > 0.3) {
      ctx.fillText(arr[i].name, lx, ly - 7);
      ctx.fillText((pct * 100).toFixed(1) + '%', lx, ly + 7);
    } else {
      ctx.fillText(arr[i].name, lx, ly - 7);
      ctx.fillText(arr[i].value.toString(), lx, ly + 7);
    }

    pieStart += sweep;
  });

  // Donut hole fades in
  if (t > 0.5) {
    ctx.globalAlpha = (t - 0.5) * 2;
    ctx.beginPath();
    ctx.arc(CX, CY, IR, 0, Math.PI * 2);
    ctx.fillStyle = '#fdfbf7';
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function updateLegend() {
  const el = document.getElementById('legend');
  const arr = (mode === 'challenge' && challengeData) ? challengeData : data;
  const total = arr.reduce((s, d) => s + d.value, 0);
  el.innerHTML = '';
  if (mode === 'challenge') return;
  arr.forEach((d, i) => {
    if (total === 0) return;
    const pct = (d.value / total * 100).toFixed(1);
    const angle = (d.value / total * 360).toFixed(1);
    el.innerHTML += `<span style="display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600">
      <span style="width:10px;height:10px;border-radius:2px;background:${COLORS[i%COLORS.length]}"></span>
      ${d.name} ${pct}% (${angle}°)</span>`;
  });
}

function updateHint() {
  const el = document.getElementById('hintBar');
  if (mode === 'edit' && chartType === 'pie') {
    el.textContent = '拖拽扇形边界上的圆点可调整各部分比例';
  } else if (mode === 'edit' && chartType === 'bar') {
    el.textContent = '在右侧输入数据可实时更新柱状图';
  } else if (mode === 'animate') {
    el.textContent = animRunning ? '动画播放中...' : '点击右侧"播放构建动画"开始';
  } else if (mode === 'challenge') {
    el.textContent = '观察扇形图，估算各部分百分比并填写';
  }
}

// ─── Dragging ───
function getBoundaryAngles() {
  const angles = displayAngles;
  const bounds = [];
  let start = -Math.PI / 2;
  for (let i = 0; i < angles.length; i++) {
    bounds.push(start);
    start += angles[i];
  }
  return bounds;
}

function canvasMousePos(e) {
  const canvas = document.getElementById('chart');
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function findNearestBoundary(mx, my) {
  const bounds = getBoundaryAngles();
  let minDist = Infinity, idx = -1;
  for (let i = 1; i < bounds.length; i++) {
    const a = bounds[i];
    const hx = CX + R * Math.cos(a);
    const hy = CY + R * Math.sin(a);
    const d = Math.hypot(mx - hx, my - hy);
    if (d < minDist) { minDist = d; idx = i; }
  }
  return minDist < 20 ? idx : -1;
}

function onCanvasDown(e) {
  if (mode !== 'edit' || chartType !== 'pie') return;
  const { x, y } = canvasMousePos(e);
  const idx = findNearestBoundary(x, y);
  if (idx >= 0) {
    dragging = true;
    dragIndex = idx;
    document.getElementById('chart').style.cursor = 'grabbing';
  }
}

function onCanvasMove(e) {
  const canvas = document.getElementById('chart');
  if (mode !== 'edit' || chartType !== 'pie') { canvas.style.cursor = 'default'; return; }
  const { x, y } = canvasMousePos(e);

  if (dragging && dragIndex >= 0) {
    let angle = Math.atan2(y - CY, x - CX);
    // Normalize to start from -PI/2 going clockwise
    if (angle < -Math.PI / 2) angle += Math.PI * 2;
    const total = getTotal();
    if (total === 0) return;
    const totalRad = Math.PI * 2;
    const targetAngle = angle;
    const bounds = getBoundaryAngles();
    const prevBound = bounds[dragIndex - 1] !== undefined ? bounds[dragIndex - 1] : -Math.PI / 2;

    // Compute desired sweep for slice dragIndex-1
    let newSweep = targetAngle - prevBound;
    if (newSweep < 0.05) newSweep = 0.05;
    if (newSweep > totalRad - (data.length - 1) * 0.05) newSweep = totalRad - (data.length - 1) * 0.05;

    const oldSweep = displayAngles[dragIndex - 1];
    const diff = newSweep - oldSweep;
    const remaining = totalRad - newSweep;
    const otherTotal = displayAngles.reduce((s, a, j) => j !== dragIndex - 1 ? s + a : s, 0);

    displayAngles[dragIndex - 1] = newSweep;
    if (otherTotal > 0) {
      for (let j = 0; j < displayAngles.length; j++) {
        if (j !== dragIndex - 1) {
          displayAngles[j] = (displayAngles[j] / otherTotal) * remaining;
        }
      }
    }

    // Convert angles back to values
    data.forEach((d, i) => {
      d.value = Math.max(1, Math.round((displayAngles[i] / totalRad) * total));
    });
    // Correct rounding
    const newTotal = data.reduce((s, d) => s + d.value, 0);
    data[0].value += total - newTotal;
    data[0].value = Math.max(1, data[0].value);
    targetAngles = calcAngles(data);
    buildInputs();
    updateLegend();
  } else {
    const { x: mx, y: my } = canvasMousePos(e);
    const idx = findNearestBoundary(mx, my);
    canvas.style.cursor = idx >= 0 ? 'grab' : 'default';
  }
}

function onCanvasUp() {
  if (dragging) {
    dragging = false;
    dragIndex = -1;
    document.getElementById('chart').style.cursor = 'default';
  }
}

// ─── Mode switching ───
function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach((t, i) => {
    t.classList.toggle('active', ['edit','animate','challenge'][i] === m);
  });
  document.getElementById('panelEdit').style.display = m === 'edit' ? '' : 'none';
  document.getElementById('panelAnimate').style.display = m === 'animate' ? '' : 'none';
  document.getElementById('panelChallenge').style.display = m === 'challenge' ? '' : 'none';

  animProgress = 1;
  animRunning = false;

  if (m === 'challenge') newChallenge();
  if (m === 'animate') { animProgress = 0; animRunning = false; }
  updateHint();
}

function setChartType(t) {
  chartType = t;
  morphTarget = t === 'pie' ? 1 : 0;
  document.getElementById('btnPie').className = 'edu-btn ' + (t === 'pie' ? 'edu-btn-active' : 'edu-btn-outline');
  document.getElementById('btnBar').className = 'edu-btn ' + (t === 'bar' ? 'edu-btn-active' : 'edu-btn-outline');
  updateHint();
}

// ─── Build animation ───
function playAnimation() {
  animProgress = 0;
  animRunning = true;
  updateHint();
}

function tickAnimation() {
  if (!animRunning) return;
  const speed = parseFloat(document.getElementById('animSpeed').value) || 1;
  animProgress += 0.008 * speed;
  if (animProgress >= 1) {
    animProgress = 1;
    animRunning = false;
    updateHint();
  }
}

// ─── Challenge mode ───
function newChallenge() {
  const presets = [
    [{name:'A',value:30},{name:'B',value:20},{name:'C',value:15},{name:'D',value:35}],
    [{name:'甲',value:25},{name:'乙',value:25},{name:'丙',value:25},{name:'丁',value:25}],
    [{name:'红',value:10},{name:'黄',value:20},{name:'蓝',value:30},{name:'绿',value:40}],
    [{name:'春',value:15},{name:'夏',value:35},{name:'秋',value:20},{name:'冬',value:30}],
    [{name:'语文',value:28},{name:'数学',value:22},{name:'英语',value:18},{name:'体育',value:32}],
    [{name:'苹果',value:40},{name:'橘子',value:15},{name:'香蕉',value:25},{name:'葡萄',value:20}],
  ];
  challengeData = presets[challengeRound % presets.length];
  challengeRound++;
  const el = document.getElementById('guessInputs');
  el.innerHTML = '';
  challengeData.forEach((d, i) => {
    el.innerHTML += `<div class="guess-row">
      <div class="color-dot" style="background:${COLORS[i]}"></div>
      <span style="width:36px;font-weight:600">${d.name}</span>
      <input class="guess-input" id="guess${i}" type="number" min="0" max="100" placeholder="?"/>%
      <span class="result" id="gres${i}"></span>
    </div>`;
  });
  document.getElementById('challengeFeedback').style.display = 'none';
}

function submitGuess() {
  if (!challengeData) return;
  const total = challengeData.reduce((s, d) => s + d.value, 0);
  let roundScore = 0;
  let allCorrect = true;
  challengeData.forEach((d, i) => {
    const input = document.getElementById('guess' + i);
    const res = document.getElementById('gres' + i);
    const actual = Math.round(d.value / total * 100);
    const guess = parseInt(input.value);
    const diff = Math.abs(guess - actual);
    if (diff === 0) {
      res.textContent = '✓';
      res.style.color = '#22c55e';
      roundScore += 25;
    } else if (diff <= 3) {
      res.textContent = '~';
      res.style.color = '#f97316';
      roundScore += 15;
      allCorrect = false;
    } else if (diff <= 8) {
      res.textContent = '△';
      res.style.color = '#eab308';
      roundScore += 5;
      allCorrect = false;
    } else {
      res.textContent = '✗';
      res.style.color = '#ef4444';
      allCorrect = false;
    }
    // Show actual answer
    input.value = actual;
  });
  if (allCorrect) roundScore += 25; // bonus
  challengeScore += roundScore;
  document.getElementById('scoreVal').textContent = challengeScore;
  const fb = document.getElementById('challengeFeedback');
  fb.style.display = '';
  fb.innerHTML = allCorrect
    ? `<b style="color:#22c55e">完全正确！+${roundScore}分</b><br/>答案完全一致，非常棒！`
    : `<b>本轮得分：${roundScore}分</b><br/>实际百分比已填入，绿色✓=完全正确，橙色~=接近，黄色△=偏差较大，红色✗=需再练习`;
}

// ─── Presets ───
function loadPreset(type) {
  if (type === 'sport') {
    data = [{ name:'足球',value:12 },{ name:'篮球',value:8 },{ name:'游泳',value:6 },{ name:'跑步',value:4 },{ name:'其他',value:10 }];
  } else if (type === 'traffic') {
    data = [{ name:'步行',value:8 },{ name:'公交',value:15 },{ name:'私家车',value:10 },{ name:'自行车',value:12 },{ name:'地铁',value:5 }];
  } else if (type === 'fruit') {
    data = [{ name:'苹果',value:18 },{ name:'香蕉',value:12 },{ name:'草莓',value:15 },{ name:'葡萄',value:8 },{ name:'西瓜',value:7 }];
  }
  displayAngles = calcAngles(data);
  targetAngles = displayAngles.slice();
  buildInputs();
  updateLegend();
}

function resetAll() {
  challengeScore = 0;
  document.getElementById('scoreVal').textContent = '0';
  setChartType('pie');
  loadPreset('sport');
}

// ─── Render loop ───
function loop() {
  // Morph animation
  if (morphT !== morphTarget) {
    const diff = morphTarget - morphT;
    morphT += diff * 0.1;
    if (Math.abs(diff) < 0.005) morphT = morphTarget;
  }
  tickAnimation();
  draw();
  updateLegend();
  requestAnimationFrame(loop);
}

// ─── Init ───
const canvas = document.getElementById('chart');
canvas.addEventListener('mousedown', onCanvasDown);
canvas.addEventListener('mousemove', onCanvasMove);
window.addEventListener('mouseup', onCanvasUp);
canvas.addEventListener('touchstart', e => { e.preventDefault(); onCanvasDown(e.touches[0]); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); onCanvasMove(e.touches[0]); }, { passive: false });
canvas.addEventListener('touchend', onCanvasUp);

initAngles();
displayAngles = targetAngles.slice();
buildInputs();
updateHint();
loop();
</script>
