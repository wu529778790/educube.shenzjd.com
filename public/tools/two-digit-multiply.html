<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>两位数乘两位数 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 260px; height: 100%; }
    .canvas-area { padding: 20px; overflow-y: auto; background: linear-gradient(135deg, #f5f3ff 0%, #fdfaf4 100%); display: flex; flex-direction: column; align-items: center; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 14px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #ddd6fe; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .input-row { display: flex; align-items: center; gap: 10px; justify-content: center; margin: 10px 0; }
    .input-row input { width: 80px; text-align: center; font-size: 22px; font-weight: 800; border: 2px solid #e2e8f0; border-radius: 10px; padding: 8px; font-family: 'Courier New', monospace; }
    .input-row span { font-size: 24px; font-weight: 800; color: #94a3b8; }
    .preset-btn { padding: 8px 0; border-radius: 8px; font-size: 13px; font-weight: 600; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; }
    .preset-btn:hover { border-color: #8b5cf6; color: #8b5cf6; }
    /* vertical multiply */
    .vmul { display: flex; flex-direction: column; align-items: flex-end; font-family: 'Courier New', monospace; font-size: 22px; font-weight: 700; line-height: 1.7; background: #fff; border: 2px solid #8b5cf6; border-radius: 14px; padding: 20px 24px; min-width: 200px; }
    .vmul-row { display: flex; align-items: center; white-space: pre; }
    .hl-purple { color: #8b5cf6; }
    .hl-rose { color: #f43f5e; }
    .hl-green { color: #22c55e; }
    .result-big { font-size: 24px; font-weight: 800; color: #22c55e; }
    /* area model */
    .area-model { display: grid; gap: 2px; background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-top: 12px; }
    .area-label { display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #64748b; min-height: 24px; }
    .area-cell { display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 14px; font-weight: 700; min-height: 40px; transition: all .2s; }
    .area-a { background: #ede9fe; color: #7c3aed; }
    .area-b { background: #fce7f3; color: #db2777; }
    .area-c { background: #dbeafe; color: #2563eb; }
    .area-d { background: #dcfce7; color: #16a34a; }
    .step-line { margin: 4px 0; font-size: 14px; line-height: 1.8; }
    .step-line .hl { background: #f5f3ff; padding: 2px 8px; border-radius: 6px; font-weight: 700; color: #8b5cf6; }
    .step-num { display: inline-block; width: 22px; height: 22px; background: #8b5cf6; color: #fff; border-radius: 50%; text-align: center; font-size: 12px; font-weight: 800; line-height: 22px; margin-right: 6px; }
    .step-card { background: #fff; border-radius: 14px; padding: 16px; width: 100%; max-width: 480px; margin-top: 12px; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">✖ 两位数乘两位数</div>
      <div class="edu-toolbar-subtitle">下册 · 第四单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-primary" onclick="calculate()">计算</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <div class="input-row">
          <input type="number" id="numA" value="23" min="10" max="99" oninput="calculate()"/>
          <span>×</span>
          <input type="number" id="numB" value="14" min="10" max="99" oninput="calculate()"/>
          <span>=</span>
          <span style="color:#22c55e;font-size:22px;font-weight:800" id="quickResult">322</span>
        </div>
        <div id="calcArea"></div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">预设例题</div>
          <button class="preset-btn" onclick="load(23,14)">23 × 14</button>
          <button class="preset-btn" onclick="load(45,12)">45 × 12</button>
          <button class="preset-btn" onclick="load(36,25)">36 × 25</button>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <b>竖式乘法法则</b><br/>
          ● 用第二个乘数的个位去乘第一个数<br/>
          ● 再用十位去乘第一个数<br/>
          ● 十位乘得的结果末位与十位对齐<br/>
          ● 最后把两次乘积加起来<br/>
          ● 面积模型帮助理解算理
        </div>
      </div>
    </div>
  </div>
</div>
<script>
function calculate() {
  const a = parseInt(document.getElementById('numA').value) || 0;
  const b = parseInt(document.getElementById('numB').value) || 0;
  if (a < 10 || a > 99 || b < 10 || b > 99) {
    document.getElementById('calcArea').innerHTML = '<div style="color:#ef4444;font-weight:700">请输入10-99的两位数</div>';
    return;
  }
  const product = a * b;
  document.getElementById('quickResult').textContent = product;

  const a1 = Math.floor(a / 10), a2 = a % 10; // tens, ones of a
  const b1 = Math.floor(b / 10), b2 = b % 10; // tens, ones of b
  const p1 = a * b2;  // first partial: a × ones of b
  const p2 = a * b1;  // second partial: a × tens of b
  const fullP2 = p2 * 10; // shifted

  // Vertical multiplication
  const w = String(product).length;
  const pad = (n, len) => String(n).padStart(len, ' ');
  let vhtml = '<div class="vmul">';
  vhtml += `<div class="vmul-row">${pad(a, w + 1)}</div>`;
  vhtml += `<div class="vmul-row">× ${pad(b, w)}</div>`;
  vhtml += `<div class="vmul-row" style="border-top:2px solid #334155;border-bottom:1px dashed #94a3b8;margin-top:2px;padding-top:2px"><span class="hl-purple">${pad(p1, w + 1)}</span>  <span style="font-size:12px;color:#8b5cf6">← ${a}×${b2}</span></div>`;
  vhtml += `<div class="vmul-row"><span class="hl-rose">${pad(p2, w)}</span>  <span style="font-size:12px;color:#f43f5e">← ${a}×${b1}</span></div>`;
  vhtml += `<div class="vmul-row" style="border-top:2px solid #334155;margin-top:2px;padding-top:2px"><span class="hl-green">${pad(product, w + 1)}</span></div>`;
  vhtml += '</div>';

  // Area model
  const da = a1 * b1, db = a2 * b1, dc = a1 * b2, dd = a2 * b2;
  const maxPart = Math.max(da, db, dc, dd, 1);
  let areaHtml = `<div class="area-model" style="grid-template-columns:40px 1fr 1fr;grid-template-rows:30px 1fr 1fr;">`;
  areaHtml += `<div class="area-label"></div>`;
  areaHtml += `<div class="area-label" style="color:#7c3aed">${a1}（十位）</div>`;
  areaHtml += `<div class="area-label" style="color:#7c3aed">${a2}（个位）</div>`;
  areaHtml += `<div class="area-label" style="color:#db2777">${b1}（十位）</div>`;
  areaHtml += `<div class="area-cell area-a">${da}</div>`;
  areaHtml += `<div class="area-cell area-b">${db}</div>`;
  areaHtml += `<div class="area-label" style="color:#db2777">${b2}（个位）</div>`;
  areaHtml += `<div class="area-cell area-c">${dc}</div>`;
  areaHtml += `<div class="area-cell area-d">${dd}</div>`;
  areaHtml += `</div>`;
  areaHtml += `<div style="text-align:center;margin-top:8px;font-size:13px;color:#64748b">${da} + ${db} + ${dc} + ${dd} = <b style="color:#22c55e">${product}</b></div>`;

  // Steps
  let shtml = '<div class="step-card">';
  shtml += '<div style="font-size:15px;font-weight:700;color:#334155;margin-bottom:8px">分步计算</div>';
  shtml += `<div class="step-line"><span class="step-num">1</span>${a} × ${b2}（个位）= <span class="hl">${p1}</span></div>`;
  shtml += `<div class="step-line"><span class="step-num">2</span>${a} × ${b1}（十位）= <span class="hl">${p2}</span>，左移一位 → ${fullP2}</div>`;
  shtml += `<div class="step-line"><span class="step-num">3</span>${p1} + ${fullP2} = <span class="hl">${product}</span></div>`;
  shtml += '</div>';

  document.getElementById('calcArea').innerHTML = vhtml + areaHtml + shtml;
}

function load(a, b) {
  document.getElementById('numA').value = a;
  document.getElementById('numB').value = b;
  calculate();
}

function resetAll() { load(23, 14); }
calculate();
</script>
</body>
</html>
