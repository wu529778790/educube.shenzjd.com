<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>一元一次方程 — 教立方</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
  *{box-sizing:border-box}body{font-family:var(--edu-font);margin:0}
  .tool{width:100vw;height:100vh;display:flex;flex-direction:column;background:var(--edu-bg)}
  .toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#fff;border-bottom:1px solid var(--edu-border)}
  .toolbar h1{font-size:15px;color:var(--edu-primary);margin:0}
  .toolbar span{font-size:11px;color:var(--edu-text-muted);background:#f1f5f9;padding:2px 8px;border-radius:12px}
  .main{flex:1;display:grid;grid-template-columns:1fr 290px;overflow:hidden}
  .canvas-wrap{position:relative;overflow:hidden;background:linear-gradient(135deg,#fff1f2,#fef2f2)}
  .canvas-wrap canvas{width:100%;height:100%;display:block}
  .panel{background:#fff;border-left:1px solid var(--edu-border);padding:12px;display:flex;flex-direction:column;gap:8px;overflow:auto}
  .section{display:flex;flex-direction:column;gap:4px}
  .label{font-size:10px;font-weight:700;color:#64748b;letter-spacing:.05em}
  .divider{height:1px;background:var(--edu-border)}
  .btn{padding:6px 12px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--edu-font);transition:all .15s}
  .btn-primary{background:#e11d48;color:#fff}
  .btn-primary:hover{background:#be123c}
  .btn-default{background:#f1f5f9;color:#334155}
  .btn-default:hover{background:#e2e8f0}
  .row{display:flex;gap:4px;flex-wrap:wrap}

  .eq-box{text-align:center;padding:10px;background:#fef2f2;border:2px solid #fda4af;border-radius:12px}
  .eq-box .eq{font-size:22px;font-weight:800;color:#be123c;font-family:monospace}
  .eq-box .sub{font-size:11px;color:#e11d48;margin-top:4px}

  .step-list{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:8px;font-size:11px;line-height:2;max-height:200px;overflow:auto}
  .step-list .step{color:#334155}
  .step-list .highlight{color:#be123c;font-weight:700}

  .quiz-card{background:#fef2f2;border:2px solid #fda4af;border-radius:12px;padding:10px;text-align:center}
  .quiz-q{font-size:13px;font-weight:700;color:#be123c}
  .quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px}
  .quiz-opt{padding:6px;border:2px solid #e2e8f0;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;font-family:var(--edu-font)}
  .quiz-opt:hover{border-color:#e11d48}
  .quiz-opt.correct{background:#dcfce7;border-color:#22c55e}
  .quiz-opt.wrong{background:#fef2f2;border-color:#ef4444}
  .quiz-result{font-size:11px;font-weight:700;margin-top:4px;min-height:16px}

  .info{font-size:11px;line-height:1.8;color:#334155;background:#fff;border:1px solid #fecdd3;border-radius:8px;padding:8px 10px}
  .info b{color:#be123c}
</style>
</head>
<body>
<div class="tool">
  <div class="toolbar">
    <h1>📝 一元一次方程</h1>
    <span>七年级上册 · 第三章</span>
  </div>
  <div class="main">
    <div class="canvas-wrap"><canvas id="cv"></canvas></div>
    <div class="panel">
      <div class="eq-box">
        <div class="eq" id="eq-display">3x - 2 = 7</div>
        <div class="sub" id="eq-sub">选择方程开始解题</div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">选择方程</div>
        <div class="row">
          <button class="btn btn-default" onclick="loadEq('3x-2=7')">3x-2=7</button>
          <button class="btn btn-default" onclick="loadEq('2x+5=13')">2x+5=13</button>
          <button class="btn btn-default" onclick="loadEq('5x-3=2x+9')">5x-3=2x+9</button>
          <button class="btn btn-default" onclick="loadEq('4(x-1)=12')">4(x-1)=12</button>
          <button class="btn btn-default" onclick="loadEq('(x+2)/3=5')">(x+2)/3=5</button>
          <button class="btn btn-default" onclick="loadEq('3x+1=2x-4')">3x+1=2x-4</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">解题步骤</div>
        <div class="step-list" id="steps">点击方程查看解题过程</div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">方程测验</div>
        <div class="quiz-card" id="quiz-card"></div>
      </div>
      <div class="divider"></div>
      <div class="info">
        <b>一元一次方程解法</b><br/>
        ● <strong>移项</strong>：把含x的项移到左边，常数移到右边<br/>
        ● 移项要<strong>变号</strong>（+变-，-变+）<br/>
        ● <strong>合并同类项</strong>：系数相加减<br/>
        ● <strong>系数化1</strong>：两边÷x的系数<br/>
        ● 最后<strong>代入验证</strong>
      </div>
    </div>
  </div>
</div>
<script>
var cv, ctx;
var _equations = {
  '3x-2=7': {
    steps: ['原方程：3x - 2 = 7', '移项（-2移到右边变+2）：3x = 7 + 2', '计算右边：3x = 9', '两边÷3：x = 3', '验证：3×3-2=7 ✓'],
    answer: 3, left: '3x-2', right: '7'
  },
  '2x+5=13': {
    steps: ['原方程：2x + 5 = 13', '移项（+5移到右边变-5）：2x = 13 - 5', '计算右边：2x = 8', '两边÷2：x = 4', '验证：2×4+5=13 ✓'],
    answer: 4, left: '2x+5', right: '13'
  },
  '5x-3=2x+9': {
    steps: ['原方程：5x - 3 = 2x + 9', '移项（2x移左变-2x，-3移右变+3）：5x - 2x = 9 + 3', '合并同类项：3x = 12', '两边÷3：x = 4', '验证：5×4-3=17, 2×4+9=17 ✓'],
    answer: 4, left: '5x-3', right: '2x+9'
  },
  '4(x-1)=12': {
    steps: ['原方程：4(x - 1) = 12', '展开括号：4x - 4 = 12', '移项：4x = 12 + 4', '计算：4x = 16', '两边÷4：x = 4', '验证：4×(4-1)=12 ✓'],
    answer: 4, left: '4(x-1)', right: '12'
  },
  '(x+2)/3=5': {
    steps: ['原方程：(x + 2)/3 = 5', '两边×3：x + 2 = 15', '移项：x = 15 - 2', '计算：x = 13', '验证：(13+2)/3=5 ✓'],
    answer: 13, left: '(x+2)/3', right: '5'
  },
  '3x+1=2x-4': {
    steps: ['原方程：3x + 1 = 2x - 4', '移项：3x - 2x = -4 - 1', '合并：x = -5', '验证：3×(-5)+1=-14, 2×(-5)-4=-14 ✓'],
    answer: -5, left: '3x+1', right: '2x-4'
  },
};

function init() {
  cv = document.getElementById('cv');
  ctx = cv.getContext('2d');
  window.addEventListener('resize', resize);
  resize();
  loadEq('3x-2=7');
  nextQuiz();
}

function resize() {
  var r = cv.parentElement.getBoundingClientRect();
  cv.width = r.width * devicePixelRatio;
  cv.height = r.height * devicePixelRatio;
  cv.style.width = r.width + 'px';
  cv.style.height = r.height + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  draw();
}

function loadEq(key) {
  var eq = _equations[key];
  document.getElementById('eq-display').textContent = key;
  document.getElementById('eq-sub').textContent = 'x = ' + eq.answer;

  var html = '';
  eq.steps.forEach(function(s, i) {
    var isResult = i === eq.steps.length - 1;
    html += '<div class="step">' + (i + 1) + '. ' + (isResult ? '<span class="highlight">' + s + '</span>' : s) + '</div>';
  });
  document.getElementById('steps').innerHTML = html;
  draw();
}

function draw() {
  var w = cv.width / devicePixelRatio, h = cv.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  // Title
  ctx.fillStyle = '#be123c';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('一元一次方程 — 解题可视化', w / 2, 30);

  // Draw all equations as cards
  var keys = Object.keys(_equations);
  var cols = 2, rows = Math.ceil(keys.length / cols);
  var cardW = Math.min((w - 40) / cols, 280);
  var cardH = Math.min((h - 60) / rows, 100);
  cardH = Math.max(cardH, 60);

  keys.forEach(function(key, i) {
    var eq = _equations[key];
    var c = i % cols, r = Math.floor(i / cols);
    var x = (w - cols * cardW) / 2 + c * cardW + 10;
    var y = 50 + r * (cardH + 10);

    // Card background
    ctx.fillStyle = '#fef2f2';
    ctx.beginPath();
    ctx.roundRect(x, y, cardW - 20, cardH, 10);
    ctx.fill();
    ctx.strokeStyle = '#fecdd3';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Equation text
    ctx.fillStyle = '#be123c';
    ctx.font = 'bold ' + Math.max(14, cardH * 0.18) + 'px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(key, x + (cardW - 20) / 2, y + cardH * 0.35);

    // Answer
    ctx.fillStyle = '#16a34a';
    ctx.font = 'bold ' + Math.max(12, cardH * 0.14) + 'px sans-serif';
    ctx.fillText('x = ' + eq.answer, x + (cardW - 20) / 2, y + cardH * 0.6);

    // Steps count
    ctx.fillStyle = '#64748b';
    ctx.font = Math.max(9, cardH * 0.1) + 'px sans-serif';
    ctx.fillText(eq.steps.length + '步', x + (cardW - 20) / 2, y + cardH * 0.82);
  });
}

// ===== Quiz =====
var _quizQs = [
  { q: '解方程 2x = 8，x = ？', opts: ['2', '4', '6', '16'], ans: 1 },
  { q: '解方程 x + 3 = 7，x = ？', opts: ['3', '4', '7', '10'], ans: 1 },
  { q: '移项时需要注意什么？', opts: ['不变号', '变号', '乘系数', '除系数'], ans: 1 },
  { q: '解方程 3x - 5 = 10，x = ？', opts: ['3', '4', '5', '15'], ans: 2 },
  { q: '方程 2(x+1)=8 的解是？', opts: ['x=2', 'x=3', 'x=4', 'x=5'], ans: 1 },
  { q: '方程 5x = 3x + 4 的解是？', opts: ['x=1', 'x=2', 'x=3', 'x=4'], ans: 1 },
];
var _qi = 0, _score = 0;

function nextQuiz() {
  if (_qi >= _quizQs.length) {
    document.getElementById('quiz-card').innerHTML = '<div class="quiz-q">测验完成！答对 ' + _score + ' / ' + _quizQs.length + ' 题</div>';
    return;
  }
  var q = _quizQs[_qi];
  var html = '<div class="quiz-q">第' + (_qi + 1) + '题：' + q.q + '</div><div class="quiz-opts">';
  q.opts.forEach(function(o, i) { html += '<button class="quiz-opt" onclick="answer(' + i + ')">' + o + '</button>'; });
  html += '</div><div class="quiz-result" id="qr"></div>';
  document.getElementById('quiz-card').innerHTML = html;
}

function answer(idx) {
  var q = _quizQs[_qi];
  var opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(function(b, i) {
    b.onclick = null; b.style.cursor = 'default';
    if (i === q.ans) b.classList.add('correct');
    if (i === idx && i !== q.ans) b.classList.add('wrong');
  });
  var r = document.getElementById('qr');
  if (idx === q.ans) { r.textContent = '✓ 正确！'; r.style.color = '#16a34a'; _score++; }
  else { r.textContent = '✗ 正确答案：' + q.opts[q.ans]; r.style.color = '#ef4444'; }
  _qi++;
  setTimeout(nextQuiz, 1200);
}

init();
</script>
</body>
</html>
