<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>正比例与反比例 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 260px; height: 100%; }
    .canvas-area { padding: 24px; overflow-y: auto; background: linear-gradient(135deg, #eff6ff 0%, #fdfaf4 100%); display: flex; flex-direction: column; align-items: center; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 14px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #bfdbfe; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .preset-btn { padding: 8px 0; border-radius: 8px; font-size: 13px; font-weight: 600; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; }
    .preset-btn:hover { border-color: #3b82f6; color: #3b82f6; }
    .tab-bar { display: flex; gap: 6px; margin-bottom: 12px; }
    .tab-btn { padding: 6px 14px; border-radius: 8px; border: 1.5px solid #e2e8f0; background: #fff; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
    .tab-btn.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
    .data-table { width: 100%; max-width: 440px; border-collapse: collapse; margin: 8px 0; }
    .data-table th, .data-table td { border: 1px solid #e2e8f0; padding: 8px; text-align: center; font-size: 14px; font-weight: 600; }
    .data-table th { background: #f1f5f9; color: #1a3a5c; }
    .data-table input { width: 50px; text-align: center; font-size: 14px; font-weight: 700; border: none; background: transparent; }
    .result-box { background: #fff; border: 2px solid #3b82f6; border-radius: 12px; padding: 14px; text-align: center; width: 100%; max-width: 440px; margin: 8px 0; }
    .result-big { font-size: 18px; font-weight: 800; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">📊 正比例与反比例</div>
      <div class="edu-toolbar-subtitle">下册 · 第四单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-primary" onclick="analyze()">分析</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <div class="tab-bar">
          <button class="tab-btn active" onclick="switchMode('direct')">正比例</button>
          <button class="tab-btn" onclick="switchMode('inverse')">反比例</button>
        </div>

        <div style="font-size:14px;font-weight:700;color:#334155" id="modeTitle">正比例 — 两种量的比值一定</div>

        <table class="data-table" id="dataTable">
          <tr><th>X</th><th>Y</th><th id="col3">X/Y</th></tr>
        </table>

        <canvas id="chart" width="420" height="240" style="border:1px solid #e2e8f0;border-radius:8px;background:#fff;margin:8px 0"></canvas>

        <div class="result-box" id="resultBox"></div>
      </div>

      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">预设数据</div>
          <button class="preset-btn" onclick="loadPreset('speed')">速度一定：路程/时间</button>
          <button class="preset-btn" onclick="loadPreset('price')">单价一定：总价/数量</button>
          <button class="preset-btn" onclick="loadPreset('area')">面积一定：长×宽</button>
          <button class="preset-btn" onclick="loadPreset('dist')">距离一定：速度×时间</button>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <b>正比例与反比例</b><br/>
          <b>正比例</b>：y/x = k（定值）<br/>
          ● 一种量变化，另一种量也随着变化<br/>
          ● 比值一定 → 图像是过原点的直线<br/><br/>
          <b>反比例</b>：x×y = k（定值）<br/>
          ● 一种量变化，另一种量相反变化<br/>
          ● 乘积一定 → 图像是双曲线
        </div>
      </div>
    </div>
  </div>
</div>
<script>
let mode = 'direct';
let data = [
  { x: 1, y: 60 },
  { x: 2, y: 120 },
  { x: 3, y: 180 },
  { x: 4, y: 240 },
  { x: 5, y: 300 },
];

function switchMode(m) {
  mode = m;
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', ['direct','inverse'][i] === m));
  document.getElementById('modeTitle').textContent = m === 'direct' ? '正比例 — 两种量的比值一定' : '反比例 — 两种量的乘积一定';
  document.getElementById('col3').textContent = m === 'direct' ? 'X/Y' : 'X×Y';
  analyze();
}

function loadPreset(type) {
  if (type === 'speed') {
    mode = 'direct';
    data = [{x:1,y:60},{x:2,y:120},{x:3,y:180},{x:4,y:240},{x:5,y:300}];
  } else if (type === 'price') {
    mode = 'direct';
    data = [{x:2,y:10},{x:4,y:20},{x:6,y:30},{x:8,y:40},{x:10,y:50}];
  } else if (type === 'area') {
    mode = 'inverse';
    data = [{x:2,y:24},{x:4,y:12},{x:6,y:8},{x:8,y:6},{x:12,y:4}];
  } else if (type === 'dist') {
    mode = 'inverse';
    data = [{x:30,y:2},{x:60,y:1},{x:20,y:3},{x:15,y:4},{x:10,y:6}];
  }
  switchMode(mode);
}

function analyze() {
  // 更新表格
  const table = document.getElementById('dataTable');
  table.innerHTML = `<tr><th>X</th><th>Y</th><th id="col3">${mode === 'direct' ? 'X/Y' : 'X×Y'}</th></tr>`;
  data.forEach((d, i) => {
    const v3 = mode === 'direct' ? (d.y / d.x).toFixed(2) : (d.x * d.y);
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><input type="number" value="${d.x}" onchange="data[${i}].x=parseFloat(this.value);analyze()"/></td>
      <td><input type="number" value="${d.y}" onchange="data[${i}].y=parseFloat(this.value);analyze()"/></td>
      <td style="color:${mode === 'direct' ? '#3b82f6' : '#f97316'};font-weight:700">${v3}</td>`;
    table.appendChild(tr);
  });

  // 判断
  const ratios = data.map(d => mode === 'direct' ? d.y / d.x : d.x * d.y);
  const allSame = ratios.every(r => Math.abs(r - ratios[0]) < 0.01);
  const box = document.getElementById('resultBox');
  if (allSame) {
    box.innerHTML = `<div class="result-big" style="color:#22c55e">✓ ${mode === 'direct' ? '正比例关系' : '反比例关系'}</div>
      <div style="font-size:13px;color:#64748b;margin-top:4px">${mode === 'direct' ? `Y/X = ${ratios[0].toFixed(2)}（定值）` : `X×Y = ${ratios[0]}（定值）`}</div>`;
  } else {
    box.innerHTML = `<div class="result-big" style="color:#ef4444">✗ 不是${mode === 'direct' ? '正' : '反'}比例关系</div>
      <div style="font-size:13px;color:#64748b;margin-top:4px">${mode === 'direct' ? 'Y/X 的值不相同' : 'X×Y 的值不相同'}</div>`;
  }

  drawChart();
}

function drawChart() {
  const canvas = document.getElementById('chart');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = 420 * dpr;
  canvas.height = 240 * dpr;
  canvas.style.width = '420px';
  canvas.style.height = '240px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const w = 420, h = 240;
  const pad = 40;
  const pw = w - pad * 2, ph = h - pad * 2;

  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, w, h);

  const allX = data.map(d => d.x);
  const allY = data.map(d => d.y);
  const maxX = Math.max(...allX) * 1.2;
  const maxY = Math.max(...allY) * 1.2;

  // 坐标轴
  ctx.strokeStyle = '#94a3b8';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pad, pad);
  ctx.lineTo(pad, h - pad);
  ctx.lineTo(w - pad, h - pad);
  ctx.stroke();

  // 刻度
  ctx.fillStyle = '#94a3b8';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  for (let i = 0; i <= 5; i++) {
    const xv = (maxX / 5 * i).toFixed(1);
    const xp = pad + pw * i / 5;
    ctx.fillText(xv, xp, h - pad + 14);
  }
  ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const yv = (maxY / 4 * i).toFixed(0);
    const yp = h - pad - ph * i / 4;
    ctx.fillText(yv, pad - 6, yp + 3);
  }

  // 画点和连线
  const pts = data.map(d => ({
    x: pad + (d.x / maxX) * pw,
    y: h - pad - (d.y / maxY) * ph
  }));

  ctx.beginPath();
  pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.strokeStyle = mode === 'direct' ? '#3b82f6' : '#f97316';
  ctx.lineWidth = 2;
  ctx.stroke();

  pts.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
    ctx.fillStyle = mode === 'direct' ? '#3b82f6' : '#f97316';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
  });

  // 轴标签
  ctx.fillStyle = '#334155';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('X', w - pad + 10, h - pad + 4);
  ctx.fillText('Y', pad - 4, pad - 10);
}

function resetAll() {
  loadPreset('speed');
}

analyze();
</script>
</body>
</html>
