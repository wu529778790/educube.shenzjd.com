<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>平面图形面积推导 — 教立方</title>
  <!-- play-ref:jiaohukejian:1H4RGFX | 自研 -->
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <script src="../edu-lib/three.min.js"></script>
  <script src="../edu-lib/OrbitControls.js"></script>
  <script src="../edu-lib/edu-3d.js"></script>
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr minmax(280px, 300px); height: 100%; }
    .canvas-area { position: relative; background: #f0fdf4; overflow: hidden; min-height: 0; }
    .canvas-area canvas { width: 100%; height: 100%; display: block; }
    .panel { border-left: 1px solid var(--edu-border); padding: 12px; background: var(--edu-surface); overflow: auto; }
    .tabs { display: flex; gap: 6px; margin-bottom: 10px; }
    .tab { flex: 1; padding: 8px; font-size: 12px; font-weight: 700; border-radius: 8px; border: 2px solid var(--edu-border); cursor: pointer; background: #f8fafc; }
    .tab.active { border-color: var(--edu-primary); color: var(--edu-primary); }
    .slider-block label { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; }
    .formula { font-size: 14px; font-weight: 800; color: var(--edu-primary); margin-top: 8px; }
    .orbit-hint { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); font-size: 10px; background: rgba(255,255,255,.92); padding: 4px 10px; border-radius: 14px; color: #64748b; pointer-events: none; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div class="edu-toolbar-lead">
      <span class="edu-toolbar-title">🔺 平面图形面积推导</span>
      <span class="edu-toolbar-subtitle">割补 · 3D</span>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="c3d"></canvas>
        <div class="orbit-hint">拖动底、高、倾斜量</div>
      </div>
      <div class="panel">
        <div class="tabs">
          <button type="button" class="tab active" id="t1">平行四边形</button>
          <button type="button" class="tab" id="t2">三角形</button>
        </div>
        <div class="slider-block"><label><span>底</span><span id="bv">8</span></label><input type="range" id="b" min="4" max="14" value="8" /></div>
        <div class="slider-block"><label><span>高（割补）</span><span id="hv">4</span></label><input type="range" id="h" min="2" max="9" value="4" /></div>
        <div class="slider-block" id="skew-wrap"><label><span>倾斜量</span><span id="sv">3</span></label><input type="range" id="s" min="0" max="8" value="3" /></div>
        <p class="formula" id="f"></p>
      </div>
    </div>
  </div>
</div>
<script>
(function () {
  var canvas = document.getElementById("c3d");
  var b = document.getElementById("b");
  var h = document.getElementById("h");
  var s = document.getElementById("s");
  var mode = "para";

  var ctx = Edu3D.createScene(canvas, {
    bg: 0xf0fdf4,
    fov: 42,
    camX: 7,
    camY: 5,
    camZ: 7,
    lookX: 0,
    lookY: 0.2,
    lookZ: 0,
    minDist: 2,
    maxDist: 22,
  });
  Edu3D.addLights(ctx.scene);
  Edu3D.addGrid(ctx.scene, 12, 12, 0xbbf7d0, -0.72);
  var world = new THREE.Group();
  ctx.scene.add(world);
  var mesh = null;

  function sync() {
    var B = Number(b.value);
    var H = Number(h.value);
    var Sk = Number(s.value);
    document.getElementById("bv").textContent = String(B);
    document.getElementById("hv").textContent = String(H);
    document.getElementById("sv").textContent = String(Sk);

    if (mesh) {
      world.remove(mesh);
      mesh.geometry.dispose();
      mesh.material.dispose();
    }

    var Scl = 0.14;
    if (mode === "para") {
      document.getElementById("f").textContent = "S = 底×高 = " + B + "×" + H + " = " + B * H;
      var sh = new THREE.Shape();
      sh.moveTo(0, 0);
      sh.lineTo(B * Scl + Sk * Scl, 0);
      sh.lineTo(B * Scl, H * Scl);
      sh.lineTo(-Sk * Scl, H * Scl);
      sh.lineTo(0, 0);
      var g = new THREE.ExtrudeGeometry(sh, { depth: 0.12, bevelEnabled: false });
      g.rotateX(-Math.PI / 2);
      mesh = new THREE.Mesh(g, Edu3D.material(0x4ade80));
      mesh.position.y = -0.66;
    } else {
      document.getElementById("f").textContent = "S = ½×底×高 = " + (B * H) / 2;
      var sh2 = new THREE.Shape();
      sh2.moveTo(0, 0);
      sh2.lineTo(B * Scl, 0);
      sh2.lineTo((B * Scl) / 2, H * Scl);
      sh2.lineTo(0, 0);
      var g2 = new THREE.ExtrudeGeometry(sh2, { depth: 0.12, bevelEnabled: false });
      g2.rotateX(-Math.PI / 2);
      mesh = new THREE.Mesh(g2, Edu3D.material(0xfbbf24));
      mesh.position.y = -0.66;
    }
    mesh.castShadow = true;
    world.add(mesh);
  }

  document.getElementById("t1").addEventListener("click", function () {
    mode = "para";
    document.getElementById("skew-wrap").style.display = "";
    document.getElementById("t1").classList.add("active");
    document.getElementById("t2").classList.remove("active");
    sync();
  });
  document.getElementById("t2").addEventListener("click", function () {
    mode = "tri";
    document.getElementById("skew-wrap").style.display = "none";
    document.getElementById("t2").classList.add("active");
    document.getElementById("t1").classList.remove("active");
    sync();
  });
  b.addEventListener("input", sync);
  h.addEventListener("input", sync);
  s.addEventListener("input", sync);

  function onResize() {
    var w = canvas.clientWidth || 400;
    var h0 = canvas.clientHeight || 300;
    ctx.renderer.setSize(w, h0, false);
    ctx.camera.aspect = w / h0;
    ctx.camera.updateProjectionMatrix();
  }
  window.addEventListener("resize", onResize);
  sync();
  onResize();
  Edu3D.startLoop(ctx.scene, ctx.camera, ctx.renderer, ctx.controls, null);
})();
</script>
</body>
</html>
