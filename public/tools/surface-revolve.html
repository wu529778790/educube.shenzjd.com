<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>旋转体生成 — 教立方</title>
  <!-- play-ref:jiaohukejian:0XS1NKY -->
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<script src="../edu-lib/three.min.js"></script>
<script src="../edu-lib/OrbitControls.js"></script>
<script src="../edu-lib/edu-3d.js"></script>
<script src="../edu-lib/edu-tools.js"></script>
<style>
  .main-layout { display:grid; grid-template-columns:1fr 300px; height:100%; }
  .canvas-area { position:relative; background:linear-gradient(135deg,#ecfdf5,#fdfaf4); overflow:hidden; }
  .canvas-area canvas { width:100%; height:100%; display:block; }
  .control-panel { background:#fff; border-left:1px solid #e2e8f0; padding:14px; display:flex; flex-direction:column; gap:10px; overflow:auto; }
  .ctrl-section { display:flex; flex-direction:column; gap:6px; }
  .ctrl-label { font-size:11px; font-weight:700; color:#64748b; letter-spacing:.05em; }
  .divider { height:1px; background:#e2e8f0; }

  .shape-btn {
    padding:10px 6px; border-radius:10px; font-size:11px; font-weight:700;
    cursor:pointer; border:2px solid #e2e8f0; background:#fff; color:#64748b;
    transition:all .15s; font-family:var(--edu-font); text-align:center;
  }
  .shape-btn:hover { border-color:#10b981; }
  .shape-btn.active { background:#d1fae5; color:#065f46; border-color:#10b981; }
  .shape-btn .s-icon { font-size:18px; display:block; margin-bottom:2px; }

  .play-btn {
    width:100%; padding:12px; border:none; border-radius:10px; font-size:15px; font-weight:700;
    cursor:pointer; font-family:var(--edu-font); transition:all .15s;
    background:#10b981; color:#fff;
  }
  .play-btn:hover { background:#059669; }
  .play-btn:disabled { opacity:0.5; cursor:not-allowed; }

  .result-card {
    background:#ecfdf5; border:2px solid #6ee7b7; border-radius:12px;
    padding:14px; text-align:center;
  }
  .result-title { font-size:16px; font-weight:800; color:#065f46; }
  .result-desc { font-size:12px; color:#334155; margin-top:6px; line-height:1.8; }

  .info-box { background:#fff; border:1px solid #a7f3d0; border-radius:10px; padding:10px 12px; font-size:11px; line-height:1.8; color:#334155; }
  .info-box strong { color:#059669; }

  .orbit-hint {
    position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,.85); padding:6px 14px; border-radius:20px;
    font-size:11px; color:#64748b; pointer-events:none;
  }
</style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div class="edu-toolbar-lead">
      <span class="edu-toolbar-title">🔄 旋转体生成</span>
      <span class="edu-toolbar-subtitle">七年级上册 · 第四章</span>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="c3d"></canvas>
        <div class="orbit-hint">模型绕竖轴自动慢转 · 拖拽环视 · 双指缩放</div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">选择平面图形</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px">
            <button class="shape-btn active" id="sb-rect" onclick="setShape('rect')"><span class="s-icon">▬</span>长方形</button>
            <button class="shape-btn" id="sb-rtriangle" onclick="setShape('rtriangle')"><span class="s-icon">◺</span>直角三角形</button>
            <button class="shape-btn" id="sb-semicircle" onclick="setShape('semicircle')"><span class="s-icon">◡</span>半圆</button>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">
            <button class="shape-btn" id="sb-trapezoid" onclick="setShape('trapezoid')"><span class="s-icon">⏢</span>梯形</button>
            <button class="shape-btn" id="sb-circle" onclick="setShape('circle')"><span class="s-icon">○</span>圆</button>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <button class="play-btn" id="btn-play" onclick="playRevolve()">▶ 播放旋转动画</button>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">旋转结果</div>
          <div class="result-card" id="result-card">
            <div class="result-title" id="result-title">选择平面图形开始</div>
            <div class="result-desc" id="result-desc">平面图形绕轴旋转一周，生成旋转体</div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <strong>面动成体</strong><br/>
          ● 平面图形绕一条轴旋转一周，形成的立体叫做<strong>旋转体</strong><br/>
          ● 长方形绕一边旋转 → <strong>圆柱</strong><br/>
          ● 直角三角形绕直角边旋转 → <strong>圆锥</strong><br/>
          ● 半圆绕直径旋转 → <strong>球</strong><br/>
          ● 梯形绕直角边旋转 → <strong>圆台</strong><br/>
          ● 圆绕直径旋转 → <strong>球</strong>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
var _scene, _camera, _renderer, _controls;
var _group;
var _currentShape = 'rect';
var _animId = null;
/** 空闲时绕 Y 轴缓慢旋转，便于理解「面动成体」；播放动画时暂停 */
var _idleSpinSpeed = 0.0028;

var SHAPES = {
  rect: {
    name: '长方形', result: '圆柱',
    desc: '长方形绕一条边旋转一周<br/>生成<strong>圆柱体</strong><br/><br/>旋转轴所在边 = 圆柱的高 h<br/>另一条边 = 底面半径 r<br/>V = πr²h',
    color: 0x3b82f6, resultColor: 0x60a5fa,
  },
  rtriangle: {
    name: '直角三角形', result: '圆锥',
    desc: '直角三角形绕一条直角边旋转<br/>生成<strong>圆锥体</strong><br/><br/>旋转轴所在边 = 圆锥的高 h<br/>另一条直角边 = 底面半径 r<br/>V = ⅓πr²h',
    color: 0xf97316, resultColor: 0xfb923c,
  },
  semicircle: {
    name: '半圆', result: '球',
    desc: '半圆绕直径旋转一周<br/>生成<strong>球体</strong><br/><br/>半径 = 球的半径 r<br/>V = ⁴⁄₃πr³',
    color: 0x22c55e, resultColor: 0x4ade80,
  },
  trapezoid: {
    name: '直角梯形', result: '圆台',
    desc: '直角梯形绕直角腰旋转<br/>生成<strong>圆台</strong><br/><br/>V = ⅓πh(R² + Rr + r²)',
    color: 0xa855f7, resultColor: 0xc084fc,
  },
  circle: {
    name: '圆', result: '球',
    desc: '圆绕直径旋转一周<br/>生成<strong>球体</strong><br/><br/>V = ⁴⁄₃πr³',
    color: 0x14b8a6, resultColor: 0x2dd4bf,
  },
};

function init() {
  var canvas = document.getElementById('c3d');
  var r = Edu3D.createScene(canvas, { bg: 0xf0fdf4, camX: 5, camY: 3, camZ: 6 });
  _scene = r.scene; _camera = r.camera; _renderer = r.renderer; _controls = r.controls;
  Edu3D.addLights(_scene);
  Edu3D.addGrid(_scene, 10, 10);

  _group = new THREE.Group();
  _scene.add(_group);

  setShape('rect');
  Edu3D.startLoop(_scene, _camera, _renderer, _controls, function onFrame() {
    if (!_animId && _group) {
      _group.rotation.y += _idleSpinSpeed;
    }
  });
}

function clearGroup() { while (_group.children.length) _group.remove(_group.children[0]); }

/** 与 buildFlat / buildRevolved 尺寸一致的 Lathe 截面（x=离旋转轴距离，y=沿轴高度） */
function getLatheProfile(shapeKey) {
  switch (shapeKey) {
    case 'rect':
      return [
        new THREE.Vector2(0.02, 0),
        new THREE.Vector2(1.2, 0),
        new THREE.Vector2(1.2, 2),
        new THREE.Vector2(0.02, 2),
      ];
    case 'rtriangle':
      return [
        new THREE.Vector2(0.02, 0),
        new THREE.Vector2(1.2, 0),
        new THREE.Vector2(0.02, 2),
      ];
    case 'semicircle':
    case 'circle': {
      var R = 1.2;
      var pts = [];
      for (var i = 0; i <= 40; i++) {
        var phi = -Math.PI / 2 + (Math.PI * i) / 40;
        pts.push(new THREE.Vector2(R * Math.cos(phi), R + R * Math.sin(phi)));
      }
      return pts;
    }
    case 'trapezoid':
      return [
        new THREE.Vector2(0.02, 0),
        new THREE.Vector2(1.2, 0),
        new THREE.Vector2(0.8, 2),
        new THREE.Vector2(0.02, 2),
      ];
    default:
      return null;
  }
}

function addRotationAxisToGroup() {
  var axisGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, -2, 0), new THREE.Vector3(0, 3, 0)
  ]);
  var axisMat = new THREE.LineDashedMaterial({ color: 0xef4444, dashSize: 0.15, gapSize: 0.1 });
  var axis = new THREE.Line(axisGeo, axisMat);
  axis.computeLineDistances();
  _group.add(axis);
  var axisLbl = Edu3D.textSprite('旋转轴', { color: '#ef4444', scale: 0.35 });
  axisLbl.position.set(0.3, 2.8, 0);
  _group.add(axisLbl);
}

function buildFlat() {
  clearGroup();
  addRotationAxisToGroup();
  var def = SHAPES[_currentShape];
  var mat = new THREE.MeshLambertMaterial({ color: def.color, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
  var edgeMat = new THREE.LineBasicMaterial({ color: 0x1e293b, linewidth: 2 });

  var shape;
  switch (_currentShape) {
    case 'rect': {
      shape = new THREE.Shape();
      shape.moveTo(0, 0); shape.lineTo(1.2, 0); shape.lineTo(1.2, 2); shape.lineTo(0, 2); shape.closePath();
      break;
    }
    case 'rtriangle': {
      shape = new THREE.Shape();
      shape.moveTo(0, 0); shape.lineTo(1.2, 0); shape.lineTo(0, 2); shape.closePath();
      break;
    }
    case 'semicircle': {
      // 直边（直径）落在局部 y 轴上 [0, 2R]，与场景旋转轴（竖直 Y）一致；圆弧在 x≥0 一侧
      var R = 1.2;
      var pts = [];
      for (var i = 0; i <= 48; i++) {
        var phi = -Math.PI / 2 + (Math.PI * i) / 48;
        pts.push(new THREE.Vector2(R * Math.cos(phi), R + R * Math.sin(phi)));
      }
      shape = new THREE.Shape(pts);
      break;
    }
    case 'trapezoid': {
      shape = new THREE.Shape();
      shape.moveTo(0, 0); shape.lineTo(1.2, 0); shape.lineTo(0.8, 2); shape.lineTo(0, 2); shape.closePath();
      break;
    }
    case 'circle': {
      // 圆心在 y 轴上 (0,0)，与旋转轴重合，半径与下方球体 R=1.2 一致
      var Rc = 1.2;
      var pts2 = [];
      for (var j = 0; j <= 64; j++) {
        var a2 = (Math.PI * 2 * j) / 64;
        pts2.push(new THREE.Vector2(Rc * Math.cos(a2), Rc * Math.sin(a2)));
      }
      shape = new THREE.Shape(pts2);
      break;
    }
  }

  var geo = new THREE.ShapeGeometry(shape);
  var mesh = new THREE.Mesh(geo, mat);
  mesh.position.y = 0.5;
  mesh.rotation.y = 0; // face camera initially
  mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo), edgeMat));
  _group.add(mesh);

  // Name label
  var lbl = Edu3D.textSprite(def.name, { color: '#334155', scale: 0.45 });
  lbl.position.set(1.5, 1.5, 0);
  _group.add(lbl);

  // Arrow indicating rotation direction
  var arrowGeo = new THREE.TorusGeometry(1.5, 0.03, 8, 48, Math.PI * 0.7);
  var arrowMat = new THREE.MeshBasicMaterial({ color: 0x10b981 });
  var arrow = new THREE.Mesh(arrowGeo, arrowMat);
  arrow.position.set(0, 1.5, 0);
  arrow.rotation.x = Math.PI / 2;
  arrow.rotation.z = Math.PI * 0.3;
  _group.add(arrow);
}

function playRevolve() {
  if (_animId) { cancelAnimationFrame(_animId); _animId = null; }
  document.getElementById('btn-play').disabled = true;

  var profile = getLatheProfile(_currentShape);
  if (!profile) {
    document.getElementById('btn-play').disabled = false;
    return;
  }

  _group.rotation.y = 0;
  /** 每次播放都从「平面 + 轴」状态开始，避免第二次仍停在柱体上再渐隐 */
  buildFlat();

  _animId = requestAnimationFrame(function beginSweepAfterFlat() {
    clearGroup();
    addRotationAxisToGroup();

    var def = SHAPES[_currentShape];
    var sweepMat = new THREE.MeshLambertMaterial({
      color: def.resultColor,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.82,
    });
    var sweepMesh = new THREE.Mesh(new THREE.BufferGeometry(), sweepMat);
    sweepMesh.position.y = 0.5;
    sweepMesh.userData.isSweep = true;
    _group.add(sweepMesh);

    var t = 0;
    var phase1Frames = 168;

    function easeOutCubic(p) {
      return 1 - Math.pow(1 - p, 3);
    }

    function phase1() {
      t++;
      var p = Math.min(t / phase1Frames, 1);
      var e = easeOutCubic(p);
      var phiLen = Math.max(0.06, e * Math.PI * 2);
      var oldGeo = sweepMesh.geometry;
      sweepMesh.geometry = new THREE.LatheGeometry(profile, 48, 0, phiLen);
      oldGeo.dispose();
      if (p < 1) {
        _animId = requestAnimationFrame(phase1);
      } else {
        _group.remove(sweepMesh);
        sweepMesh.geometry.dispose();
        sweepMat.dispose();
        clearGroup();
        buildRevolved();
        _animId = null;
        document.getElementById('btn-play').disabled = false;
      }
    }

    _animId = requestAnimationFrame(phase1);
  });
}

function buildRevolved() {
  var def = SHAPES[_currentShape];
  /** 直接为最终透明度，避免「先透明再显现」被看成柱体渐出 */
  var mat = new THREE.MeshLambertMaterial({ color: def.resultColor, transparent: true, opacity: 0.78 });
  var edgeMat = new THREE.LineBasicMaterial({ color: 0x1e293b, transparent: true, opacity: 0.42 });

  var geo;
  switch (_currentShape) {
    case 'rect':
      geo = new THREE.CylinderGeometry(1.2, 1.2, 2, 48);
      break;
    case 'rtriangle':
      geo = new THREE.ConeGeometry(1.2, 2, 48);
      break;
    case 'semicircle':
      geo = new THREE.SphereGeometry(1.2, 48, 48);
      break;
    case 'trapezoid':
      geo = new THREE.CylinderGeometry(0.8, 1.2, 2, 48);
      break;
    case 'circle':
      geo = new THREE.SphereGeometry(1.2, 48, 48);
      break;
  }

  var mesh = new THREE.Mesh(geo, mat);
  mesh.userData.isRevolvedSolid = true;
  mesh.position.y = 1.5;
  mesh.castShadow = true;
  mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo, 15), edgeMat));
  _group.add(mesh);

  var lbl = Edu3D.textSprite(def.result, { color: '#334155', scale: 0.5 });
  lbl.position.set(0, 3.5, 0);
  lbl.material.transparent = true;
  lbl.material.opacity = 1;
  _group.add(lbl);

  var axisGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, -1, 0), new THREE.Vector3(0, 4, 0)
  ]);
  var axisMat = new THREE.LineDashedMaterial({ color: 0xef4444, dashSize: 0.15, gapSize: 0.1, transparent: true, opacity: 0.75 });
  var axis = new THREE.Line(axisGeo, axisMat);
  axis.computeLineDistances();
  _group.add(axis);
}

function setShape(key) {
  if (_animId) { cancelAnimationFrame(_animId); _animId = null; }
  _group.rotation.y = 0;
  _currentShape = key;
  buildFlat();

  var def = SHAPES[key];
  document.getElementById('result-title').textContent = def.name + ' → ' + def.result;
  document.getElementById('result-desc').innerHTML = def.desc;
  document.getElementById('btn-play').disabled = false;

  Object.keys(SHAPES).forEach(function(k) {
    var btn = document.getElementById('sb-' + k);
    if (btn) btn.classList.toggle('active', k === key);
  });
}

function resetAll() {
  setShape('rect');
}

init();
</script>
</body>
</html>
