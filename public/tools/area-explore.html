<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>面积的认识 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .ml{display:grid;grid-template-columns:1fr 250px;height:100%}
    .ca{padding:12px;overflow:hidden;background:linear-gradient(135deg,#f0fdf4,#ecfdf5);display:flex;flex-direction:column;align-items:center;position:relative}
    .cp{background:#f0fdf4;border-left:1px solid #e2e8f0;padding:12px;display:flex;flex-direction:column;gap:8px;overflow:auto}
    .cs{display:flex;flex-direction:column;gap:5px}
    .cl{font-size:11px;font-weight:700;color:#64748b;letter-spacing:.05em}
    .dv{height:1px;background:#e2e8f0}
    .ib{background:#fff;border:1px solid #bbf7d0;border-radius:10px;padding:10px 12px;font-size:12px;line-height:1.8;color:#334155}
    .mb{padding:6px 0;border-radius:8px;font-size:12px;font-weight:700;background:#fff;border:1.5px solid #e2e8f0;cursor:pointer;transition:all .15s;width:100%;font-family:inherit}
    .mb:hover{border-color:#22c55e;color:#16a34a}.mb.on{background:#dcfce7;border-color:#22c55e;color:#16a34a}
    canvas{border-radius:10px}
    .sb{display:flex;gap:14px;align-items:center;background:#fff;border:1.5px solid #bbf7d0;border-radius:10px;padding:6px 14px;margin-top:8px;font-size:13px;font-weight:600}
    .sb span{color:#16a34a;font-weight:800}
    .cb{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:#fff;border:2px solid #f97316;border-radius:12px;padding:8px 20px;font-size:14px;font-weight:700;color:#1e293b;z-index:10;display:none;box-shadow:0 4px 16px rgba(249,115,22,.15)}
    .cb.show{display:block}
    .ft{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:#fff;border-radius:16px;padding:20px 36px;font-size:22px;font-weight:800;z-index:20;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.15)}
    .ft.show{transform:translate(-50%,-50%) scale(1)}.ft.ok{color:#16a34a;border:2px solid #22c55e}.ft.no{color:#dc2626;border:2px solid #f87171}
    .sr{display:flex;justify-content:space-between;font-size:13px;padding:4px 0}.sr b{color:#f97316}
    .ar{display:flex;gap:6px}.ar .mb{flex:1}
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">面积的认识</div>
      <div class="edu-toolbar-subtitle">三年级下册 · 第五单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-outline" onclick="clearAll()">清空</button>
      <button class="edu-btn edu-btn-accent" id="fillBtn" onclick="startFill()">逐格填充</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="ml">
      <div class="ca">
        <div class="cb" id="banner">哪个面积更大？点击选择！</div>
        <canvas id="cv"></canvas>
        <div class="sb" id="statBar">
          <div>方格: <span id="cntD">0</span></div>
          <div>面积: <span id="areaD">0</span> cm²</div>
          <div>周长: <span id="perD">0</span> cm</div>
        </div>
        <div class="ft" id="fb"></div>
      </div>
      <div class="cp">
        <div class="cs">
          <div class="cl">交互模式</div>
          <button class="mb on" id="mDraw" onclick="setMode('draw')">绘制图形</button>
          <button class="mb" id="mCompare" onclick="setMode('compare')">对比模式</button>
          <button class="mb" id="mDrag" onclick="setMode('drag')">拖拽覆盖</button>
          <button class="mb" id="mChallenge" onclick="setMode('challenge')">挑战答题</button>
        </div>
        <div class="dv"></div>
        <div class="cs" id="presetSec">
          <div class="cl">快捷预设</div>
          <div class="ar">
            <button class="mb" onclick="drawPreset('rect')">长方形</button>
            <button class="mb" onclick="drawPreset('square')">正方形</button>
            <button class="mb" onclick="drawPreset('L')">L 形</button>
          </div>
          <div class="ar">
            <button class="mb" onclick="drawPreset('T')">T 形</button>
            <button class="mb" onclick="drawPreset('cross')">十字形</button>
            <button class="mb" onclick="drawPreset('stair')">阶梯形</button>
          </div>
        </div>
        <div class="cs" id="chUI" style="display:none">
          <div class="cl">挑战得分</div>
          <div class="sr">正确: <b id="sc">0</b></div>
          <div class="sr">错误: <b id="sw" style="color:#dc2626">0</b></div>
          <div class="sr">连胜: <b id="ss">0</b></div>
          <button class="mb" onclick="newChallenge()">下一题</button>
        </div>
        <div class="dv"></div>
        <div class="cs" id="dragHint" style="display:none">
          <div class="ib"><b>拖拽覆盖说明</b><br/>蓝色图形固定在左侧，绿色图形可拖拽移动。重叠区域会高亮显示。</div>
        </div>
        <div class="cs">
          <div class="cl">面积公式</div>
          <div class="ib"><b>长方形面积</b><br/>S = a x b (长 x 宽)<br/><br/><b>正方形面积</b><br/>S = a x a = a²</div>
        </div>
        <div class="cs">
          <div class="cl">核心概念</div>
          <div class="ib"><b>面积</b>: 物体表面的大小<br/><b>周长</b>: 一圈的长度<br/>面积相同，周长不一定相同！<br/>周长相同，面积也不一定相同！</div>
        </div>
        <div class="cs">
          <div class="cl">面积单位</div>
          <div class="ib">1 cm² = 1cm x 1cm<br/>1 dm² = 1dm x 1dm<br/>1 m² = 1m x 1m</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const cv = document.getElementById('cv'), cx = cv.getContext('2d');
let CELL=38, COLS=12, ROWS=10, PAD=2, mode='draw';
let drawn=new Set(), shapeA=new Set(), shapeB=new Set();
let fixed=new Set(), drg=new Set(), dox=0, doy=0;
let fCells=[], fIdx=-1, fTmr=null;
let chA=new Set(), chB=new Set(), chAns=0, sc={ok:0,no:0,streak:0};
let dragging=false, dAnchor={x:0,y:0}, dBase={x:0,y:0};

// ── Canvas Init ──
function init(){
  const a=document.querySelector('.ca');
  const w=Math.min(a.clientWidth-30,COLS*CELL+PAD*2);
  const h=Math.min(a.clientHeight-70,ROWS*CELL+PAD*2);
  COLS=Math.floor((w-PAD*2)/CELL); ROWS=Math.floor((h-PAD*2)/CELL);
  const d=window.devicePixelRatio||1;
  cv.width=(COLS*CELL+PAD*2)*d; cv.height=(ROWS*CELL+PAD*2)*d;
  cv.style.width=(COLS*CELL+PAD*2)+'px'; cv.style.height=(ROWS*CELL+PAD*2)+'px';
  cx.setTransform(d,0,0,d,0,0);
  cv.style.cursor=mode==='draw'?'crosshair':mode==='drag'?'grab':'pointer';
  render();
}

// ── Drawing ──
function render(){
  cx.clearRect(0,0,cv.width,cv.height);
  cx.fillStyle='#fff'; cx.fillRect(0,0,COLS*CELL+PAD*2,ROWS*CELL+PAD*2);
  // grid
  cx.strokeStyle='#e2e8f0'; cx.lineWidth=1;
  for(let r=0;r<=ROWS;r++){cx.beginPath();cx.moveTo(PAD,PAD+r*CELL);cx.lineTo(PAD+COLS*CELL,PAD+r*CELL);cx.stroke();}
  for(let c=0;c<=COLS;c++){cx.beginPath();cx.moveTo(PAD+c*CELL,PAD);cx.lineTo(PAD+c*CELL,PAD+ROWS*CELL);cx.stroke();}
  if(mode==='draw')renderDraw();
  else if(mode==='compare')renderCompare();
  else if(mode==='drag')renderDrag();
  else if(mode==='challenge')renderChallenge();
  updateStats();
}

function fc(c,r,col,sc,lb){
  const x=PAD+c*CELL,y=PAD+r*CELL;
  cx.fillStyle=col; cx.fillRect(x,y,CELL,CELL);
  if(sc){cx.strokeStyle=sc;cx.lineWidth=1.5;cx.strokeRect(x+.5,y+.5,CELL-1,CELL-1);}
  if(lb){cx.fillStyle=sc||'#334155';cx.font='bold 10px sans-serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(lb,x+CELL/2,y+CELL/2);}
}

function halfCol(){return Math.floor(COLS/2);}

function drawDivider(){
  const hc=halfCol();
  cx.save();cx.setLineDash([4,4]);cx.strokeStyle='#94a3b8';cx.lineWidth=2;
  cx.beginPath();cx.moveTo(PAD+hc*CELL,PAD);cx.lineTo(PAD+hc*CELL,PAD+ROWS*CELL);cx.stroke();cx.restore();
}

// ── Draw Mode ──
function renderDraw(){
  const s=fIdx>=0?new Set(fCells.slice(0,fIdx)):drawn;
  s.forEach(k=>{const[c,r]=k.split(',').map(Number);fc(c,r,'rgba(34,197,94,0.35)','#22c55e','1');});
}

// ── Compare Mode ──
function renderCompare(){
  const hc=halfCol();
  drawDivider();
  cx.font='bold 14px sans-serif';cx.textAlign='center';
  cx.fillStyle='#3b82f6';cx.fillText('图形 A',PAD+hc*CELL/2,PAD+16);
  cx.fillStyle='#f97316';cx.fillText('图形 B',PAD+hc*CELL+(COLS-hc)*CELL/2,PAD+16);
  shapeA.forEach(k=>{const[c,r]=k.split(',').map(Number);fc(c,r,'rgba(59,130,246,0.3)','#3b82f6','1');});
  shapeB.forEach(k=>{let[c,r]=k.split(',').map(Number);c+=hc;if(c<COLS)fc(c,r,'rgba(249,115,22,0.3)','#f97316','1');});
  cx.font='bold 13px sans-serif';
  cx.fillStyle='#3b82f6';cx.fillText('面积: '+shapeA.size+' cm²',PAD+hc*CELL/2,PAD+ROWS*CELL-6);
  cx.fillStyle='#f97316';cx.fillText('面积: '+shapeB.size+' cm²',PAD+hc*CELL+(COLS-hc)*CELL/2,PAD+ROWS*CELL-6);
}

// ── Drag Mode ──
function renderDrag(){
  fixed.forEach(k=>{const[c,r]=k.split(',').map(Number);fc(c,r,'rgba(59,130,246,0.35)','#3b82f6','');});
  let olap=0;
  drg.forEach(k=>{let[c,r]=k.split(',').map(Number);const dc=c+dox,dr=r+doy;
    if(dc<0||dc>=COLS||dr<0||dr>=ROWS)return;
    const ov=fixed.has(`${dc},${dr}`);if(ov)olap++;
    fc(dc,dr,ov?'rgba(234,179,8,0.5)':'rgba(34,197,94,0.35)',ov?'#eab308':'#22c55e',ov?'!':'');
  });
  cx.font='bold 13px sans-serif';cx.textAlign='center';cx.fillStyle='#1e293b';
  cx.fillText(`蓝色: ${fixed.size} cm²  绿色: ${drg.size} cm²  重叠: ${olap} cm²`,PAD+COLS*CELL/2,PAD+ROWS*CELL+PAD+16);
}

// ── Challenge Mode ──
function renderChallenge(){
  const hc=halfCol(); drawDivider();
  cx.font='bold 15px sans-serif';cx.textAlign='center';
  cx.fillStyle='#3b82f6';cx.fillText('A',PAD+hc*CELL/2,PAD+ROWS*CELL/2);
  cx.fillStyle='#f97316';cx.fillText('B',PAD+hc*CELL+(COLS-hc)*CELL/2,PAD+ROWS*CELL/2);
  chA.forEach(k=>{const[c,r]=k.split(',').map(Number);fc(c,r,'rgba(59,130,246,0.4)','#3b82f6','');});
  chB.forEach(k=>{let[c,r]=k.split(',').map(Number);c+=hc;if(c<COLS)fc(c,r,'rgba(249,115,22,0.4)','#f97316','');});
}

// ── Stats ──
function updateStats(){
  let n=0;
  if(mode==='draw')n=fIdx>=0?Math.min(fIdx,fCells.length):drawn.size;
  else if(mode==='compare')n=shapeA.size+shapeB.size;
  else if(mode==='drag')n=fixed.size+drg.size;
  else if(mode==='challenge')n=chA.size+chB.size;
  document.getElementById('cntD').textContent=n;
  document.getElementById('areaD').textContent=n;
  let p=0;const s=mode==='draw'?drawn:new Set();
  s.forEach(k=>{const[c,r]=k.split(',').map(Number);
    if(!s.has(`${c-1},${r}`))p++;if(!s.has(`${c+1},${r}`))p++;
    if(!s.has(`${c},${r-1}`))p++;if(!s.has(`${c},${r+1}`))p++;});
  document.getElementById('perD').textContent=p;
}

// ── Mode Switch ──
function setMode(m){
  stopFill(); mode=m;
  document.querySelectorAll('.cs .mb').forEach(b=>b.classList.remove('on'));
  const b=document.getElementById('m'+m.charAt(0).toUpperCase()+m.slice(1));
  if(b)b.classList.add('on');
  document.getElementById('presetSec').style.display=m==='draw'?'':'none';
  document.getElementById('dragHint').style.display=m==='drag'?'':'none';
  document.getElementById('chUI').style.display=m==='challenge'?'':'none';
  document.getElementById('banner').classList.toggle('show',m==='challenge');
  document.getElementById('fillBtn').style.display=m==='draw'?'':'none';
  document.getElementById('statBar').style.display=m==='challenge'?'none':'';
  cv.style.cursor=m==='draw'?'crosshair':m==='drag'?'grab':'pointer';
  if(m==='compare')initCompare();
  if(m==='drag')initDrag();
  if(m==='challenge')newChallenge();
  render();
}

// ── Presets ──
function drawPreset(t){
  drawn.clear();
  const P={
    rect:()=>{for(let r=0;r<3;r++)for(let c=0;c<5;c++)drawn.add(`${c},${r}`)},
    square:()=>{for(let r=0;r<4;r++)for(let c=0;c<4;c++)drawn.add(`${c},${r}`)},
    L:()=>{for(let c=0;c<2;c++)for(let r=0;r<5;r++)drawn.add(`${c},${r}`);for(let c=2;c<4;c++)drawn.add(`${c},4`)},
    T:()=>{for(let c=0;c<5;c++)drawn.add(`${c},0`);for(let r=1;r<4;r++)drawn.add(`2,${r}`)},
    cross:()=>{for(let r=0;r<5;r++)drawn.add(`2,${r}`);for(let c=0;c<5;c++)if(c!==2)drawn.add(`${c},2`)},
    stair:()=>{for(let r=0;r<4;r++)for(let c=0;c<=r;c++)drawn.add(`${c},${3-r}`)}
  };
  if(P[t])P[t](); render();
}

// ── Fill Animation ──
function startFill(){
  if(mode!=='draw'||drawn.size===0)return; stopFill();
  fCells=Array.from(drawn); fIdx=0;
  fTmr=setInterval(()=>{fIdx++;if(fIdx>fCells.length){stopFill();return;}render();},200);
}
function stopFill(){if(fTmr){clearInterval(fTmr);fTmr=null;}fIdx=-1;}

// ── Compare Init ──
function initCompare(){
  shapeA.clear();shapeB.clear();const hc=halfCol();
  const wA=2+Math.floor(Math.random()*(hc-2)),hA=2+Math.floor(Math.random()*(ROWS-3));
  for(let r=0;r<hA;r++)for(let c=0;c<wA;c++)shapeA.add(`${c},${r}`);
  const wB=2+Math.floor(Math.random()*(COLS-hc-2)),hB=2+Math.floor(Math.random()*(ROWS-3));
  for(let r=0;r<hB;r++)for(let c=0;c<wB;c++)shapeB.add(`${c},${r}`);
}

// ── Drag Init ──
function initDrag(){
  fixed.clear();drg.clear();dox=0;doy=0;const hc=halfCol();
  for(let r=1;r<=3;r++)for(let c=1;c<=3;c++)fixed.add(`${c},${r}`);
  for(let r=1;r<=2;r++)for(let c=0;c<4;c++)drg.add(`${c+hc},${r}`);
}

// ── Challenge ──
function newChallenge(){
  chA.clear();chB.clear();const hc=halfCol();
  const aA=3+Math.floor(Math.random()*12),aB=3+Math.floor(Math.random()*12);
  const fA=factorPair(aA,hc-1,ROWS-1);
  for(let r=0;r<fA[1];r++)for(let c=0;c<fA[0];c++)chA.add(`${c},${r}`);
  const fB=factorPair(aB,COLS-hc-1,ROWS-1);
  for(let r=0;r<fB[1];r++)for(let c=0;c<fB[0];c++)chB.add(`${c},${r}`);
  chAns=aA>aB?1:aB>aA?2:0; render();
}
function factorPair(n,mw,mh){
  for(let w=Math.min(mw,n);w>=1;w--)if(n%w===0&&n/w<=mh)return[w,n/w];return[1,n];
}
function checkCh(pick){
  const ok=pick===chAns;
  if(ok){sc.ok++;sc.streak++;}else{sc.no++;sc.streak=0;}
  document.getElementById('sc').textContent=sc.ok;
  document.getElementById('sw').textContent=sc.no;
  document.getElementById('ss').textContent=sc.streak;
  showFB(ok?'回答正确!':'再想想哦~',ok);
  setTimeout(()=>newChallenge(),ok?1200:2000);
}
function showFB(t,ok){
  const e=document.getElementById('fb');e.textContent=t;
  e.className='ft show '+(ok?'ok':'no');
  setTimeout(()=>e.className='ft',1400);
}

// ── Pointer Events (unified mouse+touch) ──
function cell(e){
  const r=cv.getBoundingClientRect();
  return[Math.floor((e.clientX-r.left-PAD)/CELL),Math.floor((e.clientY-r.top-PAD)/CELL)];
}

cv.addEventListener('pointerdown',e=>{
  const[c,r]=cell(e);
  if(c<0||c>=COLS||r<0||r>=ROWS)return;
  if(mode==='draw'){
    const k=`${c},${r}`;if(drawn.has(k))drawn.delete(k);else drawn.add(k);
    dragging=true;cv.setPointerCapture(e.pointerId);render();
  }else if(mode==='drag'){
    // check if pointer is on a drag-shape cell
    const dc=c-dox,dr=r-doy;let hit=false;
    drg.forEach(k=>{const[sc,sr]=k.split(',').map(Number);if(sc===dc&&sr===dr)hit=true;});
    if(hit){dragging=true;dAnchor={x:c,y:r};dBase={x:dox,y:doy};cv.setPointerCapture(e.pointerId);}
  }else if(mode==='challenge'){
    if(c<halfCol())checkCh(1);else checkCh(2);
  }
});

cv.addEventListener('pointermove',e=>{
  if(!dragging)return;
  const[c,r]=cell(e);
  if(c<0||c>=COLS||r<0||r>=ROWS)return;
  if(mode==='draw'){drawn.add(`${c},${r}`);render();}
  else if(mode==='drag'){dox=dBase.x+(c-dAnchor.x);doy=dBase.y+(r-dAnchor.y);render();}
});

cv.addEventListener('pointerup',()=>{dragging=false;});
cv.addEventListener('pointercancel',()=>{dragging=false;});

// ── Clear ──
function clearAll(){
  drawn.clear();shapeA.clear();shapeB.clear();fixed.clear();drg.clear();
  dox=0;doy=0;stopFill();
  if(mode==='compare')initCompare();
  if(mode==='drag')initDrag();
  if(mode==='challenge')newChallenge();
  render();
}

window.addEventListener('resize',init);init();
</script>
</body>
</html>
