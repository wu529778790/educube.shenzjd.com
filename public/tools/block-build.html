<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>积木拼搭三视图联动</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
  .main-layout {
    display: grid;
    grid-template-columns: 1fr 260px;
    height: 100%;
    gap: 0;
  }

  /* 左：积木操作区 */
  .build-area {
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #f0fdf4 0%, #fdfaf4 100%);
    position: relative;
    overflow: hidden;
  }

  /* 积木网格 */
  #grid-wrapper {
    position: relative;
    display: inline-block;
  }

  #build-grid {
    display: grid;
    gap: 3px;
    cursor: pointer;
    user-select: none;
  }

  .grid-cell {
    width: 52px;
    height: 52px;
    border-radius: 6px;
    background: #e2e8f0;
    border: 2px solid #cbd5e1;
    transition: all 0.15s;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #94a3b8;
    cursor: pointer;
  }
  .grid-cell:hover { background: #dbeafe; border-color: #93c5fd; }
  .grid-cell.filled {
    background: linear-gradient(135deg, #4f8cff, #3b82f6);
    border-color: #2563eb;
    box-shadow: 0 2px 8px rgba(79,140,255,0.35), inset 0 1px 0 rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.8);
    font-weight: 700;
  }
  .grid-cell.filled::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 60%);
    border-radius: 4px;
    pointer-events: none;
  }
  .height-badge {
    position: absolute;
    top: 3px;
    right: 5px;
    font-size: 10px;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
  }

  /* 右：三视图区 */
  .views-panel {
    background: #fff;
    border-left: 1px solid #e2e8f0;
    display: flex;
    flex-direction: column;
    overflow: auto;
  }

  .view-section {
    flex: 1;
    padding: 12px;
    border-bottom: 1px solid #f1f5f9;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .view-section:last-child { border-bottom: none; }

  .view-title {
    font-size: 12px;
    font-weight: 700;
    color: #1a3a5c;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .view-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
  }

  .view-canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 60px;
  }

  canvas.view-canvas {
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    background: #f8fafc;
    display: block;
  }

  /* 高度控制 */
  .height-controls {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.94);
    border: 1px solid #e2e8f0;
    border-radius: 20px;
    padding: 8px 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .height-controls span { font-size: 12px; color: #64748b; }

  .hint-label {
    position: absolute;
    top: 14px;
    left: 14px;
    background: rgba(34,197,94,0.12);
    border: 1px solid rgba(34,197,94,0.3);
    border-radius: 10px;
    padding: 6px 12px;
    font-size: 12px;
    color: #15803d;
  }

  .mode-btn {
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid #e2e8f0;
    background: #fff;
    color: #64748b;
    transition: all 0.15s;
    font-family: var(--edu-font);
  }
  .mode-btn.add { background: #4f8cff; color: #fff; border-color: #4f8cff; }
  .mode-btn.remove { background: #ef4444; color: #fff; border-color: #ef4444; }
  .mode-btn.height { background: #22c55e; color: #fff; border-color: #22c55e; }
</style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="edu-toolbar-title">🏗️ 积木拼搭三视图联动</span>
      <span class="edu-toolbar-subtitle">下册·观察物体</span>
    </div>
    <div class="edu-toolbar-actions">
      <span style="font-size:12px;color:#64748b;">操作模式：</span>
      <button class="mode-btn add" id="mode-add" onclick="setMode('add')">➕ 添加</button>
      <button class="mode-btn" id="mode-remove" onclick="setMode('remove')">➖ 移除</button>
      <button class="mode-btn" id="mode-height" onclick="setMode('height')">↑ 叠高</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="loadPreset('L')">预设L形</button>
      <button class="edu-btn edu-btn-outline" onclick="loadPreset('T')">预设T形</button>
      <button class="edu-btn edu-btn-outline" onclick="clearAll()">清空</button>
    </div>
  </div>

  <div class="edu-content">
    <div class="main-layout">
      <!-- 左侧积木区 -->
      <div class="build-area">
        <div class="hint-label" id="mode-hint">点击网格添加积木</div>
        <div id="grid-wrapper">
          <div id="build-grid"></div>
        </div>
        <div class="height-controls">
          <span>积木总数：</span>
          <span class="value-display" id="block-count">0</span>
          <span>层数（最高）：</span>
          <span class="value-display" id="max-height">0</span>
        </div>
      </div>

      <!-- 右侧三视图 -->
      <div class="views-panel">
        <div class="view-section">
          <div class="view-title">
            <div class="view-dot" style="background:#3b82f6;"></div>
            正视图（从前面看）
          </div>
          <div class="view-canvas-wrap">
            <canvas class="view-canvas" id="cv-front" width="200" height="80"></canvas>
          </div>
        </div>
        <div class="view-section">
          <div class="view-title">
            <div class="view-dot" style="background:#22c55e;"></div>
            侧视图（从右侧看）
          </div>
          <div class="view-canvas-wrap">
            <canvas class="view-canvas" id="cv-side" width="200" height="80"></canvas>
          </div>
        </div>
        <div class="view-section">
          <div class="view-title">
            <div class="view-dot" style="background:#f97316;"></div>
            俯视图（从上方看）
          </div>
          <div class="view-canvas-wrap">
            <canvas class="view-canvas" id="cv-top" width="200" height="80"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../edu-lib/edu-tools.js"></script>
<script>
const COLS = 5;
const ROWS = 5;
const MAX_HEIGHT = 5;

// grid[row][col] = 积木高度（0=无）
let grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
let mode = 'add';

// 渲染网格
const buildGrid = document.getElementById('build-grid');
buildGrid.style.gridTemplateColumns = `repeat(${COLS}, 52px)`;
buildGrid.style.gridTemplateRows = `repeat(${ROWS}, 52px)`;

let cells = [];
for (let r = 0; r < ROWS; r++) {
  for (let c = 0; c < COLS; c++) {
    const cell = document.createElement('div');
    cell.className = 'grid-cell';
    cell.dataset.row = r;
    cell.dataset.col = c;
    cell.addEventListener('click', () => handleClick(r, c));
    // 列行标注
    if (r === ROWS - 1) {
      const lbl = document.createElement('span');
      lbl.style.cssText = 'position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:11px;color:#94a3b8;';
      lbl.textContent = c + 1;
      cell.appendChild(lbl);
    }
    buildGrid.appendChild(cell);
    cells.push(cell);
  }
}

function getCellEl(r, c) { return cells[r * COLS + c]; }

function handleClick(r, c) {
  if (mode === 'add') {
    if (grid[r][c] === 0) grid[r][c] = 1;
  } else if (mode === 'remove') {
    grid[r][c] = 0;
  } else if (mode === 'height') {
    if (grid[r][c] > 0) grid[r][c] = Math.min(grid[r][c] + 1, MAX_HEIGHT);
    else grid[r][c] = 1;
  }
  renderAll();
}

function setMode(m) {
  mode = m;
  ['add','remove','height'].forEach(k => {
    const btn = document.getElementById('mode-' + k);
    btn.className = 'mode-btn ' + (k === m ? k : '');
  });
  const hints = { add: '点击网格添加积木', remove: '点击积木移除', height: '点击积木叠高一层' };
  document.getElementById('mode-hint').textContent = hints[m];
}

function renderGrid() {
  let total = 0, maxH = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const h = grid[r][c];
      const el = getCellEl(r, c);
      el.className = 'grid-cell' + (h > 0 ? ' filled' : '');
      // 高度标注
      const badge = el.querySelector('.height-badge');
      if (badge) badge.remove();
      if (h > 1) {
        const b = document.createElement('div');
        b.className = 'height-badge';
        b.textContent = h;
        el.appendChild(b);
      }
      if (h > 0) total++;
      maxH = Math.max(maxH, h);
    }
  }
  document.getElementById('block-count').textContent = total;
  document.getElementById('max-height').textContent = maxH;
}

// ===== 三视图绘制 =====
function drawFrontView() {
  // 正视图：从前（row=ROWS-1）向后看，每列的最大高度
  // x 轴 = col，y 轴 = height
  const ctx = document.getElementById('cv-front').getContext('2d');
  const W = 200, H = 80;
  ctx.clearRect(0, 0, W, H);

  const cellW = Math.floor((W - 20) / COLS);
  const cellH = Math.floor((H - 10) / MAX_HEIGHT);
  const offX = 10, baseY = H - 5;

  // 每列最高
  for (let c = 0; c < COLS; c++) {
    let maxH = 0;
    for (let r = 0; r < ROWS; r++) maxH = Math.max(maxH, grid[r][c]);
    if (maxH > 0) {
      ctx.fillStyle = '#93c5fd';
      ctx.strokeStyle = '#3b82f6';
      ctx.lineWidth = 1.5;
      const x = offX + c * cellW;
      const h = maxH * cellH;
      ctx.fillRect(x, baseY - h, cellW - 2, h);
      ctx.strokeRect(x, baseY - h, cellW - 2, h);
    }
  }
  // 基线
  ctx.strokeStyle = '#cbd5e1';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(offX, baseY);
  ctx.lineTo(offX + COLS * cellW, baseY);
  ctx.stroke();
}

function drawSideView() {
  // 侧视图：从右（col=COLS-1）向左看，每行的最大高度
  const ctx = document.getElementById('cv-side').getContext('2d');
  const W = 200, H = 80;
  ctx.clearRect(0, 0, W, H);

  const cellW = Math.floor((W - 20) / ROWS);
  const cellH = Math.floor((H - 10) / MAX_HEIGHT);
  const offX = 10, baseY = H - 5;

  for (let r = 0; r < ROWS; r++) {
    let maxH = 0;
    for (let c = 0; c < COLS; c++) maxH = Math.max(maxH, grid[r][c]);
    if (maxH > 0) {
      ctx.fillStyle = '#86efac';
      ctx.strokeStyle = '#22c55e';
      ctx.lineWidth = 1.5;
      const x = offX + r * cellW;
      const h = maxH * cellH;
      ctx.fillRect(x, baseY - h, cellW - 2, h);
      ctx.strokeRect(x, baseY - h, cellW - 2, h);
    }
  }
  ctx.strokeStyle = '#cbd5e1';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(offX, baseY);
  ctx.lineTo(offX + ROWS * cellW, baseY);
  ctx.stroke();
}

function drawTopView() {
  // 俯视图：从上往下看，有积木的格子显示出来，高度用颜色深浅表示
  const ctx = document.getElementById('cv-top').getContext('2d');
  const W = 200, H = 80;
  ctx.clearRect(0, 0, W, H);

  const cellW = Math.floor((W - 20) / COLS);
  const cellH = Math.floor((H - 10) / ROWS);
  const offX = 10, offY = 5;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const h = grid[r][c];
      const x = offX + c * cellW;
      const y = offY + r * cellH;
      if (h > 0) {
        const alpha = 0.3 + (h / MAX_HEIGHT) * 0.7;
        ctx.fillStyle = `rgba(249,115,22,${alpha})`;
        ctx.strokeStyle = '#f97316';
        ctx.lineWidth = 1.5;
        ctx.fillRect(x, y, cellW - 2, cellH - 2);
        ctx.strokeRect(x, y, cellW - 2, cellH - 2);
        // 显示高度数字
        if (h > 1) {
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 10px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(h, x + (cellW - 2) / 2, y + (cellH - 2) / 2);
        }
      } else {
        ctx.strokeStyle = '#e2e8f0';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(x, y, cellW - 2, cellH - 2);
      }
    }
  }
}

function renderAll() {
  renderGrid();
  drawFrontView();
  drawSideView();
  drawTopView();
}

function loadPreset(type) {
  grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
  if (type === 'L') {
    grid[1][1]=1; grid[2][1]=1; grid[3][1]=1; grid[3][2]=1; grid[3][3]=1;
    grid[1][1]=2;
  } else if (type === 'T') {
    grid[1][1]=1; grid[1][2]=1; grid[1][3]=1;
    grid[2][2]=1; grid[3][2]=1;
    grid[1][2]=2; grid[2][2]=2;
  }
  renderAll();
}

function clearAll() {
  grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
  renderAll();
}

renderAll();
</script>
</body>
</html>
