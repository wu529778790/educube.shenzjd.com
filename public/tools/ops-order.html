<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>四则运算顺序演示</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
  .main-layout {
    display: grid;
    grid-template-columns: 1fr 240px;
    height: 100%;
    gap: 0;
  }
  .canvas-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 30px;
    overflow: auto;
    background: #fff;
  }
  .control-panel {
    background: #fdfaf4;
    border-left: 1px solid #e2e8f0;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow: auto;
  }
  .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
  .ctrl-label {
    font-size: 11px;
    font-weight: 700;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .example-btn {
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid #e2e8f0;
    background: #fff;
    color: #64748b;
    transition: all 0.15s;
    font-family: var(--edu-font);
    text-align: center;
    line-height: 1.4;
  }
  .example-btn:hover { border-color: #22c55e; color: #15803d; }
  .example-btn .expr { font-size: 14px; color: #1a3a5c; font-weight: 700; }
  .divider { height: 1px; background: #e2e8f0; }
  .info-box {
    background: #fff;
    border: 1px solid #bbf7d0;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    color: #64748b;
    line-height: 1.8;
  }
  .info-box strong { color: #15803d; }

  /* 表达式区域 */
  .expr-area {
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: center;
  }
  .expr-input-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
  }
  .expr-input {
    flex: 1;
    padding: 10px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    font-size: 20px;
    font-weight: 700;
    color: #1a3a5c;
    font-family: 'Courier New', monospace;
    outline: none;
    transition: border-color 0.2s;
    background: #f8fafc;
  }
  .expr-input:focus { border-color: #22c55e; }

  /* 步骤展示 */
  .steps {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .step {
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 12px;
    padding: 14px 18px;
    position: relative;
    transition: all 0.3s;
  }
  .step.active {
    background: #dcfce7;
    border-color: #22c55e;
    box-shadow: 0 2px 12px rgba(34,197,94,0.2);
  }
  .step-num {
    position: absolute;
    top: -10px;
    left: 14px;
    background: #22c55e;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 10px;
  }
  .step-expr {
    font-size: 22px;
    font-weight: 700;
    color: #1a3a5c;
    font-family: 'Courier New', monospace;
    margin-bottom: 6px;
    line-height: 1.5;
    text-align: center;
  }
  .step-expr .highlight {
    background: #fde047;
    border-radius: 4px;
    padding: 0 4px;
  }
  .step-desc {
    font-size: 13px;
    color: #64748b;
    text-align: center;
  }
  .step-arrow {
    text-align: center;
    font-size: 20px;
    color: #94a3b8;
  }
  .final-result {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: #fff;
    font-size: 28px;
    font-weight: 800;
    padding: 16px 32px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(34,197,94,0.3);
  }
  .rule-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    margin-right: 4px;
  }
  .rule-multiply { background: #dbeafe; color: #1d4ed8; }
  .rule-paren { background: #fce7f3; color: #be185d; }
  .rule-add { background: #e0e7ff; color: #4338ca; }
</style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="edu-toolbar-title">🔢 四则运算顺序演示</span>
      <span class="edu-toolbar-subtitle">下册·四则运算</span>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-primary" onclick="calcStep()">下一步</button>
      <button class="edu-btn edu-btn-accent" onclick="calcAll()">全部展开</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetCalc()">重置</button>
    </div>
  </div>

  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <div class="expr-area">
          <div class="expr-input-wrap">
            <input class="expr-input" id="expr-input" value="3 + 4 × 2 - 1" placeholder="输入算式..."
              onkeydown="if(event.key==='Enter')startCalc()"/>
            <button class="edu-btn edu-btn-primary" onclick="startCalc()">开始计算</button>
          </div>
          <div class="steps" id="steps-container"></div>
        </div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">选择示例</div>
          <button class="example-btn" onclick="loadExample('3 + 4 × 2 - 1')">
            <div class="expr">3 + 4 × 2 - 1</div>
            <div style="font-size:11px;color:#94a3b8;">先乘除后加减</div>
          </button>
          <button class="example-btn" onclick="loadExample('(3 + 4) × 2 - 1')">
            <div class="expr">(3 + 4) × 2 - 1</div>
            <div style="font-size:11px;color:#94a3b8;">有括号先算括号</div>
          </button>
          <button class="example-btn" onclick="loadExample('12 ÷ 4 + 3 × 5 - 2')">
            <div class="expr">12 ÷ 4 + 3 × 5 - 2</div>
            <div style="font-size:11px;color:#94a3b8;">乘除同级</div>
          </button>
          <button class="example-btn" onclick="loadExample('2 × (6 + 3) ÷ (1 + 2)')">
            <div class="expr">2 × (6 + 3) ÷ (1 + 2)</div>
            <div style="font-size:11px;color:#94a3b8;">多组括号</div>
          </button>
          <button class="example-btn" onclick="loadExample('100 - 24 × 3 + 8 ÷ 2')">
            <div class="expr">100 - 24 × 3 + 8 ÷ 2</div>
            <div style="font-size:11px;color:#94a3b8;">综合练习</div>
          </button>
          <button class="example-btn" onclick="loadExample('(15 - 6) × (7 + 3) ÷ 5')">
            <div class="expr">(15 - 6) × (7 + 3) ÷ 5</div>
            <div style="font-size:11px;color:#94a3b8;">嵌套运算</div>
          </button>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">运算规则</div>
          <div class="info-box">
            <strong>四则运算顺序：</strong><br/>
            1. 有括号先算括号里面的<br/>
            2. 先算乘除，后算加减<br/>
            3. 同级运算从左到右依次计算<br/><br/>
            <span class="rule-tag rule-paren">括号</span>
            <span class="rule-tag rule-multiply">乘除</span>
            <span class="rule-tag rule-add">加减</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const stepsContainer = document.getElementById('steps-container');
const exprInput = document.getElementById('expr-input');

let steps = [];
let currentStep = 0;

// 将 × ÷ 替换为 JS 运算符
function toJSExpr(expr) {
  return expr
    .replace(/×/g, '*')
    .replace(/÷/g, '/')
    .replace(/＋/g, '+')
    .replace(/－/g, '-')
    .replace(/（/g, '(')
    .replace(/）/g, ')');
}

// 将 JS 运算符替换为显示用
function toDisplayExpr(expr) {
  return expr
    .replace(/\*/g, '×')
    .replace(/\//g, '÷');
}

// 安全表达式求值
function safeEval(expr) {
  const jsExpr = toJSExpr(expr);
  if (!/^[\d\s\+\-\*\/\(\)\.]+$/.test(jsExpr)) return null;
  try {
    return Function('"use strict"; return (' + jsExpr + ')')();
  } catch {
    return null;
  }
}

// 解析步骤
function parseSteps(expr) {
  const result = [];
  let current = expr.trim();

  // 递归求解
  function solve(e, depth) {
    if (depth > 10) return;

    // 检查是否有括号
    const parenMatch = e.match(/\(([^()]+)\)/);
    if (parenMatch) {
      const inner = parenMatch[1];
      const innerVal = safeEval(inner);
      if (innerVal === null) return;
      const rule = inner.match(/[×÷]/) ? '括号内先算乘除' : '先算括号里面的';
      result.push({
        expr: e,
        highlight: `(${inner})`,
        desc: `${rule}：${inner.replace(/×/g,'×').replace(/÷/g,'÷')} = ${innerVal}`,
        rule: 'paren'
      });
      const newVal = innerVal < 0 ? `(${innerVal})` : String(innerVal);
      const newExpr = e.replace(`(${inner})`, newVal);
      solve(newExpr, depth + 1);
      return;
    }

    // 检查乘除
    const mulDivMatch = e.match(/(-?\d+\.?\d*)\s*([×÷\*\/])\s*(-?\d+\.?\d*)/);
    if (mulDivMatch) {
      // 找到第一个乘除运算
      const ops = [];
      const re = /(-?\d+\.?\d*)\s*([×÷\*\/])\s*(-?\d+\.?\d*)/g;
      let m;
      while ((m = re.exec(e)) !== null) {
        ops.push({ full: m[0], a: parseFloat(m[1]), op: m[2], b: parseFloat(m[3]), idx: m.index });
      }
      if (ops.length > 0) {
        const first = ops[0];
        const val = first.op === '×' || first.op === '*' ? first.a * first.b : first.a / first.b;
        result.push({
          expr: e,
          highlight: first.full,
          desc: `先算乘除：${first.a} ${toDisplayExpr(first.op)} ${first.b} = ${val}`,
          rule: 'multiply'
        });
        const newVal = val < 0 ? `(${val})` : String(val);
        const newExpr = e.substring(0, first.idx) + newVal + e.substring(first.idx + first.full.length);
        solve(newExpr, depth + 1);
        return;
      }
    }

    // 检查加减
    const addSubMatch = e.match(/(-?\d+\.?\d*)\s*([+\-＋－])\s*(-?\d+\.?\d*)/);
    if (addSubMatch) {
      const ops = [];
      // 找第一个加减（注意负数）
      const re = /(-?\d+\.?\d*)\s*([+\-＋－])\s*(-?\d+\.?\d*)/g;
      let m;
      while ((m = re.exec(e)) !== null) {
        ops.push({ full: m[0], a: parseFloat(m[1]), op: m[2], b: parseFloat(m[3]), idx: m.index });
      }
      if (ops.length > 0) {
        const first = ops[0];
        const val = (first.op === '+' || first.op === '＋') ? first.a + first.b : first.a - first.b;
        result.push({
          expr: e,
          highlight: first.full,
          desc: `从左到右算加减：${first.a} ${first.op} ${first.b} = ${val}`,
          rule: 'add'
        });
        const newVal = val < 0 ? `(${val})` : String(val);
        const newExpr = e.substring(0, first.idx) + newVal + e.substring(first.idx + first.full.length);
        solve(newExpr, depth + 1);
        return;
      }
    }
  }

  solve(current, 0);

  // 最终结果
  const finalVal = safeEval(current);
  if (finalVal !== null) {
    result.push({ expr: String(finalVal), isFinal: true });
  }

  return result;
}

function renderSteps() {
  stepsContainer.innerHTML = '';
  steps.forEach((step, i) => {
    if (i > 0) {
      const arrow = document.createElement('div');
      arrow.className = 'step-arrow';
      arrow.textContent = '↓';
      stepsContainer.appendChild(arrow);
    }

    const el = document.createElement('div');
    el.className = 'step' + (i < currentStep ? ' active' : '');
    el.style.display = i < currentStep ? 'block' : 'none';

    if (step.isFinal) {
      el.innerHTML = `<div class="final-result">= ${step.expr}</div>`;
    } else {
      const highlighted = step.highlight
        ? step.expr.replace(step.highlight, `<span class="highlight">${step.highlight}</span>`)
        : step.expr;
      const ruleClass = step.rule === 'paren' ? 'rule-paren' : step.rule === 'multiply' ? 'rule-multiply' : 'rule-add';
      el.innerHTML = `
        <div class="step-num">第${i + 1}步</div>
        <div class="step-expr">${toDisplayExpr(highlighted)}</div>
        <div class="step-desc"><span class="rule-tag ${ruleClass}">${step.rule === 'paren' ? '括号' : step.rule === 'multiply' ? '乘除' : '加减'}</span>${step.desc}</div>
      `;
    }
    stepsContainer.appendChild(el);
  });
}

function startCalc() {
  const expr = exprInput.value.trim();
  if (!expr) return;
  steps = parseSteps(expr);
  currentStep = 0;
  renderSteps();
  // 自动走第一步
  if (steps.length > 0) calcStep();
}

function calcStep() {
  if (currentStep < steps.length) {
    currentStep++;
    renderSteps();
    // 滚动到底部
    const last = stepsContainer.lastElementChild;
    if (last) last.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function calcAll() {
  currentStep = steps.length;
  renderSteps();
  const last = stepsContainer.lastElementChild;
  if (last) last.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function resetCalc() {
  steps = [];
  currentStep = 0;
  stepsContainer.innerHTML = '';
}

function loadExample(expr) {
  exprInput.value = expr;
  startCalc();
}

// 初始化
startCalc();
</script>
</body>
</html>
