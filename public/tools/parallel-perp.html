<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>平行与垂直演示</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
  .main-layout {
    display: grid;
    grid-template-columns: 1fr 220px;
    height: 100%;
    gap: 0;
  }
  .canvas-area { position: relative; background: #fff; overflow: hidden; }
  .control-panel {
    background: #fdfaf4;
    border-left: 1px solid #e2e8f0;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow: auto;
  }
  .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
  .ctrl-label {
    font-size: 11px; font-weight: 700; color: #64748b;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .relation-card {
    background: #fff;
    border-radius: 12px;
    padding: 14px;
    text-align: center;
    border: 2px solid #e2e8f0;
    transition: all 0.3s;
  }
  .relation-card.parallel { border-color: #3b82f6; }
  .relation-card.perp { border-color: #ef4444; }
  .relation-card.neither { border-color: #94a3b8; }
  .relation-icon { font-size: 28px; margin-bottom: 4px; }
  .relation-text { font-size: 16px; font-weight: 700; }
  .relation-card.parallel .relation-text { color: #2563eb; }
  .relation-card.perp .relation-text { color: #dc2626; }
  .relation-card.neither .relation-text { color: #64748b; }
  .angle-display {
    text-align: center;
    font-size: 32px;
    font-weight: 800;
    color: #a855f7;
    line-height: 1;
  }
  .angle-unit { font-size: 14px; color: #94a3b8; }
  .preset-btn {
    padding: 7px 0; border-radius: 6px; font-size: 12px;
    font-weight: 600; cursor: pointer;
    border: 1.5px solid #e2e8f0; background: #fff;
    color: #64748b; transition: all 0.15s;
    font-family: var(--edu-font); text-align: center;
  }
  .preset-btn:hover { border-color: #3b82f6; color: #3b82f6; }
  .divider { height: 1px; background: #e2e8f0; }
  .info-box {
    background: #fff; border: 1px solid #bfdbfe;
    border-radius: 10px; padding: 10px 12px;
    font-size: 12px; color: #64748b; line-height: 1.8;
  }
  .info-box strong { color: #2563eb; }
  .hint-label {
    position: absolute; top: 14px; left: 14px;
    background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3);
    border-radius: 10px; padding: 6px 12px; font-size: 12px; color: #1d4ed8;
  }
</style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="edu-toolbar-title">📏 平行与垂直演示</span>
      <span class="edu-toolbar-subtitle">上册·平行四边形和梯形</span>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-primary" onclick="resetLines()">重置</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" id="btn-grid" onclick="toggleGrid()">显示网格</button>
      <button class="edu-btn edu-btn-outline" id="btn-angle" onclick="toggleAngleArc()">显示角度</button>
    </div>
  </div>

  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="canvas" class="edu-canvas-full"></canvas>
        <div class="hint-label">拖拽直线端点移动位置</div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">位置关系</div>
          <div class="relation-card" id="relation-card">
            <div class="relation-icon" id="rel-icon">⬌</div>
            <div class="relation-text" id="rel-text">一般位置</div>
          </div>
        </div>
        <div class="ctrl-section">
          <div class="ctrl-label">两线夹角</div>
          <div class="angle-display">
            <span id="angle-val">45</span><span class="angle-unit">°</span>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">预设关系</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
            <button class="preset-btn" onclick="loadPreset('parallel')">平行</button>
            <button class="preset-btn" onclick="loadPreset('perp')">垂直</button>
            <button class="preset-btn" onclick="loadPreset('oblique')">斜交</button>
            <button class="preset-btn" onclick="loadPreset('same')">重合</button>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">知识卡片</div>
          <div class="info-box">
            <strong>平行：</strong>在同一平面内，不相交的两条直线互相平行。<br/>
            <strong>垂直：</strong>两条直线相交成直角（90°）时，这两条直线互相垂直。<br/>
            <strong>记法：</strong>a ∥ b（平行），a ⊥ b（垂直）<br/>
            <strong>点到直线：</strong>从直线外一点到直线所画的线段中，垂线段最短。
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../edu-lib/edu-tools.js"></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
let showGrid = true;
let showAngleArc = true;
let dragTarget = null; // { line: 0|1, endpoint: 0|1 }

// 两条直线，每条由两个端点定义（归一化坐标）
let lines = [
  { p1: { x: 0.15, y: 0.35 }, p2: { x: 0.65, y: 0.25 } },
  { p1: { x: 0.2, y: 0.75 }, p2: { x: 0.75, y: 0.65 } }
];

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = canvas.clientWidth;
  H = canvas.clientHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function toPx(p) { return { x: p.x * W, y: p.y * H }; }

// 计算两条直线的延长线交点、角度
function lineAngle(l1, l2) {
  const d1 = { x: l1.p2.x - l1.p1.x, y: l1.p2.y - l1.p1.y };
  const d2 = { x: l2.p2.x - l2.p1.x, y: l2.p2.y - l2.p1.y };
  const len1 = Math.sqrt(d1.x*d1.x + d1.y*d1.y);
  const len2 = Math.sqrt(d2.x*d2.x + d2.y*d2.y);
  if (len1 < 0.001 || len2 < 0.001) return { angle: 0, isParallel: false, isPerp: false, relation: '退化' };
  const dot = (d1.x*d2.x + d1.y*d2.y) / (len1*len2);
  let angle = Math.acos(Math.max(-1, Math.min(1, Math.abs(dot))));
  const deg = (angle * 180) / Math.PI;
  const isParallel = Math.abs(deg) < 1.5 || Math.abs(deg - 180) < 1.5;
  const isPerp = Math.abs(deg - 90) < 1.5;
  let relation = '一般位置（斜交）';
  if (isParallel) relation = '互相平行 ∥';
  if (isPerp) relation = '互相垂直 ⊥';
  return { angle: Math.round(deg), isParallel, isPerp, relation };
}

// 延长线
function extendLine(p1, p2, scale) {
  const dx = p2.x - p1.x, dy = p2.y - p1.y;
  return {
    a: { x: p1.x - dx * scale, y: p1.y - dy * scale },
    b: { x: p2.x + dx * scale, y: p2.y + dy * scale }
  };
}

// 两条无限直线的交点
function lineIntersection(l1, l2) {
  const x1 = l1.p1.x, y1 = l1.p1.y, x2 = l1.p2.x, y2 = l1.p2.y;
  const x3 = l2.p1.x, y3 = l2.p1.y, x4 = l2.p2.x, y4 = l2.p2.y;
  const d = (x1-x2)*(y3-y4) - (y1-y2)*(x3-x4);
  if (Math.abs(d) < 0.0001) return null;
  const t = ((x1-x3)*(y3-y4) - (y1-y3)*(x3-x4)) / d;
  return { x: x1 + t*(x2-x1), y: y1 + t*(y2-y1) };
}

function render() {
  resize();
  ctx.clearRect(0, 0, W, H);

  if (showGrid) drawGrid(ctx, W, H, 40, '#e2e8f030');

  const info = lineAngle(lines[0], lines[1]);

  // 画延长线（虚线）
  lines.forEach((l, i) => {
    const ext = extendLine(l.p1, l.p2, 5);
    const a = toPx(ext.a), b = toPx(ext.b);
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.setLineDash([6, 4]);
    ctx.strokeStyle = i === 0 ? 'rgba(59,130,246,0.25)' : 'rgba(239,68,68,0.25)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // 画两条线段
  const colors = ['#3b82f6', '#ef4444'];
  const labels = ['直线 a', '直线 b'];
  lines.forEach((l, i) => {
    const p1 = toPx(l.p1), p2 = toPx(l.p2);
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.strokeStyle = colors[i];
    ctx.lineWidth = 3;
    ctx.stroke();

    // 端点
    [p1, p2].forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
      ctx.fillStyle = colors[i] + '30';
      ctx.fill();
      ctx.strokeStyle = colors[i];
      ctx.lineWidth = 2;
      ctx.stroke();
    });

    // 线标签
    const mid = { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };
    const dir = { x: p2.x - p1.x, y: p2.y - p1.y };
    const len = Math.sqrt(dir.x*dir.x + dir.y*dir.y) || 1;
    const perp = { x: -dir.y/len * 20, y: dir.x/len * 20 };
    ctx.fillStyle = colors[i];
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(labels[i], mid.x + perp.x, mid.y + perp.y);
  });

  // 交点和角度
  const inter = lineIntersection(lines[0], lines[1]);
  if (inter && !info.isParallel && showAngleArc) {
    const ip = toPx(inter);
    // 交点标记
    ctx.beginPath();
    ctx.arc(ip.x, ip.y, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#a855f7';
    ctx.fill();

    // 角度弧线
    const dirs = lines.map(l => {
      const dx = l.p2.x - l.p1.x, dy = l.p2.y - l.p1.y;
      const len = Math.sqrt(dx*dx + dy*dy) || 1;
      return { x: dx/len, y: dy/len };
    });
    const a1 = Math.atan2(dirs[0].y, dirs[0].x);
    const a2 = Math.atan2(dirs[1].y, dirs[1].x);
    const r = 30;
    ctx.beginPath();
    ctx.arc(ip.x, ip.y, r, Math.min(a1, a2), Math.max(a1, a2));
    ctx.strokeStyle = '#a855f7';
    ctx.lineWidth = 2;
    ctx.stroke();
    const midA = (a1 + a2) / 2;
    ctx.fillStyle = '#a855f7';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(info.angle + '°', ip.x + Math.cos(midA) * (r + 18), ip.y + Math.sin(midA) * (r + 18));

    // 直角标记
    if (info.isPerp) {
      const s = 12;
      const n1 = { x: ip.x + dirs[0].x * s, y: ip.y + dirs[0].y * s };
      const n2 = { x: ip.x + dirs[1].x * s, y: ip.y + dirs[1].y * s };
      const corner = { x: n1.x + (n2.x - ip.x), y: n1.y + (n2.y - ip.y) };
      ctx.beginPath();
      ctx.moveTo(n1.x, n1.y);
      ctx.lineTo(corner.x, corner.y);
      ctx.lineTo(n2.x, n2.y);
      ctx.strokeStyle = '#a855f7';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  // 更新面板
  const card = document.getElementById('relation-card');
  card.className = 'relation-card ' + (info.isParallel ? 'parallel' : info.isPerp ? 'perp' : 'neither');
  document.getElementById('rel-icon').textContent = info.isParallel ? '∥' : info.isPerp ? '⊥' : '⟂';
  document.getElementById('rel-text').textContent = info.relation;
  document.getElementById('angle-val').textContent = info.angle;
}

function resetLines() {
  lines = [
    { p1: { x: 0.15, y: 0.35 }, p2: { x: 0.65, y: 0.25 } },
    { p1: { x: 0.2, y: 0.75 }, p2: { x: 0.75, y: 0.65 } }
  ];
  render();
}

function toggleGrid() {
  showGrid = !showGrid;
  const btn = document.getElementById('btn-grid');
  btn.textContent = showGrid ? '隐藏网格' : '显示网格';
  btn.classList.toggle('edu-btn-active', showGrid);
  render();
}

function toggleAngleArc() {
  showAngleArc = !showAngleArc;
  const btn = document.getElementById('btn-angle');
  btn.textContent = showAngleArc ? '隐藏角度' : '显示角度';
  btn.classList.toggle('edu-btn-active', showAngleArc);
  render();
}

function loadPreset(type) {
  switch (type) {
    case 'parallel':
      lines = [
        { p1: { x: 0.1, y: 0.3 }, p2: { x: 0.7, y: 0.3 } },
        { p1: { x: 0.15, y: 0.65 }, p2: { x: 0.75, y: 0.65 } }
      ];
      break;
    case 'perp':
      lines = [
        { p1: { x: 0.15, y: 0.45 }, p2: { x: 0.75, y: 0.45 } },
        { p1: { x: 0.45, y: 0.15 }, p2: { x: 0.45, y: 0.8 } }
      ];
      break;
    case 'oblique':
      lines = [
        { p1: { x: 0.15, y: 0.25 }, p2: { x: 0.75, y: 0.55 } },
        { p1: { x: 0.2, y: 0.7 }, p2: { x: 0.8, y: 0.4 } }
      ];
      break;
    case 'same':
      lines = [
        { p1: { x: 0.2, y: 0.35 }, p2: { x: 0.8, y: 0.65 } },
        { p1: { x: 0.3, y: 0.4 }, p2: { x: 0.7, y: 0.6 } }
      ];
      break;
  }
  render();
}

// 拖拽逻辑
canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / W;
  const my = (e.clientY - rect.top) / H;
  let best = null, bestDist = 0.04;
  lines.forEach((l, li) => {
    [l.p1, l.p2].forEach((p, pi) => {
      const d = Math.sqrt((mx - p.x)**2 + (my - p.y)**2);
      if (d < bestDist) { bestDist = d; best = { line: li, endpoint: pi }; }
    });
  });
  dragTarget = best;
});

canvas.addEventListener('mousemove', e => {
  if (!dragTarget) { canvas.style.cursor = 'default'; return; }
  canvas.style.cursor = 'grabbing';
  const rect = canvas.getBoundingClientRect();
  const mx = Math.max(0.02, Math.min(0.98, (e.clientX - rect.left) / W));
  const my = Math.max(0.02, Math.min(0.98, (e.clientY - rect.top) / H));
  const ep = dragTarget.endpoint === 0 ? 'p1' : 'p2';
  lines[dragTarget.line][ep] = { x: mx, y: my };
  render();
});

canvas.addEventListener('mouseup', () => { dragTarget = null; });
canvas.addEventListener('mouseleave', () => { dragTarget = null; });

// 触摸
canvas.addEventListener('touchstart', e => {
  const rect = canvas.getBoundingClientRect();
  const tx = (e.touches[0].clientX - rect.left) / W;
  const ty = (e.touches[0].clientY - rect.top) / H;
  let best = null, bestDist = 0.06;
  lines.forEach((l, li) => {
    [l.p1, l.p2].forEach((p, pi) => {
      const d = Math.sqrt((tx - p.x)**2 + (ty - p.y)**2);
      if (d < bestDist) { bestDist = d; best = { line: li, endpoint: pi }; }
    });
  });
  dragTarget = best;
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  if (!dragTarget) return;
  const rect = canvas.getBoundingClientRect();
  const mx = Math.max(0.02, Math.min(0.98, (e.touches[0].clientX - rect.left) / W));
  const my = Math.max(0.02, Math.min(0.98, (e.touches[0].clientY - rect.top) / H));
  const ep = dragTarget.endpoint === 0 ? 'p1' : 'p2';
  lines[dragTarget.line][ep] = { x: mx, y: my };
  render();
}, { passive: true });

canvas.addEventListener('touchend', () => { dragTarget = null; });

window.addEventListener('resize', render);
render();
</script>
</body>
</html>
