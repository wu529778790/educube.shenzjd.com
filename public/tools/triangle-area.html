<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三角形面积 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <script src="../edu-lib/edu-tools.js"></script>
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 260px; height: 100%; }
    .canvas-area { position: relative; background: linear-gradient(135deg, #eff6ff 0%, #fdfaf4 100%); overflow: hidden; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 12px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #bfdbfe; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .formula-bar { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(6px); border-top: 1px solid #bfdbfe; padding: 10px 20px; display: flex; align-items: center; gap: 16px; }
    .formula-big { font-size: 22px; font-weight: 800; color: #3b82f6; font-family: 'Courier New', monospace; }
    .formula-label { font-size: 13px; color: #64748b; }
    .preset-btn { padding: 7px 0; border-radius: 8px; font-size: 12px; font-weight: 600; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; }
    .preset-btn:hover { border-color: #3b82f6; color: #3b82f6; }
    .preset-btn.active { border-color: #3b82f6; color: #3b82f6; background: #eff6ff; }
    .toggle-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #334155; cursor: pointer; }
    .toggle-row input[type=checkbox] { accent-color: #3b82f6; width: 16px; height: 16px; }
    .step-indicator { display: flex; gap: 6px; margin-top: 4px; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #cbd5e1; transition: background .3s; }
    .step-dot.active { background: #3b82f6; }
    .hint-label { position: absolute; top: 12px; left: 12px; background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.25); border-radius: 10px; padding: 6px 12px; font-size: 12px; color: #2563eb; pointer-events: none; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">△ 三角形面积</div>
      <div class="edu-toolbar-subtitle">上册 · 第六单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-accent" onclick="animateProof()">复制翻转动画</button>
      <button class="edu-btn edu-btn-outline" onclick="animateHeight()">画高动画</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="canvas" class="edu-canvas-full" style="cursor:default"></canvas>
        <div class="hint-label">拖拽三角形的三个顶点</div>
        <div class="formula-bar" id="formulaBar">
          <div class="formula-label">面积公式</div>
          <div class="formula-big" id="formulaText">S = 8 × 5 ÷ 2 = 20 cm²</div>
        </div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">实时数据</div>
          <div class="info-box" id="liveInfo">
            底 = 8.0 cm<br/>高 = 5.0 cm<br/>面积 = 20.0 cm²
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">预设三角形</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
            <button class="preset-btn" id="btn-scalene" onclick="morphTo('scalene')">不规则</button>
            <button class="preset-btn" id="btn-equilateral" onclick="morphTo('equilateral')">等边</button>
            <button class="preset-btn" id="btn-isosceles" onclick="morphTo('isosceles')">等腰</button>
            <button class="preset-btn" id="btn-right" onclick="morphTo('right')">直角</button>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">显示选项</div>
          <label class="toggle-row"><input type="checkbox" id="chkGrid" onchange="render()"> 显示网格</label>
          <label class="toggle-row"><input type="checkbox" id="chkHeight" checked onchange="render()"> 显示高</label>
          <label class="toggle-row"><input type="checkbox" id="chkLabels" checked onchange="render()"> 显示标注</label>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">推导步骤</div>
          <div class="step-indicator" id="stepDots">
            <div class="step-dot"></div><div class="step-dot"></div>
            <div class="step-dot"></div><div class="step-dot"></div>
            <div class="step-dot"></div>
          </div>
          <div class="info-box" id="proofInfo">
            点击工具栏「复制翻转动画」观看面积公式推导过程
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">面积公式推导</div>
          <div class="info-box">
            <b>S = 底 × 高 ÷ 2</b><br/>
            ● 取两个完全相同的三角形<br/>
            ● 把其中一个旋转180°<br/>
            ● 拼成一个平行四边形<br/>
            ● 平行四边形面积 = 底 × 高<br/>
            ● 三角形面积 = 底 × 高 ÷ 2
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
/* ───── State ───── */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, dpr;
const VERTEX_R = 10, HIT_R = 22;

/* vertices in canvas-pixel coords */
let verts = [ {x:0,y:0}, {x:0,y:0}, {x:0,y:0} ];
let dragIdx = -1;

/* proof animation */
let proofProg = -1;  // -1 = off, 0..1 = animating
let proofAnimating = false;

/* height drop animation */
let heightProg = -1;
let heightAnimating = false;

/* morph animation */
let morphFrom = null, morphTo_pts = null, morphT = 1;

/* ───── Presets (in 0..1 normalized space relative to canvas) ───── */
const presets = {
  scalene:    { label:'不规则', pts:[{x:0.25,y:0.7},{x:0.75,y:0.7},{x:0.4,y:0.2}] },
  equilateral:{ label:'等边',   pts:[{x:0.22,y:0.75},{x:0.78,y:0.75},{x:0.5,y:0.18}] },
  isosceles:  { label:'等腰',   pts:[{x:0.25,y:0.75},{x:0.75,y:0.75},{x:0.5,y:0.2}] },
  right:      { label:'直角',   pts:[{x:0.25,y:0.75},{x:0.75,y:0.75},{x:0.25,y:0.2}] }
};

/* ───── Setup ───── */
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = canvas.clientWidth;
  H = canvas.clientHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function initVerts() {
  const p = presets.scalene.pts;
  const barH = 50; // formula bar height
  const usableH = H - barH;
  verts = p.map(v => ({ x: v.x * W, y: v.y * usableH }));
}

/* ───── Geometry helpers ───── */
function dist(a, b) { return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2); }

/* signed area (positive if CCW) in canvas pixels^2 */
function signedArea2(a, b, c) {
  return (b.x - a.x) * (c.y - a.y) - (c.x - a.x) * (b.y - a.y);
}
function triAreaPx(a, b, c) { return Math.abs(signedArea2(a, b, c)) / 2; }

/* Height from vertex C to segment AB */
function heightFromC(a, b, c) {
  const ab = dist(a, b);
  if (ab < 1e-6) return 0;
  return 2 * triAreaPx(a, b, c) / ab;
}

/* Foot of perpendicular from C onto line AB */
function footOfPerp(a, b, c) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const len2 = dx*dx + dy*dy;
  if (len2 < 1e-6) return { x: a.x, y: a.y };
  const t = ((c.x - a.x)*dx + (c.y - a.y)*dy) / len2;
  return { x: a.x + t*dx, y: a.y + t*dy };
}

/* ───── Coordinate mapping ───── */
const PX_PER_CM = 30;

function pxToCm(px) { return px / PX_PER_CM; }

/* ───── Drawing ───── */
function render() {
  resize();
  const barH = 50;
  const usableH = H - barH;
  ctx.clearRect(0, 0, W, H);

  const [A, B, C] = verts;
  const showGrid = document.getElementById('chkGrid').checked;
  const showH = document.getElementById('chkHeight').checked;
  const showLbl = document.getElementById('chkLabels').checked;

  /* grid */
  if (showGrid) drawGrid(ctx, W, usableH, PX_PER_CM, '#cbd5e1');

  /* base AB length and height from C */
  const basePx = dist(A, B);
  const hPx = heightFromC(A, B, C);
  const foot = footOfPerp(A, B, C);

  /* determine if C is above or below AB (canvas y is inverted) */
  const isAbove = signedArea2(A, B, C) > 0;

  /* ── Height line (dashed) ── */
  if (showH) {
    const hDraw = heightProg >= 0 ? heightProg : 1;
    ctx.save();
    ctx.setLineDash([6, 4]);
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(C.x, C.y);
    ctx.lineTo(lerp(C.x, foot.x, hDraw), lerp(C.y, foot.y, hDraw));
    ctx.stroke();
    ctx.setLineDash([]);

    /* right-angle marker at foot */
    if (hDraw > 0.9) {
      const size = 10;
      const dx = B.x - A.x, dy = B.y - A.y;
      const len = Math.sqrt(dx*dx + dy*dy) || 1;
      const ux = dx/len, uy = dy/len;
      /* perpendicular direction (toward C side) */
      const sign = isAbove ? -1 : 1;
      const px = -uy * sign, py = ux * sign;
      ctx.strokeStyle = '#ef4444';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(foot.x + ux*size, foot.y + uy*size);
      ctx.lineTo(foot.x + ux*size + px*size, foot.y + uy*size + py*size);
      ctx.lineTo(foot.x + px*size, foot.y + py*size);
      ctx.stroke();
    }
    ctx.restore();
  }

  /* ── Proof duplicate triangle ── */
  if (proofProg >= 0) {
    const p = Math.min(proofProg, 1);
    /* The mirrored copy: reflect C across midpoint of AB to get C' */
    const mx = (A.x + B.x) / 2, my = (A.y + B.y) / 2;
    const cPrime = { x: 2*mx - C.x, y: 2*my - C.y };

    /* Animate: duplicate starts at original position, morphs to reflected */
    const dupA = { x: lerp(A.x, B.x, p), y: lerp(A.y, B.y, p) };
    const dupB = { x: lerp(B.x, A.x, p), y: lerp(B.y, A.y, p) };
    const dupC = { x: lerp(C.x, cPrime.x, p), y: lerp(C.y, cPrime.y, p) };

    ctx.save();
    ctx.globalAlpha = p;
    ctx.beginPath();
    ctx.moveTo(dupA.x, dupA.y);
    ctx.lineTo(dupB.x, dupB.y);
    ctx.lineTo(dupC.x, dupC.y);
    ctx.closePath();
    ctx.fillStyle = '#fef3c7';
    ctx.fill();
    ctx.strokeStyle = '#eab308';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.restore();

    /* Parallelogram label */
    if (p > 0.92) {
      ctx.fillStyle = '#92400e';
      ctx.font = 'bold 15px sans-serif';
      ctx.textAlign = 'center';
      const pmx = (A.x + B.x + cPrime.x) / 3;
      const pmy = (A.y + B.y + cPrime.y) / 3;
      ctx.fillText('平行四边形', pmx, pmy);
    }
  }

  /* ── Main triangle ── */
  ctx.beginPath();
  ctx.moveTo(A.x, A.y);
  ctx.lineTo(B.x, B.y);
  ctx.lineTo(C.x, C.y);
  ctx.closePath();
  ctx.fillStyle = 'rgba(59,130,246,0.12)';
  ctx.fill();
  ctx.strokeStyle = '#3b82f6';
  ctx.lineWidth = 2.5;
  ctx.stroke();

  /* ── Labels ── */
  if (showLbl) {
    const baseCm = pxToCm(basePx).toFixed(1);
    const hCm = pxToCm(hPx).toFixed(1);
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';

    /* base label */
    const bmx = (A.x + B.x) / 2, bmy = (A.y + B.y) / 2;
    const bNx = -(B.y - A.y) / (basePx || 1);
    const bNy =  (B.x - A.x) / (basePx || 1);
    ctx.fillStyle = '#3b82f6';
    ctx.fillText('底 = ' + baseCm + ' cm', bmx + bNx * 20, bmy + bNy * 20);

    /* height label */
    if (showH) {
      const hmx = (C.x + foot.x) / 2, hmy = (C.y + foot.y) / 2;
      ctx.save();
      ctx.translate(hmx - 16, hmy);
      ctx.fillStyle = '#ef4444';
      ctx.fillText('高 = ' + hCm + ' cm', 0, 0);
      ctx.restore();
    }

    /* vertex labels */
    ctx.fillStyle = '#1e293b';
    ctx.font = 'bold 13px sans-serif';
    ctx.fillText('A', A.x, A.y + 22);
    ctx.fillText('B', B.x, B.y + 22);
    ctx.fillText('C', C.x + (isAbove ? 16 : 16), C.y + (isAbove ? -8 : 20));
  }

  /* ── Vertices (draggable handles) ── */
  verts.forEach((v, i) => {
    ctx.beginPath();
    ctx.arc(v.x, v.y, VERTEX_R, 0, Math.PI * 2);
    ctx.fillStyle = dragIdx === i ? '#2563eb' : '#fff';
    ctx.fill();
    ctx.strokeStyle = '#3b82f6';
    ctx.lineWidth = 2.5;
    ctx.stroke();
  });

  updateInfo(basePx, hPx);
}

function updateInfo(basePx, hPx) {
  const baseCm = pxToCm(basePx);
  const hCm = pxToCm(hPx);
  const area = baseCm * hCm / 2;
  document.getElementById('formulaText').textContent =
    `S = ${baseCm.toFixed(1)} × ${hCm.toFixed(1)} ÷ 2 = ${area.toFixed(1)} cm²`;
  document.getElementById('liveInfo').innerHTML =
    `底 = ${baseCm.toFixed(1)} cm<br/>高 = ${hCm.toFixed(1)} cm<br/>面积 = ${area.toFixed(1)} cm²`;

  /* proof step info */
  if (proofProg >= 0) {
    const area2 = (baseCm * hCm).toFixed(1);
    const steps = [
      `① 取一个底 ${baseCm.toFixed(1)} cm、高 ${hCm.toFixed(1)} cm 的三角形`,
      `② 复制一个完全相同的三角形`,
      `③ 将复制的三角形旋转 180°`,
      `④ 拼成平行四边形：面积 = ${baseCm.toFixed(1)} × ${hCm.toFixed(1)} = ${area2} cm²`,
      `⑤ 三角形面积 = ${area2} ÷ 2 = <b style="color:#3b82f6">${area.toFixed(1)} cm²</b>`
    ];
    const stepIdx = Math.min(4, Math.floor(proofProg * 5));
    const dots = document.querySelectorAll('#stepDots .step-dot');
    dots.forEach((d, i) => d.classList.toggle('active', i <= stepIdx));
    document.getElementById('proofInfo').innerHTML = steps.slice(0, stepIdx + 1).join('<br/>');
  }
}

/* ───── Proof animation ───── */
function animateProof() {
  if (proofAnimating) return;
  proofAnimating = true;
  proofProg = 0;
  let t = 0;
  function step() {
    t += 0.012;
    if (t >= 1) { t = 1; proofAnimating = false; }
    proofProg = t;
    render();
    if (t < 1) requestAnimationFrame(step);
  }
  step();
}

/* ───── Height drop animation ───── */
function animateHeight() {
  if (heightAnimating) return;
  heightAnimating = true;
  heightProg = 0;
  let t = 0;
  function step() {
    t += 0.025;
    if (t >= 1) { t = 1; heightAnimating = false; }
    heightProg = t;
    render();
    if (t < 1) requestAnimationFrame(step);
  }
  step();
}

/* ───── Morph to preset ───── */
function morphTo(name) {
  const barH = 50;
  const usableH = H - barH;
  const target = presets[name].pts.map(v => ({ x: v.x * W, y: v.y * usableH }));
  morphFrom = verts.map(v => ({ ...v }));
  morphTo_pts = target;
  morphT = 0;
  /* highlight active preset button */
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + name);
  if (btn) btn.classList.add('active');
  /* reset proof */
  proofProg = -1;
  heightProg = -1;
  animateMorph();
}

function animateMorph() {
  morphT += 0.04;
  if (morphT >= 1) {
    morphT = 1;
    verts = morphTo_pts.map(v => ({ ...v }));
  } else {
    const ease = morphT * morphT * (3 - 2 * morphT); // smoothstep
    for (let i = 0; i < 3; i++) {
      verts[i] = {
        x: lerp(morphFrom[i].x, morphTo_pts[i].x, ease),
        y: lerp(morphFrom[i].y, morphTo_pts[i].y, ease)
      };
    }
  }
  render();
  if (morphT < 1) requestAnimationFrame(animateMorph);
}

/* ───── Drag handling ───── */
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
  return { x: cx, y: cy };
}

function hitTest(pos) {
  for (let i = 0; i < 3; i++) {
    if (dist(pos, verts[i]) < HIT_R) return i;
  }
  return -1;
}

canvas.addEventListener('mousedown', e => {
  const p = getCanvasPos(e);
  dragIdx = hitTest(p);
  if (dragIdx >= 0) {
    canvas.style.cursor = 'grabbing';
    proofProg = -1;
    heightProg = -1;
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  }
});

canvas.addEventListener('mousemove', e => {
  const p = getCanvasPos(e);
  if (dragIdx >= 0) {
    const barH = 50;
    verts[dragIdx].x = Math.max(VERTEX_R, Math.min(W - VERTEX_R, p.x));
    verts[dragIdx].y = Math.max(VERTEX_R, Math.min(H - barH - VERTEX_R, p.y));
    render();
  } else {
    canvas.style.cursor = hitTest(p) >= 0 ? 'grab' : 'default';
  }
});

canvas.addEventListener('mouseup', () => { dragIdx = -1; canvas.style.cursor = 'default'; });
canvas.addEventListener('mouseleave', () => { dragIdx = -1; });

/* Touch support */
canvas.addEventListener('touchstart', e => {
  const p = getCanvasPos(e);
  dragIdx = hitTest(p);
  if (dragIdx >= 0) { proofProg = -1; heightProg = -1; }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  if (dragIdx < 0) return;
  const p = getCanvasPos(e);
  const barH = 50;
  verts[dragIdx].x = Math.max(VERTEX_R, Math.min(W - VERTEX_R, p.x));
  verts[dragIdx].y = Math.max(VERTEX_R, Math.min(H - barH - VERTEX_R, p.y));
  render();
}, { passive: true });

canvas.addEventListener('touchend', () => { dragIdx = -1; });

/* ───── Reset ───── */
function resetAll() {
  proofProg = -1;
  heightProg = -1;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-scalene').classList.add('active');
  initVerts();
  render();
}

/* ───── Init ───── */
window.addEventListener('resize', () => { initVerts(); render(); });
initVerts();
document.getElementById('btn-scalene').classList.add('active');
render();
</script>
</body>
</html>
