<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>数轴与比大小 — 教立方</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
*{box-sizing:border-box}body{font-family:var(--edu-font);margin:0}
.tool{width:100vw;height:100vh;display:flex;flex-direction:column;background:var(--edu-bg)}
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#fff;border-bottom:1px solid var(--edu-border)}
.toolbar h1{font-size:15px;color:var(--edu-primary);margin:0}
.toolbar span{font-size:11px;color:var(--edu-text-muted);background:#f1f5f9;padding:2px 8px;border-radius:12px}
.main{flex:1;display:grid;grid-template-columns:1fr 280px;overflow:hidden}
.canvas-wrap{position:relative;overflow:hidden;background:linear-gradient(135deg,#ecfdf5,#f0fdf4)}
.canvas-wrap canvas{width:100%;height:100%;display:block}
.panel{background:#fff;border-left:1px solid var(--edu-border);padding:12px;display:flex;flex-direction:column;gap:8px;overflow:auto}
.section{display:flex;flex-direction:column;gap:4px}
.label{font-size:10px;font-weight:700;color:#64748b;letter-spacing:.05em}
.divider{height:1px;background:var(--edu-border)}
.btn{padding:6px 12px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--edu-font);transition:all .15s}
.btn.active{background:var(--edu-primary);color:#fff}
.btn-default{background:#f1f5f9;color:#334155}
.btn-default:hover{background:#e2e8f0}
.row{display:flex;gap:4px;flex-wrap:wrap}
.slider-row{display:flex;align-items:center;gap:6px}
.slider-row label{font-size:11px;font-weight:700;min-width:28px}
.slider-row input[type=range]{flex:1}
.slider-row .val{font-size:14px;font-weight:800;min-width:28px;text-align:right;color:#15803d}

.compare-box{text-align:center;padding:10px;background:#f0fdf4;border:2px solid #86efac;border-radius:12px}
.compare-box .nums{font-size:32px;font-weight:800;font-family:monospace}
.compare-box .symbol{font-size:24px;font-weight:800;margin:0 8px}

.quiz-card{background:#f0fdf4;border:2px solid #86efac;border-radius:12px;padding:10px;text-align:center}
.quiz-q{font-size:16px;font-weight:700;color:#166534}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px}
.quiz-opt{padding:10px;border:2px solid #e2e8f0;border-radius:10px;font-size:20px;font-weight:700;cursor:pointer;background:#fff;font-family:var(--edu-font)}
.quiz-opt:hover{border-color:#22c55e}
.quiz-opt.correct{background:#dcfce7;border-color:#22c55e}
.quiz-opt.wrong{background:#fef2f2;border-color:#ef4444}
.quiz-result{font-size:12px;font-weight:700;margin-top:6px;min-height:18px}

.info{font-size:11px;line-height:1.8;color:#334155;background:#fff;border:1px solid #bbf7d0;border-radius:8px;padding:8px 10px}
.info b{color:#166534}
</style>
</head>
<body>
<div class="tool">
  <div class="toolbar"><h1>🔢 数轴与比大小</h1><span>一年级下册 · 数学</span></div>
  <div class="main">
    <div class="canvas-wrap"><canvas id="cv"></canvas></div>
    <div class="panel">
      <div class="compare-box">
        <span class="nums"><span id="cmp-a" style="color:#3b82f6">5</span></span>
        <span class="symbol" id="cmp-sym" style="color:#16a34a">></span>
        <span class="nums"><span id="cmp-b" style="color:#ef4444">3</span></span>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">选择两个数</div>
        <div class="slider-row"><label>a=</label><input type="range" id="sl-a" min="0" max="20" value="5" oninput="onSlider()"/><div class="val" id="va">5</div></div>
        <div class="slider-row"><label>b=</label><input type="range" id="sl-b" min="0" max="20" value="3" oninput="onSlider()"/><div class="val" id="vb">3</div></div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">数轴范围</div>
        <div class="row">
          <button class="btn active" id="rng-10" onclick="setRange(10)">0-10</button>
          <button class="btn btn-default" id="rng-20" onclick="setRange(20)">0-20</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">动物计数</div>
        <div class="row">
          <button class="btn active" id="ani-🍎" onclick="setAnimal('🍎')">🍎</button>
          <button class="btn btn-default" id="ani-🌟" onclick="setAnimal('🌟')">🌟</button>
          <button class="btn btn-default" id="ani-🐟" onclick="setAnimal('🐟')">🐟</button>
          <button class="btn btn-default" id="ani-🐱" onclick="setAnimal('🐱')">🐱</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">比一比</div>
        <div class="quiz-card" id="quiz-card"></div>
      </div>
      <div class="divider"></div>
      <div class="info">
        <b>比大小口诀</b><br/>
        ● 数字大，数轴上越靠右<br/>
        ● 数字小，数轴上越靠左<br/>
        ● <strong>></strong> 大于号，开口朝大数<br/>
        ● <strong><</strong> 小于号，尖头朝小数<br/>
        ● <strong>=</strong> 等于号，两数一样大
      </div>
    </div>
  </div>
</div>
<script>
var cv, ctx, _a = 5, _b = 3, _range = 10, _animal = '🍎';

function init() {
  cv = document.getElementById('cv');
  ctx = cv.getContext('2d');
  window.addEventListener('resize', resize);
  resize();
  updateCompare();
  nextQuiz();
}

function resize() {
  var r = cv.parentElement.getBoundingClientRect();
  cv.width = r.width * devicePixelRatio;
  cv.height = r.height * devicePixelRatio;
  cv.style.width = r.width + 'px';
  cv.style.height = r.height + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  draw();
}

function onSlider() {
  _a = parseInt(document.getElementById('sl-a').value);
  _b = parseInt(document.getElementById('sl-b').value);
  document.getElementById('va').textContent = _a;
  document.getElementById('vb').textContent = _b;
  updateCompare();
  draw();
}

function setRange(r) {
  _range = r;
  document.getElementById('rng-10').className = 'btn' + (r === 10 ? ' active' : ' btn-default');
  document.getElementById('rng-20').className = 'btn' + (r === 20 ? ' active' : ' btn-default');
  document.getElementById('sl-a').max = r;
  document.getElementById('sl-b').max = r;
  draw();
}

function setAnimal(a) {
  _animal = a;
  ['🍎','🌟','🐟','🐱'].forEach(function(k) {
    document.getElementById('ani-' + k).className = 'btn' + (k === a ? ' active' : ' btn-default');
  });
  draw();
}

function updateCompare() {
  var sym = _a > _b ? '>' : _a < _b ? '<' : '=';
  document.getElementById('cmp-a').textContent = _a;
  document.getElementById('cmp-b').textContent = _b;
  document.getElementById('cmp-sym').textContent = sym;
  document.getElementById('cmp-sym').style.color = _a === _b ? '#f59e0b' : '#16a34a';
}

function draw() {
  var w = cv.width / devicePixelRatio, h = cv.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  var max = _range;
  var margin = 60;
  var lineY = h * 0.25;
  var lineW = w - margin * 2;
  var unitW = lineW / max;

  // Number line
  ctx.strokeStyle = '#334155'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(margin - 10, lineY); ctx.lineTo(margin + lineW + 20, lineY); ctx.stroke();

  // Arrow
  ctx.fillStyle = '#334155';
  ctx.beginPath(); ctx.moveTo(margin + lineW + 20, lineY); ctx.lineTo(margin + lineW + 10, lineY - 6); ctx.lineTo(margin + lineW + 10, lineY + 6); ctx.fill();

  // Ticks and numbers
  ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
  for (var i = 0; i <= max; i++) {
    var x = margin + i * unitW;
    ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = i % 5 === 0 ? 2 : 1;
    ctx.beginPath(); ctx.moveTo(x, lineY - 8); ctx.lineTo(x, lineY + 8); ctx.stroke();
    ctx.fillStyle = '#334155';
    ctx.fillText(i, x, lineY + 26);
  }

  // Highlight a
  var ax = margin + _a * unitW;
  ctx.fillStyle = '#3b82f6';
  ctx.beginPath(); ctx.arc(ax, lineY, 10, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(_a, ax, lineY + 4);

  // Highlight b
  var bx = margin + _b * unitW;
  ctx.fillStyle = '#ef4444';
  ctx.beginPath(); ctx.arc(bx, lineY, 10, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillText(_b, bx, lineY + 4);

  // Connection line between a and b
  if (_a !== _b) {
    var minX = Math.min(ax, bx), maxX = Math.max(ax, bx);
    ctx.strokeStyle = '#f59e0b44'; ctx.lineWidth = 8;
    ctx.beginPath(); ctx.moveTo(minX, lineY); ctx.lineTo(maxX, lineY); ctx.stroke();

    // Distance label
    var dist = Math.abs(_a - _b);
    ctx.fillStyle = '#92400e'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('相差 ' + dist, (minX + maxX) / 2, lineY - 20);
  }

  // Labels
  ctx.font = 'bold 13px sans-serif';
  ctx.fillStyle = '#3b82f6'; ctx.textAlign = 'center';
  ctx.fillText('a=' + _a, ax, lineY - 18);
  ctx.fillStyle = '#ef4444';
  ctx.fillText('b=' + _b, bx, lineY + 46);

  // === Counting visualization below ===
  var countY = lineY + 80;
  var cellSize = Math.min(40, (w - 80) / Math.max(max, 1));
  cellSize = Math.max(cellSize, 24);

  // Draw a group
  ctx.fillStyle = '#3b82f6'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('a = ' + _a + ' :', 20, countY + cellSize / 2 + 5);

  var axStart = 90;
  for (var i = 0; i < _a; i++) {
    var col = i % 10;
    var row = Math.floor(i / 10);
    var ix = axStart + col * (cellSize + 4) + cellSize / 2;
    var iy = countY + row * (cellSize + 4) + cellSize / 2;
    ctx.font = (cellSize * 0.6) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(_animal, ix, iy + cellSize * 0.15);
  }

  // Draw b group
  var bStartY = countY + Math.ceil(_a / 10) * (cellSize + 4) + 20;
  ctx.fillStyle = '#ef4444'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('b = ' + _b + ' :', 20, bStartY + cellSize / 2 + 5);

  var animalB = _animal === '🍎' ? '🍊' : _animal === '🌟' ? '⭐' : _animal === '🐟' ? '🐠' : '🐶';
  for (var i = 0; i < _b; i++) {
    var col = i % 10;
    var row = Math.floor(i / 10);
    var ix = axStart + col * (cellSize + 4) + cellSize / 2;
    var iy = bStartY + row * (cellSize + 4) + cellSize / 2;
    ctx.font = (cellSize * 0.6) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(animalB, ix, iy + cellSize * 0.15);
  }

  // Result
  var sym = _a > _b ? '>' : _a < _b ? '<' : '=';
  var resY = bStartY + Math.ceil(_b / 10) * (cellSize + 4) + 20;
  ctx.font = 'bold 20px sans-serif'; ctx.textAlign = 'center';
  ctx.fillStyle = '#16a34a';
  ctx.fillText(_a + ' ' + sym + ' ' + _b, w / 2, Math.min(resY, h - 10));
}

// ===== Quiz =====
var _qi = 0, _score = 0;

function nextQuiz() {
  var a = Math.floor(Math.random() * _range);
  var b = Math.floor(Math.random() * _range);
  var ans = a > b ? '>' : a < b ? '<' : '=';
  var q = a + '  ?  ' + b;
  var html = '<div class="quiz-q">' + q + '</div>';
  html += '<div class="quiz-opts">';
  var opts = ['<', '=', '>'];
  opts.forEach(function(o) {
    html += '<button class="quiz-opt" onclick="answer(\'' + o + '\',\'' + ans + '\')">' + o + '</button>';
  });
  html += '</div><div class="quiz-result" id="qr"></div>';
  document.getElementById('quiz-card').innerHTML = html;
}

function answer(val, ans) {
  var opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(function(b) {
    b.onclick = null; b.style.cursor = 'default';
    if (b.textContent === ans) b.classList.add('correct');
    if (b.textContent === val && val !== ans) b.classList.add('wrong');
  });
  var r = document.getElementById('qr');
  if (val === ans) { r.textContent = '✓ 太棒了！'; r.style.color = '#16a34a'; _score++; }
  else { r.textContent = '✗ 正确答案是 ' + ans; r.style.color = '#ef4444'; }
  _qi++;
  setTimeout(nextQuiz, 1200);
}

init();
</script>
</body>
</html>
