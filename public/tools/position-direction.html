<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>位置与方向 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 280px; height: 100%; }
    .canvas-area { padding: 16px; overflow: hidden; background: linear-gradient(135deg, #e0f2fe 0%, #fdfaf4 100%); position: relative; display: flex; flex-direction: column; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 12px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: .05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #bae6fd; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .preset-btn { padding: 8px 0; border-radius: 8px; font-size: 13px; font-weight: 600; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; width: 100%; }
    .preset-btn:hover { border-color: #0ea5e9; color: #0ea5e9; }
    .tab-bar { display: flex; gap: 4px; }
    .tab-btn { flex: 1; padding: 7px 0; border-radius: 8px; border: 1.5px solid #e2e8f0; background: #fff; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; }
    .tab-btn.active { background: #0ea5e9; color: #fff; border-color: #0ea5e9; }
    .tab-btn:hover:not(.active) { border-color: #0ea5e9; color: #0ea5e9; }
    .coord-display { background: #fff; border: 2px solid #0ea5e9; border-radius: 12px; padding: 10px 14px; text-align: center; font-size: 14px; font-weight: 600; }
    .point-row { display: flex; align-items: center; gap: 8px; padding: 5px 10px; background: #fff; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 12px; }
    .point-color { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .nav-hint { background: #fff; border: 2px solid #22c55e; border-radius: 12px; padding: 10px 14px; text-align: center; font-size: 14px; font-weight: 700; }
    .dir-grid { display: grid; grid-template-columns: repeat(3, 40px); grid-template-rows: repeat(3, 40px); gap: 4px; justify-content: center; }
    .dir-btn { border-radius: 8px; border: 1.5px solid #e2e8f0; background: #fff; font-size: 16px; font-weight: 800; cursor: pointer; transition: all .12s; display: flex; align-items: center; justify-content: center; color: #0ea5e9; }
    .dir-btn:hover { background: #0ea5e9; color: #fff; }
    .dir-btn:active { transform: scale(.92); }
    .dir-btn.center-btn { background: #f8fafc; color: #94a3b8; cursor: default; font-size: 10px; }
    .score-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; background: linear-gradient(135deg, #0ea5e9, #06b6d4); color: #fff; }
    .quiz-option { padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 700; border: 2px solid #e2e8f0; background: #fff; cursor: pointer; transition: all .15s; text-align: center; }
    .quiz-option:hover { border-color: #0ea5e9; color: #0ea5e9; }
    .quiz-option.correct { background: #dcfce7; border-color: #22c55e; color: #16a34a; }
    .quiz-option.wrong { background: #fee2e2; border-color: #ef4444; color: #ef4444; }
    .trail-legend { display: flex; gap: 12px; justify-content: center; font-size: 11px; color: #64748b; padding: 4px 0; }
    .trail-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">🧭 位置与方向</div>
      <div class="edu-toolbar-subtitle">上册 · 第二单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <span class="score-badge" id="scoreBadge" style="display:none">得分: 0</span>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="canvas" style="width:100%;flex:1"></canvas>
        <div class="trail-legend" id="trailLegend"></div>
      </div>
      <div class="control-panel" id="sidePanel">
        <!-- Dynamic content -->
      </div>
    </div>
  </div>
</div>
<script src="../edu-lib/edu-tools.js"></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const COLORS = ['#ef4444','#3b82f6','#22c55e','#f97316','#8b5cf6','#eab308'];
const DIRS = ['北','东北','东','东南','南','西南','西','西北'];

let currentTab = 'explore';
let W, H, centerX, centerY, gridSize;

// Explore state
let points = [];
let hoveredPoint = -1;

// Navigate state
let playerX = 0, playerY = 0;
let targetX = 0, targetY = 0;
let navTrail = [];
let navSteps = 0;
let landmarks = [];

// Quiz state
let quizScore = 0;
let quizTarget = null;
let quizOptions = [];
let quizAnswer = -1;
let quizAnswered = false;

function initCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  W = rect.width; H = rect.height;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  centerX = W / 2; centerY = H / 2;
  gridSize = Math.min(W, H) / 14;
  render();
}

/* ====== Compass Rose ====== */
function drawCompass(cx, cy, r) {
  // Outer ring
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = '#f0f9ff'; ctx.fill();
  ctx.strokeStyle = '#0ea5e9'; ctx.lineWidth = 2; ctx.stroke();

  // Inner ring
  ctx.beginPath(); ctx.arc(cx, cy, r * 0.15, 0, Math.PI * 2);
  ctx.fillStyle = '#0ea5e9'; ctx.fill();

  // Direction arrows
  const dirs = [{a:-Math.PI/2,l:'北',c:'#ef4444'},{a:0,l:'东',c:'#64748b'},{a:Math.PI/2,l:'南',c:'#64748b'},{a:Math.PI,l:'西',c:'#64748b'}];
  dirs.forEach(d => {
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(d.a);
    ctx.beginPath(); ctx.moveTo(0, -r * 0.25); ctx.lineTo(-r * 0.08, -r * 0.5); ctx.lineTo(r * 0.08, -r * 0.5); ctx.closePath();
    ctx.fillStyle = d.c; ctx.fill();
    ctx.fillStyle = d.c; ctx.font = `bold ${r*0.18}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(d.l, 0, -r * 0.72);
    ctx.restore();
  });
}

/* ====== Render Grid ====== */
function drawGrid() {
  ctx.fillStyle = '#f8fafc'; ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 0.5;
  for (let x = centerX % gridSize; x < W; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = centerY % gridSize; y < H; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(centerX, 0); ctx.lineTo(centerX, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, centerY); ctx.lineTo(W, centerY); ctx.stroke();

  // Direction labels
  ctx.fillStyle = '#1a3a5c'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('北', centerX, 16); ctx.fillText('南', centerX, H - 6);
  ctx.fillText('东', W - 10, centerY + 5); ctx.fillText('西', 12, centerY + 5);

  // Origin
  ctx.beginPath(); ctx.arc(centerX, centerY, 6, 0, Math.PI * 2);
  ctx.fillStyle = '#1a3a5c'; ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('O', centerX, centerY + 3);
}

/* ====== Direction Helpers ====== */
function getDirectionDesc(p) {
  const dx = p.dx, dy = p.dy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  let dir, angle;
  if (Math.abs(dx) < 0.01 && dy >= 0) return `正北 ${dist.toFixed(1)}格`;
  if (Math.abs(dx) < 0.01 && dy < 0) return `正南 ${dist.toFixed(1)}格`;
  if (Math.abs(dy) < 0.01 && dx >= 0) return `正东 ${dist.toFixed(1)}格`;
  if (Math.abs(dy) < 0.01 && dx < 0) return `正西 ${dist.toFixed(1)}格`;
  if (dy >= 0 && dx >= 0) { dir = '北偏东'; angle = Math.atan2(dx, dy) * 180 / Math.PI; }
  else if (dy >= 0 && dx < 0) { dir = '北偏西'; angle = Math.atan2(-dx, dy) * 180 / Math.PI; }
  else if (dy < 0 && dx >= 0) { dir = '南偏东'; angle = Math.atan2(dx, -dy) * 180 / Math.PI; }
  else { dir = '南偏西'; angle = Math.atan2(-dx, -dy) * 180 / Math.PI; }
  return `${dir}${Math.round(angle)}° ${dist.toFixed(1)}格`;
}

/* ====== Tab: Explore ====== */
function renderExplore() {
  drawGrid();
  // Compass rose in corner
  drawCompass(W - 60, 60, 45);

  points.forEach((p, i) => {
    const px = centerX + p.dx * gridSize;
    const py = centerY - p.dy * gridSize;

    // Line from origin
    ctx.beginPath(); ctx.moveTo(centerX, centerY); ctx.lineTo(px, py);
    ctx.strokeStyle = COLORS[i % COLORS.length]; ctx.lineWidth = 2; ctx.setLineDash([]); ctx.stroke();

    // Angle arc
    const angle = Math.atan2(-p.dy, p.dx);
    const startA = p.dy >= 0 ? -Math.PI / 2 : Math.PI / 2;
    ctx.beginPath(); ctx.arc(centerX, centerY, 25, startA, angle, p.dy >= 0 ? angle > -Math.PI/2 : angle > Math.PI/2);
    ctx.strokeStyle = COLORS[i % COLORS.length] + '80'; ctx.lineWidth = 1.5; ctx.stroke();

    // Angle label
    const midA = (startA + angle) / 2;
    ctx.fillStyle = COLORS[i % COLORS.length]; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
    const desc = getDirectionDesc(p);
    const angleMatch = desc.match(/(\d+)°/);
    if (angleMatch) {
      ctx.fillText(angleMatch[1] + '°', centerX + Math.cos(midA) * 38, centerY + Math.sin(midA) * 38);
    }

    // Point
    ctx.beginPath(); ctx.arc(px, py, 8, 0, Math.PI * 2);
    ctx.fillStyle = COLORS[i % COLORS.length]; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

    // Label
    ctx.fillStyle = COLORS[i % COLORS.length]; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(p.name, px + 12, py - 4);
    ctx.font = '11px sans-serif'; ctx.fillStyle = '#64748b';
    ctx.fillText(desc, px + 12, py + 10);
  });
}

/* ====== Tab: Navigate ====== */
function renderNavigate() {
  drawGrid();

  // Landmarks
  landmarks.forEach(lm => {
    const px = centerX + lm.dx * gridSize;
    const py = centerY - lm.dy * gridSize;
    ctx.font = '20px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(lm.icon, px, py + 6);
    ctx.font = 'bold 10px sans-serif'; ctx.fillStyle = '#64748b';
    ctx.fillText(lm.name, px, py + 18);
  });

  // Trail
  if (navTrail.length > 1) {
    ctx.beginPath();
    const first = navTrail[0];
    ctx.moveTo(centerX + first.x * gridSize, centerY - first.y * gridSize);
    for (let i = 1; i < navTrail.length; i++) {
      const t = navTrail[i];
      ctx.lineTo(centerX + t.x * gridSize, centerY - t.y * gridSize);
    }
    ctx.strokeStyle = '#0ea5e940'; ctx.lineWidth = 3; ctx.setLineDash([6, 4]); ctx.stroke(); ctx.setLineDash([]);
  }

  // Target
  const tpx = centerX + targetX * gridSize;
  const tpy = centerY - targetY * gridSize;
  ctx.beginPath(); ctx.arc(tpx, tpy, 14, 0, Math.PI * 2);
  ctx.fillStyle = '#ef444430'; ctx.fill();
  ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2; ctx.setLineDash([4, 3]); ctx.stroke(); ctx.setLineDash([]);
  ctx.font = 'bold 11px sans-serif'; ctx.fillStyle = '#ef4444'; ctx.textAlign = 'center';
  ctx.fillText('目标', tpx, tpy - 18);

  // Distance line
  ctx.beginPath(); ctx.moveTo(centerX + playerX * gridSize, centerY - playerY * gridSize);
  ctx.lineTo(tpx, tpy);
  ctx.strokeStyle = '#ef444440'; ctx.lineWidth = 1; ctx.setLineDash([3, 3]); ctx.stroke(); ctx.setLineDash([]);

  // Player
  const ppx = centerX + playerX * gridSize;
  const ppy = centerY - playerY * gridSize;
  // Glow
  ctx.beginPath(); ctx.arc(ppx, ppy, 16, 0, Math.PI * 2);
  ctx.fillStyle = '#0ea5e920'; ctx.fill();
  // Player circle
  ctx.beginPath(); ctx.arc(ppx, ppy, 10, 0, Math.PI * 2);
  ctx.fillStyle = '#0ea5e9'; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('你', ppx, ppy + 3);

  // Compass
  drawCompass(W - 60, 60, 45);

  // Info
  const dist = Math.sqrt((targetX - playerX) ** 2 + (targetY - playerY) ** 2).toFixed(1);
  ctx.fillStyle = '#64748b'; ctx.font = '12px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(`距离目标: ${dist} 格  |  已走: ${navSteps} 步`, 10, H - 8);
}

/* ====== Tab: Quiz ====== */
function renderQuiz() {
  drawGrid();
  drawCompass(W - 60, 60, 45);

  if (quizTarget) {
    const px = centerX + quizTarget.dx * gridSize;
    const py = centerY - quizTarget.dy * gridSize;

    // Line
    ctx.beginPath(); ctx.moveTo(centerX, centerY); ctx.lineTo(px, py);
    ctx.strokeStyle = '#f97316'; ctx.lineWidth = 3; ctx.setLineDash([]); ctx.stroke();

    // Angle arc
    const angle = Math.atan2(-quizTarget.dy, quizTarget.dx);
    const startA = quizTarget.dy >= 0 ? -Math.PI / 2 : Math.PI / 2;
    ctx.beginPath(); ctx.arc(centerX, centerY, 35, startA, angle, quizTarget.dy >= 0);
    ctx.strokeStyle = '#f97316'; ctx.lineWidth = 2; ctx.stroke();

    // Point
    ctx.beginPath(); ctx.arc(px, py, 10, 0, Math.PI * 2);
    ctx.fillStyle = '#f97316'; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

    ctx.fillStyle = '#f97316'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText('?', px + 14, py + 4);
  }
}

/* ====== Master Render ====== */
function render() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  W = rect.width; H = rect.height;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  centerX = W / 2; centerY = H / 2;
  gridSize = Math.min(W, H) / 14;

  if (currentTab === 'explore') renderExplore();
  else if (currentTab === 'navigate') renderNavigate();
  else if (currentTab === 'quiz') renderQuiz();
}

/* ====== Side Panel ====== */
function updateSidePanel() {
  const panel = document.getElementById('sidePanel');
  if (currentTab === 'explore') {
    panel.innerHTML = `
      <div class="ctrl-section">
        <div class="ctrl-label">目标点信息</div>
        <div class="coord-display" id="coordInfo">${points.length ? '' : '点击网格添加目标点'}</div>
      </div>
      <div class="divider"></div>
      <div class="ctrl-section">
        <div class="ctrl-label">已标注的点（最多6个）</div>
        <div id="pointsList" style="display:flex;flex-direction:column;gap:4px"></div>
      </div>
      <div class="divider"></div>
      <div class="ctrl-section">
        <div class="ctrl-label">预设位置</div>
        <button class="preset-btn" onclick="loadPreset('school')">学校：北偏东30° 4格</button>
        <button class="preset-btn" onclick="loadPreset('park')">公园：南偏西45° 3格</button>
        <button class="preset-btn" onclick="loadPreset('library')">图书馆：东偏北25° 5格</button>
      </div>
      <div class="divider"></div>
      <div class="info-box">
        <b>位置与方向</b><br/>
        ● 以观测点为中心确定方向<br/>
        ● 用"北偏东/西""南偏东/西"描述<br/>
        ● 方向 + 距离确定唯一位置<br/>
        ● 角度从正北/正南开始量
      </div>`;
    updatePointsList();
  } else if (currentTab === 'navigate') {
    const dist = Math.sqrt((targetX - playerX) ** 2 + (targetY - playerY) ** 2).toFixed(1);
    const arrived = dist < 0.2;
    panel.innerHTML = `
      <div class="ctrl-section">
        <div class="ctrl-label">方向控制（或用键盘方向键）</div>
        <div class="dir-grid">
          <div></div><button class="dir-btn" onclick="movePlayer(0,1)">北</button><div></div>
          <button class="dir-btn" onclick="movePlayer(-1,0)">西</button>
          <button class="dir-btn center-btn">${arrived ? '到达!' : '你'}</button>
          <button class="dir-btn" onclick="movePlayer(1,0)">东</button>
          <div></div><button class="dir-btn" onclick="movePlayer(0,-1)">南</button><div></div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="nav-hint" style="color:${arrived ? '#22c55e' : '#0ea5e9'}">
        ${arrived ? '到达目标! 共 ' + navSteps + ' 步' : '距离目标: ' + dist + ' 格'}
      </div>
      <div class="divider"></div>
      <div class="ctrl-section">
        <div class="ctrl-label">操作</div>
        <button class="preset-btn" onclick="newNavTarget()">新目标</button>
        <button class="preset-btn" onclick="resetNav()">重置位置</button>
      </div>
      <div class="divider"></div>
      <div class="info-box">
        <b>导航挑战</b><br/>
        ● 使用方向键或按钮移动<br/>
        ● 从中心走到目标位置<br/>
        ● 观察沿途地标判断方向<br/>
        ● 尽量用最少步数到达
      </div>`;
  } else if (currentTab === 'quiz') {
    panel.innerHTML = `
      <div class="ctrl-section">
        <div class="ctrl-label">方向判断题</div>
        <div class="coord-display" id="quizQuestion" style="font-size:13px;line-height:1.5"></div>
      </div>
      <div class="divider"></div>
      <div class="ctrl-section" id="quizOptions"></div>
      <div id="quizFeedback" style="text-align:center;font-weight:700;font-size:14px;min-height:20px"></div>
      <div class="divider"></div>
      <div class="ctrl-section">
        <button class="preset-btn" onclick="nextQuizQuestion()">下一题</button>
      </div>
      <div class="divider"></div>
      <div class="info-box">
        <b>答题技巧</b><br/>
        ● 先判断在哪个象限<br/>
        ● 确定是从北偏还是南偏<br/>
        ● 估算角度大小<br/>
        ● 距离 = 格子数
      </div>`;
    if (!quizTarget || quizAnswered) nextQuizQuestion();
    else renderQuizOptions();
  }
}

/* ====== Explore helpers ====== */
function updatePointsList() {
  const el = document.getElementById('pointsList');
  if (!el) return;
  el.innerHTML = '';
  points.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'point-row';
    row.innerHTML = `<div class="point-color" style="background:${COLORS[i % COLORS.length]}"></div>
      <span style="flex:1">${p.name}：${getDirectionDesc(p)}</span>
      <button style="border:none;background:none;cursor:pointer;color:#94a3b8;font-size:14px" onclick="removePoint(${i})">✕</button>`;
    el.appendChild(row);
  });
  const coordEl = document.getElementById('coordInfo');
  if (coordEl && points.length > 0) {
    const last = points[points.length - 1];
    coordEl.innerHTML = `<span style="color:${COLORS[(points.length-1) % COLORS.length]}">${last.name}</span><br/>${getDirectionDesc(last)}`;
  }
}

function removePoint(i) { points.splice(i, 1); updatePointsList(); render(); }

/* ====== Navigate helpers ====== */
function generateLandmarks() {
  landmarks = [];
  const icons = ['🏫','🌳','📚','🏥','🏪','⚽','🏠','🎪'];
  const names = ['学校','公园','图书馆','医院','商店','球场','小区','广场'];
  for (let i = 0; i < 5; i++) {
    landmarks.push({
      dx: Math.round((Math.random() * 10 - 5) * 2) / 2,
      dy: Math.round((Math.random() * 10 - 5) * 2) / 2,
      icon: icons[i], name: names[i]
    });
  }
}

function newNavTarget() {
  targetX = Math.round((Math.random() * 8 - 4) * 2) / 2;
  targetY = Math.round((Math.random() * 8 - 4) * 2) / 2;
  if (Math.abs(targetX) < 1 && Math.abs(targetY) < 1) return newNavTarget();
  playerX = 0; playerY = 0;
  navTrail = [{x:0, y:0}]; navSteps = 0;
  generateLandmarks();
  updateSidePanel(); render();
}

function resetNav() {
  playerX = 0; playerY = 0;
  navTrail = [{x:0, y:0}]; navSteps = 0;
  updateSidePanel(); render();
}

function movePlayer(dx, dy) {
  const nx = playerX + dx, ny = playerY + dy;
  if (Math.abs(nx) > 6 || Math.abs(ny) > 6) return;
  playerX = nx; playerY = ny;
  navTrail.push({x: playerX, y: playerY});
  navSteps++;
  updateSidePanel(); render();
}

/* ====== Quiz helpers ====== */
function nextQuizQuestion() {
  quizAnswered = false;
  const types = ['direction', 'distance', 'position'];
  const type = types[Math.floor(Math.random() * types.length)];
  const dx = Math.round((Math.random() * 6 - 3) * 2) / 2;
  const dy = Math.round((Math.random() * 6 - 3) * 2) / 2;
  if (Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5) return nextQuizQuestion();
  quizTarget = { dx, dy };

  const correctDesc = getDirectionDesc(quizTarget);
  const dist = Math.sqrt(dx * dx + dy * dy).toFixed(1);

  if (type === 'direction') {
    const qEl = document.getElementById('quizQuestion');
    if (qEl) qEl.innerHTML = `下图中标注的点在观测点的什么方向？`;
    // Generate wrong options
    const options = [correctDesc];
    while (options.length < 4) {
      const fakeDx = Math.round((Math.random() * 6 - 3) * 2) / 2;
      const fakeDy = Math.round((Math.random() * 6 - 3) * 2) / 2;
      if (Math.abs(fakeDx) < 0.5 && Math.abs(fakeDy) < 0.5) continue;
      const fakeDesc = getDirectionDesc({dx: fakeDx, dy: fakeDy});
      if (!options.includes(fakeDesc)) options.push(fakeDesc);
    }
    // Shuffle
    for (let i = options.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [options[i], options[j]] = [options[j], options[i]];
    }
    quizAnswer = options.indexOf(correctDesc);
    quizOptions = options;
  } else if (type === 'distance') {
    const qEl = document.getElementById('quizQuestion');
    if (qEl) qEl.innerHTML = `图中点距离观测点几格？方向：${correctDesc}`;
    const options = [dist];
    while (options.length < 4) {
      const fake = (parseFloat(dist) + Math.floor(Math.random() * 5) - 2).toFixed(1);
      if (parseFloat(fake) > 0 && !options.includes(fake)) options.push(fake);
    }
    for (let i = options.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [options[i], options[j]] = [options[j], options[i]];
    }
    quizAnswer = options.indexOf(dist);
    quizOptions = options;
  } else {
    // Position from description
    const qEl = document.getElementById('quizQuestion');
    if (qEl) qEl.innerHTML = `根据描述找位置：${correctDesc}<br/>点击图中你认为的正确位置`;
    quizOptions = []; quizAnswer = -2; // Click-based
  }
  renderQuizOptions();
  render();
}

function renderQuizOptions() {
  const optEl = document.getElementById('quizOptions');
  if (!optEl || quizAnswer === -2) {
    if (optEl) optEl.innerHTML = '<div class="info-box">点击画布上的正确位置</div>';
    return;
  }
  optEl.innerHTML = quizOptions.map((o, i) =>
    `<button class="quiz-option" onclick="answerQuiz(${i})">${o}</button>`
  ).join('');
}

function answerQuiz(idx) {
  if (quizAnswered) return;
  quizAnswered = true;
  const fb = document.getElementById('quizFeedback');
  const btns = document.querySelectorAll('.quiz-option');
  if (idx === quizAnswer) {
    quizScore += 10;
    if (fb) fb.innerHTML = '<span style="color:#16a34a">正确! +10 分</span>';
    btns.forEach((b, i) => { if (i === idx) b.classList.add('correct'); });
  } else {
    if (fb) fb.innerHTML = `<span style="color:#ef4444">正确答案: ${quizOptions[quizAnswer]}</span>`;
    btns.forEach((b, i) => { if (i === idx) b.classList.add('wrong'); if (i === quizAnswer) b.classList.add('correct'); });
  }
  document.getElementById('scoreBadge').style.display = '';
  document.getElementById('scoreBadge').textContent = '得分: ' + quizScore;
}

/* ====== Canvas Click ====== */
canvas.addEventListener('click', function(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const dx = Math.round(((mx - centerX) / gridSize) * 2) / 2;
  const dy = Math.round((-(my - centerY) / gridSize) * 2) / 2;

  if (currentTab === 'explore') {
    if (points.length >= 6 || (Math.abs(dx) < 0.3 && Math.abs(dy) < 0.3)) return;
    const names = ['A','B','C','D','E','F'];
    points.push({ dx, dy, name: names[points.length] || 'P' });
    updatePointsList(); render();
  } else if (currentTab === 'quiz' && quizAnswer === -2 && !quizAnswered) {
    const correctDist = Math.sqrt((quizTarget.dx - dx) ** 2 + (quizTarget.dy - dy) ** 2);
    const fb = document.getElementById('quizFeedback');
    quizAnswered = true;
    if (correctDist < 0.8) {
      quizScore += 10;
      if (fb) fb.innerHTML = '<span style="color:#16a34a">正确! +10 分</span>';
    } else {
      if (fb) fb.innerHTML = `<span style="color:#ef4444">正确位置: ${getDirectionDesc(quizTarget)}</span>`;
    }
    document.getElementById('scoreBadge').style.display = '';
    document.getElementById('scoreBadge').textContent = '得分: ' + quizScore;
    // Show correct position
    render();
  }
});

/* ====== Keyboard ====== */
document.addEventListener('keydown', function(e) {
  if (currentTab !== 'navigate') return;
  if (e.key === 'ArrowUp' || e.key === 'w') { movePlayer(0, 1); e.preventDefault(); }
  else if (e.key === 'ArrowDown' || e.key === 's') { movePlayer(0, -1); e.preventDefault(); }
  else if (e.key === 'ArrowLeft' || e.key === 'a') { movePlayer(-1, 0); e.preventDefault(); }
  else if (e.key === 'ArrowRight' || e.key === 'd') { movePlayer(1, 0); e.preventDefault(); }
});

/* ====== Tab switching ====== */
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  if (tab === 'navigate' && !landmarks.length) newNavTarget();
  updateSidePanel(); render();
}

/* ====== Presets ====== */
function loadPreset(type) {
  points = [];
  if (type === 'school') {
    const a = 30 * Math.PI / 180;
    points.push({ dx: 4 * Math.sin(a), dy: 4 * Math.cos(a), name: '学校' });
  } else if (type === 'park') {
    const a = 45 * Math.PI / 180;
    points.push({ dx: -3 * Math.sin(a), dy: -3 * Math.cos(a), name: '公园' });
  } else if (type === 'library') {
    const a = 25 * Math.PI / 180;
    points.push({ dx: 5 * Math.cos(a), dy: 5 * Math.sin(a), name: '图书馆' });
  }
  updatePointsList(); render();
}

function resetAll() {
  points = []; playerX = 0; playerY = 0; navTrail = []; navSteps = 0;
  quizTarget = null; quizScore = 0; quizAnswered = false;
  document.getElementById('scoreBadge').style.display = 'none';
  updateSidePanel(); render();
}

/* ====== Init ====== */
window.addEventListener('resize', initCanvas);

// Build tab bar in toolbar
document.querySelector('.edu-toolbar-actions').insertAdjacentHTML('afterbegin', `
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="explore" onclick="setTab('explore')">探索</button>
    <button class="tab-btn" data-tab="navigate" onclick="setTab('navigate')">导航</button>
    <button class="tab-btn" data-tab="quiz" onclick="setTab('quiz')">答题</button>
  </div>
  <div class="edu-divider"></div>
`);

updateSidePanel();
initCanvas();
</script>
</body>
