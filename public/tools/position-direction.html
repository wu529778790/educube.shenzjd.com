<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>位置与方向 — 教立方</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
*{box-sizing:border-box}body{font-family:var(--edu-font);margin:0}
.tool{width:100vw;height:100vh;display:flex;flex-direction:column;background:var(--edu-bg)}
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#fff;border-bottom:1px solid var(--edu-border)}
.toolbar h1{font-size:15px;color:var(--edu-primary);margin:0}
.toolbar span{font-size:11px;color:var(--edu-text-muted);background:#f1f5f9;padding:2px 8px;border-radius:12px}
.main{flex:1;display:grid;grid-template-columns:1fr 280px;overflow:hidden}
.canvas-wrap{position:relative;overflow:hidden;background:linear-gradient(135deg,#f0fdf4,#ecfdf5)}
.canvas-wrap canvas{width:100%;height:100%;display:block}
.panel{background:#fff;border-left:1px solid var(--edu-border);padding:12px;display:flex;flex-direction:column;gap:8px;overflow:auto}
.section{display:flex;flex-direction:column;gap:4px}
.label{font-size:10px;font-weight:700;color:#64748b;letter-spacing:.05em}
.divider{height:1px;background:var(--edu-border)}
.btn{padding:6px 12px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--edu-font);transition:all .15s}
.btn.active{background:var(--edu-primary);color:#fff}
.btn-default{background:#f1f5f9;color:#334155}
.btn-default:hover{background:#e2e8f0}
.row{display:flex;gap:4px;flex-wrap:wrap}

.pos-box{text-align:center;padding:8px;background:#f0fdf4;border:2px solid #86efac;border-radius:12px}
.pos-box .text{font-size:16px;font-weight:800;color:#166534}
.pos-box .sub{font-size:11px;color:#15803d;margin-top:2px}

.dir-btn{width:52px;height:52px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;background:#fff;font-family:var(--edu-font);transition:all .15s;display:flex;align-items:center;justify-content:center}
.dir-btn:hover{border-color:#22c55e;background:#f0fdf4}
.dir-btn.highlight{border-color:#22c55e;background:#dcfce7}

.quiz-card{background:#f0fdf4;border:2px solid #86efac;border-radius:12px;padding:10px;text-align:center}
.quiz-q{font-size:14px;font-weight:700;color:#166534}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.quiz-opt{padding:8px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;background:#fff;font-family:var(--edu-font)}
.quiz-opt:hover{border-color:#22c55e}
.quiz-opt.correct{background:#dcfce7;border-color:#22c55e}
.quiz-opt.wrong{background:#fef2f2;border-color:#ef4444}
.quiz-result{font-size:12px;font-weight:700;margin-top:4px;min-height:18px}

.info{font-size:11px;line-height:1.8;color:#334155;background:#fff;border:1px solid #bbf7d0;border-radius:8px;padding:8px 10px}
.info b{color:#166534}
</style>
</head>
<body>
<div class="tool">
  <div class="toolbar"><h1>🧭 位置与方向</h1><span>一年级下册 · 第一单元</span></div>
  <div class="main">
    <div class="canvas-wrap"><canvas id="cv"></canvas></div>
    <div class="panel">
      <div class="pos-box">
        <div class="text" id="pos-text">🍎 在中间</div>
        <div class="sub" id="pos-sub">点击画布中的物体查看位置关系</div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">场景选择</div>
        <div class="row">
          <button class="btn active" id="sc-classroom" onclick="setScene('classroom')">教室排座</button>
          <button class="btn btn-default" id="sc-zoo" onclick="setScene('zoo')">动物园</button>
          <button class="btn btn-default" id="sc-map" onclick="setScene('map')">方位图</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">方向键</div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
          <button class="dir-btn" onclick="moveItem('上')">⬆ 上</button>
          <div style="display:flex;gap:4px">
            <button class="dir-btn" onclick="moveItem('左')">⬅ 左</button>
            <button class="dir-btn" onclick="moveItem('下')">⬇ 下</button>
            <button class="dir-btn" onclick="moveItem('右')">➡ 右</button>
          </div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">方向测验</div>
        <div class="quiz-card" id="quiz-card"></div>
      </div>
      <div class="divider"></div>
      <div class="info">
        <b>位置与方向</b><br/>
        ● <strong>上、下、左、右、前、后</strong><br/>
        ● 以自己为中心判断方向<br/>
        ● 面对的方向是"前"，背后是"后"<br/>
        ● 左手边是"左"，右手边是"右"
      </div>
    </div>
  </div>
</div>
<script>
var cv, ctx, _scene = 'classroom', _selected = null;
var _items = [];

var _scenes = {
  classroom: [
    { id: 'teacher', emoji: '👩‍🏫', x: 3, y: 0, label: '老师' },
    { id: 'ming', emoji: '👦', x: 1, y: 2, label: '小明' },
    { id: 'hong', emoji: '👧', x: 3, y: 2, label: '小红' },
    { id: 'gang', emoji: '👦', x: 5, y: 2, label: '小刚' },
    { id: 'fang', emoji: '👧', x: 1, y: 3, label: '小芳' },
    { id: 'lei', emoji: '👦', x: 3, y: 3, label: '小磊' },
    { id: 'hua', emoji: '👧', x: 5, y: 3, label: '小花' },
    { id: 'board', emoji: '📋', x: 3, y: 0, label: '黑板' },
  ],
  zoo: [
    { id: 'gate', emoji: '🚪', x: 3, y: 4, label: '大门' },
    { id: 'panda', emoji: '🐼', x: 1, y: 1, label: '熊猫' },
    { id: 'monkey', emoji: '🐒', x: 3, y: 1, label: '猴子' },
    { id: 'elephant', emoji: '🐘', x: 5, y: 1, label: '大象' },
    { id: 'tiger', emoji: '🐯', x: 1, y: 3, label: '老虎' },
    { id: 'rabbit', emoji: '🐰', x: 5, y: 3, label: '兔子' },
    { id: 'visitor', emoji: '🧒', x: 3, y: 3, label: '我' },
  ],
  map: [
    { id: 'center', emoji: '🏠', x: 3, y: 3, label: '家' },
    { id: 'n', emoji: '🏫', x: 3, y: 1, label: '学校' },
    { id: 's', emoji: '🏪', x: 3, y: 5, label: '超市' },
    { id: 'e', emoji: '🏥', x: 5, y: 3, label: '医院' },
    { id: 'w', emoji: '🌳', x: 1, y: 3, label: '公园' },
  ],
};

function init() {
  cv = document.getElementById('cv');
  ctx = cv.getContext('2d');
  window.addEventListener('resize', resize);
  cv.addEventListener('click', onClick);
  resize();
  nextQuiz();
}

function resize() {
  var r = cv.parentElement.getBoundingClientRect();
  cv.width = r.width * devicePixelRatio;
  cv.height = r.height * devicePixelRatio;
  cv.style.width = r.width + 'px';
  cv.style.height = r.height + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  draw();
}

function setScene(s) {
  _scene = s;
  _selected = null;
  ['classroom','zoo','map'].forEach(function(k) {
    document.getElementById('sc-' + k).className = 'btn' + (k === s ? ' active' : ' btn-default');
  });
  updatePosText();
  draw();
}

function onClick(e) {
  var rect = cv.getBoundingClientRect();
  var mx = e.clientX - rect.left, my = e.clientY - rect.top;
  var w = cv.width / devicePixelRatio, h = cv.height / devicePixelRatio;
  var items = _scenes[_scene];
  var gridCols = 7, gridRows = 6;
  var cellW = (w - 40) / gridCols, cellH = (h - 60) / gridRows;
  var ox = 20, oy = 30;

  _selected = null;
  items.forEach(function(item) {
    var ix = ox + item.x * cellW + cellW / 2;
    var iy = oy + item.y * cellH + cellH / 2;
    if (Math.abs(mx - ix) < cellW / 2 && Math.abs(my - iy) < cellH / 2) {
      _selected = item.id;
    }
  });
  updatePosText();
  draw();
}

function moveItem(dir) {
  if (!_selected) return;
  var items = _scenes[_scene];
  var item = items.find(function(i) { return i.id === _selected; });
  if (!item) return;
  if (dir === '上' && item.y > 0) item.y--;
  if (dir === '下' && item.y < 5) item.y++;
  if (dir === '左' && item.x > 0) item.x--;
  if (dir === '右' && item.x < 6) item.x++;
  updatePosText();
  draw();
}

function updatePosText() {
  if (!_selected) {
    document.getElementById('pos-text').textContent = '点击画布中的物体';
    document.getElementById('pos-sub').textContent = '查看它的位置关系';
    return;
  }
  var items = _scenes[_scene];
  var item = items.find(function(i) { return i.id === _selected; });
  if (!item) return;

  var text = item.emoji + ' ' + item.label;
  var relations = [];

  items.forEach(function(other) {
    if (other.id === _selected) return;
    if (other.y < item.y && Math.abs(other.x - item.x) <= 1) relations.push(other.label + '在上面');
    if (other.y > item.y && Math.abs(other.x - item.x) <= 1) relations.push(other.label + '在下面');
    if (other.x < item.x && Math.abs(other.y - item.y) <= 1) relations.push(other.label + '在左边');
    if (other.x > item.x && Math.abs(other.y - item.y) <= 1) relations.push(other.label + '在右边');
  });

  document.getElementById('pos-text').textContent = text;
  document.getElementById('pos-sub').textContent = relations.length > 0 ? relations.join('，') : '旁边没有其他物体';
}

function draw() {
  var w = cv.width / devicePixelRatio, h = cv.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  var items = _scenes[_scene];
  var gridCols = 7, gridRows = 6;
  var cellW = (w - 40) / gridCols, cellH = (h - 60) / gridRows;
  var ox = 20, oy = 30;

  // Grid background
  ctx.strokeStyle = '#bbf7d044'; ctx.lineWidth = 0.5;
  for (var i = 0; i <= gridCols; i++) {
    ctx.beginPath(); ctx.moveTo(ox + i * cellW, oy); ctx.lineTo(ox + i * cellW, oy + gridRows * cellH); ctx.stroke();
  }
  for (var j = 0; j <= gridRows; j++) {
    ctx.beginPath(); ctx.moveTo(ox, oy + j * cellH); ctx.lineTo(ox + gridCols * cellW, oy + j * cellH); ctx.stroke();
  }

  // Scene title
  var titles = { classroom: '教室座位图', zoo: '动物园地图', map: '周边方位图' };
  ctx.fillStyle = '#166534'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(titles[_scene], w / 2, 20);

  // Draw items
  items.forEach(function(item) {
    var ix = ox + item.x * cellW + cellW / 2;
    var iy = oy + item.y * cellH + cellH / 2;

    var isSelected = _selected === item.id;

    // Selection highlight
    if (isSelected) {
      ctx.fillStyle = '#22c55e22';
      ctx.beginPath(); ctx.roundRect(ix - cellW / 2 + 4, iy - cellH / 2 + 4, cellW - 8, cellH - 8, 10); ctx.fill();
      ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Emoji
    ctx.font = Math.max(20, Math.min(cellW, cellH) * 0.4) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(item.emoji, ix, iy + 6);

    // Label
    ctx.fillStyle = '#334155';
    ctx.font = 'bold ' + Math.max(9, Math.min(cellW, cellH) * 0.12) + 'px sans-serif';
    ctx.fillText(item.label, ix, iy + Math.min(cellW, cellH) * 0.32);
  });

  // Direction compass for map scene
  if (_scene === 'map') {
    ctx.fillStyle = '#15803d88'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('⬆ 北', ox + gridCols * cellW / 2, oy + gridRows * cellH + 16);
    ctx.fillText('⬇ 南', ox + gridCols * cellW / 2, oy + gridRows * cellH + 46);
    ctx.fillText('⬅ 西', ox + 8, oy + gridRows * cellH + 31);
    ctx.fillText('➡ 东', ox + gridCols * cellW - 8, oy + gridRows * cellH + 31);
  }
}

// ===== Quiz =====
var _quizQs = [
  { q: '小明面向北方，他的右手边是？', opts: ['东', '西', '南', '北'], ans: 0 },
  { q: '太阳从哪个方向升起？', opts: ['西', '东', '南', '北'], ans: 1 },
  { q: '面对黑板，左手边是？', opts: ['右边', '左边', '前面', '后面'], ans: 1 },
  { q: '小红的左边是小明，小明在小红的？', opts: ['左边', '右边', '前面', '后面'], ans: 1 },
  { q: '上和下是一对什么方向？', opts: ['相反方向', '相同方向', '左右方向', '前后方向'], ans: 0 },
  { q: '教室里，黑板在我们的？', opts: ['后面', '前面', '左面', '右面'], ans: 1 },
];
var _qi = 0, _score = 0;

function nextQuiz() {
  if (_qi >= _quizQs.length) {
    document.getElementById('quiz-card').innerHTML = '<div class="quiz-q">测验完成！答对 ' + _score + ' / ' + _quizQs.length + ' 题</div>';
    return;
  }
  var q = _quizQs[_qi];
  var html = '<div class="quiz-q">' + q.q + '</div><div class="quiz-opts">';
  q.opts.forEach(function(o, i) { html += '<button class="quiz-opt" onclick="answer(' + i + ')">' + o + '</button>'; });
  html += '</div><div class="quiz-result" id="qr"></div>';
  document.getElementById('quiz-card').innerHTML = html;
}

function answer(idx) {
  var q = _quizQs[_qi];
  var opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(function(b, i) { b.onclick = null; b.style.cursor = 'default';
    if (i === q.ans) b.classList.add('correct');
    if (i === idx && i !== q.ans) b.classList.add('wrong');
  });
  var r = document.getElementById('qr');
  if (idx === q.ans) { r.textContent = '✓ 正确！'; r.style.color = '#16a34a'; _score++; }
  else { r.textContent = '✗ 正确答案：' + q.opts[q.ans]; r.style.color = '#ef4444'; }
  _qi++; setTimeout(nextQuiz, 1200);
}

init();
</script>
</body>
</html>
