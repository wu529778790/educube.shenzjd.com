<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小数除法 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 260px; height: 100%; }
    .canvas-area { padding: 24px; overflow-y: auto; background: linear-gradient(135deg, #fdf2f8 0%, #fdfaf4 100%); display: flex; flex-direction: column; align-items: center; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 14px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #fbcfe8; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .input-row { display: flex; align-items: center; gap: 10px; justify-content: center; margin: 10px 0; }
    .input-row input { width: 100px; text-align: center; font-size: 22px; font-weight: 800; border: 2px solid #e2e8f0; border-radius: 10px; padding: 8px; font-family: 'Courier New', monospace; }
    .input-row span { font-size: 24px; font-weight: 800; color: #94a3b8; }
    .step-card { background: #fff; border: 2px solid #ec4899; border-radius: 14px; padding: 20px; width: 100%; max-width: 480px; }
    .step-line { margin: 6px 0; font-size: 15px; line-height: 1.8; }
    .step-line .hl { background: #fdf2f8; padding: 2px 8px; border-radius: 6px; font-weight: 700; color: #ec4899; }
    .step-num { display: inline-block; width: 22px; height: 22px; background: #ec4899; color: #fff; border-radius: 50%; text-align: center; font-size: 12px; font-weight: 800; line-height: 22px; margin-right: 6px; }
    .result-box { background: #f0fdf4; border: 2px solid #22c55e; border-radius: 12px; padding: 14px; text-align: center; margin-top: 12px; }
    .result-big { font-size: 28px; font-weight: 800; color: #22c55e; }
    .preset-btn { padding: 8px 0; border-radius: 8px; font-size: 13px; font-weight: 600; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; }
    .preset-btn:hover { border-color: #ec4899; color: #ec4899; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">➗ 小数除法</div>
      <div class="edu-toolbar-subtitle">上册 · 第三单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-primary" onclick="calculate()">计算</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <div class="input-row">
          <input type="number" id="numA" value="7.2" step="0.1" oninput="calculate()"/>
          <span>÷</span>
          <input type="number" id="numB" value="0.8" step="0.1" oninput="calculate()"/>
          <span>=</span>
          <span style="color:#22c55e;font-size:24px;font-weight:800" id="quickResult">9</span>
        </div>
        <div class="step-card" id="stepCard"></div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">预设例题</div>
          <button class="preset-btn" onclick="load(7.2,0.8)">7.2 ÷ 0.8</button>
          <button class="preset-btn" onclick="load(4.5,0.15)">4.5 ÷ 0.15</button>
          <button class="preset-btn" onclick="load(12.6,3)">12.6 ÷ 3</button>
          <button class="preset-btn" onclick="load(0.735,0.07)">0.735 ÷ 0.07</button>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <b>小数除法法则</b><br/>
          ● 除数是小数时，先移动小数点<br/>
          ● 使除数变成整数<br/>
          ● 除数小数点右移几位<br/>
          ● 被除数也右移相同位数<br/>
          ● 位数不够用0补足<br/>
          ● 然后按整数除法计算
        </div>
      </div>
    </div>
  </div>
</div>
<script>
function countDecimals(n) { const s = n.toString(); return s.includes('.') ? s.split('.')[1].length : 0; }

function calculate() {
  let a = parseFloat(document.getElementById('numA').value) || 0;
  let b = parseFloat(document.getElementById('numB').value) || 0;
  if (b === 0) { document.getElementById('stepCard').innerHTML = '<div style="color:#ef4444;font-weight:700">除数不能为0！</div>'; return; }

  const result = a / b;
  document.getElementById('quickResult').textContent = parseFloat(result.toFixed(10));

  const db = countDecimals(b);
  const da = countDecimals(a);
  const shift = db;
  const newA = a * Math.pow(10, shift);
  const newB = b * Math.pow(10, shift);
  const intResult = newA / newB;

  const card = document.getElementById('stepCard');
  card.innerHTML = `
    <div style="font-size:16px;font-weight:700;color:#334155;margin-bottom:12px">计算过程</div>
    <div class="step-line"><span class="step-num">1</span>除数 ${b} 有 <span class="hl">${db} 位小数</span></div>
    <div class="step-line"><span class="step-num">2</span>把除数和被除数同时扩大 <span class="hl">${Math.pow(10, shift)}</span> 倍</div>
    <div class="step-line" style="padding-left:28px">${b} × ${Math.pow(10, shift)} = <span class="hl">${newB}</span></div>
    <div class="step-line" style="padding-left:28px">${a} × ${Math.pow(10, shift)} = <span class="hl">${newA}</span></div>
    <div class="step-line"><span class="step-num">3</span>按整数除法计算</div>
    <div class="step-line" style="padding-left:28px"><span class="hl">${newA} ÷ ${newB} = ${intResult}</span></div>
    <div class="result-box">
      <div style="font-size:14px;color:#64748b">${a} ÷ ${b}</div>
      <div class="result-big">${parseFloat(result.toFixed(10))}</div>
    </div>
  `;
}

function load(a, b) { document.getElementById('numA').value = a; document.getElementById('numB').value = b; calculate(); }
function resetAll() { load(7.2, 0.8); }
calculate();
</script>
</body>
</html>
