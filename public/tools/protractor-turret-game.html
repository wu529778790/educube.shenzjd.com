<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>量角器炮塔 — 教立方</title>
  <!-- play-ref:jiaohukejian:1C2BOAD | 自研 -->
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <script src="../edu-lib/three.min.js"></script>
  <script src="../edu-lib/OrbitControls.js"></script>
  <script src="../edu-lib/edu-3d.js"></script>
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr minmax(280px, 300px); height: 100%; }
    .canvas-area { position: relative; background: #fffbeb; overflow: hidden; min-height: 0; }
    .canvas-area canvas { width: 100%; height: 100%; display: block; }
    .panel { border-left: 1px solid var(--edu-border); padding: 12px; background: var(--edu-surface); overflow: auto; }
    .slider-block label { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; }
    .msg { font-size: 14px; font-weight: 800; margin-top: 10px; min-height: 1.4em; }
    .ok { color: var(--edu-success); }
    .bad { color: var(--edu-danger); }
    .orbit-hint { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); font-size: 10px; background: rgba(255,255,255,.92); padding: 4px 10px; border-radius: 14px; color: #64748b; pointer-events: none; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div class="edu-toolbar-lead">
      <span class="edu-toolbar-title">🎯 量角器炮塔</span>
      <span class="edu-toolbar-subtitle">对准目标角 · 3D</span>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="c3d"></canvas>
        <div class="orbit-hint">红：目标方向 · 蓝：炮管</div>
      </div>
      <div class="panel">
        <p style="font-size:12px;color:var(--edu-text-muted)">目标角为红线与底边夹角（0°～180°）。拖动滑条使蓝线与红线重合后点「开火」。</p>
        <div class="slider-block"><label><span>炮管角</span><span id="av">0°</span></label><input type="range" id="ang" min="0" max="180" value="0" /></div>
        <button type="button" class="edu-btn edu-btn-primary" id="fire">开火</button>
        <button type="button" class="edu-btn edu-btn-outline" id="new">新目标</button>
        <div class="msg" id="msg"></div>
      </div>
    </div>
  </div>
</div>
<script>
(function () {
  var canvas = document.getElementById("c3d");
  var ang = document.getElementById("ang");
  var msg = document.getElementById("msg");
  var target = 45;

  var ctx = Edu3D.createScene(canvas, {
    bg: 0xffffff,
    fov: 42,
    camX: 0,
    camY: 5.5,
    camZ: 5.5,
    lookX: 0,
    lookY: 0,
    lookZ: 0,
    minDist: 1.5,
    maxDist: 14,
  });
  Edu3D.addLights(ctx.scene);
  Edu3D.addGrid(ctx.scene, 10, 10, 0xfef3c7, -0.72);
  var world = new THREE.Group();
  ctx.scene.add(world);

  var baseLine = null;
  var redLine = null;
  var blueLine = null;

  function newT() {
    target = 15 + Math.floor(Math.random() * 11) * 15;
    msg.textContent = "";
    sync();
  }

  function sync() {
    var a = Number(ang.value);
    document.getElementById("av").textContent = a + "°";

    if (baseLine) {
      world.remove(baseLine);
      baseLine.geometry.dispose();
      baseLine.material.dispose();
    }
    if (redLine) {
      world.remove(redLine);
      redLine.geometry.dispose();
      redLine.material.dispose();
    }
    if (blueLine) {
      world.remove(blueLine);
      blueLine.geometry.dispose();
      blueLine.material.dispose();
    }

    var geoB = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-1.2, -0.66, 0),
      new THREE.Vector3(1.2, -0.66, 0),
    ]);
    baseLine = new THREE.Line(geoB, new THREE.LineBasicMaterial({ color: 0x94a3b8, linewidth: 2 }));
    world.add(baseLine);

    var tr = (target * Math.PI) / 180;
    redLine = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(-0.8, -0.66, 0),
        new THREE.Vector3(-0.8 + 1.6 * Math.cos(tr), -0.66 + 1.6 * Math.sin(tr), 0),
      ]),
      new THREE.LineBasicMaterial({ color: 0xdc2626, linewidth: 3 })
    );
    world.add(redLine);

    var ar = (a * Math.PI) / 180;
    blueLine = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(-0.8, -0.66, 0.05),
        new THREE.Vector3(-0.8 + 1.45 * Math.cos(ar), -0.66 + 1.45 * Math.sin(ar), 0.05),
      ]),
      new THREE.LineBasicMaterial({ color: 0x2563eb, linewidth: 4 })
    );
    world.add(blueLine);
  }

  ang.addEventListener("input", sync);
  document.getElementById("fire").addEventListener("click", function () {
    var a = Number(ang.value);
    if (Math.abs(a - target) <= 5) {
      msg.textContent = "命中！偏差 " + Math.abs(a - target) + "°";
      msg.className = "msg ok";
    } else {
      msg.textContent = "偏了，再试试（可 ±5° 吸附练习）";
      msg.className = "msg bad";
    }
  });
  document.getElementById("new").addEventListener("click", newT);

  function onResize() {
    var w = canvas.clientWidth || 400;
    var h = canvas.clientHeight || 360;
    ctx.renderer.setSize(w, h, false);
    ctx.camera.aspect = w / h;
    ctx.camera.updateProjectionMatrix();
  }
  window.addEventListener("resize", onResize);
  newT();
  onResize();
  Edu3D.startLoop(ctx.scene, ctx.camera, ctx.renderer, ctx.controls, null);
})();
</script>
</body>
</html>
