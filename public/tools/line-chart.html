<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>折线统计图 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 270px; height: 100%; }
    .canvas-area { padding: 16px; overflow: hidden; background: linear-gradient(135deg, #f0fdfa 0%, #fdfaf4 100%); display: flex; flex-direction: column; align-items: center; position: relative; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 12px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .divider { height: 1px; background: #e2e8f0; }
    canvas { border-radius: 12px; background: #fff; cursor: default; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
    .data-table th, .data-table td { border: 1px solid #e2e8f0; padding: 4px 6px; text-align: center; }
    .data-table input { width: 48px; text-align: center; font-size: 13px; font-weight: 700; border: none; font-family: 'Courier New', monospace; background: transparent; }
    .data-table input:focus { outline: 2px solid #06b6d4; border-radius: 4px; }
    .series-toggle { display: flex; gap: 8px; }
    .series-btn { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; border: 1.5px solid; cursor: pointer; background: #fff; transition: all .15s; }
    .series-btn.on { color: #fff; }
    .preset-btn { padding: 7px 0; border-radius: 8px; font-size: 12px; font-weight: 600; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; text-align: left; padding-left: 10px; }
    .preset-btn:hover { border-color: #06b6d4; color: #06b6d4; }
    .info-box { background: #fff; border: 1px solid #99f6e4; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .trend-box { background: #fff; border: 1px solid #99f6e4; border-radius: 10px; padding: 10px 12px; font-size: 13px; min-height: 44px; display: flex; align-items: center; gap: 8px; transition: all .3s; }
    .trend-arrow { font-size: 22px; transition: transform .4s ease; display: inline-block; }
    .trend-arrow.rise { color: #22c55e; transform: rotate(-45deg); }
    .trend-arrow.fall { color: #ef4444; transform: rotate(45deg); }
    .trend-arrow.flat { color: #94a3b8; transform: rotate(0deg); }
    .trend-arrow.fluct { color: #f97316; animation: wobble 1s ease-in-out infinite; }
    @keyframes wobble { 0%,100%{ transform: rotate(-20deg); } 50%{ transform: rotate(20deg); } }
    .quiz-overlay { position: absolute; inset: 0; background: rgba(255,255,255,.92); display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; z-index: 10; animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .quiz-title { font-size: 18px; font-weight: 800; color: var(--edu-primary); margin-bottom: 8px; }
    .quiz-question { font-size: 15px; color: #334155; margin-bottom: 16px; text-align: center; max-width: 400px; line-height: 1.6; }
    .quiz-choices { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .quiz-choice { padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; border: 2px solid #e2e8f0; cursor: pointer; background: #fff; transition: all .15s; }
    .quiz-choice:hover { border-color: #06b6d4; color: #06b6d4; }
    .quiz-choice.correct { border-color: #22c55e; background: #f0fdf4; color: #16a34a; }
    .quiz-choice.wrong { border-color: #ef4444; background: #fef2f2; color: #dc2626; }
    .quiz-score { font-size: 14px; color: #64748b; margin-top: 14px; }
    .quiz-score b { color: var(--edu-accent); font-size: 16px; }
    .quiz-feedback { font-size: 15px; font-weight: 700; margin-top: 10px; min-height: 24px; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">📈 折线统计图</div>
      <div class="edu-toolbar-subtitle">下册 · 第七单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-accent" onclick="startAnimate()">动画绘制</button>
      <button class="edu-btn edu-btn-outline" onclick="startQuiz()">图表测验</button>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="cvs" width="580" height="340"></canvas>
        <table class="data-table" id="dataTable"></table>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">系列</div>
          <div class="series-toggle">
            <button class="series-btn on" id="s1Btn" style="border-color:#06b6d4;background:#06b6d4" onclick="toggleSeries(1)">系列 A</button>
            <button class="series-btn" id="s2Btn" style="border-color:#f97316" onclick="toggleSeries(2)">系列 B</button>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">趋势分析</div>
          <div class="trend-box" id="trendBox">
            <span class="trend-arrow flat" id="trendArrow">→</span>
            <span id="trendText" style="font-size:12px;color:#64748b">点击"动画绘制"查看趋势</span>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">预设数据</div>
          <button class="preset-btn" onclick="loadPreset('temp')">某地月均气温</button>
          <button class="preset-btn" onclick="loadPreset('sales')">商店月销售额</button>
          <button class="preset-btn" onclick="loadPreset('height')">学生身高变化</button>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <b>折线统计图</b><br/>
          ● 拖拽数据点可实时修改数值<br/>
          ● 用折线表示数据变化趋势<br/>
          ● 适合展示随时间变化的数据<br/>
          ● 点击"图表测验"检验你的观察力
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
let showS2 = false, labels = ['1月','2月','3月','4月','5月','6月'];
let s1 = [2, 5, 12, 18, 24, 30], s2 = [8, 10, 15, 20, 18, 25];
let dragInfo = null, animProgress = 1, animFrame = null, quizActive = false;
const DRAG_RADIUS = 14;

function toggleSeries(n) {
  if (n === 2) {
    showS2 = !showS2;
    const btn = document.getElementById('s2Btn');
    btn.classList.toggle('on', showS2);
    btn.style.background = showS2 ? '#f97316' : '#fff';
    btn.style.color = showS2 ? '#fff' : '#f97316';
  }
  animProgress = 1;
  render();
}

function render() { buildTable(); draw(); updateTrend(); }

function buildTable() {
  const el = document.getElementById('dataTable');
  let html = '<tr><th></th>';
  labels.forEach(l => html += `<th>${l}</th>`);
  html += '</tr><tr><td style="color:#06b6d4;font-weight:700">A</td>';
  s1.forEach((v, i) => html += `<td><input value="${v}" onchange="s1[${i}]=parseFloat(this.value)||0;render()"/></td>`);
  html += '</tr>';
  if (showS2) {
    html += '<tr><td style="color:#f97316;font-weight:700">B</td>';
    s2.forEach((v, i) => html += `<td><input value="${v}" onchange="s2[${i}]=parseFloat(this.value)||0;render()"/></td>`);
    html += '</tr>';
  }
  el.innerHTML = html;
}

function chartGeom() {
  const W = cvs.width, H = cvs.height;
  const pad = { l: 52, r: 24, t: 30, b: 50 };
  const gw = W - pad.l - pad.r, gh = H - pad.t - pad.b;
  const allVals = [...s1, ...(showS2 ? s2 : [])];
  const minV = Math.min(...allVals), maxV = Math.max(...allVals);
  const range = maxV - minV || 1;
  const step = range <= 10 ? 1 : range <= 50 ? 5 : 10;
  const yMin = Math.floor(minV / step) * step;
  const yMax = Math.ceil(maxV / step) * step;
  const yRange = yMax - yMin || 1;
  return { W, H, pad, gw, gh, yMin, yMax, yRange, step };
}

function dataToXY(data, i, g) {
  const x = g.pad.l + (i / (data.length - 1)) * g.gw;
  const y = g.pad.t + g.gh - ((data[i] - g.yMin) / g.yRange) * g.gh;
  return { x, y };
}

function draw() {
  const g = chartGeom();
  ctx.clearRect(0, 0, g.W, g.H);

  // Grid + Y axis
  ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1;
  for (let v = g.yMin; v <= g.yMax; v += g.step) {
    const y = g.pad.t + g.gh - ((v - g.yMin) / g.yRange) * g.gh;
    ctx.beginPath(); ctx.moveTo(g.pad.l, y); ctx.lineTo(g.pad.l + g.gw, y); ctx.stroke();
    ctx.fillStyle = '#94a3b8'; ctx.font = '11px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(v, g.pad.l - 8, y + 4);
  }

  // X labels
  ctx.textAlign = 'center'; ctx.fillStyle = '#64748b'; ctx.font = '12px sans-serif';
  labels.forEach((l, i) => {
    const x = g.pad.l + (i / (labels.length - 1)) * g.gw;
    ctx.fillText(l, x, g.H - g.pad.b + 22);
  });

  // Draw series with animation clip
  drawAnimSeries(s1, '#06b6d4', g);
  if (showS2) drawAnimSeries(s2, '#f97316', g);
}

function drawAnimSeries(data, color, g) {
  const pts = data.map((_, i) => dataToXY(data, i, g));
  const totalSegs = pts.length - 1, drawnSegs = animProgress * totalSegs;
  const fullSegs = Math.floor(drawnSegs), partial = drawnSegs - fullSegs;
  // Area fill
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i <= fullSegs && i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  if (fullSegs < totalSegs && partial > 0) {
    const px = pts[fullSegs].x + (pts[fullSegs + 1].x - pts[fullSegs].x) * partial;
    const py = pts[fullSegs].y + (pts[fullSegs + 1].y - pts[fullSegs].y) * partial;
    ctx.lineTo(px, py);
    ctx.lineTo(px, g.pad.t + g.gh);
  } else if (fullSegs >= totalSegs) {
    ctx.lineTo(pts[pts.length - 1].x, g.pad.t + g.gh);
  }
  ctx.lineTo(pts[0].x, g.pad.t + g.gh);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, g.pad.t, 0, g.pad.t + g.gh);
  grad.addColorStop(0, color + '22');
  grad.addColorStop(1, color + '05');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.restore();
  // Line
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i <= fullSegs && i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  if (fullSegs < totalSegs && partial > 0) {
    const px = pts[fullSegs].x + (pts[fullSegs + 1].x - pts[fullSegs].x) * partial;
    const py = pts[fullSegs].y + (pts[fullSegs + 1].y - pts[fullSegs].y) * partial;
    ctx.lineTo(px, py);
  }
  ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.lineJoin = 'round'; ctx.stroke();
  const visibleCount = Math.min(fullSegs + 1, pts.length);
  for (let i = 0; i < visibleCount; i++) {
    ctx.beginPath(); ctx.arc(pts[i].x, pts[i].y, 6, 0, Math.PI * 2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.stroke();
    ctx.fillStyle = color; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(data[i], pts[i].x, pts[i].y - 12);
  }
}

function updateTrend() {
  const data = showS2 ? s2 : s1;
  const arrow = document.getElementById('trendArrow');
  const text = document.getElementById('trendText');
  let rises = 0, falls = 0;
  for (let i = 1; i < data.length; i++) {
    if (data[i] > data[i - 1]) rises++;
    else if (data[i] < data[i - 1]) falls++;
  }
  if (rises > 0 && falls === 0) {
    arrow.textContent = '↑'; arrow.className = 'trend-arrow rise';
    text.innerHTML = `<b style="color:#22c55e">持续上升</b> — 数据逐期增长`;
  } else if (falls > 0 && rises === 0) {
    arrow.textContent = '↓'; arrow.className = 'trend-arrow fall';
    text.innerHTML = `<b style="color:#ef4444">持续下降</b> — 数据逐期减少`;
  } else if (rises >= 2 && falls >= 2) {
    arrow.textContent = '↕'; arrow.className = 'trend-arrow fluct';
    text.innerHTML = `<b style="color:#f97316">波动变化</b> — 数据有升有降`;
  } else if (rises > falls) {
    arrow.textContent = '↗'; arrow.className = 'trend-arrow rise';
    text.innerHTML = `<b style="color:#22c55e">总体上升</b> — 增多为主`;
  } else if (falls > rises) {
    arrow.textContent = '↘'; arrow.className = 'trend-arrow fall';
    text.innerHTML = `<b style="color:#ef4444">总体下降</b> — 减少为主`;
  } else {
    arrow.textContent = '→'; arrow.className = 'trend-arrow flat';
    text.innerHTML = `<b style="color:#94a3b8">基本平稳</b> — 变化不大`;
  }
}

function startAnimate() {
  if (animFrame) cancelAnimationFrame(animFrame);
  animProgress = 0;
  const start = performance.now();
  const duration = 1800;
  function tick(now) {
    animProgress = Math.min(1, (now - start) / duration);
    // ease out cubic
    animProgress = 1 - Math.pow(1 - animProgress, 3);
    draw();
    if (animProgress < 1) animFrame = requestAnimationFrame(tick);
    else { animProgress = 1; draw(); updateTrend(); }
  }
  animFrame = requestAnimationFrame(tick);
}

cvs.addEventListener('mousedown', onPointerDown);
cvs.addEventListener('mousemove', onPointerMove);
cvs.addEventListener('mouseup', onPointerUp);
cvs.addEventListener('touchstart', e => { e.preventDefault(); onPointerDown(touchToMouse(e)); }, { passive: false });
cvs.addEventListener('touchmove', e => { e.preventDefault(); onPointerMove(touchToMouse(e)); }, { passive: false });
cvs.addEventListener('touchend', onPointerUp);

function touchToMouse(e) {
  const r = cvs.getBoundingClientRect();
  const t = e.touches[0];
  return { offsetX: (t.clientX - r.left) * (cvs.width / r.width), offsetY: (t.clientY - r.top) * (cvs.height / r.height) };
}

function canvasXY(e) {
  const r = cvs.getBoundingClientRect(), sx = cvs.width / r.width, sy = cvs.height / r.height;
  return { x: (e.offsetX ?? e.x) * sx, y: (e.offsetY ?? e.y) * sy };
}

function onPointerDown(e) {
  if (quizActive) return;
  const { x, y } = canvasXY(e);
  const g = chartGeom();
  // Check s1 first, then s2
  for (let i = 0; i < s1.length; i++) {
    const p = dataToXY(s1, i, g);
    if (Math.hypot(p.x - x, p.y - y) < DRAG_RADIUS) {
      dragInfo = { series: 1, index: i }; cvs.style.cursor = 'grabbing'; return;
    }
  }
  if (showS2) {
    for (let i = 0; i < s2.length; i++) {
      const p = dataToXY(s2, i, g);
      if (Math.hypot(p.x - x, p.y - y) < DRAG_RADIUS) {
        dragInfo = { series: 2, index: i }; cvs.style.cursor = 'grabbing'; return;
      }
    }
  }
}

function onPointerMove(e) {
  if (!dragInfo) {
    const { x, y } = canvasXY(e);
    const g = chartGeom();
    const hit = (arr) => arr.some((_, i) => { const p = dataToXY(arr, i, g); return Math.hypot(p.x - x, p.y - y) < DRAG_RADIUS; });
    cvs.style.cursor = hit(s1) || (showS2 && hit(s2)) ? 'grab' : 'default';
    return;
  }
  const { x, y } = canvasXY(e);
  const g = chartGeom();
  const raw = g.yMin + ((g.pad.t + g.gh - y) / g.gh) * g.yRange;
  const clamped = Math.max(g.yMin, Math.min(g.yMax, Math.round(raw / g.step) * g.step));
  if (dragInfo.series === 1) s1[dragInfo.index] = clamped;
  else s2[dragInfo.index] = clamped;
  animProgress = 1;
  buildTable();
  draw();
  updateTrend();
}

function onPointerUp() {
  if (dragInfo) { dragInfo = null; cvs.style.cursor = 'default'; }
}

let quiz = { score: 0, total: 0, answer: -1, answered: false };

function startQuiz() {
  quizActive = true; quiz.answered = false;
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月'];
  const n = 6, start = Math.floor(Math.random() * (months.length - n));
  const qLabels = months.slice(start, start + n);
  const qData = qLabels.map(() => Math.floor(Math.random() * 80) + 10);
  qData[Math.floor(Math.random() * n)] = Math.floor(Math.random() * 30) + 60;
  qData[Math.floor(Math.random() * n)] = Math.floor(Math.random() * 20) + 5;
  let maxChange = 0, answerIdx = 0;
  for (let i = 1; i < n; i++) {
    const c = Math.abs(qData[i] - qData[i - 1]);
    if (c > maxChange) { maxChange = c; answerIdx = i; }
  }
  quiz.answer = answerIdx;
  labels = qLabels; s1 = qData; s2 = qData; showS2 = false;
  animProgress = 1; buildTable(); draw();
  const area = document.querySelector('.canvas-area');
  const overlay = document.createElement('div');
  overlay.className = 'quiz-overlay'; overlay.id = 'quizOverlay';

  let choicesHTML = '';
  for (let i = 1; i < n; i++) {
    choicesHTML += `<button class="quiz-choice" data-idx="${i}" onclick="quizAnswer(${i})">${qLabels[i - 1]} → ${qLabels[i]}</button>`;
  }

  overlay.innerHTML = `
    <div class="quiz-title">图表测验</div>
    <div class="quiz-question">观察折线图，哪两个相邻月份之间<b>变化最大</b>？</div>
    <div class="quiz-choices">${choicesHTML}</div>
    <div class="quiz-feedback" id="quizFeedback"></div>
    <div class="quiz-score">得分：<b id="quizPts">${quiz.score}</b> / <b id="quizTot">${quiz.total}</b></div>
    <button class="edu-btn edu-btn-outline" style="margin-top:10px" onclick="closeQuiz()">关闭测验</button>
  `;
  area.appendChild(overlay);
}

function quizAnswer(idx) {
  if (quiz.answered) return;
  quiz.answered = true;
  quiz.total++;
  const correct = idx === quiz.answer;
  if (correct) quiz.score++;
  document.getElementById('quizPts').textContent = quiz.score;
  document.getElementById('quizTot').textContent = quiz.total;
  document.querySelectorAll('.quiz-choice').forEach(b => {
    const bi = parseInt(b.dataset.idx);
    if (bi === quiz.answer) b.classList.add('correct');
    else if (bi === idx && !correct) b.classList.add('wrong');
    b.style.pointerEvents = 'none';
  });
  const fb = document.getElementById('quizFeedback');
  fb.style.color = correct ? '#16a34a' : '#dc2626';
  fb.textContent = correct ? '回答正确！观察力很强！' : '不对哦，绿色高亮的才是最大变化';
}

function closeQuiz() {
  quizActive = false;
  const ov = document.getElementById('quizOverlay');
  if (ov) ov.remove();
  resetAll();
}

function loadPreset(type) {
  if (type === 'temp') {
    labels = ['1月','2月','3月','4月','5月','6月'];
    s1 = [2, 5, 12, 18, 24, 30]; s2 = [8, 10, 15, 20, 18, 25];
  } else if (type === 'sales') {
    labels = ['1月','2月','3月','4月','5月','6月'];
    s1 = [120, 150, 180, 160, 200, 240]; s2 = [100, 130, 160, 170, 190, 210];
  } else {
    labels = ['6岁','7岁','8岁','9岁','10岁','11岁'];
    s1 = [115, 122, 128, 135, 140, 148]; s2 = [112, 118, 125, 132, 138, 145];
  }
  animProgress = 1;
  render();
}

function resetAll() {
  showS2 = false;
  const btn = document.getElementById('s2Btn');
  btn.classList.remove('on');
  btn.style.background = '#fff'; btn.style.color = '#f97316';
  loadPreset('temp');
}

render();
</script>
</body>
</html>
