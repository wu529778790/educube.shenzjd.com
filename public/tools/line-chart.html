<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>折线统计图 — 教立方</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
  * { box-sizing:border-box; }
  body { font-family:var(--edu-font); margin:0; }
  .tool { width:100vw; height:100vh; display:flex; flex-direction:column; background:var(--edu-bg); }
  .toolbar { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:#fff; border-bottom:1px solid var(--edu-border); }
  .toolbar h1 { font-size:15px; color:var(--edu-primary); margin:0; }
  .toolbar span { font-size:11px; color:var(--edu-text-muted); background:#f1f5f9; padding:2px 8px; border-radius:12px; }
  .main { flex:1; display:grid; grid-template-columns:1fr 290px; overflow:hidden; }
  .canvas-wrap { position:relative; overflow:hidden; background:linear-gradient(135deg,#eff6ff,#f0f9ff); }
  .canvas-wrap canvas { width:100%; height:100%; display:block; cursor:crosshair; }
  .panel { background:#fff; border-left:1px solid var(--edu-border); padding:12px; display:flex; flex-direction:column; gap:8px; overflow:auto; }
  .section { display:flex; flex-direction:column; gap:4px; }
  .label { font-size:10px; font-weight:700; color:#64748b; letter-spacing:.05em; }
  .divider { height:1px; background:var(--edu-border); }
  .btn { padding:6px 12px; border:none; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer; font-family:var(--edu-font); transition:all .15s; }
  .btn.active { background:var(--edu-primary); color:#fff; }
  .btn-default { background:#f1f5f9; color:#334155; }
  .btn-default:hover { background:#e2e8f0; }
  .row { display:flex; gap:4px; flex-wrap:wrap; }

  .data-table { width:100%; border-collapse:collapse; font-size:12px; }
  .data-table th { background:#f1f5f9; padding:4px 6px; font-size:10px; color:#64748b; text-align:center; border:1px solid #e2e8f0; }
  .data-table td { padding:4px 6px; text-align:center; border:1px solid #e2e8f0; }
  .data-table input { width:36px; border:1px solid #d1d5db; border-radius:4px; text-align:center; font-size:12px; font-weight:700; padding:2px; font-family:var(--edu-font); }
  .data-table input:focus { border-color:#3b82f6; outline:none; }

  .stat-row { display:flex; gap:6px; }
  .stat-item { flex:1; text-align:center; padding:6px; border-radius:8px; }
  .stat-item .val { font-size:16px; font-weight:800; }
  .stat-item .lbl { font-size:9px; font-weight:700; }

  .quiz-card { background:#eff6ff; border:2px solid #93c5fd; border-radius:12px; padding:10px; text-align:center; }
  .quiz-q { font-size:13px; font-weight:700; color:#1e40af; }
  .quiz-opts { display:grid; grid-template-columns:1fr 1fr; gap:4px; margin-top:6px; }
  .quiz-opt { padding:6px; border:2px solid #e2e8f0; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; background:#fff; font-family:var(--edu-font); }
  .quiz-opt:hover { border-color:#3b82f6; }
  .quiz-opt.correct { background:#dcfce7; border-color:#22c55e; }
  .quiz-opt.wrong { background:#fef2f2; border-color:#ef4444; }
  .quiz-result { font-size:11px; font-weight:700; margin-top:4px; min-height:16px; }

  .info { font-size:11px; line-height:1.8; color:#334155; background:#fff; border:1px solid #bfdbfe; border-radius:8px; padding:8px 10px; }
  .info b { color:#1e40af; }
</style>
</head>
<body>
<div class="tool">
  <div class="toolbar">
    <h1>📈 折线统计图</h1>
    <span>五年级下册 · 第七单元</span>
  </div>
  <div class="main">
    <div class="canvas-wrap"><canvas id="cv"></canvas></div>
    <div class="panel">
      <div class="section">
        <div class="label">选择数据集</div>
        <div class="row">
          <button class="btn active" id="ds-temp" onclick="setDataset('temp')">🌡️ 气温变化</button>
          <button class="btn btn-default" id="ds-height" onclick="setDataset('height')">📏 身高增长</button>
          <button class="btn btn-default" id="ds-sales" onclick="setDataset('sales')">🏪 月销量</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">编辑数据（点击数值修改）</div>
        <div id="table-area"></div>
      </div>
      <div class="divider"></div>
      <div class="stat-row">
        <div class="stat-item" style="background:#fee2e2"><div class="val" style="color:#dc2626" id="st-max">—</div><div class="lbl" style="color:#dc2626">最高值</div></div>
        <div class="stat-item" style="background:#dbeafe"><div class="val" style="color:#2563eb" id="st-min">—</div><div class="lbl" style="color:#2563eb">最低值</div></div>
        <div class="stat-item" style="background:#dcfce7"><div class="val" style="color:#16a34a" id="st-avg">—</div><div class="lbl" style="color:#16a34a">平均值</div></div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">折线统计图测验</div>
        <div class="quiz-card" id="quiz-card"></div>
      </div>
      <div class="divider"></div>
      <div class="info">
        <b>折线统计图小知识</b><br/>
        ● 折线统计图能清楚地看出<strong>数量增减变化</strong><br/>
        ● 折线往上升 → 数量<strong>增加</strong><br/>
        ● 折线往下降 → 数量<strong>减少</strong><br/>
        ● 折线越陡 → 变化<strong>越大</strong><br/>
        ● 与条形统计图不同，折线图更注重<strong>趋势</strong>
      </div>
    </div>
  </div>
</div>
<script>
var cv, ctx;
var _ds = 'temp';
var _datasets = {
  temp: {
    title: '某地一年月平均气温（°C）',
    labels: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
    data: [2, 5, 10, 16, 22, 28, 32, 31, 25, 18, 10, 4],
    unit: '°C', color: '#ef4444'
  },
  height: {
    title: '小明6-12岁身高（厘米）',
    labels: ['6岁','7岁','8岁','9岁','10岁','11岁','12岁'],
    data: [116, 122, 128, 135, 140, 147, 155],
    unit: 'cm', color: '#22c55e'
  },
  sales: {
    title: '商店上半年月销售额（万元）',
    labels: ['1月','2月','3月','4月','5月','6月'],
    data: [12, 15, 10, 18, 22, 20],
    unit: '万', color: '#3b82f6'
  }
};

function init() {
  cv = document.getElementById('cv');
  ctx = cv.getContext('2d');
  window.addEventListener('resize', resize);
  resize();
  buildTable();
  updateStats();
  nextQuiz();
}

function resize() {
  var r = cv.parentElement.getBoundingClientRect();
  cv.width = r.width * devicePixelRatio;
  cv.height = r.height * devicePixelRatio;
  cv.style.width = r.width + 'px';
  cv.style.height = r.height + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  draw();
}

function setDataset(key) {
  _ds = key;
  ['temp','height','sales'].forEach(function(k) {
    document.getElementById('ds-' + k).className = 'btn ' + (k === key ? 'active' : 'btn-default');
  });
  buildTable();
  updateStats();
  draw();
}

function buildTable() {
  var ds = _datasets[_ds];
  var html = '<table class="data-table"><tr><th></th>';
  ds.labels.forEach(function(l) { html += '<th>' + l + '</th>'; });
  html += '</tr><tr><td style="font-weight:700;font-size:10px;color:#64748b">' + ds.unit + '</td>';
  ds.data.forEach(function(v, i) {
    html += '<td><input value="' + v + '" onchange="editData(' + i + ',this.value)"/></td>';
  });
  html += '</tr></table>';
  document.getElementById('table-area').innerHTML = html;
}

function editData(idx, val) {
  _datasets[_ds].data[idx] = parseFloat(val) || 0;
  updateStats();
  draw();
}

function updateStats() {
  var d = _datasets[_ds].data;
  var max = Math.max.apply(null, d);
  var min = Math.min.apply(null, d);
  var sum = d.reduce(function(a, b) { return a + b; }, 0);
  var avg = (sum / d.length).toFixed(1);
  document.getElementById('st-max').textContent = max + _datasets[_ds].unit;
  document.getElementById('st-min').textContent = min + _datasets[_ds].unit;
  document.getElementById('st-avg').textContent = avg + _datasets[_ds].unit;
}

function draw() {
  var w = cv.width / devicePixelRatio, h = cv.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  var ds = _datasets[_ds];
  var data = ds.data;
  var n = data.length;
  var color = ds.color;

  // Chart area
  var margin = { top: 50, right: 30, bottom: 50, left: 60 };
  var cw = w - margin.left - margin.right;
  var ch = h - margin.top - margin.bottom;

  var maxV = Math.ceil(Math.max.apply(null, data) * 1.1);
  var minV = Math.max(0, Math.floor(Math.min.apply(null, data) * 0.9));
  var range = maxV - minV || 1;

  // Title
  ctx.fillStyle = '#1e293b';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(ds.title, w / 2, 28);

  // Y axis
  ctx.strokeStyle = '#334155';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(margin.left, margin.top);
  ctx.lineTo(margin.left, margin.top + ch);
  ctx.stroke();

  // X axis
  ctx.beginPath();
  ctx.moveTo(margin.left, margin.top + ch);
  ctx.lineTo(margin.left + cw, margin.top + ch);
  ctx.stroke();

  // Y axis ticks
  var yTicks = 6;
  ctx.fillStyle = '#64748b';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'right';
  for (var i = 0; i <= yTicks; i++) {
    var val = minV + (range * i / yTicks);
    var y = margin.top + ch - (ch * i / yTicks);

    ctx.strokeStyle = '#e2e8f0';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(margin.left + 1, y);
    ctx.lineTo(margin.left + cw, y);
    ctx.stroke();

    ctx.fillStyle = '#64748b';
    ctx.fillText(Math.round(val), margin.left - 8, y + 4);
  }

  // Data points and line
  var points = [];
  for (var i = 0; i < n; i++) {
    var x = margin.left + (cw / (n - 1 || 1)) * i;
    var y = margin.top + ch - ((data[i] - minV) / range) * ch;
    points.push({ x: x, y: y, val: data[i] });
  }

  // Area fill
  ctx.fillStyle = color + '15';
  ctx.beginPath();
  ctx.moveTo(points[0].x, margin.top + ch);
  points.forEach(function(p) { ctx.lineTo(p.x, p.y); });
  ctx.lineTo(points[points.length - 1].x, margin.top + ch);
  ctx.closePath();
  ctx.fill();

  // Line
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  points.forEach(function(p, i) {
    if (i === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  });
  ctx.stroke();

  // Points and labels
  points.forEach(function(p, i) {
    // Outer circle
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill();

    // Value label
    ctx.fillStyle = '#334155';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(p.val, p.x, p.y - 12);
  });

  // X axis labels
  ctx.fillStyle = '#64748b';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  points.forEach(function(p, i) {
    ctx.fillText(ds.labels[i], p.x, margin.top + ch + 20);
  });

  // Trend indicators (up/down arrows between points)
  for (var i = 1; i < points.length; i++) {
    var mx = (points[i].x + points[i-1].x) / 2;
    var my = (points[i].y + points[i-1].y) / 2;
    var diff = data[i] - data[i-1];
    var arrow = diff > 0 ? '↑+' + diff : diff < 0 ? '↓' + diff : '→0';
    ctx.fillStyle = diff > 0 ? '#16a34a' : diff < 0 ? '#dc2626' : '#64748b';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(arrow, mx, my - 8);
  }
}

// ===== Quiz =====
var _quizQs = [
  { q: '折线统计图最适合表示什么？', opts: ['各部分比例', '数量变化趋势', '具体数值', '排名'], ans: 1 },
  { q: '折线往上升说明什么？', opts: ['数量不变', '数量减少', '数量增加', '无法判断'], ans: 2 },
  { q: '折线越陡说明什么？', opts: ['变化越大', '变化越小', '数量不变', '数据错误'], ans: 0 },
  { q: '下面哪个更适合用折线统计图？', opts: ['班级同学体重', '一周气温变化', '各班人数', '水果种类'], ans: 1 },
  { q: '与条形统计图相比，折线统计图的优势是？', opts: ['更美观', '能看出变化趋势', '数据更准确', '画起来简单'], ans: 1 },
  { q: '某地气温从3月的10°C升到7月的32°C，这4个月气温上升了多少？', opts: ['20°C', '22°C', '18°C', '32°C'], ans: 1 },
];
var _qi = 0, _score = 0;

function nextQuiz() {
  if (_qi >= _quizQs.length) {
    document.getElementById('quiz-card').innerHTML =
      '<div class="quiz-q">测验完成！答对 ' + _score + ' / ' + _quizQs.length + ' 题</div>';
    return;
  }
  var q = _quizQs[_qi];
  var html = '<div class="quiz-q">第' + (_qi + 1) + '题：' + q.q + '</div><div class="quiz-opts">';
  q.opts.forEach(function(o, i) {
    html += '<button class="quiz-opt" onclick="answer(' + i + ')">' + o + '</button>';
  });
  html += '</div><div class="quiz-result" id="qr"></div>';
  document.getElementById('quiz-card').innerHTML = html;
}

function answer(idx) {
  var q = _quizQs[_qi];
  var opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(function(b, i) {
    b.onclick = null; b.style.cursor = 'default';
    if (i === q.ans) b.classList.add('correct');
    if (i === idx && i !== q.ans) b.classList.add('wrong');
  });
  var r = document.getElementById('qr');
  if (idx === q.ans) { r.textContent = '✓ 正确！'; r.style.color = '#16a34a'; _score++; }
  else { r.textContent = '✗ 正确答案：' + q.opts[q.ans]; r.style.color = '#ef4444'; }
  _qi++;
  setTimeout(nextQuiz, 1200);
}

init();
</script>
<script src="../edu-lib/edu-tools.js"></script>
</body>
</html>
