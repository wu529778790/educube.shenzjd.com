<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>面积与周长对比 — 教立方</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
  :root { --c1:#22c55e; --c2:#3b82f6; --c3:#f97316; }
  * { box-sizing:border-box; }
  body { font-family:var(--edu-font); margin:0; }
  .tool { width:100vw; height:100vh; display:flex; flex-direction:column; background:var(--edu-bg); }
  .toolbar { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:#fff; border-bottom:1px solid var(--edu-border); }
  .toolbar h1 { font-size:15px; color:var(--edu-primary); margin:0; }
  .toolbar span { font-size:11px; color:var(--edu-text-muted); background:#f1f5f9; padding:2px 8px; border-radius:12px; }
  .main { flex:1; display:grid; grid-template-columns:1fr 300px; overflow:hidden; }
  .canvas-wrap { position:relative; overflow:hidden; background:linear-gradient(135deg,#ecfdf5,#f0fdf4); }
  .canvas-wrap canvas { width:100%; height:100%; display:block; cursor:crosshair; }
  .panel { background:#fff; border-left:1px solid var(--edu-border); padding:12px; display:flex; flex-direction:column; gap:8px; overflow:auto; }
  .section { display:flex; flex-direction:column; gap:4px; }
  .label { font-size:10px; font-weight:700; color:#64748b; letter-spacing:.05em; }
  .divider { height:1px; background:var(--edu-border); }
  .btn { padding:6px 12px; border:none; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer; font-family:var(--edu-font); transition:all .15s; }
  .btn.active { background:var(--edu-primary); color:#fff; }
  .btn-default { background:#f1f5f9; color:#334155; }
  .btn-default:hover { background:#e2e8f0; }
  .row { display:flex; gap:4px; flex-wrap:wrap; }
  .stat-card { text-align:center; padding:10px; border-radius:10px; }
  .stat-card .val { font-size:28px; font-weight:800; }
  .stat-card .lbl { font-size:10px; font-weight:600; margin-top:2px; }
  .compare-box { background:#f8fafc; border:2px solid #e2e8f0; border-radius:10px; padding:8px; }
  .compare-row { display:flex; align-items:center; gap:6px; margin:4px 0; }
  .compare-bar { height:18px; border-radius:9px; transition:width .4s; min-width:2px; }
  .info { font-size:11px; line-height:1.8; color:#334155; background:#fff; border:1px solid #bbf7d0; border-radius:8px; padding:8px 10px; }
  .info b { color:#166534; }
  .quiz-card { background:#ecfdf5; border:2px solid #34d399; border-radius:12px; padding:10px; text-align:center; }
  .quiz-q { font-size:13px; font-weight:700; color:#166534; }
  .quiz-opts { display:grid; grid-template-columns:1fr 1fr; gap:4px; margin-top:6px; }
  .quiz-opt { padding:6px; border:2px solid #e2e8f0; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; background:#fff; font-family:var(--edu-font); transition:all .15s; }
  .quiz-opt:hover { border-color:#22c55e; }
  .quiz-opt.correct { background:#dcfce7; border-color:#22c55e; }
  .quiz-opt.wrong { background:#fef2f2; border-color:#ef4444; }
  .quiz-result { font-size:11px; font-weight:700; margin-top:4px; min-height:16px; }
  .grid-info { position:absolute; bottom:8px; left:8px; background:rgba(255,255,255,.85); padding:4px 10px; border-radius:8px; font-size:11px; color:#64748b; pointer-events:none; }
</style>
</head>
<body>
<div class="tool">
  <div class="toolbar">
    <h1>📐 面积与周长对比</h1>
    <span>三年级下册 · 第五单元</span>
  </div>
  <div class="main">
    <div class="canvas-wrap">
      <canvas id="cv"></canvas>
      <div class="grid-info">点击网格绘制/擦除方块</div>
    </div>
    <div class="panel">
      <div class="section">
        <div class="label">操作模式</div>
        <div class="row">
          <button class="btn active" id="mode-draw" onclick="setMode('draw')">✏️ 绘制</button>
          <button class="btn btn-default" id="mode-erase" onclick="setMode('erase')">🧹 擦除</button>
          <button class="btn btn-default" onclick="clearGrid()">🗑️ 清空</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">预设形状</div>
        <div class="row">
          <button class="btn btn-default" onclick="preset('rect3x2')">3×2 矩形</button>
          <button class="btn btn-default" onclick="preset('rect4x3')">4×3 矩形</button>
          <button class="btn btn-default" onclick="preset('L')">L 形</button>
          <button class="btn btn-default" onclick="preset('T')">T 形</button>
          <button class="btn btn-default" onclick="preset('cross')">十字形</button>
          <button class="btn btn-default" onclick="preset('stair')">阶梯形</button>
        </div>
      </div>
      <div class="divider"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        <div class="stat-card" style="background:#dcfce7">
          <div class="val" id="area-val" style="color:#166534">0</div>
          <div class="lbl" style="color:#166534">面积（格数）</div>
        </div>
        <div class="stat-card" style="background:#dbeafe">
          <div class="val" id="perim-val" style="color:#1e40af">0</div>
          <div class="lbl" style="color:#1e40af">周长（边数）</div>
        </div>
      </div>
      <div class="compare-box">
        <div class="label">面积 vs 周长对比</div>
        <div class="compare-row">
          <span style="font-size:11px;font-weight:700;min-width:30px;color:#166534">面积</span>
          <div style="flex:1;background:#f1f5f9;border-radius:9px;height:18px;overflow:hidden">
            <div class="compare-bar" id="area-bar" style="background:#22c55e;width:0"></div>
          </div>
        </div>
        <div class="compare-row">
          <span style="font-size:11px;font-weight:700;min-width:30px;color:#1e40af">周长</span>
          <div style="flex:1;background:#f1f5f9;border-radius:9px;height:18px;overflow:hidden">
            <div class="compare-bar" id="perim-bar" style="background:#3b82f6;width:0"></div>
          </div>
        </div>
        <div id="insight" style="font-size:11px;color:#64748b;margin-top:4px;text-align:center;font-weight:600"></div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">面积周长测验</div>
        <div class="quiz-card" id="quiz-card"></div>
      </div>
      <div class="divider"></div>
      <div class="info">
        <b>面积与周长小知识</b><br/>
        ● <strong>面积</strong>：图形所占的平面大小（格数）<br/>
        ● <strong>周长</strong>：图形一周的边线总长度<br/>
        ● 面积相同 → 周长<strong>不一定相同</strong><br/>
        ● 周长相同 → 面积<strong>不一定相同</strong><br/>
        ● 面积相同时，越接近正方形，周长越短
      </div>
    </div>
  </div>
</div>
<script>
var cv, ctx;
var COLS = 12, ROWS = 10;
var grid = [];
var _mode = 'draw';
var _cellSize = 40;
var _ox = 0, _oy = 0;
var _dragging = false;

function init() {
  cv = document.getElementById('cv');
  ctx = cv.getContext('2d');
  for (var r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (var c = 0; c < COLS; c++) grid[r][c] = 0;
  }
  window.addEventListener('resize', resize);
  resize();
  nextQuiz();

  cv.addEventListener('mousedown', function(e) { _dragging = true; handleClick(e); });
  cv.addEventListener('mousemove', function(e) { if (_dragging) handleClick(e); });
  cv.addEventListener('mouseup', function() { _dragging = false; });
  cv.addEventListener('mouseleave', function() { _dragging = false; });

  cv.addEventListener('touchstart', function(e) { e.preventDefault(); _dragging = true; handleClick(e.touches[0]); }, {passive:false});
  cv.addEventListener('touchmove', function(e) { e.preventDefault(); if (_dragging) handleClick(e.touches[0]); }, {passive:false});
  cv.addEventListener('touchend', function() { _dragging = false; });
}

function resize() {
  var r = cv.parentElement.getBoundingClientRect();
  cv.width = r.width * devicePixelRatio;
  cv.height = r.height * devicePixelRatio;
  cv.style.width = r.width + 'px';
  cv.style.height = r.height + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  _cellSize = Math.min((r.width - 40) / COLS, (r.height - 40) / ROWS);
  _cellSize = Math.max(_cellSize, 20);
  _ox = (r.width - COLS * _cellSize) / 2;
  _oy = (r.height - ROWS * _cellSize) / 2;
  draw();
}

function handleClick(e) {
  var rect = cv.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;
  var c = Math.floor((mx - _ox) / _cellSize);
  var r = Math.floor((my - _oy) / _cellSize);
  if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
    grid[r][c] = (_mode === 'draw') ? 1 : 0;
    draw();
    updateStats();
  }
}

function setMode(m) {
  _mode = m;
  document.getElementById('mode-draw').className = 'btn ' + (m === 'draw' ? 'active' : 'btn-default');
  document.getElementById('mode-erase').className = 'btn ' + (m === 'erase' ? 'active' : 'btn-default');
}

function clearGrid() {
  for (var r = 0; r < ROWS; r++)
    for (var c = 0; c < COLS; c++) grid[r][c] = 0;
  draw();
  updateStats();
}

function preset(type) {
  clearGrid();
  var shapes = {
    'rect3x2': [[0,0],[0,1],[0,2],[1,0],[1,1],[1,2]],
    'rect4x3': [[0,0],[0,1],[0,2],[0,3],[1,0],[1,1],[1,2],[1,3],[2,0],[2,1],[2,2],[2,3]],
    'L': [[0,0],[1,0],[2,0],[2,1],[2,2]],
    'T': [[0,0],[0,1],[0,2],[1,1],[2,1]],
    'cross': [[0,1],[1,0],[1,1],[1,2],[2,1]],
    'stair': [[0,0],[1,0],[1,1],[2,0],[2,1],[2,2]]
  };
  var cells = shapes[type] || [];
  // Center the shape
  var minR = 99, minC = 99, maxR = 0, maxC = 0;
  cells.forEach(function(p) { minR = Math.min(minR, p[0]); minC = Math.min(minC, p[1]); maxR = Math.max(maxR, p[0]); maxC = Math.max(maxC, p[1]); });
  var offR = Math.floor((ROWS - (maxR - minR + 1)) / 2) - minR;
  var offC = Math.floor((COLS - (maxC - minC + 1)) / 2) - minC;
  cells.forEach(function(p) { grid[p[0] + offR][p[1] + offC] = 1; });
  draw();
  updateStats();
}

function calcArea() {
  var a = 0;
  for (var r = 0; r < ROWS; r++)
    for (var c = 0; c < COLS; c++) if (grid[r][c]) a++;
  return a;
}

function calcPerimeter() {
  var p = 0;
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      if (!grid[r][c]) continue;
      if (r === 0 || !grid[r-1][c]) p++;
      if (r === ROWS-1 || !grid[r+1][c]) p++;
      if (c === 0 || !grid[r][c-1]) p++;
      if (c === COLS-1 || !grid[r][c+1]) p++;
    }
  }
  return p;
}

function updateStats() {
  var area = calcArea();
  var perim = calcPerimeter();
  document.getElementById('area-val').textContent = area;
  document.getElementById('perim-val').textContent = perim;
  var maxV = Math.max(area, perim, 1);
  document.getElementById('area-bar').style.width = (area / maxV * 100) + '%';
  document.getElementById('perim-bar').style.width = (perim / maxV * 100) + '%';

  var insight = '';
  if (area > 0) {
    var ratio = (perim / area).toFixed(2);
    insight = '周长÷面积 = ' + ratio + '（越小越"紧凑"）';
  }
  document.getElementById('insight').textContent = insight;
}

function draw() {
  var w = cv.width / devicePixelRatio, h = cv.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  // Draw grid background
  ctx.fillStyle = '#fff';
  ctx.fillRect(_ox, _oy, COLS * _cellSize, ROWS * _cellSize);

  // Grid lines
  ctx.strokeStyle = '#d1d5db';
  ctx.lineWidth = 0.5;
  for (var r = 0; r <= ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(_ox, _oy + r * _cellSize);
    ctx.lineTo(_ox + COLS * _cellSize, _oy + r * _cellSize);
    ctx.stroke();
  }
  for (var c = 0; c <= COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(_ox + c * _cellSize, _oy);
    ctx.lineTo(_ox + c * _cellSize, _oy + ROWS * _cellSize);
    ctx.stroke();
  }

  // Draw filled cells
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      if (!grid[r][c]) continue;
      var x = _ox + c * _cellSize;
      var y = _oy + r * _cellSize;

      // Fill
      ctx.fillStyle = '#22c55e';
      ctx.fillRect(x + 1, y + 1, _cellSize - 2, _cellSize - 2);

      // Highlight exposed edges (perimeter)
      ctx.strokeStyle = '#1e40af';
      ctx.lineWidth = 3;
      if (r === 0 || !grid[r-1][c]) { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + _cellSize, y); ctx.stroke(); }
      if (r === ROWS-1 || !grid[r+1][c]) { ctx.beginPath(); ctx.moveTo(x, y + _cellSize); ctx.lineTo(x + _cellSize, y + _cellSize); ctx.stroke(); }
      if (c === 0 || !grid[r][c-1]) { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + _cellSize); ctx.stroke(); }
      if (c === COLS-1 || !grid[r][c+1]) { ctx.beginPath(); ctx.moveTo(x + _cellSize, y); ctx.lineTo(x + _cellSize, y + _cellSize); ctx.stroke(); }
    }
  }

  // Row/column numbers
  ctx.fillStyle = '#94a3b8';
  ctx.font = Math.max(9, _cellSize * 0.25) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  for (var c = 0; c < COLS; c++) {
    ctx.fillText(c + 1, _ox + c * _cellSize + _cellSize / 2, _oy - 3);
  }
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (var r = 0; r < ROWS; r++) {
    ctx.fillText(r + 1, _ox - 5, _oy + r * _cellSize + _cellSize / 2);
  }
}

// ===== Quiz =====
var _quizQs = [
  { q: '一个正方形边长3厘米，周长是多少？', opts: ['6厘米', '9厘米', '12厘米', '3厘米'], ans: 2 },
  { q: '长方形长5cm、宽3cm，面积是多少？', opts: ['8cm²', '15cm²', '16cm²', '10cm²'], ans: 1 },
  { q: '周长相等的两个长方形，面积一定相等吗？', opts: ['一定相等', '不一定相等', '一定不等', '无法判断'], ans: 1 },
  { q: '边长4厘米的正方形，面积和周长分别是？', opts: ['都是16', '面积16 周长16', '面积8 周长16', '面积16 周长8'], ans: 1 },
  { q: '面积是12cm²的长方形，长可能是？', opts: ['3cm', '4cm', '5cm', '6cm'], ans: 0 },
  { q: '用12个1cm²拼成长方形，周长最短是多少？', opts: ['14cm', '16cm', '12cm', '10cm'], ans: 0 },
];
var _qi = 0, _score = 0;

function nextQuiz() {
  if (_qi >= _quizQs.length) {
    document.getElementById('quiz-card').innerHTML =
      '<div class="quiz-q">测验完成！答对 ' + _score + ' / ' + _quizQs.length + ' 题</div>';
    return;
  }
  var q = _quizQs[_qi];
  var html = '<div class="quiz-q">第' + (_qi + 1) + '题：' + q.q + '</div><div class="quiz-opts">';
  q.opts.forEach(function(o, i) {
    html += '<button class="quiz-opt" onclick="answer(' + i + ')">' + o + '</button>';
  });
  html += '</div><div class="quiz-result" id="qr"></div>';
  document.getElementById('quiz-card').innerHTML = html;
}

function answer(idx) {
  var q = _quizQs[_qi];
  var opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(function(b, i) {
    b.onclick = null; b.style.cursor = 'default';
    if (i === q.ans) b.classList.add('correct');
    if (i === idx && i !== q.ans) b.classList.add('wrong');
  });
  var r = document.getElementById('qr');
  if (idx === q.ans) { r.textContent = '✓ 正确！'; r.style.color = '#16a34a'; _score++; }
  else { r.textContent = '✗ 正确答案：' + q.opts[q.ans]; r.style.color = '#ef4444'; }
  _qi++;
  setTimeout(nextQuiz, 1200);
}

init();
</script>
</body>
</html>
