<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>圆的认识 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 280px; height: 100%; }
    .canvas-area { padding: 16px; overflow: hidden; background: linear-gradient(135deg, #faf5ff 0%, #fdfaf4 100%); position: relative; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 14px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #e9d5ff; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .prop-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #fff; border-radius: 8px; border: 1px solid #e2e8f0; }
    .prop-label { font-size: 13px; color: #64748b; }
    .prop-value { font-size: 15px; font-weight: 700; color: #1e293b; font-family: 'Courier New', monospace; }
    .slider-row { display: flex; align-items: center; gap: 10px; }
    .slider-row input { flex: 1; }
    .slider-row .value-display { min-width: 36px; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">⭕ 圆的认识</div>
      <div class="edu-toolbar-subtitle">上册 · 第五单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-outline" onclick="toggleDiameter()">显示直径</button>
      <button class="edu-btn edu-btn-outline" onclick="toggleRadius()">显示半径</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="canvas" style="width:100%;height:100%;cursor:move"></canvas>
      </div>

      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">半径</div>
          <div class="slider-row">
            <input type="range" id="radiusSlider" min="20" max="200" value="100" oninput="onRadiusChange()"/>
            <span class="value-display" id="radiusVal">100</span>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">圆的属性</div>
          <div class="prop-row"><span class="prop-label">半径 r</span><span class="prop-value" id="propR">100</span></div>
          <div class="prop-row"><span class="prop-label">直径 d</span><span class="prop-value" id="propD">200</span></div>
          <div class="prop-row"><span class="prop-label">周长 C = 2πr</span><span class="prop-value" id="propC">628.3</span></div>
          <div class="prop-row"><span class="prop-label">面积 S = πr²</span><span class="prop-value" id="propS">31415.9</span></div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">圆心位置（拖拽移动）</div>
          <div class="prop-row"><span class="prop-label">X</span><span class="prop-value" id="propCX">—</span></div>
          <div class="prop-row"><span class="prop-label">Y</span><span class="prop-value" id="propCY">—</span></div>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <b>圆的知识</b><br/>
          ● 圆心(O)确定圆的位置<br/>
          ● 半径(r)确定圆的大小<br/>
          ● 直径(d) = 2 × 半径(r)<br/>
          ● 周长(C) = 2πr = πd<br/>
          ● 面积(S) = πr²<br/>
          ● 圆是轴对称图形，有无数条对称轴
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../edu-lib/edu-tools.js"></script>
<script>
const canvas = document.getElementById('canvas');
let cx, cy, r;
let showDiam = true, showRad = true;
let dragging = false;

function initCanvas() {
  const { ctx, w, h } = setupCanvas(canvas);
  if (!cx) { cx = w / 2; cy = h / 2; }
  r = parseInt(document.getElementById('radiusSlider').value);
  render();
}

function render() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const w = rect.width, h = rect.height;
  const ctx = canvas.getContext('2d');
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  ctx.fillStyle = '#f8fafc';
  ctx.fillRect(0, 0, w, h);

  // 网格
  drawGrid(ctx, w, h, 30, '#f1f5f9');

  // 圆填充
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(139,92,246,0.08)';
  ctx.fill();

  // 圆边
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = '#8b5cf6';
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // 半径
  if (showRad) {
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + r, cy);
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = 2;
    ctx.setLineDash([]);
    ctx.stroke();

    // 半径标注
    ctx.fillStyle = '#ef4444';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('r = ' + r, cx + r / 2, cy - 10);
  }

  // 直径
  if (showDiam) {
    ctx.beginPath();
    ctx.moveTo(cx - r, cy);
    ctx.lineTo(cx + r, cy);
    ctx.strokeStyle = '#3b82f6';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 3]);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = '#3b82f6';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('d = ' + (r * 2), cx, cy + r + 20);
  }

  // 圆心
  ctx.beginPath();
  ctx.arc(cx, cy, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#1a3a5c';
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 9px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('O', cx, cy + 3);

  // 多条半径（淡色）
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 / 8) * i;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
    ctx.strokeStyle = 'rgba(139,92,246,0.2)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  ctx.restore();

  updateProps();
}

function updateProps() {
  document.getElementById('propR').textContent = r;
  document.getElementById('propD').textContent = r * 2;
  document.getElementById('propC').textContent = (2 * Math.PI * r).toFixed(1);
  document.getElementById('propS').textContent = (Math.PI * r * r).toFixed(1);
  document.getElementById('propCX').textContent = Math.round(cx);
  document.getElementById('propCY').textContent = Math.round(cy);
  document.getElementById('radiusVal').textContent = r;
}

function onRadiusChange() {
  r = parseInt(document.getElementById('radiusSlider').value);
  render();
}

function toggleDiameter() { showDiam = !showDiam; render(); }
function toggleRadius() { showRad = !showRad; render(); }

function resetAll() {
  const rect = canvas.getBoundingClientRect();
  cx = rect.width / 2;
  cy = rect.height / 2;
  r = 100;
  document.getElementById('radiusSlider').value = 100;
  showDiam = true;
  showRad = true;
  render();
}

// 拖拽圆心
canvas.addEventListener('mousedown', function(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  if (Math.hypot(mx - cx, my - cy) < r) { dragging = true; }
});
canvas.addEventListener('mousemove', function(e) {
  if (!dragging) return;
  const rect = canvas.getBoundingClientRect();
  cx = e.clientX - rect.left;
  cy = e.clientY - rect.top;
  render();
});
canvas.addEventListener('mouseup', () => { dragging = false; });
canvas.addEventListener('mouseleave', () => { dragging = false; });

// 触摸
canvas.addEventListener('touchstart', function(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = e.touches[0].clientX - rect.left;
  const my = e.touches[0].clientY - rect.top;
  if (Math.hypot(mx - cx, my - cy) < r) { dragging = true; e.preventDefault(); }
}, { passive: false });
canvas.addEventListener('touchmove', function(e) {
  if (!dragging) return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  cx = e.touches[0].clientX - rect.left;
  cy = e.touches[0].clientY - rect.top;
  render();
}, { passive: false });
canvas.addEventListener('touchend', () => { dragging = false; });

window.addEventListener('resize', () => { initCanvas(); });
initCanvas();
</script>
</body>
</html>
