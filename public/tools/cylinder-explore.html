<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>圆柱的认识 — 教立方</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<script src="../edu-lib/three.min.js"></script>
<script src="../edu-lib/OrbitControls.js"></script>
<script src="../edu-lib/edu-3d.js"></script>
<style>
  .main-layout { display:grid; grid-template-columns:1fr 280px; height:100%; }
  .canvas-area { position:relative; background:linear-gradient(135deg,#faf5ff,#fdfaf4); overflow:hidden; }
  .canvas-area canvas { width:100%; height:100%; display:block; }
  .control-panel { background:#fdfaf4; border-left:1px solid #e2e8f0; padding:14px; display:flex; flex-direction:column; gap:10px; overflow:auto; }
  .ctrl-section { display:flex; flex-direction:column; gap:6px; }
  .ctrl-label { font-size:11px; font-weight:700; color:#64748b; letter-spacing:.05em; }
  .divider { height:1px; background:#e2e8f0; }
  .slider-row { display:flex; align-items:center; gap:8px; }
  .slider-row label { font-size:12px; font-weight:600; color:#64748b; min-width:20px; }
  .slider-row input[type=range] { flex:1; }
  .slider-row .val { font-size:14px; font-weight:700; color:#8b5cf6; min-width:36px; text-align:right; }
  .prop-row { display:flex; justify-content:space-between; align-items:center; padding:6px 10px; background:#fff; border-radius:6px; border:1px solid #e2e8f0; font-size:12px; }
  .prop-label { color:#64748b; }
  .prop-value { font-weight:700; color:#1e293b; font-family:'Courier New',monospace; }
  .info-box { background:#fff; border:1px solid #e9d5ff; border-radius:10px; padding:10px 12px; font-size:12px; line-height:1.8; color:#334155; }
  .info-box strong { color:#8b5cf6; }
  .mode-btn {
    padding:6px 10px; border-radius:8px; font-size:11px; font-weight:600;
    cursor:pointer; border:1.5px solid #e2e8f0; background:#fff; color:#64748b;
    transition:all .15s; font-family:var(--edu-font); text-align:center;
  }
  .mode-btn.active { background:#8b5cf6; color:#fff; border-color:#8b5cf6; }
  .orbit-hint {
    position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,.85); padding:6px 14px; border-radius:20px;
    font-size:11px; color:#64748b; pointer-events:none;
  }
</style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="edu-toolbar-title">🥫 圆柱的认识</span>
      <span class="edu-toolbar-subtitle">下册 · 第三单元</span>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-accent" id="btn-cut" onclick="playUnfold()">✂ 展开动画</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="c3d"></canvas>
        <div class="orbit-hint">拖拽旋转 · 滚轮缩放</div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">底面半径 r</div>
          <div class="slider-row"><label>r</label><input type="range" id="sr" min="1" max="5" value="2" step="0.5" oninput="rebuild()"/><span class="val" id="vr">2</span></div>
        </div>
        <div class="ctrl-section">
          <div class="ctrl-label">高 h</div>
          <div class="slider-row"><label>h</label><input type="range" id="sh" min="1" max="8" value="4" step="0.5" oninput="rebuild()"/><span class="val" id="vh">4</span></div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">显示模式</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px">
            <button class="mode-btn active" id="mb-solid" onclick="setMode('solid')">实体</button>
            <button class="mode-btn" id="mb-wire" onclick="setMode('wire')">线框</button>
            <button class="mode-btn" id="mb-expand" onclick="setMode('expand')">展开</button>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">属性</div>
          <div class="prop-row"><span class="prop-label">半径 r</span><span class="prop-value" id="pR">2</span></div>
          <div class="prop-row"><span class="prop-label">直径 d</span><span class="prop-value" id="pD">4</span></div>
          <div class="prop-row"><span class="prop-label">高 h</span><span class="prop-value" id="pH">4</span></div>
          <div class="prop-row"><span class="prop-label">底面周长 C=2πr</span><span class="prop-value" id="pC">12.6</span></div>
          <div class="prop-row"><span class="prop-label">侧面积 S侧=2πrh</span><span class="prop-value" id="pSL">50.3</span></div>
          <div class="prop-row"><span class="prop-label">底面积 S底=πr²</span><span class="prop-value" id="pSB">12.6</span></div>
          <div class="prop-row"><span class="prop-label">表面积 S</span><span class="prop-value" id="pS">75.4</span></div>
          <div class="prop-row"><span class="prop-label">体积 V=πr²h</span><span class="prop-value" id="pV">50.3</span></div>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <strong>圆柱知识</strong><br/>
          ● 上下底面是完全相同的圆<br/>
          ● 侧面展开是长方形（长=底面周长）<br/>
          ● 侧面积 = 底面周长 × 高<br/>
          ● 表面积 = 2×底面积 + 侧面积<br/>
          ● 体积 = 底面积 × 高
        </div>
      </div>
    </div>
  </div>
</div>
<script>
var _scene, _camera, _renderer, _controls;
var _cylMesh, _cylEdges, _labelGroup, _expandGroup;
var _mode = 'solid';
var _animId = null;

function init() {
  var canvas = document.getElementById('c3d');
  var r = Edu3D.createScene(canvas, { bg: 0xfaf5ff, camX: 8, camY: 5, camZ: 8 });
  _scene = r.scene; _camera = r.camera; _renderer = r.renderer; _controls = r.controls;
  Edu3D.addLights(_scene);
  Edu3D.addGrid(_scene, 12, 12);

  _labelGroup = new THREE.Group();
  _scene.add(_labelGroup);
  _expandGroup = new THREE.Group();
  _scene.add(_expandGroup);

  rebuild();
  Edu3D.startLoop(_scene, _camera, _renderer, _controls);
}

function rebuild() {
  var radius = parseFloat(document.getElementById('sr').value);
  var height = parseFloat(document.getElementById('sh').value);
  document.getElementById('vr').textContent = radius;
  document.getElementById('vh').textContent = height;

  if (_cylMesh) { _scene.remove(_cylMesh); _scene.remove(_cylEdges); }
  while (_labelGroup.children.length) _labelGroup.remove(_labelGroup.children[0]);
  while (_expandGroup.children.length) _expandGroup.remove(_expandGroup.children[0]);

  // 圆柱
  var cylGeo = new THREE.CylinderGeometry(radius, radius, height, 32);
  var cylMat = new THREE.MeshLambertMaterial({ color: 0x8b5cf6, transparent: true, opacity: 0.5 });
  _cylMesh = new THREE.Mesh(cylGeo, cylMat);
  _cylMesh.position.y = height / 2;
  _cylMesh.castShadow = true;
  _scene.add(_cylMesh);

  _cylEdges = Edu3D.edges(cylGeo, 0x6d28d9);
  _cylEdges.position.copy(_cylMesh.position);
  _cylEdges.visible = _mode === 'wire';
  _scene.add(_cylEdges);

  // 标注：高线
  var hLineGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(radius + 0.8, 0, 0),
    new THREE.Vector3(radius + 0.8, height, 0)
  ]);
  _labelGroup.add(new THREE.Line(hLineGeo, new THREE.LineBasicMaterial({ color: 0xef4444 })));

  var hLabel = Edu3D.textSprite('h=' + height, { color: '#ef4444', scale: 0.5 });
  hLabel.position.set(radius + 1.5, height / 2, 0);
  _labelGroup.add(hLabel);

  // 标注：半径线
  var rLineGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, height + 0.3, 0),
    new THREE.Vector3(radius, height + 0.3, 0)
  ]);
  _labelGroup.add(new THREE.Line(rLineGeo, new THREE.LineBasicMaterial({ color: 0x22c55e })));

  var rLabel = Edu3D.textSprite('r=' + radius, { color: '#22c55e', scale: 0.4 });
  rLabel.position.set(radius / 2, height + 0.8, 0);
  _labelGroup.add(rLabel);

  // 标注：底面周长
  var cLabel = Edu3D.textSprite('C=2πr=' + (2 * Math.PI * radius).toFixed(1), { color: '#3b82f6', scale: 0.35 });
  cLabel.position.set(0, -0.8, radius + 0.5);
  _labelGroup.add(cLabel);

  // 底面圆高亮
  var circLineGeo = new THREE.BufferGeometry();
  var circPts = [];
  for (var a = 0; a <= 64; a++) {
    var angle = (a / 64) * Math.PI * 2;
    circPts.push(new THREE.Vector3(Math.cos(angle) * radius, 0.02, Math.sin(angle) * radius));
  }
  circLineGeo.setFromPoints(circPts);
  _labelGroup.add(new THREE.Line(circLineGeo, new THREE.LineBasicMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.6 })));

  // 展开组
  if (_mode === 'expand') buildExpand(radius, height);

  _expandGroup.visible = _mode === 'expand';
  _cylMesh.visible = _mode !== 'expand';
  _cylEdges.visible = _mode === 'wire';
  _labelGroup.visible = _mode !== 'expand';

  // 更新计算
  var C = 2 * Math.PI * radius;
  var Sbase = Math.PI * radius * radius;
  var Slateral = 2 * Math.PI * radius * height;
  var S = 2 * Sbase + Slateral;
  var V = Sbase * height;

  document.getElementById('pR').textContent = radius;
  document.getElementById('pD').textContent = radius * 2;
  document.getElementById('pH').textContent = height;
  document.getElementById('pC').textContent = C.toFixed(1);
  document.getElementById('pSL').textContent = Slateral.toFixed(1);
  document.getElementById('pSB').textContent = Sbase.toFixed(1);
  document.getElementById('pS').textContent = S.toFixed(1);
  document.getElementById('pV').textContent = V.toFixed(1);
}

function buildExpand(radius, height) {
  while (_expandGroup.children.length) _expandGroup.remove(_expandGroup.children[0]);
  var circumference = 2 * Math.PI * radius;
  var scale = Math.min(4 / Math.max(circumference, 0.01), 4 / Math.max(height, 0.01));

  // 侧面展开矩形
  var rectW = circumference * scale;
  var rectH = height * scale;
  var rectShape = new THREE.Shape();
  rectShape.moveTo(-rectW / 2, -rectH / 2);
  rectShape.lineTo(rectW / 2, -rectH / 2);
  rectShape.lineTo(rectW / 2, rectH / 2);
  rectShape.lineTo(-rectW / 2, rectH / 2);
  rectShape.closePath();
  var rectGeo = new THREE.ShapeGeometry(rectShape);
  var rectMesh = new THREE.Mesh(rectGeo, new THREE.MeshBasicMaterial({ color: 0x8b5cf6, transparent: true, opacity: 0.2, side: THREE.DoubleSide }));
  rectMesh.position.set(0, 0.02, -5);
  rectMesh.rotation.x = -Math.PI / 2;
  _expandGroup.add(rectMesh);

  var rectEdge = new THREE.EdgesGeometry(rectGeo);
  var rectLine = new THREE.LineSegments(rectEdge, new THREE.LineBasicMaterial({ color: 0x8b5cf6 }));
  rectLine.position.copy(rectMesh.position);
  rectLine.rotation.copy(rectMesh.rotation);
  _expandGroup.add(rectLine);

  var rectLabel = Edu3D.textSprite('侧面 (长=C=' + circumference.toFixed(1) + ', 宽=h=' + height + ')', { color: '#7c3aed', scale: 0.5 });
  rectLabel.position.set(0, 0.1, -5);
  _expandGroup.add(rectLabel);

  // 上底面
  var circR = radius * scale;
  addCircleToExpand(0, -5 + rectW / 2 + circR + 0.5, circR, 0x0ea5e9, '上底面 r=' + radius);
  // 下底面
  addCircleToExpand(0, -5 - rectW / 2 - circR - 0.5, circR, 0x22c55e, '下底面 r=' + radius);
}

function addCircleToExpand(x, z, r, color, text) {
  var circGeo = new THREE.CircleGeometry(r, 32);
  var circMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.2, side: THREE.DoubleSide });
  var circ = new THREE.Mesh(circGeo, circMat);
  circ.position.set(x, 0.02, z);
  circ.rotation.x = -Math.PI / 2;
  _expandGroup.add(circ);

  var circEdge = new THREE.EdgesGeometry(circGeo);
  var line = new THREE.LineSegments(circEdge, new THREE.LineBasicMaterial({ color: color }));
  line.position.copy(circ.position);
  line.rotation.copy(circ.rotation);
  _expandGroup.add(line);

  var label = Edu3D.textSprite(text, { color: '#' + color.toString(16).padStart(6, '0'), scale: 0.35 });
  label.position.set(x, 0.1, z);
  _expandGroup.add(label);
}

function playUnfold() {
  if (_animId) { cancelAnimationFrame(_animId); _animId = null; }
  _mode = 'expand';
  ['solid', 'wire', 'expand'].forEach(function (k) {
    document.getElementById('mb-' + k).classList.toggle('active', k === 'expand');
  });
  _cylMesh.visible = false;
  _cylEdges.visible = false;
  _labelGroup.visible = false;

  var radius = parseFloat(document.getElementById('sr').value);
  var height = parseFloat(document.getElementById('sh').value);
  var circumference = 2 * Math.PI * radius;
  var t = 0;
  var steps = 60;

  while (_expandGroup.children.length) _expandGroup.remove(_expandGroup.children[0]);
  _expandGroup.visible = true;

  // 侧面
  var sideGeo = new THREE.PlaneGeometry(circumference, height, 32, 1);
  var sideMat = new THREE.MeshBasicMaterial({ color: 0x8b5cf6, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
  var sideMesh = new THREE.Mesh(sideGeo, sideMat);
  sideMesh.rotation.x = -Math.PI / 2;
  _expandGroup.add(sideMesh);

  // 上底面
  var topGeo = new THREE.CircleGeometry(radius, 32);
  var topMesh = new THREE.Mesh(topGeo, new THREE.MeshBasicMaterial({ color: 0x0ea5e9, transparent: true, opacity: 0.3, side: THREE.DoubleSide }));
  topMesh.rotation.x = -Math.PI / 2;
  _expandGroup.add(topMesh);

  // 下底面
  var botMesh = new THREE.Mesh(topGeo.clone(), new THREE.MeshBasicMaterial({ color: 0x22c55e, transparent: true, opacity: 0.3, side: THREE.DoubleSide }));
  botMesh.rotation.x = -Math.PI / 2;
  _expandGroup.add(botMesh);

  function animateUnfold() {
    t++;
    var p = Math.min(t / steps, 1);
    var ease = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;

    sideMesh.position.y = (height / 2) * (1 - ease) + 0.02 * ease;
    sideMesh.position.z = -5 * ease;

    topMesh.position.y = (height + 0.5) * (1 - ease) + 0.02 * ease;
    topMesh.position.z = (-circumference / 2 - radius - 0.5) * ease;

    botMesh.position.y = -0.5 * (1 - ease) + 0.02 * ease;
    botMesh.position.z = (circumference / 2 + radius + 0.5) * ease;

    if (p < 1) {
      _animId = requestAnimationFrame(animateUnfold);
    } else {
      _animId = null;
    }
  }
  animateUnfold();
}

function setMode(m) {
  _mode = m;
  ['solid', 'wire', 'expand'].forEach(function (k) {
    document.getElementById('mb-' + k).classList.toggle('active', k === m);
  });
  rebuild();
}

function resetAll() {
  if (_animId) { cancelAnimationFrame(_animId); _animId = null; }
  document.getElementById('sr').value = 2;
  document.getElementById('sh').value = 4;
  _mode = 'solid';
  ['solid', 'wire', 'expand'].forEach(function (k) {
    document.getElementById('mb-' + k).classList.toggle('active', k === 'solid');
  });
  rebuild();
}

init();
</script>
</body>
</html>
