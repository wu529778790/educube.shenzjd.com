<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>圆柱的认识 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 260px; height: 100%; }
    .canvas-area { padding: 16px; overflow: hidden; background: linear-gradient(135deg, #faf5ff 0%, #fdfaf4 100%); position: relative; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 14px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #e9d5ff; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .slider-row { display: flex; align-items: center; gap: 10px; }
    .slider-row input { flex: 1; }
    .slider-row .value-display { min-width: 40px; }
    .prop-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #fff; border-radius: 8px; border: 1px solid #e2e8f0; }
    .prop-label { font-size: 13px; color: #64748b; }
    .prop-value { font-size: 14px; font-weight: 700; color: #1e293b; font-family: 'Courier New', monospace; }
    .tab-bar { display: flex; gap: 6px; margin-bottom: 8px; }
    .tab-btn { padding: 5px 12px; border-radius: 8px; border: 1.5px solid #e2e8f0; background: #fff; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; }
    .tab-btn.active { background: #8b5cf6; color: #fff; border-color: #8b5cf6; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">🥫 圆柱的认识</div>
      <div class="edu-toolbar-subtitle">下册 · 第三单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-outline" onclick="toggleUnfold()">展开图</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="canvas" style="width:100%;height:100%"></canvas>
      </div>

      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">底面半径 r</div>
          <div class="slider-row">
            <input type="range" id="rSlider" min="20" max="100" value="50" oninput="update()"/>
            <span class="value-display" id="rVal">50</span>
          </div>
        </div>
        <div class="ctrl-section">
          <div class="ctrl-label">高 h</div>
          <div class="slider-row">
            <input type="range" id="hSlider" min="30" max="200" value="100" oninput="update()"/>
            <span class="value-display" id="hVal">100</span>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">属性</div>
          <div class="prop-row"><span class="prop-label">半径 r</span><span class="prop-value" id="pR">50</span></div>
          <div class="prop-row"><span class="prop-label">直径 d</span><span class="prop-value" id="pD">100</span></div>
          <div class="prop-row"><span class="prop-label">高 h</span><span class="prop-value" id="pH">100</span></div>
          <div class="prop-row"><span class="prop-label">底面周长 C=2πr</span><span class="prop-value" id="pC">314.2</span></div>
          <div class="prop-row"><span class="prop-label">侧面积 S侧=2πrh</span><span class="prop-value" id="pSL">31415.9</span></div>
          <div class="prop-row"><span class="prop-label">底面积 S底=πr²</span><span class="prop-value" id="pSB">7854.0</span></div>
          <div class="prop-row"><span class="prop-label">表面积 S=2πr(r+h)</span><span class="prop-value" id="pS">47123.9</span></div>
          <div class="prop-row"><span class="prop-label">体积 V=πr²h</span><span class="prop-value" id="pV">785398.2</span></div>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <b>圆柱知识</b><br/>
          ● 上下底面是完全相同的圆<br/>
          ● 侧面展开是长方形（长=底面周长）<br/>
          ● 侧面积 = 底面周长 × 高<br/>
          ● 表面积 = 2×底面积 + 侧面积<br/>
          ● 体积 = 底面积 × 高
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../edu-lib/edu-tools.js"></script>
<script>
const canvas = document.getElementById('canvas');
let R = 50, H = 100;
let showUnfold = false;
let rotAngle = 0;

function update() {
  R = parseInt(document.getElementById('rSlider').value);
  H = parseInt(document.getElementById('hSlider').value);
  document.getElementById('rVal').textContent = R;
  document.getElementById('hVal').textContent = H;
  document.getElementById('pR').textContent = R;
  document.getElementById('pD').textContent = R * 2;
  document.getElementById('pH').textContent = H;
  document.getElementById('pC').textContent = (2 * Math.PI * R).toFixed(1);
  document.getElementById('pSL').textContent = (2 * Math.PI * R * H).toFixed(1);
  document.getElementById('pSB').textContent = (Math.PI * R * R).toFixed(1);
  document.getElementById('pS').textContent = (2 * Math.PI * R * (R + H)).toFixed(1);
  document.getElementById('pV').textContent = (Math.PI * R * R * H).toFixed(1);
  render();
}

function toggleUnfold() { showUnfold = !showUnfold; render(); }

function render() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const w = rect.width, h = rect.height;
  const ctx = canvas.getContext('2d');
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);

  if (showUnfold) {
    drawUnfold(ctx, w, h);
  } else {
    drawCylinder(ctx, w, h);
  }

  ctx.restore();
}

function drawCylinder(ctx, w, h) {
  const cx = w * 0.45;
  const cy = h * 0.5;
  const r = R;
  const h_ = H;
  const ellipseH = r * 0.35; // 椭圆扁率

  // 圆柱体身
  const grad = ctx.createLinearGradient(cx - r, 0, cx + r, 0);
  grad.addColorStop(0, 'rgba(139,92,246,0.15)');
  grad.addColorStop(0.5, 'rgba(139,92,246,0.3)');
  grad.addColorStop(1, 'rgba(139,92,246,0.1)');

  ctx.beginPath();
  ctx.moveTo(cx - r, cy - h_ / 2);
  ctx.lineTo(cx - r, cy + h_ / 2);
  ctx.ellipse(cx, cy + h_ / 2, r, ellipseH, 0, Math.PI, 0, true);
  ctx.lineTo(cx + r, cy - h_ / 2);
  ctx.ellipse(cx, cy - h_ / 2, r, ellipseH, 0, 0, Math.PI, true);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#8b5cf6';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 底部椭圆
  ctx.beginPath();
  ctx.ellipse(cx, cy + h_ / 2, r, ellipseH, 0, 0, Math.PI * 2);
  ctx.strokeStyle = '#8b5cf6';
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 4]);
  ctx.stroke();
  ctx.setLineDash([]);

  // 顶部椭圆
  ctx.beginPath();
  ctx.ellipse(cx, cy - h_ / 2, r, ellipseH, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(139,92,246,0.15)';
  ctx.fill();
  ctx.strokeStyle = '#8b5cf6';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 高标注
  ctx.beginPath();
  ctx.moveTo(cx + r + 20, cy - h_ / 2);
  ctx.lineTo(cx + r + 20, cy + h_ / 2);
  ctx.strokeStyle = '#ef4444';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = '#ef4444';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('h=' + h_, cx + r + 26, cy + 4);

  // 半径标注
  ctx.beginPath();
  ctx.moveTo(cx, cy - h_ / 2);
  ctx.lineTo(cx + r, cy - h_ / 2);
  ctx.strokeStyle = '#22c55e';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = '#22c55e';
  ctx.textAlign = 'center';
  ctx.fillText('r=' + R, cx + r / 2, cy - h_ / 2 - 8);

  // 中心点
  ctx.beginPath();
  ctx.arc(cx, cy - h_ / 2, 3, 0, Math.PI * 2);
  ctx.fillStyle = '#8b5cf6';
  ctx.fill();
}

function drawUnfold(ctx, w, h) {
  const scale = Math.min((w - 80) / (2 * Math.PI * R + 2 * R), (h - 80) / (H + 2 * R));
  const rectW = 2 * Math.PI * R * Math.min(scale, 1.5);
  const rectH = H * Math.min(scale, 1.5);
  const circleD = 2 * R * Math.min(scale, 1.5);
  const ox = w / 2 - rectW / 2;
  const oy = h / 2 - rectH / 2;

  // 侧面展开（长方形）
  ctx.strokeStyle = '#8b5cf6';
  ctx.lineWidth = 2;
  ctx.fillStyle = 'rgba(139,92,246,0.08)';
  ctx.fillRect(ox, oy, rectW, rectH);
  ctx.strokeRect(ox, oy, rectW, rectH);

  ctx.fillStyle = '#8b5cf6';
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('侧面展开（长方形）', ox + rectW / 2, oy - 10);
  ctx.font = '12px sans-serif';
  ctx.fillStyle = '#64748b';
  ctx.fillText('长 = 2πr = ' + (2 * Math.PI * R).toFixed(1), ox + rectW / 2, oy + rectH + 16);
  ctx.fillText('宽 = h = ' + H, ox - 30, oy + rectH / 2);

  // 顶部圆
  ctx.beginPath();
  ctx.arc(ox + rectW / 2, oy - circleD / 2 - 20, circleD / 2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(14,165,233,0.15)';
  ctx.fill();
  ctx.strokeStyle = '#0ea5e9';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#0ea5e9';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('上底面', ox + rectW / 2, oy - circleD / 2 - 20 + 4);

  // 底部圆
  ctx.beginPath();
  ctx.arc(ox + rectW / 2, oy + rectH + circleD / 2 + 20, circleD / 2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(34,197,94,0.15)';
  ctx.fill();
  ctx.strokeStyle = '#22c55e';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#22c55e';
  ctx.fillText('下底面', ox + rectW / 2, oy + rectH + circleD / 2 + 20 + 4);
}

function resetAll() {
  R = 50; H = 100;
  document.getElementById('rSlider').value = 50;
  document.getElementById('hSlider').value = 100;
  showUnfold = false;
  update();
}

window.addEventListener('resize', () => { render(); });
update();
</script>
</body>
</html>
