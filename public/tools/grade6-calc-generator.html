<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>六年级计算练习生成 — 教立方</title>
  <!-- play-ref:jiaohukejian:039FV1M | 自研 -->
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .edu-content { padding: 16px; overflow: auto; max-width: 28rem; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
    .card { background: var(--edu-surface); border: 1px solid var(--edu-border); border-radius: var(--edu-radius); padding: 20px; box-shadow: var(--edu-shadow); font-size: 18px; font-weight: 700; text-align: center; min-height: 3em; display: flex; align-items: center; justify-content: center; }
    .sol { font-size: 15px; color: var(--edu-success); font-weight: 700; display: none; text-align: center; }
    .sol.show { display: block; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div class="edu-toolbar-lead">
      <span class="edu-toolbar-title">📄 六年级计算练习生成</span>
      <span class="edu-toolbar-subtitle">分数加减 · 换题稳定</span>
    </div>
  </div>
  <div class="edu-content">
    <div class="card" id="q"></div>
    <div class="sol" id="sol"></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      <button type="button" class="edu-btn edu-btn-primary" id="new">换一批</button>
      <button type="button" class="edu-btn edu-btn-outline" id="show">看答案</button>
    </div>
    <p style="font-size:12px;color:var(--edu-text-muted);text-align:center">打印：Ctrl+P 或系统分享为 PDF。</p>
  </div>
</div>
<script>
(function () {
  function gcd(a, b) { return b ? gcd(b, a % b) : a; }
  function simp(n, d) {
    const g = gcd(Math.abs(n), d);
    return [n / g, d / g];
  }
  function fracStr(n, d) {
    const s = simp(n, d);
    if (s[1] === 1) return String(s[0]);
    return s[0] + "/" + s[1];
  }
  function gen() {
    const a = 1 + Math.floor(Math.random() * 8), b = 2 + Math.floor(Math.random() * 7);
    const c = 1 + Math.floor(Math.random() * 8), e = 2 + Math.floor(Math.random() * 7);
    const ansN = a * e + c * b, ansD = b * e;
    const q = fracStr(a, b) + " + " + fracStr(c, e) + " = ?";
    return { q: q, a: fracStr(ansN, ansD) };
  }
  let cur = gen();
  function show() {
    document.getElementById("q").textContent = cur.q;
    document.getElementById("sol").textContent = "答案：" + cur.a;
    document.getElementById("sol").classList.remove("show");
  }
  document.getElementById("new").addEventListener("click", function () { cur = gen(); show(); });
  document.getElementById("show").addEventListener("click", function () { document.getElementById("sol").classList.add("show"); });
  show();
})();
</script>
</body>
</html>
