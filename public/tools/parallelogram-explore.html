<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>平行四边形与梯形探究</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
  .main-layout {
    display: grid;
    grid-template-columns: 1fr 260px;
    height: 100%;
  }
  .canvas-area { position: relative; background: #fff; overflow: hidden; }
  .control-panel {
    background: #fdfaf4;
    border-left: 1px solid #e2e8f0;
    padding: 16px;
    display: flex; flex-direction: column; gap: 14px; overflow: auto;
  }
  .ctrl-section { display: flex; flex-direction: column; gap: 8px; }
  .ctrl-label {
    font-size: 11px; font-weight: 700; color: #64748b;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .divider { height: 1px; background: #e2e8f0; }
  .shape-btn {
    padding: 7px 10px; border-radius: 8px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1.5px solid #e2e8f0; background: #fff; color: #64748b;
    text-align: center; transition: all 0.15s; font-family: var(--edu-font);
  }
  .shape-btn:hover:not(.active) { border-color: #f97316; }
  .shape-btn.active { background: #f97316; color: #fff; border-color: #f97316; }
  .info-box {
    background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
    padding: 10px 12px; font-size: 12px; color: #64748b; line-height: 1.8;
  }
  .info-box strong { color: #f97316; }
  .hint-text { font-size: 11px; color: #94a3b8; }
</style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="edu-toolbar-title">🔷 平行四边形与梯形探究</span>
      <span class="edu-toolbar-subtitle">上册·平行四边形和梯形</span>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-outline" onclick="resetShape()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="main-canvas" class="edu-canvas-full"></canvas>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">选择图形</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
            <button class="shape-btn active" id="sb-para" onclick="setShapeType('parallelogram')">平行四边形</button>
            <button class="shape-btn" id="sb-trap" onclick="setShapeType('trapezoid')">梯形</button>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">图形属性</div>
          <div class="info-box" id="props-box">
            <div>类型：<strong id="shape-type-name">平行四边形</strong></div>
            <div>对边平行：<strong id="parallel-info">是</strong></div>
            <div>底：<strong id="base-val">—</strong></div>
            <div>高：<strong id="height-val">—</strong></div>
            <div>内角：<strong id="angle-info">—</strong></div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">知识卡片</div>
          <div class="info-box" style="font-size:11px;line-height:1.7;">
            <strong>平行四边形</strong>：两组对边分别平行的四边形。对边相等，对角相等。<br/>
            <strong>梯形</strong>：只有一组对边平行的四边形。平行的两边叫底，不平行的两边叫腰。<br/>
            <strong>特殊梯形</strong>：两腰相等的梯形叫等腰梯形；有一条腰垂直于底的梯形叫直角梯形。
          </div>
        </div>
        <div class="divider"></div>
        <div class="hint-text">拖拽顶点来变形图形，观察属性变化。</div>
      </div>
    </div>
  </div>
</div>
<script src="../edu-lib/edu-tools.js"></script>
<script>
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
let W, H;
let shapeType = 'parallelogram';
let draggingIdx = -1;

// vertices: [A, B, C, D] clockwise from bottom-left
let pts = [];

function initParallelogram() {
  const cx = W * 0.4, cy = H * 0.5;
  const bw = 200, bh = 120, skew = 80;
  pts = [
    { x: cx - bw / 2 + skew / 2, y: cy + bh / 2 },
    { x: cx + bw / 2 + skew / 2, y: cy + bh / 2 },
    { x: cx + bw / 2 - skew / 2, y: cy - bh / 2 },
    { x: cx - bw / 2 - skew / 2, y: cy - bh / 2 }
  ];
}

function initTrapezoid() {
  const cx = W * 0.4, cy = H * 0.5;
  pts = [
    { x: cx - 140, y: cy + 70 },
    { x: cx + 140, y: cy + 70 },
    { x: cx + 80, y: cy - 70 },
    { x: cx - 80, y: cy - 70 }
  ];
}

function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function angleAt(i) {
  const a = pts[(i + 3) % 4], b = pts[i], c = pts[(i + 1) % 4];
  const v1 = { x: a.x - b.x, y: a.y - b.y };
  const v2 = { x: c.x - b.x, y: c.y - b.y };
  const dot = v1.x * v2.x + v1.y * v2.y;
  const cross = v1.x * v2.y - v1.y * v2.x;
  return Math.abs(Math.atan2(cross, dot)) * 180 / Math.PI;
}

function slopesParallel(p1, p2, p3, p4) {
  const dx1 = p2.x - p1.x, dy1 = p2.y - p1.y;
  const dx2 = p4.x - p3.x, dy2 = p4.y - p3.y;
  return Math.abs(dx1 * dy2 - dy1 * dx2) < 2;
}

function pointToLineDist(p, a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const len = Math.hypot(dx, dy);
  if (len < 0.01) return 0;
  return Math.abs(dy * p.x - dx * p.y + b.x * a.y - b.y * a.x) / len;
}

function updateProps() {
  const ab = slopesParallel(pts[0], pts[1], pts[3], pts[2]); // AB || DC
  const ad = slopesParallel(pts[0], pts[3], pts[1], pts[2]); // AD || BC

  const base = dist(pts[0], pts[1]);
  const height = pointToLineDist(pts[3], pts[0], pts[1]);
  const angles = [angleAt(0), angleAt(1), angleAt(2), angleAt(3)];

  document.getElementById('base-val').textContent = fmt(base, 1) + ' px';
  document.getElementById('height-val').textContent = fmt(height, 1) + ' px';
  document.getElementById('angle-info').textContent = angles.map((a, i) => String.fromCharCode(65 + i) + '=' + fmt(a, 1) + '°').join('  ');

  if (ab && ad) {
    document.getElementById('shape-type-name').textContent = '平行四边形';
    document.getElementById('parallel-info').textContent = '两组对边都平行';
  } else if (ab || ad) {
    document.getElementById('shape-type-name').textContent = '梯形';
    const parallel = ab ? 'AB∥DC' : 'AD∥BC';
    document.getElementById('parallel-info').textContent = '只有一组对边平行（' + parallel + '）';
  } else {
    document.getElementById('shape-type-name').textContent = '一般四边形';
    document.getElementById('parallel-info').textContent = '没有对边平行';
  }
}

function render() {
  const dpr = window.devicePixelRatio || 1;
  W = canvas.clientWidth; H = canvas.clientHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  drawGrid(ctx, W, H, 40, '#e2e8f020');

  const ab = slopesParallel(pts[0], pts[1], pts[3], pts[2]);
  const ad = slopesParallel(pts[0], pts[3], pts[1], pts[2]);

  // fill
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < 4; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.closePath();
  ctx.fillStyle = '#f9731615';
  ctx.fill();

  // edges - color parallel pairs
  const pairs = [[0, 1, '#ef4444'], [1, 2, '#3b82f6'], [2, 3, '#ef4444'], [3, 0, '#3b82f6']];
  pairs.forEach(([a, b, color]) => {
    ctx.beginPath();
    ctx.moveTo(pts[a].x, pts[a].y);
    ctx.lineTo(pts[b].x, pts[b].y);
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.stroke();
  });

  // height dashed line
  const baseP1 = pts[0], baseP2 = pts[1];
  const dx = baseP2.x - baseP1.x, dy = baseP2.y - baseP1.y;
  const len = Math.hypot(dx, dy);
  if (len > 1) {
    const nx = -dy / len, ny = dx / len;
    // project pts[3] onto base line
    const t = ((pts[3].x - baseP1.x) * dx + (pts[3].y - baseP1.y) * dy) / (len * len);
    const footX = baseP1.x + t * dx;
    const footY = baseP1.y + t * dy;
    ctx.beginPath();
    ctx.moveTo(pts[3].x, pts[3].y);
    ctx.lineTo(footX, footY);
    ctx.strokeStyle = '#22c55e';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.stroke();
    ctx.setLineDash([]);

    // right angle mark
    const h = Math.hypot(pts[3].x - footX, pts[3].y - footY);
    if (h > 10) {
      const sz = 12;
      const hx = (pts[3].x - footX) / h * sz;
      const hy = (pts[3].y - footY) / h * sz;
      const bx = dx / len * sz;
      const by = dy / len * sz;
      ctx.beginPath();
      ctx.moveTo(footX + hx, footY + hy);
      ctx.lineTo(footX + hx + bx, footY + hy + by);
      ctx.lineTo(footX + bx, footY + by);
      ctx.strokeStyle = '#22c55e';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // "高" label
    ctx.font = 'bold 12px ' + getComputedStyle(document.body).fontFamily;
    ctx.fillStyle = '#22c55e';
    ctx.textAlign = 'center';
    const lx = (pts[3].x + footX) / 2 + 16;
    const ly = (pts[3].y + footY) / 2;
    ctx.fillText('高', lx, ly);
  }

  // "底" label
  const bmx = (pts[0].x + pts[1].x) / 2;
  const bmy = (pts[0].y + pts[1].y) / 2;
  ctx.font = 'bold 12px ' + getComputedStyle(document.body).fontFamily;
  ctx.fillStyle = '#ef4444';
  ctx.textAlign = 'center';
  ctx.fillText('底', bmx, bmy + 20);

  // vertex dots and labels
  const labels = ['A', 'B', 'C', 'D'];
  pts.forEach((p, i) => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.strokeStyle = '#f97316';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    ctx.font = 'bold 14px ' + getComputedStyle(document.body).fontFamily;
    ctx.fillStyle = '#1e293b';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const ox = i === 0 || i === 3 ? -16 : 16;
    const oy = i < 2 ? 18 : -14;
    ctx.fillText(labels[i], p.x + ox, p.y + oy);
  });

  updateProps();
}

// drag
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX - rect.left, y: t.clientY - rect.top };
}

canvas.addEventListener('mousedown', e => {
  const p = getPos(e);
  for (let i = 0; i < 4; i++) {
    if (Math.hypot(p.x - pts[i].x, p.y - pts[i].y) < 16) { draggingIdx = i; return; }
  }
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const p = getPos(e);
  for (let i = 0; i < 4; i++) {
    if (Math.hypot(p.x - pts[i].x, p.y - pts[i].y) < 20) { draggingIdx = i; return; }
  }
}, { passive: false });

function onMove(e) {
  if (draggingIdx < 0) return;
  e.preventDefault();
  const p = getPos(e);
  pts[draggingIdx].x = p.x;
  pts[draggingIdx].y = p.y;
  render();
}
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('touchmove', onMove, { passive: false });
document.addEventListener('mouseup', () => { draggingIdx = -1; });
document.addEventListener('touchend', () => { draggingIdx = -1; });

function setShapeType(t) {
  shapeType = t;
  document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(t === 'parallelogram' ? 'sb-para' : 'sb-trap').classList.add('active');
  if (t === 'parallelogram') initParallelogram();
  else initTrapezoid();
  render();
}

function resetShape() {
  if (shapeType === 'parallelogram') initParallelogram();
  else initTrapezoid();
  render();
}

window.addEventListener('resize', render);
setTimeout(() => { W = canvas.clientWidth; H = canvas.clientHeight; initParallelogram(); render(); }, 50);
</script>
</body>
</html>
