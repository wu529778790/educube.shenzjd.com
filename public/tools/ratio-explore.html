<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>比的认识 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 260px; height: 100%; }
    .canvas-area { padding: 24px; overflow-y: auto; background: linear-gradient(135deg, #f0fdf4 0%, #fdfaf4 100%); display: flex; flex-direction: column; align-items: center; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 14px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #bbf7d0; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .preset-btn { padding: 8px 0; border-radius: 8px; font-size: 14px; font-weight: 700; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; }
    .preset-btn:hover { border-color: #22c55e; color: #22c55e; }
    .ratio-display { background: #fff; border: 2px solid #22c55e; border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 16px; width: 100%; max-width: 400px; }
    .ratio-big { font-size: 36px; font-weight: 800; font-family: 'Courier New', monospace; color: #1e293b; }
    .ratio-big .colon { color: #22c55e; margin: 0 8px; }
    .ratio-result { font-size: 16px; font-weight: 600; color: #64748b; margin-top: 8px; }
    .bar-visual { display: flex; height: 40px; border-radius: 8px; overflow: hidden; margin: 16px 0; width: 100%; max-width: 400px; }
    .bar-a { background: #22c55e; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 14px; transition: flex .3s; }
    .bar-b { background: #0ea5e9; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 14px; transition: flex .3s; }
    .input-row { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
    .input-row input { width: 80px; text-align: center; font-size: 20px; font-weight: 700; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 8px; font-family: 'Courier New', monospace; }
    .input-row span { font-size: 24px; font-weight: 800; color: #22c55e; }
    .simplify-step { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; padding: 12px 16px; margin-top: 12px; font-size: 14px; line-height: 2; width: 100%; max-width: 400px; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">⚖ 比的认识</div>
      <div class="edu-toolbar-subtitle">上册 · 第四单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-primary" onclick="calculate()">化简</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <!-- 输入 -->
        <div class="input-row">
          <input type="number" id="valA" value="12" min="0" max="999" onchange="calculate()"/>
          <span>:</span>
          <input type="number" id="valB" value="8" min="0" max="999" onchange="calculate()"/>
        </div>

        <!-- 比值展示 -->
        <div class="ratio-display">
          <div class="ratio-big" id="ratioDisplay">12<span class="colon">:</span>8</div>
          <div class="ratio-result" id="ratioResult">比值 = 1.5</div>
        </div>

        <!-- 条形可视化 -->
        <div class="bar-visual" id="barVisual">
          <div class="bar-a" id="barA">12</div>
          <div class="bar-b" id="barB">8</div>
        </div>

        <!-- 化简步骤 -->
        <div class="simplify-step" id="simplifyStep">点击"化简"查看过程</div>
      </div>

      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">预设例子</div>
          <button class="preset-btn" onclick="load(12,8)">12 : 8</button>
          <button class="preset-btn" onclick="load(15,25)">15 : 25</button>
          <button class="preset-btn" onclick="load(100,75)">100 : 75</button>
          <button class="preset-btn" onclick="load(6,0)">6 : 0（比的后项）</button>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">比与分数、除法的关系</div>
          <div class="info-box" id="relationBox">
            前项 ÷ 后项 = 比值<br/>
            12 ÷ 8 = 1.5
          </div>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <b>比的知识</b><br/>
          ● 两个数相除又叫两个数的比<br/>
          ● 比的前项÷后项=比值<br/>
          ● 比的前项和后项同时乘或除以相同的数（0除外），比值不变<br/>
          ● 化简比：找前项和后项的最大公因数
        </div>
      </div>
    </div>
  </div>
</div>
<script>
function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while (b) { [a, b] = [b, a % b]; } return a; }

function load(a, b) {
  document.getElementById('valA').value = a;
  document.getElementById('valB').value = b;
  calculate();
}

function calculate() {
  const a = parseInt(document.getElementById('valA').value) || 0;
  const b = parseInt(document.getElementById('valB').value) || 0;

  // 比值
  document.getElementById('ratioDisplay').innerHTML =
    `${a}<span class="colon">:</span>${b}`;

  const ratioVal = b === 0 ? '—' : (a / b);
  document.getElementById('ratioResult').textContent =
    b === 0 ? '后项不能为0' : `比值 = ${Number.isInteger(ratioVal) ? ratioVal : ratioVal.toFixed(4).replace(/0+$/, '').replace(/\.$/, '')}`;

  // 条形
  const total = a + b;
  if (total > 0) {
    document.getElementById('barA').style.flex = a;
    document.getElementById('barB').style.flex = b;
    document.getElementById('barA').textContent = a;
    document.getElementById('barB').textContent = b;
  }

  // 关系
  const relBox = document.getElementById('relationBox');
  if (b === 0) {
    relBox.innerHTML = '比的后项不能为0';
  } else {
    const fracG = gcd(a, b);
    const sa = fracG ? a / fracG : a;
    const sb = fracG ? b / fracG : b;
    relBox.innerHTML =
      `前项 ÷ 后项 = 比值<br/>${a} ÷ ${b} = ${Number.isInteger(a/b) ? a/b : (a/b).toFixed(2)}<br/><br/>` +
      `比 → 分数：${a}/${b} = ${sa}/${sb}<br/>` +
      `比 → 除法：${a} ÷ ${b}`;
  }

  // 化简步骤
  const stepEl = document.getElementById('simplifyStep');
  if (b === 0) {
    stepEl.innerHTML = '<span style="color:#ef4444">错误：比的后项不能为0！</span>';
    return;
  }
  if (a === 0) {
    stepEl.innerHTML = `<b>化简</b><br/>0 : ${b}<br/>最简比 = 0 : 1`;
    return;
  }
  const g = gcd(a, b);
  const sa = a / g;
  const sb = b / g;
  let steps = `<b>化简比 ${a}:${b}</b><br/>`;
  steps += `① 找最大公因数：gcd(${a}, ${b}) = ${g}<br/>`;
  steps += `② 前项÷${g} = ${a}÷${g} = ${sa}<br/>`;
  steps += `③ 后项÷${g} = ${b}÷${g} = ${sb}<br/>`;
  steps += `④ 最简比 = <span style="color:#22c55e;font-weight:700">${sa} : ${sb}</span>`;
  stepEl.innerHTML = steps;
}

function resetAll() {
  document.getElementById('valA').value = 12;
  document.getElementById('valB').value = 8;
  calculate();
}

calculate();
</script>
</body>
</html>
