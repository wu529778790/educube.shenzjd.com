<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>百分数的认识 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 260px; height: 100%; }
    .canvas-area { padding: 24px; overflow-y: auto; background: linear-gradient(135deg, #fff7ed 0%, #fdfaf4 100%); display: flex; flex-direction: column; align-items: center; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 14px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #fed7aa; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .preset-btn { padding: 8px 0; border-radius: 8px; font-size: 14px; font-weight: 700; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; }
    .preset-btn:hover { border-color: #f97316; color: #f97316; }
    .converter { background: #fff; border: 2px solid #f97316; border-radius: 12px; padding: 20px; width: 100%; max-width: 500px; margin-bottom: 16px; }
    .converter-row { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
    .converter-row label { font-size: 14px; font-weight: 700; min-width: 60px; color: #334155; }
    .converter-row input { width: 100px; text-align: center; font-size: 20px; font-weight: 700; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 8px; font-family: 'Courier New', monospace; }
    .converter-row .result { font-size: 20px; font-weight: 700; color: #f97316; min-width: 100px; text-align: center; }
    .bar-compare { width: 100%; max-width: 500px; margin: 16px 0; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
    .bar-row .label { font-size: 14px; font-weight: 600; min-width: 80px; text-align: right; }
    .bar-track { flex: 1; height: 32px; background: #f1f5f9; border-radius: 16px; overflow: hidden; position: relative; }
    .bar-fill { height: 100%; border-radius: 16px; transition: width .3s; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; font-size: 12px; font-weight: 700; color: #fff; }
    .bar-fill.pct { background: #f97316; }
    .bar-fill.frac { background: #3b82f6; }
    .bar-fill.dec { background: #22c55e; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">💯 百分数的认识</div>
      <div class="edu-toolbar-subtitle">上册 · 第六单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-primary" onclick="convert()">转换</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <!-- 转换器 -->
        <div class="converter">
          <div style="text-align:center;font-size:16px;font-weight:700;color:#334155;margin-bottom:12px">百分数 ↔ 分数 ↔ 小数 互转</div>
          <div class="converter-row">
            <label>百分数</label>
            <input type="number" id="pctInput" value="75" step="1" onchange="fromPercent()"/>
            <span style="font-size:20px;font-weight:700">%</span>
          </div>
          <div class="converter-row">
            <label>分数</label>
            <span class="result" id="fracResult">3/4</span>
          </div>
          <div class="converter-row">
            <label>小数</label>
            <span class="result" id="decResult">0.75</span>
          </div>
        </div>

        <!-- 条形对比 -->
        <div class="bar-compare" id="barCompare">
          <div style="text-align:center;font-size:14px;font-weight:700;color:#334155;margin-bottom:8px">可视化对比</div>
        </div>
      </div>

      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">预设值</div>
          <button class="preset-btn" onclick="setPct(25)">25%</button>
          <button class="preset-btn" onclick="setPct(50)">50%</button>
          <button class="preset-btn" onclick="setPct(75)">75%</button>
          <button class="preset-btn" onclick="setPct(33)">33%</button>
          <button class="preset-btn" onclick="setPct(12)">12%</button>
          <button class="preset-btn" onclick="setPct(120)">120%（超100%）</button>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">常见百分数对照</div>
          <div class="info-box" id="tableBox"></div>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <b>百分数知识</b><br/>
          ● 百分数表示一个数是另一个数的百分之几<br/>
          ● 百分数也叫百分率或百分比<br/>
          ● 百分数不能带单位<br/>
          ● 百分数可以大于100%<br/>
          ● 百分数 → 小数：去掉%号，小数点左移两位<br/>
          ● 百分数 → 分数：写成分母为100的分数再化简
        </div>
      </div>
    </div>
  </div>
</div>
<script>
function gcd(a, b) { a = Math.abs(Math.round(a)); b = Math.abs(Math.round(b)); while (b) { [a, b] = [b, a % b]; } return a; }

function setPct(v) {
  document.getElementById('pctInput').value = v;
  fromPercent();
}

function fromPercent() {
  const pct = parseFloat(document.getElementById('pctInput').value) || 0;
  const dec = pct / 100;

  document.getElementById('decResult').textContent = dec;

  // 分数化简
  const num = Math.round(pct * 100);
  const den = 10000;
  const g = gcd(num, den);
  const sn = num / g;
  const sd = den / g;

  // 简化显示
  let fracStr;
  if (sd === 1) {
    fracStr = sn.toString();
  } else {
    // 尝试更简单表示
    const g2 = gcd(Math.round(pct), 100);
    const fn = Math.round(pct) / g2;
    const fd = 100 / g2;
    fracStr = `${fn}/${fd}`;
  }
  document.getElementById('fracResult').textContent = fracStr;

  updateBars(pct);
}

function updateBars(pct) {
  const container = document.getElementById('barCompare');
  container.innerHTML = '<div style="text-align:center;font-size:14px;font-weight:700;color:#334155;margin-bottom:8px">可视化对比</div>';

  const barData = [
    { label: '百分数', value: pct, max: Math.max(pct, 100), cls: 'pct', display: pct + '%' },
    { label: '小数', value: pct / 100, max: 1, cls: 'dec', display: (pct / 100).toFixed(4) },
    { label: '分数', value: pct / 100, max: 1, cls: 'frac', display: document.getElementById('fracResult').textContent },
  ];

  barData.forEach(d => {
    const pctW = Math.min((d.value / d.max) * 100, 100);
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `<span class="label">${d.label}</span>
      <div class="bar-track"><div class="bar-fill ${d.cls}" style="width:${pctW}%">${d.display}</div></div>`;
    container.appendChild(row);
  });

  // 常见对照表
  const tableBox = document.getElementById('tableBox');
  const common = [
    [10, '10%', '1/10', '0.1'],
    [25, '25%', '1/4', '0.25'],
    [50, '50%', '1/2', '0.5'],
    [75, '75%', '3/4', '0.75'],
    [100, '100%', '1', '1'],
    [20, '20%', '1/5', '0.2'],
  ];
  let html = '';
  common.forEach(([v, p, f, d]) => {
    const active = Math.round(parseFloat(document.getElementById('pctInput').value)) === v;
    html += `<div style="display:flex;gap:8px;padding:2px 0;${active ? 'background:#fff7ed;border-radius:4px;font-weight:700;' : ''}">
      <span style="min-width:40px">${p}</span>
      <span style="min-width:40px">${f}</span>
      <span style="min-width:50px">${d}</span>
    </div>`;
  });
  tableBox.innerHTML = html;
}

function convert() { fromPercent(); }

function resetAll() {
  document.getElementById('pctInput').value = 75;
  fromPercent();
}

fromPercent();
</script>
</body>
</html>
