<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>因式分解 — 教立方</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
*{box-sizing:border-box}body{font-family:var(--edu-font);margin:0}
.tool{width:100vw;height:100vh;display:flex;flex-direction:column;background:var(--edu-bg)}
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#fff;border-bottom:1px solid var(--edu-border)}
.toolbar h1{font-size:15px;color:var(--edu-primary);margin:0}
.toolbar span{font-size:11px;color:var(--edu-text-muted);background:#f1f5f9;padding:2px 8px;border-radius:12px}
.main{flex:1;display:grid;grid-template-columns:1fr 290px;overflow:hidden}
.canvas-wrap{position:relative;overflow:hidden;background:linear-gradient(135deg,#ecfdf5,#f0fdf4)}
.canvas-wrap canvas{width:100%;height:100%;display:block}
.panel{background:#fff;border-left:1px solid var(--edu-border);padding:12px;display:flex;flex-direction:column;gap:8px;overflow:auto}
.section{display:flex;flex-direction:column;gap:4px}
.label{font-size:10px;font-weight:700;color:#64748b;letter-spacing:.05em}
.divider{height:1px;background:var(--edu-border)}
.btn{padding:6px 12px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--edu-font);transition:all .15s}
.btn.active{background:var(--edu-primary);color:#fff}
.btn-default{background:#f1f5f9;color:#334155}
.btn-default:hover{background:#e2e8f0}
.row{display:flex;gap:4px;flex-wrap:wrap}

.expr-box{text-align:center;padding:10px;background:#f0fdf4;border:2px solid #86efac;border-radius:12px}
.expr-box .expr{font-size:20px;font-weight:800;color:#166534;font-family:monospace}
.expr-box .result{font-size:14px;font-weight:700;color:#16a34a;margin-top:4px}

.step-list{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:8px;font-size:11px;line-height:2.2;max-height:180px;overflow:auto}
.step-list .step{color:#334155}
.step-list .highlight{color:#16a34a;font-weight:700}

.method-card{padding:8px;border:2px solid #e2e8f0;border-radius:10px;cursor:pointer;transition:all .15s;text-align:center}
.method-card:hover{border-color:#22c55e}
.method-card.active{border-color:#22c55e;background:#f0fdf4}
.method-card .title{font-size:13px;font-weight:800;color:#166534}
.method-card .desc{font-size:10px;color:#64748b;margin-top:2px}

.quiz-card{background:#f0fdf4;border:2px solid #86efac;border-radius:12px;padding:10px;text-align:center}
.quiz-q{font-size:13px;font-weight:700;color:#166534}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px}
.quiz-opt{padding:6px;border:2px solid #e2e8f0;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;font-family:var(--edu-font)}
.quiz-opt:hover{border-color:#22c55e}
.quiz-opt.correct{background:#dcfce7;border-color:#22c55e}
.quiz-opt.wrong{background:#fef2f2;border-color:#ef4444}
.quiz-result{font-size:11px;font-weight:700;margin-top:4px;min-height:16px}

.info{font-size:11px;line-height:1.8;color:#334155;background:#fff;border:1px solid #bbf7d0;border-radius:8px;padding:8px 10px}
.info b{color:#166534}
</style>
</head>
<body>
<div class="tool">
  <div class="toolbar"><h1>🧩 因式分解</h1><span>八年级上册 · 第十五章</span></div>
  <div class="main">
    <div class="canvas-wrap"><canvas id="cv"></canvas></div>
    <div class="panel">
      <div class="expr-box">
        <div class="expr" id="expr-display">x² - 4</div>
        <div class="result" id="expr-result">= (x+2)(x-2)</div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">选择方法</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">
          <div class="method-card active" id="mc-common" onclick="setMethod('common')"><div class="title">提公因式法</div><div class="desc">提取公共因式</div></div>
          <div class="method-card" id="mc-square" onclick="setMethod('square')"><div class="title">公式法</div><div class="desc">平方差/完全平方</div></div>
          <div class="method-card" id="mc-cross" onclick="setMethod('cross')"><div class="title">十字相乘法</div><div class="desc">x²+bx+c型</div></div>
          <div class="method-card" id="mc-group" onclick="setMethod('group')"><div class="title">分组分解法</div><div class="desc">四项分组</div></div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">选择例题</div>
        <div class="row" id="example-btns"></div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">解题步骤</div>
        <div class="step-list" id="steps">选择方法和例题开始</div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">因式分解测验</div>
        <div class="quiz-card" id="quiz-card"></div>
      </div>
      <div class="divider"></div>
      <div class="info">
        <b>因式分解方法</b><br/>
        ● <strong>提公因式法</strong>：ma+mb = m(a+b)<br/>
        ● <strong>平方差公式</strong>：a²-b² = (a+b)(a-b)<br/>
        ● <strong>完全平方公式</strong>：a²±2ab+b² = (a±b)²<br/>
        ● <strong>十字相乘法</strong>：x²+(p+q)x+pq = (x+p)(x+q)<br/>
        ● <strong>分组分解法</strong>：分组后分别提取
      </div>
    </div>
  </div>
</div>
<script>
var cv, ctx, _method = 'common', _exampleIdx = 0;

var _examples = {
  common: [
    { expr: '3x + 6', result: '3(x + 2)', steps: ['原式：3x + 6', '找公因式：3', '提取公因式：3(x + 2)', '验证：3×x + 3×2 = 3x + 6 ✓'] },
    { expr: '4x² - 8x', result: '4x(x - 2)', steps: ['原式：4x² - 8x', '找公因式：4x', '提取公因式：4x(x - 2)', '验证：4x×x - 4x×2 = 4x² - 8x ✓'] },
    { expr: '6a²b - 9ab²', result: '3ab(2a - 3b)', steps: ['原式：6a²b - 9ab²', '系数公因数：3', '字母公因式：ab', '提取：3ab(2a - 3b)', '验证：3ab×2a - 3ab×3b = 6a²b - 9ab² ✓'] },
    { expr: '2x(y-1) + 3(y-1)', result: '(y-1)(2x+3)', steps: ['原式：2x(y-1) + 3(y-1)', '公因式：(y-1)', '提取：(y-1)(2x + 3)', '验证：展开还原 ✓'] },
  ],
  square: [
    { expr: 'x² - 4', result: '(x+2)(x-2)', steps: ['原式：x² - 4', '识别：4 = 2²，平方差公式', 'a² - b² = (a+b)(a-b)', '∴ (x+2)(x-2)'] },
    { expr: 'x² - 9', result: '(x+3)(x-3)', steps: ['原式：x² - 9', '识别：9 = 3²，平方差公式', 'a² - b² = (a+b)(a-b)', '∴ (x+3)(x-3)'] },
    { expr: 'x² + 6x + 9', result: '(x+3)²', steps: ['原式：x² + 6x + 9', '识别：9=3², 6x=2·x·3', '完全平方公式：a²+2ab+b²=(a+b)²', '∴ (x+3)²'] },
    { expr: '4x² - 12x + 9', result: '(2x-3)²', steps: ['原式：4x² - 12x + 9', '识别：4x²=(2x)², 9=3², 12x=2·2x·3', '完全平方公式', '∴ (2x-3)²'] },
  ],
  cross: [
    { expr: 'x² + 5x + 6', result: '(x+2)(x+3)', steps: ['原式：x² + 5x + 6', '找两个数：p+q=5, p×q=6', 'p=2, q=3', '∴ (x+2)(x+3)'] },
    { expr: 'x² - 7x + 12', result: '(x-3)(x-4)', steps: ['原式：x² - 7x + 12', '找两个数：p+q=-7, p×q=12', 'p=-3, q=-4', '∴ (x-3)(x-4)'] },
    { expr: 'x² + x - 6', result: '(x+3)(x-2)', steps: ['原式：x² + x - 6', '找两个数：p+q=1, p×q=-6', 'p=3, q=-2', '∴ (x+3)(x-2)'] },
    { expr: 'x² - 5x + 6', result: '(x-2)(x-3)', steps: ['原式：x² - 5x + 6', '找两个数：p+q=-5, p×q=6', 'p=-2, q=-3', '∴ (x-2)(x-3)'] },
  ],
  group: [
    { expr: 'ax + ay + bx + by', result: '(a+b)(x+y)', steps: ['原式：ax+ay+bx+by', '分组：(ax+ay)+(bx+by)', '提取：a(x+y)+b(x+y)', '提取公因式：(a+b)(x+y)'] },
    { expr: 'x² - y² + 2x - 2y', result: '(x-y)(x+y+2)', steps: ['原式：x²-y²+2x-2y', '分组：(x²-y²)+(2x-2y)', '=(x+y)(x-y)+2(x-y)', '=(x-y)(x+y+2)'] },
    { expr: '2ax + 6ay - bx - 3by', result: '(2a-b)(x+3y)', steps: ['原式：2ax+6ay-bx-3by', '分组：(2ax+6ay)-(bx+3by)', '=2a(x+3y)-b(x+3y)', '=(2a-b)(x+3y)'] },
  ],
};

function init() {
  cv = document.getElementById('cv');
  ctx = cv.getContext('2d');
  window.addEventListener('resize', resize);
  resize();
  buildExampleBtns();
  loadExample(0);
  nextQuiz();
}

function resize() {
  var r = cv.parentElement.getBoundingClientRect();
  cv.width = r.width * devicePixelRatio;
  cv.height = r.height * devicePixelRatio;
  cv.style.width = r.width + 'px';
  cv.style.height = r.height + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  draw();
}

function setMethod(m) {
  _method = m; _exampleIdx = 0;
  ['common','square','cross','group'].forEach(function(k) {
    document.getElementById('mc-' + k).className = 'method-card' + (k === m ? ' active' : '');
  });
  buildExampleBtns();
  loadExample(0);
}

function buildExampleBtns() {
  var list = _examples[_method];
  var html = '';
  list.forEach(function(ex, i) {
    html += '<button class="btn btn-default' + (i === _exampleIdx ? ' active' : '') + '" onclick="loadExample(' + i + ')">' + ex.expr + '</button>';
  });
  document.getElementById('example-btns').innerHTML = html;
}

function loadExample(i) {
  _exampleIdx = i;
  var ex = _examples[_method][i];
  document.getElementById('expr-display').textContent = ex.expr;
  document.getElementById('expr-result').textContent = '= ' + ex.result;

  var html = '';
  ex.steps.forEach(function(s, j) {
    var isResult = j === ex.steps.length - 1;
    html += '<div class="step">' + (j + 1) + '. ' + (isResult ? '<span class="highlight">' + s + '</span>' : s) + '</div>';
  });
  document.getElementById('steps').innerHTML = html;
  buildExampleBtns();
  draw();
}

function draw() {
  var w = cv.width / devicePixelRatio, h = cv.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  var ex = _examples[_method][_exampleIdx];

  // Title
  ctx.fillStyle = '#166534';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('因式分解 — ' + getMethodLabel(), w / 2, 30);

  // Main expression card
  var cardW = Math.min(w * 0.7, 400);
  var cardH = 60;
  var cardX = (w - cardW) / 2, cardY = 50;
  ctx.fillStyle = '#f0fdf4';
  ctx.beginPath(); ctx.roundRect(cardX, cardY, cardW, cardH, 12); ctx.fill();
  ctx.strokeStyle = '#86efac'; ctx.lineWidth = 2; ctx.stroke();

  ctx.fillStyle = '#166534'; ctx.font = 'bold 24px monospace'; ctx.textAlign = 'center';
  ctx.fillText(ex.expr, w / 2, cardY + 28);
  ctx.fillStyle = '#16a34a'; ctx.font = 'bold 16px monospace';
  ctx.fillText('= ' + ex.result, w / 2, cardY + 50);

  // Visual decomposition
  var startY = cardY + cardH + 40;

  if (_method === 'common') {
    drawCommonMethod(w, h, startY, ex);
  } else if (_method === 'square') {
    drawSquareMethod(w, h, startY, ex);
  } else if (_method === 'cross') {
    drawCrossMethod(w, h, startY, ex);
  } else {
    drawGroupMethod(w, h, startY, ex);
  }
}

function getMethodLabel() {
  var labels = { common: '提公因式法', square: '公式法', cross: '十字相乘法', group: '分组分解法' };
  return labels[_method];
}

function drawCommonMethod(w, h, startY, ex) {
  // Show extraction visually
  ctx.fillStyle = '#64748b'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('提取公因式过程', w / 2, startY);

  // Arrow down
  ctx.fillStyle = '#22c55e'; ctx.font = 'bold 20px sans-serif';
  ctx.fillText('↓', w / 2, startY + 25);

  // Show factored parts
  ctx.font = 'bold 16px monospace';
  ctx.fillStyle = '#ef4444'; ctx.textAlign = 'right';
  ctx.fillText('公因式', w / 2 - 20, startY + 55);
  ctx.fillStyle = '#22c55e'; ctx.textAlign = 'left';
  ctx.fillText('剩余部分', w / 2 + 20, startY + 55);

  // Steps cards
  var steps = ex.steps;
  steps.forEach(function(s, i) {
    var y = startY + 80 + i * 40;
    ctx.fillStyle = i % 2 === 0 ? '#f8fafc' : '#fff';
    ctx.beginPath(); ctx.roundRect(40, y, w - 80, 32, 6); ctx.fill();
    ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = i === steps.length - 1 ? '#16a34a' : '#334155';
    ctx.font = (i === steps.length - 1 ? 'bold ' : '') + '13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(s, w / 2, y + 21);
  });
}

function drawSquareMethod(w, h, startY, ex) {
  // Visual: show the formula template
  ctx.fillStyle = '#64748b'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('公式应用', w / 2, startY);

  // Determine if it's difference of squares or perfect square
  var isDiff = ex.result.indexOf(')²') === -1;

  if (isDiff) {
    // a² - b² = (a+b)(a-b)
    ctx.font = 'bold 16px monospace';
    ctx.fillStyle = '#3b82f6'; ctx.textAlign = 'center';
    ctx.fillText('a² - b²  =  (a + b)(a - b)', w / 2, startY + 35);
    ctx.fillStyle = '#16a34a';
    ctx.fillText('↓ 代入具体值', w / 2, startY + 60);
    ctx.fillStyle = '#166534'; ctx.font = 'bold 18px monospace';
    ctx.fillText(ex.expr + ' = ' + ex.result, w / 2, startY + 90);
  } else {
    // (a±b)²
    ctx.font = 'bold 16px monospace';
    ctx.fillStyle = '#3b82f6'; ctx.textAlign = 'center';
    ctx.fillText('a² ± 2ab + b²  =  (a ± b)²', w / 2, startY + 35);
    ctx.fillStyle = '#16a34a';
    ctx.fillText('↓ 识别 a, b', w / 2, startY + 60);
    ctx.fillStyle = '#166534'; ctx.font = 'bold 18px monospace';
    ctx.fillText(ex.expr + ' = ' + ex.result, w / 2, startY + 90);
  }
}

function drawCrossMethod(w, h, startY, ex) {
  // Visual: cross multiplication diagram
  ctx.fillStyle = '#64748b'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('十字相乘', w / 2, startY);

  // Parse the expression to get p and q
  // x² + bx + c where we need p+q=b, p*q=c
  var match = ex.expr.match(/x²\s*([+-]\s*\d*)x\s*([+-]\s*\d+)/);
  if (!match) return;

  // Get p, q from steps
  var stepMatch = ex.steps.find(function(s) { return s.indexOf('p=') >= 0; });
  if (!stepMatch) return;
  var pm = stepMatch.match(/p=(-?\d+),\s*q=(-?\d+)/);
  if (!pm) return;
  var p = parseInt(pm[1]), q = parseInt(pm[2]);

  // Draw cross diagram
  var cx = w / 2, cy = startY + 100;

  // Left column: 1, 1
  ctx.fillStyle = '#3b82f6'; ctx.font = 'bold 20px monospace'; ctx.textAlign = 'right';
  ctx.fillText('1', cx - 70, cy - 30);
  ctx.fillText('1', cx - 70, cy + 30);

  // Right column: p, q
  ctx.fillStyle = '#ef4444';
  ctx.textAlign = 'left';
  ctx.fillText(p > 0 ? '+' + p : '' + p, cx + 40, cy - 30);
  ctx.fillText(q > 0 ? '+' + q : '' + q, cx + 40, cy + 30);

  // Cross lines
  ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 2;
  // 1→q
  ctx.beginPath(); ctx.moveTo(cx - 60, cy - 30); ctx.lineTo(cx + 40, cy + 30); ctx.stroke();
  // 1→p
  ctx.beginPath(); ctx.moveTo(cx - 60, cy + 30); ctx.lineTo(cx + 40, cy - 30); ctx.stroke();

  // Labels
  ctx.fillStyle = '#334155'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('×', cx - 30, cy - 30);
  ctx.fillText('×', cx - 30, cy + 30);

  // Result
  ctx.fillStyle = '#16a34a'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('1×' + q + ' + 1×' + p + ' = ' + (p + q) + ' ✓', cx, cy + 65);
  ctx.fillText(ex.result, cx, cy + 85);
}

function drawGroupMethod(w, h, startY, ex) {
  ctx.fillStyle = '#64748b'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('分组分解过程', w / 2, startY);

  var steps = ex.steps;
  steps.forEach(function(s, i) {
    var y = startY + 30 + i * 45;
    var isResult = i === steps.length - 1;

    ctx.fillStyle = isResult ? '#f0fdf4' : '#f8fafc';
    ctx.beginPath(); ctx.roundRect(40, y, w - 80, 36, 8); ctx.fill();
    ctx.strokeStyle = isResult ? '#86efac' : '#e2e8f0'; ctx.lineWidth = isResult ? 2 : 1;
    ctx.stroke();

    ctx.fillStyle = isResult ? '#16a34a' : '#334155';
    ctx.font = (isResult ? 'bold ' : '') + '14px monospace'; ctx.textAlign = 'center';
    ctx.fillText(s, w / 2, y + 23);
  });
}

// ===== Quiz =====
var _quizQs = [
  { q: 'x² - 9 因式分解的结果是？', opts: ['(x-3)²', '(x+3)(x-3)', '(x+9)(x-1)', '(x-1)(x+9)'], ans: 1 },
  { q: 'x² + 6x + 9 因式分解的结果是？', opts: ['(x+3)(x-3)', '(x+3)²', '(x+9)(x+1)', '(x+1)²'], ans: 1 },
  { q: '4x + 8 提公因式的结果是？', opts: ['4(x+8)', '4(x+2)', '2(2x+4)', 'x(4+8)'], ans: 1 },
  { q: 'x² + 5x + 6 因式分解的结果是？', opts: ['(x+1)(x+6)', '(x+2)(x+3)', '(x+5)(x+1)', '(x-2)(x-3)'], ans: 1 },
  { q: 'a² - b² 用了哪个公式？', opts: ['完全平方', '平方差', '立方差', '提公因式'], ans: 1 },
  { q: 'x² - 2x + 1 因式分解的结果是？', opts: ['(x-1)²', '(x+1)²', '(x-1)(x+1)', 'x(x-2)+1'], ans: 0 },
];
var _qi = 0, _score = 0;

function nextQuiz() {
  if (_qi >= _quizQs.length) {
    document.getElementById('quiz-card').innerHTML = '<div class="quiz-q">测验完成！答对 ' + _score + ' / ' + _quizQs.length + ' 题</div>';
    return;
  }
  var q = _quizQs[_qi];
  var html = '<div class="quiz-q">第' + (_qi + 1) + '题：' + q.q + '</div><div class="quiz-opts">';
  q.opts.forEach(function(o, i) { html += '<button class="quiz-opt" onclick="answer(' + i + ')">' + o + '</button>'; });
  html += '</div><div class="quiz-result" id="qr"></div>';
  document.getElementById('quiz-card').innerHTML = html;
}

function answer(idx) {
  var q = _quizQs[_qi];
  var opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(function(b, i) { b.onclick = null; b.style.cursor = 'default';
    if (i === q.ans) b.classList.add('correct');
    if (i === idx && i !== q.ans) b.classList.add('wrong');
  });
  var r = document.getElementById('qr');
  if (idx === q.ans) { r.textContent = '✓ 正确！'; r.style.color = '#16a34a'; _score++; }
  else { r.textContent = '✗ 正确答案：' + q.opts[q.ans]; r.style.color = '#ef4444'; }
  _qi++; setTimeout(nextQuiz, 1200);
}

init();
</script>
<script src="../edu-lib/edu-tools.js"></script>
</body>
</html>
