<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>位置与坐标 — 教立方</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
  * { box-sizing:border-box; }
  body { font-family:var(--edu-font); margin:0; }
  .tool { width:100vw; height:100vh; display:flex; flex-direction:column; background:var(--edu-bg); }
  .toolbar { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:#fff; border-bottom:1px solid var(--edu-border); }
  .toolbar h1 { font-size:15px; color:var(--edu-primary); margin:0; }
  .toolbar span { font-size:11px; color:var(--edu-text-muted); background:#f1f5f9; padding:2px 8px; border-radius:12px; }
  .main { flex:1; display:grid; grid-template-columns:1fr 280px; overflow:hidden; }
  .canvas-wrap { position:relative; overflow:hidden; background:linear-gradient(135deg,#f0fdf4,#ecfdf5); }
  .canvas-wrap canvas { width:100%; height:100%; display:block; cursor:crosshair; }
  .panel { background:#fff; border-left:1px solid var(--edu-border); padding:12px; display:flex; flex-direction:column; gap:8px; overflow:auto; }
  .section { display:flex; flex-direction:column; gap:4px; }
  .label { font-size:10px; font-weight:700; color:#64748b; letter-spacing:.05em; }
  .divider { height:1px; background:var(--edu-border); }
  .btn { padding:6px 12px; border:none; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer; font-family:var(--edu-font); transition:all .15s; }
  .btn-default { background:#f1f5f9; color:#334155; }
  .btn-default:hover { background:#e2e8f0; }
  .btn-danger { background:#fef2f2; color:#dc2626; }
  .btn-danger:hover { background:#fee2e2; }
  .row { display:flex; gap:4px; flex-wrap:wrap; }

  .coord-display { text-align:center; padding:10px; background:#f0fdf4; border:2px solid #86efac; border-radius:12px; }
  .coord-display .val { font-size:22px; font-weight:800; color:#166534; }
  .coord-display .sub { font-size:11px; color:#166534; margin-top:2px; }

  .point-list { max-height:120px; overflow:auto; background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; padding:6px 8px; }
  .point-item { display:flex; justify-content:space-between; align-items:center; font-size:11px; padding:2px 4px; border-radius:4px; }
  .point-item:hover { background:#f0fdf4; }
  .point-item .del { cursor:pointer; color:#ef4444; font-weight:700; }

  .quiz-card { background:#f0fdf4; border:2px solid #86efac; border-radius:12px; padding:10px; text-align:center; }
  .quiz-q { font-size:13px; font-weight:700; color:#166534; }
  .quiz-opts { display:grid; grid-template-columns:1fr 1fr; gap:4px; margin-top:6px; }
  .quiz-opt { padding:6px; border:2px solid #e2e8f0; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; background:#fff; font-family:var(--edu-font); }
  .quiz-opt:hover { border-color:#22c55e; }
  .quiz-opt.correct { background:#dcfce7; border-color:#22c55e; }
  .quiz-opt.wrong { background:#fef2f2; border-color:#ef4444; }
  .quiz-result { font-size:11px; font-weight:700; margin-top:4px; min-height:16px; }

  .info { font-size:11px; line-height:1.8; color:#334155; background:#fff; border:1px solid #bbf7d0; border-radius:8px; padding:8px 10px; }
  .info b { color:#166534; }
</style>
</head>
<body>
<div class="tool">
  <div class="toolbar">
    <h1>📍 位置与坐标</h1>
    <span>五年级上册 · 第二单元</span>
  </div>
  <div class="main">
    <div class="canvas-wrap"><canvas id="cv"></canvas></div>
    <div class="panel">
      <div class="coord-display">
        <div class="val" id="coord-val">( 3 , 4 )</div>
        <div class="sub">第 <strong id="col-num">3</strong> 列 ，第 <strong id="row-num">4</strong> 行</div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">点击方格放置标记点</div>
        <div class="row">
          <button class="btn btn-default" onclick="presetShape('triangle')">🔺 画三角形</button>
          <button class="btn btn-default" onclick="presetShape('square')">⬜ 画正方形</button>
          <button class="btn btn-default" onclick="presetShape('L')">L 形</button>
          <button class="btn btn-danger" onclick="clearPoints()">🗑️ 清空</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">已标记的点（列, 行）</div>
        <div class="point-list" id="point-list">点击网格添加点…</div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">坐标测验</div>
        <div class="quiz-card" id="quiz-card"></div>
      </div>
      <div class="divider"></div>
      <div class="info">
        <b>位置与坐标小知识</b><br/>
        ● 用<strong>数对</strong>表示位置：(列, 行)<br/>
        ● 列 → <strong>横轴</strong>（从左往右数）<br/>
        ● 行 → <strong>纵轴</strong>（从下往上数）<br/>
        ● (3, 4) 表示第<strong>3</strong>列第<strong>4</strong>行<br/>
        ● 数对(2,3)和(3,2)表示<strong>不同</strong>位置
      </div>
    </div>
  </div>
</div>
<script>
var cv, ctx;
var COLS = 8, ROWS = 8;
var _cellSize = 40, _ox = 0, _oy = 0;
var _points = [];
var _hoverCol = -1, _hoverRow = -1;
var COLORS = ['#ef4444','#3b82f6','#22c55e','#f59e0b','#8b5cf6','#ec4899','#14b8a6','#f97316'];

function init() {
  cv = document.getElementById('cv');
  ctx = cv.getContext('2d');
  window.addEventListener('resize', resize);
  resize();
  nextQuiz();

  cv.addEventListener('mousemove', function(e) {
    var rect = cv.getBoundingClientRect();
    var mx = e.clientX - rect.left;
    var my = e.clientY - rect.top;
    var c = Math.floor((mx - _ox) / _cellSize);
    var r = ROWS - 1 - Math.floor((my - _oy) / _cellSize);
    _hoverCol = (c >= 0 && c < COLS && r >= 0 && r < ROWS) ? c + 1 : -1;
    _hoverRow = (c >= 0 && c < COLS && r >= 0 && r < ROWS) ? r + 1 : -1;
    if (_hoverCol >= 0) {
      document.getElementById('coord-val').textContent = '( ' + _hoverCol + ' , ' + _hoverRow + ' )';
      document.getElementById('col-num').textContent = _hoverCol;
      document.getElementById('row-num').textContent = _hoverRow;
    }
    draw();
  });

  cv.addEventListener('click', function(e) {
    if (_hoverCol < 0) return;
    var exists = false;
    _points.forEach(function(p) { if (p.c === _hoverCol && p.r === _hoverRow) exists = true; });
    if (!exists) {
      _points.push({ c: _hoverCol, r: _hoverRow });
      updatePointList();
      draw();
    }
  });

  cv.addEventListener('mouseleave', function() { _hoverCol = -1; _hoverRow = -1; draw(); });
}

function resize() {
  var r = cv.parentElement.getBoundingClientRect();
  cv.width = r.width * devicePixelRatio;
  cv.height = r.height * devicePixelRatio;
  cv.style.width = r.width + 'px';
  cv.style.height = r.height + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  _cellSize = Math.min((r.width - 80) / COLS, (r.height - 80) / ROWS, 60);
  _cellSize = Math.max(_cellSize, 25);
  _ox = (r.width - COLS * _cellSize) / 2 + 20;
  _oy = (r.height - ROWS * _cellSize) / 2;
  draw();
}

function clearPoints() {
  _points = [];
  updatePointList();
  draw();
}

function presetShape(type) {
  _points = [];
  if (type === 'triangle') _points = [{c:4,r:6},{c:2,r:2},{c:6,r:2}];
  if (type === 'square') _points = [{c:3,r:3},{c:3,r:6},{c:6,r:6},{c:6,r:3}];
  if (type === 'L') _points = [{c:2,r:7},{c:2,r:4},{c:5,r:4},{c:5,r:5},{c:3,r:5},{c:3,r:7}];
  updatePointList();
  draw();
}

function removePoint(idx) {
  _points.splice(idx, 1);
  updatePointList();
  draw();
}

function updatePointList() {
  var el = document.getElementById('point-list');
  if (_points.length === 0) { el.innerHTML = '点击网格添加点…'; return; }
  var html = '';
  _points.forEach(function(p, i) {
    html += '<div class="point-item"><span style="color:' + COLORS[i % COLORS.length] + ';font-weight:700">● (' + p.c + ', ' + p.r + ')</span><span class="del" onclick="removePoint(' + i + ')">✕</span></div>';
  });
  el.innerHTML = html;
}

function draw() {
  var w = cv.width / devicePixelRatio, h = cv.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  // Grid background
  ctx.fillStyle = '#fff';
  ctx.fillRect(_ox, _oy, COLS * _cellSize, ROWS * _cellSize);

  // Hover highlight
  if (_hoverCol >= 0 && _hoverRow >= 0) {
    var hc = _hoverCol - 1, hr = ROWS - _hoverRow;
    ctx.fillStyle = 'rgba(34,197,94,0.15)';
    ctx.fillRect(_ox + hc * _cellSize, _oy + hr * _cellSize, _cellSize, _cellSize);
  }

  // Grid lines
  ctx.strokeStyle = '#d1d5db';
  ctx.lineWidth = 0.5;
  for (var r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(_ox, _oy + r * _cellSize); ctx.lineTo(_ox + COLS * _cellSize, _oy + r * _cellSize); ctx.stroke();
  }
  for (var c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(_ox + c * _cellSize, _oy); ctx.lineTo(_ox + c * _cellSize, _oy + ROWS * _cellSize); ctx.stroke();
  }

  // Column labels (bottom)
  ctx.fillStyle = '#166534';
  ctx.font = 'bold ' + Math.max(11, _cellSize * 0.25) + 'px sans-serif';
  ctx.textAlign = 'center';
  for (var c = 0; c < COLS; c++) {
    ctx.fillText(c + 1, _ox + c * _cellSize + _cellSize / 2, _oy + ROWS * _cellSize + 18);
  }
  ctx.font = 'bold 10px sans-serif';
  ctx.fillText('列 →', _ox + COLS * _cellSize / 2, _oy + ROWS * _cellSize + 32);

  // Row labels (left)
  ctx.fillStyle = '#166534';
  ctx.font = 'bold ' + Math.max(11, _cellSize * 0.25) + 'px sans-serif';
  ctx.textAlign = 'right';
  for (var r = 0; r < ROWS; r++) {
    ctx.fillText(ROWS - r, _ox - 8, _oy + r * _cellSize + _cellSize / 2 + 4);
  }
  ctx.save();
  ctx.translate(_ox - 30, _oy + ROWS * _cellSize / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.font = 'bold 10px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('行 ↑', 0, 0);
  ctx.restore();

  // Connect points with lines
  if (_points.length > 1) {
    ctx.strokeStyle = 'rgba(34,197,94,0.3)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    _points.forEach(function(p, i) {
      var x = _ox + (p.c - 1) * _cellSize + _cellSize / 2;
      var y = _oy + (ROWS - p.r) * _cellSize + _cellSize / 2;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Draw points
  _points.forEach(function(p, i) {
    var x = _ox + (p.c - 1) * _cellSize + _cellSize / 2;
    var y = _oy + (ROWS - p.r) * _cellSize + _cellSize / 2;

    // Glow
    ctx.fillStyle = COLORS[i % COLORS.length] + '33';
    ctx.beginPath(); ctx.arc(x, y, _cellSize * 0.35, 0, Math.PI * 2); ctx.fill();

    // Dot
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.beginPath(); ctx.arc(x, y, _cellSize * 0.2, 0, Math.PI * 2); ctx.fill();

    // Label
    ctx.fillStyle = '#334155';
    ctx.font = 'bold ' + Math.max(10, _cellSize * 0.2) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('(' + p.c + ',' + p.r + ')', x, y - _cellSize * 0.3);
  });

  // Hover tooltip
  if (_hoverCol >= 0) {
    var hx = _ox + (_hoverCol - 1) * _cellSize + _cellSize / 2;
    var hy = _oy + (ROWS - _hoverRow) * _cellSize + _cellSize / 2;
    ctx.fillStyle = '#166534';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('(' + _hoverCol + ', ' + _hoverRow + ')', hx, hy + _cellSize * 0.45);
  }
}

// ===== Quiz =====
var _quizQs = [
  { q: '(3, 5) 表示第几列第几行？', opts: ['3列5行', '5列3行', '3行5列', '5行3列'], ans: 0 },
  { q: '(2,3) 和 (3,2) 表示同一个位置吗？', opts: ['是', '不是', '看情况', '无法确定'], ans: 1 },
  { q: '第4列第2行用数对怎么表示？', opts: ['(2, 4)', '(4, 2)', '(4, 4)', '(2, 2)'], ans: 1 },
  { q: '数对(5,1)中的5表示什么？', opts: ['第5行', '第5列', '5个点', '第5排'], ans: 1 },
  { q: '在方格纸上，(1,1)通常在哪个位置？', opts: ['左上角', '右上角', '左下角', '右下角'], ans: 2 },
  { q: '小红在第3列第6行，她的位置用数对表示是？', opts: ['(6, 3)', '(3, 6)', '(3, 3)', '(6, 6)'], ans: 1 },
];
var _qi = 0, _score = 0;

function nextQuiz() {
  if (_qi >= _quizQs.length) {
    document.getElementById('quiz-card').innerHTML =
      '<div class="quiz-q">测验完成！答对 ' + _score + ' / ' + _quizQs.length + ' 题</div>';
    return;
  }
  var q = _quizQs[_qi];
  var html = '<div class="quiz-q">第' + (_qi + 1) + '题：' + q.q + '</div><div class="quiz-opts">';
  q.opts.forEach(function(o, i) {
    html += '<button class="quiz-opt" onclick="answer(' + i + ')">' + o + '</button>';
  });
  html += '</div><div class="quiz-result" id="qr"></div>';
  document.getElementById('quiz-card').innerHTML = html;
}

function answer(idx) {
  var q = _quizQs[_qi];
  var opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(function(b, i) {
    b.onclick = null; b.style.cursor = 'default';
    if (i === q.ans) b.classList.add('correct');
    if (i === idx && i !== q.ans) b.classList.add('wrong');
  });
  var r = document.getElementById('qr');
  if (idx === q.ans) { r.textContent = '✓ 正确！'; r.style.color = '#16a34a'; _score++; }
  else { r.textContent = '✗ 正确答案：' + q.opts[q.ans]; r.style.color = '#ef4444'; }
  _qi++;
  setTimeout(nextQuiz, 1200);
}

init();
</script>
</body>
</html>
