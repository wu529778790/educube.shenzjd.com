<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>公顷和平方千米 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 260px; height: 100%; }
    .canvas-area { padding: 20px 24px; overflow-y: auto; background: linear-gradient(135deg, #f0fdf4 0%, #fdfaf4 100%); }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 14px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .preset-btn { padding: 8px 0; border-radius: 8px; font-size: 14px; font-weight: 700; font-family: 'Courier New', monospace; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; }
    .preset-btn:hover { border-color: #22c55e; color: #22c55e; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #bbf7d0; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .section-title { font-size: 14px; font-weight: 700; color: #334155; margin-bottom: 12px; text-align: center; }
    .tab-bar { display: flex; gap: 6px; margin-bottom: 14px; justify-content: center; flex-wrap: wrap; }
    .tab-btn { padding: 6px 14px; border-radius: 8px; border: 1.5px solid #e2e8f0; background: #fff; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; }
    .tab-btn.active { background: #22c55e; color: #fff; border-color: #22c55e; }

    /* 1. Visual area comparison */
    .area-compare { display: flex; align-items: flex-end; justify-content: center; gap: 12px; padding: 10px 0 20px; min-height: 240px; position: relative; }
    .area-block { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform .4s cubic-bezier(.4,0,.2,1); }
    .area-block:hover { transform: scale(1.08); }
    .area-block.active { transform: scale(1.15); }
    .area-square { border: 2px solid #22c55e; border-radius: 6px; background: rgba(34,197,94,0.12); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #16a34a; transition: all .5s cubic-bezier(.4,0,.2,1); position: relative; overflow: hidden; }
    .area-square::after { content:''; position:absolute; inset:0; background: linear-gradient(135deg, rgba(34,197,94,0.15), transparent); pointer-events:none; }
    .area-block .label { margin-top: 4px; font-size: 12px; font-weight: 700; color: #334155; white-space: nowrap; }
    .area-block .sublabel { font-size: 10px; color: #64748b; }
    .area-zoom-info { text-align: center; font-size: 13px; color: #1e293b; font-weight: 600; min-height: 22px; margin-bottom: 6px; background: #fff; border-radius: 8px; padding: 4px 12px; display: inline-block; border: 1.5px solid #bbf7d0; }

    /* 2. Unit staircase */
    .staircase { display: flex; align-items: flex-end; justify-content: center; gap: 0; margin: 8px auto 18px; padding: 0 10px; }
    .stair-step { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: all .2s; padding: 0 6px; }
    .stair-step:hover .stair-box { box-shadow: 0 4px 16px rgba(34,197,94,0.25); }
    .stair-step.active .stair-box { background: #22c55e; color: #fff; border-color: #22c55e; box-shadow: 0 4px 16px rgba(34,197,94,0.35); }
    .stair-step.active .stair-box .stair-ratio { color: #fff; }
    .stair-box { background: #fff; border: 2px solid #22c55e; border-radius: 10px; padding: 10px 14px; text-align: center; min-width: 80px; transition: all .25s; }
    .stair-box .unit-name { font-size: 13px; font-weight: 800; color: inherit; }
    .stair-box .stair-ratio { font-size: 10px; color: #64748b; margin-top: 2px; }
    .stair-arrow { font-size: 16px; color: #22c55e; font-weight: 800; align-self: center; margin-bottom: 22px; }
    .stair-arrow .factor-label { font-size: 11px; color: #16a34a; font-weight: 700; display: block; }
    .stair-detail { text-align: center; font-size: 12px; color: #334155; background: #fff; border: 1.5px solid #bbf7d0; border-radius: 8px; padding: 8px 16px; margin: 0 auto 14px; min-height: 32px; transition: all .3s; }

    /* 3. Real-world references */
    .realworld-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
    .rw-card { background: #fff; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: all .2s; }
    .rw-card:hover { border-color: #22c55e; box-shadow: 0 2px 12px rgba(34,197,94,0.12); }
    .rw-card .rw-icon { font-size: 32px; line-height: 1; }
    .rw-card .rw-info { flex: 1; }
    .rw-card .rw-title { font-size: 13px; font-weight: 700; color: #1e293b; }
    .rw-card .rw-desc { font-size: 11px; color: #64748b; }
    .rw-card .rw-badge { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 6px; padding: 3px 8px; font-size: 11px; font-weight: 700; color: #16a34a; white-space: nowrap; }

    /* 4. Animated conversion */
    .anim-converter { display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
    .anim-converter input { width: 90px; padding: 8px 10px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; font-weight: 700; font-family: 'Courier New', monospace; text-align: center; }
    .anim-converter input:focus { border-color: #22c55e; outline: none; }
    .anim-converter select { padding: 8px 10px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 13px; font-weight: 600; background: #fff; cursor: pointer; }
    .anim-eq { font-size: 22px; font-weight: 800; color: #22c55e; }
    .anim-result { font-size: 18px; font-weight: 800; color: #1e293b; background: #f0fdf4; padding: 8px 16px; border-radius: 8px; border: 1.5px solid #bbf7d0; min-width: 120px; text-align: center; position: relative; overflow: hidden; }
    .anim-pipe { display: flex; align-items: center; justify-content: center; gap: 6px; margin: 6px auto 10px; }
    .anim-pipe .pipe-label { background: #dcfce7; color: #16a34a; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    .anim-pipe .pipe-arrow { color: #22c55e; font-weight: 800; font-size: 18px; }
    .anim-flow { position: absolute; top: 50%; font-size: 14px; font-weight: 800; color: #16a34a; pointer-events: none; animation: flowIn .6s ease-out forwards; white-space: nowrap; }
    @keyframes flowIn { from { opacity:0; transform: translateX(-30px) translateY(-50%); } to { opacity:1; transform: translateX(0) translateY(-50%); } }
    .conv-all-row { background: #fff; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 8px 20px; font-size: 14px; font-weight: 700; width: 85%; max-width: 400px; text-align: center; transition: all .3s; }
    .conv-all-row:hover { border-color: #bbf7d0; background: #f0fdf4; }

    /* 5. Quiz */
    .quiz-area { text-align: center; }
    .quiz-card { background: #fff; border: 2px solid #e2e8f0; border-radius: 14px; padding: 20px; margin: 0 auto 14px; max-width: 420px; transition: all .3s; }
    .quiz-card .q-icon { font-size: 56px; margin-bottom: 8px; }
    .quiz-card .q-name { font-size: 18px; font-weight: 800; color: #1e293b; }
    .quiz-card .q-hint { font-size: 12px; color: #64748b; margin-top: 4px; }
    .quiz-opts { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 12px; }
    .quiz-opt { padding: 8px 18px; border-radius: 10px; border: 2px solid #e2e8f0; background: #fff; font-size: 14px; font-weight: 700; cursor: pointer; transition: all .15s; }
    .quiz-opt:hover { border-color: #22c55e; }
    .quiz-opt.correct { background: #dcfce7; border-color: #22c55e; color: #16a34a; }
    .quiz-opt.wrong { background: #fef2f2; border-color: #ef4444; color: #ef4444; }
    .quiz-opt:disabled { cursor: default; opacity: .7; }
    .quiz-score { font-size: 14px; font-weight: 700; color: #334155; }
    .quiz-feedback { font-size: 13px; font-weight: 600; min-height: 20px; margin-bottom: 8px; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div class="edu-toolbar-title">公顷和平方千米</div>
    <div class="edu-toolbar-subtitle">上册 · 面积单位</div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <div class="tab-bar">
          <button class="tab-btn active" onclick="switchTab('compare')">面积对比</button>
          <button class="tab-btn" onclick="switchTab('staircase')">单位阶梯</button>
          <button class="tab-btn" onclick="switchTab('realworld')">生活实例</button>
          <button class="tab-btn" onclick="switchTab('converter')">换算动画</button>
          <button class="tab-btn" onclick="switchTab('quiz')">面积竞猜</button>
        </div>

        <!-- 1. Visual area comparison -->
        <div id="tab-compare">
          <div class="section-title">面积单位大小对比 (点击放大)</div>
          <div style="text-align:center;margin-bottom:8px"><span class="area-zoom-info" id="zoomInfo">点击一个方块查看详情</span></div>
          <div class="area-compare" id="areaCompare"></div>
          <div class="grid-visual" style="display:flex;justify-content:center;margin-top:10px">
            <canvas id="gridCanvas" width="380" height="380"></canvas>
          </div>
          <div style="text-align:center;font-size:11px;color:#64748b;margin-top:2px" id="gridCaption">点击上方方块查看对应的网格模型</div>
        </div>

        <!-- 2. Unit staircase -->
        <div id="tab-staircase" style="display:none">
          <div class="section-title">面积单位阶梯 — 点击查看进率</div>
          <div class="staircase" id="staircase"></div>
          <div class="stair-detail" id="stairDetail">点击任意阶梯查看详细换算关系</div>
          <div class="section-title" style="margin-top:16px">方格模型</div>
          <div style="display:flex;justify-content:center"><canvas id="stairCanvas" width="380" height="380"></canvas></div>
        </div>

        <!-- 3. Real-world references -->
        <div id="tab-realworld" style="display:none">
          <div class="section-title">生活中的面积 (点击卡片高亮)</div>
          <div class="realworld-grid" id="rwGrid"></div>
          <div id="rwDetail" style="text-align:center;margin-top:14px;font-size:13px;font-weight:600;color:#334155;min-height:24px"></div>
        </div>

        <!-- 4. Animated conversion -->
        <div id="tab-converter" style="display:none">
          <div class="section-title">面积单位换算</div>
          <div class="anim-converter">
            <input type="number" id="convInput" value="1" oninput="animConvert()" />
            <select id="convFrom" onchange="animConvert()">
              <option value="cm2">cm²</option>
              <option value="dm2">dm²</option>
              <option value="m2">m²</option>
              <option value="ha" selected>公顷</option>
              <option value="km2">km²</option>
            </select>
            <span class="anim-eq">=</span>
            <div class="anim-result" id="animResult">10 000 m²</div>
          </div>
          <div class="anim-pipe" id="animPipe"></div>
          <div id="convAll" style="display:flex;flex-direction:column;gap:8px;align-items:center;"></div>
        </div>

        <!-- 5. Quiz -->
        <div id="tab-quiz" style="display:none">
          <div class="section-title">面积竞猜 — 这有多大？</div>
          <div class="quiz-area">
            <div class="quiz-score" id="quizScore">得分: 0 / 0</div>
            <div class="quiz-feedback" id="quizFeedback"></div>
            <div class="quiz-card" id="quizCard">
              <div class="q-icon" id="qIcon">🏟️</div>
              <div class="q-name" id="qName">标准足球场</div>
              <div class="q-hint" id="qHint">长约105米，宽约68米</div>
            </div>
            <div class="quiz-opts" id="quizOpts"></div>
            <button class="preset-btn" style="width:160px;margin:0 auto" onclick="nextQuiz()">下一题</button>
          </div>
        </div>
      </div>

      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">快速对比</div>
          <button class="preset-btn" onclick="highlightBlock(0)">1 cm²</button>
          <button class="preset-btn" onclick="highlightBlock(1)">1 dm²</button>
          <button class="preset-btn" onclick="highlightBlock(2)">1 m²</button>
          <button class="preset-btn" onclick="highlightBlock(3)">1 公顷</button>
          <button class="preset-btn" onclick="highlightBlock(4)">1 km²</button>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">快速换算</div>
          <button class="preset-btn" onclick="quickConvert(1,'ha')">1 公顷 → m²</button>
          <button class="preset-btn" onclick="quickConvert(1,'km2')">1 km² → 公顷</button>
          <button class="preset-btn" onclick="quickConvert(5,'ha')">5 公顷 → m²</button>
          <button class="preset-btn" onclick="quickConvert(3,'km2')">3 km² → m²</button>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <b>面积单位换算</b><br/>
          1 cm² = 100 mm²<br/>
          1 dm² = 100 cm²<br/>
          1 m² = 100 dm²<br/>
          1 公顷 = 10 000 m²<br/>
          1 km² = 100 公顷<br/>
          1 km² = 1 000 000 m²
        </div>
      </div>
    </div>
  </div>
</div>
<script>
/* ── Data ── */
const UNITS = [
  { key:'cm2', name:'cm²', full:'平方厘米', side:'1 cm', m2:0.0001 },
  { key:'dm2', name:'dm²', full:'平方分米', side:'1 dm', m2:0.01 },
  { key:'m2',  name:'m²',  full:'平方米',   side:'1 m',  m2:1 },
  { key:'ha',  name:'公顷', full:'公顷',     side:'100 m',m2:10000 },
  { key:'km2', name:'km²', full:'平方千米', side:'1 km', m2:1000000 }
];
const BLOCK_SIZES = [28, 48, 70, 110, 150]; // px for visual compare
const REALWORLD = [
  { icon:'📐', name:'一张邮票', desc:'约 6 cm²', area:'6 cm²', cat:'cm²' },
  { icon:'📱', name:'手机屏幕', desc:'约 1 dm²', area:'≈ 1 dm²', cat:'dm²' },
  { icon:'🏫', name:'一间教室', desc:'约 50 m²', area:'50 m²', cat:'m²' },
  { icon:'⚽', name:'标准足球场', desc:'105m × 68m', area:'≈ 0.7 公顷', cat:'ha' },
  { icon:'🏗️', name:'天安门广场', desc:'约 440 000 m²', area:'44 公顷', cat:'ha' },
  { icon:'🏯', name:'故宫', desc:'约 720 000 m²', area:'72 公顷', cat:'ha' },
  { icon:'🌳', name:'奥林匹克公园', desc:'约 11.6 km²', area:'≈ 12 km²', cat:'km2' },
  { icon:'🗺️', name:'北京市', desc:'约 16 410 km²', area:'16 410 km²', cat:'km2' }
];
const QUIZ_DATA = [
  { icon:'⚽', name:'标准足球场', hint:'105m × 68m', answer:'ha', opts:['m²','公顷','km²'], explain:'约 7140 m² ≈ 0.7 公顷' },
  { icon:'🏫', name:'一间教室', hint:'约 8m × 6m', answer:'m2', opts:['dm²','m²','公顷'], explain:'约 48 m²' },
  { icon:'🗺️', name:'北京市', hint:'中国首都', answer:'km2', opts:['公顷','km²','m²'], explain:'约 16 410 km²' },
  { icon:'🏗️', name:'天安门广场', hint:'世界最大的城市广场之一', answer:'ha', opts:['m²','公顷','km²'], explain:'44 公顷 = 440 000 m²' },
  { icon:'📐', name:'课本封面', hint:'约 20cm × 28cm', answer:'cm2', opts:['mm²','cm²','dm²'], explain:'约 560 cm²' },
  { icon:'📱', name:'手机屏幕', hint:'约 15cm × 7cm', answer:'dm2', opts:['cm²','dm²','m²'], explain:'约 1 dm²' },
  { icon:'🌳', name:'一个公园', hint:'小型城市公园', answer:'ha', opts:['m²','公顷','km²'], explain:'大约 2~5 公顷' },
  { icon:'🏯', name:'故宫', hint:'北京故宫博物院', answer:'ha', opts:['m²','公顷','km²'], explain:'72 公顷 = 720 000 m²' },
  { icon:'🏊', name:'标准游泳池', hint:'50m × 25m', answer:'m2', opts:['dm²','m²','公顷'], explain:'1 250 m²' },
  { icon:'🏡', name:'一个小区', hint:'中等住宅小区', answer:'ha', opts:['m²','公顷','km²'], explain:'大约 3~10 公顷' }
];

/* ── Tab switching ── */
let currentTab = 'compare';
const tabNames = ['compare','staircase','realworld','converter','quiz'];
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', tabNames[i] === tab));
  tabNames.forEach(t => { document.getElementById('tab-'+t).style.display = t===tab?'':'none'; });
  if (tab==='compare') { buildCompare(); drawGrid(3); }
  if (tab==='staircase') buildStaircase();
  if (tab==='realworld') buildRealworld();
  if (tab==='converter') animConvert();
  if (tab==='quiz') initQuiz();
}

/* ── 1. Visual Area Comparison ── */
let activeBlock = -1;
function buildCompare() {
  const wrap = document.getElementById('areaCompare'); wrap.innerHTML = '';
  UNITS.forEach((u,i) => {
    const blk = document.createElement('div');
    blk.className = 'area-block' + (i===activeBlock?' active':'');
    blk.innerHTML = `<div class="area-square" style="width:${BLOCK_SIZES[i]}px;height:${BLOCK_SIZES[i]}px;font-size:${BLOCK_SIZES[i]<40?'9':'12'}px">${u.name}</div><div class="label">${u.full}</div><div class="sublabel">边长 ${u.side}</div>`;
    blk.onclick = () => highlightBlock(i);
    wrap.appendChild(blk);
  });
}
function highlightBlock(idx) {
  if (currentTab !== 'compare') switchTab('compare');
  activeBlock = idx;
  const u = UNITS[idx];
  document.getElementById('zoomInfo').textContent = '1 '+u.full+' = '+u.m2.toLocaleString()+' m²    (边长 '+u.side+')';
  buildCompare();
  drawGrid(idx);
}

/* ── Grid canvas ── */
const gridCanvas = document.getElementById('gridCanvas');
const gridCtx = gridCanvas.getContext('2d');
function drawGrid(unitIdx) {
  const dpr = window.devicePixelRatio||1, size=380;
  gridCanvas.width=size*dpr; gridCanvas.height=size*dpr;
  gridCanvas.style.width=size+'px'; gridCanvas.style.height=size+'px';
  gridCtx.setTransform(dpr,0,0,dpr,0,0);
  gridCtx.fillStyle='#f0fdf4'; gridCtx.fillRect(0,0,size,size);
  const pad=30, ds=size-pad*2;
  let n=10, sideLabel='', areaLabel='';
  if(unitIdx<=2) { n=10; sideLabel=UNITS[unitIdx].side; areaLabel='1 '+UNITS[unitIdx].full; }
  else if(unitIdx===3) { n=10; sideLabel='100 m'; areaLabel='1 公顷 = 10 000 m²'; }
  else { n=10; sideLabel='1 000 m'; areaLabel='1 km² = 1 000 000 m²'; }
  const cs=ds/n;
  gridCtx.strokeStyle='#d1d5db'; gridCtx.lineWidth=0.5;
  for(let i=0;i<=n;i++){
    gridCtx.beginPath(); gridCtx.moveTo(pad+i*cs,pad); gridCtx.lineTo(pad+i*cs,pad+ds); gridCtx.stroke();
    gridCtx.beginPath(); gridCtx.moveTo(pad,pad+i*cs); gridCtx.lineTo(pad+ds,pad+i*cs); gridCtx.stroke();
  }
  gridCtx.fillStyle='rgba(34,197,94,0.2)';
  if(unitIdx<=1) { gridCtx.fillRect(pad,pad,cs,cs); }
  else { for(let r=0;r<10;r++) for(let c=0;c<n;c++) gridCtx.fillRect(pad+c*cs,pad+r*cs,cs,cs); }
  gridCtx.strokeStyle='#22c55e'; gridCtx.lineWidth=2; gridCtx.strokeRect(pad,pad,ds,ds);
  gridCtx.fillStyle='#1e293b'; gridCtx.font='12px "Microsoft YaHei",sans-serif'; gridCtx.textAlign='center';
  gridCtx.fillText(sideLabel,pad+ds/2,pad-8);
  gridCtx.save(); gridCtx.translate(pad-8,pad+ds/2); gridCtx.rotate(-Math.PI/2); gridCtx.fillText(sideLabel,0,0); gridCtx.restore();
  gridCtx.fillStyle='#16a34a'; gridCtx.font='bold 14px "Microsoft YaHei",sans-serif';
  gridCtx.fillText(areaLabel,size/2,size-6);
  document.getElementById('gridCaption').textContent='网格模型: '+areaLabel;
}

/* ── 2. Unit Staircase ── */
let activeStair = -1;
const STAIR_FACTORS = [100,100,10000,100]; // between consecutive units
function buildStaircase() {
  const wrap = document.getElementById('staircase'); wrap.innerHTML='';
  const offsets = [0,16,32,48,64];
  UNITS.forEach((u,i) => {
    if(i>0) { const a=document.createElement('div'); a.className='stair-arrow'; a.innerHTML='→<span class="factor-label">×'+STAIR_FACTORS[i-1]+'</span>'; wrap.appendChild(a); }
    const step = document.createElement('div'); step.className='stair-step'+(i===activeStair?' active':'');
    step.style.marginBottom=offsets[i]+'px';
    step.innerHTML='<div class="stair-box"><div class="unit-name">'+u.full+'</div><div class="stair-ratio">'+u.m2.toLocaleString()+' m²</div></div>';
    step.onclick = () => selectStair(i); wrap.appendChild(step);
  });
  if(activeStair<0) document.getElementById('stairDetail').textContent='点击任意阶梯查看详细换算关系';
}
function selectStair(idx) {
  activeStair=idx;
  const u=UNITS[idx];
  let txt='1 '+u.full+' = '+u.m2.toLocaleString()+' m²';
  if(idx===3) txt+=' (= 100m × 100m)';
  if(idx===4) txt+=' (= 100公顷 = 1 000 000 m²)';
  // show conversion to neighbors
  if(idx>0) txt+='  |  与 '+UNITS[idx-1].full+' 之比: ×'+STAIR_FACTORS[idx-1];
  if(idx<4) txt+='  |  与 '+UNITS[idx+1].full+' 之比: ÷'+STAIR_FACTORS[idx];
  document.getElementById('stairDetail').textContent=txt;
  buildStaircase();
  drawStairGrid(idx);
}
const stairCanvas = document.getElementById('stairCanvas');
const stairCtx = stairCanvas.getContext('2d');
function drawStairGrid(idx) {
  const dpr=window.devicePixelRatio||1,size=380;
  stairCanvas.width=size*dpr; stairCanvas.height=size*dpr;
  stairCanvas.style.width=size+'px'; stairCanvas.style.height=size+'px';
  stairCtx.setTransform(dpr,0,0,dpr,0,0);
  stairCtx.fillStyle='#f8fafc'; stairCtx.fillRect(0,0,size,size);
  const pad=30,ds=size-pad*2,n=10,cs=ds/n;
  stairCtx.strokeStyle='#e2e8f0'; stairCtx.lineWidth=0.5;
  for(let i=0;i<=n;i++){
    stairCtx.beginPath(); stairCtx.moveTo(pad+i*cs,pad); stairCtx.lineTo(pad+i*cs,pad+ds); stairCtx.stroke();
    stairCtx.beginPath(); stairCtx.moveTo(pad,pad+i*cs); stairCtx.lineTo(pad+ds,pad+i*cs); stairCtx.stroke();
  }
  const colors=['#fef3c7','#dbeafe','#bbf7d0','#dcfce7','#d1fae5'];
  stairCtx.fillStyle=colors[idx]; stairCtx.globalAlpha=0.6;
  if(idx<=1) stairCtx.fillRect(pad,pad,cs,cs); else stairCtx.fillRect(pad,pad,ds,ds);
  stairCtx.globalAlpha=1; stairCtx.strokeStyle='#22c55e'; stairCtx.lineWidth=2; stairCtx.strokeRect(pad,pad,ds,ds);
  stairCtx.fillStyle='#1e293b'; stairCtx.font='bold 14px "Microsoft YaHei",sans-serif'; stairCtx.textAlign='center';
  stairCtx.fillText('1 '+UNITS[idx].full+' = '+UNITS[idx].m2.toLocaleString()+' m²',size/2,size-8);
}

/* ── 3. Real-world references ── */
function buildRealworld() {
  const grid=document.getElementById('rwGrid'); grid.innerHTML='';
  REALWORLD.forEach((rw,i) => {
    const card=document.createElement('div'); card.className='rw-card';
    card.innerHTML=`<div class="rw-icon">${rw.icon}</div><div class="rw-info"><div class="rw-title">${rw.name}</div><div class="rw-desc">${rw.desc}</div></div><div class="rw-badge">${rw.area}</div>`;
    card.onclick=()=>showRwDetail(i); grid.appendChild(card);
  });
}
function showRwDetail(i) {
  const rw=REALWORLD[i];
  document.getElementById('rwDetail').innerHTML='<span style="font-size:24px">'+rw.icon+'</span> '+rw.name+' 的面积约 <b>'+rw.area+'</b>  ('+rw.desc+')';
}

/* ── 4. Animated Conversion ── */
function animConvert() {
  const val=parseFloat(document.getElementById('convInput').value)||0;
  const from=document.getElementById('convFrom').value;
  const m2Map={cm2:0.0001,dm2:0.01,m2:1,ha:10000,km2:1000000};
  const m2=val*(m2Map[from]||1);
  const res=document.getElementById('animResult');
  res.innerHTML=m2.toLocaleString()+' m²';
  const flow=document.createElement('span'); flow.className='anim-flow'; flow.textContent='×';
  res.appendChild(flow); setTimeout(()=>{ if(flow.parentNode) flow.remove(); },600);
  const fromU=UNITS.find(u=>u.key===from);
  document.getElementById('animPipe').innerHTML=`<span class="pipe-label">${fromU.full}</span><span class="pipe-arrow">→</span><span class="pipe-label">m²</span>`;
  const all=document.getElementById('convAll'); all.innerHTML='';
  UNITS.forEach(u => {
    const row=document.createElement('div'); row.className='conv-all-row';
    row.textContent='= '+(m2/u.m2).toLocaleString()+' '+u.full; all.appendChild(row);
  });
}
function quickConvert(val,unit) {
  switchTab('converter');
  document.getElementById('convInput').value=val;
  document.getElementById('convFrom').value=unit;
  animConvert();
}

/* ── 5. Quiz ── */
let quizIdx=-1, quizScore=0, quizTotal=0, quizAnswered=false;
function initQuiz() {
  quizScore=0; quizTotal=0; quizAnswered=false;
  nextQuiz();
}
function nextQuiz() {
  quizAnswered=false;
  quizIdx = (quizIdx+1) % QUIZ_DATA.length;
  if(quizIdx===0 && quizTotal>0) quizIdx = Math.floor(Math.random()*QUIZ_DATA.length);
  const q=QUIZ_DATA[quizIdx];
  document.getElementById('qIcon').textContent=q.icon;
  document.getElementById('qName').textContent=q.name;
  document.getElementById('qHint').textContent=q.hint;
  document.getElementById('quizFeedback').textContent='';
  const opts=document.getElementById('quizOpts');
  opts.innerHTML='';
  q.opts.forEach(opt => {
    const b=document.createElement('button'); b.className='quiz-opt'; b.textContent=opt;
    b.onclick=()=>answerQuiz(opt,b);
    opts.appendChild(b);
  });
  document.getElementById('quizScore').textContent='得分: '+quizScore+' / '+quizTotal;
}
function answerQuiz(opt,btn) {
  if(quizAnswered) return;
  quizAnswered=true; quizTotal++;
  const q=QUIZ_DATA[quizIdx];
  const allBtns=document.querySelectorAll('.quiz-opt');
  allBtns.forEach(b => {
    b.disabled=true;
    if(b.textContent===q.answer) b.classList.add('correct');
  });
  if(opt===q.answer) {
    quizScore++;
    btn.classList.add('correct');
    document.getElementById('quizFeedback').innerHTML='<span style="color:#16a34a">正确! '+q.explain+'</span>';
  } else {
    btn.classList.add('wrong');
    document.getElementById('quizFeedback').innerHTML='<span style="color:#ef4444">再想想~ 正确答案: '+q.answer+'。'+q.explain+'</span>';
  }
  document.getElementById('quizScore').textContent='得分: '+quizScore+' / '+quizTotal;
}

/* ── Init ── */
buildCompare();
drawGrid(3);
animConvert();
</script>
