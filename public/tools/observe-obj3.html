<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>观察物体（三）</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
  .main-layout { display:grid; grid-template-columns:1fr 280px; height:100%; }
  .canvas-area { position:relative; background:linear-gradient(135deg,#f0f7ff,#fdfaf4); overflow:hidden; }
  .control-panel {
    background:#fdfaf4; border-left:1px solid #e2e8f0;
    padding:16px; display:flex; flex-direction:column; gap:12px; overflow:auto;
  }
  .ctrl-section { display:flex; flex-direction:column; gap:6px; }
  .ctrl-label { font-size:11px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.05em; }
  .divider { height:1px; background:#e2e8f0; }
  .preset-btn {
    padding:6px 10px; border-radius:8px; font-size:12px; font-weight:600;
    cursor:pointer; border:1.5px solid #e2e8f0; background:#fff; color:#64748b;
    transition:all .15s; font-family:var(--edu-font); text-align:center;
  }
  .preset-btn:hover { border-color:#3B82F6; }
  .preset-btn.active { background:#3B82F6; color:#fff; border-color:#3B82F6; }
  .info-box {
    background:#fff; border:1px solid #e2e8f0; border-radius:10px;
    padding:10px 12px; font-size:12px; color:#64748b; line-height:1.8;
  }
  .info-box strong { color:#0EA5E9; }
  .views-row { display:flex; gap:8px; }
  .view-card {
    flex:1; background:#fff; border:1px solid #e2e8f0; border-radius:10px;
    padding:8px; display:flex; flex-direction:column; align-items:center; gap:4px;
  }
  .view-title { font-size:10px; font-weight:700; color:#1a3a5c; }
</style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="edu-toolbar-title">👀 观察物体（三）</span>
      <span class="edu-toolbar-subtitle">五下·第一单元</span>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-outline" onclick="clearAll()">清空</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="main-canvas" class="edu-canvas-full"></canvas>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">预设形状</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
            <button class="preset-btn active" onclick="loadPreset('L')">L形</button>
            <button class="preset-btn" onclick="loadPreset('T')">T形</button>
            <button class="preset-btn" onclick="loadPreset('Z')">Z形</button>
            <button class="preset-btn" onclick="loadPreset('U')">U形</button>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">三视图</div>
          <div class="views-row">
            <div class="view-card">
              <div class="view-title" style="color:#3B82F6;">正视图</div>
              <canvas id="cv-front" width="80" height="80"></canvas>
            </div>
            <div class="view-card">
              <div class="view-title" style="color:#22c55e;">侧视图</div>
              <canvas id="cv-side" width="80" height="80"></canvas>
            </div>
          </div>
          <div class="views-row">
            <div class="view-card">
              <div class="view-title" style="color:#f97316;">俯视图</div>
              <canvas id="cv-top" width="80" height="80"></canvas>
            </div>
            <div class="view-card">
              <div class="view-title" style="color:#8b5cf6;">统计</div>
              <div class="info-box" id="stats-box" style="font-size:11px;line-height:1.6;padding:6px 8px;">
                <div>积木数：<strong id="block-count">0</strong></div>
                <div>最高层：<strong id="max-h">0</strong></div>
              </div>
            </div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">操作说明</div>
          <div class="info-box" style="font-size:11px;line-height:1.7;">
            点击网格<b>添加</b>积木，右键<b>移除</b>积木。<br/>
            点击已有积木可<b>叠高</b>一层。<br/>
            左侧3D视图同步显示积木摆放。<br/>
            三视图随积木变化实时更新。
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../edu-lib/edu-tools.js"></script>
<script>
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
const COLS = 4, ROWS = 4, MAX_H = 4;
let grid = Array.from({length:ROWS}, ()=>Array(COLS).fill(0));
let W, H;

function loadPreset(t) {
  grid = Array.from({length:ROWS}, ()=>Array(COLS).fill(0));
  if(t==='L'){grid[1][0]=1;grid[2][0]=1;grid[2][1]=1;grid[2][2]=1;grid[1][0]=2;}
  else if(t==='T'){grid[0][1]=1;grid[0][2]=1;grid[1][1]=1;grid[1][2]=1;grid[2][1]=1;}
  else if(t==='Z'){grid[0][0]=1;grid[0][1]=1;grid[1][1]=1;grid[1][2]=1;grid[2][2]=1;}
  else if(t==='U'){grid[0][0]=1;grid[0][2]=1;grid[1][0]=1;grid[1][1]=1;grid[1][2]=1;}
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function clearAll(){grid=Array.from({length:ROWS},()=>Array(COLS).fill(0));render();}

canvas.addEventListener('click', e=>{
  const r=canvas.getBoundingClientRect();
  const cellW=(W-80)/COLS, cellH=(H-80)/ROWS;
  const ox=40, oy=40;
  const c=Math.floor((e.clientX-r.left-ox)/cellW);
  const row=Math.floor((e.clientY-r.top-oy)/cellH);
  if(row>=0&&row<ROWS&&c>=0&&c<COLS){
    if(grid[row][c]>0) grid[row][c]=Math.min(grid[row][c]+1,MAX_H);
    else grid[row][c]=1;
    render();
  }
});
canvas.addEventListener('contextmenu', e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  const cellW=(W-80)/COLS, cellH=(H-80)/ROWS;
  const c=Math.floor((e.clientX-r.left-40)/cellW);
  const row=Math.floor((e.clientY-r.top-40)/cellH);
  if(row>=0&&row<ROWS&&c>=0&&c<COLS){grid[row][c]=0;render();}
});

function render(){
  const dpr=window.devicePixelRatio||1;
  W=canvas.clientWidth; H=canvas.clientHeight;
  canvas.width=W*dpr; canvas.height=H*dpr;
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  drawMainView();
  drawViews();
}

function drawMainView(){
  const cellW=Math.min((W-100)/COLS,(H-100)/ROWS,90);
  const cellH=cellW;
  const gw=COLS*cellW, gh=ROWS*cellH;
  const ox=(W-gw)/2, oy=(H-gh)/2;
  ctx.font='bold 13px sans-serif'; ctx.fillStyle='#1e293b'; ctx.textAlign='center';
  ctx.fillText('点击添加积木，右键移除',W/2,oy-12);
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const x=ox+c*cellW, y=oy+r*cellH, h=grid[r][c];
    if(h>0){
      for(let l=0;l<h;l++){
        const shade=lerpColor('#3B82F6','#0EA5E9',l/Math.max(h-1,1));
        ctx.fillStyle=shade; ctx.globalAlpha=0.3+l*0.2;
        const off=l*4;
        ctx.fillRect(x+off,y-off,cellW-4,cellH-4);
        ctx.globalAlpha=1;
      }
      ctx.fillStyle='#3B82F6'; ctx.globalAlpha=0.85;
      ctx.fillRect(x+(h-1)*4,y-(h-1)*4,cellW-4,cellH-4);
      ctx.globalAlpha=1;
      ctx.strokeStyle='#2563EB'; ctx.lineWidth=2;
      ctx.strokeRect(x+(h-1)*4,y-(h-1)*4,cellW-4,cellH-4);
      ctx.fillStyle='#fff'; ctx.font='bold 16px sans-serif'; ctx.textAlign='center';
      ctx.fillText(h,x+(h-1)*4+(cellW-4)/2,y-(h-1)*4+(cellH-4)/2+5);
    } else {
      ctx.fillStyle='#f1f5f9'; ctx.fillRect(x,y,cellW-4,cellH-4);
      ctx.strokeStyle='#cbd5e1'; ctx.lineWidth=1; ctx.strokeRect(x,y,cellW-4,cellH-4);
    }
  }
}

function lerpColor(a,b,t){
  const pa=parseInt(a.slice(1),16), pb=parseInt(b.slice(1),16);
  const r1=(pa>>16)&0xff,g1=(pa>>8)&0xff,b1=pa&0xff;
  const r2=(pb>>16)&0xff,g2=(pb>>8)&0xff,b2=pb&0xff;
  const r=Math.round(r1+(r2-r1)*t),g=Math.round(g1+(g2-g1)*t),bl=Math.round(b1+(b2-b1)*t);
  return `rgb(${r},${g},${bl})`;
}

function drawViews(){
  let total=0,maxH=0;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){total+=grid[r][c];maxH=Math.max(maxH,grid[r][c]);}
  document.getElementById('block-count').textContent=total;
  document.getElementById('max-h').textContent=maxH;
  drawOneView('cv-front','#3B82F6',(c)=>{let m=0;for(let r=0;r<ROWS;r++)m=Math.max(m,grid[r][c]);return m;},COLS);
  drawOneView('cv-side','#22c55e',(r)=>{let m=0;for(let c=0;c<COLS;c++)m=Math.max(m,grid[r][c]);return m;},ROWS);
  drawTopView();
}

function drawOneView(id,color,fn,count){
  const cv=document.getElementById(id);
  const c2=cv.getContext('2d');
  c2.clearRect(0,0,80,80);
  const cw=60/count, ch=60/MAX_H, ox=10, base=70;
  for(let i=0;i<count;i++){
    const h=fn(i);
    if(h>0){c2.fillStyle=color+'60';c2.fillRect(ox+i*cw,base-h*ch,cw-2,h*ch);c2.strokeStyle=color;c2.lineWidth=1.5;c2.strokeRect(ox+i*cw,base-h*ch,cw-2,h*ch);}
  }
  c2.strokeStyle='#cbd5e1';c2.lineWidth=1;c2.beginPath();c2.moveTo(ox,base);c2.lineTo(ox+60,base);c2.stroke();
}

function drawTopView(){
  const cv=document.getElementById('cv-top');
  const c2=cv.getContext('2d');
  c2.clearRect(0,0,80,80);
  const cw=60/COLS, ch2=60/ROWS, ox=10, oy2=10;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const x=ox+c*cw, y=oy2+r*ch2;
    if(grid[r][c]>0){
      const a=0.3+grid[r][c]/MAX_H*0.7;
      c2.fillStyle=`rgba(249,115,22,${a})`;c2.fillRect(x,y,cw-1,ch2-1);
      c2.strokeStyle='#f97316';c2.lineWidth=1;c2.strokeRect(x,y,cw-1,ch2-1);
    } else {
      c2.strokeStyle='#e2e8f0';c2.lineWidth=.5;c2.strokeRect(x,y,cw-1,ch2-1);
    }
  }
}

window.addEventListener('resize',render);
loadPreset('L');
setTimeout(render,50);
</script>
</body>
</html>
