<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>圆环面积 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 280px; height: 100%; }
    .canvas-area { padding: 16px; overflow: hidden; background: linear-gradient(135deg, #faf5ff 0%, #fdfaf4 100%); position: relative; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 12px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #e9d5ff; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .slider-row { display: flex; align-items: center; gap: 10px; }
    .slider-row input { flex: 1; }
    .slider-row .value-display { min-width: 40px; }
    .prop-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; background: #fff; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 13px; }
    .prop-label { color: #64748b; font-weight: 600; }
    .prop-value { font-weight: 700; color: #8b5cf6; font-family: 'Courier New', monospace; }
    .preset-btn { padding: 7px 0; border-radius: 8px; font-size: 12px; font-weight: 600; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; }
    .preset-btn:hover { border-color: #8b5cf6; color: #8b5cf6; background: #faf5ff; }
    .preset-btn.active { border-color: #8b5cf6; background: #f3e8ff; color: #7c3aed; }
    .formula-card { background: #fff; border: 2px solid #8b5cf6; border-radius: 14px; padding: 16px; position: absolute; bottom: 16px; left: 16px; right: 300px; z-index: 10; }
    .formula-step { display: flex; align-items: center; gap: 10px; padding: 5px 0; font-size: 14px; opacity: 0; transform: translateY(8px); transition: all .4s ease; }
    .formula-step.visible { opacity: 1; transform: translateY(0); }
    .formula-step .step-num { width: 22px; height: 22px; border-radius: 50%; background: #f3e8ff; color: #8b5cf6; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .formula-step .step-expr { font-family: 'Courier New', monospace; font-weight: 700; color: #334155; }
    .formula-step .step-result { margin-left: auto; font-weight: 800; color: #8b5cf6; font-size: 15px; }
    .formula-step.highlight-step .step-num { background: #8b5cf6; color: #fff; }
    .formula-step.highlight-step .step-result { color: #16a34a; }
    .anim-bar { position: absolute; bottom: 0; left: 0; height: 4px; background: linear-gradient(90deg, #8b5cf6, #a855f7); border-radius: 2px; transition: width 1.2s ease; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">⭕ 圆环面积</div>
      <div class="edu-toolbar-subtitle">上册 · 第五单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-accent" onclick="animateReveal()">动画演示</button>
      <button class="edu-btn edu-btn-outline" onclick="toggleConcentric()">同心圆</button>
      <button class="edu-btn edu-btn-outline" onclick="showFormula()">公式推导</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="cvs" style="width:100%;height:100%;cursor:default"></canvas>
        <div class="formula-card" id="formulaCard" style="display:none">
          <div id="formulaSteps"></div>
          <div class="anim-bar" id="animBar" style="width:0"></div>
        </div>
      </div>

      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">外圆半径 R</div>
          <div class="slider-row">
            <input type="range" id="rSlider" min="2" max="15" value="8" step="0.5" oninput="onSlider()"/>
            <span class="value-display" id="rVal">8</span>
          </div>
        </div>
        <div class="ctrl-section">
          <div class="ctrl-label">内圆半径 r</div>
          <div class="slider-row">
            <input type="range" id="innerSlider" min="1" max="14" value="4" step="0.5" oninput="onSlider()"/>
            <span class="value-display" id="innerVal">4</span>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">计算结果</div>
          <div class="prop-row"><span class="prop-label">S大 = πR²</span><span class="prop-value" id="propOuter">—</span></div>
          <div class="prop-row"><span class="prop-label">S小 = πr²</span><span class="prop-value" id="propInner">—</span></div>
          <div class="prop-row" style="background:#f3e8ff;border-color:#d8b4fe"><span class="prop-label" style="color:#7c3aed">S环</span><span class="prop-value" id="propAnnulus" style="font-size:16px">—</span></div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">生活实例</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
            <button class="preset-btn" data-preset="washer" onclick="loadPreset('washer')">垫圈</button>
            <button class="preset-btn" data-preset="donut" onclick="loadPreset('donut')">甜甜圈</button>
            <button class="preset-btn" data-preset="track" onclick="loadPreset('track')">跑道</button>
            <button class="preset-btn" data-preset="dart" onclick="loadPreset('dart')">飞镖靶</button>
          </div>
        </div>
        <div class="divider"></div>
        <div class="info-box" id="infoBox">
          <b>圆环面积公式</b><br/>
          ● S<sub>环</sub> = πR² − πr²<br/>
          ● S<sub>环</sub> = π(R² − r²)<br/>
          ● 圆环 = 大圆面积 − 小圆面积<br/>
          ● 拖拽圆环边缘可直接调整半径
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../edu-lib/edu-tools.js"></script>
<script>
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
let cx, cy, W, H, dpr;
let R = 8, r = 4;
let showConcentric = false;
let animFill = -1;       // -1 = off, 0..1 = fill progress
let formulaVisible = false;
let dragTarget = null;    // 'outer' | 'inner' | null
let hoverTarget = null;
let activePreset = null;

const PRESETS = {
  washer: { R: 5, r: 2, colors: ['#94a3b8','#cbd5e1'], label: '垫圈', info: '垫圈是典型的圆环零件。外圆 R=5cm，内圆 r=2cm。' },
  donut:  { R: 7, r: 3, colors: ['#f59e0b','#fde68a'], label: '甜甜圈', info: '甜甜圈的环状部分就是圆环。外圆 R=7cm，内圆 r=3cm。' },
  track:  { R: 10, r: 6, colors: ['#ef4444','#fca5a5'], label: '跑道', info: '环形跑道是圆环的应用。外圆 R=10cm，内圆 r=6cm。' },
  dart:   { R: 9, r: 1.5, colors: ['#22c55e','#86efac'], label: '飞镖靶', info: '飞镖靶每一环都是圆环。外圆 R=9cm，内圆 r=1.5cm。' }
};

function initCanvas() {
  const info = setupCanvas(cvs);
  W = info.w; H = info.h; dpr = window.devicePixelRatio || 1;
  cx = W / 2; cy = H / 2;
  render();
}

function scl() { return Math.min(W, H) / 36; }

function onSlider() {
  R = parseFloat(document.getElementById('rSlider').value);
  r = parseFloat(document.getElementById('innerSlider').value);
  if (r >= R) { r = Math.max(0.5, R - 0.5); document.getElementById('innerSlider').value = r; }
  document.getElementById('innerSlider').max = R - 0.5;
  activePreset = null;
  updatePresetBtns();
  render();
}

function syncSliders() {
  document.getElementById('rSlider').value = R;
  document.getElementById('innerSlider').value = r;
  document.getElementById('innerSlider').max = R - 0.5;
  document.getElementById('rVal').textContent = R;
  document.getElementById('innerVal').textContent = r;
}

function updateProps() {
  const So = Math.PI * R * R, Si = Math.PI * r * r, Sa = So - Si;
  document.getElementById('rVal').textContent = R;
  document.getElementById('innerVal').textContent = r;
  document.getElementById('propOuter').textContent = So.toFixed(2) + ' cm²';
  document.getElementById('propInner').textContent = Si.toFixed(2) + ' cm²';
  document.getElementById('propAnnulus').textContent = Sa.toFixed(2) + ' cm²';
}

function getAnnulusColor(alpha) {
  const p = PRESETS[activePreset];
  if (p) {
    const c = p.colors[0];
    const rr = parseInt(c.slice(1,3),16), gg = parseInt(c.slice(3,5),16), bb = parseInt(c.slice(5,7),16);
    return `rgba(${rr},${gg},${bb},${alpha})`;
  }
  return `rgba(139,92,246,${alpha})`;
}

function render() {
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);
  drawGrid(ctx, W, H, 30, '#f1f5f9');

  const s = scl();
  const Rpx = R * s, rpx = r * s;

  // Concentric rings
  if (showConcentric) {
    for (let i = 6; i >= 1; i--) {
      ctx.beginPath();
      ctx.arc(cx, cy, (R * i / 6) * s, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(139,92,246,${0.06 + 0.04 * i})`;
      ctx.lineWidth = 1; ctx.stroke();
    }
  }

  // Outer circle fill
  ctx.beginPath();
  ctx.arc(cx, cy, Rpx, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(139,92,246,0.06)';
  ctx.fill();

  // Animated area fill
  if (animFill >= 0 && animFill <= 1) {
    const endAngle = Math.PI * 2 * animFill;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, Rpx, 0, endAngle);
    ctx.closePath();
    ctx.fillStyle = getAnnulusColor(0.2);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, rpx, 0, endAngle);
    ctx.closePath();
    ctx.fillStyle = '#fff';
    ctx.fill();

    // Sweep line
    if (animFill < 1) {
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Rpx * Math.cos(endAngle), cy + Rpx * Math.sin(endAngle));
      ctx.strokeStyle = '#8b5cf6';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  // Annulus shading
  ctx.beginPath();
  ctx.arc(cx, cy, Rpx, 0, Math.PI * 2);
  ctx.arc(cx, cy, rpx, 0, Math.PI * 2, true);
  ctx.fillStyle = getAnnulusColor(animFill >= 1 ? 0.35 : 0.15);
  ctx.fill();

  // Outer circle stroke
  ctx.beginPath(); ctx.arc(cx, cy, Rpx, 0, Math.PI * 2);
  ctx.strokeStyle = hoverTarget === 'outer' ? '#7c3aed' : '#8b5cf6';
  ctx.lineWidth = hoverTarget === 'outer' ? 3 : 2; ctx.stroke();

  // Inner circle stroke + white fill
  ctx.beginPath(); ctx.arc(cx, cy, rpx, 0, Math.PI * 2);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.strokeStyle = hoverTarget === 'inner' ? '#9333ea' : '#a855f7';
  ctx.lineWidth = hoverTarget === 'inner' ? 3 : 2; ctx.stroke();

  // Radius lines
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(cx, cy); ctx.lineTo(cx + Rpx, cy);
  ctx.strokeStyle = '#8b5cf6'; ctx.lineWidth = 2; ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(cx, cy); ctx.lineTo(cx, cy - rpx);
  ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 2; ctx.stroke();
  ctx.setLineDash([]);

  // Radius labels
  ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillStyle = '#8b5cf6';
  ctx.fillText('R=' + R, cx + Rpx / 2, cy - 10);
  ctx.fillStyle = '#a855f7';
  ctx.fillText('r=' + r, cx + 14, cy - rpx / 2);

  // Drag handles
  drawHandle(cx + Rpx, cy, hoverTarget === 'outer' || dragTarget === 'outer');
  drawHandle(cx, cy - rpx, hoverTarget === 'inner' || dragTarget === 'inner');

  // Center dot
  ctx.beginPath();
  ctx.arc(cx, cy, 4, 0, Math.PI * 2);
  ctx.fillStyle = '#334155'; ctx.fill();

  // Life-like preset overlay
  if (activePreset && animFill >= 1) drawPresetOverlay(Rpx, rpx);

  ctx.restore();
  updateProps();
}

function drawHandle(x, y, active) {
  ctx.beginPath();
  ctx.arc(x, y, active ? 8 : 6, 0, Math.PI * 2);
  ctx.fillStyle = active ? '#7c3aed' : '#fff';
  ctx.fill();
  ctx.strokeStyle = '#8b5cf6'; ctx.lineWidth = 2; ctx.stroke();
}

function drawPresetOverlay(Rpx, rpx) {
  const p = PRESETS[activePreset];
  if (!p) return;
  ctx.save();
  ctx.globalAlpha = 0.6;
  ctx.font = 'bold 12px sans-serif';
  ctx.fillStyle = p.colors[0];
  ctx.textAlign = 'center';
  ctx.fillText(p.label, cx, cy + Rpx + 20);
  ctx.globalAlpha = 1;
  ctx.restore();
}

// --- Drag interaction ---
function getHit(mx, my) {
  const s = scl();
  const dOuter = Math.abs(Math.hypot(mx - cx, my - cy) - R * s);
  const dInner = Math.abs(Math.hypot(mx - cx, my - cy) - r * s);
  if (dOuter < 12) return 'outer';
  if (dInner < 12) return 'inner';
  return null;
}

cvs.addEventListener('mousemove', function(e) {
  const rect = cvs.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  if (dragTarget) {
    const dist = Math.hypot(mx - cx, my - cy);
    const s = scl();
    const newR = clamp(dist / s, 1, 15);
    if (dragTarget === 'outer') {
      R = Math.round(newR * 2) / 2;
      if (R <= r) R = r + 0.5;
    } else {
      r = Math.round(newR * 2) / 2;
      if (r >= R) r = R - 0.5;
      if (r < 0.5) r = 0.5;
    }
    syncSliders(); render();
  } else {
    const hit = getHit(mx, my);
    if (hit !== hoverTarget) { hoverTarget = hit; render(); }
    cvs.style.cursor = hit ? 'grab' : 'default';
  }
});

cvs.addEventListener('mousedown', function(e) {
  const rect = cvs.getBoundingClientRect();
  const hit = getHit(e.clientX - rect.left, e.clientY - rect.top);
  if (hit) { dragTarget = hit; cvs.style.cursor = 'grabbing'; }
});
document.addEventListener('mouseup', function() {
  if (dragTarget) { dragTarget = null; cvs.style.cursor = 'default'; render(); }
});

cvs.addEventListener('touchstart', function(e) {
  const rect = cvs.getBoundingClientRect();
  const mx = e.touches[0].clientX - rect.left, my = e.touches[0].clientY - rect.top;
  const hit = getHit(mx, my);
  if (hit) { dragTarget = hit; e.preventDefault(); }
}, { passive: false });
cvs.addEventListener('touchmove', function(e) {
  if (!dragTarget) return;
  e.preventDefault();
  const rect = cvs.getBoundingClientRect();
  const mx = e.touches[0].clientX - rect.left, my = e.touches[0].clientY - rect.top;
  const dist = Math.hypot(mx - cx, my - cy);
  const s = scl();
  if (dragTarget === 'outer') { R = clamp(Math.round(dist / s * 2) / 2, 1, 15); if (R <= r) R = r + 0.5; }
  else { r = clamp(Math.round(dist / s * 2) / 2, 0.5, 14); if (r >= R) r = R - 0.5; }
  syncSliders(); render();
}, { passive: false });
cvs.addEventListener('touchend', function() { dragTarget = null; render(); });

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// --- Animated area reveal ---
let animFrame = null;
function animateReveal() {
  if (animFrame) cancelAnimationFrame(animFrame);
  animFill = 0;
  const start = performance.now();
  const duration = 1500;
  function tick(now) {
    const t = Math.min((now - start) / duration, 1);
    animFill = easeOutCubic(t);
    render();
    if (t < 1) animFrame = requestAnimationFrame(tick);
    else { animFill = 1; render(); }
  }
  animFrame = requestAnimationFrame(tick);
}

function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

// --- Concentric circles ---
function toggleConcentric() {
  showConcentric = !showConcentric;
  render();
}

// --- Formula step-by-step animation ---
function showFormula() {
  const card = document.getElementById('formulaCard');
  if (formulaVisible) { card.style.display = 'none'; formulaVisible = false; return; }
  formulaVisible = true;
  card.style.display = 'block';
  const So = Math.PI * R * R, Si = Math.PI * r * r, Sa = So - Si;
  const steps = [
    { n: 1, expr: `S<sub>大</sub> = π × R² = π × ${R}²`, result: So.toFixed(2) },
    { n: 2, expr: `S<sub>小</sub> = π × r² = π × ${r}²`, result: Si.toFixed(2) },
    { n: 3, expr: `S<sub>环</sub> = π(R² − r²) = π(${R*R} − ${r*r})`, result: '' },
    { n: 4, expr: `S<sub>环</sub> = π × ${R*R - r*r}`, result: Sa.toFixed(2) + ' cm²' }
  ];
  const container = document.getElementById('formulaSteps');
  container.innerHTML = steps.map((s, i) =>
    `<div class="formula-step" id="fstep${i}">` +
    `<span class="step-num">${s.n}</span>` +
    `<span class="step-expr">${s.expr}</span>` +
    `<span class="step-result">${s.result}</span></div>`
  ).join('');

  const bar = document.getElementById('animBar');
  bar.style.width = '0';
  steps.forEach((_, i) => {
    setTimeout(() => {
      const el = document.getElementById('fstep' + i);
      if (el) { el.classList.add('visible'); if (i === steps.length - 1) el.classList.add('highlight-step'); }
      bar.style.width = ((i + 1) / steps.length * 100) + '%';
    }, 400 * (i + 1));
  });
}

function loadPreset(name) {
  const p = PRESETS[name]; if (!p) return;
  R = p.R; r = p.r; activePreset = name;
  syncSliders(); updatePresetBtns();
  document.getElementById('infoBox').innerHTML =
    `<b>${p.label}</b><br/>${p.info}<br/><br/>● S<sub>环</sub> = π(${R}² − ${r}²) = <b>${(Math.PI * (R*R - r*r)).toFixed(2)}</b> cm²`;
  animateReveal(); render();
}

function updatePresetBtns() {
  document.querySelectorAll('.preset-btn[data-preset]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.preset === activePreset);
  });
}

function resetAll() {
  R = 8; r = 4; animFill = -1; showConcentric = false; formulaVisible = false; activePreset = null;
  if (animFrame) cancelAnimationFrame(animFrame);
  document.getElementById('formulaCard').style.display = 'none';
  syncSliders(); updatePresetBtns();
  document.getElementById('infoBox').innerHTML =
    '<b>圆环面积公式</b><br/>● S<sub>环</sub> = πR² − πr²<br/>● S<sub>环</sub> = π(R² − r²)<br/>● 圆环 = 大圆面积 − 小圆面积<br/>● 拖拽圆环边缘可直接调整半径';
  render();
}

window.addEventListener('resize', initCanvas);
initCanvas();
</script>
</body>
</html>
