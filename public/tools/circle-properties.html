<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>圆的性质 — 教立方</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
*{box-sizing:border-box}body{font-family:var(--edu-font);margin:0}
.tool{width:100vw;height:100vh;display:flex;flex-direction:column;background:var(--edu-bg)}
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#fff;border-bottom:1px solid var(--edu-border)}
.toolbar h1{font-size:15px;color:var(--edu-primary);margin:0}
.toolbar span{font-size:11px;color:var(--edu-text-muted);background:#f1f5f9;padding:2px 8px;border-radius:12px}
.main{flex:1;display:grid;grid-template-columns:1fr 290px;overflow:hidden}
.canvas-wrap{position:relative;overflow:hidden;background:linear-gradient(135deg,#fdf4ff,#faf5ff)}
.canvas-wrap canvas{width:100%;height:100%;display:block}
.panel{background:#fff;border-left:1px solid var(--edu-border);padding:12px;display:flex;flex-direction:column;gap:8px;overflow:auto}
.section{display:flex;flex-direction:column;gap:4px}
.label{font-size:10px;font-weight:700;color:#64748b;letter-spacing:.05em}
.divider{height:1px;background:var(--edu-border)}
.btn{padding:6px 12px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--edu-font);transition:all .15s}
.btn.active{background:var(--edu-primary);color:#fff}
.btn-default{background:#f1f5f9;color:#334155}
.btn-default:hover{background:#e2e8f0}
.row{display:flex;gap:4px;flex-wrap:wrap}
.slider-row{display:flex;align-items:center;gap:6px}
.slider-row label{font-size:11px;font-weight:700;min-width:40px}
.slider-row input[type=range]{flex:1}
.slider-row .val{font-size:12px;font-weight:800;min-width:40px;text-align:right;color:#7c3aed}

.topic-card{padding:6px;border:2px solid #e2e8f0;border-radius:8px;cursor:pointer;transition:all .15s;text-align:center;font-size:11px;font-weight:700}
.topic-card:hover{border-color:#8b5cf6}
.topic-card.active{border-color:#8b5cf6;background:#f5f3ff;color:#6d28d9}

.quiz-card{background:#f5f3ff;border:2px solid #c4b5fd;border-radius:12px;padding:10px;text-align:center}
.quiz-q{font-size:13px;font-weight:700;color:#6d28d9}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px}
.quiz-opt{padding:6px;border:2px solid #e2e8f0;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;font-family:var(--edu-font)}
.quiz-opt:hover{border-color:#8b5cf6}
.quiz-opt.correct{background:#dcfce7;border-color:#22c55e}
.quiz-opt.wrong{background:#fef2f2;border-color:#ef4444}
.quiz-result{font-size:11px;font-weight:700;margin-top:4px;min-height:16px}

.info{font-size:11px;line-height:1.8;color:#334155;background:#fff;border:1px solid #c4b5fd;border-radius:8px;padding:8px 10px}
.info b{color:#6d28d9}
</style>
</head>
<body>
<div class="tool">
  <div class="toolbar"><h1>⭕ 圆的性质</h1><span>九年级上册 · 第二十四章</span></div>
  <div class="main">
    <div class="canvas-wrap"><canvas id="cv"></canvas></div>
    <div class="panel">
      <div class="section">
        <div class="label">选择主题</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px">
          <div class="topic-card active" id="tc-radius" onclick="setTopic('radius')">半径与直径</div>
          <div class="topic-card" id="tc-arc" onclick="setTopic('arc')">弧长与扇形</div>
          <div class="topic-card" id="tc-chord" onclick="setTopic('chord')">弦与圆心角</div>
          <div class="topic-card" id="tc-tangent" onclick="setTopic('tangent')">切线</div>
          <div class="topic-card" id="tc-inscribed" onclick="setTopic('inscribed')">圆周角</div>
          <div class="topic-card" id="tc-area" onclick="setTopic('area')">面积</div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">调节参数</div>
        <div class="slider-row"><label>半径=</label><input type="range" id="sl-r" min="2" max="8" value="4" oninput="onSlider()"/><div class="val" id="vr">4</div></div>
        <div class="slider-row"><label>角度=</label><input type="range" id="sl-angle" min="10" max="360" value="90" oninput="onSlider()"/><div class="val" id="vang">90°</div></div>
      </div>
      <div class="divider"></div>
      <div style="background:#f5f3ff;border:1px solid #c4b5fd;border-radius:8px;padding:8px;font-size:11px;line-height:2" id="explain"></div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">圆的性质测验</div>
        <div class="quiz-card" id="quiz-card"></div>
      </div>
      <div class="divider"></div>
      <div class="info">
        <b>圆的重要公式</b><br/>
        ● <strong>周长</strong> C = 2πr<br/>
        ● <strong>面积</strong> S = πr²<br/>
        ● <strong>弧长</strong> l = nπr/180<br/>
        ● <strong>扇形面积</strong> S = nπr²/360<br/>
        ● <strong>圆周角</strong> = 圆心角 ÷ 2
      </div>
    </div>
  </div>
</div>
<script>
var cv, ctx, _topic = 'radius', _r = 4, _angle = 90;

function init() {
  cv = document.getElementById('cv');
  ctx = cv.getContext('2d');
  window.addEventListener('resize', resize);
  resize();
  updateExplain();
  nextQuiz();
}

function resize() {
  var r = cv.parentElement.getBoundingClientRect();
  cv.width = r.width * devicePixelRatio;
  cv.height = r.height * devicePixelRatio;
  cv.style.width = r.width + 'px';
  cv.style.height = r.height + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  draw();
}

function onSlider() {
  _r = parseInt(document.getElementById('sl-r').value);
  _angle = parseInt(document.getElementById('sl-angle').value);
  document.getElementById('vr').textContent = _r;
  document.getElementById('vang').textContent = _angle + '°';
  updateExplain();
  draw();
}

function setTopic(t) {
  _topic = t;
  ['radius','arc','chord','tangent','inscribed','area'].forEach(function(k) {
    document.getElementById('tc-' + k).className = 'topic-card' + (k === t ? ' active' : '');
  });
  updateExplain();
  draw();
}

function updateExplain() {
  var el = document.getElementById('explain');
  var aRad = _angle * Math.PI / 180;
  var circ = 2 * Math.PI * _r;
  var area = Math.PI * _r * _r;
  var arcLen = _angle * Math.PI * _r / 180;
  var sectorArea = _angle * Math.PI * _r * _r / 360;

  var texts = {
    radius: '<b>半径与直径</b><br/>' +
      '半径 r = ' + _r + '<br/>' +
      '直径 d = 2r = ' + (2 * _r) + '<br/>' +
      '周长 C = 2πr = ' + circ.toFixed(2) + '<br/>' +
      '面积 S = πr² = ' + area.toFixed(2),
    arc: '<b>弧长与扇形</b><br/>' +
      '圆心角 = ' + _angle + '°<br/>' +
      '弧长 l = ' + _angle + '×π×' + _r + '/180 = ' + arcLen.toFixed(2) + '<br/>' +
      '扇形面积 = ' + _angle + '×π×' + _r + '²/360 = ' + sectorArea.toFixed(2) + '<br/>' +
      '占整圆比例 = ' + (_angle / 360 * 100).toFixed(1) + '%',
    chord: '<b>弦与圆心角</b><br/>' +
      '圆心角 = ' + _angle + '°<br/>' +
      '弦长 = 2r×sin(θ/2) = 2×' + _r + '×sin(' + _angle + '°/2) = ' + (2 * _r * Math.sin(aRad / 2)).toFixed(2) + '<br/>' +
      '弦心距 = r×cos(θ/2) = ' + (_r * Math.cos(aRad / 2)).toFixed(2),
    tangent: '<b>切线性质</b><br/>' +
      '切线⊥过切点的半径<br/>' +
      '切点角度：' + _angle + '°<br/>' +
      '切线长 = r×tan(θ) = ' + (_r * Math.tan(aRad)).toFixed(2) + '<br/>' +
      '<em>拖动角度查看切线变化</em>',
    inscribed: '<b>圆周角定理</b><br/>' +
      '圆心角 = ' + _angle + '°<br/>' +
      '圆周角 = 圆心角÷2 = ' + (_angle / 2) + '°<br/>' +
      '同弧上的圆周角相等<br/>' +
      '半圆上的圆周角 = 90°',
    area: '<b>圆面积</b><br/>' +
      'r = ' + _r + '<br/>' +
      'S = πr² = π×' + _r + '² = ' + area.toFixed(2) + '<br/>' +
      '周长 C = 2πr = ' + circ.toFixed(2) + '<br/>' +
      '环形面积(外r=' + (_r + 2) + ') = ' + (Math.PI * ((_r + 2) * (_r + 2) - _r * _r)).toFixed(2),
  };
  el.innerHTML = texts[_topic];
}

function draw() {
  var w = cv.width / devicePixelRatio, h = cv.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  var scale = Math.min(w, h) * 0.055;
  var cx = w / 2, cy = h / 2;
  var R = _r * scale;
  var aRad = _angle * Math.PI / 180;

  switch (_topic) {
    case 'radius': drawRadius(w, h, cx, cy, R, scale); break;
    case 'arc': drawArc(w, h, cx, cy, R, aRad, scale); break;
    case 'chord': drawChord(w, h, cx, cy, R, aRad, scale); break;
    case 'tangent': drawTangent(w, h, cx, cy, R, aRad, scale); break;
    case 'inscribed': drawInscribed(w, h, cx, cy, R, aRad, scale); break;
    case 'area': drawArea(w, h, cx, cy, R, scale); break;
  }
}

function drawCircle(cx, cy, R) {
  ctx.strokeStyle = '#7c3aed'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.stroke();
}

function drawPoint(x, y, color, label, ox, oy) {
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1e293b'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(label, x + (ox || 0), y + (oy || 0));
}

function drawRadius(w, h, cx, cy, R, scale) {
  drawCircle(cx, cy, R);

  // Center
  drawPoint(cx, cy, '#7c3aed', 'O', -12, 18);

  // Radius line
  ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + R, cy); ctx.stroke();
  drawPoint(cx + R, cy, '#ef4444', 'A', 0, 18);

  // Label r
  ctx.fillStyle = '#ef4444'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('r=' + _r, cx + R / 2, cy - 8);

  // Diameter line
  ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(cx - R, cy); ctx.lineTo(cx + R, cy); ctx.stroke();
  drawPoint(cx - R, cy, '#3b82f6', 'B', 0, 18);
  ctx.fillStyle = '#3b82f6'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('d=' + (2 * _r), cx, cy + 35);

  // Formulas
  ctx.fillStyle = '#6d28d9'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('C = 2πr = ' + (2 * Math.PI * _r).toFixed(2), cx, cy + R + 40);
  ctx.fillText('S = πr² = ' + (Math.PI * _r * _r).toFixed(2), cx, cy + R + 60);
}

function drawArc(w, h, cx, cy, R, aRad, scale) {
  drawCircle(cx, cy, R);

  // Center
  drawPoint(cx, cy, '#7c3aed', 'O', -12, 18);

  // Sector fill
  ctx.fillStyle = '#7c3aed22';
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, R, -aRad, 0); ctx.closePath(); ctx.fill();

  // Arc (highlighted)
  ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(cx, cy, R, -aRad, 0); ctx.stroke();

  // Two radius lines
  ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + R, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + R * Math.cos(-aRad), cy + R * Math.sin(-aRad)); ctx.stroke();

  drawPoint(cx + R, cy, '#3b82f6', 'A', 0, 18);
  drawPoint(cx + R * Math.cos(-aRad), cy + R * Math.sin(-aRad), '#3b82f6', 'B', -16, -8);

  // Angle arc
  ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, cy, 25, -aRad, 0); ctx.stroke();
  ctx.fillStyle = '#92400e'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(_angle + '°', cx + 35, cy - 8);

  // Arc length text
  var arcLen = _angle * Math.PI * _r / 180;
  var sectorArea = _angle * Math.PI * _r * _r / 360;
  ctx.fillStyle = '#6d28d9'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('弧长 l = ' + arcLen.toFixed(2), cx, cy + R + 40);
  ctx.fillText('扇形面积 = ' + sectorArea.toFixed(2), cx, cy + R + 60);
}

function drawChord(w, h, cx, cy, R, aRad, scale) {
  drawCircle(cx, cy, R);
  drawPoint(cx, cy, '#7c3aed', 'O', -12, 18);

  // Chord
  var Ax = cx + R * Math.cos(-aRad / 2), Ay = cy + R * Math.sin(-aRad / 2);
  var Bx = cx + R * Math.cos(aRad / 2), By = cy + R * Math.sin(aRad / 2);

  ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(Ax, Ay); ctx.lineTo(Bx, By); ctx.stroke();

  drawPoint(Ax, Ay, '#ef4444', 'A', -14, -8);
  drawPoint(Bx, By, '#ef4444', 'B', 14, -8);

  // Radius to chord endpoints
  ctx.strokeStyle = '#3b82f688'; ctx.lineWidth = 1.5; ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(Ax, Ay); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(Bx, By); ctx.stroke();
  ctx.setLineDash([]);

  // Perpendicular from center to chord
  var mx = (Ax + Bx) / 2, my = (Ay + By) / 2;
  ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 2; ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(mx, my); ctx.stroke();
  ctx.setLineDash([]);

  // Right angle mark
  var dx = mx - cx, dy = my - cy;
  var dLen = Math.sqrt(dx * dx + dy * dy);
  if (dLen > 0) {
    var nx = dx / dLen * 8, ny = dy / dLen * 8;
    var px = (mx - Ax), py = (my - Ay);
    var pLen = Math.sqrt(px * px + py * py);
    if (pLen > 0) { px /= pLen * 8; py /= pLen * 8; }
    ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(mx - nx, my - ny);
    ctx.lineTo(mx - nx + px * 8, my - ny + py * 8);
    ctx.lineTo(mx + px * 8, my + py * 8);
    ctx.stroke();
  }

  drawPoint(mx, my, '#22c55e', 'M', 14, 14);

  // Angle arc at center
  ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, cy, 25, -aRad / 2, aRad / 2); ctx.stroke();

  // Info
  var chordLen = 2 * _r * Math.sin(aRad / 2);
  var dist = _r * Math.cos(aRad / 2);
  ctx.fillStyle = '#6d28d9'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('弦长 AB = ' + chordLen.toFixed(2), cx, cy + R + 40);
  ctx.fillText('弦心距 OM = ' + (dist * scale / scale).toFixed(2), cx, cy + R + 60);
}

function drawTangent(w, h, cx, cy, R, aRad, scale) {
  drawCircle(cx, cy, R);
  drawPoint(cx, cy, '#7c3aed', 'O', -12, 18);

  // Tangent point
  var tx = cx + R, ty = cy;
  drawPoint(tx, ty, '#ef4444', 'P', 0, 18);

  // Radius to tangent point (perpendicular)
  ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(tx, ty); ctx.stroke();
  ctx.fillStyle = '#3b82f6'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('r=' + _r, cx + R / 2, cy - 10);

  // Tangent line (perpendicular to radius)
  ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2.5;
  var tLen = R * 1.5;
  ctx.beginPath(); ctx.moveTo(tx, ty - tLen); ctx.lineTo(tx, ty + tLen); ctx.stroke();

  // Right angle mark
  ctx.strokeStyle = '#334155'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(tx - 10, ty); ctx.lineTo(tx - 10, ty - 10); ctx.lineTo(tx, ty - 10);
  ctx.stroke();

  // Labels
  ctx.fillStyle = '#6d28d9'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('切线 ⊥ 半径', cx, cy + R + 40);
  ctx.fillText('过切点的半径垂直于切线', cx, cy + R + 60);
}

function drawInscribed(w, h, cx, cy, R, aRad, scale) {
  drawCircle(cx, cy, R);
  drawPoint(cx, cy, '#7c3aed', 'O', -12, 18);

  // Arc points
  var Ax = cx + R, Ay = cy;
  var Bx = cx + R * Math.cos(aRad), By = cy - R * Math.sin(aRad);
  var midAngle = aRad / 2;

  drawPoint(Ax, Ay, '#3b82f6', 'A', 14, 8);
  drawPoint(Bx, By, '#3b82f6', 'B', Bx > cx ? 14 : -14, -8);

  // Central angle
  ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(Ax, Ay); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(Bx, By); ctx.stroke();

  // Angle arc at center
  ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, cy, 25, -aRad, 0); ctx.stroke();
  ctx.fillStyle = '#1d4ed8'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('圆心角=' + _angle + '°', cx + 45, cy - 12);

  // Inscribed angle point on circle (at midpoint angle from other side)
  var iAngle = Math.PI + midAngle;
  var Cx = cx + R * Math.cos(iAngle), Cy = cy - R * Math.sin(iAngle);
  drawPoint(Cx, Cy, '#ef4444', 'C', -14, 8);

  // Inscribed angle lines
  ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(Cx, Cy); ctx.lineTo(Ax, Ay); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(Cx, Cy); ctx.lineTo(Bx, By); ctx.stroke();

  // Arc (AB)
  ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(cx, cy, R + 8, 0, -aRad, true); ctx.stroke();

  // Inscribed angle arc
  var iStart = Math.atan2(Ay - Cy, Ax - Cx);
  var iEnd = Math.atan2(By - Cy, Bx - Cx);
  ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(Cx, Cy, 20, iEnd, iStart); ctx.stroke();
  ctx.fillStyle = '#dc2626'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('圆周角=' + (_angle / 2) + '°', Cx - 30, Cy + 20);

  // Formula
  ctx.fillStyle = '#6d28d9'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('圆周角 = 圆心角 ÷ 2 = ' + _angle + '° ÷ 2 = ' + (_angle / 2) + '°', cx, cy + R + 40);
}

function drawArea(w, h, cx, cy, R, scale) {
  drawCircle(cx, cy, R);

  // Fill circle
  ctx.fillStyle = '#7c3aed22';
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.fill();

  drawPoint(cx, cy, '#7c3aed', 'O', -12, 18);

  // Outer ring for comparison
  var outerR = (_r + 2) * scale;
  ctx.strokeStyle = '#3b82f688'; ctx.lineWidth = 2; ctx.setLineDash([6, 4]);
  ctx.beginPath(); ctx.arc(cx, cy, outerR, 0, Math.PI * 2); ctx.stroke();
  ctx.setLineDash([]);

  // Ring fill
  ctx.fillStyle = '#3b82f611';
  ctx.beginPath(); ctx.arc(cx, cy, outerR, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#7c3aed22';
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.fill();

  // Labels
  ctx.fillStyle = '#7c3aed'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('r=' + _r, cx, cy);
  ctx.fillStyle = '#3b82f6';
  ctx.fillText('R=' + (_r + 2), cx, cy - outerR - 8);

  // Formula text
  var innerArea = Math.PI * _r * _r;
  var outerArea = Math.PI * (_r + 2) * (_r + 2);
  ctx.fillStyle = '#6d28d9'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('内圆面积 = ' + innerArea.toFixed(2), cx, cy + R + 35);
  ctx.fillText('环形面积 = ' + (outerArea - innerArea).toFixed(2), cx, cy + R + 55);
}

// ===== Quiz =====
var _quizQs = [
  { q: '圆的面积公式是？', opts: ['2πr', 'πr²', 'πd', '2πr²'], ans: 1 },
  { q: '圆的周长公式是？', opts: ['πr²', '2πr', 'πr', '4πr'], ans: 1 },
  { q: '圆周角等于圆心角的？', opts: ['2倍', '一半', '相等', '3倍'], ans: 1 },
  { q: '半径为3的圆的面积是？', opts: ['6π', '9π', '3π', '12π'], ans: 1 },
  { q: '切线与半径的关系是？', opts: ['平行', '垂直', '成45°角', '不确定'], ans: 1 },
  { q: '直径所对的圆周角是？', opts: ['45°', '60°', '90°', '180°'], ans: 2 },
];
var _qi = 0, _score = 0;

function nextQuiz() {
  if (_qi >= _quizQs.length) {
    document.getElementById('quiz-card').innerHTML = '<div class="quiz-q">测验完成！答对 ' + _score + ' / ' + _quizQs.length + ' 题</div>';
    return;
  }
  var q = _quizQs[_qi];
  var html = '<div class="quiz-q">第' + (_qi + 1) + '题：' + q.q + '</div><div class="quiz-opts">';
  q.opts.forEach(function(o, i) { html += '<button class="quiz-opt" onclick="answer(' + i + ')">' + o + '</button>'; });
  html += '</div><div class="quiz-result" id="qr"></div>';
  document.getElementById('quiz-card').innerHTML = html;
}

function answer(idx) {
  var q = _quizQs[_qi];
  var opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(function(b, i) { b.onclick = null; b.style.cursor = 'default';
    if (i === q.ans) b.classList.add('correct');
    if (i === idx && i !== q.ans) b.classList.add('wrong');
  });
  var r = document.getElementById('qr');
  if (idx === q.ans) { r.textContent = '✓ 正确！'; r.style.color = '#16a34a'; _score++; }
  else { r.textContent = '✗ 正确答案：' + q.opts[q.ans]; r.style.color = '#ef4444'; }
  _qi++; setTimeout(nextQuiz, 1200);
}

init();
</script>

</html>
