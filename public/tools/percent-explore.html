<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>百分数的认识 — 教立方</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
  * { box-sizing:border-box; }
  body { font-family:var(--edu-font); margin:0; }
  .tool { width:100vw; height:100vh; display:flex; flex-direction:column; background:var(--edu-bg); }
  .toolbar { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:#fff; border-bottom:1px solid var(--edu-border); }
  .toolbar h1 { font-size:15px; color:var(--edu-primary); margin:0; }
  .toolbar span { font-size:11px; color:var(--edu-text-muted); background:#f1f5f9; padding:2px 8px; border-radius:12px; }
  .main { flex:1; display:grid; grid-template-columns:1fr 290px; overflow:hidden; }
  .canvas-wrap { position:relative; overflow:hidden; background:linear-gradient(135deg,#fef3c7,#fffbeb); }
  .canvas-wrap canvas { width:100%; height:100%; display:block; }
  .panel { background:#fff; border-left:1px solid var(--edu-border); padding:12px; display:flex; flex-direction:column; gap:8px; overflow:auto; }
  .section { display:flex; flex-direction:column; gap:4px; }
  .label { font-size:10px; font-weight:700; color:#64748b; letter-spacing:.05em; }
  .divider { height:1px; background:var(--edu-border); }
  .btn { padding:6px 12px; border:none; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer; font-family:var(--edu-font); transition:all .15s; }
  .btn-default { background:#f1f5f9; color:#334155; }
  .btn-default:hover { background:#e2e8f0; }
  .row { display:flex; gap:4px; flex-wrap:wrap; }
  .slider-row { display:flex; align-items:center; gap:6px; }
  .slider-row label { font-size:11px; font-weight:700; min-width:32px; }
  .slider-row input[type=range] { flex:1; }
  .slider-row .val { font-size:13px; font-weight:800; min-width:44px; text-align:right; color:#b45309; }

  .triple-card { display:grid; grid-template-columns:1fr 1fr 1fr; gap:4px; text-align:center; }
  .triple-item { padding:8px; border-radius:10px; }
  .triple-item .val { font-size:20px; font-weight:800; }
  .triple-item .lbl { font-size:9px; font-weight:700; margin-top:2px; }

  .quiz-card { background:#fffbeb; border:2px solid #fbbf24; border-radius:12px; padding:10px; text-align:center; }
  .quiz-q { font-size:13px; font-weight:700; color:#92400e; }
  .quiz-opts { display:grid; grid-template-columns:1fr 1fr; gap:4px; margin-top:6px; }
  .quiz-opt { padding:6px; border:2px solid #e2e8f0; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; background:#fff; font-family:var(--edu-font); }
  .quiz-opt:hover { border-color:#f59e0b; }
  .quiz-opt.correct { background:#dcfce7; border-color:#22c55e; }
  .quiz-opt.wrong { background:#fef2f2; border-color:#ef4444; }
  .quiz-result { font-size:11px; font-weight:700; margin-top:4px; min-height:16px; }

  .info { font-size:11px; line-height:1.8; color:#334155; background:#fff; border:1px solid #fde68a; border-radius:8px; padding:8px 10px; }
  .info b { color:#92400e; }
</style>
</head>
<body>
<div class="tool">
  <div class="toolbar">
    <h1>💯 百分数的认识</h1>
    <span>六年级上册 · 第六单元</span>
  </div>
  <div class="main">
    <div class="canvas-wrap"><canvas id="cv"></canvas></div>
    <div class="panel">
      <div class="section">
        <div class="label">调节百分数</div>
        <div class="slider-row">
          <label>值</label>
          <input type="range" id="sl-pct" min="0" max="100" value="60" oninput="setPct(parseInt(this.value))"/>
          <div class="val" id="sl-val">60%</div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="triple-card">
        <div class="triple-item" style="background:#fef3c7"><div class="val" style="color:#b45309" id="t-pct">60%</div><div class="lbl" style="color:#b45309">百分数</div></div>
        <div class="triple-item" style="background:#dcfce7"><div class="val" style="color:#166534" id="t-frac">3/5</div><div class="lbl" style="color:#166534">分数</div></div>
        <div class="triple-item" style="background:#dbeafe"><div class="val" style="color:#1e40af" id="t-dec">0.60</div><div class="lbl" style="color:#1e40af">小数</div></div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">快捷示例</div>
        <div class="row">
          <button class="btn btn-default" onclick="setPct(10)">10%</button>
          <button class="btn btn-default" onclick="setPct(25)">25%</button>
          <button class="btn btn-default" onclick="setPct(50)">50%</button>
          <button class="btn btn-default" onclick="setPct(75)">75%</button>
          <button class="btn btn-default" onclick="setPct(100)">100%</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">百分数测验</div>
        <div class="quiz-card" id="quiz-card"></div>
      </div>
      <div class="divider"></div>
      <div class="info">
        <b>百分数小知识</b><br/>
        ● 百分数表示一个数是另一个数的<strong>百分之几</strong><br/>
        ● 百分数也叫<strong>百分率</strong>或<strong>百分比</strong><br/>
        ● 百分数 → 小数：去掉%号，小数点左移两位<br/>
        ● 小数 → 百分数：小数点右移两位，加%号<br/>
        ● 分数 → 百分数：分子÷分母×100%
      </div>
    </div>
  </div>
</div>
<script>
var cv, ctx;
var _pct = 60;

function init() {
  cv = document.getElementById('cv');
  ctx = cv.getContext('2d');
  window.addEventListener('resize', resize);
  resize();
  setPct(60);
  nextQuiz();
}

function resize() {
  var r = cv.parentElement.getBoundingClientRect();
  cv.width = r.width * devicePixelRatio;
  cv.height = r.height * devicePixelRatio;
  cv.style.width = r.width + 'px';
  cv.style.height = r.height + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  draw();
}

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

function setPct(val) {
  _pct = val;
  document.getElementById('sl-pct').value = val;
  document.getElementById('sl-val').textContent = val + '%';
  document.getElementById('t-pct').textContent = val + '%';
  document.getElementById('t-dec').textContent = (val / 100).toFixed(2);

  var g = gcd(val, 100);
  var fn = val / g, fd = 100 / g;
  document.getElementById('t-frac').textContent = fn + '/' + fd;

  draw();
}

function draw() {
  var w = cv.width / devicePixelRatio, h = cv.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  // === 100-grid ===
  var gridSize = Math.min((w - 80) / 10, (h * 0.35) / 10, 40);
  gridSize = Math.max(gridSize, 20);
  var gw = 10 * gridSize, gh = 10 * gridSize;
  var gx = (w - gw) / 2;
  var gy = 25;

  ctx.fillStyle = '#92400e';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('100格方格图 — 每格代表1%', w / 2, gy - 5);
  gy += 8;

  for (var i = 0; i < 100; i++) {
    var c = i % 10, r = Math.floor(i / 10);
    var x = gx + c * gridSize, y = gy + r * gridSize;
    var filled = i < _pct;

    ctx.fillStyle = filled ? '#f59e0b' : '#f8fafc';
    ctx.fillRect(x + 1, y + 1, gridSize - 2, gridSize - 2);
    ctx.strokeStyle = '#d1d5db';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x, y, gridSize, gridSize);
  }

  // Count label
  ctx.fillStyle = '#92400e';
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('涂色 ' + _pct + ' 格 = ' + _pct + '%', w / 2, gy + gh + 18);

  // === Bar comparison ===
  var barY = gy + gh + 40;
  var barW = w * 0.75, barH = 30;
  var bx = (w - barW) / 2;

  ctx.fillStyle = '#334155';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('百分数条形图', w / 2, barY);
  barY += 16;

  // Background bar
  ctx.fillStyle = '#f1f5f9';
  ctx.fillRect(bx, barY, barW, barH);
  ctx.strokeStyle = '#d1d5db';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, barY, barW, barH);

  // Filled bar
  ctx.fillStyle = '#f59e0b';
  ctx.fillRect(bx, barY, barW * _pct / 100, barH);

  // Scale marks
  ctx.fillStyle = '#64748b';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  for (var i = 0; i <= 100; i += 25) {
    var mx = bx + barW * i / 100;
    ctx.beginPath(); ctx.moveTo(mx, barY + barH); ctx.lineTo(mx, barY + barH + 5); ctx.stroke();
    ctx.fillText(i + '%', mx, barY + barH + 15);
  }

  // Current value marker
  var markerX = bx + barW * _pct / 100;
  ctx.fillStyle = '#dc2626';
  ctx.beginPath();
  ctx.moveTo(markerX, barY - 4);
  ctx.lineTo(markerX - 5, barY - 12);
  ctx.lineTo(markerX + 5, barY - 12);
  ctx.closePath();
  ctx.fill();
  ctx.font = 'bold 13px sans-serif';
  ctx.fillText(_pct + '%', markerX, barY - 16);

  // === Real-world examples ===
  var exY = barY + barH + 35;
  ctx.fillStyle = '#334155';
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('生活中的 ' + _pct + '%', w / 2, exY);
  exY += 20;

  // Example: discount
  var origPrice = 100;
  var disc = origPrice * _pct / 100;
  ctx.font = '12px sans-serif';
  ctx.fillText('🛒 原价' + origPrice + '元，折扣' + _pct + '% → 省' + disc.toFixed(0) + '元', w / 2, exY);

  // Example: test score
  exY += 22;
  var total = 40, correct = Math.round(total * _pct / 100);
  ctx.fillText('📝 总共' + total + '题，答对率' + _pct + '% → 答对' + correct + '题', w / 2, exY);

  // Conversion formulas
  exY += 28;
  ctx.fillStyle = '#64748b';
  ctx.font = '11px sans-serif';
  ctx.fillText(_pct + '% = ' + (document.getElementById('t-frac').textContent) + ' = ' + (_pct / 100).toFixed(2), w / 2, exY);
}

// ===== Quiz =====
var _quizQs = [
  { q: '把 3/4 化成百分数是多少？', opts: ['34%', '75%', '30%', '0.75%'], ans: 1 },
  { q: '把 0.45 化成百分数是多少？', opts: ['45%', '4.5%', '0.45%', '450%'], ans: 0 },
  { q: '把 25% 化成小数是多少？', opts: ['25', '2.5', '0.25', '0.025'], ans: 2 },
  { q: '一件衣服打八折出售，是原价的百分之几？', opts: ['8%', '20%', '80%', '40%'], ans: 2 },
  { q: '考试得了90分（满分100），正确率是多少？', opts: ['9%', '90%', '0.9%', '900%'], ans: 1 },
  { q: '50是200的百分之几？', opts: ['20%', '25%', '40%', '50%'], ans: 1 },
];
var _qi = 0, _score = 0;

function nextQuiz() {
  if (_qi >= _quizQs.length) {
    document.getElementById('quiz-card').innerHTML =
      '<div class="quiz-q">测验完成！答对 ' + _score + ' / ' + _quizQs.length + ' 题</div>';
    return;
  }
  var q = _quizQs[_qi];
  var html = '<div class="quiz-q">第' + (_qi + 1) + '题：' + q.q + '</div><div class="quiz-opts">';
  q.opts.forEach(function(o, i) {
    html += '<button class="quiz-opt" onclick="answer(' + i + ')">' + o + '</button>';
  });
  html += '</div><div class="quiz-result" id="qr"></div>';
  document.getElementById('quiz-card').innerHTML = html;
}

function answer(idx) {
  var q = _quizQs[_qi];
  var opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(function(b, i) {
    b.onclick = null; b.style.cursor = 'default';
    if (i === q.ans) b.classList.add('correct');
    if (i === idx && i !== q.ans) b.classList.add('wrong');
  });
  var r = document.getElementById('qr');
  if (idx === q.ans) { r.textContent = '✓ 正确！'; r.style.color = '#16a34a'; _score++; }
  else { r.textContent = '✗ 正确答案：' + q.opts[q.ans]; r.style.color = '#ef4444'; }
  _qi++;
  setTimeout(nextQuiz, 1200);
}

init();
</script>
<script src="../edu-lib/edu-tools.js"></script>
</body>
</html>
