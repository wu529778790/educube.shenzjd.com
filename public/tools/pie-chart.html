<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>扇形统计图 — 教立方</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
  * { box-sizing:border-box; }
  body { font-family:var(--edu-font); margin:0; }
  .tool { width:100vw; height:100vh; display:flex; flex-direction:column; background:var(--edu-bg); }
  .toolbar { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:#fff; border-bottom:1px solid var(--edu-border); }
  .toolbar h1 { font-size:15px; color:var(--edu-primary); margin:0; }
  .toolbar span { font-size:11px; color:var(--edu-text-muted); background:#f1f5f9; padding:2px 8px; border-radius:12px; }
  .main { flex:1; display:grid; grid-template-columns:1fr 290px; overflow:hidden; }
  .canvas-wrap { position:relative; overflow:hidden; background:linear-gradient(135deg,#fdf4ff,#faf5ff); }
  .canvas-wrap canvas { width:100%; height:100%; display:block; }
  .panel { background:#fff; border-left:1px solid var(--edu-border); padding:12px; display:flex; flex-direction:column; gap:8px; overflow:auto; }
  .section { display:flex; flex-direction:column; gap:4px; }
  .label { font-size:10px; font-weight:700; color:#64748b; letter-spacing:.05em; }
  .divider { height:1px; background:var(--edu-border); }
  .btn { padding:6px 12px; border:none; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer; font-family:var(--edu-font); transition:all .15s; }
  .btn.active { background:var(--edu-primary); color:#fff; }
  .btn-default { background:#f1f5f9; color:#334155; }
  .btn-default:hover { background:#e2e8f0; }
  .row { display:flex; gap:4px; flex-wrap:wrap; }

  .data-row { display:flex; align-items:center; gap:4px; margin:2px 0; }
  .data-row .dot { width:12px; height:12px; border-radius:3px; flex-shrink:0; }
  .data-row .name { font-size:11px; font-weight:600; min-width:48px; }
  .data-row input { width:38px; border:1px solid #d1d5db; border-radius:4px; text-align:center; font-size:12px; font-weight:700; padding:2px; font-family:var(--edu-font); }
  .data-row input:focus { border-color:#8b5cf6; outline:none; }
  .data-row .pct { font-size:10px; font-weight:700; min-width:36px; text-align:right; }

  .quiz-card { background:#faf5ff; border:2px solid #d8b4fe; border-radius:12px; padding:10px; text-align:center; }
  .quiz-q { font-size:13px; font-weight:700; color:#6d28d9; }
  .quiz-opts { display:grid; grid-template-columns:1fr 1fr; gap:4px; margin-top:6px; }
  .quiz-opt { padding:6px; border:2px solid #e2e8f0; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; background:#fff; font-family:var(--edu-font); }
  .quiz-opt:hover { border-color:#8b5cf6; }
  .quiz-opt.correct { background:#dcfce7; border-color:#22c55e; }
  .quiz-opt.wrong { background:#fef2f2; border-color:#ef4444; }
  .quiz-result { font-size:11px; font-weight:700; margin-top:4px; min-height:16px; }

  .info { font-size:11px; line-height:1.8; color:#334155; background:#fff; border:1px solid #d8b4fe; border-radius:8px; padding:8px 10px; }
  .info b { color:#6d28d9; }
</style>
</head>
<body>
<div class="tool">
  <div class="toolbar">
    <h1>📊 扇形统计图</h1>
    <span>六年级上册 · 第七单元</span>
  </div>
  <div class="main">
    <div class="canvas-wrap"><canvas id="cv"></canvas></div>
    <div class="panel">
      <div class="section">
        <div class="label">选择数据集</div>
        <div class="row">
          <button class="btn active" id="ds-fruit" onclick="setDS('fruit')">🍎 水果喜好</button>
          <button class="btn btn-default" id="ds-sport" onclick="setDS('sport')">⚽ 运动项目</button>
          <button class="btn btn-default" id="ds-time" onclick="setDS('time')">⏰ 时间分配</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">编辑数据</div>
        <div id="data-area"></div>
      </div>
      <div class="divider"></div>
      <div style="background:#faf5ff;border:1px solid #d8b4fe;border-radius:8px;padding:6px 8px;font-size:11px;line-height:1.6" id="summary"></div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">扇形统计图测验</div>
        <div class="quiz-card" id="quiz-card"></div>
      </div>
      <div class="divider"></div>
      <div class="info">
        <b>扇形统计图小知识</b><br/>
        ● 用<strong>扇形</strong>的大小表示各部分所占的<strong>百分比</strong><br/>
        ● 整个圆表示<strong>总量</strong>（100%）<br/>
        ● 扇形的圆心角 = 百分比 × <strong>360°</strong><br/>
        ● 所有扇形百分比之和 = <strong>100%</strong><br/>
        ● 能清楚地看出<strong>各部分与总量的关系</strong>
      </div>
    </div>
  </div>
</div>
<script>
var cv, ctx;
var _ds = 'fruit';
var COLORS = ['#8b5cf6','#3b82f6','#22c55e','#f59e0b','#ef4444','#ec4899','#14b8a6','#f97316'];

var _datasets = {
  fruit: {
    title: '六(1)班同学最喜欢的水果',
    items: [
      { name: '苹果', val: 12 },
      { name: '香蕉', val: 8 },
      { name: '草莓', val: 10 },
      { name: '葡萄', val: 6 },
      { name: '西瓜', val: 4 },
    ]
  },
  sport: {
    title: '六(1)班同学最喜欢的运动',
    items: [
      { name: '足球', val: 10 },
      { name: '篮球', val: 8 },
      { name: '乒乓球', val: 6 },
      { name: '跳绳', val: 5 },
      { name: '游泳', val: 3 },
    ]
  },
  time: {
    title: '小明一天24小时时间分配',
    items: [
      { name: '睡眠', val: 9 },
      { name: '上课', val: 6 },
      { name: '作业', val: 2 },
      { name: '运动', val: 1.5 },
      { name: '吃饭', val: 1.5 },
      { name: '其他', val: 4 },
    ]
  }
};

function init() {
  cv = document.getElementById('cv');
  ctx = cv.getContext('2d');
  window.addEventListener('resize', resize);
  resize();
  buildData();
  nextQuiz();
}

function resize() {
  var r = cv.parentElement.getBoundingClientRect();
  cv.width = r.width * devicePixelRatio;
  cv.height = r.height * devicePixelRatio;
  cv.style.width = r.width + 'px';
  cv.style.height = r.height + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  draw();
}

function setDS(key) {
  _ds = key;
  ['fruit','sport','time'].forEach(function(k) {
    document.getElementById('ds-' + k).className = 'btn ' + (k === key ? 'active' : 'btn-default');
  });
  buildData();
  draw();
}

function buildData() {
  var ds = _datasets[_ds];
  var html = '';
  ds.items.forEach(function(item, i) {
    html += '<div class="data-row">' +
      '<div class="dot" style="background:' + COLORS[i] + '"></div>' +
      '<span class="name">' + item.name + '</span>' +
      '<input value="' + item.val + '" onchange="editVal(' + i + ',this.value)"/>' +
      '<span class="pct" id="pct-' + i + '">—</span>' +
      '</div>';
  });
  document.getElementById('data-area').innerHTML = html;
  updateStats();
  draw();
}

function editVal(idx, val) {
  _datasets[_ds].items[idx].val = parseFloat(val) || 0;
  updateStats();
  draw();
}

function updateStats() {
  var ds = _datasets[_ds];
  var total = ds.items.reduce(function(s, it) { return s + it.val; }, 0);
  var html = '<strong>' + ds.title + '</strong><br>';
  html += '总计：' + total + '<br>';
  ds.items.forEach(function(item, i) {
    var pct = total > 0 ? (item.val / total * 100).toFixed(1) : 0;
    var angle = total > 0 ? (item.val / total * 360).toFixed(1) : 0;
    html += '<span style="color:' + COLORS[i] + '">●</span> ' + item.name + '：' + pct + '%（圆心角 ' + angle + '°）<br>';
    var el = document.getElementById('pct-' + i);
    if (el) el.textContent = pct + '%';
  });
  document.getElementById('summary').innerHTML = html;
}

function draw() {
  var w = cv.width / devicePixelRatio, h = cv.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  var ds = _datasets[_ds];
  var total = ds.items.reduce(function(s, it) { return s + it.val; }, 0);
  if (total === 0) return;

  // Title
  ctx.fillStyle = '#1e293b';
  ctx.font = 'bold 15px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(ds.title, w / 2, 24);

  // Pie chart
  var cx = w / 2, cy = h * 0.45;
  var r = Math.min(w, h) * 0.28;
  r = Math.max(r, 60);

  var startAngle = -Math.PI / 2;
  ds.items.forEach(function(item, i) {
    var sweep = (item.val / total) * Math.PI * 2;
    var endAngle = startAngle + sweep;

    // Sector
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = COLORS[i];
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Label
    var midA = startAngle + sweep / 2;
    var pct = (item.val / total * 100).toFixed(1);
    var labelR = r * 0.65;
    var lx = cx + Math.cos(midA) * labelR;
    var ly = cy + Math.sin(midA) * labelR;

    // Only show label if sector is big enough
    if (sweep > 0.15) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold ' + Math.max(11, r * 0.09) + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(item.name, lx, ly - 8);
      ctx.font = 'bold ' + Math.max(10, r * 0.07) + 'px sans-serif';
      ctx.fillText(pct + '%', lx, ly + 8);
    }

    startAngle = endAngle;
  });

  // Legend below pie
  var legY = cy + r + 30;
  var legX = w / 2 - (ds.items.length * 60) / 2;
  legX = Math.max(legX, 20);

  ctx.font = 'bold 11px sans-serif';
  ds.items.forEach(function(item, i) {
    var x = legX + i * Math.min(70, (w - 40) / ds.items.length);
    ctx.fillStyle = COLORS[i];
    ctx.fillRect(x, legY, 10, 10);
    ctx.fillStyle = '#334155';
    ctx.textAlign = 'left';
    ctx.fillText(item.name, x + 14, legY + 9);
  });

  // Bar comparison at bottom
  var barY = legY + 30;
  ctx.fillStyle = '#64748b';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('各项对比（条形图）', w / 2, barY);
  barY += 16;

  var maxVal = Math.max.apply(null, ds.items.map(function(it) { return it.val; }));
  var barMaxW = w * 0.5;
  var barH = Math.min(22, (h - barY - 10) / ds.items.length - 4);
  barH = Math.max(barH, 14);
  var bx0 = w / 2 - barMaxW / 2 + 50;

  ds.items.forEach(function(item, i) {
    var y = barY + i * (barH + 4);
    var bw = maxVal > 0 ? (item.val / maxVal) * (barMaxW - 60) : 0;

    // Label
    ctx.fillStyle = '#334155';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(item.name, bx0 - 6, y + barH / 2 + 1);

    // Bar
    ctx.fillStyle = COLORS[i];
    ctx.fillRect(bx0, y, bw, barH);

    // Value
    ctx.fillStyle = '#334155';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(item.val + ' (' + (item.val / total * 100).toFixed(1) + '%)', bx0 + bw + 6, y + barH / 2 + 1);
  });
}

// ===== Quiz =====
var _quizQs = [
  { q: '扇形统计图中，整个圆表示什么？', opts: ['部分', '总量', '平均', '最大值'], ans: 1 },
  { q: '一个扇形占25%，它的圆心角是多少度？', opts: ['25°', '90°', '180°', '45°'], ans: 1 },
  { q: '扇形统计图中，所有扇形百分比之和是？', opts: ['50%', '90%', '100%', '360%'], ans: 2 },
  { q: '圆心角72°的扇形，占总面积的百分之几？', opts: ['72%', '36%', '20%', '10%'], ans: 2 },
  { q: '扇形统计图最适合表示什么？', opts: ['变化趋势', '各部分占总体的比例', '具体数值', '排名顺序'], ans: 1 },
  { q: '一个扇形统计图中，最大扇形圆心角是108°，它占总数的百分之几？', opts: ['10%', '20%', '30%', '54%'], ans: 2 },
];
var _qi = 0, _score = 0;

function nextQuiz() {
  if (_qi >= _quizQs.length) {
    document.getElementById('quiz-card').innerHTML =
      '<div class="quiz-q">测验完成！答对 ' + _score + ' / ' + _quizQs.length + ' 题</div>';
    return;
  }
  var q = _quizQs[_qi];
  var html = '<div class="quiz-q">第' + (_qi + 1) + '题：' + q.q + '</div><div class="quiz-opts">';
  q.opts.forEach(function(o, i) {
    html += '<button class="quiz-opt" onclick="answer(' + i + ')">' + o + '</button>';
  });
  html += '</div><div class="quiz-result" id="qr"></div>';
  document.getElementById('quiz-card').innerHTML = html;
}

function answer(idx) {
  var q = _quizQs[_qi];
  var opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(function(b, i) {
    b.onclick = null; b.style.cursor = 'default';
    if (i === q.ans) b.classList.add('correct');
    if (i === idx && i !== q.ans) b.classList.add('wrong');
  });
  var r = document.getElementById('qr');
  if (idx === q.ans) { r.textContent = '✓ 正确！'; r.style.color = '#16a34a'; _score++; }
  else { r.textContent = '✗ 正确答案：' + q.opts[q.ans]; r.style.color = '#ef4444'; }
  _qi++;
  setTimeout(nextQuiz, 1200);
}

init();
</script>
</body>
</html>
