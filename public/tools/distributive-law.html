<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>乘法分配律互动探究</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
  .main-layout { display: grid; grid-template-columns: 1fr 290px; height: 100%; }
  .canvas-area { position: relative; background: #fff; overflow: hidden; }
  .control-panel {
    background: #fdfaf4; border-left: 1px solid #e2e8f0;
    padding: 14px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto;
  }
  .ctrl-section { display: flex; flex-direction: column; gap: 7px; }
  .ctrl-label {
    font-size: 11px; font-weight: 700; color: #64748b;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .divider { height: 1px; background: #e2e8f0; }
  .tab-row { display: flex; gap: 4px; }
  .tab-btn {
    flex: 1; padding: 6px 4px; border-radius: 8px; font-size: 11px; font-weight: 600;
    cursor: pointer; border: 1.5px solid #e2e8f0; background: #fff; color: #64748b;
    text-align: center; transition: all 0.15s; font-family: var(--edu-font); line-height: 1.3;
  }
  .tab-btn:hover:not(.active) { border-color: #f97316; }
  .tab-btn.active { background: #f97316; color: #fff; border-color: #f97316; }
  .formula {
    text-align: center; font-size: 15px; font-weight: 700; color: #f97316;
    padding: 8px; background: #fff7ed; border-radius: 8px; line-height: 1.6;
    font-family: var(--edu-font);
  }
  .data-input {
    padding: 4px 6px; border: 1.5px solid #e2e8f0; border-radius: 6px;
    font-size: 13px; font-family: var(--edu-font); outline: none; text-align: center; width: 52px;
  }
  .data-input:focus { border-color: #f97316; }
  .data-row { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  .prove-btn {
    width: 100%; padding: 10px; border: none; border-radius: 10px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    background: linear-gradient(135deg, #f97316, #ea580c); color: #fff;
    font-family: var(--edu-font); transition: all 0.2s; box-shadow: 0 2px 8px #f9731640;
  }
  .prove-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px #f9731650; }
  .prove-btn:active { transform: scale(0.97); }
  .prove-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .info-box {
    background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
    padding: 10px 12px; font-size: 12px; color: #64748b; line-height: 1.8;
  }
  .info-box strong { color: #f97316; }
  /* challenge mode */
  .challenge-box {
    background: linear-gradient(135deg, #eff6ff, #fef3c7);
    border: 1.5px solid #93c5fd; border-radius: 10px;
    padding: 12px; text-align: center;
  }
  .challenge-q { font-size: 18px; font-weight: 800; color: #1a3a5c; margin: 6px 0; }
  .challenge-opts { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .ch-opt {
    padding: 8px 10px; border-radius: 8px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1.5px solid #e2e8f0; background: #fff; color: #1e293b;
    text-align: left; transition: all 0.15s; font-family: var(--edu-font); line-height: 1.4;
  }
  .ch-opt:hover { border-color: #f97316; background: #fff7ed; }
  .ch-opt.correct { border-color: #22c55e; background: #f0fdf4; color: #16a34a; }
  .ch-opt.wrong { border-color: #ef4444; background: #fef2f2; color: #dc2626; }
  .score-bar {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; font-weight: 700; color: #1a3a5c;
  }
  .score-bar span:last-child { color: #f97316; }
</style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="edu-toolbar-title">乘法分配律互动探究</span>
      <span class="edu-toolbar-subtitle">下册·运算定律</span>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="main-canvas" class="edu-canvas-full"></canvas>
      </div>
      <div class="control-panel">
        <!-- Mode tabs -->
        <div class="ctrl-section">
          <div class="ctrl-label">探究模式</div>
          <div class="tab-row">
            <button class="tab-btn active" id="tab-blocks" onclick="setMode('blocks')">拖拽方块</button>
            <button class="tab-btn" id="tab-line" onclick="setMode('line')">数线互动</button>
            <button class="tab-btn" id="tab-challenge" onclick="setMode('challenge')">挑战闯关</button>
          </div>
        </div>
        <div class="divider"></div>
        <!-- Parameters -->
        <div class="ctrl-section" id="params-section">
          <div class="ctrl-label">参数设置</div>
          <div class="data-row">
            <span>a =</span>
            <input class="data-input" id="inp-a" type="number" min="1" max="12" value="3" oninput="onParamChange()"/>
          </div>
          <div class="data-row">
            <span>b =</span>
            <input class="data-input" id="inp-b" type="number" min="1" max="12" value="4" oninput="onParamChange()"/>
          </div>
          <div class="data-row">
            <span>c =</span>
            <input class="data-input" id="inp-c" type="number" min="1" max="12" value="5" oninput="onParamChange()"/>
          </div>
        </div>
        <div class="divider"></div>
        <!-- Formula -->
        <div class="ctrl-section">
          <div class="ctrl-label">分配律公式</div>
          <div class="formula" id="formula-display">(3+4) x 5 = 3x5 + 4x5</div>
        </div>
        <div class="divider"></div>
        <!-- Prove button (blocks mode) -->
        <div class="ctrl-section" id="prove-section">
          <button class="prove-btn" id="prove-btn" onclick="startProve()">点击验证分配律</button>
          <div class="info-box" id="calc-box">
            <div id="calc-left">左边 = (3+4) x 5 = <strong>35</strong></div>
            <div id="calc-right">右边 = 3x5 + 4x5 = <strong>35</strong></div>
            <div id="calc-result"><strong style="color:#22c55e;">左边 = 右边 分配律成立!</strong></div>
          </div>
        </div>
        <!-- Challenge section (hidden by default) -->
        <div class="ctrl-section" id="challenge-section" style="display:none;">
          <div class="score-bar">
            <span>得分</span>
            <span id="score-val">0 / 0</span>
          </div>
          <div class="challenge-box" id="challenge-box">
            <div style="font-size:11px;color:#64748b;">选择最简便的算法</div>
            <div class="challenge-q" id="ch-question">--</div>
            <div class="challenge-opts" id="ch-options"></div>
          </div>
          <button class="prove-btn" onclick="nextChallenge()" id="next-ch-btn" style="display:none;">下一题</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../edu-lib/edu-tools.js"></script>
<script>
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
let W, H, currentMode = 'blocks';
let animating = false, animT = 0;
let proveAnim = null; // null | 'splitting' | 'done'

/* --- Draggable block state --- */
let blocks = [];   // { id, label, w, h, color, x, y, homeX, homeY, dragging }
let dragBlock = null, dragOffX = 0, dragOffY = 0;

/* --- Number line state --- */
let nlPointA = null, nlPointB = null, nlDrag = null;
// nlPointA/B = { value, x, y }

function getParams() {
  return {
    a: Math.max(1, Math.min(12, parseInt(document.getElementById('inp-a').value) || 1)),
    b: Math.max(1, Math.min(12, parseInt(document.getElementById('inp-b').value) || 1)),
    c: Math.max(1, Math.min(12, parseInt(document.getElementById('inp-c').value) || 1)),
  };
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + (mode === 'challenge' ? 'challenge' : mode)).classList.add('active');
  document.getElementById('params-section').style.display = mode === 'challenge' ? 'none' : '';
  document.getElementById('prove-section').style.display = mode === 'challenge' ? 'none' : '';
  document.getElementById('challenge-section').style.display = mode === 'challenge' ? '' : 'none';
  proveAnim = null;
  if (mode === 'challenge') { initChallenge(); }
  render();
}

function updateFormula() {
  const { a, b, c } = getParams();
  const el = document.getElementById('formula-display');
  el.textContent = `(${a}+${b})\u00d7${c} = ${a}\u00d7${c} + ${b}\u00d7${c}`;
  const left = (a + b) * c, right = a * c + b * c;
  document.getElementById('calc-left').innerHTML =
    `左边 = (${a}+${b})\u00d7${c} = <strong>${left}</strong>`;
  document.getElementById('calc-right').innerHTML =
    `右边 = ${a}\u00d7${c}+${b}\u00d7${c} = <strong>${right}</strong>`;
  document.getElementById('calc-result').innerHTML = left === right
    ? `<strong style="color:#22c55e;">左边 = 右边 分配律成立!</strong>`
    : `<strong style="color:#ef4444;">不等</strong>`;
}

function onParamChange() {
  updateFormula();
  proveAnim = null;
  initBlocks();
  initNumberLine();
  render();
}

/* ===== BLOCKS MODE ===== */
function initBlocks() {
  const { a, b, c } = getParams();
  const maxCell = Math.min((W - 120) / (a + b + 6), (H - 160) / (c + 4), 42);
  const cs = Math.max(12, maxCell);
  blocks = [];
  const colors = ['#3b82f6', '#f97316'];
  const widths = [a, b];
  const labels = [`a\u00d7c\n${a}\u00d7${c}=${a*c}`, `b\u00d7c\n${b}\u00d7${c}=${b*c}`];
  const totalW = (a + b) * cs;
  const totalH = c * cs;
  const baseX = (W - totalW) / 2;
  const baseY = (H - totalH) / 2 - 10;

  // Combined block
  blocks.push({
    id: 'combined', label: `(a+b)\u00d7c\n(${a}+${b})\u00d7${c}=${(a+b)*c}`,
    w: totalW, h: totalH, color: '#8b5cf6',
    x: baseX, y: baseY, homeX: baseX, homeY: baseY, dragging: false
  });
  // Split a block
  blocks.push({
    id: 'part-a', label: labels[0],
    w: a * cs, h: c * cs, color: colors[0],
    x: baseX, y: baseY, homeX: baseX, homeY: baseY, dragging: false
  });
  // Split b block
  blocks.push({
    id: 'part-b', label: labels[1],
    w: b * cs, h: c * cs, color: colors[1],
    x: baseX + a * cs, y: baseY, homeX: baseX + a * cs, homeY: baseY, dragging: false
  });
}

function drawBlocksMode() {
  const { a, b, c } = getParams();
  const cs = Math.max(12, Math.min((W - 120) / (a + b + 6), (H - 160) / (c + 4), 42));
  const totalW = (a + b) * cs, totalH = c * cs;

  // Draw hint text
  ctx.font = '13px ' + getComputedStyle(document.body).fontFamily;
  ctx.fillStyle = '#94a3b8';
  ctx.textAlign = 'center';
  if (proveAnim === null) {
    ctx.fillText('拖拽色块拆分验证分配律，或点击右侧"验证"按钮', W / 2, 30);
  }

  // Draw grid cells in each block's area
  blocks.forEach(blk => {
    const gridColor = blk.color;
    const rows = c, cols = blk.id === 'combined' ? (a + b) : (blk.id === 'part-a' ? a : b);
    for (let r = 0; r < rows; r++) {
      for (let c2 = 0; c2 < cols; c2++) {
        const cx = blk.x + c2 * cs, cy = blk.y + r * cs;
        ctx.fillStyle = gridColor + '18';
        ctx.fillRect(cx, cy, cs, cs);
        ctx.strokeStyle = gridColor + '50';
        ctx.lineWidth = 0.6;
        ctx.strokeRect(cx, cy, cs, cs);
      }
    }
    // Bold border
    ctx.strokeStyle = gridColor;
    ctx.lineWidth = 2.5;
    ctx.strokeRect(blk.x, blk.y, blk.w, blk.h);
    // Label
    ctx.fillStyle = gridColor;
    ctx.font = 'bold 13px ' + getComputedStyle(document.body).fontFamily;
    ctx.textAlign = 'center';
    const lines = blk.label.split('\n');
    lines.forEach((ln, i) => {
      ctx.fillText(ln, blk.x + blk.w / 2, blk.y + blk.h / 2 - 8 + i * 18);
    });
  });

  // Dimension labels
  const base = blocks[0];
  ctx.font = 'bold 13px ' + getComputedStyle(document.body).fontFamily;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#3b82f6';
  ctx.fillText(`a=${a}`, base.x + a * cs / 2, base.y - 10);
  ctx.fillStyle = '#f97316';
  ctx.fillText(`b=${b}`, base.x + a * cs + b * cs / 2, base.y - 10);
  ctx.save();
  ctx.translate(base.x - 14, base.y + totalH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillStyle = '#1e293b';
  ctx.fillText(`c=${c}`, 0, 0);
  ctx.restore();

  // Split brackets if proving
  if (proveAnim === 'done' || proveAnim === 'splitting') {
    const partA = blocks[1], partB = blocks[2];
    ctx.strokeStyle = '#22c55e';
    ctx.lineWidth = 3;
    ctx.setLineDash([6, 4]);
    ctx.strokeRect(partA.x - 2, partA.y - 2, partA.w + 4, partA.h + 4);
    ctx.strokeStyle = '#f97316';
    ctx.strokeRect(partB.x - 2, partB.y - 2, partB.w + 4, partB.h + 4);
    ctx.setLineDash([]);

    // Equation below
    ctx.font = 'bold 15px ' + getComputedStyle(document.body).fontFamily;
    ctx.fillStyle = '#22c55e';
    ctx.textAlign = 'center';
    const eqY = Math.max(partA.y + partA.h, partB.y + partB.h) + 40;
    ctx.fillText(`(${a}+${b})\u00d7${c} = ${a}\u00d7${c} + ${b}\u00d7${c} = ${(a+b)*c}`, W / 2, eqY);
  }
}

/* ===== PROVE ANIMATION ===== */
function startProve() {
  if (animating) return;
  proveAnim = 'splitting';
  animating = true;
  document.getElementById('prove-btn').disabled = true;
  const { a, b, c } = getParams();
  const cs = Math.max(12, Math.min((W - 120) / (a + b + 6), (H - 160) / (c + 4), 42));
  const totalW = (a + b) * cs, totalH = c * cs;
  const baseX = (W - totalW) / 2, baseY = (H - totalH) / 2 - 10;

  // Target: part-a slides left and down, part-b slides right and down
  const gap = 30;
  const targetAx = baseX - 40 - gap;
  const targetAy = baseY + 30;
  const targetBx = baseX + a * cs + 40 + gap;
  const targetBy = baseY + 30;

  const startAx = blocks[1].x, startAy = blocks[1].y;
  const startBx = blocks[2].x, startBy = blocks[2].y;
  // Fade combined block
  const startCombinedAlpha = 1;

  let startTime = null;
  const duration = 1200;

  function step(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;
    const t = Math.min(1, elapsed / duration);
    const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

    // Move part A
    blocks[1].x = lerp(startAx, targetAx, ease);
    blocks[1].y = lerp(startAy, targetAy, ease);
    // Move part B
    blocks[2].x = lerp(startBx, targetBx, ease);
    blocks[2].y = lerp(startBy, targetBy, ease);

    render();
    if (t < 1) {
      requestAnimationFrame(step);
    } else {
      animating = false;
      proveAnim = 'done';
      document.getElementById('prove-btn').disabled = false;
      render();
    }
  }
  requestAnimationFrame(step);
}

/* ===== NUMBER LINE MODE ===== */
function initNumberLine() {
  const { a, b, c } = getParams();
  const margin = 80;
  const lineY = H / 2;
  const lineLen = W - margin * 2;
  const total = (a + b) * c;
  const maxVal = total + 4;

  nlPointA = { value: a * c, x: margin + (a * c / maxVal) * lineLen, y: lineY };
  nlPointB = { value: (a + b) * c, x: margin + ((a + b) * c / maxVal) * lineLen, y: lineY };
  nlPointA._margin = margin;
  nlPointA._lineLen = lineLen;
  nlPointA._maxVal = maxVal;
  nlPointA._lineY = lineY;
}

function drawNumberLine() {
  const { a, b, c } = getParams();
  const margin = 80, lineY = H / 2;
  const lineLen = W - margin * 2;
  const total = (a + b) * c;
  const maxVal = total + 4;

  // Base line
  ctx.strokeStyle = '#cbd5e1';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(margin, lineY);
  ctx.lineTo(margin + lineLen, lineY);
  ctx.stroke();

  // Arrow
  ctx.fillStyle = '#cbd5e1';
  ctx.beginPath();
  ctx.moveTo(margin + lineLen, lineY);
  ctx.lineTo(margin + lineLen - 10, lineY - 6);
  ctx.lineTo(margin + lineLen - 10, lineY + 6);
  ctx.fill();

  // Tick marks and labels
  ctx.font = '12px ' + getComputedStyle(document.body).fontFamily;
  ctx.textAlign = 'center';
  const step = Math.max(1, Math.ceil(maxVal / 20));
  for (let v = 0; v <= maxVal; v += step) {
    const x = margin + (v / maxVal) * lineLen;
    ctx.strokeStyle = '#94a3b8';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, lineY - 5);
    ctx.lineTo(x, lineY + 5);
    ctx.stroke();
    ctx.fillStyle = '#94a3b8';
    ctx.fillText(v, x, lineY + 20);
  }

  // Key ticks
  const keyVals = [0, a * c, b * c, total];
  const keyLabels = ['0', `${a}\u00d7${c}=${a*c}`, `${b}\u00d7${c}=${b*c}`, `(${a}+${b})\u00d7${c}=${total}`];
  const keyColors = ['#64748b', '#3b82f6', '#f97316', '#8b5cf6'];
  keyVals.forEach((v, i) => {
    const x = margin + (v / maxVal) * lineLen;
    ctx.strokeStyle = keyColors[i];
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, lineY - 8);
    ctx.lineTo(x, lineY + 8);
    ctx.stroke();
  });

  // Bracket: 0 -> a*c (blue)
  const x0 = margin + (0 / maxVal) * lineLen;
  const xAC = margin + (a * c / maxVal) * lineLen;
  const xTotal = margin + (total / maxVal) * lineLen;
  const bracketY = lineY - 50;

  // a*c bracket
  ctx.strokeStyle = '#3b82f6';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(x0, bracketY);
  ctx.lineTo(x0, bracketY - 10);
  ctx.lineTo(xAC, bracketY - 10);
  ctx.lineTo(xAC, bracketY);
  ctx.stroke();
  ctx.fillStyle = '#3b82f6';
  ctx.font = 'bold 13px ' + getComputedStyle(document.body).fontFamily;
  ctx.fillText(`a\u00d7c = ${a*c}`, (x0 + xAC) / 2, bracketY - 16);

  // a*c -> total bracket (orange)
  ctx.strokeStyle = '#f97316';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(xAC, bracketY);
  ctx.lineTo(xAC, bracketY - 10);
  ctx.lineTo(xTotal, bracketY - 10);
  ctx.lineTo(xTotal, bracketY);
  ctx.stroke();
  ctx.fillStyle = '#f97316';
  ctx.fillText(`b\u00d7c = ${b*c}`, (xAC + xTotal) / 2, bracketY - 16);

  // Total bracket above
  const topBracket = bracketY - 38;
  ctx.strokeStyle = '#8b5cf6';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(x0, topBracket + 10);
  ctx.lineTo(x0, topBracket);
  ctx.lineTo(xTotal, topBracket);
  ctx.lineTo(xTotal, topBracket + 10);
  ctx.stroke();
  ctx.fillStyle = '#8b5cf6';
  ctx.font = 'bold 14px ' + getComputedStyle(document.body).fontFamily;
  ctx.fillText(`(a+b)\u00d7c = ${total}`, (x0 + xTotal) / 2, topBracket - 8);

  // Drag instruction
  ctx.font = '13px ' + getComputedStyle(document.body).fontFamily;
  ctx.fillStyle = '#94a3b8';
  ctx.textAlign = 'center';
  ctx.fillText('拖拽数线上的橙色圆点调整数值', W / 2, lineY + 50);

  // Draggable point at total
  const px = margin + (total / maxVal) * lineLen;
  ctx.beginPath();
  ctx.arc(px, lineY, 10, 0, Math.PI * 2);
  ctx.fillStyle = '#f97316';
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Interactive formula below
  ctx.font = 'bold 16px ' + getComputedStyle(document.body).fontFamily;
  ctx.fillStyle = '#1e293b';
  ctx.textAlign = 'center';
  ctx.fillText(`(${a}+${b})\u00d7${c} = ${a*c} + ${b*c} = ${total}`, W / 2, lineY + 80);

  // Number line drag: allow dragging the endpoint to change c
  nlPointA = { value: total, x: px, y: lineY, _margin: margin, _lineLen: lineLen, _maxVal: maxVal, _lineY: lineY };
}

/* ===== CHALLENGE MODE ===== */
let challengeScore = 0, challengeTotal = 0;
let currentChallenge = null;

function generateChallenge() {
  const laws = ['distributive', 'commutative', 'associative'];
  const law = laws[Math.floor(Math.random() * laws.length)];
  const a = Math.floor(Math.random() * 9) + 2;
  const b = Math.floor(Math.random() * 9) + 2;
  const c = Math.floor(Math.random() * 9) + 2;

  let question, correct, options;

  if (law === 'distributive') {
    question = `${a}\u00d7${b+c} = ?`;
    correct = `${a}\u00d7${b} + ${a}\u00d7${c}`;
    const direct = String(a * (b + c));
    const wrong2 = `${a}\u00d7${b}\u00d7${c}`;
    const wrong3 = `${a+b}\u00d7${a+c}`;
    options = shuffle([correct, direct, wrong2, wrong3]);
  } else if (law === 'commutative') {
    question = `${a} + ${b} 用什么定律最简便?`;
    correct = `加法交换律: ${b}+${a}`;
    const wrong1 = `乘法分配律: ${a}\u00d7${b}`;
    const wrong2 = `加法结合律: (${a}+${b})+0`;
    const wrong3 = `直接计算 ${a}+${b}`;
    options = shuffle([correct, wrong1, wrong2, wrong3]);
  } else {
    question = `${a}+${b}+${c} 怎样算最简便?`;
    const sum = a + b + c;
    if (a + b === 10 || b + c === 10 || a + c === 10) {
      correct = (a+b===10) ? `加法结合律: (${a}+${b})+${c} = ${sum}` :
                 (b+c===10) ? `加法结合律: ${a}+(${b}+${c}) = ${sum}` :
                              `加法结合律: (${a}+${c})+${b} = ${sum}`;
    } else {
      correct = `按顺序: (${a}+${b})+${c} = ${sum}`;
    }
    const wrong1 = `乘法分配律`;
    const wrong2 = `加法交换律: ${c}+${b}+${a}`;
    const wrong3 = `直接猜答案`;
    options = shuffle([correct, wrong1, wrong2, wrong3]);
  }

  return { question, correct, options, law };
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initChallenge() {
  currentChallenge = generateChallenge();
  document.getElementById('ch-question').textContent = currentChallenge.question;
  document.getElementById('next-ch-btn').style.display = 'none';
  const optsEl = document.getElementById('ch-options');
  optsEl.innerHTML = '';
  currentChallenge.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'ch-opt';
    btn.textContent = opt;
    btn.onclick = () => answerChallenge(i, btn);
    optsEl.appendChild(btn);
  });
  document.getElementById('score-val').textContent = `${challengeScore} / ${challengeTotal}`;
  renderChallengeCanvas();
}

function answerChallenge(idx, btn) {
  const opts = document.querySelectorAll('.ch-opt');
  opts.forEach(o => o.onclick = null);
  const isCorrect = currentChallenge.options[idx] === currentChallenge.correct;
  challengeTotal++;
  if (isCorrect) {
    challengeScore++;
    btn.classList.add('correct');
  } else {
    btn.classList.add('wrong');
    opts.forEach(o => { if (o.textContent === currentChallenge.correct) o.classList.add('correct'); });
  }
  document.getElementById('score-val').textContent = `${challengeScore} / ${challengeTotal}`;
  document.getElementById('next-ch-btn').style.display = '';
}

function nextChallenge() {
  initChallenge();
}

function renderChallengeCanvas() {
  const { a, b, c } = { a: 4, b: 5, c: 3 }; // decorative
  const ch = currentChallenge;
  if (!ch) return;

  // Draw a visual representation
  ctx.font = 'bold 28px ' + getComputedStyle(document.body).fontFamily;
  ctx.fillStyle = '#1a3a5c';
  ctx.textAlign = 'center';
  ctx.fillText(ch.question, W / 2, H * 0.3);

  // Decorative grid
  const lawColors = { distributive: '#f97316', commutative: '#3b82f6', associative: '#22c55e' };
  const col = lawColors[ch.law] || '#f97316';
  const cs = 20;
  const gx = W / 2 - 4 * cs, gy = H * 0.45;
  for (let r = 0; r < 4; r++) {
    for (let c2 = 0; c2 < 8; c2++) {
      ctx.fillStyle = col + '15';
      ctx.fillRect(gx + c2 * cs, gy + r * cs, cs, cs);
      ctx.strokeStyle = col + '30';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(gx + c2 * cs, gy + r * cs, cs, cs);
    }
  }
  ctx.strokeStyle = col;
  ctx.lineWidth = 2;
  ctx.strokeRect(gx, gy, 8 * cs, 4 * cs);

  // Score display
  ctx.font = 'bold 18px ' + getComputedStyle(document.body).fontFamily;
  ctx.fillStyle = '#f97316';
  ctx.fillText(`得分: ${challengeScore} / ${challengeTotal}`, W / 2, H * 0.85);

  if (challengeTotal === 0) {
    ctx.font = '14px ' + getComputedStyle(document.body).fontFamily;
    ctx.fillStyle = '#94a3b8';
    ctx.fillText('选择右侧你认为正确的答案', W / 2, H * 0.9);
  }
}

/* ===== MOUSE / TOUCH HANDLING ===== */
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - rect.left, y: src.clientY - rect.top };
}

function hitBlock(x, y) {
  // Check in reverse so topmost first (split blocks on top of combined)
  for (let i = blocks.length - 1; i >= 1; i--) {
    const b = blocks[i];
    if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) return b;
  }
  return null;
}

function hitNLPoint(x, y) {
  if (!nlPointA) return null;
  const dx = x - nlPointA.x, dy = y - nlPointA.y;
  if (dx * dx + dy * dy < 225) return nlPointA;
  return null;
}

canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('touchstart', onPointerDown, { passive: false });
canvas.addEventListener('mousemove', onPointerMove);
canvas.addEventListener('touchmove', onPointerMove, { passive: false });
canvas.addEventListener('mouseup', onPointerUp);
canvas.addEventListener('touchend', onPointerUp);

function onPointerDown(e) {
  e.preventDefault();
  const p = getCanvasPos(e);

  if (currentMode === 'blocks' && proveAnim === null) {
    const hit = hitBlock(p.x, p.y);
    if (hit) {
      dragBlock = hit;
      dragBlock.dragging = true;
      dragOffX = p.x - hit.x;
      dragOffY = p.y - hit.y;
    }
  } else if (currentMode === 'line') {
    const hit = hitNLPoint(p.x, p.y);
    if (hit) {
      nlDrag = hit;
    }
  }
}

function onPointerMove(e) {
  e.preventDefault();
  const p = getCanvasPos(e);

  if (dragBlock) {
    dragBlock.x = p.x - dragOffX;
    dragBlock.y = p.y - dragOffY;
    render();
  } else if (nlDrag && nlPointA) {
    const { _margin, _lineLen, _maxVal, _lineY } = nlPointA;
    const newX = Math.max(_margin, Math.min(_margin + _lineLen, p.x));
    const newVal = Math.max(1, Math.round(((newX - _margin) / _lineLen) * _maxVal));
    // Update c based on drag: newVal = (a+b)*c => c = newVal/(a+b)
    const { a, b } = getParams();
    const newC = Math.max(1, Math.min(12, Math.round(newVal / (a + b))));
    document.getElementById('inp-c').value = newC;
    updateFormula();
    initNumberLine();
    render();
  }
}

function onPointerUp(e) {
  if (dragBlock) {
    dragBlock.dragging = false;
    // Check if part blocks are split enough
    const dx = Math.abs(blocks[1].x - blocks[2].x - blocks[1].w);
    if (dx > 15 || Math.abs(blocks[1].y - blocks[2].y) > 15) {
      proveAnim = 'done';
    }
    dragBlock = null;
    render();
  }
  nlDrag = null;
}

/* ===== RENDER ===== */
function render() {
  const dpr = window.devicePixelRatio || 1;
  W = canvas.clientWidth; H = canvas.clientHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  drawGrid(ctx, W, H, 40, '#e2e8f018');

  switch (currentMode) {
    case 'blocks': drawBlocksMode(); break;
    case 'line': drawNumberLine(); break;
    case 'challenge': renderChallengeCanvas(); break;
  }
}

function resetAll() {
  document.getElementById('inp-a').value = 3;
  document.getElementById('inp-b').value = 4;
  document.getElementById('inp-c').value = 5;
  proveAnim = null;
  animating = false;
  document.getElementById('prove-btn').disabled = false;
  if (currentMode === 'challenge') {
    challengeScore = 0;
    challengeTotal = 0;
    initChallenge();
  }
  updateFormula();
  initBlocks();
  initNumberLine();
  render();
}

window.addEventListener('resize', () => { initBlocks(); initNumberLine(); render(); });
setTimeout(() => {
  updateFormula();
  initBlocks();
  initNumberLine();
  render();
}, 50);
</script>
