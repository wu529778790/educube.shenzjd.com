<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分数大小比较 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 260px; height: 100%; }
    .canvas-area { padding: 24px; overflow-y: auto; background: linear-gradient(135deg, #fdf2f8 0%, #fdfaf4 100%); display: flex; flex-direction: column; align-items: center; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 14px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #fbcfe8; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .compare-row { display: flex; align-items: center; gap: 16px; margin: 12px 0; }
    .frac-input { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .frac-input input { width: 55px; text-align: center; font-size: 20px; font-weight: 800; border: 2px solid #e2e8f0; border-radius: 8px; padding: 4px; font-family: 'Courier New', monospace; }
    .frac-input .fline { width: 55px; height: 3px; background: #334155; border-radius: 2px; }
    .compare-sign { font-size: 32px; font-weight: 800; color: #ec4899; }
    .bar-group { display: flex; gap: 20px; width: 100%; max-width: 420px; margin: 12px 0; }
    .bar-col { flex: 1; text-align: center; }
    .bar-track { height: 40px; border-radius: 8px; background: #f1f5f9; position: relative; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 800; }
    .result-card { background: #fff; border: 2px solid #ec4899; border-radius: 14px; padding: 16px; width: 100%; max-width: 420px; text-align: center; }
    .result-big { font-size: 24px; font-weight: 800; }
    .preset-btn { padding: 8px 0; border-radius: 8px; font-size: 13px; font-weight: 600; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; }
    .preset-btn:hover { border-color: #ec4899; color: #ec4899; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">↔ 分数大小比较</div>
      <div class="edu-toolbar-subtitle">下册 · 第四单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-primary" onclick="compare()">比较</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <div class="compare-row">
          <div class="frac-input"><input type="number" id="n1" value="3" min="0" oninput="compare()"/><div class="fline"></div><input type="number" id="d1" value="4" min="1" oninput="compare()"/></div>
          <span class="compare-sign" id="sign">?</span>
          <div class="frac-input"><input type="number" id="n2" value="2" min="0" oninput="compare()"/><div class="fline"></div><input type="number" id="d2" value="3" min="1" oninput="compare()"/></div>
        </div>
        <div class="bar-group">
          <div class="bar-col"><div class="bar-track"><div class="bar-fill" id="bar1" style="background:#ec4899;width:75%">¾</div></div><div style="font-size:12px;color:#64748b;margin-top:4px">第一个分数</div></div>
          <div class="bar-col"><div class="bar-track"><div class="bar-fill" id="bar2" style="background:#3b82f6;width:66.7%">⅔</div></div><div style="font-size:12px;color:#64748b;margin-top:4px">第二个分数</div></div>
        </div>
        <div class="result-card" id="resultCard"></div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">预设</div>
          <button class="preset-btn" onclick="load(3,4,2,3)">¾ vs ⅔</button>
          <button class="preset-btn" onclick="load(1,2,1,3)">½ vs ⅓</button>
          <button class="preset-btn" onclick="load(2,5,3,5)">⅖ vs ⅗</button>
          <button class="preset-btn" onclick="load(3,8,1,2)">⅜ vs ½</button>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <b>比较方法</b><br/>
          ● 同分母：分子大的分数大<br/>
          ● 同分子：分母小的分数大<br/>
          ● 不同分母：通分后比较<br/>
          ● 或化成小数比较
        </div>
      </div>
    </div>
  </div>
</div>
<script>
function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while (b) { [a, b] = [b, a % b]; } return a; }

function compare() {
  const n1 = parseInt(document.getElementById('n1').value) || 0;
  const d1 = parseInt(document.getElementById('d1').value) || 1;
  const n2 = parseInt(document.getElementById('n2').value) || 0;
  const d2 = parseInt(document.getElementById('d2').value) || 1;

  if (d1 === 0 || d2 === 0) return;

  const v1 = n1 / d1, v2 = n2 / d2;
  const sign = v1 > v2 ? '>' : v1 < v2 ? '<' : '=';
  document.getElementById('sign').textContent = sign;

  document.getElementById('bar1').style.width = `${v1 * 100}%`;
  document.getElementById('bar1').textContent = `${n1}/${d1}`;
  document.getElementById('bar2').style.width = `${v2 * 100}%`;
  document.getElementById('bar2').textContent = `${n2}/${d2}`;

  // Find LCD
  const g = gcd(d1, d2);
  const lcd = d1 * d2 / g;
  const cn1 = n1 * (lcd / d1), cn2 = n2 * (lcd / d2);

  let method;
  if (d1 === d2) method = '同分母，比较分子';
  else if (n1 === n2) method = '同分子，比较分母';
  else method = '通分后比较';

  const card = document.getElementById('resultCard');
  const winner = v1 > v2 ? `${n1}/${d1}` : v1 < v2 ? `${n2}/${d2}` : '相等';
  const color = v1 > v2 ? '#ec4899' : v1 < v2 ? '#3b82f6' : '#22c55e';
  card.innerHTML = `
    <div style="font-size:14px;color:#64748b">比较方法：${method}</div>
    <div style="font-size:16px;margin:8px 0">${n1}/${d1} = ${cn1}/${lcd}，${n2}/${d2} = ${cn2}/${lcd}</div>
    <div class="result-big" style="color:${color}">${n1}/${d1} ${sign} ${n2}/${d2}</div>
  `;
}

function load(a, b, c, d) {
  document.getElementById('n1').value = a; document.getElementById('d1').value = b;
  document.getElementById('n2').value = c; document.getElementById('d2').value = d;
  compare();
}

function resetAll() { load(3, 4, 2, 3); }
compare();
</script>
</body>
</html>
