<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>正比例与反比例 — 教立方</title>
  <!-- play-ref:jiaohukejian:1UC3JB2 | 自研 -->
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <script src="../edu-lib/three.min.js"></script>
  <script src="../edu-lib/OrbitControls.js"></script>
  <script src="../edu-lib/edu-3d.js"></script>
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr minmax(280px, 300px); height: 100%; }
    .canvas-area { position: relative; background: #f8fafc; overflow: hidden; min-height: 0; }
    .canvas-area canvas { width: 100%; height: 100%; display: block; }
    .panel { border-left: 1px solid var(--edu-border); padding: 12px; display: flex; flex-direction: column; gap: 10px; overflow: auto; background: var(--edu-surface); }
    .tabs { display: flex; gap: 6px; }
    .tab { flex: 1; padding: 8px; border-radius: 8px; font-size: 12px; font-weight: 700; border: 2px solid var(--edu-border); background: #f8fafc; cursor: pointer; }
    .tab.active { border-color: var(--edu-primary); color: var(--edu-primary); }
    .slider-block label { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; }
    .tbl { width: 100%; font-size: 12px; border-collapse: collapse; }
    .tbl td { border: 1px solid var(--edu-border); padding: 4px 6px; text-align: right; }
    .orbit-hint { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); font-size: 10px; background: rgba(255,255,255,.92); padding: 4px 10px; border-radius: 14px; color: #64748b; pointer-events: none; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div class="edu-toolbar-lead">
      <span class="edu-toolbar-title">📈 正比例与反比例</span>
      <span class="edu-toolbar-subtitle">3D 曲线 · 表格</span>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="c3d"></canvas>
        <div class="orbit-hint">蓝：正比例直线 · 橙：反比例一支</div>
      </div>
      <div class="panel">
        <div class="tabs">
          <button type="button" class="tab active" id="t1">正比例 y=kx</button>
          <button type="button" class="tab" id="t2">反比例 y=k/x</button>
        </div>
        <div class="slider-block"><label><span>k</span><span id="kv">2</span></label><input type="range" id="k" min="0.5" max="6" step="0.5" value="2" /></div>
        <div class="slider-block"><label><span>动点 x</span><span id="xv">1</span></label><input type="range" id="xx" min="0.3" max="8" step="0.1" value="1" /></div>
        <table class="tbl" id="tbl"></table>
        <p id="eq" style="font-size:13px;font-weight:700;color:var(--edu-primary)"></p>
      </div>
    </div>
  </div>
</div>
<script>
(function () {
  var canvas = document.getElementById("c3d");
  var kEl = document.getElementById("k");
  var xxEl = document.getElementById("xx");
  var tbl = document.getElementById("tbl");
  var eq = document.getElementById("eq");
  var kind = "dir";

  var ctx = Edu3D.createScene(canvas, {
    bg: 0xffffff,
    fov: 42,
    camX: 5.5,
    camY: 4.2,
    camZ: 5.5,
    lookX: 0,
    lookY: 0.2,
    lookZ: 0,
    minDist: 2,
    maxDist: 18,
  });
  Edu3D.addLights(ctx.scene);
  Edu3D.addGrid(ctx.scene, 12, 12, 0xe2e8f0, -0.72);

  var world = new THREE.Group();
  ctx.scene.add(world);
  var curveLine = null;
  var dot = null;
  var axMat = new THREE.LineBasicMaterial({ color: 0x94a3b8 });
  world.add(
    new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(-1.8, -0.66, 0),
        new THREE.Vector3(1.8, -0.66, 0),
      ]),
      axMat
    )
  );
  world.add(
    new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(-1.8, -0.66, 0),
        new THREE.Vector3(-1.8, 2.2, 0),
      ]),
      axMat
    )
  );

  function sync() {
    var K = Number(kEl.value);
    var x0 = Number(xxEl.value);
    document.getElementById("kv").textContent = kEl.value;
    document.getElementById("xv").textContent = xxEl.value;

    var y0 = kind === "dir" ? K * x0 : K / x0;
    tbl.innerHTML =
      "<tr><td>x</td><td>" +
      x0.toFixed(1) +
      "</td></tr><tr><td>y</td><td>" +
      (y0 > 20 ? "—" : y0.toFixed(2)) +
      "</td></tr>";
    eq.textContent =
      kind === "dir" ? "y = " + K + " · x（过原点的直线）" : "y = " + K + " / x（双曲线一支）";

    if (curveLine) {
      world.remove(curveLine);
      curveLine.geometry.dispose();
      curveLine.material.dispose();
    }
    if (dot) {
      world.remove(dot);
      dot.geometry.dispose();
      dot.material.dispose();
    }

    var pts = [];
    var i;
    for (i = 1; i <= 64; i++) {
      var xi = (i / 64) * 8.2 + 0.15;
      var yi = kind === "dir" ? K * xi : K / xi;
      if (yi > 8.5) continue;
      pts.push(new THREE.Vector3(xi * 0.35 - 1.6, -0.5 + yi * 0.35, 0.2));
    }
    var geo = new THREE.BufferGeometry().setFromPoints(pts);
    curveLine = new THREE.Line(
      geo,
      new THREE.LineBasicMaterial({ color: kind === "dir" ? 0x2563eb : 0xea580c, linewidth: 1 })
    );
    world.add(curveLine);

    if (y0 <= 8.5) {
      dot = new THREE.Mesh(
        new THREE.SphereGeometry(0.09, 16, 12),
        Edu3D.material(0xe11d48)
      );
      dot.position.set(x0 * 0.35 - 1.6, -0.5 + y0 * 0.35, 0.2);
      world.add(dot);
    }
  }

  document.getElementById("t1").addEventListener("click", function () {
    kind = "dir";
    document.getElementById("t1").classList.add("active");
    document.getElementById("t2").classList.remove("active");
    sync();
  });
  document.getElementById("t2").addEventListener("click", function () {
    kind = "inv";
    document.getElementById("t2").classList.add("active");
    document.getElementById("t1").classList.remove("active");
    sync();
  });
  kEl.addEventListener("input", sync);
  xxEl.addEventListener("input", sync);

  function onResize() {
    var w = canvas.clientWidth || 400;
    var h = canvas.clientHeight || 360;
    ctx.renderer.setSize(w, h, false);
    ctx.camera.aspect = w / h;
    ctx.camera.updateProjectionMatrix();
  }
  window.addEventListener("resize", onResize);
  sync();
  onResize();
  Edu3D.startLoop(ctx.scene, ctx.camera, ctx.renderer, ctx.controls, null);
})();
</script>
</body>
</html>
