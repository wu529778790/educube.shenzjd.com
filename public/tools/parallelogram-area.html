<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>平行四边形面积 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 280px; height: 100%; }
    .canvas-area { padding: 16px; overflow: hidden; background: linear-gradient(135deg, #f0fdf4 0%, #fdfaf4 100%); position: relative; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 12px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #bbf7d0; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .prop-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; background: #fff; border-radius: 8px; border: 1px solid #e2e8f0; }
    .prop-label { font-size: 12px; color: #64748b; }
    .prop-value { font-size: 13px; font-weight: 700; font-family: 'Courier New', monospace; }
    .mode-btns { display: flex; gap: 4px; }
    .mode-btn { flex: 1; padding: 7px 0; border-radius: 8px; font-size: 12px; font-weight: 600; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; text-align: center; font-family: var(--edu-font); }
    .mode-btn.active { background: var(--edu-primary); color: #fff; border-color: var(--edu-primary); }
    .anim-controls { display: flex; gap: 6px; align-items: center; }
    .anim-controls button { padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; font-family: var(--edu-font); }
    .play-btn { background: #22c55e; color: #fff; }
    .reset-btn { background: #f1f5f9; color: #64748b; }
    .progress-bar { flex: 1; height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: #22c55e; border-radius: 3px; transition: width .1s; width: 0%; }
    .check-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #334155; cursor: pointer; }
    .check-row input { accent-color: #22c55e; }
    canvas { border-radius: 12px; background: #fff; display: block; }
    .hint { font-size: 11px; color: #94a3b8; text-align: center; margin-top: 2px; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">▱ 平行四边形面积</div>
      <div class="edu-toolbar-subtitle">上册 · 第六单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <div class="mode-btns">
        <button class="mode-btn active" id="modeDrag" onclick="setMode('drag')">拖拽顶点</button>
        <button class="mode-btn" id="modeProof" onclick="setMode('proof')">割补证明</button>
        <button class="mode-btn" id="modeCompare" onclick="setMode('compare')">对比长方形</button>
      </div>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="cvs" style="width:100%;height:100%;cursor:default"></canvas>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">实时数据</div>
          <div class="prop-row"><span class="prop-label">底 (base)</span><span class="prop-value" id="propBase" style="color:#22c55e">6.0</span></div>
          <div class="prop-row"><span class="prop-label">高 (height)</span><span class="prop-value" id="propH" style="color:#ef4444">4.0</span></div>
          <div class="prop-row"><span class="prop-label">斜边 (slant)</span><span class="prop-value" id="propSlant" style="color:#f97316">—</span></div>
          <div class="prop-row"><span class="prop-label">面积 S</span><span class="prop-value" id="propArea" style="color:#1a3a5c">24.0</span></div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">斜边 vs 高</div>
          <label class="check-row"><input type="checkbox" id="chkSlant" checked onchange="render()">显示斜边长度</label>
          <label class="check-row"><input type="checkbox" id="chkHeight" checked onchange="render()">显示高的垂线</label>
          <label class="check-row"><input type="checkbox" id="chkRightAngle" checked onchange="render()">直角标记</label>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section" id="proofPanel" style="display:none">
          <div class="ctrl-label">割补动画</div>
          <div class="anim-controls">
            <button class="play-btn" id="playBtn" onclick="togglePlay()">▶ 播放</button>
            <button class="reset-btn" onclick="resetAnim()">重置</button>
          </div>
          <div class="anim-controls" style="margin-top:4px">
            <span style="font-size:11px;color:#64748b">进度</span>
            <div class="progress-bar"><div class="progress-fill" id="animBar"></div></div>
          </div>
          <div id="proofStep" style="font-size:12px;color:#334155;line-height:1.7;margin-top:4px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 10px;">
            点击「播放」观看面积推导过程
          </div>
        </div>
        <div class="ctrl-section">
          <div class="ctrl-label">快速预设</div>
          <div style="display:flex;gap:4px">
            <button class="mode-btn" onclick="loadPreset(6,4,2)">底6 高4</button>
            <button class="mode-btn" onclick="loadPreset(8,5,3)">底8 高5</button>
            <button class="mode-btn" onclick="loadPreset(10,3,4)">底10 高3</button>
          </div>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <b>面积公式推导</b><br/>
          ● 沿高剪开一个三角形<br/>
          ● 把三角形移到另一边<br/>
          ● 拼成一个长方形<br/>
          ● 长方形面积 = 长 × 宽<br/>
          ● 所以 <b>S = 底 × 高</b>
        </div>
        <div class="hint" id="dragHint">💡 拖拽画布上的顶点来改变形状</div>
      </div>
    </div>
  </div>
</div>
<script>
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
let W, H, mode = 'drag';
const UNIT = 30;

// Vertices: A(top-left), B(top-right), C(bottom-right), D(bottom-left)
let verts = [
  { x: 3, y: 3 }, { x: 9, y: 3 }, { x: 11, y: 7 }, { x: 5, y: 7 }
];
let dragging = -1, animT = 0, playing = false, animRAF = null;

function resize() {
  const r = cvs.parentElement.getBoundingClientRect();
  cvs.width = r.width - 32; cvs.height = r.height - 32;
  W = cvs.width; H = cvs.height; render();
}
window.addEventListener('resize', resize);

function g2c(gx, gy) {
  const cols = Math.floor(W / UNIT), rows = Math.floor(H / UNIT);
  const ox = (W - cols * UNIT) / 2, oy = (H - rows * UNIT) / 2;
  return { x: ox + gx * UNIT, y: oy + gy * UNIT };
}
function c2g(cx, cy) {
  const cols = Math.floor(W / UNIT), rows = Math.floor(H / UNIT);
  const ox = (W - cols * UNIT) / 2, oy = (H - rows * UNIT) / 2;
  return { x: (cx - ox) / UNIT, y: (cy - oy) / UNIT };
}
function dist(a, b) { return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2); }

function drawGrid() {
  const cols = Math.floor(W / UNIT), rows = Math.floor(H / UNIT);
  const ox = (W - cols * UNIT) / 2, oy = (H - rows * UNIT) / 2;
  ctx.strokeStyle = '#e8e8e0'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= cols; i++) { const x = ox + i * UNIT; ctx.beginPath(); ctx.moveTo(x, oy); ctx.lineTo(x, oy + rows * UNIT); ctx.stroke(); }
  for (let j = 0; j <= rows; j++) { const y = oy + j * UNIT; ctx.beginPath(); ctx.moveTo(ox, y); ctx.lineTo(ox + cols * UNIT, y); ctx.stroke(); }
}

function metrics() {
  const [A, B, C, D] = verts;
  const base = dist(D, C);
  const dx = C.x - D.x, dy = C.y - D.y;
  const baseLen = Math.sqrt(dx * dx + dy * dy);
  const height = Math.abs(dx * (A.y - D.y) - dy * (A.x - D.x)) / baseLen;
  const slant = dist(A, D);
  return { base, height, slant, area: base * height };
}

function footOfPerp() {
  const [A, B, C, D] = verts;
  const dx = C.x - D.x, dy = C.y - D.y, len2 = dx * dx + dy * dy;
  const t = ((A.x - D.x) * dx + (A.y - D.y) * dy) / len2;
  return { x: D.x + t * dx, y: D.y + t * dy, dx, dy, len2 };
}

function drawRightAngle(px, py, d1x, d1y, d2x, d2y, s) {
  s = s || 6;
  ctx.beginPath();
  ctx.moveTo(px + d1x * s, py + d1y * s);
  ctx.lineTo(px + d1x * s + d2x * s, py + d1y * s + d2y * s);
  ctx.lineTo(px + d2x * s, py + d2y * s);
  ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 1.5; ctx.stroke();
}

function drawHeightLine() {
  if (!document.getElementById('chkHeight').checked) return;
  const [A] = verts;
  const fp = footOfPerp();
  const ap = g2c(A.x, A.y), fpc = g2c(fp.x, fp.y);
  ctx.save(); ctx.beginPath(); ctx.moveTo(ap.x, ap.y); ctx.lineTo(fpc.x, fpc.y);
  ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2; ctx.setLineDash([6, 4]); ctx.stroke(); ctx.setLineDash([]); ctx.restore();

  const mx = (ap.x + fpc.x) / 2, my = (ap.y + fpc.y) / 2, m = metrics();
  ctx.save(); ctx.translate(mx, my);
  ctx.rotate(Math.atan2(fpc.y - ap.y, fpc.x - ap.x) - Math.PI / 2);
  ctx.fillStyle = '#ef4444'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('h=' + m.height.toFixed(1), 0, -6); ctx.restore();

  if (document.getElementById('chkRightAngle').checked) {
    const bLen = Math.sqrt(fp.len2);
    const bdx = fp.dx / bLen, bdy = fp.dy / bLen;
    const hdx = A.x - fp.x, hdy = A.y - fp.y, hLen = Math.sqrt(hdx * hdx + hdy * hdy);
    if (hLen > 0.1) drawRightAngle(fpc.x, fpc.y, bdx * UNIT, bdy * UNIT, hdx / hLen * UNIT, hdy / hLen * UNIT);
  }
}

function drawSlantSide() {
  if (!document.getElementById('chkSlant').checked) return;
  const [A, , , D] = verts;
  const ap = g2c(A.x, A.y), dp = g2c(D.x, D.y), m = metrics();
  const mx = (ap.x + dp.x) / 2, my = (ap.y + dp.y) / 2;
  ctx.save(); ctx.translate(mx, my);
  ctx.rotate(Math.atan2(dp.y - ap.y, dp.x - ap.x) + Math.PI / 2);
  ctx.fillStyle = '#f97316'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('斜=' + m.slant.toFixed(1), 0, -8); ctx.restore();
}

function drawParallelogram(fill, stroke, lw) {
  const pts = verts.map(v => g2c(v.x, v.y));
  ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
  pts.slice(1).forEach(p => ctx.lineTo(p.x, p.y)); ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  ctx.strokeStyle = stroke || '#22c55e'; ctx.lineWidth = lw || 2.5; ctx.stroke();
}

function drawHandles() {
  const labels = ['A', 'B', 'C', 'D'];
  verts.forEach((v, i) => {
    const p = g2c(v.x, v.y);
    ctx.beginPath(); ctx.arc(p.x, p.y, dragging === i ? 9 : 7, 0, Math.PI * 2);
    ctx.fillStyle = dragging === i ? '#f97316' : '#1a3a5c'; ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(labels[i], p.x, p.y + 3.5);
  });
}

function drawBaseLabel() {
  const [ , , C, D] = verts, m = metrics();
  const mp = g2c((D.x + C.x) / 2, (D.y + C.y) / 2);
  const angle = Math.atan2(C.y - D.y, C.x - D.x);
  ctx.save(); ctx.translate(mp.x, mp.y); ctx.rotate(angle); ctx.translate(0, 20); ctx.rotate(-angle);
  ctx.fillStyle = '#22c55e'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('底=' + m.base.toFixed(1), 0, 0); ctx.restore();
}

function updateProps() {
  const m = metrics();
  document.getElementById('propBase').textContent = m.base.toFixed(1);
  document.getElementById('propH').textContent = m.height.toFixed(1);
  document.getElementById('propSlant').textContent = m.slant.toFixed(1);
  document.getElementById('propArea').textContent = m.area.toFixed(1);
}

/* === Render: Drag Mode === */
function renderDragMode() {
  drawGrid(); drawParallelogram('#dcfce7', '#22c55e', 2.5);
  drawBaseLabel(); drawHeightLine(); drawSlantSide(); drawHandles();
  const m = metrics();
  const cp = g2c((verts[0].x + verts[1].x + verts[2].x + verts[3].x) / 4,
                  (verts[0].y + verts[1].y + verts[2].y + verts[3].y) / 4);
  ctx.fillStyle = '#1a3a5c'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('S = ' + m.area.toFixed(1), cp.x, cp.y);
}

/* === Render: Proof Mode === */
function renderProofMode() {
  drawGrid();
  const [A, B, C, D] = verts;
  const ap = g2c(A.x, A.y), bp = g2c(B.x, B.y), cp = g2c(C.x, C.y), dp = g2c(D.x, D.y);
  const m = metrics(), fp = footOfPerp(), E = { x: fp.x, y: fp.y }, ep = g2c(E.x, E.y);
  const tvx = C.x - E.x, tvy = C.y - E.y;

  if (animT < 0.01) {
    drawParallelogram('#dcfce7', '#22c55e', 2.5);
    ctx.beginPath(); ctx.moveTo(ap.x, ap.y); ctx.lineTo(ep.x, ep.y);
    ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2; ctx.setLineDash([5, 3]); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = '#ef4444'; ctx.font = '16px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('\u2702', (ap.x + ep.x) / 2 + 12, (ap.y + ep.y) / 2);
  } else if (animT >= 1) {
    // Final rectangle
    const rBL = ep, rBR = cp;
    const rTL = g2c(E.x + (A.x - E.x), E.y + (A.y - E.y));
    const rTR = g2c(E.x + tvx + (A.x - E.x), E.y + tvy + (A.y - E.y));
    ctx.beginPath(); ctx.moveTo(rBL.x, rBL.y); ctx.lineTo(rBR.x, rBR.y);
    ctx.lineTo(rTR.x, rTR.y); ctx.lineTo(rTL.x, rTL.y); ctx.closePath();
    ctx.fillStyle = '#dcfce7'; ctx.fill(); ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 2.5; ctx.stroke();

    // Highlight moved triangle
    const t0 = g2c(E.x + tvx, E.y + tvy), t1 = g2c(E.x + tvx + (A.x - E.x), E.y + tvy + (A.y - E.y));
    ctx.beginPath(); ctx.moveTo(t0.x, t0.y); ctx.lineTo(t1.x, t1.y); ctx.lineTo(cp.x, cp.y); ctx.closePath();
    ctx.fillStyle = '#fef3c7'; ctx.fill(); ctx.strokeStyle = '#eab308'; ctx.lineWidth = 1.5; ctx.stroke();

    const rcx = (rBL.x + rBR.x + rTR.x + rTL.x) / 4, rcy = (rBL.y + rBR.y + rTR.y + rTL.y) / 4;
    ctx.fillStyle = '#22c55e'; ctx.font = 'bold 15px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('= 长方形', rcx, rcy - 6);
    ctx.font = 'bold 13px sans-serif';
    ctx.fillText('S = 底\u00d7高 = ' + m.base.toFixed(1) + '\u00d7' + m.height.toFixed(1) + ' = ' + m.area.toFixed(1), rcx, rcy + 14);
  } else {
    // Animating: fixed quadrilateral + moving triangle
    ctx.beginPath(); ctx.moveTo(ap.x, ap.y); ctx.lineTo(bp.x, bp.y);
    ctx.lineTo(cp.x, cp.y); ctx.lineTo(ep.x, ep.y); ctx.closePath();
    ctx.fillStyle = '#dcfce7'; ctx.fill(); ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 2; ctx.stroke();

    const ox = animT * tvx, oy = animT * tvy;
    const ta = g2c(A.x + ox, A.y + oy), td = g2c(D.x + ox, D.y + oy), te = g2c(E.x + ox, E.y + oy);
    ctx.beginPath(); ctx.moveTo(ta.x, ta.y); ctx.lineTo(td.x, td.y); ctx.lineTo(te.x, te.y); ctx.closePath();
    ctx.fillStyle = '#fef3c7'; ctx.fill(); ctx.strokeStyle = '#eab308'; ctx.lineWidth = 2; ctx.stroke();

    // Direction arrow
    const as = g2c(D.x + ox * 0.5, D.y + oy * 0.5);
    const ae = g2c(D.x + ox * 0.5 + tvx * 0.3, D.y + oy * 0.5 + tvy * 0.3);
    ctx.beginPath(); ctx.moveTo(as.x, as.y); ctx.lineTo(ae.x, ae.y); ctx.strokeStyle = '#f97316'; ctx.lineWidth = 2; ctx.stroke();
    const ang = Math.atan2(ae.y - as.y, ae.x - as.x);
    ctx.beginPath(); ctx.moveTo(ae.x, ae.y);
    ctx.lineTo(ae.x - 10 * Math.cos(ang - 0.4), ae.y - 10 * Math.sin(ang - 0.4));
    ctx.lineTo(ae.x - 10 * Math.cos(ang + 0.4), ae.y - 10 * Math.sin(ang + 0.4));
    ctx.closePath(); ctx.fillStyle = '#f97316'; ctx.fill();
  }
}

/* === Render: Compare Mode === */
function renderCompareMode() {
  drawGrid();
  const [A, B, C, D] = verts, m = metrics();
  const pts = verts.map(v => g2c(v.x, v.y));
  const pcx = (pts[0].x + pts[1].x + pts[2].x + pts[3].x) / 4;
  const pcy = (pts[0].y + pts[1].y + pts[2].y + pts[3].y) / 4;
  const shift = m.base * UNIT / 2 + 15;

  // Left: parallelogram
  ctx.save(); ctx.translate(-shift, 0);
  ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
  pts.slice(1).forEach(p => ctx.lineTo(p.x, p.y)); ctx.closePath();
  ctx.fillStyle = '#dcfce7'; ctx.fill(); ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 2.5; ctx.stroke();
  ctx.fillStyle = '#1a3a5c'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('\u5e73\u884c\u56db\u8fb9\u5f62', pcx, pcy - 6);
  ctx.fillText('S=' + m.area.toFixed(1), pcx, pcy + 12);
  ctx.restore();

  // Right: equivalent rectangle (axis-aligned)
  const rw = m.base * UNIT, rh = m.height * UNIT;
  const rx = pcx - rw / 2, ry = pcy - rh / 2;
  ctx.save(); ctx.translate(shift, 0);
  ctx.beginPath(); ctx.rect(rx, ry, rw, rh);
  ctx.fillStyle = '#e0f2fe'; ctx.fill(); ctx.strokeStyle = '#0ea5e9'; ctx.lineWidth = 2.5; ctx.stroke();
  ctx.fillStyle = '#1a3a5c'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('\u957f\u65b9\u5f62', pcx, pcy - 6);
  ctx.fillStyle = '#0ea5e9'; ctx.fillText('S=' + m.area.toFixed(1), pcx, pcy + 12);
  ctx.font = 'bold 11px sans-serif';
  ctx.fillStyle = '#22c55e'; ctx.fillText('\u5e95=' + m.base.toFixed(1), pcx, ry + rh + 16);
  ctx.fillStyle = '#ef4444';
  ctx.save(); ctx.translate(rx - 12, pcy); ctx.rotate(-Math.PI / 2);
  ctx.fillText('\u9ad8=' + m.height.toFixed(1), 0, 0); ctx.restore();
  ctx.restore();

  // "=" sign and formula
  ctx.fillStyle = '#1a3a5c'; ctx.font = 'bold 24px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('=', W / 2, H / 2 + 4);
  ctx.font = 'bold 14px sans-serif';
  ctx.fillText('S = \u5e95 \u00d7 \u9ad8 = ' + m.base.toFixed(1) + ' \u00d7 ' + m.height.toFixed(1) + ' = ' + m.area.toFixed(1), W / 2, H - 20);
}

function render() {
  if (!W) return;
  ctx.clearRect(0, 0, W, H);
  ({ drag: renderDragMode, proof: renderProofMode, compare: renderCompareMode })[mode]();
  updateProps();
}

/* === Mode Switching === */
function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btns .mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mode' + m.charAt(0).toUpperCase() + m.slice(1)).classList.add('active');
  document.getElementById('proofPanel').style.display = m === 'proof' ? 'flex' : 'none';
  document.getElementById('dragHint').textContent =
    m === 'drag' ? '\u62d6\u62fd\u753b\u5e03\u4e0a\u7684\u9876\u70b9\u6765\u6539\u53d8\u5f62\u72b6' :
    m === 'proof' ? '\u89c2\u770b\u5272\u8865\u6cd5\u63a8\u5bfc\u9762\u79ef\u516c\u5f0f' : '\u5e73\u884c\u56db\u8fb9\u5f62\u4e0e\u957f\u65b9\u5f62\u9762\u79ef\u5bf9\u6bd4';
  if (m === 'proof') { animT = 0; playing = false; updatePlayBtn(); }
  render();
}

/* === Proof Controls === */
function togglePlay() {
  if (playing) { playing = false; if (animRAF) cancelAnimationFrame(animRAF); }
  else { if (animT >= 1) animT = 0; playing = true; animStep(); }
  updatePlayBtn();
}
function updatePlayBtn() {
  document.getElementById('playBtn').textContent = playing ? '\u23f8 \u6682\u505c' : '\u25b6 \u64ad\u653e';
  document.getElementById('animBar').style.width = (animT * 100) + '%';
  const el = document.getElementById('proofStep');
  if (animT < 0.01) el.innerHTML = '\u7b2c\u4e00\u6b65\uff1a\u6cbf\u9ad8\u753b\u4e00\u6761\u5782\u7ebf\uff0c\u5c06\u5e73\u884c\u56db\u8fb9\u5f62\u5206\u4e3a<b>\u4e09\u89d2\u5f62</b>\u548c<b>\u68af\u5f62</b>';
  else if (animT < 0.5) el.innerHTML = '\u7b2c\u4e8c\u6b65\uff1a\u628a\u5de6\u8fb9\u7684<b style="color:#eab308">\u4e09\u89d2\u5f62</b>\u5411\u53f3\u5e73\u79fb\u2026';
  else if (animT < 0.99) el.innerHTML = '\u7b2c\u4e09\u6b65\uff1a\u4e09\u89d2\u5f62\u5373\u5c06\u586b\u5165\u53f3\u4fa7\u7a7a\u9699\u2026';
  else el.innerHTML = '\u5b8c\u6210\uff01\u62fc\u6210\u4e00\u4e2a<b style="color:#22c55e">\u957f\u65b9\u5f62</b>\uff0c\u9762\u79ef = \u5e95 \u00d7 \u9ad8 \u2705';
}
function resetAnim() { playing = false; if (animRAF) cancelAnimationFrame(animRAF); animT = 0; updatePlayBtn(); render(); }
function animStep() {
  if (!playing) return;
  animT += 0.008; if (animT >= 1) { animT = 1; playing = false; }
  updatePlayBtn(); render();
  if (playing) animRAF = requestAnimationFrame(animStep);
}

/* === Vertex Dragging === */
function getMousePos(e) { const r = cvs.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }
function findVertex(mx, my) {
  for (let i = 0; i < 4; i++) { const p = g2c(verts[i].x, verts[i].y); if (Math.sqrt((mx - p.x) ** 2 + (my - p.y) ** 2) < 14) return i; }
  return -1;
}

cvs.addEventListener('mousedown', function(e) {
  if (mode !== 'drag') return;
  const p = getMousePos(e); dragging = findVertex(p.x, p.y);
  if (dragging >= 0) cvs.style.cursor = 'grabbing'; render();
});
cvs.addEventListener('mousemove', function(e) {
  if (mode !== 'drag') return; const p = getMousePos(e);
  if (dragging >= 0) {
    const g = c2g(p.x, p.y);
    g.x = Math.round(g.x * 2) / 2; g.y = Math.round(g.y * 2) / 2;
    g.x = Math.max(1, Math.min(15, g.x)); g.y = Math.max(1, Math.min(10, g.y));
    verts[dragging] = { x: g.x, y: g.y }; render();
  } else { cvs.style.cursor = findVertex(p.x, p.y) >= 0 ? 'grab' : 'default'; }
});
cvs.addEventListener('mouseup', function() { dragging = -1; cvs.style.cursor = 'default'; render(); });
cvs.addEventListener('mouseleave', function() { dragging = -1; render(); });

// Touch support
cvs.addEventListener('touchstart', function(e) {
  if (mode !== 'drag') return; e.preventDefault();
  const t = e.touches[0], r = cvs.getBoundingClientRect();
  dragging = findVertex(t.clientX - r.left, t.clientY - r.top); render();
}, { passive: false });
cvs.addEventListener('touchmove', function(e) {
  if (mode !== 'drag' || dragging < 0) return; e.preventDefault();
  const t = e.touches[0], r = cvs.getBoundingClientRect();
  const g = c2g(t.clientX - r.left, t.clientY - r.top);
  g.x = Math.round(g.x * 2) / 2; g.y = Math.round(g.y * 2) / 2;
  g.x = Math.max(1, Math.min(15, g.x)); g.y = Math.max(1, Math.min(10, g.y));
  verts[dragging] = { x: g.x, y: g.y }; render();
}, { passive: false });
cvs.addEventListener('touchend', function() { dragging = -1; render(); });

/* === Presets & Reset === */
function loadPreset(base, height, skew) {
  const cx = 8, cy = 5, hb = base / 2, hh = height / 2;
  verts = [
    { x: cx - hb + skew, y: cy - hh }, { x: cx + hb + skew, y: cy - hh },
    { x: cx + hb - skew, y: cy + hh }, { x: cx - hb - skew, y: cy + hh }
  ];
  animT = 0; render();
}
function resetAll() {
  loadPreset(6, 4, 2); animT = 0; playing = false;
  if (animRAF) cancelAnimationFrame(animRAF); updatePlayBtn(); setMode('drag');
  document.getElementById('chkSlant').checked = true;
  document.getElementById('chkHeight').checked = true;
  document.getElementById('chkRightAngle').checked = true;
}

resize();
</script>
