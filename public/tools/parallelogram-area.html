<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>平行四边形面积 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 260px; height: 100%; }
    .canvas-area { padding: 24px; overflow-y: auto; background: linear-gradient(135deg, #f0fdf4 0%, #fdfaf4 100%); display: flex; flex-direction: column; align-items: center; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 14px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #bbf7d0; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .slider-row { display: flex; align-items: center; gap: 10px; }
    .slider-row input { flex: 1; }
    .slider-row .value-display { min-width: 40px; font-weight: 700; }
    canvas { border-radius: 12px; background: #fff; }
    .formula-card { background: #fff; border: 2px solid #22c55e; border-radius: 14px; padding: 16px; width: 100%; max-width: 440px; margin-top: 16px; text-align: center; }
    .formula-big { font-size: 24px; font-weight: 800; color: #22c55e; font-family: 'Courier New', monospace; }
    .step-box { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 12px; padding: 16px; width: 100%; max-width: 440px; margin-top: 12px; font-size: 14px; line-height: 2; }
    .preset-btn { padding: 8px 0; border-radius: 8px; font-size: 13px; font-weight: 600; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; }
    .preset-btn:hover { border-color: #22c55e; color: #22c55e; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">▱ 平行四边形面积</div>
      <div class="edu-toolbar-subtitle">上册 · 第六单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-accent" onclick="animateCut()">剪切动画</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="cvs" width="440" height="300"></canvas>
        <div class="formula-card" id="calcCard"></div>
        <div class="step-box" id="stepBox"></div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">底（cm）</div>
          <div class="slider-row">
            <input type="range" id="baseSlider" min="2" max="12" value="6" oninput="update()"/>
            <span class="value-display" id="baseVal">6</span>
          </div>
        </div>
        <div class="ctrl-section">
          <div class="ctrl-label">高（cm）</div>
          <div class="slider-row">
            <input type="range" id="heightSlider" min="2" max="10" value="4" oninput="update()"/>
            <span class="value-display" id="heightVal">4</span>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">预设</div>
          <button class="preset-btn" onclick="load(6,4)">底6 高4</button>
          <button class="preset-btn" onclick="load(8,5)">底8 高5</button>
          <button class="preset-btn" onclick="load(10,3)">底10 高3</button>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <b>面积公式推导</b><br/>
          ● 沿高剪开一个三角形<br/>
          ● 把三角形移到另一边<br/>
          ● 拼成一个长方形<br/>
          ● 长方形面积 = 长×宽<br/>
          ● 所以 S = 底 × 高
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
let animProgress = 0, animating = false;

function update() {
  const base = parseFloat(document.getElementById('baseSlider').value);
  const height = parseFloat(document.getElementById('heightSlider').value);
  document.getElementById('baseVal').textContent = base;
  document.getElementById('heightVal').textContent = height;
  draw(base, height, animProgress);
  calc(base, height);
}

function draw(base, height, cut) {
  const W = cvs.width, H = cvs.height;
  const cx = W / 2, cy = H / 2;
  const scale = 24;
  const b = base * scale, h = height * scale;
  const skew = height * 8; // horizontal offset

  ctx.clearRect(0, 0, W, H);

  // Parallelogram points
  const p1 = { x: cx - b/2 + skew, y: cy - h/2 }; // top-left
  const p2 = { x: cx + b/2 + skew, y: cy - h/2 }; // top-right
  const p3 = { x: cx + b/2 - skew, y: cy + h/2 }; // bottom-right
  const p4 = { x: cx - b/2 - skew, y: cy + h/2 }; // bottom-left

  if (cut === 0) {
    // Normal parallelogram
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.lineTo(p3.x, p3.y); ctx.lineTo(p4.x, p4.y);
    ctx.closePath();
    ctx.fillStyle = '#dcfce7';
    ctx.fill();
    ctx.strokeStyle = '#22c55e';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Height line
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p1.x, p3.y);
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.stroke();
    ctx.setLineDash([]);

    // Labels
    ctx.fillStyle = '#22c55e'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(`底 = ${base}`, (p4.x + p3.x) / 2, p3.y + 22);
    ctx.save(); ctx.translate(p1.x - 12, (p1.y + p3.y) / 2); ctx.rotate(-Math.PI/2);
    ctx.fillStyle = '#ef4444'; ctx.fillText(`高 = ${height}`, 0, 0); ctx.restore();
  } else {
    // Cut animation: triangle moves to the right
    const triX = p1.x + cut * (p3.x - p1.x + b);

    // Rectangle part (stays)
    ctx.beginPath();
    ctx.moveTo(p1.x + (p2.x - p1.x) * cut, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.lineTo(p3.x, p3.y);
    ctx.lineTo(p4.x, p4.y);
    ctx.closePath();
    ctx.fillStyle = '#dcfce7';
    ctx.fill();
    ctx.strokeStyle = '#22c55e';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Triangle (moving)
    const triW = p2.x - p1.x;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p1.x + triW * (1 - cut), p1.y);
    ctx.lineTo(p1.x + triW * (1 - cut), p3.y);
    ctx.closePath();
    ctx.fillStyle = '#fef3c7';
    ctx.fill();
    ctx.strokeStyle = '#eab308';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = '#334155'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
    if (cut >= 0.95) ctx.fillText('= 长方形', cx, cy - h/2 - 12);
  }
}

function calc(base, height) {
  const area = base * height;
  document.getElementById('calcCard').innerHTML = `
    <div style="font-size:14px;color:#64748b;margin-bottom:4px">平行四边形面积</div>
    <div class="formula-big">S = ${base} × ${height} = ${area} cm²</div>
  `;
  document.getElementById('stepBox').innerHTML = `
    <div style="font-weight:700;margin-bottom:6px">公式推导</div>
    <div>① 沿高剪下一个三角形</div>
    <div>② 把三角形平移到另一边</div>
    <div>③ 拼成长 ${base}cm、宽 ${height}cm 的长方形</div>
    <div>④ <b style="color:#22c55e">S = 底 × 高 = ${base} × ${height} = ${area} cm²</b></div>
  `;
}

function animateCut() {
  if (animating) return;
  animating = true;
  const base = parseFloat(document.getElementById('baseSlider').value);
  const height = parseFloat(document.getElementById('heightSlider').value);
  let t = 0;
  function step() {
    t += 0.02;
    if (t >= 1) { t = 1; animating = false; }
    animProgress = t;
    draw(base, height, t);
    if (t < 1) requestAnimationFrame(step);
  }
  step();
}

function load(b, h) {
  document.getElementById('baseSlider').value = b;
  document.getElementById('heightSlider').value = h;
  animProgress = 0;
  update();
}

function resetAll() { animProgress = 0; load(6, 4); }
update();
</script>
</body>
</html>
