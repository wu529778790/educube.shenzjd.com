<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分数乘法 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 260px; height: 100%; }
    .canvas-area { padding: 14px 18px; overflow-y: auto; background: linear-gradient(135deg, #fef3c7 0%, #fdfaf4 100%); display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 12px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 5px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: .05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #fde68a; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .preset-btn { padding: 7px 0; border-radius: 8px; font-size: 13px; font-weight: 700; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; }
    .preset-btn:hover { border-color: #f97316; color: #f97316; }
    .mode-tabs { display: flex; gap: 4px; }
    .mode-tab { flex: 1; padding: 6px 0; border-radius: 8px; font-size: 12px; font-weight: 700; border: 1.5px solid #e2e8f0; background: #fff; cursor: pointer; text-align: center; transition: all .15s; }
    .mode-tab.active { background: var(--edu-primary); color: #fff; border-color: var(--edu-primary); }
    .frac-input-row { display: flex; align-items: center; gap: 10px; justify-content: center; }
    .frac-in { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .frac-in input { width: 44px; text-align: center; font-size: 17px; font-weight: 800; border: 2px solid #e2e8f0; border-radius: 6px; padding: 3px; font-family: 'Courier New', monospace; background: #fff; }
    .frac-in input:focus { border-color: #f97316; outline: none; }
    .frac-in .fl { width: 44px; height: 3px; background: #334155; border-radius: 2px; }
    .op-sym { font-size: 22px; font-weight: 800; color: #f97316; }
    .eq-sym { font-size: 22px; font-weight: 800; color: #94a3b8; }
    .result-frac { font-size: 22px; font-weight: 800; color: #22c55e; min-width: 50px; text-align: center; }
    #areaCanvas { border-radius: 12px; background: #fff; cursor: crosshair; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    .slider-row { display: flex; align-items: center; gap: 8px; width: 100%; }
    .slider-row input[type="range"] { flex: 1; }
    .slider-val { font-size: 13px; font-weight: 800; min-width: 30px; text-align: center; color: #334155; }
    .cc-box { background: #fff; border: 2px solid #f97316; border-radius: 12px; padding: 10px 14px; width: 100%; max-width: 460px; font-family: 'Courier New', monospace; }
    .cc-frac { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; font-size: 18px; font-weight: 800; line-height: 1.3; }
    .cc-frac .cc-line { width: 28px; height: 2px; background: #334155; }
    .cc-cancel { text-decoration: line-through; color: #94a3b8; }
    .cc-new { color: #f97316; font-weight: 800; }
    .cc-op { font-size: 18px; font-weight: 800; color: #f97316; vertical-align: middle; margin: 0 5px; }
    .cc-result { color: #22c55e; }
    .practice-area { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; max-width: 460px; }
    .practice-question { font-size: 26px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .practice-check { padding: 9px 28px; border-radius: 10px; font-size: 15px; font-weight: 700; background: #22c55e; color: #fff; border: none; cursor: pointer; }
    .practice-check:hover { background: #16a34a; }
    .practice-msg { font-size: 16px; font-weight: 700; min-height: 22px; }
    .practice-correct { color: #22c55e; }
    .practice-wrong { color: #ef4444; }
    .step-text { font-size: 12px; color: #64748b; text-align: center; min-height: 16px; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">分数乘法</div>
      <div class="edu-toolbar-subtitle">上册 · 第一单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-accent" onclick="playAnimation()">动画演示</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <div class="frac-input-row">
          <div class="frac-in"><input type="number" id="n1" value="2" min="0" max="11" oninput="update()"/><div class="fl"></div><input type="number" id="d1" value="3" min="1" max="12" oninput="update()"/></div>
          <span class="op-sym">x</span>
          <div class="frac-in"><input type="number" id="n2" value="3" min="0" max="11" oninput="update()"/><div class="fl"></div><input type="number" id="d2" value="4" min="1" max="12" oninput="update()"/></div>
          <span class="eq-sym">=</span>
          <span class="result-frac" id="resDisp">1/2</span>
        </div>
        <div class="slider-row" style="max-width:460px">
          <span style="font-size:12px;font-weight:700;color:#f97316">横向</span>
          <input type="range" id="slider1" min="0" max="12" value="2" oninput="sliderChange(1)"/>
          <span class="slider-val" id="sv1">2/3</span>
        </div>
        <div class="slider-row" style="max-width:460px">
          <span style="font-size:12px;font-weight:700;color:#0ea5e9">纵向</span>
          <input type="range" id="slider2" min="0" max="12" value="3" oninput="sliderChange(2)"/>
          <span class="slider-val" id="sv2">3/4</span>
        </div>
        <canvas id="areaCanvas" width="380" height="380"></canvas>
        <div class="step-text" id="animStep">拖动滑块调整分数，或点击「动画演示」查看逐步过程</div>
        <div class="cc-box" id="ccBox"></div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">模式</div>
          <div class="mode-tabs">
            <div class="mode-tab active" onclick="setMode('explore')">探索</div>
            <div class="mode-tab" onclick="setMode('practice')">练习</div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">预设例子</div>
          <button class="preset-btn" onclick="loadEx(2,3,3,4)">2/3 x 3/4</button>
          <button class="preset-btn" onclick="loadEx(1,2,4,5)">1/2 x 4/5</button>
          <button class="preset-btn" onclick="loadEx(3,4,2,6)">3/4 x 2/6</button>
          <button class="preset-btn" onclick="loadEx(2,5,5,8)">2/5 x 5/8</button>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">计算步骤</div>
          <div class="info-box" id="stepsBox">输入分数后自动显示步骤。</div>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <b>分数乘法规则</b><br/>
          分子 x 分子 / 分母 x 分母<br/>
          先交叉约分可简化计算<br/>
          面积模型：横向=第一个分数<br/>
          纵向=第二个分数，重叠=乘积
        </div>
      </div>
    </div>
  </div>
</div>
<script>
/* --- math --- */
function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b];}return a||1;}
function simp(n,d){if(!n)return[0,1];const g=gcd(n,d);let sn=n/g,sd=d/g;return sd<0?[-sn,-sd]:[sn,sd];}
function fmt(n,d){const[sn,sd]=simp(n,d);return sd===1?''+sn:sn+'/'+sd;}

/* --- state --- */
let mode='explore', animPhase=-1, animTimer=null, practiceAnswer=null;
const cvs=document.getElementById('areaCanvas'), ctx=cvs.getContext('2d');

function getVals(){
  return{
    n1:Math.max(0,parseInt(document.getElementById('n1').value)||0),
    d1:Math.max(1,parseInt(document.getElementById('d1').value)||1),
    n2:Math.max(0,parseInt(document.getElementById('n2').value)||0),
    d2:Math.max(1,parseInt(document.getElementById('d2').value)||1)
  };
}
function setVals(a,b,c,d){document.getElementById('n1').value=a;document.getElementById('d1').value=b;document.getElementById('n2').value=c;document.getElementById('d2').value=d;}

/* cross-cancel: cancel (n1,d2) and (n2,d1) */
function crossCancel(n1,d1,n2,d2){
  let a=n1,b=d2,c=n2,dd=d1;
  const g1=gcd(a,b);a/=g1;b/=g1;
  const g2=gcd(c,dd);c/=g2;dd/=g2;
  return{a,b,c,d:dd,rn:a*c,rd:b*d,g1,g2};
}

/* --- main update --- */
function update(){
  const v=getVals(), rn=v.n1*v.n2, rd=v.d1*v.d2;
  const[sn,sd]=simp(rn,rd);
  document.getElementById('resDisp').textContent=fmt(rn,rd);
  // sync sliders
  const s1=document.getElementById('slider1'), s2=document.getElementById('slider2');
  s1.max=v.d1; s1.value=Math.min(v.n1,v.d1);
  s2.max=v.d2; s2.value=Math.min(v.n2,v.d2);
  document.getElementById('sv1').textContent=v.n1+'/'+v.d1;
  document.getElementById('sv2').textContent=v.n2+'/'+v.d2;
  drawArea(v.n1,v.d1,v.n2,v.d2,animPhase);
  updateSteps(v,sn,sd);
  updateCC(v);
}

function sliderChange(w){
  const v=getVals();
  if(w===1) document.getElementById('n1').value=document.getElementById('slider1').value;
  else document.getElementById('n2').value=document.getElementById('slider2').value;
  update();
}

/* --- canvas area model --- */
function drawArea(n1,d1,n2,d2,phase){
  const W=cvs.width,H=cvs.height,pad=36,mW=W-pad*2,mH=H-pad*2;
  const ox=pad,oy=pad,cW=mW/d1,cH=mH/d2;
  ctx.clearRect(0,0,W,H);
  const p1=phase===-1||phase>=1, p2=phase===-1||phase>=2, p3=phase===-1||phase>=3;
  // bg
  ctx.fillStyle='#fafafa'; ctx.fillRect(ox,oy,mW,mH);
  // horizontal (d1 columns)
  if(p1){
    ctx.strokeStyle='#cbd5e1'; ctx.lineWidth=.5;
    for(let i=0;i<=d1;i++){const x=ox+i*cW;ctx.beginPath();ctx.moveTo(x,oy);ctx.lineTo(x,oy+mH);ctx.stroke();}
    ctx.fillStyle='rgba(249,115,22,0.18)'; ctx.fillRect(ox,oy,n1*cW,mH);
    ctx.strokeStyle='#f97316'; ctx.lineWidth=2; ctx.strokeRect(ox,oy,n1*cW,mH);
    ctx.fillStyle='#f97316'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
    ctx.fillText(n1+'/'+d1,ox+n1*cW/2,oy-8);
  }
  // vertical (d2 rows)
  if(p2){
    ctx.strokeStyle='#cbd5e1'; ctx.lineWidth=.5;
    for(let j=0;j<=d2;j++){const y=oy+j*cH;ctx.beginPath();ctx.moveTo(ox,y);ctx.lineTo(ox+mW,y);ctx.stroke();}
    ctx.fillStyle='rgba(14,165,233,0.15)'; ctx.fillRect(ox,oy,mW,n2*cH);
    ctx.strokeStyle='#0ea5e9'; ctx.lineWidth=2; ctx.strokeRect(ox,oy,mW,n2*cH);
    ctx.save();ctx.translate(ox-10,oy+n2*cH/2);ctx.rotate(-Math.PI/2);
    ctx.fillStyle='#0ea5e9';ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.fillText(n2+'/'+d2,0,0);
    ctx.restore();
  }
  // overlap
  if(p3){
    const ow=n1*cW,oh=n2*cH;
    ctx.fillStyle='rgba(34,197,94,0.35)'; ctx.fillRect(ox,oy,ow,oh);
    for(let i=0;i<n1;i++)for(let j=0;j<n2;j++){
      ctx.fillStyle='rgba(34,197,94,0.12)'; ctx.fillRect(ox+i*cW+1,oy+j*cH+1,cW-2,cH-2);
      ctx.strokeStyle='#22c55e'; ctx.lineWidth=1; ctx.strokeRect(ox+i*cW,oy+j*cH,cW,cH);
    }
    ctx.fillStyle='#166534'; ctx.font='bold 15px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(fmt(n1*n2,d1*d2),ox+ow/2,oy+oh/2); ctx.textBaseline='alphabetic';
    // annotations
    ctx.fillStyle='#64748b'; ctx.font='11px sans-serif'; ctx.textAlign='left';
    ctx.fillText(n1+'x'+n2+'='+(n1*n2)+'格',ox+mW+5,oy+mH-2);
    ctx.fillText('共'+(d1*d2)+'格',ox+mW+5,oy+mH+12);
  }
  // outer border
  ctx.strokeStyle='#334155'; ctx.lineWidth=2; ctx.strokeRect(ox,oy,mW,mH);
}

/* --- animation --- */
function playAnimation(){
  stopAnimation(); animPhase=0;
  const v=getVals();
  const labels=[
    '第1步：分成 '+v.d1+' 列',
    '第2步：取 '+v.n1+'/'+v.d1+'（橙色区域）',
    '第3步：分成 '+v.d2+' 行，取 '+v.n2+'/'+v.d2+'（蓝色区域）',
    '第4步：重叠 = '+fmt(v.n1*v.n2,v.d1*v.d2)+'（绿色）'
  ];
  let step=0;
  (function tick(){
    document.getElementById('animStep').textContent=labels[step];
    drawArea(v.n1,v.d1,v.n2,v.d2,step);
    if(++step<=3) animTimer=setTimeout(tick,850);
    else animPhase=-1;
  })();
}
function stopAnimation(){if(animTimer){clearTimeout(animTimer);animTimer=null;}animPhase=-1;}

/* --- cross-cancel visual --- */
function updateCC(v){
  const cc=crossCancel(v.n1,v.d1,v.n2,v.d2);
  const bf=(n,d,cls)=>`<span class="cc-frac"><span class="${cls||''}">${n}</span><span class="cc-line"></span><span class="${cls||''}">${d}</span></span>`;
  let h='<div style="font-size:13px;font-weight:700;color:#334155;margin-bottom:5px">交叉约分过程</div><div style="text-align:center;line-height:2.2">';
  h+=bf(v.n1,v.d1)+'<span class="cc-op">x</span>'+bf(v.n2,v.d2);
  if(cc.g1>1||cc.g2>1){
    h+='<br><span style="font-size:12px;color:#f97316">';
    if(cc.g1>1) h+=v.n1+'与'+v.d2+'约去'+cc.g1+' ';
    if(cc.g2>1) h+=v.n2+'与'+v.d1+'约去'+cc.g2;
    h+='</span><br>'+bf(cc.a,cc.b,'cc-new')+'<span class="cc-op">x</span>'+bf(cc.c,cc.d,'cc-new');
  } else {
    h+='<br><span style="font-size:12px;color:#64748b">无公共因子，无需约分</span><br>';
    h+=bf(cc.a,cc.b)+'<span class="cc-op">x</span>'+bf(cc.c,cc.d);
  }
  const[sn,sd]=simp(cc.rn,cc.rd);
  h+='<br><span class="cc-op cc-result">=</span> '+(sd===1?`<span style="font-size:20px;font-weight:800;color:#22c55e">${sn}</span>`:bf(sn,sd,'cc-result'));
  h+='</div>';
  document.getElementById('ccBox').innerHTML=h;
}

/* --- steps --- */
function updateSteps(v,sn,sd){
  const rn=v.n1*v.n2,rd=v.d1*v.d2,g=gcd(rn,rd);
  let s='1) '+v.n1+'/'+v.d1+' x '+v.n2+'/'+v.d2+'<br>';
  s+='2) 分子: '+v.n1+' x '+v.n2+' = '+rn+'<br>';
  s+='3) 分母: '+v.d1+' x '+v.d2+' = '+rd+'<br>';
  s+='4) '+rn+'/'+rd;
  if(g>1&&rn!==0) s+='<br>5) 约分 ÷'+g+' = '+sn+'/'+sd;
  document.getElementById('stepsBox').innerHTML=s;
}

/* --- mode switch --- */
function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  const old=document.getElementById('practiceZone');if(old)old.remove();
  if(m==='practice'){
    cvs.style.display='none';
    document.getElementById('ccBox').style.display='none';
    document.getElementById('animStep').style.display='none';
    document.querySelectorAll('.slider-row').forEach(r=>r.style.display='none');
    startPractice();
  } else {
    cvs.style.display='';
    document.getElementById('ccBox').style.display='';
    document.getElementById('animStep').style.display='';
    document.querySelectorAll('.slider-row').forEach(r=>r.style.display='');
    update();
  }
}

/* --- practice mode --- */
function startPractice(){
  const d1=Math.floor(Math.random()*7)+2, n1=Math.floor(Math.random()*(d1-1))+1;
  const d2=Math.floor(Math.random()*7)+2, n2=Math.floor(Math.random()*(d2-1))+1;
  const[sn,sd]=simp(n1*n2,d1*d2);
  setVals(n1,d1,n2,d2);
  practiceAnswer={n:sn,d:sd};
  const el=document.createElement('div');
  el.innerHTML=`<div class="practice-area" id="practiceZone">
    <div style="font-size:15px;font-weight:700;color:#334155">计算下面的乘法</div>
    <div class="practice-question">
      <span style="color:#f97316">${n1}/${d1}</span><span style="color:#94a3b8"> x </span>
      <span style="color:#0ea5e9">${n2}/${d2}</span><span style="color:#94a3b8"> = </span>
      <div class="frac-in"><input type="number" id="ansN" style="width:48px;font-size:18px" min="0"/><div class="fl" style="width:48px"></div><input type="number" id="ansD" style="width:48px;font-size:18px" min="1"/></div>
    </div>
    <button class="practice-check" onclick="checkAnswer()">检查答案</button>
    <div class="practice-msg" id="pracMsg"></div>
    <button class="edu-btn edu-btn-outline" onclick="startPractice()" style="font-size:13px">换一题</button>
    <div class="info-box" id="pracHint" style="width:100%;display:none"></div>
  </div>`;
  document.querySelector('.canvas-area').appendChild(el.firstElementChild);
  setTimeout(()=>{const f=document.getElementById('ansN');if(f)f.focus();},80);
}

function checkAnswer(){
  const aN=parseInt(document.getElementById('ansN').value), aD=parseInt(document.getElementById('ansD').value);
  const msg=document.getElementById('pracMsg'), hint=document.getElementById('pracHint');
  if(isNaN(aN)||isNaN(aD)||aD===0){msg.className='practice-msg practice-wrong';msg.textContent='请输入完整的分数';return;}
  const[sn,sd]=simp(aN,aD);
  if(sn===practiceAnswer.n&&sd===practiceAnswer.d){
    msg.className='practice-msg practice-correct'; msg.textContent='正确！ '+practiceAnswer.n+'/'+practiceAnswer.d; hint.style.display='none';
  } else {
    msg.className='practice-msg practice-wrong'; msg.textContent='再想想，答案不对哦';
    const v=getVals();
    hint.style.display=''; hint.innerHTML='提示: '+v.n1+'x'+v.n2+'='+(v.n1*v.n2)+'，'+v.d1+'x'+v.d2+'='+(v.d1*v.d2)+'，再约分试试';
  }
}

/* --- presets & reset --- */
function loadEx(a,b,c,d){
  stopAnimation();
  if(mode==='practice'){
    mode='explore';
    document.querySelectorAll('.mode-tab').forEach(t=>t.classList.toggle('active',t.textContent==='探索'));
    const old=document.getElementById('practiceZone');if(old)old.remove();
    cvs.style.display=''; document.getElementById('ccBox').style.display='';
    document.getElementById('animStep').style.display='';
    document.querySelectorAll('.slider-row').forEach(r=>r.style.display='');
  }
  setVals(a,b,c,d); update();
}
function resetAll(){
  stopAnimation();
  document.getElementById('animStep').textContent='拖动滑块调整分数，或点击「动画演示」查看逐步过程';
  loadEx(2,3,3,4);
}

/* init */
update();
</script>
</body>
</html>
