<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>位置与方向（一） — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 290px; height: 100%; }
    .canvas-area { padding: 12px; overflow: hidden; background: linear-gradient(135deg, #fff7ed 0%, #fdfaf4 100%); position: relative; }
    .canvas-area canvas { width: 100%; height: 100%; display: block; cursor: crosshair; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 12px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 5px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #fed7aa; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .mode-tabs { display: flex; gap: 4px; }
    .mode-tab { flex: 1; padding: 7px 0; border-radius: 8px; font-size: 12px; font-weight: 700; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; text-align: center; font-family: var(--edu-font); }
    .mode-tab:hover { border-color: #f97316; color: #f97316; }
    .mode-tab.active { background: #f97316; color: #fff; border-color: #f97316; }
    .dir-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
    .dir-btn { padding: 6px 0; border-radius: 6px; font-size: 12px; font-weight: 700; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; text-align: center; font-family: var(--edu-font); }
    .dir-btn:hover, .dir-btn.active { border-color: #f97316; color: #f97316; background: #fff7ed; }
    .move-info { background: #fff; border: 2px solid #f97316; border-radius: 10px; padding: 10px 12px; text-align: center; font-size: 13px; font-weight: 600; }
    .quiz-box { background: #fff; border: 2px solid #0ea5e9; border-radius: 10px; padding: 12px; text-align: center; font-size: 13px; line-height: 1.6; }
    .quiz-box .q-text { font-weight: 700; font-size: 15px; color: #1a3a5c; margin-bottom: 6px; }
    .quiz-box .score-line { font-size: 12px; color: #64748b; }
    .treasure-hint { background: linear-gradient(135deg, #fef3c7, #fff7ed); border: 1.5px solid #fbbf24; border-radius: 8px; padding: 10px 12px; font-size: 13px; font-weight: 600; color: #92400e; text-align: center; line-height: 1.6; }
    .compass-label { position: absolute; pointer-events: none; background: #f97316; color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; opacity: 0; transition: opacity .2s; white-space: nowrap; }
    .compass-label.show { opacity: 1; }
    .action-row { display: flex; gap: 6px; }
    .action-row .edu-btn { flex: 1; justify-content: center; }
    .feedback { font-size: 12px; text-align: center; min-height: 18px; font-weight: 600; transition: all .2s; }
    .feedback.correct { color: #22c55e; }
    .feedback.wrong { color: #ef4444; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">🧭 位置与方向（一）</div>
      <div class="edu-toolbar-subtitle">下册 · 第一单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-accent" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="canvas"></canvas>
        <div class="compass-label" id="compassLabel"></div>
      </div>
      <div class="control-panel">
        <!-- Mode Tabs -->
        <div class="mode-tabs">
          <button class="mode-tab active" data-mode="explore" onclick="switchMode('explore')">探索</button>
          <button class="mode-tab" data-mode="quiz" onclick="switchMode('quiz')">测验</button>
          <button class="mode-tab" data-mode="treasure" onclick="switchMode('treasure')">寻宝</button>
        </div>
        <div class="divider"></div>

        <!-- Explore Mode -->
        <div id="panel-explore">
          <div class="ctrl-section">
            <div class="ctrl-label">拖拽指南针或点击按钮选择方向</div>
            <div class="dir-grid">
              <div class="dir-btn" data-dir="西北" onclick="setDir(this)">西北</div>
              <div class="dir-btn" data-dir="北" onclick="setDir(this)">北</div>
              <div class="dir-btn" data-dir="东北" onclick="setDir(this)">东北</div>
              <div class="dir-btn" data-dir="西" onclick="setDir(this)">西</div>
              <div style="text-align:center;font-size:14px;line-height:30px;color:#f97316">✦</div>
              <div class="dir-btn" data-dir="东" onclick="setDir(this)">东</div>
              <div class="dir-btn" data-dir="西南" onclick="setDir(this)">西南</div>
              <div class="dir-btn" data-dir="南" onclick="setDir(this)">南</div>
              <div class="dir-btn" data-dir="东南" onclick="setDir(this)">东南</div>
            </div>
          </div>
          <div class="divider"></div>
          <div class="ctrl-section">
            <div class="ctrl-label">移动步数</div>
            <div style="display:flex;align-items:center;gap:8px">
              <input type="range" id="steps" min="1" max="5" value="3" style="flex:1" oninput="updateStepDisplay()">
              <span class="value-display" id="stepVal">3</span>
            </div>
            <button class="edu-btn edu-btn-primary" style="width:100%;justify-content:center" onclick="doMove()">出发</button>
          </div>
          <div class="divider"></div>
          <div class="ctrl-section">
            <div class="ctrl-label">当前位置</div>
            <div class="move-info" id="posInfo">起点 (0, 0)</div>
          </div>
          <div class="divider"></div>
          <div class="info-box">
            <b>方向知识</b><br/>
            ● 东与西相对，南与北相对<br/>
            ● 地图上：上北下南，左西右东<br/>
            ● 东北：东和北之间<br/>
            ● 东南：东和南之间<br/>
            ● 西北：西和北之间<br/>
            ● 西南：西和南之间
          </div>
        </div>

        <!-- Quiz Mode -->
        <div id="panel-quiz" style="display:none">
          <div class="quiz-box">
            <div class="q-text" id="quizQuestion">点击"出题"开始测验</div>
            <div class="score-line" id="quizScore">得分：0 / 0</div>
          </div>
          <div class="divider"></div>
          <div class="ctrl-section">
            <div class="ctrl-label">点击方向按钮作答</div>
            <div class="dir-grid" id="quizDirGrid">
              <div class="dir-btn" data-dir="西北" onclick="quizAnswer('西北')">西北</div>
              <div class="dir-btn" data-dir="北" onclick="quizAnswer('北')">北</div>
              <div class="dir-btn" data-dir="东北" onclick="quizAnswer('东北')">东北</div>
              <div class="dir-btn" data-dir="西" onclick="quizAnswer('西')">西</div>
              <div style="text-align:center;font-size:14px;line-height:30px;color:#0ea5e9">?</div>
              <div class="dir-btn" data-dir="东" onclick="quizAnswer('东')">东</div>
              <div class="dir-btn" data-dir="西南" onclick="quizAnswer('西南')">西南</div>
              <div class="dir-btn" data-dir="南" onclick="quizAnswer('南')">南</div>
              <div class="dir-btn" data-dir="东南" onclick="quizAnswer('东南')">东南</div>
            </div>
          </div>
          <div class="divider"></div>
          <div class="feedback" id="quizFeedback"></div>
          <button class="edu-btn edu-btn-primary" style="width:100%;justify-content:center" onclick="newQuiz()">下一题</button>
        </div>

        <!-- Treasure Mode -->
        <div id="panel-treasure" style="display:none">
          <div class="treasure-hint" id="treasureHint">点击"开始寻宝"隐藏宝藏并获取提示！</div>
          <div class="divider"></div>
          <div class="ctrl-section">
            <div class="ctrl-label">选择方向移动</div>
            <div class="dir-grid">
              <div class="dir-btn" data-dir="西北" onclick="treasureStep('西北')">西北</div>
              <div class="dir-btn" data-dir="北" onclick="treasureStep('北')">北</div>
              <div class="dir-btn" data-dir="东北" onclick="treasureStep('东北')">东北</div>
              <div class="dir-btn" data-dir="西" onclick="treasureStep('西')">西</div>
              <div style="text-align:center;font-size:14px;line-height:30px;color:#fbbf24">💎</div>
              <div class="dir-btn" data-dir="东" onclick="treasureStep('东')">东</div>
              <div class="dir-btn" data-dir="西南" onclick="treasureStep('西南')">西南</div>
              <div class="dir-btn" data-dir="南" onclick="treasureStep('南')">南</div>
              <div class="dir-btn" data-dir="东南" onclick="treasureStep('东南')">东南</div>
            </div>
          </div>
          <div class="divider"></div>
          <div class="ctrl-section">
            <div class="ctrl-label">寻宝状态</div>
            <div class="move-info" id="treasureStatus">步数：0</div>
          </div>
          <div class="divider"></div>
          <div class="action-row">
            <button class="edu-btn edu-btn-accent" onclick="startTreasure()">开始寻宝</button>
            <button class="edu-btn edu-btn-outline" onclick="showTreasureHint()">获取提示</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../edu-lib/edu-tools.js"></script>
<script>
/* ===== Constants ===== */
const canvas = document.getElementById('canvas');
const DIRS = { '东':[1,0], '南':[0,-1], '西':[-1,0], '北':[0,1], '东北':[1,1], '东南':[1,-1], '西北':[-1,1], '西南':[-1,-1] };
const DIR_ANGLES = { '东':0, '东北':45, '北':90, '西北':135, '西':180, '西南':225, '南':270, '东南':315 };
const DIR_NAMES = Object.keys(DIRS);

/* ===== State ===== */
let mode = 'explore';
let curDir = null, cx = 0, cy = 0, trail = [];
let gridSize, centerX, centerY, canvasW, canvasH;
// Drag state
let dragging = false, needleAngle = 90; // points North initially
// Animation
let animating = false, animCharX = 0, animCharY = 0, animTargetX = 0, animTargetY = 0, animStartX = 0, animStartY = 0, animProgress = 0;
let animSteps = []; // queued steps for path movement
// Quiz state
let quizQ = 0, quizTotal = 0, quizRefX = 0, quizRefY = 0, quizTargetX = 0, quizTargetY = 0, quizCorrectDir = '', quizLocked = false;
// Treasure state
let treasureX = 0, treasureY = 0, treasureActive = false, treasureSteps = 0, treasureFound = false;

/* ===== Canvas Init ===== */
function initCanvas() {
  const { ctx, w, h } = setupCanvas(canvas);
  canvasW = w; canvasH = h;
  centerX = w / 2; centerY = h / 2;
  gridSize = Math.min(w, h) / 14;
  render();
}

/* ===== Render ===== */
function render() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const w = rect.width, h = rect.height;
  const ctx = canvas.getContext('2d');
  ctx.save(); ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = '#f8fafc'; ctx.fillRect(0, 0, w, h);

  // Grid
  ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 0.5;
  for (let x = centerX % gridSize; x < w; x += gridSize) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
  for (let y = centerY % gridSize; y < h; y += gridSize) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }

  // Axes
  ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(centerX,0); ctx.lineTo(centerX,h); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,centerY); ctx.lineTo(w,centerY); ctx.stroke();

  // Axis labels
  ctx.fillStyle = '#94a3b8'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('北', centerX, 16); ctx.fillText('南', centerX, h - 6);
  ctx.fillText('东', w - 10, centerY + 5); ctx.fillText('西', 14, centerY + 5);

  if (mode === 'explore') renderExplore(ctx, w, h);
  else if (mode === 'quiz') renderQuiz(ctx, w, h);
  else if (mode === 'treasure') renderTreasure(ctx, w, h);

  // Compass rose (bottom-left)
  drawCompassRose(ctx, 60, h - 60, 42);
  ctx.restore();
}

function renderExplore(ctx, w, h) {
  // Trail
  if (trail.length > 1) {
    ctx.strokeStyle = '#f97316'; ctx.lineWidth = 2.5; ctx.setLineDash([]);
    ctx.beginPath();
    for (let i = 0; i < trail.length; i++) {
      const px = centerX + trail[i][0] * gridSize;
      const py = centerY - trail[i][1] * gridSize;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.stroke();
  }
  trail.forEach((t, i) => {
    const px = centerX + t[0] * gridSize;
    const py = centerY - t[1] * gridSize;
    ctx.beginPath(); ctx.arc(px, py, 4, 0, Math.PI * 2);
    ctx.fillStyle = i === trail.length - 1 ? '#f97316' : '#fed7aa';
    ctx.fill();
  });

  // Direction arrow
  if (curDir) {
    const rad = DIR_ANGLES[curDir] * Math.PI / 180;
    const px = centerX + animCharX * gridSize;
    const py = centerY - animCharY * gridSize;
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(px + Math.sin(rad) * 28, py - Math.cos(rad) * 28);
    ctx.strokeStyle = '#f97316'; ctx.lineWidth = 2.5; ctx.setLineDash([4,3]); ctx.stroke(); ctx.setLineDash([]);
    const ax = px + Math.sin(rad) * 28, ay = py - Math.cos(rad) * 28;
    ctx.beginPath(); ctx.arc(ax, ay, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#f97316'; ctx.fill();
  }

  // Character
  drawCharacter(ctx, centerX + animCharX * gridSize, centerY - animCharY * gridSize, '#f97316');
}

function renderQuiz(ctx, w, h) {
  if (quizTotal === 0) return;
  const gx = centerX, gy = centerY;
  // Reference point (blue)
  ctx.beginPath(); ctx.arc(gx + quizRefX * gridSize, gy - quizRefY * gridSize, 12, 0, Math.PI * 2);
  ctx.fillStyle = '#0ea5e9'; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('A', gx + quizRefX * gridSize, gy - quizRefY * gridSize + 4);
  // Target point (green)
  ctx.beginPath(); ctx.arc(gx + quizTargetX * gridSize, gy - quizTargetY * gridSize, 12, 0, Math.PI * 2);
  ctx.fillStyle = '#22c55e'; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.fillText('B', gx + quizTargetX * gridSize, gy - quizTargetY * gridSize + 4);
  // Dashed line between them
  ctx.setLineDash([4,4]); ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(gx + quizRefX * gridSize, gy - quizRefY * gridSize);
  ctx.lineTo(gx + quizTargetX * gridSize, gy - quizTargetY * gridSize);
  ctx.stroke(); ctx.setLineDash([]);
}

function renderTreasure(ctx, w, h) {
  // Trail
  if (trail.length > 1) {
    ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 2; ctx.setLineDash([]);
    ctx.beginPath();
    for (let i = 0; i < trail.length; i++) {
      const px = centerX + trail[i][0] * gridSize;
      const py = centerY - trail[i][1] * gridSize;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.stroke();
  }
  trail.forEach((t, i) => {
    const px = centerX + t[0] * gridSize, py = centerY - t[1] * gridSize;
    ctx.beginPath(); ctx.arc(px, py, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#fbbf24'; ctx.fill();
  });
  // Treasure (revealed when found)
  if (treasureFound) {
    const tx = centerX + treasureX * gridSize, ty = centerY - treasureY * gridSize;
    ctx.font = '24px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('💎', tx, ty + 8);
    // Glow
    ctx.beginPath(); ctx.arc(tx, ty, 18, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(251,191,36,0.25)'; ctx.fill();
  }
  // Character
  drawCharacter(ctx, centerX + animCharX * gridSize, centerY - animCharY * gridSize, treasureFound ? '#22c55e' : '#f97316');
}

function drawCharacter(ctx, x, y, color) {
  // Body
  ctx.beginPath(); ctx.arc(x, y - 6, 10, 0, Math.PI * 2);
  ctx.fillStyle = color; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
  // Head
  ctx.beginPath(); ctx.arc(x, y - 20, 7, 0, Math.PI * 2);
  ctx.fillStyle = color; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
  // Eyes
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(x - 2.5, y - 21, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 2.5, y - 21, 1.5, 0, Math.PI * 2); ctx.fill();
}

function drawCompassRose(ctx, cx, cy, r) {
  // Outer ring
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = '#fff'; ctx.fill(); ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 2; ctx.stroke();
  // Inner ring
  ctx.beginPath(); ctx.arc(cx, cy, r * 0.72, 0, Math.PI * 2);
  ctx.fillStyle = '#fff7ed'; ctx.fill(); ctx.strokeStyle = '#fed7aa'; ctx.lineWidth = 1; ctx.stroke();
  // Direction ticks & labels
  for (const [d, a] of Object.entries(DIR_ANGLES)) {
    const rad = a * Math.PI / 180;
    const tx = cx + Math.sin(rad) * (r - 10);
    const ty = cy - Math.cos(rad) * (r - 10);
    ctx.fillStyle = (curDir === d) ? '#f97316' : '#64748b';
    ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(d, tx, ty + 3);
    // Tick
    const ox = cx + Math.sin(rad) * (r * 0.72);
    const oy = cy - Math.cos(rad) * (r * 0.72);
    ctx.beginPath(); ctx.moveTo(ox, oy);
    ctx.lineTo(cx + Math.sin(rad) * (r - 3), cy - Math.cos(rad) * (r - 3));
    ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 1; ctx.stroke();
  }
  // Needle
  const nRad = needleAngle * Math.PI / 180;
  // North half (red)
  ctx.beginPath();
  ctx.moveTo(cx + Math.sin(nRad) * r * 0.65, cy - Math.cos(nRad) * r * 0.65);
  ctx.lineTo(cx + Math.sin(nRad + Math.PI/2) * 5, cy - Math.cos(nRad + Math.PI/2) * 5);
  ctx.lineTo(cx + Math.sin(nRad - Math.PI/2) * 5, cy - Math.cos(nRad - Math.PI/2) * 5);
  ctx.closePath(); ctx.fillStyle = '#ef4444'; ctx.fill();
  // South half (gray)
  ctx.beginPath();
  ctx.moveTo(cx - Math.sin(nRad) * r * 0.45, cy + Math.cos(nRad) * r * 0.45);
  ctx.lineTo(cx + Math.sin(nRad + Math.PI/2) * 5, cy - Math.cos(nRad + Math.PI/2) * 5);
  ctx.lineTo(cx + Math.sin(nRad - Math.PI/2) * 5, cy - Math.cos(nRad - Math.PI/2) * 5);
  ctx.closePath(); ctx.fillStyle = '#94a3b8'; ctx.fill();
  // Center dot
  ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI * 2);
  ctx.fillStyle = '#1a3a5c'; ctx.fill();
}

/* ===== Compass Drag ===== */
const compassCX = () => 60;
const compassCY = () => canvasH / (window.devicePixelRatio || 1) - 60;
const compassR = 42;

function angleFromMouse(mx, my) {
  let a = Math.atan2(mx - compassCX(), -(my - compassCY())) * 180 / Math.PI;
  if (a < 0) a += 360;
  return a;
}

function snapAngle(a) {
  return Math.round(a / 45) % 8 * 45;
}

function angleToDir(a) {
  const s = snapAngle(a);
  for (const [d, va] of Object.entries(DIR_ANGLES)) if (va === s) return d;
  return null;
}

canvas.addEventListener('mousedown', function(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const dist = Math.sqrt((mx - compassCX()) ** 2 + (my - compassCY()) ** 2);
  if (dist <= compassR + 10) {
    dragging = true;
    needleAngle = snapAngle(angleFromMouse(mx, my));
    const dir = angleToDir(needleAngle);
    if (dir) setDirByName(dir);
    render();
  }
});

canvas.addEventListener('mousemove', function(e) {
  if (!dragging) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  needleAngle = snapAngle(angleFromMouse(mx, my));
  const dir = angleToDir(needleAngle);
  if (dir) setDirByName(dir);
  render();
  // Show floating label
  const label = document.getElementById('compassLabel');
  label.textContent = dir || '';
  label.style.left = (mx + 16) + 'px';
  label.style.top = (my - 20) + 'px';
  label.classList.toggle('show', !!dir);
});

window.addEventListener('mouseup', function() {
  if (dragging) {
    dragging = false;
    document.getElementById('compassLabel').classList.remove('show');
  }
});

/* ===== Touch support for compass ===== */
canvas.addEventListener('touchstart', function(e) {
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  const mx = t.clientX - rect.left, my = t.clientY - rect.top;
  const dist = Math.sqrt((mx - compassCX()) ** 2 + (my - compassCY()) ** 2);
  if (dist <= compassR + 14) {
    dragging = true;
    needleAngle = snapAngle(angleFromMouse(mx, my));
    const dir = angleToDir(needleAngle);
    if (dir) setDirByName(dir);
    render();
    e.preventDefault();
  }
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  if (!dragging) return;
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  const mx = t.clientX - rect.left, my = t.clientY - rect.top;
  needleAngle = snapAngle(angleFromMouse(mx, my));
  const dir = angleToDir(needleAngle);
  if (dir) setDirByName(dir);
  render();
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', function() {
  if (dragging) { dragging = false; }
});

/* ===== Mode Switching ===== */
function switchMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === m));
  document.getElementById('panel-explore').style.display = m === 'explore' ? '' : 'none';
  document.getElementById('panel-quiz').style.display = m === 'quiz' ? '' : 'none';
  document.getElementById('panel-treasure').style.display = m === 'treasure' ? '' : 'none';
  if (m === 'quiz' && quizTotal === 0) newQuiz();
  if (m === 'treasure' && !treasureActive) startTreasure();
  if (m === 'explore') { animCharX = cx; animCharY = cy; }
  render();
}

/* ===== Explore Mode ===== */
function setDir(el) {
  curDir = el.dataset.dir;
  needleAngle = DIR_ANGLES[curDir];
  document.querySelectorAll('#panel-explore .dir-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function setDirByName(dir) {
  curDir = dir;
  document.querySelectorAll('#panel-explore .dir-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.dir === dir);
  });
}

function updateStepDisplay() {
  document.getElementById('stepVal').textContent = document.getElementById('steps').value;
}

function doMove() {
  if (!curDir || animating) return;
  const steps = parseInt(document.getElementById('steps').value);
  const [dx, dy] = DIRS[curDir];
  if (trail.length === 0) trail.push([cx, cy]);
  const targetX = cx + dx * steps, targetY = cy + dy * steps;

  // Queue animated steps
  animSteps = [];
  for (let i = 1; i <= steps; i++) {
    animSteps.push([cx + dx * i, cy + dy * i]);
  }
  cx = targetX; cy = targetY;
  trail.push([cx, cy]);
  animateSteps(() => {
    document.getElementById('posInfo').innerHTML = `(${cx}, ${cy})<br/><span style="font-size:11px;color:#64748b">${curDir}${steps}格 → 到达(${cx},${cy})</span>`;
  });
}

function animateSteps(onDone) {
  if (animSteps.length === 0) { onDone(); return; }
  animating = true;
  const [tx, ty] = animSteps.shift();
  animStartX = animCharX; animStartY = animCharY;
  animTargetX = tx; animTargetY = ty;
  animProgress = 0;
  const duration = 300;
  const start = performance.now();
  function tick(now) {
    animProgress = Math.min(1, (now - start) / duration);
    // Ease out
    const t = 1 - Math.pow(1 - animProgress, 3);
    animCharX = animStartX + (animTargetX - animStartX) * t;
    animCharY = animStartY + (animTargetY - animStartY) * t;
    render();
    if (animProgress < 1) {
      requestAnimationFrame(tick);
    } else {
      animCharX = animTargetX; animCharY = animTargetY;
      if (animSteps.length > 0) {
        animateSteps(onDone);
      } else {
        animating = false;
        onDone();
      }
    }
  }
  requestAnimationFrame(tick);
}

/* ===== Quiz Mode ===== */
function newQuiz() {
  quizLocked = false;
  document.getElementById('quizFeedback').textContent = '';
  document.getElementById('quizFeedback').className = 'feedback';
  // Random positions: reference at (0,0), target somewhere 1-3 steps in cardinal/ordinal
  quizRefX = 0; quizRefY = 0;
  const dir = DIR_NAMES[Math.floor(Math.random() * 8)];
  const dist = Math.floor(Math.random() * 3) + 1;
  const [dx, dy] = DIRS[dir];
  quizTargetX = dx * dist; quizTargetY = dy * dist;
  quizCorrectDir = dir;
  document.getElementById('quizQuestion').innerHTML = `B 在 A 的哪个方向？`;
  render();
}

function quizAnswer(dir) {
  if (quizLocked) return;
  quizLocked = true;
  quizTotal++;
  const fb = document.getElementById('quizFeedback');
  if (dir === quizCorrectDir) {
    quizQ++;
    fb.textContent = '回答正确！';
    fb.className = 'feedback correct';
  } else {
    fb.textContent = `答案是「${quizCorrectDir}」`;
    fb.className = 'feedback wrong';
  }
  document.getElementById('quizScore').textContent = `得分：${quizQ} / ${quizTotal}`;
}

/* ===== Treasure Hunt ===== */
function startTreasure() {
  cx = 0; cy = 0; trail = [[0,0]]; treasureSteps = 0;
  animCharX = 0; animCharY = 0;
  // Place treasure 2-4 steps away in a random direction
  const dir = DIR_NAMES[Math.floor(Math.random() * 8)];
  const dist = Math.floor(Math.random() * 3) + 2;
  const [dx, dy] = DIRS[dir];
  treasureX = dx * dist; treasureY = dy * dist;
  treasureActive = true; treasureFound = false;
  document.getElementById('treasureStatus').textContent = '步数：0';
  updateTreasureHint();
  render();
}

function showTreasureHint() {
  if (!treasureActive || treasureFound) return;
  updateTreasureHint();
}

function updateTreasureHint() {
  const dx = treasureX - cx, dy = treasureY - cy;
  if (dx === 0 && dy === 0) { treasureFound = true; document.getElementById('treasureHint').textContent = '你找到了宝藏！'; return; }
  // Determine direction from character to treasure
  const angle = Math.atan2(dx, dy) * 180 / Math.PI;
  let a = angle; if (a < 0) a += 360;
  const snap = Math.round(a / 45) % 8 * 45;
  let dirName = '';
  for (const [d, va] of Object.entries(DIR_ANGLES)) { if (va === snap) { dirName = d; break; } }
  const dist = Math.sqrt(dx * dx + dy * dy).toFixed(1);
  document.getElementById('treasureHint').innerHTML = `💎 宝藏在你的 <b>${dirName}</b> 方向<br/>距离约 ${dist} 格`;
}

function treasureStep(dir) {
  if (!treasureActive || treasureFound || animating) return;
  const [dx, dy] = DIRS[dir];
  const tx = cx + dx, ty = cy + dy;
  treasureSteps++;
  animSteps = [[tx, ty]];
  cx = tx; cy = ty;
  trail.push([cx, cy]);
  animateSteps(() => {
    document.getElementById('treasureStatus').textContent = `步数：${treasureSteps}`;
    // Check if found
    if (cx === treasureX && cy === treasureY) {
      treasureFound = true;
      document.getElementById('treasureHint').innerHTML = `<b>恭喜！你找到了宝藏！</b><br/>用了 ${treasureSteps} 步`;
      document.getElementById('treasureHint').style.borderColor = '#22c55e';
      document.getElementById('treasureHint').style.background = 'linear-gradient(135deg, #dcfce7, #f0fdf4)';
    } else {
      updateTreasureHint();
    }
    render();
  });
}

/* ===== Reset ===== */
function resetAll() {
  curDir = null; cx = 0; cy = 0; trail = []; animCharX = 0; animCharY = 0;
  needleAngle = 90; animating = false; animSteps = [];
  document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('posInfo').innerHTML = '起点 (0, 0)';
  if (mode === 'explore') render();
  else if (mode === 'quiz') { quizQ = 0; quizTotal = 0; newQuiz(); }
  else if (mode === 'treasure') startTreasure();
}

/* ===== Boot ===== */
window.addEventListener('resize', initCanvas);
initCanvas();
animCharX = 0; animCharY = 0;
</script>
