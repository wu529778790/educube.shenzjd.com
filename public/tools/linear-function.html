<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>一次函数 — 教立方</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
*{box-sizing:border-box}body{font-family:var(--edu-font);margin:0}
.tool{width:100vw;height:100vh;display:flex;flex-direction:column;background:var(--edu-bg)}
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#fff;border-bottom:1px solid var(--edu-border)}
.toolbar h1{font-size:15px;color:var(--edu-primary);margin:0}
.toolbar span{font-size:11px;color:var(--edu-text-muted);background:#f1f5f9;padding:2px 8px;border-radius:12px}
.main{flex:1;display:grid;grid-template-columns:1fr 290px;overflow:hidden}
.canvas-wrap{position:relative;overflow:hidden;background:linear-gradient(135deg,#fdf4ff,#faf5ff)}
.canvas-wrap canvas{width:100%;height:100%;display:block}
.panel{background:#fff;border-left:1px solid var(--edu-border);padding:12px;display:flex;flex-direction:column;gap:8px;overflow:auto}
.section{display:flex;flex-direction:column;gap:4px}
.label{font-size:10px;font-weight:700;color:#64748b;letter-spacing:.05em}
.divider{height:1px;background:var(--edu-border)}
.btn{padding:6px 12px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--edu-font);transition:all .15s}
.btn.active{background:var(--edu-primary);color:#fff}
.btn-default{background:#f1f5f9;color:#334155}
.btn-default:hover{background:#e2e8f0}
.row{display:flex;gap:4px;flex-wrap:wrap}
.slider-row{display:flex;align-items:center;gap:6px}
.slider-row label{font-size:11px;font-weight:700;min-width:32px}
.slider-row input[type=range]{flex:1}
.slider-row .val{font-size:12px;font-weight:800;min-width:36px;text-align:right;color:#7c3aed}

.fn-display{text-align:center;padding:10px;background:#fdf4ff;border:2px solid #e9d5ff;border-radius:12px}
.fn-display .fn{font-size:22px;font-weight:800;color:#6b21a8;font-family:monospace}
.fn-display .sub{font-size:11px;color:#7c3aed;margin-top:4px}

.prop-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.prop-card{text-align:center;padding:6px;border-radius:8px;font-size:10px}
.prop-card .val{font-size:14px;font-weight:800}
.prop-card .lbl{font-size:9px;font-weight:700;margin-top:1px}

.quiz-card{background:#fdf4ff;border:2px solid #e9d5ff;border-radius:12px;padding:10px;text-align:center}
.quiz-q{font-size:13px;font-weight:700;color:#6b21a8}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px}
.quiz-opt{padding:6px;border:2px solid #e2e8f0;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;font-family:var(--edu-font)}
.quiz-opt:hover{border-color:#8b5cf6}
.quiz-opt.correct{background:#dcfce7;border-color:#22c55e}
.quiz-opt.wrong{background:#fef2f2;border-color:#ef4444}
.quiz-result{font-size:11px;font-weight:700;margin-top:4px;min-height:16px}

.info{font-size:11px;line-height:1.8;color:#334155;background:#fff;border:1px solid #e9d5ff;border-radius:8px;padding:8px 10px}
.info b{color:#6b21a8}
</style>
</head>
<body>
<div class="tool">
  <div class="toolbar"><h1>📈 一次函数</h1><span>八年级下册 · 第十九章</span></div>
  <div class="main">
    <div class="canvas-wrap"><canvas id="cv"></canvas></div>
    <div class="panel">
      <div class="fn-display">
        <div class="fn" id="fn-display">y = 2x + 1</div>
        <div class="sub" id="fn-sub">斜率 k=2, 截距 b=1</div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">调节参数 y = kx + b</div>
        <div class="slider-row"><label>k=</label><input type="range" id="sl-k" min="-5" max="5" step="0.5" value="2" oninput="onSlider()"/><div class="val" id="vk">2</div></div>
        <div class="slider-row"><label>b=</label><input type="range" id="sl-b" min="-5" max="5" step="0.5" value="1" oninput="onSlider()"/><div class="val" id="vb">1</div></div>
      </div>
      <div class="divider"></div>
      <div class="prop-grid">
        <div class="prop-card" style="background:#ede9fe"><div class="val" style="color:#6b21a8" id="p-slope">2</div><div class="lbl" style="color:#6b21a8">斜率 k</div></div>
        <div class="prop-card" style="background:#fce7f3"><div class="val" style="color:#be185d" id="p-intercept">(0, 1)</div><div class="lbl" style="color:#be185d">y轴截距</div></div>
        <div class="prop-card" style="background:#dbeafe"><div class="val" style="color:#1d4ed8" id="p-xint">(-0.5, 0)</div><div class="lbl" style="color:#1d4ed8">x轴截距</div></div>
        <div class="prop-card" style="background:#dcfce7"><div class="val" style="color:#15803d" id="p-dir">↗ 递增</div><div class="lbl" style="color:#15803d">增减性</div></div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">预设函数</div>
        <div class="row">
          <button class="btn btn-default" onclick="loadPreset(1,0)">y=x</button>
          <button class="btn btn-default" onclick="loadPreset(-1,0)">y=-x</button>
          <button class="btn btn-default" onclick="loadPreset(2,-3)">y=2x-3</button>
          <button class="btn btn-default" onclick="loadPreset(-0.5,2)">y=-½x+2</button>
          <button class="btn btn-default" onclick="loadPreset(0,3)">y=3</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">一次函数测验</div>
        <div class="quiz-card" id="quiz-card"></div>
      </div>
      <div class="divider"></div>
      <div class="info">
        <b>一次函数 y = kx + b</b><br/>
        ● <strong>k > 0</strong>：y随x增大而增大（递增）<br/>
        ● <strong>k < 0</strong>：y随x增大而减小（递减）<br/>
        ● <strong>b</strong>：与y轴的交点纵距（截距）<br/>
        ● <strong>k=0</strong>时为常函数 y=b（水平线）<br/>
        ● 正比例函数 y=kx 是 b=0 的特殊情况
      </div>
    </div>
  </div>
</div>
<script>
var cv, ctx, _k = 2, _b = 1;
var _hoverX = null, _hoverY = null;

function init() {
  cv = document.getElementById('cv');
  ctx = cv.getContext('2d');
  window.addEventListener('resize', resize);
  cv.addEventListener('mousemove', onMouse);
  cv.addEventListener('mouseleave', function() { _hoverX = null; draw(); });
  resize();
  updateProps();
  nextQuiz();
}

function resize() {
  var r = cv.parentElement.getBoundingClientRect();
  cv.width = r.width * devicePixelRatio;
  cv.height = r.height * devicePixelRatio;
  cv.style.width = r.width + 'px';
  cv.style.height = r.height + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  draw();
}

function onMouse(e) {
  var rect = cv.getBoundingClientRect();
  _hoverX = e.clientX - rect.left;
  _hoverY = e.clientY - rect.top;
  draw();
}

function onSlider() {
  _k = parseFloat(document.getElementById('sl-k').value);
  _b = parseFloat(document.getElementById('sl-b').value);
  document.getElementById('vk').textContent = _k;
  document.getElementById('vb').textContent = _b;
  updateProps();
  draw();
}

function loadPreset(k, b) {
  _k = k; _b = b;
  document.getElementById('sl-k').value = k;
  document.getElementById('sl-b').value = b;
  document.getElementById('vk').textContent = k;
  document.getElementById('vb').textContent = b;
  updateProps();
  draw();
}

function updateProps() {
  var kStr = _k === 1 ? '' : _k === -1 ? '-' : _k;
  var bStr = _b === 0 ? '' : (_b > 0 ? ' + ' + _b : ' - ' + Math.abs(_b));
  if (_k === 0) {
    document.getElementById('fn-display').textContent = 'y = ' + _b;
  } else {
    document.getElementById('fn-display').textContent = 'y = ' + kStr + 'x' + bStr;
  }

  document.getElementById('p-slope').textContent = _k;
  document.getElementById('p-intercept').textContent = '(0, ' + _b + ')';

  if (_k !== 0) {
    var xInt = -_b / _k;
    document.getElementById('p-xint').textContent = '(' + (Number.isInteger(xInt) ? xInt : xInt.toFixed(2)) + ', 0)';
  } else {
    document.getElementById('p-xint').textContent = '无';
  }

  if (_k > 0) document.getElementById('p-dir').textContent = '↗ 递增';
  else if (_k < 0) document.getElementById('p-dir').textContent = '↘ 递减';
  else document.getElementById('p-dir').textContent = '→ 常函数';

  document.getElementById('fn-sub').textContent = '斜率 k=' + _k + ', 截距 b=' + _b;
}

function draw() {
  var w = cv.width / devicePixelRatio, h = cv.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  var range = 7;
  var cx = w / 2, cy = h / 2;
  var unit = Math.min(w, h) / (range * 2 + 2);

  // Grid
  ctx.strokeStyle = '#e9d5ff22';
  ctx.lineWidth = 0.5;
  for (var i = -range; i <= range; i++) {
    ctx.beginPath(); ctx.moveTo(cx + i * unit, 0); ctx.lineTo(cx + i * unit, h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, cy + i * unit); ctx.lineTo(w, cy + i * unit); ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = '#334155'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(w, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, h); ctx.stroke();

  // Arrow heads
  ctx.fillStyle = '#334155';
  ctx.beginPath(); ctx.moveTo(w - 5, cy - 4); ctx.lineTo(w, cy); ctx.lineTo(w - 5, cy + 4); ctx.fill();
  ctx.beginPath(); ctx.moveTo(cx - 4, 5); ctx.lineTo(cx, 0); ctx.lineTo(cx + 4, 5); ctx.fill();

  // Axis labels
  ctx.fillStyle = '#334155'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('x', w - 12, cy - 8);
  ctx.fillText('y', cx + 12, 14);
  ctx.fillText('O', cx - 10, cy + 14);

  // Ticks
  ctx.font = '10px sans-serif'; ctx.fillStyle = '#64748b';
  for (var i = -range; i <= range; i++) {
    if (i === 0) continue;
    // X ticks
    var tx = cx + i * unit;
    ctx.beginPath(); ctx.moveTo(tx, cy - 3); ctx.lineTo(tx, cy + 3); ctx.stroke();
    ctx.fillText(i, tx, cy + 16);
    // Y ticks
    var ty = cy - i * unit;
    ctx.beginPath(); ctx.moveTo(cx - 3, ty); ctx.lineTo(cx + 3, ty); ctx.stroke();
    ctx.textAlign = 'right';
    ctx.fillText(i, cx - 8, ty + 4);
    ctx.textAlign = 'center';
  }

  // Draw function line y = kx + b
  ctx.strokeStyle = '#7c3aed'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  var started = false;
  for (var px = 0; px <= w; px += 1) {
    var x = (px - cx) / unit;
    var y = _k * x + _b;
    var py = cy - y * unit;
    if (py < -100 || py > h + 100) { started = false; continue; }
    if (!started) { ctx.moveTo(px, py); started = true; }
    else ctx.lineTo(px, py);
  }
  ctx.stroke();

  // Y-intercept point
  var yIntPx = cx, yIntPy = cy - _b * unit;
  ctx.fillStyle = '#be185d';
  ctx.beginPath(); ctx.arc(yIntPx, yIntPy, 5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#be185d'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('(0, ' + _b + ')', yIntPx + 8, yIntPy - 6);

  // X-intercept point
  if (_k !== 0) {
    var xInt = -_b / _k;
    var xIntPx = cx + xInt * unit, xIntPy = cy;
    ctx.fillStyle = '#1d4ed8';
    ctx.beginPath(); ctx.arc(xIntPx, xIntPy, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#1d4ed8'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('(' + (Number.isInteger(xInt) ? xInt : xInt.toFixed(2)) + ', 0)', xIntPx, xIntPy + 18);
  }

  // Hover crosshair
  if (_hoverX !== null) {
    var hx = (_hoverX - cx) / unit;
    var hy = _k * hx + _b;
    var hpy = cy - hy * unit;

    // Crosshair lines
    ctx.strokeStyle = '#7c3aed44'; ctx.lineWidth = 0.5;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(_hoverX, 0); ctx.lineTo(_hoverX, h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, hpy); ctx.lineTo(w, hpy); ctx.stroke();
    ctx.setLineDash([]);

    // Point on line
    ctx.fillStyle = '#7c3aed';
    ctx.beginPath(); ctx.arc(_hoverX, hpy, 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(_hoverX, hpy, 3, 0, Math.PI * 2); ctx.fill();

    // Coordinate label
    ctx.fillStyle = '#6b21a8'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'left';
    var hxRound = Math.round(hx * 10) / 10;
    var hyRound = Math.round(hy * 10) / 10;
    ctx.fillText('(' + hxRound + ', ' + hyRound + ')', _hoverX + 10, hpy - 10);
  }

  // Function label
  ctx.fillStyle = '#6b21a8'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'left';
  var kStr = _k === 1 ? '' : _k === -1 ? '-' : _k;
  var bStr = _b === 0 ? '' : (_b > 0 ? '+' + _b : '' + _b);
  var fnLabel = _k === 0 ? 'y=' + _b : 'y=' + kStr + 'x' + bStr;
  ctx.fillText(fnLabel, 12, 20);
}

// ===== Quiz =====
var _quizQs = [
  { q: 'y = 2x + 1 的斜率是？', opts: ['1', '2', '3', '-1'], ans: 1 },
  { q: 'y = -x + 3 与y轴交点是？', opts: ['(3,0)', '(0,3)', '(-3,0)', '(0,-3)'], ans: 1 },
  { q: 'y = 2x 过哪个点？', opts: ['(1,1)', '(1,2)', '(2,1)', '(0,1)'], ans: 1 },
  { q: 'k>0 时，一次函数图像？', opts: ['水平', '从左下到右上', '从左上到右下', '垂直'], ans: 1 },
  { q: 'y = 3 是什么函数？', opts: ['正比例函数', '一次函数(常函数)', '二次函数', '反比例函数'], ans: 1 },
  { q: 'y = -2x + 4 的x轴截距是？', opts: ['2', '4', '-2', '-4'], ans: 0 },
];
var _qi = 0, _score = 0;

function nextQuiz() {
  if (_qi >= _quizQs.length) {
    document.getElementById('quiz-card').innerHTML = '<div class="quiz-q">测验完成！答对 ' + _score + ' / ' + _quizQs.length + ' 题</div>';
    return;
  }
  var q = _quizQs[_qi];
  var html = '<div class="quiz-q">第' + (_qi + 1) + '题：' + q.q + '</div><div class="quiz-opts">';
  q.opts.forEach(function(o, i) { html += '<button class="quiz-opt" onclick="answer(' + i + ')">' + o + '</button>'; });
  html += '</div><div class="quiz-result" id="qr"></div>';
  document.getElementById('quiz-card').innerHTML = html;
}

function answer(idx) {
  var q = _quizQs[_qi];
  var opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(function(b, i) { b.onclick = null; b.style.cursor = 'default';
    if (i === q.ans) b.classList.add('correct');
    if (i === idx && i !== q.ans) b.classList.add('wrong');
  });
  var r = document.getElementById('qr');
  if (idx === q.ans) { r.textContent = '✓ 正确！'; r.style.color = '#16a34a'; _score++; }
  else { r.textContent = '✗ 正确答案：' + q.opts[q.ans]; r.style.color = '#ef4444'; }
  _qi++; setTimeout(nextQuiz, 1200);
}

init();
</script>
</body>
</html>
