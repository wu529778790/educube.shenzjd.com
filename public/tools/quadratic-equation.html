<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>一元二次方程 — 教立方</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
*{box-sizing:border-box}body{font-family:var(--edu-font);margin:0}
.tool{width:100vw;height:100vh;display:flex;flex-direction:column;background:var(--edu-bg)}
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#fff;border-bottom:1px solid var(--edu-border)}
.toolbar h1{font-size:15px;color:var(--edu-primary);margin:0}
.toolbar span{font-size:11px;color:var(--edu-text-muted);background:#f1f5f9;padding:2px 8px;border-radius:12px}
.main{flex:1;display:grid;grid-template-columns:1fr 290px;overflow:hidden}
.canvas-wrap{position:relative;overflow:hidden;background:linear-gradient(135deg,#fef2f2,#fff1f2)}
.canvas-wrap canvas{width:100%;height:100%;display:block}
.panel{background:#fff;border-left:1px solid var(--edu-border);padding:12px;display:flex;flex-direction:column;gap:8px;overflow:auto}
.section{display:flex;flex-direction:column;gap:4px}
.label{font-size:10px;font-weight:700;color:#64748b;letter-spacing:.05em}
.divider{height:1px;background:var(--edu-border)}
.btn{padding:6px 12px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--edu-font);transition:all .15s}
.btn.active{background:var(--edu-primary);color:#fff}
.btn-default{background:#f1f5f9;color:#334155}
.btn-default:hover{background:#e2e8f0}
.row{display:flex;gap:4px;flex-wrap:wrap}
.slider-row{display:flex;align-items:center;gap:6px}
.slider-row label{font-size:11px;font-weight:700;min-width:28px}
.slider-row input[type=range]{flex:1}
.slider-row .val{font-size:12px;font-weight:800;min-width:32px;text-align:right;color:#be123c}

.eq-box{text-align:center;padding:10px;background:#fef2f2;border:2px solid #fda4af;border-radius:12px}
.eq-box .eq{font-size:18px;font-weight:800;color:#be123c;font-family:monospace}
.eq-box .delta{font-size:12px;font-weight:700;margin-top:4px}

.step-list{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:8px;font-size:11px;line-height:2;max-height:160px;overflow:auto}
.step-list .step{color:#334155}
.step-list .highlight{color:#be123c;font-weight:700}

.quiz-card{background:#fef2f2;border:2px solid #fda4af;border-radius:12px;padding:10px;text-align:center}
.quiz-q{font-size:13px;font-weight:700;color:#be123c}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px}
.quiz-opt{padding:6px;border:2px solid #e2e8f0;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;font-family:var(--edu-font)}
.quiz-opt:hover{border-color:#e11d48}
.quiz-opt.correct{background:#dcfce7;border-color:#22c55e}
.quiz-opt.wrong{background:#fef2f2;border-color:#ef4444}
.quiz-result{font-size:11px;font-weight:700;margin-top:4px;min-height:16px}

.info{font-size:11px;line-height:1.8;color:#334155;background:#fff;border:1px solid #fecdd3;border-radius:8px;padding:8px 10px}
.info b{color:#be123c}
</style>
</head>
<body>
<div class="tool">
  <div class="toolbar"><h1>🧮 一元二次方程</h1><span>九年级上册 · 第二十一章</span></div>
  <div class="main">
    <div class="canvas-wrap"><canvas id="cv"></canvas></div>
    <div class="panel">
      <div class="eq-box">
        <div class="eq" id="eq-display">x² - 5x + 6 = 0</div>
        <div class="delta" id="eq-delta" style="color:#16a34a">Δ = 1 > 0 → 两个不相等实数根</div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">调节参数 ax² + bx + c = 0</div>
        <div class="slider-row"><label>a=</label><input type="range" id="sl-a" min="1" max="5" value="1" oninput="onSlider()"/><div class="val" id="va">1</div></div>
        <div class="slider-row"><label>b=</label><input type="range" id="sl-b" min="-10" max="10" value="-5" oninput="onSlider()"/><div class="val" id="vb">-5</div></div>
        <div class="slider-row"><label>c=</label><input type="range" id="sl-c" min="-10" max="10" value="6" oninput="onSlider()"/><div class="val" id="vc">6</div></div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">解法选择</div>
        <div class="row">
          <button class="btn active" id="meth-formula" onclick="setMethod('formula')">公式法</button>
          <button class="btn btn-default" id="meth-factor" onclick="setMethod('factor')">因式分解法</button>
          <button class="btn btn-default" id="meth-complete" onclick="setMethod('complete')">配方法</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">解题步骤</div>
        <div class="step-list" id="steps"></div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">一元二次方程测验</div>
        <div class="quiz-card" id="quiz-card"></div>
      </div>
      <div class="divider"></div>
      <div class="info">
        <b>一元二次方程 ax² + bx + c = 0</b><br/>
        ● <strong>求根公式</strong>：x = (-b ± √Δ) / 2a<br/>
        ● <strong>判别式</strong>：Δ = b² - 4ac<br/>
        ● Δ > 0：两个不相等实根<br/>
        ● Δ = 0：两个相等实根<br/>
        ● Δ < 0：无实数根
      </div>
    </div>
  </div>
</div>
<script>
var cv, ctx, _a = 1, _b = -5, _c = 6, _method = 'formula';

function init() {
  cv = document.getElementById('cv');
  ctx = cv.getContext('2d');
  window.addEventListener('resize', resize);
  resize();
  updateAll();
  nextQuiz();
}

function resize() {
  var r = cv.parentElement.getBoundingClientRect();
  cv.width = r.width * devicePixelRatio;
  cv.height = r.height * devicePixelRatio;
  cv.style.width = r.width + 'px';
  cv.style.height = r.height + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  draw();
}

function onSlider() {
  _a = parseInt(document.getElementById('sl-a').value);
  _b = parseInt(document.getElementById('sl-b').value);
  _c = parseInt(document.getElementById('sl-c').value);
  document.getElementById('va').textContent = _a;
  document.getElementById('vb').textContent = _b;
  document.getElementById('vc').textContent = _c;
  updateAll();
}

function setMethod(m) {
  _method = m;
  ['formula','factor','complete'].forEach(function(k) {
    document.getElementById('meth-' + k).className = 'btn' + (k === m ? ' active' : ' btn-default');
  });
  updateAll();
}

function getDelta() { return _b * _b - 4 * _a * _c; }

function getRoots() {
  var d = getDelta();
  if (d < 0) return null;
  var sqrtD = Math.sqrt(d);
  var x1 = (-_b + sqrtD) / (2 * _a);
  var x2 = (-_b - sqrtD) / (2 * _a);
  return { x1: Math.min(x1, x2), x2: Math.max(x1, x2), delta: d };
}

function updateAll() {
  var d = getDelta();
  var roots = getRoots();

  // Equation display
  var aStr = _a === 1 ? '' : _a + '';
  var bStr = _b === 0 ? '' : (_b > 0 ? ' + ' + _b : ' - ' + Math.abs(_b));
  var cStr = _c === 0 ? '' : (_c > 0 ? ' + ' + _c : ' - ' + Math.abs(_c));
  document.getElementById('eq-display').textContent = aStr + 'x²' + bStr + 'x' + cStr + ' = 0';

  var deltaEl = document.getElementById('eq-delta');
  if (d > 0) {
    deltaEl.textContent = 'Δ = ' + d + ' > 0 → 两个不相等实数根';
    deltaEl.style.color = '#16a34a';
  } else if (d === 0) {
    deltaEl.textContent = 'Δ = 0 → 两个相等实数根';
    deltaEl.style.color = '#f59e0b';
  } else {
    deltaEl.textContent = 'Δ = ' + d + ' < 0 → 无实数根';
    deltaEl.style.color = '#ef4444';
  }

  updateSteps();
  draw();
}

function updateSteps() {
  var d = getDelta();
  var roots = getRoots();
  var el = document.getElementById('steps');
  var html = '';

  if (_method === 'formula') {
    html += '<div class="step">1. 识别：a=' + _a + ', b=' + _b + ', c=' + _c + '</div>';
    html += '<div class="step">2. 求判别式：Δ = b²-4ac = ' + _b + '²-4×' + _a + '×' + _c + ' = ' + (_b * _b) + '-' + (4 * _a * _c) + ' = ' + d + '</div>';
    if (d >= 0) {
      html += '<div class="step">3. 求根公式：x = (-b ± √Δ) / 2a</div>';
      html += '<div class="step">4. x = (' + (-_b) + ' ± √' + d + ') / ' + (2 * _a) + '</div>';
      if (d > 0) {
        var sqrtD = Math.sqrt(d);
        html += '<div class="highlight">5. x₁ = ' + roots.x1.toFixed(2) + ', x₂ = ' + roots.x2.toFixed(2) + '</div>';
      } else {
        html += '<div class="highlight">5. x₁ = x₂ = ' + roots.x1.toFixed(2) + '</div>';
      }
    } else {
      html += '<div class="step" style="color:#ef4444">3. Δ < 0，方程无实数根</div>';
    }
  } else if (_method === 'factor') {
    html += '<div class="step">1. 原方程：' + _a + 'x² + ' + _b + 'x + ' + _c + ' = 0</div>';
    if (_a !== 1) {
      html += '<div class="step">2. 两边÷' + _a + '：x² + ' + (_b / _a) + 'x + ' + (_c / _a) + ' = 0</div>';
    }
    html += '<div class="step">' + (_a !== 1 ? '3' : '2') + '. 尝试分解：找p,q使 p+q=' + (_b / _a) + ', p×q=' + (_c / _a) + '</div>';
    if (roots) {
      var p = roots.x1, q = roots.x2;
      if (Number.isInteger(p) && Number.isInteger(q)) {
        html += '<div class="highlight">' + (_a !== 1 ? '4' : '3') + '. (x' + (p >= 0 ? '-' : '+') + Math.abs(p) + ')(x' + (q >= 0 ? '-' : '+') + Math.abs(q) + ') = 0</div>';
        html += '<div class="highlight">x₁ = ' + p + ', x₂ = ' + q + '</div>';
      } else {
        html += '<div class="step" style="color:#f59e0b">不易因式分解，建议用公式法</div>';
      }
    } else {
      html += '<div class="step" style="color:#ef4444">Δ < 0，无法分解（无实根）</div>';
    }
  } else {
    html += '<div class="step">1. 原方程：' + _a + 'x² + ' + _b + 'x + ' + _c + ' = 0</div>';
    if (_a !== 1) html += '<div class="step">2. 两边÷' + _a + '</div>';
    var step = _a !== 1 ? 3 : 2;
    html += '<div class="step">' + step + '. 移常数项：x² + ' + (_b / _a) + 'x = ' + (-_c / _a) + '</div>';
    step++;
    var halfB = _b / (2 * _a);
    html += '<div class="step">' + step + '. 配方：两边+(' + halfB + ')² = ' + (halfB * halfB).toFixed(2) + '</div>';
    step++;
    html += '<div class="step">' + step + '. (x + ' + halfB + ')² = ' + ((halfB * halfB) - _c / _a).toFixed(2) + '</div>';
    if (roots) {
      step++;
      html += '<div class="highlight">' + step + '. x₁ = ' + roots.x1.toFixed(2) + ', x₂ = ' + roots.x2.toFixed(2) + '</div>';
    }
  }
  el.innerHTML = html;
}

function draw() {
  var w = cv.width / devicePixelRatio, h = cv.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);
  var roots = getRoots();

  // Title
  ctx.fillStyle = '#be123c';
  ctx.font = 'bold 15px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('一元二次方程图象 — y = ax² + bx + c', w / 2, 28);

  // Coordinate system
  var range = 8;
  var cx = w / 2, cy = h * 0.55;
  var unit = Math.min(w, h * 0.7) / (range * 2 + 2);

  // Grid
  ctx.strokeStyle = '#fecdd344';
  ctx.lineWidth = 0.5;
  for (var i = -range; i <= range; i++) {
    ctx.beginPath(); ctx.moveTo(cx + i * unit, 30); ctx.lineTo(cx + i * unit, h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, cy + i * unit); ctx.lineTo(w, cy + i * unit); ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = '#334155'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(w, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, 30); ctx.lineTo(cx, h); ctx.stroke();

  // Ticks
  ctx.fillStyle = '#64748b'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
  for (var i = -range; i <= range; i++) {
    if (i === 0) continue;
    ctx.fillText(i, cx + i * unit, cy + 14);
    ctx.textAlign = 'right';
    ctx.fillText(i, cx - 6, cy - i * unit + 4);
    ctx.textAlign = 'center';
  }

  // Draw parabola y = ax² + bx + c
  ctx.strokeStyle = '#be123c'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  var started = false;
  for (var px = 0; px <= w; px += 1) {
    var x = (px - cx) / unit;
    var y = _a * x * x + _b * x + _c;
    var py = cy - y * unit;
    if (py < 20 || py > h) { started = false; continue; }
    if (!started) { ctx.moveTo(px, py); started = true; }
    else ctx.lineTo(px, py);
  }
  ctx.stroke();

  // Vertex
  var vx = -_b / (2 * _a);
  var vy = _a * vx * vx + _b * vx + _c;
  var vxPx = cx + vx * unit, vyPx = cy - vy * unit;

  if (vyPx > 30 && vyPx < h) {
    ctx.fillStyle = '#f59e0b';
    ctx.beginPath(); ctx.arc(vxPx, vyPx, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#92400e'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('顶点(' + vx.toFixed(1) + ', ' + vy.toFixed(1) + ')', vxPx, vyPx + (vy > 0 ? -10 : 18));
  }

  // Symmetry axis
  ctx.strokeStyle = '#f59e0b88'; ctx.lineWidth = 1; ctx.setLineDash([5, 5]);
  ctx.beginPath(); ctx.moveTo(vxPx, 30); ctx.lineTo(vxPx, h); ctx.stroke();
  ctx.setLineDash([]);

  // Roots on x-axis
  if (roots) {
    var rx1Px = cx + roots.x1 * unit, rx2Px = cx + roots.x2 * unit;
    // Only draw if in view
    if (rx1Px > 0 && rx1Px < w) {
      ctx.fillStyle = '#16a34a';
      ctx.beginPath(); ctx.arc(rx1Px, cy, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(rx1Px, cy, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#16a34a'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('x₁=' + roots.x1.toFixed(2), rx1Px, cy + 22);
    }
    if (roots.delta > 0.01 && rx2Px > 0 && rx2Px < w) {
      ctx.fillStyle = '#16a34a';
      ctx.beginPath(); ctx.arc(rx2Px, cy, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(rx2Px, cy, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#16a34a'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('x₂=' + roots.x2.toFixed(2), rx2Px, cy + 22);
    }
  }

  // Delta info box
  var d = getDelta();
  ctx.fillStyle = d > 0 ? '#16a34a' : d === 0 ? '#f59e0b' : '#ef4444';
  ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('Δ = ' + d, 12, 22);

  if (roots) {
    ctx.fillText('x₁ = ' + roots.x1.toFixed(2) + '  x₂ = ' + roots.x2.toFixed(2), 12, h - 10);
  } else {
    ctx.fillText('无实数根', 12, h - 10);
  }
}

// ===== Quiz =====
var _quizQs = [
  { q: '方程 x²-4=0 的解是？', opts: ['x=2', 'x=±2', 'x=-2', 'x=4'], ans: 1 },
  { q: '方程 x²-5x+6=0 的解是？', opts: ['x=1,6', 'x=2,3', 'x=-2,-3', 'x=1,5'], ans: 1 },
  { q: '判别式 Δ=b²-4ac 中，Δ>0 说明？', opts: ['无实根', '两个相等实根', '两个不等实根', '一个实根'], ans: 2 },
  { q: 'x²+1=0 有几个实数根？', opts: ['0个', '1个', '2个', '3个'], ans: 0 },
  { q: '求根公式是？', opts: ['x=-b/2a', 'x=(-b±√Δ)/2a', 'x=b²-4ac', 'x=-b±√Δ'], ans: 1 },
  { q: '方程 x²-6x+9=0 的根是？', opts: ['x=3', 'x=3,-3', 'x=-3', 'x=9'], ans: 0 },
];
var _qi = 0, _score = 0;

function nextQuiz() {
  if (_qi >= _quizQs.length) {
    document.getElementById('quiz-card').innerHTML = '<div class="quiz-q">测验完成！答对 ' + _score + ' / ' + _quizQs.length + ' 题</div>';
    return;
  }
  var q = _quizQs[_qi];
  var html = '<div class="quiz-q">第' + (_qi + 1) + '题：' + q.q + '</div><div class="quiz-opts">';
  q.opts.forEach(function(o, i) { html += '<button class="quiz-opt" onclick="answer(' + i + ')">' + o + '</button>'; });
  html += '</div><div class="quiz-result" id="qr"></div>';
  document.getElementById('quiz-card').innerHTML = html;
}

function answer(idx) {
  var q = _quizQs[_qi];
  var opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(function(b, i) { b.onclick = null; b.style.cursor = 'default';
    if (i === q.ans) b.classList.add('correct');
    if (i === idx && i !== q.ans) b.classList.add('wrong');
  });
  var r = document.getElementById('qr');
  if (idx === q.ans) { r.textContent = '✓ 正确！'; r.style.color = '#16a34a'; _score++; }
  else { r.textContent = '✗ 正确答案：' + q.opts[q.ans]; r.style.color = '#ef4444'; }
  _qi++; setTimeout(nextQuiz, 1200);
}

init();
</script>
</body>
</html>
