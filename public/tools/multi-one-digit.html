<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>多位数乘一位数 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 260px; height: 100%; }
    .canvas-area { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; gap: 14px; background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%); }
    .control-panel { background: #f5f3ff; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 5px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: .05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #c4b5fd; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .preset-btn { padding: 8px 0; border-radius: 8px; font-size: 14px; font-weight: 700; font-family: 'Courier New', monospace; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; }
    .preset-btn:hover { border-color: #8b5cf6; color: #8b5cf6; }
    .calc-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .num-input { width: 100px; padding: 8px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 20px; font-weight: 800; text-align: center; font-family: 'Courier New', monospace; }
    .num-input:focus { outline: none; border-color: #8b5cf6; box-shadow: 0 0 0 3px rgba(139,92,246,.15); }
    .small-input { width: 56px; }
    /* 竖式 */
    .vertical-calc { background: #fff; border: 2px solid #8b5cf6; border-radius: 14px; padding: 20px 32px; font-family: 'Courier New', monospace; }
    .vc-row { display: flex; justify-content: flex-end; gap: 0; line-height: 1.8; }
    .vc-cell { width: 36px; text-align: center; font-size: 26px; font-weight: 800; color: #1e293b; }
    .vc-cell.carry { color: #ef4444; font-size: 14px; font-weight: 700; height: 20px; line-height: 1.2; }
    .vc-op { font-size: 26px; font-weight: 800; color: #8b5cf6; width: 36px; text-align: center; }
    .vc-line { border-top: 3px solid #1e293b; margin: 4px 0; }
    .vc-cell.result { color: #8b5cf6; }
    /* 面积模型 */
    .area-model { background: #fff; border: 2px solid #8b5cf6; border-radius: 14px; padding: 16px; max-width: 420px; width: 100%; }
    .area-model .title { font-size: 13px; font-weight: 700; color: #64748b; margin-bottom: 8px; text-align: center; }
    .grid-row { display: flex; gap: 2px; justify-content: center; }
    .grid-cell { width: 22px; height: 22px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; }
    .step-text { font-size: 13px; color: #334155; line-height: 1.8; margin-top: 8px; }
    .step-text .highlight { color: #8b5cf6; font-weight: 800; }
    .step-text .carry-mark { color: #ef4444; font-weight: 700; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div class="edu-toolbar-title">✖ 多位数乘一位数</div>
    <div class="edu-toolbar-subtitle">上册 · 第六单元</div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-primary" onclick="clearAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <div class="calc-row">
          <input class="num-input" id="numA" value="234" maxlength="4" />
          <span style="font-size:22px;font-weight:800;color:#8b5cf6">×</span>
          <input class="num-input small-input" id="numB" value="6" maxlength="1" />
          <button class="edu-btn edu-btn-primary" onclick="doCalc()" style="font-size:16px;font-weight:800">＝</button>
          <span style="font-size:20px;font-weight:800;color:#1e293b" id="resultSpan"></span>
        </div>
        <div class="vertical-calc" id="verticalCalc" style="display:none"></div>
        <div class="area-model" id="areaModel" style="display:none"></div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">预设例题</div>
          <button class="preset-btn" onclick="loadEx(234,6)">234 × 6</button>
          <button class="preset-btn" onclick="loadEx(507,8)">507 × 8</button>
          <button class="preset-btn" onclick="loadEx(312,3)">312 × 3</button>
          <button class="preset-btn" onclick="loadEx(146,7)">146 × 7</button>
          <button class="preset-btn" onclick="loadEx(609,5)">609 × 5</button>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">随机练习</div>
          <button class="edu-btn edu-btn-accent" onclick="randomEx()" style="width:100%">生成随机题目</button>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <b>竖式乘法要点</b><br/>
          ● 从个位乘起，用一位数依次乘多位数每一位<br/>
          ● 哪一位上乘得的积满几十就向前一位进几<br/>
          ● 0乘任何数都得0<br/>
          ● 面积模型帮助理解：把多位数拆分再相乘
        </div>
      </div>
    </div>
  </div>
</div>
<script>
function loadEx(a, b) {
  document.getElementById('numA').value = a;
  document.getElementById('numB').value = b;
  doCalc();
}

function randomEx() {
  const a = Math.floor(Math.random()*900) + 100;
  const b = Math.floor(Math.random()*8) + 2;
  loadEx(a, b);
}

function doCalc() {
  const a = parseInt(document.getElementById('numA').value) || 0;
  const b = parseInt(document.getElementById('numB').value) || 0;
  if (a < 1 || a > 9999 || b < 1 || b > 9) { alert('请输入：多位数(1-9999)，一位数(1-9)'); return; }
  const result = a * b;
  const digits = String(a).split('').map(Number);
  const len = digits.length;
  // Calculate step by step with carry
  const steps = [];
  let carry = 0;
  for (let i = len - 1; i >= 0; i--) {
    const prod = digits[i] * b + carry;
    const digit = prod % 10;
    const newCarry = Math.floor(prod / 10);
    steps.push({ digit: digits[i], prod: digits[i]*b, carry, total: prod, result: digit, newCarry });
    carry = newCarry;
  }
  const finalResult = carry > 0 ? carry + steps.map(s=>s.result).reverse().join('') : steps.map(s=>s.result).reverse().join('');
  document.getElementById('resultSpan').textContent = '= ' + finalResult;
  // Vertical display
  const resStr = String(result);
  const maxLen = Math.max(len, resStr.length);
  const sa = String(a).padStart(maxLen);
  const sr = resStr.padStart(maxLen);
  let html = '';
  // Carry row
  html += '<div class="vc-row">';
  const carryArr = [];
  let c = 0;
  for (let i = len-1; i >= 0; i--) {
    const p = digits[i]*b+c;
    carryArr.unshift(Math.floor(p/10));
    c = Math.floor(p/10);
  }
  if (c > 0) carryArr.unshift(c);
  for (let i = 0; i < maxLen; i++) html += `<div class="vc-cell carry">${''}</div>`;
  html += '</div>';
  // Carry indicators (rewrite properly)
  html = '<div class="vc-row">';
  for (let i = 0; i < maxLen; i++) {
    const ci = i - (maxLen - len);
    if (ci >= 0 && ci < steps.length) {
      const s = steps[len - 1 - ci];
      html += `<div class="vc-cell carry">${s.newCarry > 0 ? s.newCarry : ''}</div>`;
    } else {
      html += `<div class="vc-cell carry">${i===0 && carry > 0 ? carry : ''}</div>`;
    }
  }
  html += '</div>';
  // Number A
  html += '<div class="vc-row">';
  for (let i = 0; i < maxLen; i++) html += `<div class="vc-cell">${sa[i]!==' '?sa[i]:''}</div>`;
  html += '</div>';
  // Operator + B
  html += '<div class="vc-row">';
  html += '<div class="vc-op">×</div>';
  for (let i = 0; i < maxLen - 1; i++) html += '<div class="vc-cell"></div>';
  html += `<div class="vc-cell">${b}</div>`;
  html += '</div>';
  // Line
  html += '<div class="vc-line"></div>';
  // Result
  html += '<div class="vc-row">';
  for (let i = 0; i < maxLen; i++) html += `<div class="vc-cell result">${sr[i]}</div>`;
  html += '</div>';
  document.getElementById('verticalCalc').innerHTML = html;
  document.getElementById('verticalCalc').style.display = '';
  // Area model
  buildAreaModel(a, b, result);
}

function buildAreaModel(a, b, result) {
  const digits = String(a).split('').map(Number);
  const len = digits.length;
  const placeValues = digits.map((d, i) => d * Math.pow(10, len-1-i));
  const placeNames = digits.map((d, i) => {
    const pv = Math.pow(10, len-1-i);
    const names = {'1000':'千','100':'百','10':'十','1':'个'};
    return (names[String(pv)]||'') + '位';
  });
  let html = '<div class="title">面积模型（分配律理解）</div>';
  // Grid
  html += '<div class="grid-row" style="margin-bottom:4px">';
  html += '<div style="width:52px"></div>';
  digits.forEach(d => { html += `<div style="width:22px;text-align:center;font-size:11px;font-weight:700;color:#64748b;margin:0 1px">${d}</div>`; });
  html += '</div>';
  for (let row = 0; row < b; row++) {
    html += '<div class="grid-row">';
    if (row === Math.floor(b/2)) html += `<div style="width:22px;font-size:12px;font-weight:800;color:#8b5cf6;text-align:center;line-height:22px">${b}</div>`;
    else html += '<div style="width:22px"></div>';
    digits.forEach((d, ci) => {
      const colors = ['#8b5cf6','#6366f1','#3b82f6','#0ea5e9'];
      html += `<div class="grid-cell" style="background:${colors[ci%4]}">${d}</div>`;
    });
    html += '</div>';
  }
  // Step text
  html += '<div class="step-text">';
  html += '<b>分步计算：</b><br/>';
  let partials = [];
  let totalCarry = 0;
  for (let i = len-1; i >= 0; i--) {
    const pv = Math.pow(10, len-1-i);
    const prod = digits[i] * b + totalCarry;
    const digitResult = prod % 10;
    totalCarry = Math.floor(prod / 10);
    const partial = digits[i] * b * pv;
    const carryStr = totalCarry > 0 ? ` <span class="carry-mark">（进${totalCarry}）</span>` : '';
    html += `${placeNames[i]}：${digits[i]} × ${b} = ${digits[i]*b}${carryStr} → <span class="highlight">${digitResult}</span><br/>`;
    partials.push(partial);
  }
  if (totalCarry > 0) html += `最高位进位：<span class="highlight">${totalCarry}</span><br/>`;
  html += `<br/><b>结果：</b>`;
  html += partials.map(p => p).join(' + ');
  html += ` = <span class="highlight">${result}</span>`;
  html += '</div>';
  document.getElementById('areaModel').innerHTML = html;
  document.getElementById('areaModel').style.display = '';
}

function clearAll() {
  document.getElementById('numA').value = '';
  document.getElementById('numB').value = '';
  document.getElementById('resultSpan').textContent = '';
  document.getElementById('verticalCalc').style.display = 'none';
  document.getElementById('areaModel').style.display = 'none';
}
</script>
</body>
</html>
