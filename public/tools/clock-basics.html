<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>认识钟表 — 教立方</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
*{box-sizing:border-box}body{font-family:var(--edu-font);margin:0}
.tool{width:100vw;height:100vh;display:flex;flex-direction:column;background:var(--edu-bg)}
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#fff;border-bottom:1px solid var(--edu-border)}
.toolbar h1{font-size:15px;color:var(--edu-primary);margin:0}
.toolbar span{font-size:11px;color:var(--edu-text-muted);background:#f1f5f9;padding:2px 8px;border-radius:12px}
.main{flex:1;display:grid;grid-template-columns:1fr 280px;overflow:hidden}
.canvas-wrap{position:relative;overflow:hidden;background:linear-gradient(135deg,#eff6ff,#dbeafe)}
.canvas-wrap canvas{width:100%;height:100%;display:block}
.panel{background:#fff;border-left:1px solid var(--edu-border);padding:12px;display:flex;flex-direction:column;gap:8px;overflow:auto}
.section{display:flex;flex-direction:column;gap:4px}
.label{font-size:10px;font-weight:700;color:#64748b;letter-spacing:.05em}
.divider{height:1px;background:var(--edu-border)}
.btn{padding:6px 12px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--edu-font);transition:all .15s}
.btn.active{background:var(--edu-primary);color:#fff}
.btn-default{background:#f1f5f9;color:#334155}
.btn-default:hover{background:#e2e8f0}
.row{display:flex;gap:4px;flex-wrap:wrap}
.slider-row{display:flex;align-items:center;gap:6px}
.slider-row label{font-size:11px;font-weight:700;min-width:32px}
.slider-row input[type=range]{flex:1}
.slider-row .val{font-size:14px;font-weight:800;min-width:28px;text-align:right;color:#1d4ed8}

.time-box{text-align:center;padding:10px;background:#eff6ff;border:2px solid #93c5fd;border-radius:12px}
.time-box .time{font-size:28px;font-weight:800;color:#1e40af;font-family:monospace}
.time-box .sub{font-size:11px;color:#3b82f6;margin-top:2px}

.quiz-card{background:#eff6ff;border:2px solid #93c5fd;border-radius:12px;padding:10px;text-align:center}
.quiz-q{font-size:14px;font-weight:700;color:#1e40af}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.quiz-opt{padding:8px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;background:#fff;font-family:var(--edu-font)}
.quiz-opt:hover{border-color:#3b82f6}
.quiz-opt.correct{background:#dcfce7;border-color:#22c55e}
.quiz-opt.wrong{background:#fef2f2;border-color:#ef4444}
.quiz-result{font-size:12px;font-weight:700;margin-top:4px;min-height:18px}

.info{font-size:11px;line-height:1.8;color:#334155;background:#fff;border:1px solid #bfdbfe;border-radius:8px;padding:8px 10px}
.info b{color:#1e40af}
</style>
</head>
<body>
<div class="tool">
  <div class="toolbar"><h1>🕐 认识钟表</h1><span>一年级上册 · 数学</span></div>
  <div class="main">
    <div class="canvas-wrap"><canvas id="cv"></canvas></div>
    <div class="panel">
      <div class="time-box">
        <div class="time" id="time-display">3:00</div>
        <div class="sub" id="time-sub">3点整</div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">调节时针</div>
        <div class="slider-row"><label>时=</label><input type="range" id="sl-hour" min="1" max="12" value="3" oninput="onSlider()"/><div class="val" id="vhour">3</div></div>
      </div>
      <div class="section">
        <div class="label">调节分针</div>
        <div class="slider-row"><label>分=</label><input type="range" id="sl-min" min="0" max="55" step="5" value="0" oninput="onSlider()"/><div class="val" id="vmin">0</div></div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">快捷时间</div>
        <div class="row">
          <button class="btn btn-default" onclick="setTime(7,0)">7:00</button>
          <button class="btn btn-default" onclick="setTime(7,30)">7:30</button>
          <button class="btn btn-default" onclick="setTime(12,0)">12:00</button>
          <button class="btn btn-default" onclick="setTime(3,0)">3:00</button>
          <button class="btn btn-default" onclick="setTime(3,30)">3:30</button>
          <button class="btn btn-default" onclick="setTime(9,0)">9:00</button>
          <button class="btn btn-default" onclick="setTime(6,30)">6:30</button>
          <button class="btn btn-default" onclick="setTime(10,15)">10:15</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">认识钟表测验</div>
        <div class="quiz-card" id="quiz-card"></div>
      </div>
      <div class="divider"></div>
      <div class="info">
        <b>认识钟表</b><br/>
        ● <strong>短针</strong>是时针，指向几就是几点<br/>
        ● <strong>长针</strong>是分针，指向12是整点<br/>
        ● 分针指向6是半点（30分）<br/>
        ● 分针走一圈 = 时针走一大格 = 1小时
      </div>
    </div>
  </div>
</div>
<script>
var cv, ctx, _hour = 3, _min = 0;

function init() {
  cv = document.getElementById('cv');
  ctx = cv.getContext('2d');
  window.addEventListener('resize', resize);
  resize();
  updateTimeDisplay();
  nextQuiz();
}

function resize() {
  var r = cv.parentElement.getBoundingClientRect();
  cv.width = r.width * devicePixelRatio;
  cv.height = r.height * devicePixelRatio;
  cv.style.width = r.width + 'px';
  cv.style.height = r.height + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  draw();
}

function onSlider() {
  _hour = parseInt(document.getElementById('sl-hour').value);
  _min = parseInt(document.getElementById('sl-min').value);
  document.getElementById('vhour').textContent = _hour;
  document.getElementById('vmin').textContent = _min;
  updateTimeDisplay();
  draw();
}

function setTime(h, m) {
  _hour = h; _min = m;
  document.getElementById('sl-hour').value = h;
  document.getElementById('sl-min').value = m;
  document.getElementById('vhour').textContent = h;
  document.getElementById('vmin').textContent = m;
  updateTimeDisplay();
  draw();
}

function updateTimeDisplay() {
  document.getElementById('time-display').textContent = _hour + ':' + (_min < 10 ? '0' : '') + _min;

  var sub = '';
  if (_min === 0) sub = _hour + '点整';
  else if (_min === 30) sub = _hour + '点半';
  else if (_min === 15) sub = _hour + '点15分';
  else if (_min === 45) sub = _hour + '点45分';
  else sub = _hour + '点' + _min + '分';
  document.getElementById('time-sub').textContent = sub;
}

function draw() {
  var w = cv.width / devicePixelRatio, h = cv.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  var cx = w / 2, cy = h / 2;
  var R = Math.min(w, h) * 0.38;

  // Clock face background
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#1e40af'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.stroke();

  // Inner ring
  ctx.strokeStyle = '#bfdbfe'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, cy, R - 8, 0, Math.PI * 2); ctx.stroke();

  // Hour marks and numbers
  for (var i = 1; i <= 12; i++) {
    var angle = (i * 30 - 90) * Math.PI / 180;

    // Tick mark
    var x1 = cx + (R - 15) * Math.cos(angle), y1 = cy + (R - 15) * Math.sin(angle);
    var x2 = cx + (R - 5) * Math.cos(angle), y2 = cy + (R - 5) * Math.sin(angle);
    ctx.strokeStyle = '#1e40af'; ctx.lineWidth = i % 3 === 0 ? 3 : 1.5;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();

    // Number
    var nx = cx + (R - 30) * Math.cos(angle), ny = cy + (R - 30) * Math.sin(angle);
    ctx.fillStyle = '#1e40af';
    ctx.font = (i % 3 === 0 ? 'bold ' : '') + Math.max(12, R * 0.12) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(i, nx, ny + R * 0.04);
  }

  // Minute ticks
  for (var i = 0; i < 60; i++) {
    if (i % 5 === 0) continue;
    var angle = (i * 6 - 90) * Math.PI / 180;
    var x1 = cx + (R - 8) * Math.cos(angle), y1 = cy + (R - 8) * Math.sin(angle);
    var x2 = cx + (R - 3) * Math.cos(angle), y2 = cy + (R - 3) * Math.sin(angle);
    ctx.strokeStyle = '#93c5fd'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  }

  // Hour hand
  var hourAngle = ((_hour % 12) * 30 + _min * 0.5 - 90) * Math.PI / 180;
  ctx.strokeStyle = '#1e40af'; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + R * 0.5 * Math.cos(hourAngle), cy + R * 0.5 * Math.sin(hourAngle));
  ctx.stroke();

  // Minute hand
  var minAngle = (_min * 6 - 90) * Math.PI / 180;
  ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + R * 0.72 * Math.cos(minAngle), cy + R * 0.72 * Math.sin(minAngle));
  ctx.stroke();

  // Center dot
  ctx.fillStyle = '#1e40af';
  ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI * 2); ctx.fill();

  // Labels for hands
  ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillStyle = '#1e40af';
  ctx.fillText('时针（短）', cx, cy + R + 25);
  ctx.fillStyle = '#3b82f6';
  ctx.fillText('分针（长）', cx, cy + R + 40);

  // Current time text
  ctx.fillStyle = '#1e40af'; ctx.font = 'bold 18px sans-serif';
  ctx.fillText(_hour + ':' + (_min < 10 ? '0' : '') + _min, cx, 25);
}

// ===== Quiz =====
var _qi = 0, _score = 0;

function nextQuiz() {
  var h = Math.floor(Math.random() * 12) + 1;
  var m = [0, 0, 0, 30, 30, 15, 45, 0, 30, 0][Math.floor(Math.random() * 10)];
  var ans = h + ':' + (m < 10 ? '0' : '') + m;

  var qText = '钟面上显示的是几点？';
  if (m === 0) qText = '时针指向' + h + '，分针指向12，是几点？';
  else if (m === 30) qText = '时针在' + h + '和' + (h % 12 + 1) + '之间，分针指向6，是几点？';
  else qText = '时针指向' + h + '附近，分针指向' + (m / 5) + '，是几点？';

  var opts = [ans];
  while (opts.length < 4) {
    var wh = Math.floor(Math.random() * 12) + 1;
    var wm = [0, 30, 15, 45][Math.floor(Math.random() * 4)];
    var wStr = wh + ':' + (wm < 10 ? '0' : '') + wm;
    if (opts.indexOf(wStr) === -1) opts.push(wStr);
  }
  // Shuffle
  for (var i = opts.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = opts[i]; opts[i] = opts[j]; opts[j] = t;
  }

  var html = '<div class="quiz-q">' + qText + '</div><div class="quiz-opts">';
  opts.forEach(function(o) { html += '<button class="quiz-opt" onclick="answer(this,\'' + o + '\',\'' + ans + '\')">' + o + '</button>'; });
  html += '</div><div class="quiz-result" id="qr"></div>';
  document.getElementById('quiz-card').innerHTML = html;
}

function answer(el, val, ans) {
  var opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(function(b) {
    b.onclick = null; b.style.cursor = 'default';
    if (b.textContent === ans) b.classList.add('correct');
    if (b.textContent === val && val !== ans) b.classList.add('wrong');
  });
  var r = document.getElementById('qr');
  if (val === ans) { r.textContent = '✓ 正确！'; r.style.color = '#16a34a'; _score++; }
  else { r.textContent = '✗ 正确答案：' + ans; r.style.color = '#ef4444'; }
  _qi++; setTimeout(nextQuiz, 1500);
}

init();
</script>
<script src="../edu-lib/edu-tools.js"></script>
</body>
</html>
