<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>圆锥的认识与体积 — 教立方</title>
  <!-- play-ref:jiaohukejian:0QGYWHR -->
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<script src="../edu-lib/three.min.js"></script>
<script src="../edu-lib/OrbitControls.js"></script>
<script src="../edu-lib/edu-3d.js"></script>
<script src="../edu-lib/edu-tools.js"></script>
<style>
  .main-layout { display:grid; grid-template-columns:1fr 280px; height:100%; }
  .canvas-area { position:relative; background:linear-gradient(135deg,#fff7ed,#fdfaf4); overflow:hidden; }
  .canvas-area canvas { width:100%; height:100%; display:block; }
  .control-panel { background:#fdfaf4; border-left:1px solid #e2e8f0; padding:14px; display:flex; flex-direction:column; gap:10px; overflow:auto; }
  .ctrl-section { display:flex; flex-direction:column; gap:6px; }
  .ctrl-label { font-size:11px; font-weight:700; color:#64748b; letter-spacing:.05em; }
  .divider { height:1px; background:#e2e8f0; }
  .slider-row { display:flex; align-items:center; gap:8px; }
  .slider-row label { font-size:12px; font-weight:600; color:#64748b; min-width:20px; }
  .slider-row input[type=range] { flex:1; }
  .slider-row .val { font-size:14px; font-weight:700; color:#f97316; min-width:36px; text-align:right; }
  .info-box { background:#fff; border:1px solid #fed7aa; border-radius:10px; padding:10px 12px; font-size:12px; line-height:1.8; color:#334155; }
  .info-box strong { color:#f97316; }
  .prop-row { display:flex; justify-content:space-between; align-items:center; padding:6px 10px; background:#fff; border-radius:6px; border:1px solid #e2e8f0; font-size:12px; }
  .prop-label { color:#64748b; }
  .prop-value { font-weight:700; color:#1e293b; font-family:'Courier New',monospace; }
  .compare-box { background:#fff; border:2px solid #f97316; border-radius:12px; padding:12px; text-align:center; }
  .compare-box .vs { font-size:18px; font-weight:800; color:#f97316; }
  .fill-bar { height:36px; border-radius:8px; overflow:hidden; background:#f1f5f9; margin:8px 0; position:relative; }
  .fill-level { height:100%; border-radius:8px; transition:width .5s; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:12px; }
  .orbit-hint {
    position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,.85); padding:6px 14px; border-radius:20px;
    font-size:11px; color:#64748b; pointer-events:none;
  }
  .pour-count { font-size:22px; font-weight:800; color:#f97316; text-align:center; }
</style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div class="edu-toolbar-lead">
      <span class="edu-toolbar-title">🍦 圆锥的认识与体积</span>
      <span class="edu-toolbar-subtitle">下册 · 第三单元</span>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-accent" id="btn-pour" onclick="playPour()">🪣 倒沙实验</button>
      <button class="edu-btn edu-btn-outline" id="btn-drain" onclick="drainFill()" style="display:none">↩ 倒回</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="c3d"></canvas>
        <div class="orbit-hint">拖拽旋转 · 双指缩放</div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">底面半径 r</div>
          <div class="slider-row"><label>r</label><input type="range" id="sr" min="1" max="5" value="2" step="0.5" oninput="rebuild()"/><span class="val" id="vr">2</span></div>
        </div>
        <div class="ctrl-section">
          <div class="ctrl-label">高 h</div>
          <div class="slider-row"><label>h</label><input type="range" id="sh" min="1" max="6" value="3" step="0.5" oninput="rebuild()"/><span class="val" id="vh">3</span></div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">圆锥属性</div>
          <div class="prop-row"><span class="prop-label">半径 r</span><span class="prop-value" id="pR">2</span></div>
          <div class="prop-row"><span class="prop-label">高 h</span><span class="prop-value" id="pH">3</span></div>
          <div class="prop-row"><span class="prop-label">母线 l</span><span class="prop-value" id="pL">3.6</span></div>
          <div class="prop-row"><span class="prop-label">底面积 πr²</span><span class="prop-value" id="pSB">12.6</span></div>
          <div class="prop-row"><span class="prop-label">体积 V=⅓πr²h</span><span class="prop-value" id="pV">12.6</span></div>
        </div>
        <div class="divider"></div>
        <div class="compare-box">
          <div style="font-size:11px;color:#64748b">等底等高对比</div>
          <div class="vs">V圆锥 = ⅓ V圆柱</div>
          <div class="pour-count" id="pour-count">0 / 3</div>
          <div style="font-size:12px;font-weight:700;color:#f97316">圆锥 = <span id="cV">12.6</span></div>
          <div style="font-size:12px;font-weight:700;color:#3b82f6">圆柱 = <span id="cyV">37.7</span></div>
          <div class="fill-bar">
            <div class="fill-level" id="fillBar" style="width:0%;background:linear-gradient(90deg,#f97316,#fb923c)">0%</div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <strong>圆锥知识</strong><br/>
          ● 只有一个底面（圆形）<br/>
          ● 侧面展开是扇形<br/>
          ● 母线 l² = r² + h²<br/>
          ● V圆锥 = ⅓ × S底 × h<br/>
          ● 等底等高：V圆锥 = ⅓ V圆柱<br/>
          ● 倒沙3次恰好装满圆柱
        </div>
      </div>
    </div>
  </div>
</div>
<script>
var _scene, _camera, _renderer, _controls;
var _coneMesh, _cylMesh, _coneEdges, _cylEdges;
var _axisGroup, _fillGroup;
var _pourId = null;
var _pourProgress = 0;
var _pourCount = 0;
var _pourMesh = null;

function init() {
  var canvas = document.getElementById('c3d');
  var r = Edu3D.createScene(canvas, { bg: 0xfff7ed, camX: 8, camY: 5, camZ: 8 });
  _scene = r.scene; _camera = r.camera; _renderer = r.renderer; _controls = r.controls;
  Edu3D.addLights(_scene);
  Edu3D.addGrid(_scene, 12, 12);

  _axisGroup = new THREE.Group();
  _scene.add(_axisGroup);
  _fillGroup = new THREE.Group();
  _scene.add(_fillGroup);

  rebuild();
  Edu3D.startLoop(_scene, _camera, _renderer, _controls, function () {
    if (_pourProgress > 0 && _pourProgress < 3) updatePour();
  });
}

function rebuild() {
  var radius = parseFloat(document.getElementById('sr').value);
  var height = parseFloat(document.getElementById('sh').value);
  document.getElementById('vr').textContent = radius;
  document.getElementById('vh').textContent = height;

  if (_coneMesh) { _scene.remove(_coneMesh); _scene.remove(_coneEdges); }
  if (_cylMesh) { _scene.remove(_cylMesh); _scene.remove(_cylEdges); }
  while (_axisGroup.children.length) _axisGroup.remove(_axisGroup.children[0]);
  while (_fillGroup.children.length) _fillGroup.remove(_fillGroup.children[0]);
  _pourMesh = null;

  var coneSpacing = radius * 2 + 2;

  // 圆锥
  var coneGeo = new THREE.ConeGeometry(radius, height, 32);
  var coneMat = new THREE.MeshLambertMaterial({ color: 0xf97316, transparent: true, opacity: 0.7 });
  _coneMesh = new THREE.Mesh(coneGeo, coneMat);
  _coneMesh.position.set(-coneSpacing / 2, height / 2, 0);
  _coneMesh.castShadow = true;
  _scene.add(_coneMesh);

  _coneEdges = Edu3D.edges(coneGeo, 0xc2410c);
  _coneEdges.position.copy(_coneMesh.position);
  _scene.add(_coneEdges);

  // 圆柱（虚线对比）
  var cylGeo = new THREE.CylinderGeometry(radius, radius, height, 32);
  var cylMat = new THREE.MeshLambertMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.2 });
  _cylMesh = new THREE.Mesh(cylGeo, cylMat);
  _cylMesh.position.set(coneSpacing / 2, height / 2, 0);
  _scene.add(_cylMesh);

  _cylEdges = Edu3D.edges(cylGeo, 0x2563eb);
  _cylEdges.position.copy(_cylMesh.position);
  _scene.add(_cylEdges);

  // 标签
  var coneLabel = Edu3D.textSprite('圆锥', { color: '#f97316', scale: 0.6 });
  coneLabel.position.set(-coneSpacing / 2, height + 0.8, 0);
  _axisGroup.add(coneLabel);

  var cylLabel = Edu3D.textSprite('等底等高圆柱', { color: '#3b82f6', scale: 0.5 });
  cylLabel.position.set(coneSpacing / 2, height + 0.8, 0);
  _axisGroup.add(cylLabel);

  // 高线
  var hLineGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-coneSpacing / 2, 0, 0),
    new THREE.Vector3(-coneSpacing / 2, height, 0)
  ]);
  _axisGroup.add(new THREE.Line(hLineGeo, new THREE.LineBasicMaterial({ color: 0xef4444 })));

  // 半径线
  var rLineGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-coneSpacing / 2, 0.02, 0),
    new THREE.Vector3(-coneSpacing / 2 + radius, 0.02, 0)
  ]);
  _axisGroup.add(new THREE.Line(rLineGeo, new THREE.LineBasicMaterial({ color: 0x22c55e })));

  // 更新计算
  var l = Math.sqrt(radius * radius + height * height);
  var sbase = Math.PI * radius * radius;
  var vcone = sbase * height / 3;
  var vcyl = sbase * height;

  document.getElementById('pR').textContent = radius;
  document.getElementById('pH').textContent = height;
  document.getElementById('pL').textContent = l.toFixed(1);
  document.getElementById('pSB').textContent = sbase.toFixed(1);
  document.getElementById('pV').textContent = vcone.toFixed(1);
  document.getElementById('cV').textContent = vcone.toFixed(1);
  document.getElementById('cyV').textContent = vcyl.toFixed(1);
}

function playPour() {
  if (_pourCount >= 3) {
    // Already full, reset
    _pourCount = 0;
    _pourProgress = 0;
    while (_fillGroup.children.length) _fillGroup.remove(_fillGroup.children[0]);
    _pourMesh = null;
  }

  if (_pourId) { clearInterval(_pourId); _pourId = null; }

  var radius = parseFloat(document.getElementById('sr').value);
  var height = parseFloat(document.getElementById('sh').value);
  var coneSpacing = radius * 2 + 2;

  var startProgress = _pourCount;
  var targetProgress = _pourCount + 1;
  _pourProgress = startProgress;

  var bar = document.getElementById('fillBar');
  document.getElementById('btn-drain').style.display = 'none';

  _pourId = setInterval(function () {
    _pourProgress += 0.04;
    if (_pourProgress >= targetProgress) {
      _pourProgress = targetProgress;
      _pourCount = targetProgress;
      clearInterval(_pourId);
      _pourId = null;

      document.getElementById('pour-count').textContent = _pourCount + ' / 3';
      var pct = (_pourCount / 3 * 100);
      bar.style.width = pct + '%';

      if (_pourCount >= 3) {
        bar.textContent = '倒满！V圆锥 = ⅓ V圆柱';
        bar.style.background = 'linear-gradient(90deg,#22c55e,#16a34a)';
        document.getElementById('btn-drain').style.display = '';
        document.getElementById('btn-pour').textContent = '🔄 重新实验';
      } else {
        bar.textContent = '第' + _pourCount + '次倒沙 ' + pct.toFixed(0) + '%';
        bar.style.background = 'linear-gradient(90deg,#f97316,#fb923c)';
        document.getElementById('btn-pour').textContent = '🪣 继续倒沙';
      }
    } else {
      var pctNow = (_pourProgress / 3 * 100);
      bar.style.width = pctNow + '%';
      var pourNum = Math.ceil(_pourProgress);
      bar.textContent = '第' + pourNum + '次倒沙 ' + pctNow.toFixed(0) + '%';
    }
  }, 30);
}

function updatePour() {
  if (_pourProgress <= 0) return;
  var radius = parseFloat(document.getElementById('sr').value);
  var height = parseFloat(document.getElementById('sh').value);
  var coneSpacing = radius * 2 + 2;

  var fillH = Math.min(_pourProgress / 3, 1) * height;

  if (_pourMesh) { _fillGroup.remove(_pourMesh); _pourMesh.geometry.dispose(); }

  var fillGeo = new THREE.CylinderGeometry(radius * 0.95, radius * 0.95, Math.max(0.01, fillH), 32);
  var fillMat = new THREE.MeshBasicMaterial({ color: 0xf97316, transparent: true, opacity: 0.4 });
  _pourMesh = new THREE.Mesh(fillGeo, fillMat);
  _pourMesh.position.set(coneSpacing / 2, fillH / 2, 0);
  _fillGroup.add(_pourMesh);
}

function drainFill() {
  if (_pourId) { clearInterval(_pourId); _pourId = null; }

  var bar = document.getElementById('fillBar');
  var t = _pourProgress;

  _pourId = setInterval(function () {
    t -= 0.06;
    if (t <= 0) {
      t = 0;
      _pourProgress = 0;
      _pourCount = 0;
      clearInterval(_pourId);
      _pourId = null;
      while (_fillGroup.children.length) _fillGroup.remove(_fillGroup.children[0]);
      _pourMesh = null;
      bar.style.width = '0%';
      bar.textContent = '0%';
      bar.style.background = 'linear-gradient(90deg,#f97316,#fb923c)';
      document.getElementById('pour-count').textContent = '0 / 3';
      document.getElementById('btn-drain').style.display = 'none';
      document.getElementById('btn-pour').textContent = '🪣 倒沙实验';
    } else {
      _pourProgress = t;
      bar.style.width = (t / 3 * 100) + '%';
      bar.textContent = (t / 3 * 100).toFixed(0) + '%';
      updatePour();
    }
  }, 30);
}

function resetAll() {
  if (_pourId) { clearInterval(_pourId); _pourId = null; }
  _pourProgress = 0;
  _pourCount = 0;
  while (_fillGroup.children.length) _fillGroup.remove(_fillGroup.children[0]);
  _pourMesh = null;
  var bar = document.getElementById('fillBar');
  bar.style.width = '0%';
  bar.textContent = '0%';
  bar.style.background = 'linear-gradient(90deg,#f97316,#fb923c)';
  document.getElementById('pour-count').textContent = '0 / 3';
  document.getElementById('btn-drain').style.display = 'none';
  document.getElementById('btn-pour').textContent = '🪣 倒沙实验';
  document.getElementById('sr').value = 2;
  document.getElementById('sh').value = 3;
  rebuild();
}

init();
</script>
</body>
</html>
