<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>长方体表面积与体积 — 教立方</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<script src="../edu-lib/three.min.js"></script>
<script src="../edu-lib/OrbitControls.js"></script>
<script src="../edu-lib/edu-3d.js"></script>
<script src="../edu-lib/edu-tools.js"></script>
<style>
  .main-layout { display:grid; grid-template-columns:1fr 280px; height:100%; }
  .canvas-area { position:relative; background:linear-gradient(135deg,#faf5ff,#ede9fe); overflow:hidden; }
  .canvas-area canvas { width:100%; height:100%; display:block; }
  .control-panel { background:#fff; border-left:1px solid #e2e8f0; padding:16px; display:flex; flex-direction:column; gap:12px; overflow:auto; }
  .ctrl-section { display:flex; flex-direction:column; gap:6px; }
  .ctrl-label { font-size:11px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.05em; }
  .divider { height:1px; background:#e2e8f0; }
  .slider-row { display:flex; align-items:center; gap:8px; }
  .slider-row label { font-size:12px; font-weight:600; color:#64748b; min-width:30px; }
  .slider-row input[type=range] { flex:1; }
  .slider-row .val { font-size:14px; font-weight:700; color:#6D28D9; min-width:24px; text-align:right; }
  .info-box { background:#faf5ff; border:1px solid #e9d5ff; border-radius:10px; padding:10px 12px; font-size:12px; color:#64748b; line-height:1.9; }
  .info-box strong { color:#6D28D9; }
  .result-big { font-size:18px; font-weight:800; color:#6D28D9; text-align:center; margin:2px 0; }
  .highlight-btn {
    padding:6px 10px; border-radius:8px; font-size:11px; font-weight:600;
    cursor:pointer; border:1.5px solid #e2e8f0; background:#fff; color:#64748b;
    transition:all .15s; font-family:var(--edu-font); text-align:center;
  }
  .highlight-btn.active { background:#8B5CF6; color:#fff; border-color:#8B5CF6; }
  .preset-btn {
    padding:4px 10px; border-radius:6px; font-size:11px; font-weight:600;
    cursor:pointer; border:1.5px solid #e2e8f0; background:#fff; color:#64748b;
    transition:all .15s; font-family:var(--edu-font);
  }
  .preset-btn:hover { border-color:#94a3b8; }
  .preset-btn.active { background:#6D28D9; color:#fff; border-color:#6D28D9; }
  .orbit-hint {
    position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,.85); padding:6px 14px; border-radius:20px;
    font-size:11px; color:#64748b; pointer-events:none;
  }
</style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="edu-toolbar-title">🧊 长方体表面积与体积</span>
      <span class="edu-toolbar-subtitle">五下 · 第三单元</span>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="c3d"></canvas>
        <div class="orbit-hint">拖拽旋转 · 滚轮缩放</div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">调整尺寸</div>
          <div class="slider-row"><label>长</label><input type="range" id="sl" min="1" max="6" value="4" step="1" oninput="rebuild()"/><span class="val" id="vl">4</span></div>
          <div class="slider-row"><label>宽</label><input type="range" id="sw" min="1" max="5" value="3" step="1" oninput="rebuild()"/><span class="val" id="vw">3</span></div>
          <div class="slider-row"><label>高</label><input type="range" id="sh" min="1" max="5" value="2" step="1" oninput="rebuild()"/><span class="val" id="vh">2</span></div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">预设尺寸</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px">
            <button class="preset-btn" onclick="loadPreset(4,3,2)">4×3×2</button>
            <button class="preset-btn" onclick="loadPreset(5,4,3)">5×4×3</button>
            <button class="preset-btn" onclick="loadPreset(3,3,3)">正方体</button>
            <button class="preset-btn" onclick="loadPreset(6,2,1)">扁形</button>
            <button class="preset-btn" onclick="loadPreset(2,2,5)">柱形</button>
            <button class="preset-btn" onclick="loadPreset(1,1,1)">最小</button>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">显示模式</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px">
            <button class="highlight-btn active" id="hb-solid" onclick="setHighlight('solid')">实体</button>
            <button class="highlight-btn" id="hb-face" onclick="setHighlight('face')">分面</button>
            <button class="highlight-btn" id="hb-fill" onclick="setHighlight('fill')">填充</button>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">计算结果</div>
          <div class="info-box" id="calc-result"></div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">单位立方体</div>
          <div class="info-box" id="fill-info" style="font-size:11px;line-height:1.7"></div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">公式</div>
          <div class="info-box" style="background:#fff;border-color:#e2e8f0;font-size:11px;line-height:1.7">
            <strong>表面积</strong> = 2(长×宽 + 长×高 + 宽×高)<br/>
            <strong>体积</strong> = 长 × 宽 × 高<br/>
            长方体有 6 个面，相对的两个面相等
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
var _scene, _camera, _renderer, _controls;
var _cuboid, _edges, _faceGroup, _fillGroup;
var _highlight = 'solid';

function init() {
  var canvas = document.getElementById('c3d');
  var r = Edu3D.createScene(canvas, { bg: 0xf8f5ff, camX: 6, camY: 5, camZ: 6 });
  _scene = r.scene; _camera = r.camera; _renderer = r.renderer; _controls = r.controls;
  Edu3D.addLights(_scene);
  Edu3D.addGrid(_scene, 12, 12);
  rebuild();
  Edu3D.startLoop(_scene, _camera, _renderer, _controls);
}

function rebuild() {
  var l = parseInt(document.getElementById('sl').value);
  var w = parseInt(document.getElementById('sw').value);
  var h = parseInt(document.getElementById('sh').value);
  document.getElementById('vl').textContent = l;
  document.getElementById('vw').textContent = w;
  document.getElementById('vh').textContent = h;
  updateInfo(l, w, h);
  buildCuboid(l, w, h);
}

function buildCuboid(l, w, h) {
  if (_cuboid) { _scene.remove(_cuboid); _scene.remove(_edges); }
  if (_faceGroup) _scene.remove(_faceGroup);
  if (_fillGroup) _scene.remove(_fillGroup);

  var halfL = l / 2, halfW = w / 2, halfH = h / 2;

  // 长方体
  var geo = new THREE.BoxGeometry(l, h, w);
  var mat = new THREE.MeshLambertMaterial({ color: 0x8B5CF6, transparent: true, opacity: 0.35 });
  _cuboid = new THREE.Mesh(geo, mat);
  _cuboid.castShadow = true;
  _cuboid.visible = _highlight === 'solid';
  _scene.add(_cuboid);

  // 边框
  _edges = Edu3D.edges(geo, 0x4c1d95);
  _edges.visible = _highlight !== 'face';
  _scene.add(_edges);

  // 高亮面
  _faceGroup = new THREE.Group();
  var faceData = [
    { pos:[0,halfH,0], rot:[0,0,0], label:'上面 '+l+'×'+w },
    { pos:[0,-halfH,0], rot:[0,0,0], label:'下面 '+l+'×'+w },
    { pos:[0,0,halfW], rot:[-Math.PI/2,0,0], label:'后面 '+l+'×'+h },
    { pos:[0,0,-halfW], rot:[Math.PI/2,0,0], label:'前面 '+l+'×'+h },
    { pos:[-halfL,0,0], rot:[0,0,Math.PI/2], label:'左面 '+w+'×'+h },
    { pos:[halfL,0,0], rot:[0,0,-Math.PI/2], label:'右面 '+w+'×'+h },
  ];
  var faceColors = [0xa78bfa,0xa78bfa,0x8B5CF6,0x8B5CF6,0x7c3aed,0x7c3aed];
  faceData.forEach(function(f, i) {
    var sizeA = (i<2)?l:(i<4)?l:w;
    var sizeB = (i<2)?w:(i<4)?h:h;
    var fg = new THREE.PlaneGeometry(sizeA*0.9, sizeB*0.9);
    var fm = new THREE.MeshBasicMaterial({ color: faceColors[i], transparent:true, opacity:0.5, side:THREE.DoubleSide });
    var fp = new THREE.Mesh(fg, fm);
    fp.position.set(f.pos[0], f.pos[1], f.pos[2]);
    fp.rotation.set(f.rot[0], f.rot[1], f.rot[2]);
    _faceGroup.add(fp);

    var lb = Edu3D.textSprite(f.label, { color:'#5b21b6', scale:0.5 });
    lb.position.set(f.pos[0]*1.3, f.pos[1]*1.3, f.pos[2]*1.3);
    _faceGroup.add(lb);
  });
  _faceGroup.visible = _highlight === 'face';
  _scene.add(_faceGroup);

  // 单位立方体填充
  _fillGroup = new THREE.Group();
  var unitGeo = new THREE.BoxGeometry(0.9, 0.9, 0.9);
  var colors = [0xc4b5fd, 0xa78bfa, 0x8B5CF6, 0x7c3aed, 0x6d28d9];
  for (var x = 0; x < l; x++) {
    for (var y = 0; y < h; y++) {
      for (var z = 0; z < w; z++) {
        var layerColor = colors[y % colors.length];
        var unitMat = new THREE.MeshLambertMaterial({ color: layerColor, transparent:true, opacity:0.6 });
        var unitMesh = new THREE.Mesh(unitGeo, unitMat);
        unitMesh.position.set(x - halfL + 0.5, y - halfH + 0.5, z - halfW + 0.5);
        _fillGroup.add(unitMesh);
      }
    }
  }
  _fillGroup.visible = _highlight === 'fill';
  _scene.add(_fillGroup);

  // 正方体检测
  var isCube = (l === w && w === h);
  if (isCube) {
    var cubeLabel = Edu3D.textSprite('正方体 (特殊长方体)', { color: '#6D28D9', scale: 0.5 });
    cubeLabel.position.set(0, h / 2 + 1.2, 0);
    _faceGroup.add(cubeLabel);
    _faceGroup.children[_faceGroup.children.length - 1].visible = true;
  }
}

function updateInfo(l, w, h) {
  var lw = l * w, lh = l * h, wh = w * h;
  var sa = 2 * (lw + lh + wh);
  var vol = l * w * h;
  var isCube = (l === w && w === h);

  document.getElementById('calc-result').innerHTML =
    '<div>长=' + l + '，宽=' + w + '，高=' + h + (isCube ? ' (正方体)' : '') + '</div>' +
    '<div>表面积 = 2(' + lw + '+' + lh + '+' + wh + ')</div>' +
    '<div class="result-big">' + sa + '</div>' +
    '<div>体积 = ' + l + '×' + w + '×' + h + '</div>' +
    '<div class="result-big">' + vol + '</div>';

  document.getElementById('fill-info').innerHTML =
    '需要 <strong>' + vol + '</strong> 个单位立方体<br/>' +
    '每层 ' + l + '×' + w + ' = <strong>' + (l * w) + '</strong> 个<br/>' +
    '共 ' + h + ' 层';
}

function setHighlight(mode) {
  _highlight = _highlight === mode ? 'solid' : mode;
  ['solid', 'face', 'fill'].forEach(function(k) {
    document.getElementById('hb-' + k).classList.toggle('active', _highlight === k);
  });
  if (_cuboid) _cuboid.visible = _highlight === 'solid';
  if (_edges) _edges.visible = _highlight !== 'face';
  if (_faceGroup) _faceGroup.visible = _highlight === 'face';
  if (_fillGroup) _fillGroup.visible = _highlight === 'fill';
}

function loadPreset(l, w, h) {
  document.getElementById('sl').value = l;
  document.getElementById('sw').value = w;
  document.getElementById('sh').value = h;
  rebuild();
}

function resetAll() {
  document.getElementById('sl').value = 4;
  document.getElementById('sw').value = 3;
  document.getElementById('sh').value = 2;
  _highlight = 'solid';
  ['solid', 'face', 'fill'].forEach(function(k) {
    document.getElementById('hb-' + k).classList.toggle('active', k === 'solid');
  });
  rebuild();
}

init();
</script>
</body>
</html>
