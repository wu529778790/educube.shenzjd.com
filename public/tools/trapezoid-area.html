<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>梯形面积 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 280px; height: 100%; }
    .canvas-area { padding: 16px; overflow: hidden; background: linear-gradient(135deg, #fefce8 0%, #fdfaf4 100%); position: relative; display: flex; flex-direction: column; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 12px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #fde68a; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .slider-row { display: flex; align-items: center; gap: 10px; }
    .slider-row input { flex: 1; }
    .slider-row .value-display { min-width: 40px; font-weight: 700; }
    canvas { border-radius: 12px; background: #fff; flex: 1; min-height: 0; }
    .formula-bar { background: #fff; border: 2px solid #eab308; border-radius: 14px; padding: 12px 16px; margin-top: 10px; text-align: center; flex-shrink: 0; }
    .formula-big { font-size: 20px; font-weight: 800; color: #eab308; font-family: 'Courier New', monospace; }
    .preset-btn { padding: 7px 0; border-radius: 8px; font-size: 12px; font-weight: 600; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; }
    .preset-btn:hover { border-color: #eab308; color: #eab308; }
    .preset-btn.active { border-color: #eab308; background: #fef9c3; color: #b45309; }
    .step-row { display: flex; align-items: baseline; gap: 6px; padding: 3px 0; opacity: 0.4; transition: opacity .4s; font-size: 13px; line-height: 1.7; }
    .step-row.lit { opacity: 1; }
    .step-num { font-weight: 800; color: #eab308; min-width: 20px; }
    .step-hl { font-weight: 700; color: #eab308; }
    .step-red { font-weight: 700; color: #ef4444; }
    .step-blue { font-weight: 700; color: #3b82f6; }
    .toolbar-btn { min-width: 0; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">⏢ 梯形面积</div>
      <div class="edu-toolbar-subtitle">上册 · 第六单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-accent toolbar-btn" onclick="startProof()">旋转证明</button>
      <button class="edu-btn edu-btn-outline toolbar-btn" onclick="startSteps()">逐步推导</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline toolbar-btn" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="cvs" style="width:100%;cursor:default"></canvas>
        <div class="formula-bar" id="formulaBar"></div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">梯形类型</div>
          <div style="display:flex;gap:6px">
            <button class="preset-btn" id="btn-general" onclick="morphTo('general')">一般</button>
            <button class="preset-btn active" id="btn-isosceles" onclick="morphTo('isosceles')">等腰</button>
            <button class="preset-btn" id="btn-right" onclick="morphTo('right')">直角</button>
          </div>
        </div>
        <div class="ctrl-section">
          <div class="ctrl-label">上底 a</div>
          <div class="slider-row"><input type="range" id="topSlider" min="2" max="10" value="4" step="0.5" oninput="onSlider()"/><span class="value-display" id="topVal">4</span></div>
        </div>
        <div class="ctrl-section">
          <div class="ctrl-label">下底 b</div>
          <div class="slider-row"><input type="range" id="botSlider" min="3" max="12" value="8" step="0.5" oninput="onSlider()"/><span class="value-display" id="botVal">8</span></div>
        </div>
        <div class="ctrl-section">
          <div class="ctrl-label">高 h</div>
          <div class="slider-row"><input type="range" id="hSlider" min="2" max="10" value="5" step="0.5" oninput="onSlider()"/><span class="value-display" id="hVal">5</span></div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">测量值</div>
          <div id="measures" style="font-size:13px;line-height:2;color:#334155"></div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">公式推导</div>
          <div id="stepBox"></div>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <b>梯形面积公式</b><br/>
          ● 拖拽顶点可自由变形<br/>
          ● 点击"旋转证明"看动画<br/>
          ● 两梯形拼成平行四边形<br/>
          ● S = (a + b) x h / 2
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../edu-lib/edu-tools.js"></script>
<script>
/* ── state ── */
const cvs = document.getElementById('cvs');
const GRID = 30, HALF = GRID / 2;
let W, H, dpr;

// 4 draggable vertices in grid-snapped coords [topLeft, topRight, botRight, botLeft]
// Stored as grid units (not pixels). Conversion: px = origin + grid * unit
let verts = []; // {x, y} in grid coords
let originX, originY; // pixel offset for the grid origin
let cols, rows;

// Interaction
let dragIdx = -1, hoverIdx = -1;
let proofProg = -1, proofAnim = null;
let stepLit = 0, stepAnim = null;

/* ── init ── */
function initCanvas() {
  const info = setupCanvas(cvs);
  dpr = window.devicePixelRatio || 1;
  W = info.w; H = info.h;

  // Fit a grid that gives plenty of room
  cols = Math.floor(W / GRID) - 2;
  rows = Math.floor(H / GRID) - 2;
  originX = (W - cols * GRID) / 2;
  originY = (H - rows * GRID) / 2;

  if (verts.length === 0) setVertsFromSliders();
  render();
}

function g2p(gx, gy) { return { x: originX + gx * GRID, y: originY + gy * GRID }; }
function p2g(px, py) { return { x: (px - originX) / GRID, y: (py - originY) / GRID }; }

/* ── build vertices from sliders (symmetric trapezoid) ── */
function setVertsFromSliders() {
  const a = parseFloat(document.getElementById('topSlider').value);
  const b = parseFloat(document.getElementById('botSlider').value);
  const h = parseFloat(document.getElementById('hSlider').value);
  const cx = cols / 2, cy = rows / 2;
  verts = [
    { x: cx - a / 2, y: cy - h / 2 }, // TL
    { x: cx + a / 2, y: cy - h / 2 }, // TR
    { x: cx + b / 2, y: cy + h / 2 }, // BR
    { x: cx - b / 2, y: cy + h / 2 }, // BL
  ];
}

/* ── render ── */
function render() {
  const ctx = cvs.getContext('2d');
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);

  drawGrid(ctx, W, H, GRID, '#f1f5f9');

  const pv = verts.map(v => g2p(v.x, v.y));

  if (proofProg >= 0) {
    drawProof(ctx, pv, proofProg);
  } else {
    drawTrapezoid(ctx, pv);
    drawHeight(ctx, pv);
    drawLabels(ctx, pv);
  }

  drawVertices(ctx, pv);
  ctx.restore();
  updateInfo();
  updateFormula();
  renderSteps();
}

/* ── draw trapezoid ── */
function drawTrapezoid(ctx, pv, color, strokeColor, alpha) {
  color = color || '#fef9c3';
  strokeColor = strokeColor || '#eab308';
  alpha = alpha != null ? alpha : 1;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.moveTo(pv[0].x, pv[0].y);
  ctx.lineTo(pv[1].x, pv[1].y);
  ctx.lineTo(pv[2].x, pv[2].y);
  ctx.lineTo(pv[3].x, pv[3].y);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = 2.5;
  ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.restore();
}

/* ── height line with perpendicular marker ── */
function drawHeight(ctx, pv) {
  // Find the two parallel-ish sides: top (TL-TR) and bottom (BL-BR)
  // Height: vertical distance from top edge down to bottom edge at midX of left side
  // Draw from top-left vertex straight down
  const tl = pv[0], bl = pv[3];
  const dx = bl.x - tl.x, dy = bl.y - tl.y;
  const len = Math.hypot(dx, dy);

  // Use vertical height line from TL downward to the level of BL
  const footX = tl.x;
  const footY = bl.y;

  // Dashed height line
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(tl.x, tl.y);
  ctx.lineTo(footX, footY);
  ctx.strokeStyle = '#ef4444';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([5, 4]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Perpendicular marker (small square at foot)
  const sz = 8;
  ctx.beginPath();
  ctx.moveTo(footX + sz, footY);
  ctx.lineTo(footX + sz, footY - sz);
  ctx.lineTo(footX, footY - sz);
  ctx.strokeStyle = '#ef4444';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Height label
  const midY = (tl.y + footY) / 2;
  ctx.fillStyle = '#ef4444';
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'right';
  const h = measureHeight();
  ctx.fillText('h = ' + h.toFixed(1), tl.x - 8, midY + 4);
  ctx.restore();
}

/* ── side labels ── */
function drawLabels(ctx, pv) {
  ctx.save();
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'center';

  // Top side (a)
  const a = measureTop();
  const topMid = { x: (pv[0].x + pv[1].x) / 2, y: pv[0].y - 14 };
  ctx.fillStyle = '#eab308';
  ctx.fillText('a = ' + a.toFixed(1), topMid.x, topMid.y);

  // Bottom side (b)
  const b = measureBottom();
  const botMid = { x: (pv[3].x + pv[2].x) / 2, y: pv[3].y + 22 };
  ctx.fillText('b = ' + b.toFixed(1), botMid.x, botMid.y);

  // Left leg
  const ll = Math.hypot(verts[0].x - verts[3].x, verts[0].y - verts[3].y);
  const leftMid = { x: (pv[0].x + pv[3].x) / 2 - 16, y: (pv[0].y + pv[3].y) / 2 };
  ctx.fillStyle = '#64748b';
  ctx.font = '11px sans-serif';
  ctx.fillText(ll.toFixed(1), leftMid.x, leftMid.y);

  // Right leg
  const rl = Math.hypot(verts[1].x - verts[2].x, verts[1].y - verts[2].y);
  const rightMid = { x: (pv[1].x + pv[2].x) / 2 + 16, y: (pv[1].y + pv[2].y) / 2 };
  ctx.fillText(rl.toFixed(1), rightMid.x, rightMid.y);
  ctx.restore();
}

/* ── vertex handles ── */
function drawVertices(ctx, pv) {
  pv.forEach((p, i) => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, hoverIdx === i ? 9 : 7, 0, Math.PI * 2);
    ctx.fillStyle = hoverIdx === i ? '#f97316' : '#1a3a5c';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Tiny label
    const labels = ['A', 'B', 'C', 'D'];
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(labels[i], p.x, p.y + 3);
  });
}

/* ── measurements ── */
function measureTop() { return Math.abs(verts[1].x - verts[0].x); }
function measureBottom() { return Math.abs(verts[2].x - verts[3].x); }
function measureHeight() { return Math.abs(verts[3].y - verts[0].y); }
function measureArea() {
  const a = measureTop(), b = measureBottom(), h = measureHeight();
  return (a + b) * h / 2;
}

/* ── info panel ── */
function updateInfo() {
  const a = measureTop(), b = measureBottom(), h = measureHeight();
  const area = measureArea();
  document.getElementById('measures').innerHTML =
    `<div>上底 a = <b style="color:#eab308">${a.toFixed(1)}</b></div>` +
    `<div>下底 b = <b style="color:#eab308">${b.toFixed(1)}</b></div>` +
    `<div>高&nbsp;&nbsp; h = <b style="color:#ef4444">${h.toFixed(1)}</b></div>` +
    `<div>面积 S = <b style="color:#1a3a5c">${area.toFixed(1)}</b></div>`;
}

function updateFormula() {
  const a = measureTop(), b = measureBottom(), h = measureHeight();
  const area = measureArea();
  document.getElementById('formulaBar').innerHTML =
    `<div style="font-size:12px;color:#64748b">梯形面积</div>` +
    `<div class="formula-big">S = (${a.toFixed(1)} + ${b.toFixed(1)}) x ${h.toFixed(1)} / 2 = ${area.toFixed(1)}</div>`;
}

/* ── step-by-step formula ── */
function renderSteps() {
  const a = measureTop(), b = measureBottom(), h = measureHeight();
  const ab = a + b;
  const paraArea = ab * h;
  const trapArea = paraArea / 2;
  const box = document.getElementById('stepBox');
  const steps = [
    `取两个<b>完全相同</b>的梯形`,
    `把其中一个<b class="step-blue">旋转 180°</b>`,
    `拼成平行四边形：底 = ${a.toFixed(1)} + ${b.toFixed(1)} = <b class="step-hl">${ab.toFixed(1)}</b>，高 = ${h.toFixed(1)}`,
    `平行四边形面积 = <b class="step-hl">${ab.toFixed(1)}</b> x ${h.toFixed(1)} = <b class="step-blue">${paraArea.toFixed(1)}</b>`,
    `<b class="step-red">梯形面积 = ${paraArea.toFixed(1)} / 2 = ${trapArea.toFixed(1)}</b>`,
  ];
  box.innerHTML = steps.map((s, i) =>
    `<div class="step-row${i < stepLit ? ' lit' : ''}"><span class="step-num">${i + 1}</span><span>${s}</span></div>`
  ).join('');
}

/* ── rotation proof animation ── */
function drawProof(ctx, pv, prog) {
  // Draw original trapezoid
  drawTrapezoid(ctx, pv, '#fef9c3', '#eab308');

  // Compute rotated copy: rotate 180° around midpoint of bottom side (pv[3]..pv[2])
  const botMidX = (pv[3].x + pv[2].x) / 2;
  const botMidY = (pv[3].y + pv[2].y) / 2;
  const rotated = pv.map(p => ({
    x: 2 * botMidX - p.x,
    y: 2 * botMidY - p.y,
  }));

  // The rotated vertices, interpolated from original position
  const p = Math.min(prog, 1);
  const copy = pv.map((orig, i) => ({
    x: lerp(orig.x, rotated[i].x, p),
    y: lerp(orig.y, rotated[i].y, p),
  }));

  drawTrapezoid(ctx, copy, '#dbeafe', '#3b82f6', 0.3 + 0.7 * p);

  // When almost done, label
  if (p > 0.9) {
    ctx.save();
    ctx.globalAlpha = (p - 0.9) / 0.1;
    ctx.fillStyle = '#334155';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    const a = measureTop(), b = measureBottom(), h = measureHeight();
    const cx2 = (pv[2].x + rotated[3].x) / 2;
    const cy2 = Math.max(pv[2].y, rotated[3].y) + 28;
    ctx.fillText(`平行四边形 (底 = ${(a + b).toFixed(1)})`, cx2, cy2);
    ctx.restore();
  }

  // Height line for original
  drawHeight(ctx, pv);
  drawLabels(ctx, pv);
}

function startProof() {
  if (proofAnim) return;
  proofProg = 0;
  stepLit = 0;
  let t = 0;
  function step() {
    t += 0.012;
    if (t >= 1) { t = 1; proofAnim = null; stepLit = 5; }
    proofProg = t;
    stepLit = Math.min(5, Math.floor(t * 5.5) + 1);
    render();
    if (t < 1) proofAnim = requestAnimationFrame(step);
  }
  proofAnim = requestAnimationFrame(step);
}

/* ── step-by-step animation ── */
function startSteps() {
  if (stepAnim) return;
  proofProg = -1;
  stepLit = 0;
  let s = 0;
  function tick() {
    s++;
    if (s % 20 === 0) {
      stepLit++;
      render();
      if (stepLit >= 5) { stepAnim = null; return; }
    }
    stepAnim = requestAnimationFrame(tick);
  }
  stepAnim = requestAnimationFrame(tick);
}

/* ── trapezoid type morph ── */
let morphAnim = null;
function morphTo(type) {
  if (morphAnim) cancelAnimationFrame(morphAnim);

  // Update button states
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + type).classList.add('active');

  const a = parseFloat(document.getElementById('topSlider').value);
  const b = parseFloat(document.getElementById('botSlider').value);
  const h = parseFloat(document.getElementById('hSlider').value);
  const cx = cols / 2, cy = rows / 2;

  const targets = {
    general: [
      { x: cx - a / 2 + 1, y: cy - h / 2 },
      { x: cx + a / 2 - 0.5, y: cy - h / 2 },
      { x: cx + b / 2, y: cy + h / 2 },
      { x: cx - b / 2, y: cy + h / 2 },
    ],
    isosceles: [
      { x: cx - a / 2, y: cy - h / 2 },
      { x: cx + a / 2, y: cy - h / 2 },
      { x: cx + b / 2, y: cy + h / 2 },
      { x: cx - b / 2, y: cy + h / 2 },
    ],
    right: [
      { x: cx - b / 2, y: cy - h / 2 },
      { x: cx - b / 2 + a, y: cy - h / 2 },
      { x: cx + b / 2, y: cy + h / 2 },
      { x: cx - b / 2, y: cy + h / 2 },
    ],
  };
  const dst = targets[type];
  const src = verts.map(v => ({ x: v.x, y: v.y }));
  let t = 0;

  function tick() {
    t += 0.04;
    if (t >= 1) t = 1;
    const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    for (let i = 0; i < 4; i++) {
      verts[i] = { x: lerp(src[i].x, dst[i].x, ease), y: lerp(src[i].y, dst[i].y, ease) };
    }
    proofProg = -1;
    render();
    if (t < 1) morphAnim = requestAnimationFrame(tick);
    else morphAnim = null;
  }
  morphAnim = requestAnimationFrame(tick);
}

/* ── slider callback ── */
function onSlider() {
  proofProg = -1;
  setVertsFromSliders();
  stepLit = 0;
  // Highlight matching type button
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-general').classList.add('active');
  render();
}

/* ── drag interaction ── */
function getMousePos(e) {
  const rect = cvs.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: clientX - rect.left, y: clientY - rect.top };
}

function nearestVertex(mx, my) {
  let best = -1, bestD = 20; // 20px threshold
  verts.forEach((v, i) => {
    const p = g2p(v.x, v.y);
    const d = Math.hypot(p.x - mx, p.y - my);
    if (d < bestD) { bestD = d; best = i; }
  });
  return best;
}

cvs.addEventListener('mousedown', e => {
  const pos = getMousePos(e);
  dragIdx = nearestVertex(pos.x, pos.y);
  if (dragIdx >= 0) { proofProg = -1; cvs.style.cursor = 'grabbing'; }
});
cvs.addEventListener('mousemove', e => {
  const pos = getMousePos(e);
  if (dragIdx >= 0) {
    const g = p2g(pos.x, pos.y);
    // Constrain to grid area, snap to 0.5 units
    g.x = Math.round(g.x * 2) / 2;
    g.y = Math.round(g.y * 2) / 2;
    g.x = Math.max(1, Math.min(cols - 1, g.x));
    g.y = Math.max(1, Math.min(rows - 1, g.y));
    verts[dragIdx] = g;
    render();
  } else {
    const idx = nearestVertex(pos.x, pos.y);
    if (idx !== hoverIdx) { hoverIdx = idx; cvs.style.cursor = idx >= 0 ? 'grab' : 'default'; render(); }
  }
});
cvs.addEventListener('mouseup', () => { dragIdx = -1; cvs.style.cursor = hoverIdx >= 0 ? 'grab' : 'default'; });
cvs.addEventListener('mouseleave', () => { dragIdx = -1; hoverIdx = -1; cvs.style.cursor = 'default'; render(); });

// Touch support
cvs.addEventListener('touchstart', e => {
  const pos = getMousePos(e);
  dragIdx = nearestVertex(pos.x, pos.y);
  if (dragIdx >= 0) { proofProg = -1; e.preventDefault(); }
}, { passive: false });
cvs.addEventListener('touchmove', e => {
  if (dragIdx < 0) return;
  e.preventDefault();
  const pos = getMousePos(e);
  const g = p2g(pos.x, pos.y);
  g.x = Math.round(g.x * 2) / 2;
  g.y = Math.round(g.y * 2) / 2;
  g.x = Math.max(1, Math.min(cols - 1, g.x));
  g.y = Math.max(1, Math.min(rows - 1, g.y));
  verts[dragIdx] = g;
  render();
}, { passive: false });
cvs.addEventListener('touchend', () => { dragIdx = -1; });

/* ── reset ── */
function resetAll() {
  if (proofAnim) { cancelAnimationFrame(proofAnim); proofAnim = null; }
  if (stepAnim) { cancelAnimationFrame(stepAnim); stepAnim = null; }
  if (morphAnim) { cancelAnimationFrame(morphAnim); morphAnim = null; }
  proofProg = -1;
  stepLit = 0;
  document.getElementById('topSlider').value = 4;
  document.getElementById('botSlider').value = 8;
  document.getElementById('hSlider').value = 5;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-isosceles').classList.add('active');
  setVertsFromSliders();
  render();
}

window.addEventListener('resize', () => { initCanvas(); });
initCanvas();
</script>
</body>
</html>
