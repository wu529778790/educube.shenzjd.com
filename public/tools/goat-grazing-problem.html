<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>羊吃草问题 — 教立方</title>
  <!-- play-ref:jiaohukejian:153VNRQ | 自研 -->
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <script src="../edu-lib/three.min.js"></script>
  <script src="../edu-lib/OrbitControls.js"></script>
  <script src="../edu-lib/edu-3d.js"></script>
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr minmax(280px, 300px); height: 100%; }
    .canvas-area { position: relative; background: linear-gradient(160deg, #ecfccb, #d9f99d); overflow: hidden; min-height: 0; }
    .canvas-area canvas { width: 100%; height: 100%; display: block; }
    .panel { border-left: 1px solid var(--edu-border); padding: 12px; background: var(--edu-surface); overflow: auto; }
    .slider-block label { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; }
    .out { font-weight: 800; color: var(--edu-primary); margin-top: 10px; font-size: 14px; text-align: center; line-height: 1.5; }
    .orbit-hint {
      position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.88); padding: 5px 12px; border-radius: 18px;
      font-size: 11px; color: #64748b; pointer-events: none; box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .hint { font-size: 11px; color: var(--edu-text-muted); line-height: 1.5; margin-top: 8px; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div class="edu-toolbar-lead">
      <span class="edu-toolbar-title">🐑 羊吃草问题</span>
      <span class="edu-toolbar-subtitle">墙角扇形 · 绳长可调 · 3D</span>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="c3d"></canvas>
        <div class="orbit-hint">拖拽旋转 · 滚轮缩放</div>
      </div>
      <div class="panel">
        <div class="slider-block"><label><span>绳长 L</span><span id="lv">8</span></label><input type="range" id="len" min="3" max="14" value="8" /></div>
        <p class="hint">羊拴在两面直墙内侧的交点处，活动区域为第一象限内的四分之一圆（两墙夹角 90°）。绿区为草地，黄色为可吃到的范围。</p>
        <div class="out" id="out"></div>
      </div>
    </div>
  </div>
</div>
<script>
(function () {
  var canvas = document.getElementById("c3d");
  var len = document.getElementById("len");
  var out = document.getElementById("out");
  var lv = document.getElementById("lv");

  var room = 14;
  var wallH = 2.2;
  var wallT = 0.22;

  var ctx = Edu3D.createScene(canvas, {
    bg: 0xe8f5d0,
    fov: 42,
    camX: 10,
    camY: 7.5,
    camZ: 10,
    lookX: room * 0.22,
    lookY: 0.35,
    lookZ: room * 0.22,
    minDist: 3,
    maxDist: 38,
  });
  Edu3D.addLights(ctx.scene);
  Edu3D.addGrid(ctx.scene, 28, 14, 0xc4d4a8, -0.72);

  var world = new THREE.Group();
  ctx.scene.add(world);

  /** 第一象限草地（XZ 平面 x,z ≥ 0） */
  var grassGeo = new THREE.PlaneGeometry(room, room);
  var grassMat = new THREE.MeshLambertMaterial({ color: 0xbef264, side: THREE.DoubleSide });
  var grass = new THREE.Mesh(grassGeo, grassMat);
  grass.rotation.x = -Math.PI / 2;
  grass.position.set(room / 2, -0.68, room / 2);
  grass.receiveShadow = true;
  world.add(grass);

  var wallMat = Edu3D.material(0x94a3b8);
  wallMat.side = THREE.DoubleSide;
  var wall1 = new THREE.Mesh(new THREE.BoxGeometry(wallT, wallH, room + wallT), wallMat);
  wall1.position.set(-wallT / 2, wallH / 2 - 0.68, room / 2);
  wall1.castShadow = true;
  wall1.receiveShadow = true;
  world.add(wall1);

  var wall2 = new THREE.Mesh(new THREE.BoxGeometry(room + wallT, wallH, wallT), wallMat);
  wall2.position.set(room / 2, wallH / 2 - 0.68, -wallT / 2);
  wall2.castShadow = true;
  wall2.receiveShadow = true;
  world.add(wall2);

  var sectorMat = new THREE.MeshLambertMaterial({
    color: 0xfde047,
    transparent: true,
    opacity: 0.72,
    side: THREE.DoubleSide,
  });
  var sectorMesh = new THREE.Mesh(new THREE.BufferGeometry(), sectorMat);
  sectorMesh.receiveShadow = true;
  world.add(sectorMesh);

  var ropeMat = new THREE.LineBasicMaterial({ color: 0xca8a04, linewidth: 1 });
  var ropeLine = new THREE.Line(new THREE.BufferGeometry(), ropeMat);
  world.add(ropeLine);

  var goat = new THREE.Mesh(
    new THREE.SphereGeometry(0.28, 20, 16),
    Edu3D.material(0xf8fafc)
  );
  goat.position.set(0.32, -0.68 + 0.28, 0.32);
  goat.castShadow = true;
  world.add(goat);

  function buildSectorGeometry(L) {
    var segments = Math.max(16, Math.ceil(L * 6));
    var y = -0.66;
    var positions = [];
    var indices = [];
    positions.push(0, y, 0);
    var i;
    for (i = 0; i <= segments; i++) {
      var t = (i / segments) * (Math.PI / 2);
      positions.push(L * Math.sin(t), y, L * Math.cos(t));
    }
    for (i = 0; i < segments; i++) {
      indices.push(0, i + 1, i + 2);
    }
    var g = new THREE.BufferGeometry();
    g.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
    g.setIndex(indices);
    g.computeVertexNormals();
    return g;
  }

  function buildRopeGeometry(L) {
    var segments = 48;
    var y = -0.64;
    var positions = [];
    positions.push(0, y, 0);
    var i;
    for (i = 0; i <= segments; i++) {
      var t = (i / segments) * (Math.PI / 2);
      positions.push(L * Math.sin(t), y, L * Math.cos(t));
    }
    var g = new THREE.BufferGeometry();
    g.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
    return g;
  }

  function sync() {
    var L = Number(len.value);
    lv.textContent = String(L);
    sectorMesh.geometry.dispose();
    sectorMesh.geometry = buildSectorGeometry(L);
    ropeLine.geometry.dispose();
    ropeLine.geometry = buildRopeGeometry(L);
    var area = (Math.PI * L * L) / 4;
    out.innerHTML =
      "活动面积 = <strong>¼πL²</strong> ≈ " +
      area.toFixed(2) +
      "<br/><span style=\"font-size:12px;font-weight:600;color:#64748b\">（与图中扇形半径一致）</span>";
  }

  len.addEventListener("input", sync);
  sync();

  function onResize() {
    var w = canvas.clientWidth || 400;
    var h = canvas.clientHeight || 400;
    ctx.renderer.setSize(w, h, false);
    ctx.camera.aspect = w / h;
    ctx.camera.updateProjectionMatrix();
  }
  window.addEventListener("resize", onResize);
  onResize();

  Edu3D.startLoop(ctx.scene, ctx.camera, ctx.renderer, ctx.controls, null);
})();
</script>
</body>
</html>
