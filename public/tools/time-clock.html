<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>时、分、秒 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 270px; height: 100%; }
    .canvas-area { padding: 16px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; gap: 12px; background: linear-gradient(135deg, #fff7ed 0%, #fef3c7 100%); }
    .control-panel { background: #fff7ed; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 5px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: .05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #fed7aa; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    canvas { border-radius: 50%; box-shadow: 0 4px 20px rgba(249,115,22,.12); background: #fff; cursor: default; }
    .digital-display { background: #1e293b; color: #f97316; font-size: 32px; font-weight: 800; font-family: 'Courier New', monospace; padding: 10px 28px; border-radius: 12px; letter-spacing: .08em; }
    .calc-area { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .calc-input { width: 70px; padding: 6px 8px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 16px; font-weight: 700; text-align: center; font-family: 'Courier New', monospace; }
    .calc-input:focus { outline: none; border-color: #f97316; }
    .calc-result { font-size: 18px; font-weight: 700; color: #1e293b; min-height: 28px; }
    .preset-btn { padding: 8px 0; border-radius: 8px; font-size: 14px; font-weight: 700; font-family: 'Courier New', monospace; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; }
    .preset-btn:hover { border-color: #f97316; color: #f97316; }
    .slider-row { display: flex; align-items: center; gap: 8px; }
    .slider-row input[type="range"] { flex: 1; }
    .slider-val { font-size: 14px; font-weight: 700; min-width: 30px; text-align: center; color: #f97316; }
    /* tabs */
    .tab-bar { display: flex; gap: 0; }
    .tab-btn { flex: 1; padding: 7px 0; font-size: 13px; font-weight: 700; border: 1.5px solid #e2e8f0; background: #fff; cursor: pointer; transition: all .15s; color: #64748b; }
    .tab-btn:first-child { border-radius: 8px 0 0 8px; }
    .tab-btn:last-child { border-radius: 0 8px 8px 0; }
    .tab-btn.active { background: #f97316; color: #fff; border-color: #f97316; }
    .tab-panel { display: none; }
    .tab-panel.visible { display: flex; flex-direction: column; gap: 10px; }
    /* quiz */
    .quiz-question { background: #fff; border: 1.5px solid #f97316; border-radius: 10px; padding: 12px; font-size: 15px; font-weight: 700; color: #1e293b; text-align: center; line-height: 1.6; }
    .quiz-score { text-align: center; font-size: 13px; color: #64748b; }
    .quiz-score b { color: #f97316; font-size: 18px; }
    .quiz-feedback { text-align: center; font-size: 15px; font-weight: 700; min-height: 24px; }
    .quiz-correct { color: #16a34a; }
    .quiz-wrong { color: #ef4444; }
    .drag-hint { font-size: 12px; color: #94a3b8; text-align: center; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div class="edu-toolbar-title">🕐 时、分、秒</div>
    <div class="edu-toolbar-subtitle">上册 · 第一单元</div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-primary" onclick="resetAll()">重置</button>
      <button class="edu-btn edu-btn-accent" id="btnRun" onclick="toggleRun()">▶ 运行</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="clockCanvas" width="340" height="340"></canvas>
        <div class="digital-display" id="digitalTime">00:00:00</div>
        <div class="calc-area">
          <span style="font-size:13px;font-weight:600;color:#64748b">时间计算：</span>
          <input class="calc-input" id="calcBase" value="00:00" placeholder="时:分" />
          <select id="calcOp" style="padding:5px 8px;border-radius:8px;border:1.5px solid #e2e8f0;font-weight:700">
            <option value="+">＋</option><option value="-">－</option>
          </select>
          <input class="calc-input" id="calcMin" value="0" placeholder="分钟" style="width:56px" />
          <span style="font-size:13px;color:#64748b">分钟</span>
          <button class="edu-btn edu-btn-primary" onclick="calcTime()">计算</button>
        </div>
        <div class="calc-result" id="calcResult"></div>
      </div>
      <div class="control-panel">
        <div class="tab-bar">
          <button class="tab-btn active" onclick="switchTab('clock')">时钟</button>
          <button class="tab-btn" onclick="switchTab('quiz')">测验</button>
        </div>
        <!-- clock tab -->
        <div class="tab-panel visible" id="panel-clock">
          <div class="ctrl-section">
            <div class="ctrl-label">拖拽指针或滑动设置</div>
            <div class="drag-hint">点击时钟上的时针/分针并拖动</div>
            <div class="slider-row"><span style="font-size:12px;width:28px">时</span><input type="range" id="slHour" min="0" max="23" value="0" oninput="setFromSliders()" /><span class="slider-val" id="valH">0</span></div>
            <div class="slider-row"><span style="font-size:12px;width:28px">分</span><input type="range" id="slMin" min="0" max="59" value="0" oninput="setFromSliders()" /><span class="slider-val" id="valM">0</span></div>
            <div class="slider-row"><span style="font-size:12px;width:28px">秒</span><input type="range" id="slSec" min="0" max="59" value="0" oninput="setFromSliders()" /><span class="slider-val" id="valS">0</span></div>
          </div>
          <div class="divider"></div>
          <div class="ctrl-section">
            <div class="ctrl-label">预设时间</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
              <button class="preset-btn" onclick="loadTime(8,30,0)">08:30</button>
              <button class="preset-btn" onclick="loadTime(12,0,0)">12:00</button>
              <button class="preset-btn" onclick="loadTime(15,45,0)">15:45</button>
              <button class="preset-btn" onclick="loadTime(22,10,0)">22:10</button>
            </div>
          </div>
          <div class="divider"></div>
          <div class="info-box">
            <b>时间知识</b><br/>
            ● 1 时 = 60 分<br/>
            ● 1 分 = 60 秒<br/>
            ● 1 时 = 3600 秒<br/>
            ● 钟面上有12个大格，60个小格<br/>
            ● 时针走1大格=1时，分针走1小格=1分
          </div>
        </div>
        <!-- quiz tab -->
        <div class="tab-panel" id="panel-quiz">
          <div class="quiz-question" id="quizQ">点击"下一题"开始测验</div>
          <div class="quiz-feedback" id="quizFeedback"></div>
          <div class="ctrl-section">
            <div class="ctrl-label">你的答案（拖拽指针）</div>
            <div class="slider-row"><span style="font-size:12px;width:28px">时</span><input type="range" id="qSlH" min="0" max="11" value="0" oninput="setQuizFromSliders()" /><span class="slider-val" id="qValH">0</span></div>
            <div class="slider-row"><span style="font-size:12px;width:28px">分</span><input type="range" id="qSlM" min="0" max="59" value="0" oninput="setQuizFromSliders()" /><span class="slider-val" id="qValM">0</span></div>
          </div>
          <button class="edu-btn edu-btn-accent" onclick="checkQuizAnswer()" style="width:100%">确认答案</button>
          <button class="edu-btn edu-btn-primary" onclick="nextQuestion()" style="width:100%">下一题</button>
          <div class="divider"></div>
          <div class="quiz-score">得分：<b id="quizScore">0</b> / <span id="quizTotal">0</span></div>
          <button class="edu-btn edu-btn-primary" onclick="resetQuiz()" style="width:100%">重置分数</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
/* ===== State ===== */
const canvas = document.getElementById('clockCanvas');
const ctx = canvas.getContext('2d');
const W = 340, H = 340, cx = W / 2, cy = H / 2, R = 148;
let hours = 0, minutes = 0, seconds = 0;
let running = false, rafId = null, lastTickMs = 0;
let dragHand = null; // 'hour' | 'minute' | null
let elapsedArc = null; // { startH, startM, endH, endM } for visual arc
let quizMode = false, quizH = 0, quizM = 0, quizSec = 0;
let quizScore = 0, quizTotal = 0, currentQ = null;

/* ===== Drawing ===== */
function drawClock() {
  const displayH = quizMode ? quizH : hours;
  const displayM = quizMode ? quizM : minutes;
  const displayS = quizMode ? quizSec : seconds;
  ctx.clearRect(0, 0, W, H);
  // outer ring
  ctx.beginPath(); ctx.arc(cx, cy, R + 8, 0, Math.PI * 2);
  ctx.fillStyle = '#fff7ed'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx, cy, R + 4, 0, Math.PI * 2);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.lineWidth = 3; ctx.strokeStyle = '#f97316'; ctx.stroke();
  // elapsed arc highlight
  if (elapsedArc) {
    const a1 = ((elapsedArc.startH % 12 + elapsedArc.startM / 60) / 12) * Math.PI * 2 - Math.PI / 2;
    const a2 = ((elapsedArc.endH % 12 + elapsedArc.endM / 60) / 12) * Math.PI * 2 - Math.PI / 2;
    ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R - 2, a1, a2, false);
    ctx.closePath();
    ctx.fillStyle = 'rgba(249,115,22,0.12)'; ctx.fill();
    // arc edge
    ctx.beginPath(); ctx.arc(cx, cy, R * 0.45, a1, a2, false);
    ctx.strokeStyle = 'rgba(249,115,22,0.6)'; ctx.lineWidth = 3; ctx.stroke();
    // start marker
    ctx.beginPath(); ctx.arc(cx + (R - 2) * Math.cos(a1), cy + (R - 2) * Math.sin(a1), 4, 0, Math.PI * 2);
    ctx.fillStyle = '#f97316'; ctx.fill();
    // end marker
    ctx.beginPath(); ctx.arc(cx + (R - 2) * Math.cos(a2), cy + (R - 2) * Math.sin(a2), 4, 0, Math.PI * 2);
    ctx.fillStyle = '#ea580c'; ctx.fill();
    // label elapsed minutes
    let diffMin = (elapsedArc.endH * 60 + elapsedArc.endM) - (elapsedArc.startH * 60 + elapsedArc.startM);
    if (diffMin < 0) diffMin += 24 * 60;
    const midA = (a1 + a2) / 2;
    ctx.fillStyle = '#ea580c'; ctx.font = '700 13px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(diffMin + ' 分', cx + R * 0.3 * Math.cos(midA), cy + R * 0.3 * Math.sin(midA));
  }
  // ticks
  for (let i = 0; i < 60; i++) {
    const a = (i / 60) * Math.PI * 2 - Math.PI / 2;
    const isBig = i % 5 === 0;
    const r1 = R - (isBig ? 18 : 10), r2 = R - 2;
    ctx.beginPath(); ctx.moveTo(cx + r1 * Math.cos(a), cy + r1 * Math.sin(a));
    ctx.lineTo(cx + r2 * Math.cos(a), cy + r2 * Math.sin(a));
    ctx.lineWidth = isBig ? 3 : 1; ctx.strokeStyle = isBig ? '#1e293b' : '#94a3b8'; ctx.stroke();
  }
  // numbers
  ctx.fillStyle = '#1e293b'; ctx.font = '700 16px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (let i = 1; i <= 12; i++) {
    const a = (i / 12) * Math.PI * 2 - Math.PI / 2;
    ctx.fillText(i, cx + (R - 32) * Math.cos(a), cy + (R - 32) * Math.sin(a));
  }
  // hour hand
  const hAngle = ((displayH % 12 + displayM / 60) / 12) * Math.PI * 2 - Math.PI / 2;
  drawHand(hAngle, R * 0.5, 6, dragHand === 'hour' ? '#3b82f6' : '#1e293b');
  // minute hand
  const mAngle = ((displayM + displayS / 60) / 60) * Math.PI * 2 - Math.PI / 2;
  drawHand(mAngle, R * 0.7, 4, dragHand === 'minute' ? '#3b82f6' : '#f97316');
  // second hand (smooth)
  const sAngle = (displayS / 60) * Math.PI * 2 - Math.PI / 2;
  drawHand(sAngle, R * 0.78, 2, '#ef4444');
  // center cap
  ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI * 2);
  ctx.fillStyle = dragHand ? '#3b82f6' : '#f97316'; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
  // drag highlight rings on hand tips
  if (dragHand === 'hour') {
    ctx.beginPath(); ctx.arc(cx + R * 0.5 * Math.cos(hAngle), cy + R * 0.5 * Math.sin(hAngle), 10, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(59,130,246,0.2)'; ctx.fill(); ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2; ctx.stroke();
  }
  if (dragHand === 'minute') {
    ctx.beginPath(); ctx.arc(cx + R * 0.7 * Math.cos(mAngle), cy + R * 0.7 * Math.sin(mAngle), 10, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(59,130,246,0.2)'; ctx.fill(); ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2; ctx.stroke();
  }
  // digital display
  document.getElementById('digitalTime').textContent =
    pad(displayH) + ':' + pad(displayM) + ':' + pad(Math.floor(displayS));
}

function drawHand(angle, len, w, color) {
  ctx.beginPath();
  ctx.moveTo(cx - len * 0.08 * Math.cos(angle), cy - len * 0.08 * Math.sin(angle));
  ctx.lineTo(cx + len * Math.cos(angle), cy + len * Math.sin(angle));
  ctx.lineWidth = w; ctx.strokeStyle = color; ctx.lineCap = 'round'; ctx.stroke();
}

function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }

/* ===== Drag Logic ===== */
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

function distToSegment(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return Math.hypot(px - x1, py - y1);
  let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
}

function detectHand(mx, my) {
  const h = quizMode ? quizH : hours, m = quizMode ? quizM : minutes;
  const s = quizMode ? quizSec : seconds;
  const hAngle = ((h % 12 + m / 60) / 12) * Math.PI * 2 - Math.PI / 2;
  const mAngle = ((m + s / 60) / 60) * Math.PI * 2 - Math.PI / 2;
  const hx = cx + R * 0.5 * Math.cos(hAngle), hy = cy + R * 0.5 * Math.sin(hAngle);
  const mmx = cx + R * 0.7 * Math.cos(mAngle), mmy = cy + R * 0.7 * Math.sin(mAngle);
  const dH = distToSegment(mx, my, cx, cy, hx, hy);
  const dM = distToSegment(mx, my, cx, cy, mmx, mmy);
  if (dM < 18 && dM <= dH) return 'minute';
  if (dH < 18) return 'hour';
  return null;
}

function applyDrag(mx, my) {
  const angle = Math.atan2(my - cy, mx - cx) + Math.PI / 2;
  let norm = angle < 0 ? angle + Math.PI * 2 : angle;
  if (dragHand === 'minute') {
    const newM = Math.round((norm / (Math.PI * 2)) * 60) % 60;
    if (quizMode) { quizM = newM; document.getElementById('qSlM').value = newM; document.getElementById('qValM').textContent = newM; }
    else { minutes = newM; document.getElementById('slMin').value = newM; document.getElementById('valM').textContent = newM; }
  } else if (dragHand === 'hour') {
    const newHraw = Math.round((norm / (Math.PI * 2)) * 12) % 12;
    const newH = newHraw === 0 ? 12 : newHraw;
    if (quizMode) { quizH = newH; document.getElementById('qSlH').value = newH; document.getElementById('qValH').textContent = newH; }
    else { hours = newH; document.getElementById('slHour').value = newH; document.getElementById('valH').textContent = newH; }
  }
}

canvas.addEventListener('mousedown', e => {
  const { x, y } = getCanvasPos(e);
  const hand = detectHand(x, y);
  if (hand) { dragHand = hand; drawClock(); }
});
canvas.addEventListener('mousemove', e => {
  const { x, y } = getCanvasPos(e);
  if (dragHand) { applyDrag(x, y); drawClock(); }
  else { canvas.style.cursor = detectHand(x, y) ? 'grab' : 'default'; }
});
canvas.addEventListener('mouseup', () => { dragHand = null; drawClock(); });
canvas.addEventListener('mouseleave', () => { dragHand = null; drawClock(); });
// touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const { x, y } = getCanvasPos(e);
  const hand = detectHand(x, y);
  if (hand) { dragHand = hand; drawClock(); }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!dragHand) return;
  const { x, y } = getCanvasPos(e);
  applyDrag(x, y); drawClock();
}, { passive: false });
canvas.addEventListener('touchend', () => { dragHand = null; drawClock(); });

/* ===== Sliders & Presets ===== */
function setFromSliders() {
  hours = +document.getElementById('slHour').value;
  minutes = +document.getElementById('slMin').value;
  seconds = +document.getElementById('slSec').value;
  updateLabels(); drawClock();
}
function setQuizFromSliders() {
  quizH = +document.getElementById('qSlH').value;
  quizM = +document.getElementById('qSlM').value;
  document.getElementById('qValH').textContent = quizH;
  document.getElementById('qValM').textContent = quizM;
  drawClock();
}
function updateLabels() {
  document.getElementById('valH').textContent = hours;
  document.getElementById('valM').textContent = minutes;
  document.getElementById('valS').textContent = Math.floor(seconds);
}
function loadTime(h, m, s) {
  if (running) toggleRun();
  hours = h; minutes = m; seconds = s;
  document.getElementById('slHour').value = h;
  document.getElementById('slMin').value = m;
  document.getElementById('slSec').value = s;
  updateLabels(); drawClock();
}

/* ===== Smooth Run (requestAnimationFrame) ===== */
function toggleRun() {
  running = !running;
  const btn = document.getElementById('btnRun');
  if (running) {
    btn.textContent = '⏸ 暂停';
    lastTickMs = performance.now();
    tick();
  } else {
    btn.textContent = '▶ 运行';
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
  }
}

function tick() {
  if (!running) return;
  const now = performance.now();
  const dt = (now - lastTickMs) / 1000;
  lastTickMs = now;
  seconds += dt;
  if (seconds >= 60) {
    const carryM = Math.floor(seconds / 60);
    seconds = seconds % 60;
    minutes += carryM;
  }
  if (minutes >= 60) {
    const carryH = Math.floor(minutes / 60);
    minutes = minutes % 60;
    hours += carryH;
  }
  if (hours >= 24) hours = hours % 24;
  document.getElementById('slHour').value = Math.floor(hours);
  document.getElementById('slMin').value = Math.floor(minutes);
  document.getElementById('slSec').value = Math.floor(seconds);
  updateLabels();
  drawClock();
  rafId = requestAnimationFrame(tick);
}

/* ===== Time Calculation with Arc ===== */
function calcTime() {
  const base = document.getElementById('calcBase').value.split(':');
  let bh = parseInt(base[0]) || 0, bm = parseInt(base[1]) || 0;
  const op = document.getElementById('calcOp').value;
  const dm = parseInt(document.getElementById('calcMin').value) || 0;
  let totalMin = bh * 60 + bm + (op === '+' ? dm : -dm);
  if (totalMin < 0) totalMin += 24 * 60;
  totalMin = totalMin % (24 * 60);
  const rh = Math.floor(totalMin / 60), rm = totalMin % 60;
  document.getElementById('calcResult').innerHTML =
    `<span style="color:#f97316">${pad(bh)}:${pad(bm)}</span> ${op === '+' ? '＋' : '－'} ${dm}分 = <span style="color:#ea580c">${pad(rh)}:${pad(rm)}</span>`;
  // show elapsed arc
  elapsedArc = { startH: bh, startM: bm, endH: rh, endM: rm };
  // load result onto clock
  hours = rh; minutes = rm; seconds = 0;
  document.getElementById('slHour').value = rh;
  document.getElementById('slMin').value = rm;
  document.getElementById('slSec').value = 0;
  updateLabels(); drawClock();
  // auto-clear arc after 6s
  setTimeout(() => { elapsedArc = null; drawClock(); }, 6000);
}

/* ===== Tabs ===== */
function switchTab(tab) {
  quizMode = tab === 'quiz';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.textContent === (tab === 'clock' ? '时钟' : '测验')));
  document.getElementById('panel-clock').classList.toggle('visible', tab === 'clock');
  document.getElementById('panel-quiz').classList.toggle('visible', tab === 'quiz');
  drawClock();
}

/* ===== Quiz Mode ===== */
const questionTemplates = [
  q => `时钟显示的是几点？请在时钟上拨到正确时间。`,
  q => `从 ${q.startH}:${pad(q.startM)} 过 ${q.delta} 分钟是几点？`,
  q => `现在是 ${q.startH}:${pad(q.startM)}，再过 ${q.delta} 分钟是几点？`,
  q => `几点再过 ${q.delta} 分钟就是 ${q.endH}:${pad(q.endM)}？`,
];

function generateQuestion() {
  const type = Math.random();
  if (type < 0.35) {
    // "what time does the clock show?" -- set hands to answer
    const h = Math.floor(Math.random() * 12) + 1;
    const m = [0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55][Math.floor(Math.random() * 12)];
    return { text: `请在时钟上拨到 ${h}:${pad(m)}`, answerH: h, answerM: m, isSet: true };
  } else if (type < 0.7) {
    // elapsed: from A add B minutes
    const startH = Math.floor(Math.random() * 12) + 1;
    const startM = [0, 5, 10, 15, 20, 30][Math.floor(Math.random() * 6)];
    const delta = [5, 10, 15, 20, 25, 30, 45, 60, 90][Math.floor(Math.random() * 9)];
    let total = startH * 60 + startM + delta;
    total = total % (24 * 60);
    const endH = Math.floor(total / 60), endM = total % 60;
    const displayH = endH > 12 ? endH - 12 : endH;
    return {
      text: `从 ${startH}:${pad(startM)} 过 ${delta} 分钟是几点？请拨出答案。`,
      answerH: displayH === 0 ? 12 : displayH, answerM: endM, isSet: false
    };
  } else {
    // reverse: "how many minutes from A to B" -- set hands to B
    const startH = Math.floor(Math.random() * 12) + 1;
    const startM = [0, 5, 10, 15, 20, 30][Math.floor(Math.random() * 6)];
    const delta = [5, 10, 15, 20, 25, 30, 45][Math.floor(Math.random() * 7)];
    let total = startH * 60 + startM + delta;
    total = total % (24 * 60);
    const endH = Math.floor(total / 60), endM = total % 60;
    const displayH = endH > 12 ? endH - 12 : endH;
    return {
      text: `现在是 ${startH}:${pad(startM)}，再过 ${delta} 分钟是几点？请拨出答案。`,
      answerH: displayH === 0 ? 12 : displayH, answerM: endM, isSet: false
    };
  }
}

function nextQuestion() {
  currentQ = generateQuestion();
  document.getElementById('quizQ').textContent = currentQ.text;
  document.getElementById('quizFeedback').textContent = '';
  document.getElementById('quizFeedback').className = 'quiz-feedback';
  // reset quiz clock
  quizH = 0; quizM = 0; quizSec = 0;
  document.getElementById('qSlH').value = 0;
  document.getElementById('qSlM').value = 0;
  document.getElementById('qValH').textContent = 0;
  document.getElementById('qValM').textContent = 0;
  drawClock();
}

function checkQuizAnswer() {
  if (!currentQ) return;
  quizTotal++;
  const correct = quizH === currentQ.answerH && quizM === currentQ.answerM;
  const fb = document.getElementById('quizFeedback');
  if (correct) {
    quizScore++;
    fb.textContent = '✓ 回答正确！';
    fb.className = 'quiz-feedback quiz-correct';
  } else {
    fb.textContent = '✗ 正确答案是 ' + pad(currentQ.answerH) + ':' + pad(currentQ.answerM);
    fb.className = 'quiz-feedback quiz-wrong';
    // show correct position briefly
    quizH = currentQ.answerH; quizM = currentQ.answerM;
    document.getElementById('qSlH').value = quizH;
    document.getElementById('qSlM').value = quizM;
    document.getElementById('qValH').textContent = quizH;
    document.getElementById('qValM').textContent = quizM;
    drawClock();
  }
  document.getElementById('quizScore').textContent = quizScore;
  document.getElementById('quizTotal').textContent = quizTotal;
}

function resetQuiz() {
  quizScore = 0; quizTotal = 0; currentQ = null;
  document.getElementById('quizScore').textContent = 0;
  document.getElementById('quizTotal').textContent = 0;
  document.getElementById('quizQ').textContent = '点击"下一题"开始测验';
  document.getElementById('quizFeedback').textContent = '';
  quizH = 0; quizM = 0; quizSec = 0;
  drawClock();
}

/* ===== Reset ===== */
function resetAll() {
  if (running) toggleRun();
  hours = minutes = seconds = 0;
  elapsedArc = null;
  document.getElementById('slHour').value = 0;
  document.getElementById('slMin').value = 0;
  document.getElementById('slSec').value = 0;
  document.getElementById('calcResult').textContent = '';
  document.getElementById('calcBase').value = '00:00';
  document.getElementById('calcMin').value = '0';
  updateLabels(); drawClock();
}

/* ===== Init ===== */
drawClock();
</script>
