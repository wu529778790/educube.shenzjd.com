<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>简易方程 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 260px; height: 100%; }
    .canvas-area { padding: 24px; overflow-y: auto; background: linear-gradient(135deg, #eff6ff 0%, #fdfaf4 100%); display: flex; flex-direction: column; align-items: center; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 14px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #bfdbfe; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    canvas { border-radius: 12px; background: #fff; }
    .eq-display { font-size: 32px; font-weight: 800; font-family: 'Courier New', monospace; color: #334155; margin: 16px 0; text-align: center; }
    .eq-display .x-var { color: #3b82f6; }
    .step-card { background: #fff; border: 2px solid #3b82f6; border-radius: 14px; padding: 20px; width: 100%; max-width: 480px; }
    .step-line { margin: 8px 0; font-size: 16px; line-height: 1.8; font-family: 'Courier New', monospace; }
    .step-line .hl { background: #eff6ff; padding: 2px 8px; border-radius: 6px; font-weight: 700; color: #3b82f6; }
    .step-line .op { color: #ef4444; font-weight: 700; }
    .result-box { background: #f0fdf4; border: 2px solid #22c55e; border-radius: 12px; padding: 14px; text-align: center; margin-top: 12px; }
    .result-big { font-size: 28px; font-weight: 800; color: #22c55e; }
    .preset-btn { padding: 8px 0; border-radius: 8px; font-size: 13px; font-weight: 600; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; }
    .preset-btn:hover { border-color: #3b82f6; color: #3b82f6; }
    .input-group { display: flex; align-items: center; gap: 6px; margin: 6px 0; }
    .input-group input { width: 60px; text-align: center; font-size: 18px; font-weight: 700; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 4px; font-family: 'Courier New', monospace; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">⚖ 简易方程</div>
      <div class="edu-toolbar-subtitle">上册 · 第五单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-primary" onclick="solve()">求解</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <div class="eq-display" id="eqDisplay"></div>
        <canvas id="cvs" width="400" height="120"></canvas>
        <div class="step-card" id="stepCard"></div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">自定义方程 ax + b = c</div>
          <div class="input-group">
            <input type="number" id="coefA" value="2" oninput="updateDisplay()"/>
            <span style="font-weight:700">x +</span>
            <input type="number" id="coefB" value="3" oninput="updateDisplay()"/>
            <span style="font-weight:700">=</span>
            <input type="number" id="coefC" value="11" oninput="updateDisplay()"/>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">预设方程</div>
          <button class="preset-btn" onclick="loadEq(1,3,7)">x + 3 = 7</button>
          <button class="preset-btn" onclick="loadEq(2,0,10)">2x = 10</button>
          <button class="preset-btn" onclick="loadEq(3,5,20)">3x + 5 = 20</button>
          <button class="preset-btn" onclick="loadEq(4,-2,14)">4x − 2 = 14</button>
          <button class="preset-btn" onclick="loadEq(5,8,33)">5x + 8 = 33</button>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <b>解方程要点</b><br/>
          ● 等式两边同时加/减相同的数<br/>
          ● 等式两边同时乘/除相同的数<br/>
          ● 目标：让等号一边只剩 x<br/>
          ● 天平保持平衡<br/>
          ● 验算：把 x 的值代入原方程
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');

function updateDisplay() {
  const a = parseFloat(document.getElementById('coefA').value) || 0;
  const b = parseFloat(document.getElementById('coefB').value) || 0;
  const c = parseFloat(document.getElementById('coefC').value) || 0;
  const bStr = b >= 0 ? `+ ${b}` : `− ${Math.abs(b)}`;
  const aStr = a === 1 ? '' : a === -1 ? '−' : a;
  document.getElementById('eqDisplay').innerHTML = `<span class="x-var">${aStr}x</span> ${bStr} = ${c}`;
  drawBalance(a, b, c);
}

function drawBalance(a, b, c) {
  const W = cvs.width, H = cvs.height;
  ctx.clearRect(0, 0, W, H);

  // Fulcrum
  const cx = W / 2, baseY = H - 10;
  ctx.beginPath();
  ctx.moveTo(cx, baseY - 40);
  ctx.lineTo(cx - 20, baseY);
  ctx.lineTo(cx + 20, baseY);
  ctx.closePath();
  ctx.fillStyle = '#94a3b8';
  ctx.fill();

  // Beam - slight tilt based on balance
  const x = a !== 0 ? (c - b) / a : 0;
  const balanced = Math.abs(a * x + b - c) < 0.001;
  const tilt = balanced ? 0 : 4;

  const beamY = baseY - 44;
  ctx.beginPath();
  ctx.moveTo(40, beamY + tilt);
  ctx.lineTo(W - 40, beamY - tilt);
  ctx.strokeStyle = '#334155';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Left pan (ax + b)
  const lPanX = cx - 100;
  ctx.beginPath();
  ctx.moveTo(lPanX - 40, beamY + tilt - 2);
  ctx.lineTo(lPanX - 40, beamY + tilt + 15);
  ctx.moveTo(lPanX + 40, beamY + tilt - 2);
  ctx.lineTo(lPanX + 40, beamY + tilt + 15);
  ctx.moveTo(lPanX - 45, beamY + tilt + 15);
  ctx.lineTo(lPanX + 45, beamY + tilt + 15);
  ctx.strokeStyle = '#3b82f6';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#eff6ff';
  ctx.font = 'bold 14px Courier New';
  ctx.textAlign = 'center';
  const aStr = a === 1 ? '' : a + '';
  ctx.fillText(`${aStr}x ${b >= 0 ? '+' : '−'} ${Math.abs(b)}`, lPanX, beamY + tilt + 32);

  // Right pan (c)
  const rPanX = cx + 100;
  ctx.beginPath();
  ctx.moveTo(rPanX - 40, beamY - tilt - 2);
  ctx.lineTo(rPanX - 40, beamY - tilt + 15);
  ctx.moveTo(rPanX + 40, beamY - tilt - 2);
  ctx.lineTo(rPanX + 40, beamY - tilt + 15);
  ctx.moveTo(rPanX - 45, beamY - tilt + 15);
  ctx.lineTo(rPanX + 45, beamY - tilt + 15);
  ctx.strokeStyle = '#22c55e';
  ctx.stroke();
  ctx.fillStyle = '#f0fdf4';
  ctx.fillText(`${c}`, rPanX, beamY - tilt + 32);
}

function solve() {
  const a = parseFloat(document.getElementById('coefA').value) || 0;
  const b = parseFloat(document.getElementById('coefB').value) || 0;
  const c = parseFloat(document.getElementById('coefC').value) || 0;

  if (a === 0) {
    document.getElementById('stepCard').innerHTML = '<div style="color:#ef4444;font-weight:700">x 的系数不能为 0！</div>';
    return;
  }

  const x = (c - b) / a;
  const bStr = b >= 0 ? `+ ${b}` : `− ${Math.abs(b)}`;
  const aStr = a === 1 ? '' : a + '';
  const verifyResult = a * x + b;

  let steps = '';
  steps += `<div class="step-line"><span class="hl">${aStr}x ${bStr} = ${c}</span></div>`;

  if (b !== 0) {
    const bOp = b > 0 ? `两边同时减 ${b}` : `两边同时加 ${Math.abs(b)}`;
    steps += `<div class="step-line"><span class="op">${bOp}</span></div>`;
    steps += `<div class="step-line"><span class="hl">${aStr}x = ${c - b}</span></div>`;
  }

  if (a !== 1) {
    steps += `<div class="step-line"><span class="op">两边同时除以 ${a}</span></div>`;
    steps += `<div class="step-line"><span class="hl">x = ${c - b} ÷ ${a}</span></div>`;
  }

  steps += `<div class="result-box"><div style="font-size:14px;color:#64748b">x =</div><div class="result-big">${x}</div></div>`;
  steps += `<div style="margin-top:10px;font-size:14px;color:#64748b">验算：${a} × ${x} ${b >= 0 ? '+' : '−'} ${Math.abs(b)} = ${verifyResult} ✓</div>`;

  document.getElementById('stepCard').innerHTML = steps;
  drawBalance(a, b, c);
}

function loadEq(a, b, c) {
  document.getElementById('coefA').value = a;
  document.getElementById('coefB').value = b;
  document.getElementById('coefC').value = c;
  updateDisplay();
  solve();
}

function resetAll() { loadEq(2, 3, 11); }
updateDisplay();
</script>
</body>
</html>
