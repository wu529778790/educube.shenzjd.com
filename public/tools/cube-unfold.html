<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>正方体展开图 — 教立方</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<script src="../edu-lib/three.min.js"></script>
<script src="../edu-lib/OrbitControls.js"></script>
<script src="../edu-lib/edu-3d.js"></script>
<script src="../edu-lib/edu-tools.js"></script>
<style>
  .main-layout { display:grid; grid-template-columns:1fr 280px; height:100%; }
  .canvas-area { position:relative; background:linear-gradient(135deg,#f0f7ff,#fdfaf4); overflow:hidden; }
  .canvas-area canvas { width:100%; height:100%; display:block; }
  .control-panel { background:#fff; border-left:1px solid #e2e8f0; padding:14px; display:flex; flex-direction:column; gap:10px; overflow:auto; }
  .ctrl-section { display:flex; flex-direction:column; gap:6px; }
  .ctrl-label { font-size:11px; font-weight:700; color:#64748b; letter-spacing:.05em; }
  .divider { height:1px; background:#e2e8f0; }
  .info-box { background:#fff; border:1px solid #bfdbfe; border-radius:10px; padding:10px 12px; font-size:12px; line-height:1.8; color:#334155; }
  .info-box strong { color:#8b5cf6; }
  .pattern-btn {
    padding:5px 10px; border-radius:6px; font-size:11px; font-weight:600;
    cursor:pointer; border:1.5px solid #e2e8f0; background:#fff; color:#64748b;
    transition:all .15s; font-family:var(--edu-font);
  }
  .pattern-btn.active { background:#8b5cf6; color:#fff; border-color:#8b5cf6; }
  .pattern-btn:hover:not(.active) { border-color:#94a3b8; }
  .slider-row { display:flex; align-items:center; gap:8px; }
  .slider-row label { font-size:12px; font-weight:600; color:#64748b; min-width:40px; }
  .slider-row input[type=range] { flex:1; }
  .slider-row .val { font-size:13px; font-weight:700; color:#8b5cf6; min-width:36px; text-align:right; }
  .progress-bar { width:100%;height:4px;background:#e2e8f0;border-radius:2px;overflow:hidden; }
  .progress-fill { height:100%;background:linear-gradient(90deg,#3b82f6,#8b5cf6);transition:width .1s;border-radius:2px; }
  .orbit-hint {
    position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,.85); padding:6px 14px; border-radius:20px;
    font-size:11px; color:#64748b; pointer-events:none;
  }
</style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="edu-toolbar-title">📦 正方体展开图</span>
      <span class="edu-toolbar-subtitle">空间想象辅助</span>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-primary" id="btn-toggle" onclick="toggleAnimation()">▶ 展开</button>
      <button class="edu-btn edu-btn-outline" onclick="playAll()">▶ 全部动画</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="c3d"></canvas>
        <div class="orbit-hint">拖拽旋转 · 双指缩放</div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">展开方式（共 11 种）</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px" id="pattern-btns">
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">手动控制</div>
          <div class="slider-row">
            <label>展开</label>
            <input type="range" id="manual-slider" min="0" max="100" value="0" oninput="onManualSlider(this.value)"/>
            <span class="val" id="manual-val">0%</span>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">展开进度</div>
          <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
          <div style="font-size:11px;color:#64748b" id="statusText">已折叠</div>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <div style="display:flex;justify-content:space-between"><span>面数</span><strong>6</strong></div>
          <div style="display:flex;justify-content:space-between"><span>棱数</span><strong>12</strong></div>
          <div style="display:flex;justify-content:space-between"><span>顶点数</span><strong>8</strong></div>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <strong>正方体展开</strong><br/>
          ● 正方体有 <strong>11</strong> 种展开方式<br/>
          ● 分为四类：141型(6种)、231型(3种)、222型(1种)、33型(1种)<br/>
          ● 展开后 6 个面相连不断开<br/>
          ● 相对的面不相邻<br/>
          ● 拖动滑块可手动控制
        </div>
      </div>
    </div>
  </div>
</div>
<script>
var _scene, _camera, _renderer, _controls;
var _faceMeshes = [];
var _animTimer = null;
var _isUnfolded = false;
var _animT = 0;
var _currentPattern = 0;

var PATTERNS = [
  // 141型 (6种) — 一排4个面 + 2个附加面
  { name: '141-十字', faces: [
    { col:1, row:0, label:'底', color:0x4f8cff },
    { col:0, row:1, label:'前', color:0x38c6a0 },
    { col:1, row:1, label:'后', color:0xf97316 },
    { col:2, row:1, label:'左', color:0xa78bfa },
    { col:3, row:1, label:'右', color:0xfbbf24 },
    { col:1, row:2, label:'顶', color:0xf472b6 },
  ]},
  { name: '141-型2', faces: [
    { col:1, row:0, label:'底', color:0x4f8cff },
    { col:0, row:1, label:'前', color:0x38c6a0 },
    { col:1, row:1, label:'后', color:0xf97316 },
    { col:2, row:1, label:'左', color:0xa78bfa },
    { col:3, row:1, label:'右', color:0xfbbf24 },
    { col:2, row:2, label:'顶', color:0xf472b6 },
  ]},
  { name: '141-型3', faces: [
    { col:2, row:0, label:'底', color:0x4f8cff },
    { col:0, row:1, label:'前', color:0x38c6a0 },
    { col:1, row:1, label:'后', color:0xf97316 },
    { col:2, row:1, label:'左', color:0xa78bfa },
    { col:3, row:1, label:'右', color:0xfbbf24 },
    { col:1, row:2, label:'顶', color:0xf472b6 },
  ]},
  { name: '141-型4', faces: [
    { col:0, row:0, label:'底', color:0x4f8cff },
    { col:1, row:0, label:'前', color:0x38c6a0 },
    { col:0, row:1, label:'后', color:0xf97316 },
    { col:1, row:1, label:'左', color:0xa78bfa },
    { col:2, row:1, label:'右', color:0xfbbf24 },
    { col:3, row:1, label:'顶', color:0xf472b6 },
  ]},
  { name: '141-型5', faces: [
    { col:2, row:0, label:'底', color:0x4f8cff },
    { col:3, row:0, label:'前', color:0x38c6a0 },
    { col:0, row:1, label:'后', color:0xf97316 },
    { col:1, row:1, label:'左', color:0xa78bfa },
    { col:2, row:1, label:'右', color:0xfbbf24 },
    { col:3, row:1, label:'顶', color:0xf472b6 },
  ]},
  { name: '141-型6', faces: [
    { col:1, row:0, label:'底', color:0x4f8cff },
    { col:2, row:0, label:'前', color:0x38c6a0 },
    { col:0, row:1, label:'后', color:0xf97316 },
    { col:1, row:1, label:'左', color:0xa78bfa },
    { col:2, row:1, label:'右', color:0xfbbf24 },
    { col:3, row:1, label:'顶', color:0xf472b6 },
  ]},

  // 231型 (3种) — 2+3+1 分布
  { name: '231-型1', faces: [
    { col:0, row:0, label:'底', color:0x4f8cff },
    { col:1, row:0, label:'前', color:0x38c6a0 },
    { col:0, row:1, label:'后', color:0xf97316 },
    { col:1, row:1, label:'左', color:0xa78bfa },
    { col:2, row:1, label:'右', color:0xfbbf24 },
    { col:1, row:2, label:'顶', color:0xf472b6 },
  ]},
  { name: '231-型2', faces: [
    { col:1, row:0, label:'底', color:0x4f8cff },
    { col:2, row:0, label:'前', color:0x38c6a0 },
    { col:0, row:1, label:'后', color:0xf97316 },
    { col:1, row:1, label:'左', color:0xa78bfa },
    { col:2, row:1, label:'右', color:0xfbbf24 },
    { col:1, row:2, label:'顶', color:0xf472b6 },
  ]},
  { name: '231-型3', faces: [
    { col:0, row:0, label:'底', color:0x4f8cff },
    { col:1, row:0, label:'前', color:0x38c6a0 },
    { col:0, row:1, label:'后', color:0xf97316 },
    { col:1, row:1, label:'左', color:0xa78bfa },
    { col:2, row:1, label:'右', color:0xfbbf24 },
    { col:0, row:2, label:'顶', color:0xf472b6 },
  ]},

  // 222型 (1种) — 三级台阶
  { name: '222型', faces: [
    { col:0, row:0, label:'底', color:0x4f8cff },
    { col:1, row:0, label:'前', color:0x38c6a0 },
    { col:1, row:1, label:'后', color:0xf97316 },
    { col:2, row:1, label:'左', color:0xa78bfa },
    { col:2, row:2, label:'右', color:0xfbbf24 },
    { col:3, row:2, label:'顶', color:0xf472b6 },
  ]},

  // 33型 (1种) — 两行各三个
  { name: '33型', faces: [
    { col:0, row:0, label:'底', color:0x4f8cff },
    { col:1, row:0, label:'前', color:0x38c6a0 },
    { col:2, row:0, label:'后', color:0xf97316 },
    { col:1, row:1, label:'左', color:0xa78bfa },
    { col:2, row:1, label:'右', color:0xfbbf24 },
    { col:3, row:1, label:'顶', color:0xf472b6 },
  ]},
];

var FACE_SIZE = 1.5;

function init() {
  var canvas = document.getElementById('c3d');
  var r = Edu3D.createScene(canvas, { bg: 0xf0f7ff, camX: 6, camY: 6, camZ: 6 });
  _scene = r.scene; _camera = r.camera; _renderer = r.renderer; _controls = r.controls;
  Edu3D.addLights(_scene);
  Edu3D.addGrid(_scene, 12, 12);

  createFaces();
  buildPatternBtns();
  Edu3D.startLoop(_scene, _camera, _renderer, _controls);
}

function buildPatternBtns() {
  var container = document.getElementById('pattern-btns');
  container.innerHTML = '';
  PATTERNS.forEach(function(p, i) {
    var btn = document.createElement('button');
    btn.className = 'pattern-btn' + (i === _currentPattern ? ' active' : '');
    btn.id = 'pb-' + i;
    btn.textContent = p.name;
    btn.onclick = (function(idx) { return function() { setPattern(idx); }; })(i);
    container.appendChild(btn);
  });
}

function createFaces() {
  _faceMeshes.forEach(function (m) { _scene.remove(m.mesh); _scene.remove(m.label); });
  _faceMeshes = [];

  var pattern = PATTERNS[_currentPattern];
  pattern.faces.forEach(function (f, i) {
    var geo = new THREE.PlaneGeometry(FACE_SIZE, FACE_SIZE);
    var mat = new THREE.MeshLambertMaterial({ color: f.color, transparent: true, opacity: 0.85, side: THREE.DoubleSide });
    var mesh = new THREE.Mesh(geo, mat);
    _scene.add(mesh);

    var edgeGeo = new THREE.EdgesGeometry(geo);
    var edgeMat = new THREE.LineBasicMaterial({ color: 0x1a3a5c });
    var edges = new THREE.LineSegments(edgeGeo, edgeMat);
    mesh.add(edges);

    var label = Edu3D.textSprite(f.label, { color: '#fff', scale: 0.6 });
    _scene.add(label);

    _faceMeshes.push({
      mesh: mesh,
      label: label,
      unfoldedPos: getUnfoldedPos(f.col, f.row),
      data: f
    });
  });

  applyPositions(_animT);
}

function getUnfoldedPos(col, row) {
  return { x: (col - 1.5) * (FACE_SIZE + 0.1), y: (row - 1.5) * (FACE_SIZE + 0.1) * 0.6 + 2, z: 0 };
}

function getFoldedPos(index) {
  var h = FACE_SIZE / 2;
  var positions = [
    { x:0, y:0, z:-h, rx:0, ry:0, rz:0 },
    { x:0, y:-h, z:0, rx:-Math.PI/2, ry:0, rz:0 },
    { x:0, y:h, z:0, rx:Math.PI/2, ry:0, rz:0 },
    { x:-h, y:0, z:0, rx:0, ry:Math.PI/2, rz:0 },
    { x:h, y:0, z:0, rx:0, ry:-Math.PI/2, rz:0 },
    { x:0, y:0, z:h, rx:Math.PI, ry:0, rz:0 },
  ];
  return positions[index];
}

function applyPositions(t) {
  _faceMeshes.forEach(function (item, i) {
    var folded = getFoldedPos(i);
    var unfolded = item.unfoldedPos;

    var x = lerp(folded.x, unfolded.x, t);
    var y = lerp(folded.y, unfolded.y, t);
    var z = lerp(folded.z, unfolded.z, t);

    item.mesh.position.set(x, y, z);

    var rx = lerp(folded.rx || 0, 0, t);
    var ry = lerp(folded.ry || 0, 0, t);
    var rz = lerp(folded.rz || 0, 0, t);
    item.mesh.rotation.set(rx, ry, rz);

    item.label.position.set(x, y, z + 0.1);
    item.label.rotation.set(0, 0, 0);
  });

  document.getElementById('progressFill').style.width = (t * 100) + '%';
  document.getElementById('manual-slider').value = (t * 100);
  document.getElementById('manual-val').textContent = Math.round(t * 100) + '%';
  if (t < 0.05) document.getElementById('statusText').textContent = '已折叠';
  else if (t > 0.95) document.getElementById('statusText').textContent = '已展开';
  else document.getElementById('statusText').textContent = '动画中...';
}

function lerp(a, b, t) { return a + (b - a) * t; }

function onManualSlider(val) {
  if (_animTimer) { clearInterval(_animTimer); _animTimer = null; }
  var t = parseInt(val) / 100;
  _animT = t;
  _isUnfolded = t > 0.95;
  document.getElementById('btn-toggle').textContent = _isUnfolded ? '↩ 折叠' : '▶ 展开';
  applyPositions(t);
}

function toggleAnimation() {
  if (_animTimer) { clearInterval(_animTimer); _animTimer = null; }
  var btn = document.getElementById('btn-toggle');
  if (_isUnfolded) {
    btn.textContent = '⏸ 动画中';
    var t = 1;
    _animTimer = setInterval(function () {
      t -= 0.03;
      if (t <= 0) { t = 0; _isUnfolded = false; clearInterval(_animTimer); _animTimer = null; btn.textContent = '▶ 展开'; }
      _animT = t;
      applyPositions(t);
    }, 16);
  } else {
    btn.textContent = '⏸ 动画中';
    var t2 = 0;
    _animTimer = setInterval(function () {
      t2 += 0.025;
      if (t2 >= 1) { t2 = 1; _isUnfolded = true; clearInterval(_animTimer); _animTimer = null; btn.textContent = '↩ 折叠'; }
      _animT = t2;
      applyPositions(t2);
    }, 16);
  }
}

function playAll() {
  if (_animTimer) { clearInterval(_animTimer); _animTimer = null; }
  _animT = 0;
  _isUnfolded = false;
  createFaces();

  var t = 0;
  _animTimer = setInterval(function () {
    t += 0.02;
    if (t >= 1) {
      t = 1;
      clearInterval(_animTimer);
      _animTimer = null;
      _isUnfolded = true;
      document.getElementById('btn-toggle').textContent = '↩ 折叠';
    }
    _animT = t;
    applyPositions(t);
  }, 16);
}

function setPattern(i) {
  _currentPattern = i;
  PATTERNS.forEach(function(_, j) {
    var el = document.getElementById('pb-' + j);
    if (el) el.classList.toggle('active', j === i);
  });
  _animT = 0;
  _isUnfolded = false;
  document.getElementById('btn-toggle').textContent = '▶ 展开';
  if (_animTimer) { clearInterval(_animTimer); _animTimer = null; }
  createFaces();
}

function resetAll() {
  setPattern(0);
}

init();
</script>
</body>
</html>
