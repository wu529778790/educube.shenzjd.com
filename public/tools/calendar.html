<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>年、月、日 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 260px; height: 100%; }
    .canvas-area { padding: 20px; overflow-y: auto; background: linear-gradient(135deg, #fefce8 0%, #fffbeb 100%); display: flex; flex-direction: column; align-items: center; }
    .control-panel { background: #fffbeb; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 12px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #fde68a; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .preset-btn { padding: 7px 0; border-radius: 8px; font-size: 13px; font-weight: 700; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; width: 100%; }
    .preset-btn:hover { border-color: #eab308; color: #ca8a04; }
    .cal-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .cal-header button { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid #e2e8f0; background: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .cal-header button:hover { border-color: #eab308; color: #eab308; }
    .cal-title { font-size: 20px; font-weight: 800; color: #1e293b; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; max-width: 400px; width: 100%; }
    .cal-weekday { text-align: center; font-size: 12px; font-weight: 700; color: #94a3b8; padding: 6px 0; }
    .cal-day { text-align: center; padding: 8px 0; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; background: #fff; border: 1.5px solid transparent; }
    .cal-day:hover { border-color: #eab308; }
    .cal-day.today { background: #eab308; color: #fff; font-weight: 800; }
    .cal-day.empty { background: transparent; cursor: default; }
    .cal-day.has31 { color: #16a34a; }
    .cal-day.has30 { color: #3b82f6; }
    .cal-day.has28 { color: #94a3b8; }
    .leap-result { background: #fff; border: 2px solid #eab308; border-radius: 10px; padding: 12px; text-align: center; margin-top: 12px; }
    .leap-result .year { font-size: 24px; font-weight: 800; color: #1e293b; }
    .leap-result .type { font-size: 14px; font-weight: 700; margin-top: 4px; }
    .leap-result .type.leap { color: #eab308; }
    .leap-result .type.normal { color: #64748b; }
    .leap-result .days { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    .month-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .month-badge { padding: 6px; border-radius: 8px; font-size: 11px; font-weight: 700; text-align: center; background: #fff; border: 1.5px solid #e2e8f0; }
    .month-badge.d31 { border-color: #bbf7d0; color: #16a34a; }
    .month-badge.d30 { border-color: #bfdbfe; color: #3b82f6; }
    .month-badge.d28 { border-color: #e2e8f0; color: #94a3b8; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">📅 年、月、日</div>
      <div class="edu-toolbar-subtitle">三年级下册 · 第六单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-outline" onclick="goToday()">回到今天</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <div class="cal-header">
          <button onclick="changeMonth(-1)">◀</button>
          <div class="cal-title" id="calTitle">2026年 3月</div>
          <button onclick="changeMonth(1)">▶</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="leap-result" id="leapResult"></div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">闰年查询</div>
          <div style="display:flex;gap:6px">
            <input type="number" id="yearInput" value="2024" style="width:100%;padding:7px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;font-weight:700;text-align:center" oninput="checkLeap()"/>
          </div>
          <button class="preset-btn" onclick="checkLeap()">查询闰年</button>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">月份天数</div>
          <div class="month-list" id="monthList"></div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">快速跳转</div>
          <button class="preset-btn" onclick="goYear(2024)">2024年 (闰年)</button>
          <button class="preset-btn" onclick="goYear(2025)">2025年 (平年)</button>
          <button class="preset-btn" onclick="goYear(2000)">2000年 (闰年)</button>
          <button class="preset-btn" onclick="goYear(1900)">1900年 (平年)</button>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <b>年月日知识</b><br/>
          ● 1年 = 12个月<br/>
          ● 平年 = 365天<br/>
          ● 闰年 = 366天 (2月有29天)<br/>
          ● 大月(31天): 1,3,5,7,8,10,12月<br/>
          ● 小月(30天): 4,6,9,11月<br/>
          ● 2月: 平年28天, 闰年29天<br/><br/>
          <b>闰年判断</b><br/>
          ● 能被4整除但不能被100整除 → 闰年<br/>
          ● 能被400整除 → 闰年<br/>
          ● 其余为平年
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const WEEKDAYS = ['日', '一', '二', '三', '四', '五', '六'];
let curYear, curMonth;

function isLeap(y) { return (y % 4 === 0 && y % 100 !== 0) || (y % 400 === 0); }

function daysInMonth(y, m) {
  const days = [31, isLeap(y) ? 29 : 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
  return days[m];
}

function render() {
  document.getElementById('calTitle').textContent = `${curYear}年 ${curMonth + 1}月`;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  WEEKDAYS.forEach(w => { const d = document.createElement('div'); d.className = 'cal-weekday'; d.textContent = w; grid.appendChild(d); });

  const firstDay = new Date(curYear, curMonth, 1).getDay();
  const days = daysInMonth(curYear, curMonth);
  const today = new Date();

  for (let i = 0; i < firstDay; i++) { const d = document.createElement('div'); d.className = 'cal-day empty'; grid.appendChild(d); }
  for (let i = 1; i <= days; i++) {
    const d = document.createElement('div');
    d.className = 'cal-day';
    const isToday = curYear === today.getFullYear() && curMonth === today.getMonth() && i === today.getDate();
    if (isToday) d.classList.add('today');
    d.textContent = i;
    d.onclick = () => d.classList.toggle('today');
    grid.appendChild(d);
  }
  updateMonthList();
  checkLeap();
}

function updateMonthList() {
  const list = document.getElementById('monthList');
  list.innerHTML = '';
  for (let m = 0; m < 12; m++) {
    const days = daysInMonth(curYear, m);
    let cls = 'd31';
    if (days === 30) cls = 'd30';
    if (days <= 29) cls = 'd28';
    const badge = document.createElement('div');
    badge.className = `month-badge ${cls}`;
    badge.textContent = `${m + 1}月(${days}天)`;
    badge.style.cursor = 'pointer';
    badge.onclick = () => { curMonth = m; render(); };
    if (m === curMonth) badge.style.boxShadow = '0 0 0 2px #eab308';
    list.appendChild(badge);
  }
}

function checkLeap() {
  const y = parseInt(document.getElementById('yearInput').value) || curYear;
  const leap = isLeap(y);
  const res = document.getElementById('leapResult');
  res.innerHTML = `<div class="year">${y}年</div>
    <div class="type ${leap ? 'leap' : 'normal'}">${leap ? '闰年' : '平年'}</div>
    <div class="days">${leap ? '共366天，2月有29天' : '共365天，2月有28天'}</div>
    <div style="font-size:11px;color:#94a3b8;margin-top:4px">${leap ? (y%400===0 ? y+'÷400='+y/400+' 整除 → 闰年' : y+'÷4='+y/4+' 整除且÷100='+y/100+' 不整除 → 闰年') : '不满足闰年条件 → 平年'}</div>`;
}

function changeMonth(delta) {
  curMonth += delta;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  if (curMonth < 0) { curMonth = 11; curYear--; }
  render();
}

function goToday() {
  const t = new Date(); curYear = t.getFullYear(); curMonth = t.getMonth(); render();
}

function goYear(y) {
  document.getElementById('yearInput').value = y;
  curYear = y; curMonth = 0; render();
}

const now = new Date();
curYear = now.getFullYear();
curMonth = now.getMonth();
render();
</script>
</body>
</html>
