<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分数加减法 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 270px; height: 100%; }
    .canvas-area { padding: 16px; overflow-y: auto; background: linear-gradient(135deg, #eff6ff 0%, #fdfaf4 100%); display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 12px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: .05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #bfdbfe; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .tab-bar { display: flex; background: #fff; border-radius: 10px; border: 1.5px solid #e2e8f0; overflow: hidden; }
    .tab-btn { flex: 1; padding: 8px 0; font-size: 13px; font-weight: 600; border: none; background: transparent; cursor: pointer; transition: all .15s; color: #64748b; }
    .tab-btn.active { background: #3b82f6; color: #fff; }
    .tab-btn:hover:not(.active) { background: #f1f5f9; }
    .input-row { display: flex; align-items: center; gap: 10px; justify-content: center; margin: 6px 0; }
    .frac-in { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .frac-in input { width: 50px; text-align: center; font-size: 20px; font-weight: 800; border: 2px solid #e2e8f0; border-radius: 8px; padding: 4px; font-family: 'Courier New', monospace; }
    .frac-in input:focus { border-color: #3b82f6; outline: none; }
    .frac-in .fl { width: 50px; height: 3px; background: #334155; border-radius: 2px; }
    .op-select { font-size: 20px; font-weight: 800; border: 2px solid #3b82f6; border-radius: 8px; padding: 4px 10px; background: #eff6ff; color: #3b82f6; cursor: pointer; }
    canvas { border-radius: 12px; background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    .solve-btn { padding: 10px 32px; border-radius: 10px; font-size: 15px; font-weight: 700; border: none; background: #3b82f6; color: #fff; cursor: pointer; transition: all .15s; }
    .solve-btn:hover { background: #2563eb; transform: translateY(-1px); }
    .step-card { background: #fff; border: 2px solid #3b82f6; border-radius: 14px; padding: 16px 20px; width: 100%; max-width: 520px; min-height: 40px; }
    .step-line { margin: 4px 0; font-size: 15px; line-height: 2; font-family: 'Courier New', monospace; opacity: 0; transform: translateX(-12px); transition: all .4s ease; }
    .step-line.show { opacity: 1; transform: translateX(0); }
    .step-line .hl { color: #3b82f6; font-weight: 700; }
    .step-line .op { color: #ef4444; font-weight: 700; }
    .result-box { background: #f0fdf4; border: 2px solid #22c55e; border-radius: 12px; padding: 12px; text-align: center; margin-top: 10px; opacity: 0; transition: all .5s ease; }
    .result-box.show { opacity: 1; }
    .result-big { font-size: 26px; font-weight: 800; color: #22c55e; }
    .preset-btn { padding: 8px 0; border-radius: 8px; font-size: 13px; font-weight: 600; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; }
    .preset-btn:hover { border-color: #3b82f6; color: #3b82f6; }
    .practice-area { display: none; flex-direction: column; align-items: center; gap: 12px; width: 100%; max-width: 520px; }
    .practice-area.visible { display: flex; }
    .practice-q { font-size: 28px; font-weight: 800; color: #1e293b; text-align: center; }
    .practice-input-row { display: flex; align-items: center; gap: 8px; }
    .practice-input-row input { width: 56px; text-align: center; font-size: 22px; font-weight: 800; border: 2.5px solid #e2e8f0; border-radius: 10px; padding: 6px; font-family: 'Courier New', monospace; }
    .practice-input-row input:focus { border-color: #3b82f6; outline: none; }
    .practice-input-row .fl { width: 56px; height: 3px; background: #334155; border-radius: 2px; }
    .practice-input-row .eq { font-size: 24px; font-weight: 800; color: #94a3b8; }
    .feedback-msg { font-size: 14px; font-weight: 700; padding: 6px 16px; border-radius: 8px; }
    .feedback-correct { background: #dcfce7; color: #16a34a; }
    .feedback-wrong { background: #fef2f2; color: #dc2626; }
    .score-row { display: flex; gap: 16px; font-size: 13px; font-weight: 600; color: #64748b; }
    .score-row span b { color: #1e293b; }
    .drag-zone { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; padding: 8px 0; }
    .drag-piece { display: flex; flex-direction: column; align-items: center; cursor: grab; user-select: none; transition: transform .15s, box-shadow .15s; }
    .drag-piece:active { cursor: grabbing; }
    .drag-piece:hover { transform: translateY(-3px); }
    .drag-bar { height: 32px; border-radius: 6px; display: flex; overflow: hidden; border: 2px solid #94a3b8; }
    .drag-bar .seg-filled { background: #3b82f6; min-width: 0; }
    .drag-bar .seg-empty { background: #dbeafe; min-width: 0; }
    .drag-bar.gold .seg-filled { background: #eab308; }
    .drag-bar.gold .seg-empty { background: #fef3c7; }
    .drag-label { font-size: 13px; font-weight: 700; margin-top: 4px; color: #334155; font-family: 'Courier New', monospace; }
    .merge-target { width: 100%; max-width: 520px; min-height: 70px; border: 2.5px dashed #cbd5e1; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 14px; color: #94a3b8; font-size: 14px; font-weight: 600; transition: all .3s; }
    .merge-target.hover { border-color: #3b82f6; background: #eff6ff; color: #3b82f6; }
    .merge-target.merged { border-style: solid; border-color: #22c55e; background: #f0fdf4; color: #22c55e; }
    .step-progress { display: flex; gap: 6px; justify-content: center; }
    .step-dot { width: 10px; height: 10px; border-radius: 50%; background: #e2e8f0; transition: all .3s; }
    .step-dot.done { background: #3b82f6; }
    .step-dot.current { background: #3b82f6; transform: scale(1.3); box-shadow: 0 0 0 3px rgba(59,130,246,.3); }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">+/- 分数加减法</div>
      <div class="edu-toolbar-subtitle">下册 · 第五单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('explore')">探索</button>
        <button class="tab-btn" onclick="switchTab('practice')">练习</button>
      </div>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area" id="canvasArea">
        <div id="exploreMode">
          <div class="input-row">
            <div class="frac-in"><input type="number" id="n1" value="1" min="0" oninput="liveUpdate()"/><div class="fl"></div><input type="number" id="d1" value="4" min="1" oninput="liveUpdate()"/></div>
            <select class="op-select" id="op" onchange="liveUpdate()"><option value="+">+</option><option value="-">−</option></select>
            <div class="frac-in"><input type="number" id="n2" value="1" min="0" oninput="liveUpdate()"/><div class="fl"></div><input type="number" id="d2" value="3" min="1" oninput="liveUpdate()"/></div>
            <span style="font-size:24px;font-weight:800;color:#94a3b8">=</span>
            <span style="font-size:24px;font-weight:800;color:#22c55e" id="quickRes">?</span>
          </div>
          <div class="drag-zone" id="dragZone"></div>
          <div class="merge-target" id="mergeTarget">
            <span id="mergeHint">将两个分数拖到这里合并</span>
            <span id="mergeResult" style="display:none"></span>
          </div>
          <div class="step-progress" id="stepProgress"></div>
          <button class="solve-btn" onclick="animateSolve()">逐步求解</button>
          <canvas id="cvs" width="520" height="160"></canvas>
          <div class="step-card" id="stepCard">
            <div style="color:#94a3b8;font-size:13px;text-align:center;padding:4px 0">点击「逐步求解」查看计算过程</div>
          </div>
        </div>
        <div class="practice-area" id="practiceMode">
          <div class="score-row"><span>得分: <b id="pScore">0</b></span><span>题目: <b id="pTotal">0</b></span><span>连对: <b id="pStreak">0</b></span></div>
          <div class="practice-q" id="pQuestion">?</div>
          <canvas id="pCvs" width="520" height="100"></canvas>
          <div class="step-progress" id="pStepProgress"></div>
          <div id="pStepArea"></div>
          <div class="practice-input-row" id="pInputArea">
            <span class="eq">=</span>
            <div class="frac-in"><input type="number" id="pN" placeholder="分子"/><div class="fl"></div><input type="number" id="pD" placeholder="分母"/></div>
            <button class="edu-btn edu-btn-primary" onclick="checkAnswer()">确认</button>
            <button class="edu-btn edu-btn-outline" onclick="pHint()">提示</button>
            <button class="edu-btn edu-btn-accent" onclick="nextProblem()">下一题</button>
          </div>
          <div id="pFeedback"></div>
        </div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">预设例题</div>
          <button class="preset-btn" onclick="load(1,4,1,3,'+')">1/4 + 1/3</button>
          <button class="preset-btn" onclick="load(3,8,1,4,'+')">3/8 + 1/4</button>
          <button class="preset-btn" onclick="load(5,6,1,4,'-')">5/6 - 1/4</button>
          <button class="preset-btn" onclick="load(7,10,2,5,'+')">7/10 + 2/5</button>
          <button class="preset-btn" onclick="load(2,3,1,6,'-')">2/3 - 1/6</button>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">练习难度</div>
          <div class="edu-tag-group">
            <button class="edu-tag" style="background:#dbeafe;color:#1e40af;border-color:#3b82f6" id="diffEasy" onclick="setDiff('easy')">简单</button>
            <button class="edu-tag" style="background:#f1f5f9;color:#64748b" id="diffMed" onclick="setDiff('medium')">中等</button>
            <button class="edu-tag" style="background:#f1f5f9;color:#64748b" id="diffHard" onclick="setDiff('hard')">挑战</button>
          </div>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <b>分数加减法</b><br/>
          1. 同分母：分母不变，分子相加减<br/>
          2. 异分母：先通分，再加减<br/>
          3. 结果要化成最简分数<br/>
          4. 是假分数时化成带分数
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const gcd = (a, b) => { a = Math.abs(a); b = Math.abs(b); while (b) { [a, b] = [b, a % b]; } return a; };
const lcm = (a, b) => a * b / gcd(a, b);
function simplify(n, d) { const g = gcd(Math.abs(n), Math.abs(d)); return [n / g, d / g]; }
function fracStr(n, d) { return d === 1 ? `${n}` : `${n}/${d}`; }
function mixedStr(n, d) {
  if (Math.abs(n) < d || d === 0) return fracStr(n, d);
  const w = Math.floor(Math.abs(n) / d), r = Math.abs(n) % d, s = n < 0 ? '-' : '';
  return r === 0 ? `${s}${w}` : `${s}${w}又${r}/${d}`;
}
let animFrame = null, animStep = -1, animTimer = null;
let pState = { score: 0, total: 0, streak: 0, diff: 'easy', ans: [0, 1], steps: [], stepIdx: 0, hintUsed: false };
let dragState = { dragged: null, dropped: 0 };
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('exploreMode').style.display = tab === 'explore' ? '' : 'none';
  document.getElementById('practiceMode').classList.toggle('visible', tab === 'practice');
  if (tab === 'practice' && pState.total === 0) nextProblem();
}
function readInputs() {
  const n1 = parseInt(document.getElementById('n1').value) || 0;
  const d1 = Math.max(1, parseInt(document.getElementById('d1').value) || 1);
  const n2 = parseInt(document.getElementById('n2').value) || 0;
  const d2 = Math.max(1, parseInt(document.getElementById('d2').value) || 1);
  const op = document.getElementById('op').value;
  return { n1, d1, n2, d2, op };
}
function compute(n1, d1, n2, d2, op) {
  const L = lcm(d1, d2), cn1 = n1 * (L / d1), cn2 = n2 * (L / d2);
  const rn = op === '+' ? cn1 + cn2 : cn1 - cn2;
  const [sn, sd] = simplify(rn, L);
  return { L, cn1, cn2, rn, sn, sd };
}
function liveUpdate() {
  const { n1, d1, n2, d2, op } = readInputs();
  const { sn, sd } = compute(n1, d1, n2, d2, op);
  document.getElementById('quickRes').textContent = fracStr(sn, sd);
  buildDragPieces(n1, d1, n2, d2);
  drawBars(n1, d1, n2, d2, sn, sd);
  resetMerge();
}
function buildDragPieces(n1, d1, n2, d2) {
  const zone = document.getElementById('dragZone');
  zone.innerHTML = '';
  zone.appendChild(makePiece(n1, d1, false));
  zone.appendChild(makePiece(n2, d2, true));
}
function makePiece(num, den, isGold) {
  const el = document.createElement('div');
  el.className = 'drag-piece';
  el.draggable = true;
  el.dataset.num = num; el.dataset.den = den;
  const bar = document.createElement('div');
  bar.className = 'drag-bar' + (isGold ? ' gold' : '');
  const segW = Math.max(8, Math.floor(120 / den));
  for (let i = 0; i < den; i++) {
    const s = document.createElement('div');
    s.className = i < num ? 'seg-filled' : 'seg-empty';
    s.style.width = segW + 'px';
    bar.appendChild(s);
  }
  const lbl = document.createElement('div');
  lbl.className = 'drag-label';
  lbl.textContent = fracStr(num, den);
  el.appendChild(bar); el.appendChild(lbl);
  el.addEventListener('dragstart', e => { dragState.dragged = el; e.dataTransfer.effectAllowed = 'move'; el.style.opacity = '0.5'; });
  el.addEventListener('dragend', () => { el.style.opacity = '1'; });
  return el;
}
function resetMerge() {
  dragState.dropped = 0; dragState.dragged = null;
  const mt = document.getElementById('mergeTarget');
  mt.className = 'merge-target';
  document.getElementById('mergeHint').style.display = '';
  document.getElementById('mergeResult').style.display = 'none';
}
(function setupDrop() {
  document.addEventListener('DOMContentLoaded', () => {
    const mt = document.getElementById('mergeTarget');
    mt.addEventListener('dragover', e => { e.preventDefault(); mt.classList.add('hover'); });
    mt.addEventListener('dragleave', () => mt.classList.remove('hover'));
    mt.addEventListener('drop', e => {
      e.preventDefault(); mt.classList.remove('hover');
      if (!dragState.dragged) return;
      dragState.dropped++;
      if (dragState.dropped >= 2) {
        const { n1, d1, n2, d2, op } = readInputs();
        const { sn, sd } = compute(n1, d1, n2, d2, op);
        mt.classList.add('merged');
        document.getElementById('mergeHint').style.display = 'none';
        const res = document.getElementById('mergeResult');
        res.style.display = ''; res.textContent = `= ${fracStr(sn, sd)}`;
      }
    });
  });
})();
function drawBars(n1, d1, n2, d2, rn, rd) {
  const ctx = document.getElementById('cvs').getContext('2d');
  ctx.clearRect(0, 0, 520, 160);
  const bw = 180, bh = 34, pad = 24, gap = 14;
  drawOneBar(ctx, pad, 12, bw, bh, n1, d1, '#3b82f6', '#dbeafe');
  drawOneBar(ctx, pad, 12 + bh + gap, bw, bh, n2, d2, '#eab308', '#fef3c7');
  drawOneBar(ctx, pad + bw + 40, 12 + (bh + gap) / 2, bw, bh, rn, rd, '#22c55e', '#dcfce7');
  ctx.fillStyle = '#94a3b8'; ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('=', pad + bw + 20, 12 + bh + gap / 2 + bh / 2 + 6);
}
function drawOneBar(ctx, x, y, w, h, num, den, fill, bg) {
  const val = Math.min(Math.abs(num) / den, 1.5);
  ctx.fillStyle = bg; roundRect(ctx, x, y, w, h, 6); ctx.fill();
  ctx.fillStyle = fill; roundRect(ctx, x, y, w * Math.min(val, 1), h, 6); ctx.fill();
  ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1.5; roundRect(ctx, x, y, w, h, 6); ctx.stroke();
  ctx.strokeStyle = 'rgba(0,0,0,.15)'; ctx.lineWidth = 1;
  for (let i = 1; i < den; i++) { const tx = x + w * i / den; ctx.beginPath(); ctx.moveTo(tx, y); ctx.lineTo(tx, y + h); ctx.stroke(); }
  ctx.fillStyle = '#334155'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(fracStr(num, den), x + w / 2, y - 3);
}
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r); ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r); ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r); ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r); ctx.closePath();
}
let splitAnim = null;
function animateCommonDenom(n1, d1, n2, d2, L, cn1, cn2, onDone) {
  const cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
  const W = cvs.width, H = cvs.height, bw = 180, bh = 34, pad = 24, gap = 14;
  let t = 0; cancelAnimationFrame(splitAnim);
  function splitBar(x, y, oN, oD, nN, nD, p, fill, bg) {
    const d = Math.max(Math.round(oD + (nD - oD) * p), 1), n = Math.round(oN + (nN - oN) * p);
    const v = Math.min(n / d, 1.5);
    ctx.fillStyle = bg; roundRect(ctx, x, y, bw, bh, 6); ctx.fill();
    ctx.fillStyle = fill; roundRect(ctx, x, y, bw * Math.min(v, 1), bh, 6); ctx.fill();
    ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1.5; roundRect(ctx, x, y, bw, bh, 6); ctx.stroke();
    ctx.strokeStyle = 'rgba(0,0,0,.15)'; ctx.lineWidth = 1;
    for (let i = 1; i < d; i++) { const tx = x + bw * i / d; ctx.beginPath(); ctx.moveTo(tx, y); ctx.lineTo(tx, y + bh); ctx.stroke(); }
    ctx.fillStyle = '#334155'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(fracStr(n, d), x + bw / 2, y - 3);
  }
  (function frame() {
    t++; const p = Math.min(t / 45, 1);
    ctx.clearRect(0, 0, W, H);
    splitBar(pad, 12, n1, d1, cn1, L, p, '#3b82f6', '#dbeafe');
    splitBar(pad, 12 + bh + gap, n2, d2, cn2, L, p, '#eab308', '#fef3c7');
    const rx = pad + bw + 40;
    ctx.fillStyle = '#94a3b8'; ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('=', pad + bw + 20, 12 + bh + gap / 2 + bh / 2 + 6);
    ctx.fillStyle = '#e2e8f0'; roundRect(ctx, rx, 12 + (bh + gap) / 2, bw, bh, 6); ctx.fill();
    ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1.5; roundRect(ctx, rx, 12 + (bh + gap) / 2, bw, bh, 6); ctx.stroke();
    ctx.fillStyle = '#94a3b8'; ctx.font = 'bold 14px sans-serif';
    ctx.fillText('...', rx + bw / 2, 12 + (bh + gap) / 2 + bh / 2 + 5);
    if (p < 1) splitAnim = requestAnimationFrame(frame); else { splitAnim = null; if (onDone) onDone(); }
  })();
}
function animateSolve() {
  clearTimeout(animTimer); animStep = -1;
  const { n1, d1, n2, d2, op } = readInputs();
  const { L, cn1, cn2, rn, sn, sd } = compute(n1, d1, n2, d2, op);
  const sameDen = d1 === d2;
  const steps = [];
  const card = document.getElementById('stepCard');
  if (!sameDen) {
    steps.push({ type: 'text', html: `<span class="op">通分：</span>公分母 = ${L}` });
    steps.push({ type: 'text', html: `${fracStr(n1,d1)} = <span class="hl">${fracStr(cn1,L)}</span>，${fracStr(n2,d2)} = <span class="hl">${fracStr(cn2,L)}</span>` });
    steps.push({ type: 'animate', fn: cb => animateCommonDenom(n1, d1, n2, d2, L, cn1, cn2, cb) });
  }
  const fn = sameDen ? n1 : cn1, sn2 = sameDen ? n2 : cn2, fd = sameDen ? d1 : L;
  steps.push({ type: 'text', html: `${fracStr(fn,fd)} ${op} ${fracStr(sn2,fd)} = <span class="hl">${fracStr(rn,fd)}</span>` });
  const [rsn, rsd] = simplify(rn, fd);
  if (gcd(Math.abs(rn), fd) > 1 && rn !== 0) {
    steps.push({ type: 'text', html: `<span class="op">约分：</span>÷${gcd(Math.abs(rn), fd)} → <span class="hl">${fracStr(rsn, rsd)}</span>` });
  }
  if (Math.abs(rsn) > rsd && rsd > 0) {
    steps.push({ type: 'text', html: `<span class="op">化带分数：</span><span class="hl">${mixedStr(rsn, rsd)}</span>` });
  }
  steps.push({ type: 'result', html: `<div class="result-big">${fracStr(rsn, rsd)}</div>${Math.abs(rsn) > rsd ? mixedStr(rsn, rsd) : ''}` });
  // Build card HTML
  let html = `<div style="font-size:15px;font-weight:700;margin-bottom:6px">计算过程</div>`;
  const stepDots = steps.length;
  let dotsHtml = '';
  for (let i = 0; i < stepDots; i++) dotsHtml += `<div class="step-dot" id="sd${i}"></div>`;
  document.getElementById('stepProgress').innerHTML = dotsHtml;
  steps.forEach((s, i) => { if (s.type === 'text') html += `<div class="step-line" id="sl${i}">${s.html}</div>`; });
  html += `<div class="result-box" id="resultBox"></div>`;
  card.innerHTML = html;
  // Animate sequentially
  let idx = 0;
  function next() {
    if (idx >= steps.length) return;
    const s = steps[idx];
    document.querySelectorAll('.step-dot').forEach((d, i) => { d.className = 'step-dot' + (i < idx ? ' done' : i === idx ? ' current' : ''); });
    if (s.type === 'text') {
      const el = document.getElementById('sl' + idx);
      if (el) el.classList.add('show');
    } else if (s.type === 'animate') {
      s.fn(() => { idx++; next(); });
      idx++; return;
    } else if (s.type === 'result') {
      const rb = document.getElementById('resultBox');
      rb.innerHTML = s.html; rb.classList.add('show');
      document.querySelectorAll('.step-dot').forEach((d, i) => { d.className = 'step-dot' + (i <= idx ? ' done' : ''); });
    }
    idx++;
    animTimer = setTimeout(next, 500);
  }
  next();
}
function setDiff(d) {
  pState.diff = d;
  ['Easy','Med','Hard'].forEach(k => {
    const btn = document.getElementById('diff' + k);
    btn.style.background = d === k.toLowerCase() ? (k==='Easy'?'#dbeafe':k==='Med'?'#fef3c7':'#fef2f2') : '#f1f5f9';
    btn.style.color = d === k.toLowerCase() ? (k==='Easy'?'#1e40af':k==='Med'?'#92400e':'#991b1b') : '#64748b';
    btn.style.borderColor = d === k.toLowerCase() ? 'transparent' : '#e2e8f0';
  });
}
function randFrac(maxD) {
  const d = 2 + Math.floor(Math.random() * (maxD - 1));
  const n = 1 + Math.floor(Math.random() * (d - 1));
  return [n, d];
}
function nextProblem() {
  const maxD = pState.diff === 'easy' ? 6 : pState.diff === 'medium' ? 10 : 12;
  const [n1, d1] = randFrac(maxD);
  let [n2, d2] = randFrac(maxD);
  while (pState.diff !== 'hard' && n1/d1 < n2/d2) { [n2, d2] = randFrac(maxD); }
  const op = (pState.diff === 'easy' || n1/d1 >= n2/d2) ? '+' : (Math.random() > .5 ? '+' : '-');
  pState.ans = compute(n1, d1, n2, d2, op);
  pState.hintUsed = false; pState.stepIdx = 0;
  document.getElementById('pQuestion').textContent = `${fracStr(n1,d1)} ${op} ${fracStr(n2,d2)}`;
  document.getElementById('pN').value = '';
  document.getElementById('pD').value = '';
  document.getElementById('pFeedback').innerHTML = '';
  document.getElementById('pStepArea').innerHTML = '';
  // draw bars
  drawPracticeBars(n1, d1, n2, d2);
  // step dots
  const { L, sn, sd } = pState.ans;
  const sameDen = d1 === d2;
  const numSteps = (sameDen ? 0 : 2) + 1 + (gcd(Math.abs(pState.ans.rn), L) > 1 ? 1 : 0);
  let dots = '';
  for (let i = 0; i < numSteps; i++) dots += `<div class="step-dot"></div>`;
  document.getElementById('pStepProgress').innerHTML = dots;
}
function checkAnswer() {
  const un = parseInt(document.getElementById('pN').value);
  const ud = parseInt(document.getElementById('pD').value);
  if (isNaN(un) || isNaN(ud) || ud === 0) { showFeedback(false, '请输入完整的分数'); return; }
  const [sun, sud] = simplify(un, ud);
  const { sn, sd } = pState.ans;
  const correct = sun === sn && sud === sd;
  if (correct) {
    if (!pState.hintUsed) pState.score++;
    pState.streak++;
    showFeedback(true, `正确! ${fracStr(sn, sd)}${Math.abs(sn) > sd ? ' = ' + mixedStr(sn, sd) : ''}`);
  } else {
    pState.streak = 0;
    showFeedback(false, `再想想...正确答案是 ${fracStr(sn, sd)}`);
  }
  pState.total++;
  updateScore();
}
function pHint() {
  pState.hintUsed = true;
  const { L, cn1, cn2, rn, sn, sd } = pState.ans;
  const sa = document.getElementById('pStepArea');
  const sameDen = pState.ans.L === 1 && false;
  let hints = [];
  hints.push(`公分母: ${L}`);
  hints.push(`${fracStr(cn1, L)} + ${fracStr(cn2, L)} = ${fracStr(rn, L)}`);
  if (gcd(Math.abs(rn), L) > 1) hints.push(`约分: ${fracStr(sn, sd)}`);
  sa.innerHTML = `<div style="background:#fefce8;border:1px solid #fde047;border-radius:10px;padding:10px 14px;font-size:13px;line-height:1.8;color:#713f12">${hints.map(h => '<div>' + h + '</div>').join('')}</div>`;
}
function showFeedback(ok, msg) {
  document.getElementById('pFeedback').innerHTML = `<div class="feedback-msg ${ok ? 'feedback-correct' : 'feedback-wrong'}">${msg}</div>`;
}
function updateScore() {
  document.getElementById('pScore').textContent = pState.score;
  document.getElementById('pTotal').textContent = pState.total;
  document.getElementById('pStreak').textContent = pState.streak;
}
function drawPracticeBars(n1, d1, n2, d2) {
  const ctx = document.getElementById('pCvs').getContext('2d');
  ctx.clearRect(0, 0, 520, 100);
  drawOneBar(ctx, 20, 10, 200, 34, n1, d1, '#3b82f6', '#dbeafe');
  drawOneBar(ctx, 20, 56, 200, 34, n2, d2, '#eab308', '#fef3c7');
}
function load(a, b, c, d, op) {
  document.getElementById('n1').value = a; document.getElementById('d1').value = b;
  document.getElementById('n2').value = c; document.getElementById('d2').value = d;
  document.getElementById('op').value = op === '-' ? '-' : '+';
  liveUpdate();
}
function resetAll() { load(1, 4, 1, 3, '+'); }
liveUpdate();
</script>
