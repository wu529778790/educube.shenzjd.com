<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>倍的认识 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 260px; height: 100%; }
    .canvas-area { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; gap: 14px; background: linear-gradient(135deg, #fefce8 0%, #fef9c3 100%); }
    .control-panel { background: #fefce8; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 5px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: .05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #fde68a; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    canvas { border-radius: 12px; background: #fff; box-shadow: 0 2px 12px rgba(234,179,8,.1); }
    .slider-row { display: flex; align-items: center; gap: 8px; }
    .slider-row input[type="range"] { flex: 1; }
    .slider-val { font-size: 14px; font-weight: 700; min-width: 28px; text-align: center; color: #eab308; }
    .question-box { background: #fff; border: 2px solid #eab308; border-radius: 12px; padding: 14px 20px; text-align: center; max-width: 400px; width: 100%; }
    .question-box .q-text { font-size: 18px; font-weight: 800; color: #1e293b; margin-bottom: 8px; }
    .question-box .q-answer { display: flex; align-items: center; justify-content: center; gap: 8px; }
    .q-input { width: 60px; padding: 6px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 18px; font-weight: 800; text-align: center; }
    .q-input:focus { outline: none; border-color: #eab308; }
    .edu-btn { white-space: nowrap; }
    .preset-btn { padding: 8px 0; border-radius: 8px; font-size: 14px; font-weight: 700; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; }
    .preset-btn:hover { border-color: #eab308; color: #eab308; }
    .feedback { font-size: 15px; font-weight: 700; min-height: 22px; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div class="edu-toolbar-title">× 倍的认识</div>
    <div class="edu-toolbar-subtitle">上册 · 第五单元</div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-primary" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="dotCanvas" width="520" height="280"></canvas>
        <div class="slider-row" style="width:100%;max-width:520px">
          <span style="font-size:12px;font-weight:700;color:#64748b">A的数量</span>
          <input type="range" id="slBase" min="1" max="10" value="3" oninput="update()" />
          <span class="slider-val" id="valBase">3</span>
        </div>
        <div class="slider-row" style="width:100%;max-width:520px">
          <span style="font-size:12px;font-weight:700;color:#64748b">B是A的</span>
          <input type="range" id="slMult" min="1" max="8" value="4" oninput="update()" />
          <span class="slider-val" id="valMult">4</span>
          <span style="font-size:12px;font-weight:700;color:#64748b">倍</span>
        </div>
        <div class="question-box" id="qBox">
          <div class="q-text" id="qText">练习题</div>
          <div class="q-answer">
            <span style="font-size:14px;font-weight:600">答案：</span>
            <input class="q-input" id="qInput" />
            <button class="edu-btn edu-btn-accent" onclick="checkAnswer()">确认</button>
          </div>
          <div class="feedback" id="qFeedback"></div>
        </div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">预设示例</div>
          <button class="preset-btn" onclick="loadEx(2,3)">A=2, 3倍</button>
          <button class="preset-btn" onclick="loadEx(4,2)">A=4, 2倍</button>
          <button class="preset-btn" onclick="loadEx(5,3)">A=5, 3倍</button>
          <button class="preset-btn" onclick="loadEx(3,5)">A=3, 5倍</button>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">随机练习</div>
          <button class="edu-btn edu-btn-accent" onclick="genQuestion()" style="width:100%">出题练习</button>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <b>倍的认识</b><br/>
          ● A的 N 倍就是 N 个 A<br/>
          ● 求"A的几倍是B"：B ÷ A = ?<br/>
          ● 求"A的N倍是多少"：A × N = ?<br/>
          ● 倍是用来比较两个数量关系的
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const canvas = document.getElementById('dotCanvas');
const ctx = canvas.getContext('2d');
let base = 3, mult = 4;
let qAnswer = 0;

function update() {
  base = +document.getElementById('slBase').value;
  mult = +document.getElementById('slMult').value;
  document.getElementById('valBase').textContent = base;
  document.getElementById('valMult').textContent = mult;
  drawDots();
}

function drawDots() {
  ctx.clearRect(0, 0, 520, 280);
  const dotR = 12, gap = 30, startX = 60;
  // Row A
  ctx.fillStyle = '#64748b'; ctx.font = '700 14px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText('A', 40, 48);
  ctx.fillStyle = '#3b82f6';
  for (let i = 0; i < base; i++) {
    const x = startX + i * gap;
    ctx.beginPath(); ctx.arc(x, 44, dotR, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = '700 12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(base, startX + (base-1)*gap/2, 48);
    ctx.fillStyle = '#3b82f6';
  }
  // A label
  ctx.fillStyle = '#1e293b'; ctx.font = '700 14px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(`= ${base} 个`, startX + base * gap + 4, 48);
  // Row B (multiple groups)
  let yPos = 100;
  ctx.fillStyle = '#64748b'; ctx.font = '700 14px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText('B', 40, yPos + 4);
  const groupW = base * gap;
  ctx.fillStyle = '#eab308';
  for (let g = 0; g < mult; g++) {
    const gx = startX + g * (groupW + 16);
    // Group background
    ctx.fillStyle = g % 2 === 0 ? 'rgba(234,179,8,0.1)' : 'rgba(234,179,8,0.18)';
    ctx.beginPath(); ctx.roundRect(gx - 6, yPos - 20, groupW + 4, 36, 8); ctx.fill();
    ctx.fillStyle = '#eab308';
    for (let i = 0; i < base; i++) {
      const x = gx + i * gap;
      ctx.beginPath(); ctx.arc(x + 8, yPos, dotR - 2, 0, Math.PI*2); ctx.fill();
    }
  }
  // B label
  ctx.fillStyle = '#1e293b'; ctx.font = '700 14px sans-serif'; ctx.textAlign = 'left';
  const bTotal = base * mult;
  ctx.fillText(`= ${mult} 个 ${base} = ${bTotal}`, startX + mult * (groupW + 16) + 4, yPos + 4);
  // Bar model
  const barY = 170, barH = 28, barMax = 440;
  const unitW = Math.min(barMax / (mult + 0.5), 80);
  // A bar
  ctx.fillStyle = '#3b82f6'; ctx.font = '700 12px sans-serif'; ctx.textAlign = 'center';
  ctx.beginPath(); ctx.roundRect(startX, barY, unitW, barH, 6); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.fillText('A=' + base, startX + unitW/2, barY + 18);
  // B bar
  ctx.fillStyle = '#eab308';
  ctx.beginPath(); ctx.roundRect(startX, barY + 42, unitW * mult, barH, 6); ctx.fill();
  ctx.fillStyle = '#1e293b'; ctx.font = '700 12px sans-serif';
  ctx.fillText(`B = ${mult}×A = ${bTotal}`, startX + unitW*mult/2, barY + 60);
  // Labels
  ctx.fillStyle = '#94a3b8'; ctx.font = '600 11px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('条形模型：', 10, barY + 14);
}

function loadEx(b, m) {
  document.getElementById('slBase').value = b;
  document.getElementById('slMult').value = m;
  update();
}

function genQuestion() {
  const type = Math.floor(Math.random() * 3);
  const a = Math.floor(Math.random() * 8) + 2;
  const n = Math.floor(Math.random() * 6) + 2;
  document.getElementById('qFeedback').textContent = '';
  document.getElementById('qInput').value = '';
  if (type === 0) {
    qAnswer = a * n;
    document.getElementById('qText').textContent = `${a} 的 ${n} 倍是多少？`;
  } else if (type === 1) {
    qAnswer = n;
    document.getElementById('qText').textContent = `${a*n} 是 ${a} 的几倍？`;
  } else {
    qAnswer = a;
    document.getElementById('qText').textContent = `${a*n} 是 ${a} 的 ${n} 倍，${a} 是多少？`;
  }
}

function checkAnswer() {
  const ans = parseInt(document.getElementById('qInput').value);
  const el = document.getElementById('qFeedback');
  if (isNaN(ans)) { el.textContent = '请输入数字'; el.style.color = '#ef4444'; return; }
  if (ans === qAnswer) { el.textContent = '正确！真棒！'; el.style.color = '#22c55e'; }
  else { el.textContent = '再想想哦~'; el.style.color = '#ef4444'; }
}

function resetAll() {
  document.getElementById('slBase').value = 3;
  document.getElementById('slMult').value = 4;
  document.getElementById('qText').textContent = '点击"出题练习"开始';
  document.getElementById('qInput').value = '';
  document.getElementById('qFeedback').textContent = '';
  update();
}

update();
</script>
</body>
</html>
