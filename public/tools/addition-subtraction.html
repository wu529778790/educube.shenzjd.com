<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>加减法乐园 — 教立方</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
*{box-sizing:border-box}body{font-family:var(--edu-font);margin:0}
.tool{width:100vw;height:100vh;display:flex;flex-direction:column;background:var(--edu-bg)}
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#fff;border-bottom:1px solid var(--edu-border)}
.toolbar h1{font-size:15px;color:var(--edu-primary);margin:0}
.toolbar span{font-size:11px;color:var(--edu-text-muted);background:#f1f5f9;padding:2px 8px;border-radius:12px}
.main{flex:1;display:grid;grid-template-columns:1fr 280px;overflow:hidden}
.canvas-wrap{position:relative;overflow:hidden;background:linear-gradient(135deg,#fef9c3,#fefce8)}
.canvas-wrap canvas{width:100%;height:100%;display:block}
.panel{background:#fff;border-left:1px solid var(--edu-border);padding:12px;display:flex;flex-direction:column;gap:8px;overflow:auto}
.section{display:flex;flex-direction:column;gap:4px}
.label{font-size:10px;font-weight:700;color:#64748b;letter-spacing:.05em}
.divider{height:1px;background:var(--edu-border)}
.btn{padding:6px 12px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--edu-font);transition:all .15s}
.btn.active{background:var(--edu-primary);color:#fff}
.btn-default{background:#f1f5f9;color:#334155}
.btn-default:hover{background:#e2e8f0}
.row{display:flex;gap:4px;flex-wrap:wrap}
.slider-row{display:flex;align-items:center;gap:6px}
.slider-row label{font-size:11px;font-weight:700;min-width:28px}
.slider-row input[type=range]{flex:1}
.slider-row .val{font-size:14px;font-weight:800;min-width:28px;text-align:right;color:#ca8a04}

.result-box{text-align:center;padding:12px;background:#fefce8;border:2px solid #fde68a;border-radius:14px}
.result-box .eq{font-size:28px;font-weight:800;color:#92400e;font-family:monospace}
.result-box .hint{font-size:11px;color:#b45309;margin-top:4px}

.quiz-card{background:#fefce8;border:2px solid #fde68a;border-radius:12px;padding:10px;text-align:center}
.quiz-q{font-size:15px;font-weight:700;color:#92400e}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.quiz-opt{padding:8px;border:2px solid #e2e8f0;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;background:#fff;font-family:var(--edu-font)}
.quiz-opt:hover{border-color:#f59e0b;background:#fffbeb}
.quiz-opt.correct{background:#dcfce7;border-color:#22c55e}
.quiz-opt.wrong{background:#fef2f2;border-color:#ef4444}
.quiz-result{font-size:12px;font-weight:700;margin-top:6px;min-height:18px}

.info{font-size:11px;line-height:1.8;color:#334155;background:#fff;border:1px solid #fde68a;border-radius:8px;padding:8px 10px}
.info b{color:#92400e}
</style>
</head>
<body>
<div class="tool">
  <div class="toolbar"><h1>🍎 加减法乐园</h1><span>一年级上册 · 数学</span></div>
  <div class="main">
    <div class="canvas-wrap"><canvas id="cv"></canvas></div>
    <div class="panel">
      <div class="result-box">
        <div class="eq" id="eq-display">3 + 2 = ?</div>
        <div class="hint" id="eq-hint">拖动滑块来出题</div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">选择运算</div>
        <div class="row">
          <button class="btn active" id="op-add" onclick="setOp('+')">加法 ＋</button>
          <button class="btn btn-default" id="op-sub" onclick="setOp('-')">减法 －</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">选择数字范围</div>
        <div class="row">
          <button class="btn active" id="rng-10" onclick="setRange(10)">10以内</button>
          <button class="btn btn-default" id="rng-20" onclick="setRange(20)">20以内</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">自己出题</div>
        <div class="slider-row"><label>a=</label><input type="range" id="sl-a" min="0" max="10" value="3" oninput="onSlider()"/><div class="val" id="va">3</div></div>
        <div class="slider-row"><label>b=</label><input type="range" id="sl-b" min="0" max="10" value="2" oninput="onSlider()"/><div class="val" id="vb">2</div></div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">算一算</div>
        <div class="quiz-card" id="quiz-card"></div>
      </div>
      <div class="divider"></div>
      <div class="info">
        <b>加减法小技巧</b><br/>
        ● 加法：把两个数合在一起数一数<br/>
        ● 减法：从大数里拿走一些，看还剩多少<br/>
        ● 可以用手指帮助计算哦！<br/>
        ● 凑十法：8+5 = 8+2+3 = 10+3 = 13
      </div>
    </div>
  </div>
</div>
<script>
var cv, ctx, _a = 3, _b = 2, _op = '+', _range = 10;
var _icons = ['🍎','🍊','🍋','🍇','🍓','🌟','⭐','🎈','🐟','🐱','🐶','🌸','🌻','🎈','🎯','🍰','🍬','🧁','🍪','🍩'];

function init() {
  cv = document.getElementById('cv');
  ctx = cv.getContext('2d');
  window.addEventListener('resize', resize);
  resize();
  updateDisplay();
  nextQuiz();
}

function resize() {
  var r = cv.parentElement.getBoundingClientRect();
  cv.width = r.width * devicePixelRatio;
  cv.height = r.height * devicePixelRatio;
  cv.style.width = r.width + 'px';
  cv.style.height = r.height + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  draw();
}

function setOp(op) {
  _op = op;
  document.getElementById('op-add').className = 'btn' + (op === '+' ? ' active' : ' btn-default');
  document.getElementById('op-sub').className = 'btn' + (op === '-' ? ' active' : ' btn-default');
  updateDisplay();
  draw();
}

function setRange(r) {
  _range = r;
  document.getElementById('rng-10').className = 'btn' + (r === 10 ? ' active' : ' btn-default');
  document.getElementById('rng-20').className = 'btn' + (r === 20 ? ' active' : ' btn-default');
  document.getElementById('sl-a').max = r;
  document.getElementById('sl-b').max = r;
  if (_a > r) { _a = r; document.getElementById('sl-a').value = r; document.getElementById('va').textContent = r; }
  if (_b > r) { _b = r; document.getElementById('sl-b').value = r; document.getElementById('vb').textContent = r; }
  updateDisplay();
  draw();
}

function onSlider() {
  _a = parseInt(document.getElementById('sl-a').value);
  _b = parseInt(document.getElementById('sl-b').value);
  document.getElementById('va').textContent = _a;
  document.getElementById('vb').textContent = _b;
  if (_op === '-' && _b > _a) _b = _a;
  updateDisplay();
  draw();
}

function getResult() { return _op === '+' ? _a + _b : _a - _b; }

function updateDisplay() {
  var r = getResult();
  document.getElementById('eq-display').textContent = _a + ' ' + _op + ' ' + _b + ' = ' + r;
  document.getElementById('eq-hint').textContent = _op === '+' ? '把 ' + _a + ' 和 ' + _b + ' 合在一起' : '从 ' + _a + ' 里面拿走 ' + _b;
}

function draw() {
  var w = cv.width / devicePixelRatio, h = cv.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);
  var result = getResult();

  // Title
  ctx.fillStyle = '#92400e';
  ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(_a + ' ' + (_op === '+' ? '＋' : '－') + ' ' + _b + ' = ' + result, w / 2, 30);

  if (_op === '+') {
    drawAddition(w, h, result);
  } else {
    drawSubtraction(w, h, result);
  }
}

function drawAddition(w, h, total) {
  var icon = _icons[Math.floor(Math.random() * _icons.length)];
  // Draw all items in a grid
  var cols = Math.min(total, 5);
  var rows = Math.ceil(total / cols);
  var size = Math.min(60, (w - 80) / cols, (h - 100) / (rows + 1));
  size = Math.max(size, 30);
  var startX = (w - cols * size) / 2;
  var startY = 55;

  for (var i = 0; i < total; i++) {
    var col = i % cols, row = Math.floor(i / cols);
    var x = startX + col * size + size / 2;
    var y = startY + row * (size + 10) + size / 2;

    var isGroupA = i < _a;
    var color = isGroupA ? '#3b82f6' : '#ef4444';

    // Draw circle with number
    ctx.fillStyle = color + '22';
    ctx.beginPath(); ctx.arc(x, y, size / 2 - 4, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = color; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x, y, size / 2 - 4, 0, Math.PI * 2); ctx.stroke();

    // Icon/emoji
    ctx.font = Math.max(16, size / 2.5) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(isGroupA ? '🍎' : '🍊', x, y + size / 8);

    // Number
    ctx.fillStyle = color;
    ctx.font = 'bold ' + Math.max(10, size / 4) + 'px sans-serif';
    ctx.fillText(i + 1, x, y - size / 3.5);
  }

  // Label groups
  if (_a > 0) {
    var ay = startY + Math.floor((_a - 1) / cols) * (size + 10) + size + 15;
    ctx.fillStyle = '#3b82f6'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('第一组：' + _a + ' 个', w / 4, ay);
  }
  if (_b > 0) {
    var by = startY + Math.floor((total - 1) / cols) * (size + 10) + size + 15;
    ctx.fillStyle = '#ef4444'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('第二组：' + _b + ' 个', w * 3 / 4, by);
  }

  // Result
  var totalY = startY + rows * (size + 10) + 40;
  ctx.fillStyle = '#16a34a'; ctx.font = 'bold 20px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('一共：' + total + ' 个', w / 2, Math.min(totalY, h - 20));
}

function drawSubtraction(w, h, result) {
  var total = _a;
  var cols = Math.min(total, 5);
  var rows = Math.ceil(total / cols);
  var size = Math.min(60, (w - 80) / cols, (h - 120) / (rows + 1));
  size = Math.max(size, 30);
  var startX = (w - cols * size) / 2;
  var startY = 55;

  for (var i = 0; i < total; i++) {
    var col = i % cols, row = Math.floor(i / cols);
    var x = startX + col * size + size / 2;
    var y = startY + row * (size + 10) + size / 2;

    var isRemoved = i >= result; // last _b items are removed
    var color = isRemoved ? '#ef4444' : '#22c55e';

    ctx.fillStyle = color + (isRemoved ? '11' : '22');
    ctx.beginPath(); ctx.arc(x, y, size / 2 - 4, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = color; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x, y, size / 2 - 4, 0, Math.PI * 2); ctx.stroke();

    ctx.font = Math.max(16, size / 2.5) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(isRemoved ? '❌' : '🍎', x, y + size / 8);

    if (isRemoved) {
      // X mark
      ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2.5;
      var s = size / 3;
      ctx.beginPath(); ctx.moveTo(x - s, y - s); ctx.lineTo(x + s, y + s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + s, y - s); ctx.lineTo(x - s, y + s); ctx.stroke();
    }
  }

  // Labels
  var totalY = startY + rows * (size + 10) + 15;
  ctx.fillStyle = '#ef4444'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('拿走 ' + _b + ' 个', w / 4, totalY);
  ctx.fillStyle = '#16a34a';
  ctx.fillText('还剩 ' + result + ' 个', w * 3 / 4, totalY);

  ctx.fillStyle = '#16a34a'; ctx.font = 'bold 20px sans-serif';
  ctx.fillText('还剩：' + result + ' 个', w / 2, Math.min(totalY + 30, h - 15));
}

// ===== Quiz =====
var _qi = 0, _score = 0, _quizQ = null;

function genQuiz() {
  var a, b, op, ans;
  if (Math.random() > 0.5) {
    op = '+';
    a = Math.floor(Math.random() * _range);
    b = Math.floor(Math.random() * (_range - a + 1));
    ans = a + b;
  } else {
    op = '-';
    a = Math.floor(Math.random() * _range) + 1;
    b = Math.floor(Math.random() * (a + 1));
    ans = a - b;
  }
  // Generate wrong options
  var opts = [ans];
  while (opts.length < 4) {
    var w = ans + Math.floor(Math.random() * 7) - 3;
    if (w >= 0 && w <= _range * 2 && opts.indexOf(w) === -1) opts.push(w);
  }
  // Shuffle
  for (var i = opts.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = opts[i]; opts[i] = opts[j]; opts[j] = t;
  }
  return { a: a, b: b, op: op, ans: ans, opts: opts };
}

function nextQuiz() {
  _quizQ = genQuiz();
  var q = _quizQ;
  var html = '<div class="quiz-q">' + q.a + ' ' + (q.op === '+' ? '＋' : '－') + ' ' + q.b + ' = ?</div>';
  html += '<div class="quiz-opts">';
  q.opts.forEach(function(o, i) { html += '<button class="quiz-opt" onclick="answer(' + o + ')">' + o + '</button>'; });
  html += '</div><div class="quiz-result" id="qr"></div>';
  document.getElementById('quiz-card').innerHTML = html;
}

function answer(val) {
  var q = _quizQ;
  var opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(function(b) {
    var v = parseInt(b.textContent);
    b.onclick = null; b.style.cursor = 'default';
    if (v === q.ans) b.classList.add('correct');
    if (v === val && v !== q.ans) b.classList.add('wrong');
  });
  var r = document.getElementById('qr');
  if (val === q.ans) { r.textContent = '✓ 太棒了！答对了！'; r.style.color = '#16a34a'; _score++; }
  else { r.textContent = '✗ 正确答案是 ' + q.ans; r.style.color = '#ef4444'; }
  _qi++;
  setTimeout(nextQuiz, 1500);
}

init();
</script>
</body>
</html>
