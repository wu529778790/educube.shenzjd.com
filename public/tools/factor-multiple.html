<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>因数与倍数 — 教立方</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
  * { box-sizing:border-box; }
  body { font-family:var(--edu-font); margin:0; }
  .tool { width:100vw; height:100vh; display:flex; flex-direction:column; background:var(--edu-bg); }
  .toolbar { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:#fff; border-bottom:1px solid var(--edu-border); }
  .toolbar h1 { font-size:15px; color:var(--edu-primary); margin:0; }
  .toolbar span { font-size:11px; color:var(--edu-text-muted); background:#f1f5f9; padding:2px 8px; border-radius:12px; }
  .main { flex:1; display:grid; grid-template-columns:1fr 300px; overflow:hidden; }
  .canvas-wrap { position:relative; overflow:hidden; background:linear-gradient(135deg,#fef3c7,#fffbeb); }
  .canvas-wrap canvas { width:100%; height:100%; display:block; }
  .panel { background:#fff; border-left:1px solid var(--edu-border); padding:12px; display:flex; flex-direction:column; gap:8px; overflow:auto; }
  .section { display:flex; flex-direction:column; gap:4px; }
  .label { font-size:10px; font-weight:700; color:#64748b; letter-spacing:.05em; }
  .divider { height:1px; background:var(--edu-border); }
  .btn { padding:6px 12px; border:none; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer; font-family:var(--edu-font); transition:all .15s; }
  .btn.active { background:var(--edu-primary); color:#fff; }
  .btn-default { background:#f1f5f9; color:#334155; }
  .btn-default:hover { background:#e2e8f0; }
  .row { display:flex; gap:4px; flex-wrap:wrap; }

  .num-display { text-align:center; padding:10px; background:#fffbeb; border:2px solid #fde68a; border-radius:12px; }
  .num-display .val { font-size:36px; font-weight:800; color:#b45309; }
  .num-display .sub { font-size:11px; color:#92400e; margin-top:2px; }

  .slider-row { display:flex; align-items:center; gap:6px; }
  .slider-row label { font-size:11px; font-weight:700; min-width:36px; }
  .slider-row input[type=range] { flex:1; }
  .slider-row .val { font-size:14px; font-weight:800; min-width:28px; text-align:right; color:#b45309; }

  .chip { display:inline-flex; align-items:center; justify-content:center; min-width:28px; padding:3px 8px; border-radius:6px; font-size:12px; font-weight:700; margin:2px; }
  .chip-factor { background:#dcfce7; color:#166534; }
  .chip-multiple { background:#dbeafe; color:#1e40af; }
  .chip-prime { background:#fef3c7; color:#92400e; }
  .chip-composite { background:#f3e8ff; color:#6d28d9; }

  .tag-row { display:flex; flex-wrap:wrap; gap:2px; }

  .info { font-size:11px; line-height:1.8; color:#334155; background:#fff; border:1px solid #fde68a; border-radius:8px; padding:8px 10px; }
  .info b { color:#92400e; }

  .quiz-card { background:#fffbeb; border:2px solid #fbbf24; border-radius:12px; padding:10px; text-align:center; }
  .quiz-q { font-size:13px; font-weight:700; color:#92400e; }
  .quiz-opts { display:grid; grid-template-columns:1fr 1fr; gap:4px; margin-top:6px; }
  .quiz-opt { padding:6px; border:2px solid #e2e8f0; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; background:#fff; font-family:var(--edu-font); }
  .quiz-opt:hover { border-color:#f59e0b; }
  .quiz-opt.correct { background:#dcfce7; border-color:#22c55e; }
  .quiz-opt.wrong { background:#fef2f2; border-color:#ef4444; }
  .quiz-result { font-size:11px; font-weight:700; margin-top:4px; min-height:16px; }
</style>
</head>
<body>
<div class="tool">
  <div class="toolbar">
    <h1>🔢 因数与倍数</h1>
    <span>五年级下册 · 第二单元</span>
  </div>
  <div class="main">
    <div class="canvas-wrap"><canvas id="cv"></canvas></div>
    <div class="panel">
      <div class="num-display">
        <div class="val" id="num-val">12</div>
        <div class="sub" id="num-info">合数 · 有6个因数</div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">选择数字（1-100）</div>
        <div class="slider-row">
          <label>数字</label>
          <input type="range" id="sl-num" min="1" max="100" value="12" oninput="setNum(parseInt(this.value))"/>
          <div class="val" id="sl-val">12</div>
        </div>
        <div class="row">
          <button class="btn btn-default" onclick="setNum(1)">1</button>
          <button class="btn btn-default" onclick="setNum(2)">2</button>
          <button class="btn btn-default" onclick="setNum(7)">7</button>
          <button class="btn btn-default" onclick="setNum(12)">12</button>
          <button class="btn btn-default" onclick="setNum(24)">24</button>
          <button class="btn btn-default" onclick="setNum(36)">36</button>
          <button class="btn btn-default" onclick="setNum(60)">60</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">因数（能整除 <span id="lbl-n">12</span> 的数）</div>
        <div class="tag-row" id="factors"></div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">倍数（<span id="lbl-n2">12</span> 的倍数，前12个）</div>
        <div class="tag-row" id="multiples"></div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">公因数与公倍数（比较两个数）</div>
        <div class="slider-row">
          <label>A</label>
          <input type="range" id="sl-a" min="1" max="50" value="12" oninput="updateGcd()"/>
          <div class="val" id="va">12</div>
          <label>B</label>
          <input type="range" id="sl-b" min="1" max="50" value="18" oninput="updateGcd()"/>
          <div class="val" id="vb">18</div>
        </div>
        <div style="background:#fef9c3;padding:6px 8px;border-radius:8px;font-size:11px;line-height:1.6" id="gcd-info"></div>
      </div>
      <div class="divider"></div>
      <div class="section">
        <div class="label">因数与倍数测验</div>
        <div class="quiz-card" id="quiz-card"></div>
      </div>
      <div class="divider"></div>
      <div class="info">
        <b>因数与倍数小知识</b><br/>
        ● <strong>因数</strong>：能整除某数的自然数<br/>
        ● <strong>倍数</strong>：某数乘以自然数的积<br/>
        ● 只有1和本身两个因数 → <strong>质数</strong><br/>
        ● 有3个及以上因数 → <strong>合数</strong><br/>
        ● 1既不是质数也不是合数
      </div>
    </div>
  </div>
</div>
<script>
var cv, ctx;
var _num = 12;

function init() {
  cv = document.getElementById('cv');
  ctx = cv.getContext('2d');
  window.addEventListener('resize', resize);
  resize();
  setNum(12);
  updateGcd();
  nextQuiz();
}

function resize() {
  var r = cv.parentElement.getBoundingClientRect();
  cv.width = r.width * devicePixelRatio;
  cv.height = r.height * devicePixelRatio;
  cv.style.width = r.width + 'px';
  cv.style.height = r.height + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  draw();
}

function setNum(n) {
  _num = n;
  document.getElementById('sl-num').value = n;
  document.getElementById('sl-val').textContent = n;
  document.getElementById('num-val').textContent = n;
  document.getElementById('lbl-n').textContent = n;
  document.getElementById('lbl-n2').textContent = n;
  updateInfo();
  draw();
}

function getFactors(n) {
  var f = [];
  for (var i = 1; i <= n; i++) if (n % i === 0) f.push(i);
  return f;
}

function isPrime(n) {
  if (n < 2) return false;
  for (var i = 2; i * i <= n; i++) if (n % i === 0) return false;
  return true;
}

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }
function lcm(a, b) { return a * b / gcd(a, b); }

function updateInfo() {
  var n = _num;
  var factors = getFactors(n);
  var prime = isPrime(n);
  var type = n === 1 ? '1（特殊）' : prime ? '质数' : '合数';
  document.getElementById('num-info').textContent = type + ' · 有' + factors.length + '个因数';

  // Factors
  var fhtml = '';
  factors.forEach(function(f) {
    var pair = n / f;
    fhtml += '<span class="chip chip-factor">' + f + '</span>';
  });
  document.getElementById('factors').innerHTML = fhtml;

  // Multiples
  var mhtml = '';
  for (var i = 1; i <= 12; i++) {
    mhtml += '<span class="chip chip-multiple">' + (n * i) + '</span>';
  }
  document.getElementById('multiples').innerHTML = mhtml;
}

function updateGcd() {
  var a = parseInt(document.getElementById('sl-a').value);
  var b = parseInt(document.getElementById('sl-b').value);
  document.getElementById('va').textContent = a;
  document.getElementById('vb').textContent = b;

  var fa = getFactors(a), fb = getFactors(b);
  var common = fa.filter(function(f) { return fb.indexOf(f) >= 0; });
  var g = gcd(a, b), l = lcm(a, b);

  var html = '<b>公因数</b>：' + common.join(', ') + '<br>';
  html += '<b>最大公因数</b>（GCD）= <strong style="color:#b45309">' + g + '</strong><br>';
  html += '<b>最小公倍数</b>（LCM）= <strong style="color:#1e40af">' + l + '</strong>';
  document.getElementById('gcd-info').innerHTML = html;
}

function draw() {
  var w = cv.width / devicePixelRatio, h = cv.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  var n = _num;

  // === Number grid 1-100, highlight factors ===
  var cols = 10, rows = 10;
  var cellW = Math.min((w - 60) / cols, (h * 0.45) / rows, 42);
  cellW = Math.max(cellW, 18);
  var cellH = cellW;
  var gx = (w - cols * cellW) / 2;
  var gy = 20;

  // Title
  ctx.fillStyle = '#92400e';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('1-100 数表中 ' + n + ' 的因数（绿色）和倍数（蓝色）', w / 2, gy + 2);
  gy += 18;

  var factors = getFactors(n);
  var factorSet = {};
  factors.forEach(function(f) { factorSet[f] = true; });

  for (var i = 1; i <= 100; i++) {
    var c = (i - 1) % cols, r = Math.floor((i - 1) / cols);
    var x = gx + c * cellW, y = gy + r * cellH;
    var isFactor = factorSet[i];
    var isMultiple = (i % n === 0 && i !== n);

    if (isFactor && i === n) {
      ctx.fillStyle = '#fbbf24';
    } else if (isFactor) {
      ctx.fillStyle = '#86efac';
    } else if (isMultiple) {
      ctx.fillStyle = '#93c5fd';
    } else {
      ctx.fillStyle = '#f8fafc';
    }
    ctx.fillRect(x + 1, y + 1, cellW - 2, cellH - 2);
    ctx.strokeStyle = '#d1d5db';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x + 1, y + 1, cellW - 2, cellH - 2);

    ctx.fillStyle = (isFactor || isMultiple) ? '#334155' : '#94a3b8';
    ctx.font = 'bold ' + Math.max(8, cellW * 0.3) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(i, x + cellW / 2, y + cellH / 2);
  }

  // Legend
  var ly = gy + rows * cellH + 12;
  ctx.font = 'bold 10px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#86efac';
  ctx.fillRect(gx, ly, 12, 12);
  ctx.fillStyle = '#334155';
  ctx.fillText('因数', gx + 16, ly + 10);
  ctx.fillStyle = '#93c5fd';
  ctx.fillRect(gx + 55, ly, 12, 12);
  ctx.fillStyle = '#334155';
  ctx.fillText('倍数', gx + 71, ly + 10);
  ctx.fillStyle = '#fbbf24';
  ctx.fillRect(gx + 110, ly, 12, 12);
  ctx.fillStyle = '#334155';
  ctx.fillText('本身', gx + 126, ly + 10);

  // === Factor pair visualization ===
  var fy = ly + 30;
  ctx.fillStyle = '#92400e';
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(n + ' 的因数对（相乘等于 ' + n + '）', w / 2, fy);
  fy += 20;

  var pairY = fy;
  var pairSpacing = Math.min(36, (h - pairY - 10) / factors.length);
  pairSpacing = Math.max(pairSpacing, 20);

  factors.forEach(function(f, i) {
    var pair = n / f;
    var y = pairY + i * pairSpacing;
    var barMaxW = w * 0.6;
    var unitW = barMaxW / n;

    // Factor bar
    ctx.fillStyle = '#22c55e';
    ctx.fillRect(w * 0.15, y, f * unitW, pairSpacing - 4);
    ctx.fillStyle = '#3b82f6';
    ctx.fillRect(w * 0.15 + f * unitW, y, pair * unitW, pairSpacing - 4);

    ctx.fillStyle = '#334155';
    ctx.font = 'bold ' + Math.max(9, pairSpacing * 0.4) + 'px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(f, w * 0.15 - 6, y + pairSpacing / 2 - 2);
    ctx.textAlign = 'left';
    ctx.fillText('× ' + pair + ' = ' + n, w * 0.15 + barMaxW + 6, y + pairSpacing / 2 - 2);
  });
}

// ===== Quiz =====
var _quizQs = [
  { q: '12的因数有哪些？', opts: ['1,2,3,4,6,12', '1,2,3,4,5,12', '1,2,6,12', '2,3,4,6,12'], ans: 0 },
  { q: '下面哪个是质数？', opts: ['9', '15', '21', '17'], ans: 3 },
  { q: '一个数的最小因数是几？', opts: ['0', '1', '2', '它本身'], ans: 1 },
  { q: '6和8的最大公因数是多少？', opts: ['2', '4', '6', '24'], ans: 0 },
  { q: '4和6的最小公倍数是多少？', opts: ['2', '12', '24', '6'], ans: 1 },
  { q: '下面哪个数既是2的倍数又是3的倍数？', opts: ['8', '9', '12', '15'], ans: 2 },
];
var _qi = 0, _score = 0;

function nextQuiz() {
  if (_qi >= _quizQs.length) {
    document.getElementById('quiz-card').innerHTML =
      '<div class="quiz-q">测验完成！答对 ' + _score + ' / ' + _quizQs.length + ' 题</div>';
    return;
  }
  var q = _quizQs[_qi];
  var html = '<div class="quiz-q">第' + (_qi + 1) + '题：' + q.q + '</div><div class="quiz-opts">';
  q.opts.forEach(function(o, i) {
    html += '<button class="quiz-opt" onclick="answer(' + i + ')">' + o + '</button>';
  });
  html += '</div><div class="quiz-result" id="qr"></div>';
  document.getElementById('quiz-card').innerHTML = html;
}

function answer(idx) {
  var q = _quizQs[_qi];
  var opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(function(b, i) {
    b.onclick = null; b.style.cursor = 'default';
    if (i === q.ans) b.classList.add('correct');
    if (i === idx && i !== q.ans) b.classList.add('wrong');
  });
  var r = document.getElementById('qr');
  if (idx === q.ans) { r.textContent = '✓ 正确！'; r.style.color = '#16a34a'; _score++; }
  else { r.textContent = '✗ 正确答案：' + q.opts[q.ans]; r.style.color = '#ef4444'; }
  _qi++;
  setTimeout(nextQuiz, 1200);
}

init();
</script>
</body>
</html>
