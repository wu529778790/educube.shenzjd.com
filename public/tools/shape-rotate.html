<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>图形旋转变换演示</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
  .main-layout {
    display: grid;
    grid-template-columns: 1fr 220px;
    height: 100%;
    gap: 0;
  }

  .canvas-area {
    position: relative;
    background: #fff;
    overflow: hidden;
  }

  /* 右侧控制面板 */
  .control-panel {
    background: #fdfaf4;
    border-left: 1px solid #e2e8f0;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow: auto;
  }

  .ctrl-section {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .ctrl-label {
    font-size: 11px;
    font-weight: 700;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .shape-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .sshape-btn {
    padding: 8px 6px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid #e2e8f0;
    background: #fff;
    color: #64748b;
    text-align: center;
    transition: all 0.15s;
    font-family: var(--edu-font);
  }
  .sshape-btn:hover:not(.active) { border-color: #f43f5e; }
  .sshape-btn.active { background: #f43f5e; color: #fff; border-color: #f43f5e; }

  .angle-display {
    text-align: center;
    font-size: 28px;
    font-weight: 800;
    color: #f43f5e;
    line-height: 1;
  }
  .angle-unit { font-size: 14px; color: #94a3b8; margin-left: 2px; }

  .center-btn {
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid #e2e8f0;
    background: #fff;
    color: #64748b;
    transition: all 0.15s;
    font-family: var(--edu-font);
    text-align: center;
  }
  .center-btn.active { background: #ef4444; color: #fff; border-color: #ef4444; }
  .center-btn:hover:not(.active) { border-color: #94a3b8; }

  .divider { height: 1px; background: #e2e8f0; }

  .info-box {
    background: #fff;
    border: 1px solid #fecdd3;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    color: #64748b;
    line-height: 1.7;
  }
  .info-box strong { color: #f43f5e; }
</style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="edu-toolbar-title">🔁 图形旋转变换演示</span>
      <span class="edu-toolbar-subtitle">下册·图形的运动</span>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-primary" id="btn-play" onclick="playStep()">▶ 旋转一步</button>
      <button class="edu-btn edu-btn-accent" id="btn-auto" onclick="toggleAuto()">⟳ 连续旋转</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>

  <div class="edu-content">
    <div class="main-layout">
      <!-- 画布 -->
      <div class="canvas-area">
        <canvas id="main-canvas" class="edu-canvas-full"></canvas>
      </div>

      <!-- 控制面板 -->
      <div class="control-panel">
        <!-- 图形选择 -->
        <div class="ctrl-section">
          <div class="ctrl-label">选择图形</div>
          <div class="shape-grid">
            <button class="sshape-btn active" id="ss-triangle" onclick="setShape('triangle')">三角形</button>
            <button class="sshape-btn" id="ss-rect" onclick="setShape('rect')">长方形</button>
            <button class="sshape-btn" id="ss-arrow" onclick="setShape('arrow')">箭头</button>
            <button class="sshape-btn" id="ss-house" onclick="setShape('house')">房子形</button>
          </div>
        </div>

        <div class="divider"></div>

        <!-- 旋转角度 -->
        <div class="ctrl-section">
          <div class="ctrl-label">每步旋转角度</div>
          <div class="angle-display">
            <span id="angle-val">90</span><span class="angle-unit">°</span>
          </div>
          <input type="range" id="angle-slider" min="15" max="180" step="15" value="90"
            oninput="setAngle(this.value)" style="width:100%;"/>
          <div style="display:flex;justify-content:space-between;font-size:11px;color:#94a3b8;">
            <span>15°</span><span>90°</span><span>180°</span>
          </div>
        </div>

        <div class="divider"></div>

        <!-- 旋转中心 -->
        <div class="ctrl-section">
          <div class="ctrl-label">旋转中心</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
            <button class="center-btn active" id="ctr-origin" onclick="setCenter('origin')">原点</button>
            <button class="center-btn" id="ctr-centroid" onclick="setCenter('centroid')">图形中心</button>
            <button class="center-btn" id="ctr-vertex" onclick="setCenter('vertex')">顶点</button>
            <button class="center-btn" id="ctr-custom" onclick="setCenter('custom')">自定义</button>
          </div>
          <div id="custom-hint" style="display:none;font-size:11px;color:#f43f5e;">点击画布设置中心点</div>
        </div>

        <div class="divider"></div>

        <!-- 旋转记录 -->
        <div class="ctrl-section">
          <div class="ctrl-label">旋转记录</div>
          <div class="info-box">
            累计旋转：<strong><span id="total-angle">0</span>°</strong><br/>
            旋转次数：<strong><span id="rotate-count">0</span></strong> 次<br/>
            <span id="rotate-note" style="color:#94a3b8;font-size:11px;"></span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../edu-lib/edu-tools.js"></script>
<script>
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');

let W, H;
let stepAngle = 90; // 每步角度（度）
let totalAngle = 0;
let rotateCount = 0;
let currentAngle = 0; // 当前旋转总角度（弧度）
let autoTimer = null;
let isAuto = false;
let centerMode = 'origin';
let customCenter = null;
let currentShape = 'triangle';

// 图形定义（相对于图形自身中心的点）
const SHAPES = {
  triangle: [
    [-50, 30], [0, -60], [50, 30]
  ],
  rect: [
    [-60, -35], [60, -35], [60, 35], [-60, 35]
  ],
  arrow: [
    [0, -60], [30, -20], [15, -20], [15, 50], [-15, 50], [-15, -20], [-30, -20]
  ],
  house: [
    [-40, 20], [0, -40], [40, 20], [40, 50], [-40, 50]
  ]
};

// 形状颜色
const SHAPE_COLORS = {
  triangle: { fill: 'rgba(248,113,113,0.35)', stroke: '#ef4444' },
  rect:     { fill: 'rgba(251,191,36,0.35)',  stroke: '#f59e0b' },
  arrow:    { fill: 'rgba(52,211,153,0.35)',  stroke: '#10b981' },
  house:    { fill: 'rgba(139,92,246,0.35)',  stroke: '#7c3aed' }
};

// 轨迹记录
let trailShapes = []; // 已旋转的位置轨迹

function getCenter() {
  const pts = SHAPES[currentShape];
  const cx = pts.reduce((s, p) => s + p[0], 0) / pts.length;
  const cy = pts.reduce((s, p) => s + p[1], 0) / pts.length;

  if (centerMode === 'origin') return { x: W / 2, y: H / 2 };
  if (centerMode === 'centroid') return { x: W / 2, y: H / 2 };
  if (centerMode === 'vertex') {
    // 第一个点作为旋转中心（图形将绕该点旋转）
    const pts0 = transformPoints(SHAPES[currentShape], 0);
    return { x: pts0[0].x, y: pts0[0].y };
  }
  if (centerMode === 'custom' && customCenter) return customCenter;
  return { x: W / 2, y: H / 2 };
}

function transformPoints(pts, angle) {
  const ox = W / 2, oy = H / 2;
  return pts.map(p => ({
    x: ox + p[0] * Math.cos(angle) - p[1] * Math.sin(angle),
    y: oy + p[0] * Math.sin(angle) + p[1] * Math.cos(angle)
  }));
}

function rotateAroundCenter(pts, cx, cy, angle) {
  return pts.map(p => {
    const dx = p.x - cx, dy = p.y - cy;
    return {
      x: cx + dx * Math.cos(angle) - dy * Math.sin(angle),
      y: cy + dx * Math.sin(angle) + dy * Math.cos(angle)
    };
  });
}

function drawPolygon(pts, fillStyle, strokeStyle, lineWidth = 2) {
  if (!pts || pts.length < 2) return;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.closePath();
  ctx.fillStyle = fillStyle;
  ctx.fill();
  ctx.strokeStyle = strokeStyle;
  ctx.lineWidth = lineWidth;
  ctx.stroke();
}

function drawDashedPolygon(pts, color) {
  if (!pts || pts.length < 2) return;
  ctx.beginPath();
  ctx.setLineDash([4, 4]);
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.closePath();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.setLineDash([]);
}

function render() {
  W = canvas.clientWidth;
  H = canvas.clientHeight;
  canvas.width = W * (window.devicePixelRatio || 1);
  canvas.height = H * (window.devicePixelRatio || 1);
  ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);

  ctx.clearRect(0, 0, W, H);

  // 背景网格
  drawGrid(ctx, W, H, 40, '#e2e8f020');

  // 坐标轴
  ctx.strokeStyle = '#e2e8f0';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, H/2); ctx.lineTo(W, H/2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();

  // 旋转中心点
  const center = getCenter();
  ctx.beginPath();
  ctx.arc(center.x, center.y, 6, 0, Math.PI * 2);
  ctx.fillStyle = '#f43f5e';
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 轨迹（淡色）
  trailShapes.forEach((pts, i) => {
    const alpha = 0.12 + (i / Math.max(trailShapes.length, 1)) * 0.18;
    drawDashedPolygon(pts, `rgba(244,63,94,${alpha})`);
  });

  // 连线：原始位置到旋转后位置
  if (trailShapes.length > 0) {
    const orig = trailShapes[0];
    const curr = getCurrentPoints();
    orig.forEach((p, i) => {
      ctx.beginPath();
      ctx.moveTo(center.x, center.y);
      ctx.lineTo(p.x, p.y);
      ctx.strokeStyle = 'rgba(244,63,94,0.15)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 5]);
      ctx.stroke();
      ctx.setLineDash([]);
    });
  }

  // 旋转弧线
  if (totalAngle !== 0 && trailShapes.length > 0) {
    const firstPt = trailShapes[0][0];
    const r = Math.sqrt((firstPt.x - center.x)**2 + (firstPt.y - center.y)**2);
    if (r > 5) {
      const startAng = Math.atan2(firstPt.y - center.y, firstPt.x - center.x);
      ctx.beginPath();
      ctx.arc(center.x, center.y, r, startAng, startAng + toRad(totalAngle), totalAngle < 0);
      ctx.strokeStyle = 'rgba(244,63,94,0.3)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // 当前图形
  const color = SHAPE_COLORS[currentShape];
  const pts = getCurrentPoints();
  drawPolygon(pts, color.fill, color.stroke, 2.5);

  // 顶点标注
  pts.forEach((p, i) => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = color.stroke;
    ctx.fill();
  });

  // 自定义中心提示
  if (centerMode === 'custom') {
    ctx.fillStyle = '#f43f5e22';
    ctx.strokeStyle = '#f43f5e';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.arc(center.x, center.y, 12, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#f43f5e';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('中心', center.x, center.y - 16);
  }
}

function getCurrentPoints() {
  const basePts = transformPoints(SHAPES[currentShape], 0);
  const center = getCenter();
  return rotateAroundCenter(basePts, center.x, center.y, toRad(currentAngle));
}

function playStep() {
  const before = getCurrentPoints();
  trailShapes.push(before);
  if (trailShapes.length > 12) trailShapes.shift();

  currentAngle += stepAngle;
  totalAngle += stepAngle;
  rotateCount++;

  document.getElementById('total-angle').textContent = totalAngle;
  document.getElementById('rotate-count').textContent = rotateCount;

  // 提示一圈
  const note = document.getElementById('rotate-note');
  if (totalAngle % 360 === 0) {
    note.textContent = `✓ 旋转了 ${totalAngle / 360} 整圈，回到原位！`;
  } else {
    note.textContent = `还需 ${360 - (totalAngle % 360)}° 转满一圈`;
  }

  render();
}

function toggleAuto() {
  isAuto = !isAuto;
  const btn = document.getElementById('btn-auto');
  if (isAuto) {
    btn.textContent = '⏸ 暂停';
    btn.classList.remove('edu-btn-accent');
    btn.classList.add('edu-btn-primary');
    autoTimer = setInterval(playStep, 800);
  } else {
    clearInterval(autoTimer);
    btn.textContent = '⟳ 连续旋转';
    btn.classList.add('edu-btn-accent');
    btn.classList.remove('edu-btn-primary');
  }
}

function setAngle(val) {
  stepAngle = parseInt(val);
  document.getElementById('angle-val').textContent = val;
}

function setShape(key) {
  currentShape = key;
  document.querySelectorAll('.sshape-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('ss-' + key).classList.add('active');
  resetAll();
}

function setCenter(mode) {
  centerMode = mode;
  ['origin','centroid','vertex','custom'].forEach(k => {
    document.getElementById('ctr-' + k).classList.toggle('active', k === mode);
  });
  document.getElementById('custom-hint').style.display = mode === 'custom' ? 'block' : 'none';
  resetAll();
}

// 自定义中心：点击画布
canvas.addEventListener('click', e => {
  if (centerMode !== 'custom') return;
  const rect = canvas.getBoundingClientRect();
  customCenter = { x: e.clientX - rect.left, y: e.clientY - rect.top };
  render();
});

function resetAll() {
  clearInterval(autoTimer);
  isAuto = false;
  document.getElementById('btn-auto').textContent = '⟳ 连续旋转';
  document.getElementById('btn-auto').classList.add('edu-btn-accent');
  document.getElementById('btn-auto').classList.remove('edu-btn-primary');
  currentAngle = 0;
  totalAngle = 0;
  rotateCount = 0;
  trailShapes = [];
  document.getElementById('total-angle').textContent = 0;
  document.getElementById('rotate-count').textContent = 0;
  document.getElementById('rotate-note').textContent = '';
  render();
}

window.addEventListener('resize', render);
render();
</script>
</body>
</html>
