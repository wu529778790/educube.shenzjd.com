<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>最大公因数与最小公倍数</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
  .main-layout{display:grid;grid-template-columns:1fr 300px;height:100%}
  .canvas-area{position:relative;background:linear-gradient(135deg,#faf5ff,#f3e8ff);overflow:hidden}
  .control-panel{background:#fff;border-left:1px solid #e2e8f0;padding:14px;display:flex;flex-direction:column;gap:10px;overflow:auto}
  .ctrl-section{display:flex;flex-direction:column;gap:6px}
  .ctrl-label{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em}
  .divider{height:1px;background:#e2e8f0}
  .num-input{width:100%;padding:8px 12px;border:2px solid #e2e8f0;border-radius:8px;font-size:16px;font-weight:700;color:#7C3AED;text-align:center;font-family:var(--edu-font);outline:none}
  .num-input:focus{border-color:#8B5CF6}
  .info-box{background:#faf5ff;border:1px solid #e9d5ff;border-radius:10px;padding:10px 12px;font-size:12px;color:#64748b;line-height:1.9}
  .info-box strong{color:#7C3AED}
  .result-big{font-size:24px;font-weight:800;color:#7C3AED;text-align:center}
  .tab-btn{padding:7px 10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #e2e8f0;background:#fff;color:#64748b;transition:all .15s;font-family:var(--edu-font);text-align:center}
  .tab-btn.active{background:#8B5CF6;color:#fff;border-color:#8B5CF6}
  .tab-btn:hover:not(.active){background:#f5f3ff}
  .tab-row{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
  .step-box{background:#fff;border:1px solid #e9d5ff;border-radius:10px;padding:8px 10px;font-size:12px;line-height:1.8;max-height:140px;overflow-y:auto}
  .step-box .highlight{color:#7C3AED;font-weight:700}
  .drill-stats{display:flex;justify-content:space-around;text-align:center;gap:4px}
  .drill-stat-val{font-size:22px;font-weight:800;color:#7C3AED}
  .drill-stat-lbl{font-size:10px;color:#64748b}
  .quiz-text{font-size:13px;line-height:1.7;color:#1e293b;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:10px 12px}
  .quiz-input{width:100%;padding:8px;border:2px solid #e2e8f0;border-radius:8px;font-size:16px;font-weight:700;color:#1e293b;text-align:center;font-family:var(--edu-font);outline:none}
  .quiz-input:focus{border-color:#8B5CF6}
  .quiz-btn{width:100%;padding:8px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--edu-font);transition:all .15s}
  .quiz-btn-check{background:#8B5CF6;color:#fff}
  .quiz-btn-check:hover{background:#7C3AED}
  .quiz-btn-next{background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0;margin-top:4px}
  .quiz-btn-next:hover{background:#e2e8f0}
  .quiz-feedback{font-size:13px;font-weight:700;text-align:center;padding:4px;border-radius:8px}
  .quiz-ok{color:#16a34a;background:#f0fdf4}
  .quiz-no{color:#dc2626;background:#fef2f2}
</style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="edu-toolbar-title">最大公因数与最小公倍数</span>
      <span class="edu-toolbar-subtitle">五下·第二单元</span>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="main-canvas" class="edu-canvas-full"></canvas>
      </div>
      <div class="control-panel">
        <!-- Inputs -->
        <div class="ctrl-section">
          <div class="ctrl-label">输入两个数</div>
          <div style="display:flex;gap:8px">
            <input class="num-input" id="num1" type="number" min="2" max="200" value="12" oninput="onNumChange()"/>
            <input class="num-input" id="num2" type="number" min="2" max="200" value="18" oninput="onNumChange()"/>
          </div>
        </div>
        <div class="divider"></div>
        <!-- Tabs -->
        <div class="ctrl-section">
          <div class="ctrl-label">显示模式</div>
          <div class="tab-row">
            <button class="tab-btn active" id="tb-euclid" onclick="setMode('euclid')">辗转相除</button>
            <button class="tab-btn" id="tb-factor" onclick="setMode('factor')">分解质因数</button>
            <button class="tab-btn" id="tb-lcmvis" onclick="setMode('lcmvis')">倍数数轴</button>
          </div>
        </div>
        <div class="divider"></div>

        <!-- Euclidean section -->
        <div id="sec-euclid">
          <div class="result-big" id="gcd-result">6</div>
          <div class="step-box" id="euclid-steps"></div>
        </div>

        <!-- Factor section -->
        <div id="sec-factor" style="display:none">
          <div class="result-big" id="gcd-result2">6</div>
          <div class="step-box" id="factor-info" style="text-align:center"></div>
        </div>

        <!-- LCM visual section -->
        <div id="sec-lcmvis" style="display:none">
          <div class="result-big" id="lcm-result">36</div>
          <div class="step-box" id="lcm-info"></div>
        </div>

        <div class="divider"></div>
        <!-- Real-world problems -->
        <div class="ctrl-section">
          <div class="ctrl-label">生活应用题</div>
          <div class="quiz-text" id="quiz-text"></div>
          <input class="quiz-input" id="quiz-ans" type="number" placeholder="输入答案"/>
          <div style="display:flex;gap:6px">
            <button class="quiz-btn quiz-btn-check" onclick="checkQuiz()" style="flex:1">验证</button>
            <button class="quiz-btn quiz-btn-next" onclick="nextQuiz()" style="flex:1">下一题</button>
          </div>
          <div class="quiz-feedback" id="quiz-fb" style="display:none"></div>
        </div>
        <div class="divider"></div>
        <!-- Speed drill -->
        <div class="ctrl-section">
          <div class="ctrl-label">速算挑战</div>
          <div class="drill-stats" id="drill-stats">
            <div><div class="drill-stat-val" id="drill-score">0</div><div class="drill-stat-lbl">得分</div></div>
            <div><div class="drill-stat-val" id="drill-streak">0</div><div class="drill-stat-lbl">连对</div></div>
            <div><div class="drill-stat-val" id="drill-time">30</div><div class="drill-stat-lbl">秒</div></div>
          </div>
          <div id="drill-q" style="font-size:14px;font-weight:700;text-align:center;color:#1e293b;min-height:20px"></div>
          <div style="display:flex;gap:6px">
            <input class="quiz-input" id="drill-ans" type="number" placeholder="?" style="flex:1" onkeydown="if(event.key==='Enter')checkDrill()"/>
            <button class="quiz-btn quiz-btn-check" onclick="checkDrill()" style="width:60px">确认</button>
          </div>
          <button class="quiz-btn quiz-btn-next" id="drill-start" onclick="startDrill()">开始挑战</button>
        </div>
        <div class="divider"></div>
        <!-- Knowledge -->
        <div class="ctrl-section">
          <div class="ctrl-label">知识卡片</div>
          <div class="info-box" style="background:#fff;border-color:#e2e8f0;font-size:11px;line-height:1.7">
            <strong>最大公因数(GCD)</strong>：两个数公有因数中最大的一个<br/>
            <strong>最小公倍数(LCM)</strong>：两个数公有倍数中最小的一个<br/>
            <strong>辗转相除法</strong>：大数除以小数取余，余数为0时除数即GCD<br/>
            GCD &times; LCM = a &times; b
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../edu-lib/edu-tools.js"></script>
<script>
/* ── globals ── */
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
let W, H, mode = 'euclid';
let animFrame = 0, animT = 0, lastTime = 0;

/* ── math helpers ── */
function gcd(a, b) { while (b) { [a, b] = [b, a % b]; } return a; }
function lcm(a, b) { return (a * b) / gcd(a, b); }
function getFactors(n) { const f = []; for (let i = 1; i <= n; i++) if (n % i === 0) f.push(i); return f; }

function primeFactors(n) {
  const f = []; let d = 2;
  while (d * d <= n) { while (n % d === 0) { f.push(d); n /= d; } d++; }
  if (n > 1) f.push(n);
  return f;
}

function euclidSteps(a, b) {
  const steps = [];
  let x = Math.max(a, b), y = Math.min(a, b);
  while (y > 0) {
    const q = Math.floor(x / y), r = x % y;
    steps.push({ x, y, q, r });
    x = y; y = r;
  }
  steps.push({ x, y: 0, q: 0, r: 0, done: true, gcd: x });
  return steps;
}

/* ── input / mode ── */
function getNums() {
  const a = Math.max(2, parseInt(document.getElementById('num1').value) || 2);
  const b = Math.max(2, parseInt(document.getElementById('num2').value) || 2);
  return [a, b];
}

function onNumChange() {
  animFrame = 0;
  updatePanels();
}

function setMode(m) {
  mode = m; animFrame = 0;
  ['euclid','factor','lcmvis'].forEach(k => {
    document.getElementById('tb-' + k).classList.toggle('active', k === m);
    document.getElementById('sec-' + k).style.display = k === m ? '' : 'none';
  });
  updatePanels();
}

function resetAll() {
  document.getElementById('num1').value = 12;
  document.getElementById('num2').value = 18;
  animFrame = 0;
  setMode('euclid');
}

/* ── panel updates ── */
function updatePanels() {
  const [a, b] = getNums();
  const g = gcd(a, b), l = lcm(a, b);
  document.getElementById('gcd-result').textContent = g;
  document.getElementById('gcd-result2').textContent = g;
  document.getElementById('lcm-result').textContent = l;

  // Euclidean steps text
  const esteps = euclidSteps(a, b);
  let html = '';
  esteps.forEach((s, i) => {
    if (s.done) { html += `<div class="highlight">余数为 0，GCD = ${s.gcd}</div>`; return; }
    html += `<div>${s.x} &divide; ${s.y} = ${s.q} ... 余 <span class="highlight">${s.r}</span></div>`;
  });
  document.getElementById('euclid-steps').innerHTML = html;

  // Factor info
  const fa = primeFactors(a), fb = primeFactors(b);
  document.getElementById('factor-info').innerHTML =
    `<div>${a} = ${fa.map(p=>'<span class="highlight">'+p+'</span>').join(' &times; ')}</div>` +
    `<div>${b} = ${fb.map(p=>'<span class="highlight">'+p+'</span>').join(' &times; ')}</div>` +
    `<div style="margin-top:4px">公有质因数：<strong>${[...new Set(fa.filter(v=>fb.includes(v)))].join(', ')||'无'}</strong></div>`;

  // LCM info
  const fa2 = getFactors(a), fb2 = getFactors(b);
  const commonF = fa2.filter(f => fb2.includes(f));
  document.getElementById('lcm-info').innerHTML =
    `<div>GCD = ${g} &nbsp; LCM = ${l}</div>` +
    `<div>${g} &times; ${l} = ${g*l} = ${a} &times; ${b}</div>`;
}

/* ══════════ ANIMATION LOOP ══════════ */
function loop(ts) {
  const dt = lastTime ? (ts - lastTime) / 1000 : 0.016;
  lastTime = ts; animT += dt;
  const dpr = window.devicePixelRatio || 1;
  W = canvas.clientWidth; H = canvas.clientHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);
  const [a, b] = getNums();
  if (mode === 'euclid') drawEuclid(a, b);
  else if (mode === 'factor') drawFactor(a, b);
  else drawLCMVisual(a, b);
  animFrame++;
  requestAnimationFrame(loop);
}

/* ══════════ EUCLIDEAN ANIMATION ══════════ */
function drawEuclid(a, b) {
  const steps = euclidSteps(a, b);
  const cx = W / 2, topY = 30;
  // Title
  ctx.font = 'bold 15px sans-serif'; ctx.fillStyle = '#1e293b'; ctx.textAlign = 'center';
  ctx.fillText('辗转相除法 (Euclidean Algorithm)', cx, topY);

  const stepH = 56, startY = topY + 30;
  const revealInterval = 50; // frames per step
  const totalSteps = steps.length;
  const visibleSteps = Math.min(totalSteps, Math.floor(animFrame / revealInterval) + 1);

  for (let i = 0; i < visibleSteps; i++) {
    const s = steps[i];
    const y = startY + i * stepH;
    const fadeIn = Math.min(1, (animFrame - i * revealInterval) / 20);
    ctx.globalAlpha = fadeIn;

    if (s.done) {
      // Highlight result
      const pulse = 0.85 + 0.15 * Math.sin(animT * 4);
      ctx.font = `bold ${20 * pulse}px sans-serif`;
      ctx.fillStyle = '#7C3AED'; ctx.textAlign = 'center';
      ctx.fillText(`GCD(${a}, ${b}) = ${s.gcd}`, cx, y + 28);
      // Draw a box around
      const tw = ctx.measureText(`GCD(${a}, ${b}) = ${s.gcd}`).width + 30;
      ctx.strokeStyle = '#8B5CF6'; ctx.lineWidth = 2;
      roundRect(ctx, cx - tw/2, y + 8, tw, 32, 8); ctx.stroke();
      ctx.fillStyle = '#8B5CF620'; roundRect(ctx, cx - tw/2, y + 8, tw, 32, 8); ctx.fill();
    } else {
      // Division step
      const colL = cx - 160, colR = cx + 80;
      // Show "x ÷ y = q ... r"
      ctx.font = 'bold 18px sans-serif'; ctx.fillStyle = '#1e293b'; ctx.textAlign = 'left';
      const stepLabel = `第 ${i+1} 步`;
      ctx.font = '12px sans-serif'; ctx.fillStyle = '#94a3b8';
      ctx.fillText(stepLabel, colL, y + 4);

      ctx.font = 'bold 20px sans-serif'; ctx.fillStyle = '#1e293b'; ctx.textAlign = 'center';
      ctx.fillText(`${s.x}`, cx - 60, y + 32);
      ctx.fillStyle = '#8B5CF6'; ctx.fillText('÷', cx - 25, y + 32);
      ctx.fillStyle = '#1e293b'; ctx.fillText(`${s.y}`, cx + 10, y + 32);
      ctx.fillStyle = '#8B5CF6'; ctx.fillText('=', cx + 45, y + 32);
      ctx.fillStyle = '#1e293b'; ctx.fillText(`${s.q}`, cx + 75, y + 32);
      ctx.fillStyle = '#64748b'; ctx.fillText('...', cx + 100, y + 32);
      // Remainder highlighted
      const rc = s.r === 0 ? '#16a34a' : '#7C3AED';
      ctx.fillStyle = rc; ctx.font = 'bold 20px sans-serif';
      ctx.fillText(`余 ${s.r}`, cx + 140, y + 32);

      // Animated arrow
      if (i < totalSteps - 1 && i < visibleSteps - 1) {
        ctx.strokeStyle = '#c4b5fd'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(cx, y + 44); ctx.lineTo(cx, y + 54); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx - 5, y + 50); ctx.lineTo(cx, y + 56); ctx.lineTo(cx + 5, y + 50); ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;
  }
}

/* ══════════ FACTOR TREE + VENN ══════════ */
function drawFactor(a, b) {
  const cx = W / 2, topY = 20;
  ctx.font = 'bold 15px sans-serif'; ctx.fillStyle = '#1e293b'; ctx.textAlign = 'center';
  ctx.fillText('质因数分解与韦恩图', cx, topY + 12);

  // Left tree for a
  drawFactorTree(a, 80, topY + 60, '#8B5CF6', '#7C3AED');
  // Right tree for b
  drawFactorTree(b, W - 80, topY + 60, '#a78bfa', '#6d28d9');

  // Venn diagram at bottom
  drawVenn(a, b, cx, topY + 50);
}

function drawFactorTree(n, cx, sy, color1, color2) {
  const factors = primeFactors(n);
  ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillStyle = color1;
  ctx.fillText(`n = ${n}`, cx, sy);
  let x = cx, y = sy + 12;
  let current = n;
  for (let i = 0; i < factors.length; i++) {
    const p = factors[i], next = current / p;
    const rowY = y + 28 * (i + 1);
    // branch lines
    ctx.strokeStyle = '#d4d4d8'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(x, y + 4); ctx.lineTo(x - 30, rowY - 8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x, y + 4); ctx.lineTo(x + 20, rowY - 8); ctx.stroke();
    // prime factor (highlighted)
    ctx.fillStyle = color2; ctx.font = 'bold 14px sans-serif';
    ctx.fillText(p, x - 30, rowY);
    // remaining
    ctx.fillStyle = '#64748b'; ctx.font = '13px sans-serif';
    ctx.fillText(next, x + 20, rowY);
    current = next; x = x + 20; y = rowY - 8;
  }
}

function drawVenn(a, b, cx, baseY) {
  const fa = primeFactors(a), fb = primeFactors(b);
  const setA = [...new Set(fa)], setB = [...new Set(fb)];
  const common = setA.filter(v => setB.includes(v));
  const onlyA = setA.filter(v => !setB.includes(v));
  const onlyB = setB.filter(v => !setA.includes(v));
  const g = gcd(a, b);

  const vennY = Math.max(baseY + 180, H / 2 + 20);
  const r = Math.min(70, H - vennY - 40);
  if (r < 20) return;
  const offset = r * 0.55;

  // Left circle
  ctx.beginPath(); ctx.arc(cx - offset, vennY, r, 0, Math.PI * 2);
  ctx.fillStyle = '#8B5CF625'; ctx.fill();
  ctx.strokeStyle = '#8B5CF6'; ctx.lineWidth = 2; ctx.stroke();
  // Right circle
  ctx.beginPath(); ctx.arc(cx + offset, vennY, r, 0, Math.PI * 2);
  ctx.fillStyle = '#a78bfa25'; ctx.fill();
  ctx.strokeStyle = '#a78bfa'; ctx.lineWidth = 2; ctx.stroke();

  ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  // Only A
  ctx.fillStyle = '#7C3AED';
  onlyA.forEach((v, i) => ctx.fillText(v, cx - offset - 22, vennY - 8 + i * 18));
  ctx.fillText(a + '', cx - offset - 22, vennY + r + 16);
  // Common
  ctx.fillStyle = '#dc2626';
  common.forEach((v, i) => ctx.fillText(v, cx, vennY - 8 + i * 18));
  // Only B
  ctx.fillStyle = '#6d28d9';
  onlyB.forEach((v, i) => ctx.fillText(v, cx + offset + 22, vennY - 8 + i * 18));
  ctx.fillText(b + '', cx + offset + 22, vennY + r + 16);

  // Labels
  ctx.font = '11px sans-serif'; ctx.fillStyle = '#64748b';
  ctx.fillText('公有', cx, vennY + r + 32);
  ctx.font = 'bold 13px sans-serif'; ctx.fillStyle = '#7C3AED'; ctx.textAlign = 'center';
  ctx.fillText(`GCD = ${common.length ? common.join(' x ') : '1'} = ${g}`, cx, vennY + r + 50);
}

/* ══════════ LCM NUMBER LINE ══════════ */
function drawLCMVisual(a, b) {
  const cx = W / 2, topY = 16;
  const l = lcm(a, b);
  const maxVal = Math.min(l * 3, 300);
  ctx.font = 'bold 15px sans-serif'; ctx.fillStyle = '#1e293b'; ctx.textAlign = 'center';
  ctx.fillText('最小公倍数 — 数轴上的公共倍数', cx, topY + 12);

  const lineY1 = topY + 60, lineY2 = topY + 120, lineY3 = topY + 180;
  const padX = 60;
  const usableW = W - padX * 2;
  const scale = usableW / maxVal;

  function xPos(v) { return padX + v * scale; }

  // Draw number lines
  drawNumberLine(lineY1, a, maxVal, '#8B5CF6', '#7C3AED', `${a} 的倍数`);
  drawNumberLine(lineY2, b, maxVal, '#a78bfa', '#6d28d9', `${b} 的倍数`);

  // Common multiples line
  ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(padX, lineY3); ctx.lineTo(padX + usableW, lineY3); ctx.stroke();
  ctx.font = '12px sans-serif'; ctx.fillStyle = '#64748b'; ctx.textAlign = 'left';
  ctx.fillText('公倍数', padX, lineY3 - 12);

  // Bouncing markers at common multiples
  for (let m = l; m <= maxVal; m += l) {
    const x = xPos(m);
    const bounce = Math.abs(Math.sin(animT * 3 + m)) * 8;
    // Marker on line 1
    drawBounceMarker(x, lineY1 - bounce, '#7C3AED', m);
    // Marker on line 2
    drawBounceMarker(x, lineY2 - bounce, '#6d28d9', m);
    // Common marker
    ctx.beginPath(); ctx.arc(x, lineY3 - bounce * 0.7, 7, 0, Math.PI * 2);
    ctx.fillStyle = '#7C3AED'; ctx.fill();
    ctx.font = 'bold 11px sans-serif'; ctx.fillStyle = '#7C3AED'; ctx.textAlign = 'center';
    ctx.fillText(m, x, lineY3 + 16);
  }

  // LCM highlight box
  const lx = xPos(l);
  const pulse = 0.9 + 0.1 * Math.sin(animT * 5);
  ctx.strokeStyle = '#7C3AED'; ctx.lineWidth = 2.5 * pulse;
  roundRect(ctx, lx - 18, lineY3 - 22, 36, 20, 6); ctx.stroke();
  ctx.font = 'bold 18px sans-serif'; ctx.fillStyle = '#7C3AED'; ctx.textAlign = 'center';
  ctx.fillText(`LCM = ${l}`, cx, lineY3 + 40);
}

function drawNumberLine(y, n, maxVal, color, darkColor, label) {
  const padX = 60, usableW = W - padX * 2;
  const scale = usableW / maxVal;
  function xPos(v) { return padX + v * scale; }

  ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(padX, y); ctx.lineTo(padX + usableW, y); ctx.stroke();
  ctx.font = '12px sans-serif'; ctx.fillStyle = color; ctx.textAlign = 'left';
  ctx.fillText(label, padX, y - 12);

  for (let m = n; m <= maxVal; m += n) {
    const x = xPos(m);
    const l = lcm(parseInt(document.getElementById('num1').value)||2, parseInt(document.getElementById('num2').value)||2);
    const isCommon = m % l === 0;
    ctx.beginPath(); ctx.arc(x, y, isCommon ? 6 : 4, 0, Math.PI * 2);
    ctx.fillStyle = isCommon ? darkColor : color + '60'; ctx.fill();
    if (m % (n * Math.max(1, Math.floor(maxVal / (n * 10)))) === 0 || isCommon) {
      ctx.font = '10px sans-serif'; ctx.fillStyle = '#64748b'; ctx.textAlign = 'center';
      ctx.fillText(m, x, y + 14);
    }
  }
}

function drawBounceMarker(x, y, color, val) {
  ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2);
  ctx.fillStyle = color; ctx.fill();
  // Small glow
  ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI * 2);
  ctx.fillStyle = color + '30'; ctx.fill();
}

/* ══════════ REAL-WORLD QUIZZES ══════════ */
const quizPool = [
  { text: '有一根长 {a} 厘米和一根长 {b} 厘米的彩带，要把它们剪成同样长的小段（整厘米），每段最长是多少厘米？', key: 'gcd', suffix: '厘米' },
  { text: '有 {a} 块巧克力和 {b} 块饼干，要平均分给一组同学，最多能分给几个同学？', key: 'gcd', suffix: '个' },
  { text: '{a} 个苹果和 {b} 个橘子分别装袋，每袋同样多，最少要用几个袋子（每种水果用同样多的袋子）？', key: 'lcm', suffix: '个' },
  { text: '甲每 {a} 天去一次图书馆，乙每 {b} 天去一次，今天都去了，至少多少天后两人又同一天去？', key: 'lcm', suffix: '天' },
  { text: '一块长方形地砖长 {a} 厘米，宽 {b} 厘米，用这样的地砖铺一个正方形，至少需要多少块？', key: 'lcm', suffix: '块' },
  { text: '把 {a} 支铅笔和 {b} 块橡皮分给同学，每人得到的铅笔和橡皮一样多，最多分给几个人？', key: 'gcd', suffix: '个' },
];
let quizState = { idx: 0, a: 0, b: 0, answer: 0 };

function makeQuiz() {
  const q = quizPool[quizState.idx % quizPool.length];
  const a = randInt(4, 60), b = randInt(4, 60);
  const answer = q.key === 'gcd' ? gcd(a, b) : lcm(a, b);
  quizState = { ...quizState, a, b, answer };
  const text = q.text.replace('{a}', a).replace('{b}', b);
  document.getElementById('quiz-text').innerHTML = text;
  document.getElementById('quiz-ans').value = '';
  document.getElementById('quiz-fb').style.display = 'none';
}

function checkQuiz() {
  const val = parseInt(document.getElementById('quiz-ans').value);
  const fb = document.getElementById('quiz-fb');
  fb.style.display = 'block';
  if (isNaN(val)) { fb.className = 'quiz-feedback quiz-no'; fb.textContent = '请输入数字'; return; }
  if (val === quizState.answer) {
    fb.className = 'quiz-feedback quiz-ok'; fb.textContent = '正确! 答案是 ' + quizState.answer;
  } else {
    fb.className = 'quiz-feedback quiz-no'; fb.textContent = '再想想哦~';
  }
}

function nextQuiz() {
  quizState.idx++;
  makeQuiz();
}

function randInt(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }

/* ══════════ SPEED DRILL ══════════ */
let drill = { active: false, score: 0, streak: 0, timer: 30, interval: null, qa: 0, qb: 0, qAns: 0, qType: '' };

function startDrill() {
  drill = { ...drill, active: true, score: 0, streak: 0, timer: 30 };
  document.getElementById('drill-score').textContent = 0;
  document.getElementById('drill-streak').textContent = 0;
  document.getElementById('drill-time').textContent = 30;
  document.getElementById('drill-start').textContent = '进行中...';
  document.getElementById('drill-start').disabled = true;
  document.getElementById('drill-ans').value = '';
  nextDrillQ();
  drill.interval = setInterval(() => {
    drill.timer--;
    document.getElementById('drill-time').textContent = drill.timer;
    if (drill.timer <= 0) endDrill();
  }, 1000);
}

function endDrill() {
  drill.active = false;
  clearInterval(drill.interval);
  document.getElementById('drill-q').textContent = `挑战结束! 得分: ${drill.score}`;
  document.getElementById('drill-start').textContent = '再来一次';
  document.getElementById('drill-start').disabled = false;
}

function nextDrillQ() {
  drill.qa = randInt(2, 50);
  drill.qb = randInt(2, 50);
  drill.qType = Math.random() < 0.5 ? 'gcd' : 'lcm';
  drill.qAns = drill.qType === 'gcd' ? gcd(drill.qa, drill.qb) : lcm(drill.qa, drill.qb);
  const label = drill.qType === 'gcd' ? 'GCD' : 'LCM';
  document.getElementById('drill-q').textContent = `${label}(${drill.qa}, ${drill.qb}) = ?`;
  document.getElementById('drill-ans').value = '';
  document.getElementById('drill-ans').focus();
}

function checkDrill() {
  if (!drill.active) return;
  const val = parseInt(document.getElementById('drill-ans').value);
  if (isNaN(val)) return;
  if (val === drill.qAns) {
    drill.score += 10 + drill.streak * 2;
    drill.streak++;
  } else {
    drill.streak = 0;
  }
  document.getElementById('drill-score').textContent = drill.score;
  document.getElementById('drill-streak').textContent = drill.streak;
  nextDrillQ();
}

/* ══════════ UTILITIES ══════════ */
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

/* ── init ── */
window.addEventListener('resize', () => { animFrame = 0; });
makeQuiz();
updatePanels();
requestAnimationFrame(loop);
</script>
