<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>知识树总复习 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 280px; height: 100%; }
    .canvas-area { padding: 16px; overflow-y: auto; background: linear-gradient(135deg, #f0fdf4 0%, #fdfaf4 100%); position: relative; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 10px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #bbf7d0; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .topic-btn { padding: 8px 12px; border-radius: 8px; border: 1.5px solid #e2e8f0; background: #fff; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; text-align: left; }
    .topic-btn:hover { border-color: #22c55e; }
    .topic-btn.active { background: #f0fdf4; border-color: #22c55e; color: #22c55e; }
    .detail-card { background: #fff; border: 2px solid #22c55e; border-radius: 12px; padding: 16px; line-height: 2; font-size: 13px; }
    .detail-card h3 { font-size: 15px; color: #1a3a5c; margin-bottom: 8px; }
    .formula { font-family: 'Courier New', monospace; font-weight: 700; color: #f97316; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">🌳 知识树总复习</div>
      <div class="edu-toolbar-subtitle">下册 · 整理和复习</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-outline" onclick="expandAll()">展开全部</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">折叠全部</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area" style="padding:20px">
        <div id="treeContainer"></div>
      </div>

      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">六年级知识点</div>
          <div id="topicList"></div>
        </div>
        <div class="divider"></div>
        <div class="detail-card" id="detailCard">
          <h3>选择知识点查看详情</h3>
          点击左侧知识树或下方按钮查看对应知识点的公式和要点。
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const topics = [
  {
    id: 'frac', name: '分数运算', icon: '✖',
    children: [
      { id: 'frac-mul', name: '分数乘法' },
      { id: 'frac-div', name: '分数除法' },
      { id: 'frac-mix', name: '混合运算' },
    ]
  },
  {
    id: 'ratio', name: '比和比例', icon: '⚖',
    children: [
      { id: 'ratio-def', name: '比的认识' },
      { id: 'proportion', name: '比例的意义' },
      { id: 'scale', name: '比例尺' },
      { id: 'direct-inv', name: '正反比例' },
    ]
  },
  {
    id: 'circle', name: '圆', icon: '⭕',
    children: [
      { id: 'circle-prop', name: '圆的认识' },
      { id: 'circle-calc', name: '周长与面积' },
    ]
  },
  {
    id: 'percent', name: '百分数', icon: '💯',
    children: [
      { id: 'pct-intro', name: '百分数的认识' },
      { id: 'pct-app', name: '百分数应用' },
    ]
  },
  {
    id: 'shape', name: '图形与几何', icon: '📐',
    children: [
      { id: 'pos-dir', name: '位置与方向' },
      { id: 'cylinder', name: '圆柱' },
      { id: 'cone', name: '圆锥' },
    ]
  },
  {
    id: 'neg', name: '负数', icon: '🌡️',
    children: [
      { id: 'neg-num', name: '负数的认识' },
    ]
  },
  {
    id: 'stats', name: '统计', icon: '📊',
    children: [
      { id: 'fan', name: '扇形统计图' },
    ]
  },
  {
    id: 'math-fun', name: '数学广角', icon: '🧩',
    children: [
      { id: 'num-shape', name: '数与形' },
      { id: 'pigeon', name: '鸽巢原理' },
    ]
  },
];

const details = {
  'frac': '<h3>分数运算</h3><b>乘法：</b><span class="formula">a/b × c/d = ac/bd</span><br/><b>除法：</b><span class="formula">a/b ÷ c/d = a/b × d/c</span><br/><b>混合运算：</b>先括号，再乘除，后加减',
  'ratio': '<h3>比和比例</h3><b>比：</b><span class="formula">a:b</span>，前项÷后项=比值<br/><b>比例：</b><span class="formula">a:b = c:d</span>，内项积=外项积<br/><b>比例尺：</b>图上距离:实际距离<br/><b>正比例：</span>y/x=k<br/><b>反比例：</b>xy=k',
  'circle': '<h3>圆</h3><b>周长：</b><span class="formula">C = 2πr = πd</span><br/><b>面积：</b><span class="formula">S = πr²</span><br/><b>直径：</b><span class="formula">d = 2r</span><br/>π ≈ 3.14159',
  'percent': '<h3>百分数</h3><b>百分数→小数：</b>去%，小数点左移两位<br/><b>百分数→分数：</b>写成分母100的分数再化简<br/><b>折扣：</b>几折=原价×几/10<br/><b>税率：</b>税额=收入×税率<br/><b>利率：</b>利息=本金×利率×时间',
  'shape': '<h3>图形与几何</h3><b>圆柱侧面积：</b><span class="formula">S侧 = 2πrh</span><br/><b>圆柱表面积：</b><span class="formula">S = 2πr(r+h)</span><br/><b>圆柱体积：</b><span class="formula">V = πr²h</span><br/><b>圆锥体积：</b><span class="formula">V = ⅓πr²h</span>',
  'neg': '<h3>负数</h3><b>正数</b> > 0，<b>负数</b> < 0<br/><b>0</b> 既不是正数也不是负数<br/><b>数轴：</b>右边 > 左边<br/><b>相反数：</b>符号不同，绝对值相同<br/><b>绝对值：</b>到原点的距离',
  'stats': '<h3>统计</h3><b>扇形统计图：</b>用扇形面积表示各部分占比<br/><b>圆心角：</b>百分比 × 360°<br/>所有百分比之和 = 100%',
  'math-fun': '<h3>数学广角</h3><b>数与形：</b>1+3+5+...+(2n-1) = n²<br/><b>鸽巢原理：</b>n+1个物品放入n个抽屉，至少1个抽屉≥2个<br/>k个物品放入n个抽屉，至少1个抽屉≥⌈k/n⌉',
  'frac-mul': '<h3>分数乘法</h3><span class="formula">a/b × c/d = (a×c)/(b×d)</span><br/>分数×整数：分子×整数/分母不变',
  'frac-div': '<h3>分数除法</h3><span class="formula">a/b ÷ c/d = a/b × d/c</span><br/>除以一个数 = 乘以它的倒数',
  'frac-mix': '<h3>混合运算</h3>先括号 → 再乘除 → 后加减<br/>从左到右依次计算',
  'ratio-def': '<h3>比的认识</h3><span class="formula">a:b</span>，前项÷后项=比值<br/>化简比：找最大公因数',
  'proportion': '<h3>比例的意义</h3><span class="formula">a:b = c:d ⟹ ad = bc</span><br/>内项积 = 外项积',
  'scale': '<h3>比例尺</h3><span class="formula">比例尺 = 图上距离 : 实际距离</span>',
  'direct-inv': '<h3>正反比例</h3><b>正比例：</b><span class="formula">y/x = k</span>（比值一定）<br/><b>反比例：</b><span class="formula">xy = k</span>（乘积一定）',
  'circle-prop': '<h3>圆的认识</h3>圆心确定位置，半径确定大小<br/>直径 = 2 × 半径',
  'circle-calc': '<h3>周长与面积</h3><span class="formula">C = 2πr</span><br/><span class="formula">S = πr²</span>',
  'pos-dir': '<h3>位置与方向</h3>用方向+距离确定位置<br/>北偏东/西、南偏东/西',
  'cylinder': '<h3>圆柱</h3>侧面展开是长方形<br/><span class="formula">V = πr²h</span><br/><span class="formula">S = 2πr(r+h)</span>',
  'cone': '<h3>圆锥</h3><span class="formula">V = ⅓πr²h</span><br/>等底等高：V圆锥 = ⅓ V圆柱',
  'neg-num': '<h3>负数的认识</h3>正数 > 0 > 负数<br/>|a| 表示绝对值',
  'fan': '<h3>扇形统计图</h3>圆心角 = 百分比 × 360°',
  'num-shape': '<h3>数与形</h3><span class="formula">1+3+5+...+(2n-1) = n²</span>',
  'pigeon': '<h3>鸽巢原理</h3>n+1→n个抽屉，至少1个≥2<br/>k→n个抽屉，至少1个≥⌈k/n⌉',
};

let expanded = new Set();

function buildTree() {
  const container = document.getElementById('treeContainer');
  container.innerHTML = '';
  topics.forEach(t => {
    const div = document.createElement('div');
    div.style.marginBottom = '4px';
    const isExpanded = expanded.has(t.id);
    div.innerHTML = `
      <div onclick="toggle('${t.id}')" style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;transition:all .15s;${isExpanded ? 'border-color:#22c55e;background:#f0fdf4;' : ''}">
        <span style="font-size:12px;color:#94a3b8;transition:transform .2s;${isExpanded ? 'transform:rotate(90deg)' : ''}">▶</span>
        <span style="font-size:18px">${t.icon}</span>
        <span style="font-size:14px;font-weight:700;color:#1a3a5c">${t.name}</span>
        <span style="font-size:11px;color:#94a3b8;margin-left:auto">${t.children.length}个知识点</span>
      </div>
      ${isExpanded ? `<div style="margin-left:32px;margin-top:4px">${t.children.map(c =>
        `<div onclick="showDetail('${c.id}')" style="padding:6px 12px;margin:2px 0;background:#fff;border:1px solid #f1f5f9;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:#334155;transition:all .15s" onmouseover="this.style.background='#f0fdf4'" onmouseout="this.style.background='#fff'">• ${c.name}</div>`
      ).join('')}</div>` : ''}`;
    container.appendChild(div);
  });
}

function buildTopicList() {
  const el = document.getElementById('topicList');
  el.innerHTML = '';
  topics.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'topic-btn' + (expanded.has(t.id) ? ' active' : '');
    btn.innerHTML = `${t.icon} ${t.name}`;
    btn.onclick = () => { toggle(t.id); };
    el.appendChild(btn);
  });
}

function toggle(id) {
  if (expanded.has(id)) expanded.delete(id);
  else expanded.add(id);
  buildTree();
  buildTopicList();
  showDetail(id);
}

function showDetail(id) {
  const card = document.getElementById('detailCard');
  card.innerHTML = details[id] || `<h3>${id}</h3>暂无详情`;
}

function expandAll() {
  topics.forEach(t => expanded.add(t.id));
  buildTree();
  buildTopicList();
}

function resetAll() {
  expanded.clear();
  buildTree();
  buildTopicList();
  document.getElementById('detailCard').innerHTML = '<h3>选择知识点查看详情</h3>点击知识树或按钮查看公式和要点。';
}

buildTree();
buildTopicList();
</script>
</body>
</html>
