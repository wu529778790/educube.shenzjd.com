<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>除数是一位数的除法 — 教立方</title>
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr 260px; height: 100%; }
    .canvas-area { padding: 24px; overflow-y: auto; background: linear-gradient(135deg, #fdf2f8 0%, #fdfaf4 100%); display: flex; flex-direction: column; align-items: center; }
    .control-panel { background: #fdfaf4; border-left: 1px solid #e2e8f0; padding: 14px; display: flex; flex-direction: column; gap: 14px; overflow: auto; }
    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; }
    .divider { height: 1px; background: #e2e8f0; }
    .info-box { background: #fff; border: 1px solid #fbcfe8; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.8; color: #334155; }
    .input-row { display: flex; align-items: center; gap: 10px; justify-content: center; margin: 10px 0; }
    .input-row input { width: 100px; text-align: center; font-size: 22px; font-weight: 800; border: 2px solid #e2e8f0; border-radius: 10px; padding: 8px; font-family: 'Courier New', monospace; }
    .input-row span { font-size: 24px; font-weight: 800; color: #94a3b8; }
    .preset-btn { padding: 8px 0; border-radius: 8px; font-size: 13px; font-weight: 600; background: #fff; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all .15s; }
    .preset-btn:hover { border-color: #ec4899; color: #ec4899; }
    .result-box { background: #f0fdf4; border: 2px solid #22c55e; border-radius: 12px; padding: 14px; text-align: center; margin-top: 12px; }
    .result-big { font-size: 24px; font-weight: 800; color: #22c55e; }
    /* vertical division */
    .vdiv { display: flex; flex-direction: column; align-items: flex-start; font-family: 'Courier New', monospace; font-size: 20px; font-weight: 700; line-height: 1.6; background: #fff; border: 2px solid #ec4899; border-radius: 14px; padding: 20px 24px; min-width: 220px; }
    .vdiv-row { display: flex; align-items: center; white-space: pre; }
    .hl-pink { color: #ec4899; }
    .hl-green { color: #22c55e; }
    .hl-blue { color: #3b82f6; }
    .step-card { background: #fff; border-radius: 14px; padding: 16px; width: 100%; max-width: 500px; }
    .step-line { margin: 4px 0; font-size: 14px; line-height: 1.8; }
    .step-line .hl { background: #fdf2f8; padding: 2px 8px; border-radius: 6px; font-weight: 700; color: #ec4899; }
    .step-num { display: inline-block; width: 22px; height: 22px; background: #ec4899; color: #fff; border-radius: 50%; text-align: center; font-size: 12px; font-weight: 800; line-height: 22px; margin-right: 6px; }
    .verify-box { background: #eff6ff; border: 2px solid #3b82f6; border-radius: 12px; padding: 12px; text-align: center; margin-top: 12px; font-size: 14px; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="edu-toolbar-title">➗ 除数是一位数的除法</div>
      <div class="edu-toolbar-subtitle">下册 · 第二单元</div>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-primary" onclick="calculate()">计算</button>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <div class="input-row">
          <input type="number" id="numA" value="96" min="10" max="999" oninput="calculate()"/>
          <span>÷</span>
          <input type="number" id="numB" value="4" min="2" max="9" oninput="calculate()"/>
          <span>=</span>
          <span style="color:#22c55e;font-size:22px;font-weight:800" id="quickResult">24</span>
        </div>
        <div id="stepArea"></div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">预设例题</div>
          <button class="preset-btn" onclick="load(96,4)">96 ÷ 4</button>
          <button class="preset-btn" onclick="load(156,3)">156 ÷ 3</button>
          <button class="preset-btn" onclick="load(85,7)">85 ÷ 7</button>
        </div>
        <div class="divider"></div>
        <div class="info-box">
          <b>竖式除法步骤</b><br/>
          ● 从被除数最高位开始除<br/>
          ● 每次用除数去除一位或几位<br/>
          ● 除到哪位商就写在那位上面<br/>
          ● 每次除后余数要比除数小<br/>
          ● 验算：商×除数+余数=被除数
        </div>
      </div>
    </div>
  </div>
</div>
<script>
function calculate() {
  const a = parseInt(document.getElementById('numA').value) || 0;
  const b = parseInt(document.getElementById('numB').value) || 0;
  if (b === 0 || b > 9 || b < 2) { document.getElementById('stepArea').innerHTML = '<div style="color:#ef4444;font-weight:700">除数必须是2-9的一位数</div>'; return; }
  if (a < 10) { document.getElementById('stepArea').innerHTML = '<div style="color:#ef4444;font-weight:700">被除数至少是两位数</div>'; return; }

  const quotient = Math.floor(a / b);
  const remainder = a % b;
  document.getElementById('quickResult').textContent = remainder ? `${quotient}...${remainder}` : quotient;

  const digits = String(a).split('').map(Number);
  const steps = [];
  let carry = 0, qStr = '';

  for (let i = 0; i < digits.length; i++) {
    const cur = carry * 10 + digits[i];
    const q = Math.floor(cur / b);
    const prod = q * b;
    const rem = cur - prod;
    steps.push({ pos: i, cur, q, prod, rem, digit: digits[i] });
    carry = rem;
    qStr += q;
  }

  // Build vertical division display
  const qDigits = qStr.split('');
  const padLeft = digits.length;

  let vdivHtml = '<div class="vdiv">';
  // quotient line
  vdivHtml += `<div class="vdiv-row"><span style="visibility:hidden">${String(b)}</span>  <span class="hl-pink">${' '.repeat(0)}${qDigits.join(' ')}</span></div>`;
  // division bar
  vdivHtml += `<div class="vdiv-row" style="border-top:2px solid #334155;border-left:2px solid #334155;padding-left:4px"><span>${b}</span> ) <span>${digits.join(' ')}</span></div>`;

  // subtraction lines
  let indent = 0;
  for (let i = 0; i < steps.length; i++) {
    const s = steps[i];
    if (s.q === 0 && i === 0 && digits.length > 1) { indent++; continue; }
    const prodStr = String(s.prod);
    const offset = i + 1 - prodStr.length;
    vdivHtml += `<div class="vdiv-row" style="padding-left:${(indent + offset) * 14 + 56}px"><span class="hl-green">${prodStr}</span></div>`;
    // remainder line
    const remStr = i < steps.length - 1 ? String(s.rem) + digits[i + 1] : (s.rem > 0 ? String(s.rem) : '0');
    if (i < steps.length - 1) {
      vdivHtml += `<div class="vdiv-row" style="padding-left:${(indent + i + 1 - String(s.cur).length) * 14 + 56}px;border-top:1px solid #94a3b8"><span class="hl-blue">${s.cur}</span></div>`;
    } else {
      vdivHtml += `<div class="vdiv-row" style="padding-left:${(indent + i + 1 - 1) * 14 + 56}px;border-top:1px solid #94a3b8"><span>${s.rem > 0 ? s.rem + ' ...余数' : '0'}</span></div>`;
    }
  }
  vdivHtml += '</div>';

  // Step explanation
  let stepHtml = '<div class="step-card" style="margin-top:16px">';
  stepHtml += '<div style="font-size:15px;font-weight:700;color:#334155;margin-bottom:8px">分步计算</div>';
  carry = 0;
  for (let i = 0; i < steps.length; i++) {
    const s = steps[i];
    stepHtml += `<div class="step-line"><span class="step-num">${i + 1}</span>`;
    if (i === 0) stepHtml += `先用 ${b} 除被除数最高位 <span class="hl">${s.digit}</span>`;
    else stepHtml += `落下 ${s.digit}，与余数组成 <span class="hl">${s.cur}</span>`;
    stepHtml += `：${s.cur} ÷ ${b} = <span class="hl">${s.q}</span>，余 <span class="hl">${s.rem}</span></div>`;
  }
  stepHtml += '</div>';

  // Result box
  let resultHtml = `<div class="result-box"><div style="font-size:13px;color:#64748b">${a} ÷ ${b}</div><div class="result-big">${quotient}${remainder ? ' 余 ' + remainder : ''}</div></div>`;

  // Verification
  let verifyHtml = `<div class="verify-box"><b>验算：</b>${quotient} × ${b} + ${remainder} = ${quotient * b + remainder}${quotient * b + remainder === a ? ' ✅' : ''}</div>`;

  document.getElementById('stepArea').innerHTML = vdivHtml + stepHtml + resultHtml + verifyHtml;
}

function load(a, b) {
  document.getElementById('numA').value = a;
  document.getElementById('numB').value = b;
  calculate();
}

function resetAll() { load(96, 4); }
calculate();
</script>
</body>
</html>
