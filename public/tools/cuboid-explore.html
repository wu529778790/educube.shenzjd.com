<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>长方体的认识</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
  .main-layout { display:grid; grid-template-columns:1fr 280px; height:100%; }
  .canvas-area { position:relative; background:linear-gradient(135deg,#eff6ff,#dbeafe); overflow:hidden; }
  .control-panel {
    background:#fff; border-left:1px solid #e2e8f0;
    padding:16px; display:flex; flex-direction:column; gap:12px; overflow:auto;
  }
  .ctrl-section { display:flex; flex-direction:column; gap:6px; }
  .ctrl-label { font-size:11px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.05em; }
  .divider { height:1px; background:#e2e8f0; }
  .info-box {
    background:#eff6ff; border:1px solid #bfdbfe; border-radius:10px;
    padding:10px 12px; font-size:12px; color:#64748b; line-height:1.9;
  }
  .info-box strong { color:#2563EB; }
  .slider-row { display:flex; align-items:center; gap:8px; }
  .slider-row label { font-size:12px; font-weight:600; color:#64748b; min-width:30px; }
  .slider-row input[type=range] { flex:1; }
  .slider-row .val { font-size:14px; font-weight:700; color:#2563EB; min-width:24px; text-align:right; }
  .highlight-btn {
    padding:6px 10px; border-radius:8px; font-size:11px; font-weight:600;
    cursor:pointer; border:1.5px solid #e2e8f0; background:#fff; color:#64748b;
    transition:all .15s; font-family:var(--edu-font); text-align:center;
  }
  .highlight-btn.active { background:#3B82F6; color:#fff; border-color:#3B82F6; }
</style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="edu-toolbar-title">📦 长方体的认识</span>
      <span class="edu-toolbar-subtitle">五下·第三单元</span>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="main-canvas" class="edu-canvas-full"></canvas>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">调整尺寸</div>
          <div class="slider-row"><label>长</label><input type="range" id="sl" min="2" max="8" value="5" oninput="update()"/><span class="val" id="vl">5</span></div>
          <div class="slider-row"><label>宽</label><input type="range" id="sw" min="2" max="6" value="3" oninput="update()"/><span class="val" id="vw">3</span></div>
          <div class="slider-row"><label>高</label><input type="range" id="sh" min="2" max="6" value="4" oninput="update()"/><span class="val" id="vh">4</span></div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">高亮显示</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;">
            <button class="highlight-btn" id="hb-vertex" onclick="setHighlight('vertex')">顶点</button>
            <button class="highlight-btn" id="hb-edge" onclick="setHighlight('edge')">棱</button>
            <button class="highlight-btn" id="hb-face" onclick="setHighlight('face')">面</button>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">基本特征</div>
          <div class="info-box" id="info-box">
            <div>顶点数：<strong>8</strong> 个</div>
            <div>棱数：<strong>12</strong> 条</div>
            <div>面数：<strong>6</strong> 个</div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">棱长明细</div>
          <div class="info-box" id="edge-detail" style="font-size:11px;"></div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">面积明细</div>
          <div class="info-box" id="face-detail" style="font-size:11px;"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../edu-lib/edu-tools.js"></script>
<script>
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
let W, H, highlight = '';

function setHighlight(h) {
  highlight = highlight === h ? '' : h;
  ['vertex','edge','face'].forEach(k => {
    document.getElementById('hb-' + k).classList.toggle('active', highlight === k);
  });
  render();
}

function update() {
  const l = parseInt(document.getElementById('sl').value);
  const w = parseInt(document.getElementById('sw').value);
  const h = parseInt(document.getElementById('sh').value);
  document.getElementById('vl').textContent = l;
  document.getElementById('vw').textContent = w;
  document.getElementById('vh').textContent = h;

  const edgeHtml = `
    <div>长棱(4条)：<strong>${l}×4=${l*4}</strong></div>
    <div>宽棱(4条)：<strong>${w}×4=${w*4}</strong></div>
    <div>高棱(4条)：<strong>${h}×4=${h*4}</strong></div>
    <div>棱长总和：<strong>${(l+w+h)*4}</strong></div>`;
  document.getElementById('edge-detail').innerHTML = edgeHtml;

  const lw=l*w, lh=l*h, wh=w*h;
  const faceHtml = `
    <div>上/下面：<strong>${l}×${w}=${lw}</strong></div>
    <div>前/后面：<strong>${l}×${h}=${lh}</strong></div>
    <div>左/右面：<strong>${w}×${h}=${wh}</strong></div>
    <div>表面积：<strong>2(${lw}+${lh}+${wh})=${2*(lw+lh+wh)}</strong></div>`;
  document.getElementById('face-detail').innerHTML = faceHtml;
  render();
}

function render() {
  const dpr = window.devicePixelRatio || 1;
  W = canvas.clientWidth; H = canvas.clientHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const l = parseInt(document.getElementById('sl').value);
  const w = parseInt(document.getElementById('sw').value);
  const h = parseInt(document.getElementById('sh').value);
  const scale = Math.min((W - 200) / (l + w), (H - 200) / (h + w * 0.6), 45);

  // Isometric projection helpers
  const ox = W / 2 - (l - w) * scale * 0.4;
  const oy = H / 2 + h * scale * 0.3;
  function proj(x, y, z) {
    return [ox + (x - y) * scale * 0.7, oy - z * scale + (x + y) * scale * 0.25];
  }

  // 8 vertices
  const V = [
    proj(0,0,0), proj(l,0,0), proj(l,w,0), proj(0,w,0),
    proj(0,0,h), proj(l,0,h), proj(l,w,h), proj(0,w,h)
  ];
  const labels = ['A','B','C','D','E','F','G','H'];

  // 6 faces (vertex indices)
  const faces = [
    { idx: [0,1,2,3], label: '底面', color: '#3B82F620' },
    { idx: [4,5,6,7], label: '顶面', color: '#3B82F630' },
    { idx: [0,1,5,4], label: '前面', color: '#2563EB25' },
    { idx: [2,3,7,6], label: '后面', color: '#2563EB15' },
    { idx: [0,3,7,4], label: '左面', color: '#1d4ed820' },
    { idx: [1,2,6,5], label: '右面', color: '#1d4ed820' },
  ];

  // 12 edges (vertex pairs)
  const edges = [
    [0,1],[1,2],[2,3],[3,0], // bottom
    [4,5],[5,6],[6,7],[7,4], // top
    [0,4],[1,5],[2,6],[3,7], // vertical
  ];

  // Draw faces
  if (highlight === 'face') {
    faces.forEach(f => {
      ctx.beginPath();
      f.idx.forEach((vi, i) => { const p = V[vi]; i === 0 ? ctx.moveTo(p[0], p[1]) : ctx.lineTo(p[0], p[1]); });
      ctx.closePath();
      ctx.fillStyle = '#3B82F650';
      ctx.fill();
      // Label at center
      const cx = f.idx.reduce((s, vi) => s + V[vi][0], 0) / 4;
      const cy = f.idx.reduce((s, vi) => s + V[vi][1], 0) / 4;
      ctx.fillStyle = '#2563EB'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(f.label, cx, cy);
    });
  }

  // Draw edges
  edges.forEach(([a, b]) => {
    ctx.beginPath(); ctx.moveTo(V[a][0], V[a][1]); ctx.lineTo(V[b][0], V[b][1]);
    ctx.strokeStyle = highlight === 'edge' ? '#3B82F6' : '#1e293b';
    ctx.lineWidth = highlight === 'edge' ? 3 : 2;
    ctx.stroke();
  });

  // Draw edge lengths on highlighted edges
  if (highlight === 'edge') {
    const edgeLabels = [
      {a:0,b:1,text:`长=${l}`},{a:1,b:2,text:`宽=${w}`},{a:0,b:4,text:`高=${h}`},
      {a:3,b:2,text:`长=${l}`},{a:0,b:3,text:`宽=${w}`},{a:1,b:5,text:`高=${h}`},
      {a:2,b:6,text:`高=${h}`},{a:3,b:7,text:`高=${h}`},
      {a:4,b:5,text:`长=${l}`},{a:5,b:6,text:`宽=${w}`},{a:6,b:7,text:`长=${l}`},{a:7,b:4,text:`宽=${w}`},
    ];
    edgeLabels.forEach(e => {
      const mx = (V[e.a][0] + V[e.b][0]) / 2;
      const my = (V[e.a][1] + V[e.b][1]) / 2;
      ctx.fillStyle = '#fff'; ctx.fillRect(mx - 16, my - 8, 32, 14);
      ctx.fillStyle = '#2563EB'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(e.text, mx, my + 3);
    });
  }

  // Draw vertices
  V.forEach((p, i) => {
    const r = highlight === 'vertex' ? 8 : 4;
    ctx.beginPath(); ctx.arc(p[0], p[1], r, 0, Math.PI * 2);
    ctx.fillStyle = highlight === 'vertex' ? '#3B82F6' : '#2563EB';
    ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    if (highlight === 'vertex') {
      ctx.fillStyle = '#1e293b'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(labels[i], p[0], p[1] - 14);
    }
  });

  // Title
  ctx.fillStyle = '#1e293b'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(`长方体 (${l} × ${w} × ${h})`, W / 2, 28);
}

function resetAll() {
  document.getElementById('sl').value = 5;
  document.getElementById('sw').value = 3;
  document.getElementById('sh').value = 4;
  highlight = '';
  ['vertex','edge','face'].forEach(k => document.getElementById('hb-' + k).classList.remove('active'));
  update();
}

window.addEventListener('resize', render);
update();
setTimeout(render, 50);
</script>
</body>
</html>
