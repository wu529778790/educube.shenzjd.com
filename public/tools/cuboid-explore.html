<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>长方体的认识 — 教立方</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<script src="../edu-lib/three.min.js"></script>
<script src="../edu-lib/OrbitControls.js"></script>
<script src="../edu-lib/edu-3d.js"></script>
<script src="../edu-lib/edu-tools.js"></script>
<style>
  .main-layout { display:grid; grid-template-columns:1fr 280px; height:100%; }
  .canvas-area { position:relative; background:linear-gradient(135deg,#eff6ff,#dbeafe); overflow:hidden; }
  .canvas-area canvas { width:100%; height:100%; display:block; }
  .control-panel { background:#fff; border-left:1px solid #e2e8f0; padding:16px; display:flex; flex-direction:column; gap:12px; overflow:auto; }
  .ctrl-section { display:flex; flex-direction:column; gap:6px; }
  .ctrl-label { font-size:11px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.05em; }
  .divider { height:1px; background:#e2e8f0; }
  .info-box { background:#eff6ff; border:1px solid #bfdbfe; border-radius:10px; padding:10px 12px; font-size:12px; color:#64748b; line-height:1.9; }
  .info-box strong { color:#2563EB; }
  .slider-row { display:flex; align-items:center; gap:8px; }
  .slider-row label { font-size:12px; font-weight:600; color:#64748b; min-width:30px; }
  .slider-row input[type=range] { flex:1; }
  .slider-row .val { font-size:14px; font-weight:700; color:#2563EB; min-width:24px; text-align:right; }
  .highlight-btn {
    padding:6px 10px; border-radius:8px; font-size:11px; font-weight:600;
    cursor:pointer; border:1.5px solid #e2e8f0; background:#fff; color:#64748b;
    transition:all .15s; font-family:var(--edu-font); text-align:center;
  }
  .highlight-btn.active { background:#3B82F6; color:#fff; border-color:#3B82F6; }
  .orbit-hint {
    position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,.85); padding:6px 14px; border-radius:20px;
    font-size:11px; color:#64748b; pointer-events:none;
  }
</style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="edu-toolbar-title">📦 长方体的认识</span>
      <span class="edu-toolbar-subtitle">五下 · 第三单元</span>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="c3d"></canvas>
        <div class="orbit-hint">拖拽旋转 · 双指缩放</div>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">调整尺寸</div>
          <div class="slider-row"><label>长</label><input type="range" id="sl" min="2" max="8" value="5" step="0.5" oninput="rebuild()"/><span class="val" id="vl">5</span></div>
          <div class="slider-row"><label>宽</label><input type="range" id="sw" min="2" max="6" value="3" step="0.5" oninput="rebuild()"/><span class="val" id="vw">3</span></div>
          <div class="slider-row"><label>高</label><input type="range" id="sh" min="2" max="6" value="4" step="0.5" oninput="rebuild()"/><span class="val" id="vh">4</span></div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">高亮显示</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px">
            <button class="highlight-btn" id="hb-vertex" onclick="setHighlight('vertex')">顶点</button>
            <button class="highlight-btn" id="hb-edge" onclick="setHighlight('edge')">棱</button>
            <button class="highlight-btn" id="hb-face" onclick="setHighlight('face')">面</button>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">基本特征</div>
          <div class="info-box">
            <div>顶点数：<strong>8</strong> 个</div>
            <div>棱数：<strong>12</strong> 条</div>
            <div>面数：<strong>6</strong> 个</div>
            <div>棱长总和：<strong id="total-edge">48</strong></div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">棱长明细</div>
          <div class="info-box" id="edge-detail" style="font-size:11px"></div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">面积明细</div>
          <div class="info-box" id="face-detail" style="font-size:11px"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
var _s, _scene, _camera, _renderer, _controls;
var _cuboid, _edges, _vertexGroup, _faceGroup, _labelGroup, _arrowGroup;
var _highlight = '';

function init() {
  var canvas = document.getElementById('c3d');
  var r = Edu3D.createScene(canvas, { bg: 0xf0f5ff, camX: 6, camY: 5, camZ: 6 });
  _scene = r.scene; _camera = r.camera; _renderer = r.renderer; _controls = r.controls;
  Edu3D.addLights(_scene);
  Edu3D.addGrid(_scene, 12, 12);
  _s = { scene: _scene };

  _arrowGroup = new THREE.Group();
  _scene.add(_arrowGroup);

  rebuild();
  Edu3D.startLoop(_scene, _camera, _renderer, _controls);
}

function rebuild() {
  var l = parseFloat(document.getElementById('sl').value);
  var w = parseFloat(document.getElementById('sw').value);
  var h = parseFloat(document.getElementById('sh').value);
  document.getElementById('vl').textContent = l;
  document.getElementById('vw').textContent = w;
  document.getElementById('vh').textContent = h;
  updateInfo(l, w, h);
  buildCuboid(l, w, h);
}

function buildCuboid(l, w, h) {
  if (_cuboid) { _scene.remove(_cuboid); _scene.remove(_edges); }
  if (_vertexGroup) _scene.remove(_vertexGroup);
  if (_faceGroup) _scene.remove(_faceGroup);
  if (_labelGroup) _scene.remove(_labelGroup);
  while (_arrowGroup.children.length) _arrowGroup.remove(_arrowGroup.children[0]);

  var halfL = l / 2, halfW = w / 2, halfH = h / 2;

  // 长方体网格
  var geo = new THREE.BoxGeometry(l, h, w);
  var mat = new THREE.MeshLambertMaterial({ color: 0x3B82F6, transparent: true, opacity: 0.35 });
  _cuboid = new THREE.Mesh(geo, mat);
  _cuboid.castShadow = true;
  _scene.add(_cuboid);

  // 边框
  _edges = Edu3D.edges(geo, 0x1e3a5c);
  _edges.visible = _highlight !== 'face';
  _scene.add(_edges);

  // 尺寸标注箭头
  // 长度标注（底部前方）
  var lArrow = createDimensionLine(
    new THREE.Vector3(-halfL, -halfH - 0.4, halfW + 0.2),
    new THREE.Vector3(halfL, -halfH - 0.4, halfW + 0.2),
    '长=' + l, '#ef4444'
  );
  _arrowGroup.add(lArrow);

  // 宽度标注（底部右侧）
  var wArrow = createDimensionLine(
    new THREE.Vector3(halfL + 0.2, -halfH - 0.4, -halfW),
    new THREE.Vector3(halfL + 0.2, -halfH - 0.4, halfW),
    '宽=' + w, '#22c55e'
  );
  _arrowGroup.add(wArrow);

  // 高度标注（右侧前方）
  var hArrow = createDimensionLine(
    new THREE.Vector3(halfL + 0.4, -halfH, halfW + 0.2),
    new THREE.Vector3(halfL + 0.4, halfH, halfW + 0.2),
    '高=' + h, '#3b82f6'
  );
  _arrowGroup.add(hArrow);

  // 顶点球
  _vertexGroup = new THREE.Group();
  var verts = [
    [-halfL,-halfH,-halfW],[halfL,-halfH,-halfW],
    [halfL,-halfH,halfW],[-halfL,-halfH,halfW],
    [-halfL,halfH,-halfW],[halfL,halfH,-halfW],
    [halfL,halfH,halfW],[-halfL,halfH,halfW],
  ];
  var labels = ['A','B','C','D','E','F','G','H'];
  verts.forEach(function(v, i) {
    var sg = new THREE.SphereGeometry(0.1, 12, 12);
    var sm = new THREE.MeshLambertMaterial({ color: 0x2563EB });
    var sp = new THREE.Mesh(sg, sm);
    sp.position.set(v[0], v[1], v[2]);
    _vertexGroup.add(sp);

    var label = Edu3D.textSprite(labels[i], { color: '#1e293b', scale: 0.4 });
    label.position.set(v[0] * 1.15, v[1] * 1.15, v[2] * 1.15);
    _vertexGroup.add(label);
  });
  _vertexGroup.visible = _highlight === 'vertex';
  _scene.add(_vertexGroup);

  // 高亮面
  _faceGroup = new THREE.Group();
  var faceData = [
    { pos:[0,halfH,0], rot:[0,0,0], label:'上面 '+l+'×'+w },
    { pos:[0,-halfH,0], rot:[0,0,0], label:'下面 '+l+'×'+w },
    { pos:[0,0,halfW], rot:[-Math.PI/2,0,0], label:'后面 '+l+'×'+h },
    { pos:[0,0,-halfW], rot:[Math.PI/2,0,0], label:'前面 '+l+'×'+h },
    { pos:[-halfL,0,0], rot:[0,0,Math.PI/2], label:'左面 '+w+'×'+h },
    { pos:[halfL,0,0], rot:[0,0,-Math.PI/2], label:'右面 '+w+'×'+h },
  ];
  var faceColors = [0x60a5fa,0x60a5fa,0x3b82f6,0x3b82f6,0x2563eb,0x2563eb];
  faceData.forEach(function(f, i) {
    var sizeA = (i<2)?l:(i<4)?l:w;
    var sizeB = (i<2)?w:(i<4)?h:h;
    var fg = new THREE.PlaneGeometry(sizeA*0.9, sizeB*0.9);
    var fm = new THREE.MeshBasicMaterial({ color: faceColors[i], transparent:true, opacity:0.5, side:THREE.DoubleSide });
    var fp = new THREE.Mesh(fg, fm);
    fp.position.set(f.pos[0], f.pos[1], f.pos[2]);
    fp.rotation.set(f.rot[0], f.rot[1], f.rot[2]);
    _faceGroup.add(fp);

    var lb = Edu3D.textSprite(f.label, { color:'#1e40af', scale:0.5 });
    lb.position.set(f.pos[0]*1.3, f.pos[1]*1.3, f.pos[2]*1.3);
    _faceGroup.add(lb);
  });
  _faceGroup.visible = _highlight === 'face';
  _scene.add(_faceGroup);
}

function createDimensionLine(from, to, text, color) {
  var group = new THREE.Group();

  var lineGeo = new THREE.BufferGeometry().setFromPoints([from, to]);
  var lineMat = new THREE.LineBasicMaterial({ color: new THREE.Color(color) });
  group.add(new THREE.Line(lineGeo, lineMat));

  // 端点标记
  [from, to].forEach(function(p) {
    var sg = new THREE.SphereGeometry(0.06, 8, 8);
    var sm = new THREE.MeshBasicMaterial({ color: new THREE.Color(color) });
    var sp = new THREE.Mesh(sg, sm);
    sp.position.copy(p);
    group.add(sp);
  });

  // 标签
  var mid = from.clone().add(to).multiplyScalar(0.5);
  var label = Edu3D.textSprite(text, { color: color, scale: 0.4 });
  label.position.copy(mid);
  label.position.y -= 0.3;
  group.add(label);

  return group;
}

function updateInfo(l, w, h) {
  var totalEdge = (l + w + h) * 4;
  document.getElementById('total-edge').textContent = totalEdge;
  document.getElementById('edge-detail').innerHTML =
    '<div>长棱(4条)：<strong>' + l + '×4=' + (l * 4) + '</strong></div>' +
    '<div>宽棱(4条)：<strong>' + w + '×4=' + (w * 4) + '</strong></div>' +
    '<div>高棱(4条)：<strong>' + h + '×4=' + (h * 4) + '</strong></div>' +
    '<div>棱长总和：<strong>' + totalEdge + '</strong></div>';

  var lw = l * w, lh = l * h, wh = w * h;
  document.getElementById('face-detail').innerHTML =
    '<div>上/下面：<strong>' + l + '×' + w + '=' + lw + '</strong></div>' +
    '<div>前/后面：<strong>' + l + '×' + h + '=' + lh + '</strong></div>' +
    '<div>左/右面：<strong>' + w + '×' + h + '=' + wh + '</strong></div>' +
    '<div>表面积：<strong>2(' + lw + '+' + lh + '+' + wh + ')=' + (2 * (lw + lh + wh)) + '</strong></div>';
}

function setHighlight(h) {
  _highlight = _highlight === h ? '' : h;
  ['vertex', 'edge', 'face'].forEach(function(k) {
    document.getElementById('hb-' + k).classList.toggle('active', _highlight === k);
  });
  if (_vertexGroup) _vertexGroup.visible = _highlight === 'vertex';
  if (_faceGroup) _faceGroup.visible = _highlight === 'face';
  if (_edges) _edges.visible = _highlight !== 'face';
  if (_cuboid) {
    _cuboid.material.opacity = _highlight === 'face' ? 0.15 : 0.35;
  }
  _arrowGroup.visible = _highlight !== 'face';
}

function resetAll() {
  document.getElementById('sl').value = 5;
  document.getElementById('sw').value = 3;
  document.getElementById('sh').value = 4;
  _highlight = '';
  ['vertex', 'edge', 'face'].forEach(function(k) {
    document.getElementById('hb-' + k).classList.remove('active');
  });
  rebuild();
}

init();
</script>
</body>
</html>
