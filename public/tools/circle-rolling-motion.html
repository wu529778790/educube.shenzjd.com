<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>圆绕图形运动 — 教立方</title>
  <!-- play-ref:jiaohukejian:1LWRXC4 | 自研 -->
  <link rel="stylesheet" href="../edu-lib/edu-base.css" />
  <script src="../edu-lib/three.min.js"></script>
  <script src="../edu-lib/OrbitControls.js"></script>
  <script src="../edu-lib/edu-3d.js"></script>
  <style>
    .main-layout { display: grid; grid-template-columns: 1fr minmax(280px, 300px); height: 100%; }
    .canvas-area { position: relative; background: #fefce8; overflow: hidden; min-height: 0; }
    .canvas-area canvas { width: 100%; height: 100%; display: block; }
    .panel { border-left: 1px solid var(--edu-border); padding: 12px; background: var(--edu-surface); overflow: auto; display: flex; flex-direction: column; gap: 8px; }
    .slider-block label { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; }
    .orbit-hint { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,.92); font-size: 10px; padding: 4px 10px; border-radius: 14px; color: #64748b; pointer-events: none; }
  </style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div class="edu-toolbar-lead">
      <span class="edu-toolbar-title">⭕ 圆绕图形运动</span>
      <span class="edu-toolbar-subtitle">外侧滚动 · 圆心轨迹 · 3D</span>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="c3d"></canvas>
        <div class="orbit-hint">蓝球沿长方体外侧滚动（示意）</div>
      </div>
      <div class="panel">
        <div class="slider-block"><label><span>圆半径 r</span><span id="rv">20</span></label><input type="range" id="rad" min="10" max="40" value="20" /></div>
        <div class="slider-block"><label><span>滚动角 θ°</span><span id="tv">0</span></label><input type="range" id="th" min="0" max="360" value="0" /></div>
        <p style="font-size:11px;color:var(--edu-text-muted)">圆心距轮廓为 r 的「等距线」；拖动 θ 观察位置。</p>
      </div>
    </div>
  </div>
</div>
<script>
(function () {
  var canvas = document.getElementById("c3d");
  var rad = document.getElementById("rad");
  var th = document.getElementById("th");

  var ctx = Edu3D.createScene(canvas, {
    bg: 0xfffbeb,
    fov: 42,
    camX: 7,
    camY: 5,
    camZ: 7,
    lookX: 0,
    lookY: 0.2,
    lookZ: 0,
    minDist: 2,
    maxDist: 22,
  });
  Edu3D.addLights(ctx.scene);
  Edu3D.addGrid(ctx.scene, 14, 14, 0xfde68a, -0.72);

  var world = new THREE.Group();
  ctx.scene.add(world);

  var box = null;
  var offsetBox = null;
  var ball = null;
  var centerDot = null;

  function sync() {
    var r = Number(rad.value) * 0.018;
    var t = (Number(th.value) * Math.PI) / 180;
    document.getElementById("rv").textContent = String(rad.value);
    document.getElementById("tv").textContent = String(th.value);

    var rw = 2.4;
    var rh = 1.4;
    var L = 2 * (rw + rh) + 2 * Math.PI * r;
    var dist = (t / (Math.PI * 2)) * L * 0.22;

    if (box) world.remove(box);
    if (offsetBox) world.remove(offsetBox);
    if (ball) world.remove(ball);
    if (centerDot) world.remove(centerDot);

    box = new THREE.Mesh(
      new THREE.BoxGeometry(rw, 0.12, rh),
      Edu3D.material(0x475569)
    );
    box.position.y = -0.66;
    box.receiveShadow = true;
    world.add(box);

    offsetBox = new THREE.Mesh(
      new THREE.BoxGeometry(rw + 2 * r, 0.06, rh + 2 * r),
      new THREE.MeshLambertMaterial({ color: 0x93c5fd, transparent: true, opacity: 0.35, wireframe: true })
    );
    offsetBox.position.y = -0.62;
    world.add(offsetBox);

    var ox = -rw / 2;
    var oy = -0.66 + r;
    var oz = -rh / 2;
    var cx = ox + r;
    var cy = oy;
    var cz = oz + r;
    var d = dist;
    var seg = rw;
    if (d < seg) {
      cx = ox + r + d;
      cz = oz;
    } else {
      d -= seg;
      seg = rh;
      if (d < seg) {
        cx = ox + rw + r;
        cz = oz + d;
      } else {
        d -= seg;
        if (d < rw) {
          cx = ox + rw + r - d;
          cz = oz + rh + r;
        } else {
          d -= rw;
          if (d < rh) {
            cx = ox - r;
            cz = oz + rh + r - d;
          } else {
            cx = ox - r + (d - rh);
            cz = oz;
          }
        }
      }
    }

    ball = new THREE.Mesh(new THREE.SphereGeometry(r, 28, 20), Edu3D.material(0x2563eb));
    ball.position.set(cx, cy, cz);
    ball.castShadow = true;
    world.add(ball);

    centerDot = new THREE.Mesh(new THREE.SphereGeometry(0.06, 12, 10), Edu3D.material(0x1e3a8a));
    centerDot.position.set(cx, cy, cz);
    world.add(centerDot);
  }

  rad.addEventListener("input", sync);
  th.addEventListener("input", sync);

  function onResize() {
    var w = canvas.clientWidth || 400;
    var h = canvas.clientHeight || 300;
    ctx.renderer.setSize(w, h, false);
    ctx.camera.aspect = w / h;
    ctx.camera.updateProjectionMatrix();
  }
  window.addEventListener("resize", onResize);
  sync();
  onResize();
  Edu3D.startLoop(ctx.scene, ctx.camera, ctx.renderer, ctx.controls, null);
})();
</script>
</body>
</html>
