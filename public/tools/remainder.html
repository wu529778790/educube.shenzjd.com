<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>有余数的除法 — 教立方</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
  .main-layout { display:grid; grid-template-columns:1fr 280px; height:100%; }
  .canvas-area { display:flex; flex-direction:column; padding:16px; overflow-y:auto; background:linear-gradient(135deg,#fefce8,#fdfaf4); align-items:center; gap:12px; }
  .control-panel { background:#fdfaf4; border-left:1px solid #e2e8f0; padding:14px; display:flex; flex-direction:column; gap:12px; overflow:auto; }
  .ctrl-section { display:flex; flex-direction:column; gap:6px; }
  .ctrl-label { font-size:11px; font-weight:700; color:#64748b; letter-spacing:.05em; }
  .divider { height:1px; background:#e2e8f0; }
  .preset-btn { padding:7px 0; border-radius:8px; font-size:13px; font-weight:600; background:#fff; border:1.5px solid #e2e8f0; cursor:pointer; transition:all .15s; width:100%; }
  .preset-btn:hover { border-color:#eab308; color:#ca8a04; }
  .info-box { background:#fff; border:1px solid #fde68a; border-radius:10px; padding:10px 12px; font-size:12px; color:#64748b; line-height:1.8; }
  .info-box strong { color:#ca8a04; }
  .tab-bar { display:flex; gap:4px; }
  .tab-btn { flex:1; padding:7px 0; border-radius:8px; border:1.5px solid #e2e8f0; background:#fff; font-size:12px; font-weight:600; cursor:pointer; transition:all .15s; }
  .tab-btn.active { background:#eab308; color:#fff; border-color:#eab308; }
  .tab-btn:hover:not(.active) { border-color:#eab308; color:#ca8a04; }
  .num-input { width:70px; padding:6px 10px; border:2px solid #e2e8f0; border-radius:8px; font-size:18px; font-weight:700; text-align:center; color:#1a3a5c; font-family:var(--edu-font); outline:none; transition:border-color .2s; }
  .num-input:focus { border-color:#eab308; }

  /* Equation display */
  .eq-card { background:#fff; border:2px solid #eab308; border-radius:14px; padding:14px 20px; text-align:center; width:100%; max-width:480px; }
  .eq-formula { font-size:26px; font-weight:800; color:#1a3a5c; font-family:'Courier New',monospace; }
  .eq-formula .q { color:#2563eb; }
  .eq-formula .r { color:#ef4444; }
  .eq-formula .op { color:#94a3b8; }
  .eq-check { font-size:13px; margin-top:6px; font-weight:600; }
  .eq-check.ok { color:#16a34a; }
  .eq-check.err { color:#ef4444; }

  /* Animated groups */
  .groups-container { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; width:100%; max-width:520px; }
  .group-box { background:#eff6ff; border:2px solid #93c5fd; border-radius:12px; padding:12px; display:flex; flex-wrap:wrap; gap:6px; justify-content:center; min-width:70px; position:relative; transition:all .3s; animation:groupIn .4s cubic-bezier(.34,1.56,.64,1); }
  @keyframes groupIn { from{opacity:0;transform:scale(.7)} to{opacity:1;transform:scale(1)} }
  .group-box.remain { background:#fef2f2; border-color:#fca5a5; }
  .group-label { position:absolute; top:-10px; left:8px; padding:1px 8px; border-radius:8px; font-size:10px; font-weight:700; color:#fff; }
  .group-label.blue { background:#3b82f6; }
  .group-label.red { background:#ef4444; }
  .item-dot { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; transition:all .3s; animation:dotIn .3s ease backwards; cursor:pointer; }
  .item-dot.blue { background:#dbeafe; border:2px solid #93c5fd; color:#2563eb; }
  .item-dot.red { background:#fee2e2; border:2px solid #fca5a5; color:#ef4444; }
  .item-dot:hover { transform:scale(1.15); }
  @keyframes dotIn { from{opacity:0;transform:scale(0)} to{opacity:1;transform:scale(1)} }

  /* Long division */
  .long-div-card { background:#fff; border:2px solid #e2e8f0; border-radius:14px; padding:16px 24px; width:100%; max-width:320px; animation:fadeUp .4s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .ld-title { font-size:12px; font-weight:700; color:#64748b; margin-bottom:8px; }
  .ld-form { font-family:'Courier New',monospace; font-size:22px; font-weight:700; color:#1a3a5c; line-height:1.8; display:inline-block; }
  .ld-form .dv { color:#2563eb; }
  .ld-form .qt { color:#16a34a; border-bottom:2px solid #1a3a5c; }
  .ld-form .prod { color:#94a3b8; }
  .ld-form .rem { color:#ef4444; }

  /* Step animation */
  .step-card { background:#fff; border:2px solid #22c55e; border-radius:14px; padding:14px; width:100%; max-width:480px; }
  .step-row { display:flex; gap:12px; align-items:center; font-size:14px; font-weight:700; padding:6px 0; animation:fadeUp .3s ease backwards; }
  .step-num { width:28px; height:28px; border-radius:50%; background:#22c55e; color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px; flex-shrink:0; }
  .step-text { flex:1; color:#334155; }
  .step-hl { color:#ef4444; font-weight:800; }

  /* Drag zone */
  .drag-zone { display:flex; flex-wrap:wrap; gap:6px; padding:12px; background:#fff; border:2px dashed #e2e8f0; border-radius:12px; min-height:50px; width:100%; max-width:520px; justify-content:center; transition:border-color .2s; }
  .drag-zone.drag-over { border-color:#eab308; background:#fffbeb; }
  .drop-group { background:#eff6ff; border:2px solid #93c5fd; border-radius:12px; padding:10px; min-height:50px; min-width:60px; display:flex; flex-wrap:wrap; gap:6px; justify-content:center; align-items:center; }
  .drop-group.remain-drop { background:#fef2f2; border-color:#fca5a5; }

  /* Quiz */
  .quiz-option { padding:10px 16px; border-radius:10px; font-size:14px; font-weight:700; border:2px solid #e2e8f0; background:#fff; cursor:pointer; transition:all .15s; text-align:center; width:100%; }
  .quiz-option:hover { border-color:#eab308; color:#ca8a04; }
  .quiz-option.correct { background:#dcfce7; border-color:#22c55e; color:#16a34a; }
  .quiz-option.wrong { background:#fee2e2; border-color:#ef4444; color:#ef4444; }
  .score-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:700; background:linear-gradient(135deg,#eab308,#f59e0b); color:#fff; }
</style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="edu-toolbar-title">有余数的除法</span>
      <span class="edu-toolbar-subtitle">上册 · 有余数的除法</span>
    </div>
    <div class="edu-toolbar-actions">
      <span class="score-badge" id="scoreBadge" style="display:none">得分: 0</span>
      <div class="edu-divider"></div>
      <button class="edu-btn edu-btn-outline" onclick="resetAll()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area" id="canvasArea">
        <!-- Dynamic content rendered by JS -->
      </div>
      <div class="control-panel" id="sidePanel">
        <!-- Dynamic sidebar -->
      </div>
    </div>
  </div>
</div>

<script>
let currentTab = 'visual';
let quizScore = 0;

/* Tab switching */
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  updateSidePanel();
  updateCanvas();
}

/* ====== Core Math ====== */
function getValues() {
  const d = parseInt(document.getElementById('dividend')?.value) || 17;
  const v = parseInt(document.getElementById('divisor')?.value) || 5;
  return { dividend: Math.max(1, d), divisor: Math.max(1, Math.min(20, v)) };
}

function calc(a, b) {
  return { quotient: Math.floor(a / b), remainder: a % b, product: Math.floor(a / b) * b };
}

/* ====== Canvas: Visual Tab ====== */
function renderVisual() {
  const { dividend, divisor } = getValues();
  const { quotient, remainder } = calc(dividend, divisor);
  const area = document.getElementById('canvasArea');

  let html = '';
  // Input row
  html += `<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <input class="num-input" id="dividend" type="number" value="${dividend}" min="1" max="99" oninput="updateCanvas()"/>
    <span style="font-size:24px;color:#94a3b8;font-weight:700">÷</span>
    <input class="num-input" id="divisor" type="number" value="${divisor}" min="1" max="20" oninput="updateCanvas()"/>
    <span style="font-size:24px;color:#94a3b8;font-weight:700">=</span>
    <div class="eq-card" style="flex:1;min-width:200px">
      <div class="eq-formula">${dividend} <span class="op">÷</span> ${divisor} <span class="op">=</span> <span class="q">${quotient}</span> <span class="op">…</span> <span class="r">${remainder}</span></div>
      <div class="eq-check ${divisor * quotient + remainder === dividend ? 'ok' : 'err'}">
        ${divisor * quotient + remainder === dividend ? '✓ 验算: ' + divisor + ' × ' + quotient + ' + ' + remainder + ' = ' + dividend : '✗ 计算有误'}
      </div>
    </div>
  </div>`;

  // Animated groups
  html += `<div class="groups-container">`;
  for (let g = 0; g < Math.min(divisor, 10); g++) {
    html += `<div class="group-box" style="animation-delay:${g * 80}ms">`;
    html += `<div class="group-label blue">第${g + 1}组</div>`;
    for (let i = 0; i < Math.min(quotient, 15); i++) {
      html += `<div class="item-dot blue" style="animation-delay:${(g * 50 + i * 30)}ms">${i + 1}</div>`;
    }
    html += `</div>`;
  }
  if (remainder > 0) {
    html += `<div class="group-box remain" style="animation-delay:${divisor * 80}ms">`;
    html += `<div class="group-label red">余数</div>`;
    for (let i = 0; i < remainder; i++) {
      html += `<div class="item-dot red" style="animation-delay:${(divisor * 50 + i * 30)}ms">${i + 1}</div>`;
    }
    html += `</div>`;
  }
  html += `</div>`;

  // Long division
  html += renderLongDivision(dividend, divisor, quotient, remainder);

  area.innerHTML = html;
}

function renderLongDivision(dividend, divisor, quotient, remainder) {
  const product = divisor * quotient;
  return `<div class="long-div-card">
    <div class="ld-title">竖式计算</div>
    <div class="ld-form">
      <div style="display:inline-block;border-left:2px solid #1a3a5c;padding-left:10px">
        <div style="text-align:right"><span class="qt">${quotient}</span></div>
        <div><span class="dv">${divisor}</span>)${dividend}</div>
      </div><br/>
      <div style="padding-left:22px">
        <div style="color:#94a3b8">  − ${product}</div>
        <div style="border-top:2px solid #1a3a5c;display:inline-block;width:60px;text-align:right">
          <span class="rem">${remainder}</span>
        </div>
      </div>
    </div>
  </div>`;
}

/* ====== Canvas: Step Tab ====== */
let stepAnimTimer = null;
function renderSteps() {
  const { dividend, divisor } = getValues();
  const { quotient, remainder } = calc(dividend, divisor);
  const area = document.getElementById('canvasArea');

  let html = `<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <input class="num-input" id="dividend" type="number" value="${dividend}" min="1" max="99" oninput="updateCanvas()"/>
    <span style="font-size:24px;color:#94a3b8;font-weight:700">÷</span>
    <input class="num-input" id="divisor" type="number" value="${divisor}" min="1" max="20" oninput="updateCanvas()"/>
    <button class="edu-btn edu-btn-primary" onclick="animateSteps()">逐步演示</button>
  </div>`;

  html += `<div id="stepsArea" class="step-card" style="min-height:200px">`;
  html += `<div style="text-align:center;color:#94a3b8;padding:40px">点击"逐步演示"观看分步动画</div>`;
  html += `</div>`;

  // Long division
  html += renderLongDivision(dividend, divisor, quotient, remainder);

  area.innerHTML = html;
}

function animateSteps() {
  const { dividend, divisor } = getValues();
  const { quotient, remainder } = calc(dividend, divisor);
  const stepsArea = document.getElementById('stepsArea');
  if (!stepsArea) return;

  const steps = [
    `一除：将 <b>${dividend}</b> 除以 <b>${divisor}</b>`,
    `二商：${dividend} ÷ ${divisor}，商 <b style="color:#2563eb">${quotient}</b>`,
    `三乘：${divisor} × ${quotient} = <b>${divisor * quotient}</b>`,
    `四减：${dividend} − ${divisor * quotient} = <span class="step-hl">${remainder}</span>`,
    `五比：余数 ${remainder} ${remainder < divisor ? '<' : '≥'} 除数 ${divisor}，${remainder < divisor ? '正确!' : '还能再分!'}`
  ];

  if (stepAnimTimer) clearInterval(stepAnimTimer);
  stepsArea.innerHTML = '';

  let idx = 0;
  function showNext() {
    if (idx >= steps.length) { clearInterval(stepAnimTimer); stepAnimTimer = null; return; }
    const row = document.createElement('div');
    row.className = 'step-row';
    row.style.animationDelay = '0ms';
    row.innerHTML = `<div class="step-num">${idx + 1}</div><div class="step-text">${steps[idx]}</div>`;
    stepsArea.appendChild(row);
    idx++;
  }

  showNext();
  stepAnimTimer = setInterval(showNext, 800);
}

/* ====== Canvas: Drag Tab ====== */
let dragItems = [];
let dropGroups = [];
let dragGhost = null;
let dragIdx = -1;

function renderDrag() {
  const { dividend, divisor } = getValues();
  const area = document.getElementById('canvasArea');

  // Initialize drag items
  dragItems = [];
  for (let i = 0; i < dividend; i++) dragItems.push({ id: i, group: -1 });
  dropGroups = [];
  for (let g = 0; g < Math.min(divisor, 8); g++) dropGroups.push([]);
  dropGroups.push([]); // Remainder group

  let html = `<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <input class="num-input" id="dividend" type="number" value="${dividend}" min="1" max="50"/>
    <span style="font-size:24px;color:#94a3b8;font-weight:700">÷</span>
    <input class="num-input" id="divisor" type="number" value="${divisor}" min="1" max="8"/>
    <button class="edu-btn edu-btn-primary" onclick="startDragGame()">开始分组</button>
    <button class="edu-btn edu-btn-accent" onclick="autoGroupDrag()">自动分组</button>
  </div>`;

  html += `<div id="dragHint" style="font-size:13px;font-weight:700;color:#64748b">点击"开始分组"将物品拖到各组中</div>`;

  // Drop zones
  html += `<div style="display:flex;flex-wrap:wrap;gap:12px;justify-content:center;width:100%;max-width:520px">`;
  for (let g = 0; g < dropGroups.length - 1; g++) {
    html += `<div class="drop-group" id="dg${g}" data-group="${g}" style="min-width:80px">
      <div style="font-size:11px;font-weight:700;color:#3b82f6;margin-bottom:4px;width:100%;text-align:center">第${g + 1}组</div>
    </div>`;
  }
  html += `<div class="drop-group remain-drop" id="dg${dropGroups.length - 1}" data-group="${dropGroups.length - 1}" style="min-width:80px">
    <div style="font-size:11px;font-weight:700;color:#ef4444;margin-bottom:4px;width:100%;text-align:center">余数</div>
  </div>`;
  html += `</div>`;

  // Item pool
  html += `<div class="drag-zone" id="itemPool">`;
  for (let i = 0; i < dividend; i++) {
    html += `<div class="item-dot blue" data-id="${i}" style="cursor:grab">${i + 1}</div>`;
  }
  html += `</div>`;

  // Result
  html += `<div id="dragResult" style="width:100%;max-width:480px;text-align:center;font-weight:700;min-height:20px"></div>`;

  area.innerHTML = html;
  setupDragListeners();
}

function startDragGame() {
  const d = parseInt(document.getElementById('dividend').value) || 17;
  const v = parseInt(document.getElementById('divisor').value) || 5;
  document.getElementById('dividend').value = d;
  document.getElementById('divisor').value = v;
  renderDrag();
}

function setupDragListeners() {
  const pool = document.getElementById('itemPool');
  if (!pool) return;

  pool.addEventListener('pointerdown', e => {
    const dot = e.target.closest('.item-dot');
    if (!dot) return;
    e.preventDefault();
    dragIdx = parseInt(dot.dataset.id);
    dot.style.opacity = '0.4';

    dragGhost = document.createElement('div');
    dragGhost.className = 'item-dot blue';
    dragGhost.textContent = dragIdx + 1;
    dragGhost.style.cssText = 'position:fixed;pointer-events:none;z-index:999;transform:translate(-50%,-50%) scale(1.2);box-shadow:0 8px 24px rgba(0,0,0,.25)';
    document.body.appendChild(dragGhost);
    moveDragGhost(e);

    document.addEventListener('pointermove', onDragMove);
    document.addEventListener('pointerup', onDragUp);
  });
}

function moveDragGhost(e) {
  if (!dragGhost) return;
  dragGhost.style.left = e.clientX + 'px';
  dragGhost.style.top = e.clientY + 'px';
}

function onDragMove(e) {
  moveDragGhost(e);
  document.querySelectorAll('.drop-group').forEach(g => {
    const r = g.getBoundingClientRect();
    g.style.borderColor = (e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom) ? '#eab308' : '';
  });
}

function onDragUp(e) {
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup', onDragUp);
  if (dragGhost) { dragGhost.remove(); dragGhost = null; }

  // Find drop target
  let targetGroup = -1;
  document.querySelectorAll('.drop-group').forEach(g => {
    g.style.borderColor = '';
    const r = g.getBoundingClientRect();
    if (e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom) {
      targetGroup = parseInt(g.dataset.group);
    }
  });

  if (targetGroup >= 0 && dragIdx >= 0) {
    const dot = document.querySelector(`#itemPool .item-dot[data-id="${dragIdx}"]`);
    if (dot) {
      const newDot = document.createElement('div');
      newDot.className = targetGroup < dropGroups.length - 1 ? 'item-dot blue' : 'item-dot red';
      newDot.textContent = dragIdx + 1;
      newDot.dataset.id = dragIdx;
      document.getElementById('dg' + targetGroup).appendChild(newDot);
      dot.remove();
      dropGroups[targetGroup].push(dragIdx);
      checkDragResult();
    }
  } else {
    // Return to pool
    const dot = document.querySelector(`#itemPool .item-dot[data-id="${dragIdx}"]`);
    if (dot) dot.style.opacity = '1';
  }
  dragIdx = -1;
}

function autoGroupDrag() {
  const { dividend, divisor } = getValues();
  const { quotient, remainder } = calc(dividend, divisor);

  // Reset
  renderDrag();

  let idx = 0;
  let delay = 0;
  for (let g = 0; g < divisor && g < dropGroups.length - 1; g++) {
    for (let i = 0; i < quotient; i++) {
      setTimeout(() => {
        const dot = document.querySelector(`#itemPool .item-dot[data-id="${idx}"]`);
        if (dot) {
          const newDot = document.createElement('div');
          newDot.className = 'item-dot blue';
          newDot.textContent = idx + 1;
          newDot.dataset.id = idx;
          document.getElementById('dg' + g).appendChild(newDot);
          dot.remove();
        }
      }, delay);
      idx++;
      delay += 80;
    }
  }
  // Remainder
  for (let i = 0; i < remainder; i++) {
    const itemIdx = idx;
    setTimeout(() => {
      const dot = document.querySelector(`#itemPool .item-dot[data-id="${itemIdx}"]`);
      if (dot) {
        const newDot = document.createElement('div');
        newDot.className = 'item-dot red';
        newDot.textContent = itemIdx + 1;
        newDot.dataset.id = itemIdx;
        document.getElementById('dg' + (dropGroups.length - 1)).appendChild(newDot);
        dot.remove();
      }
    }, delay);
    idx++;
    delay += 80;
  }

  setTimeout(checkDragResult, delay + 200);
}

function checkDragResult() {
  const { dividend, divisor } = getValues();
  const { quotient, remainder } = calc(dividend, divisor);
  const resultEl = document.getElementById('dragResult');
  if (!resultEl) return;

  let totalInGroups = 0;
  for (let g = 0; g < dropGroups.length - 1; g++) {
    const items = document.querySelectorAll(`#dg${g} .item-dot`);
    totalInGroups += items.length;
  }
  const remainItems = document.querySelectorAll(`#dg${dropGroups.length - 1} .item-dot`);
  const poolItems = document.querySelectorAll('#itemPool .item-dot');

  if (poolItems.length === 0) {
    resultEl.innerHTML = `<div class="eq-card" style="margin-top:8px">
      <div class="eq-formula">${dividend} <span class="op">÷</span> ${divisor} <span class="op">=</span> <span class="q">${quotient}</span> <span class="op">…</span> <span class="r">${remainItems.length}</span></div>
      <div class="eq-check ${remainder === remainItems.length ? 'ok' : 'err'}">
        ${remainder === remainItems.length ? '✓ 分组正确!' : '再检查一下余数'}
      </div>
    </div>`;
  }
}

/* ====== Canvas: Quiz Tab ====== */
let quizData = {};

function renderQuiz() {
  const area = document.getElementById('canvasArea');
  nextQuizQuestion();

  area.innerHTML = `<div style="text-align:center;padding:20px">
    <div style="font-size:20px;font-weight:800;color:#1a3a5c;margin-bottom:16px">有余数除法挑战</div>
    <div id="quizQ" style="font-size:18px;font-weight:700;color:#334155;margin-bottom:16px;min-height:28px"></div>
    <div id="quizOpts" style="display:flex;flex-direction:column;gap:8px;max-width:300px;margin:0 auto"></div>
    <div id="quizFb" style="margin-top:12px;font-weight:700;font-size:14px;min-height:20px"></div>
    <button class="edu-btn edu-btn-primary" style="margin-top:16px" onclick="nextQuizQuestion()">下一题</button>
  </div>`;

  fillQuizQuestion();
}

function nextQuizQuestion() {
  const a = Math.floor(Math.random() * 40) + 10;
  const b = Math.floor(Math.random() * 8) + 2;
  const { quotient, remainder } = calc(a, b);

  const types = ['quotient', 'remainder', 'verify'];
  const type = types[Math.floor(Math.random() * types.length)];

  let question, answer, options;

  if (type === 'quotient') {
    question = `${a} ÷ ${b} 的商是多少？`;
    answer = quotient;
    options = [quotient];
    while (options.length < 4) {
      const fake = quotient + Math.floor(Math.random() * 5) - 2;
      if (fake >= 0 && !options.includes(fake)) options.push(fake);
    }
  } else if (type === 'remainder') {
    question = `${a} ÷ ${b} 的余数是多少？`;
    answer = remainder;
    options = [remainder];
    while (options.length < 4) {
      const fake = Math.floor(Math.random() * b);
      if (!options.includes(fake)) options.push(fake);
    }
  } else {
    const wrongProduct = a + Math.floor(Math.random() * 5) - 2;
    const eq = `${b} × ${quotient} + ${remainder} = ${b * quotient + remainder}`;
    question = `${a} ÷ ${b} = ${quotient} … ${remainder}，验算: ${eq}`;
    answer = 1; // correct
    options = [1, 0]; // 1 = correct, 0 = wrong
  }

  // Shuffle
  for (let i = options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [options[i], options[j]] = [options[j], options[i]];
  }

  quizData = { question, answer, options, type };
  fillQuizQuestion();
}

function fillQuizQuestion() {
  const qEl = document.getElementById('quizQ');
  const optsEl = document.getElementById('quizOpts');
  const fbEl = document.getElementById('quizFb');
  if (!qEl || !quizData.question) return;

  qEl.textContent = quizData.question;
  fbEl.textContent = '';

  if (quizData.type === 'verify') {
    optsEl.innerHTML = quizData.options.map((o, i) =>
      `<button class="quiz-option" onclick="answerQuiz(${i})">${o === 1 ? '正确' : '错误'}</button>`
    ).join('');
  } else {
    optsEl.innerHTML = quizData.options.map((o, i) =>
      `<button class="quiz-option" onclick="answerQuiz(${i})">${o}</button>`
    ).join('');
  }
}

function answerQuiz(idx) {
  const fb = document.getElementById('quizFb');
  const btns = document.querySelectorAll('.quiz-option');
  const correct = quizData.options[idx] === quizData.answer;

  btns.forEach((b, i) => {
    if (quizData.options[i] === quizData.answer) b.classList.add('correct');
    if (i === idx && !correct) b.classList.add('wrong');
  });

  if (correct) {
    quizScore += 10;
    fb.innerHTML = '<span style="color:#16a34a">正确! +10 分</span>';
  } else {
    fb.innerHTML = `<span style="color:#ef4444">答案是 ${quizData.answer}</span>`;
  }

  document.getElementById('scoreBadge').style.display = '';
  document.getElementById('scoreBadge').textContent = '得分: ' + quizScore;
}

/* ====== Master Update ====== */
function updateCanvas() {
  if (currentTab === 'visual') renderVisual();
  else if (currentTab === 'steps') renderSteps();
  else if (currentTab === 'drag') renderDrag();
  else if (currentTab === 'quiz') renderQuiz();
}

function updateSidePanel() {
  const panel = document.getElementById('sidePanel');
  panel.innerHTML = `
    <div class="ctrl-section">
      <div class="ctrl-label">模式</div>
      <div class="tab-bar">
        <button class="tab-btn ${currentTab === 'visual' ? 'active' : ''}" data-tab="visual" onclick="setTab('visual')">分组</button>
        <button class="tab-btn ${currentTab === 'steps' ? 'active' : ''}" data-tab="steps" onclick="setTab('steps')">步骤</button>
        <button class="tab-btn ${currentTab === 'drag' ? 'active' : ''}" data-tab="drag" onclick="setTab('drag')">拖拽</button>
        <button class="tab-btn ${currentTab === 'quiz' ? 'active' : ''}" data-tab="quiz" onclick="setTab('quiz')">答题</button>
      </div>
    </div>
    <div class="divider"></div>
    <div class="ctrl-section">
      <div class="ctrl-label">选择例题</div>
      <button class="preset-btn" onclick="loadExample(17,5)">17 ÷ 5</button>
      <button class="preset-btn" onclick="loadExample(23,4)">23 ÷ 4</button>
      <button class="preset-btn" onclick="loadExample(30,7)">30 ÷ 7</button>
      <button class="preset-btn" onclick="loadExample(25,6)">25 ÷ 6</button>
      <button class="preset-btn" onclick="loadExample(19,3)">19 ÷ 3</button>

    </div>

      被除数 ÷ 除数 = 商 … 余数<br/><br/>
      <strong>余数要比除数小：</strong><br/>
      如果余数 ≥ 除数，还能再分。<br/><br/>
      <strong>验算：</strong><br/>

      <strong>口诀：</strong><br/>
      一除二商三乘四减五比
    </div>`;
}

function loadExample(a, b) {
  document.getElementById('dividend').value = a;
  document.getElementById('divisor').value = b;
  updateCanvas();
}

function resetAll() {
  quizScore = 0;
  document.getElementById('scoreBadge').style.display = 'none';
  document.getElementById('dividend').value = 17;
  document.getElementById('divisor').value = 5;
  currentTab = 'visual';
  updateSidePanel();
  updateCanvas();
}

/* ====== Init ====== */
updateSidePanel();
updateCanvas();
</script>
