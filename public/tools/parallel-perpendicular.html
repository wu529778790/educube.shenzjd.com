<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>平行与垂直</title>
<link rel="stylesheet" href="../edu-lib/edu-base.css"/>
<style>
  .main-layout {
    display: grid;
    grid-template-columns: 1fr 240px;
    height: 100%;
  }
  .canvas-area {
    position: relative;
    background: #fff;
    overflow: hidden;
  }
  .control-panel {
    background: #fdfaf4;
    border-left: 1px solid #e2e8f0;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow: auto;
  }
  .ctrl-section {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .ctrl-label {
    font-size: 11px;
    font-weight: 700;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .divider { height: 1px; background: #e2e8f0; }
  .info-box {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    color: #64748b;
    line-height: 1.8;
  }
  .info-box strong { color: #8b5cf6; }
  .relation-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 700;
    margin-top: 4px;
  }
  .hint-text {
    font-size: 11px;
    color: #94a3b8;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="edu-tool">
  <div class="edu-toolbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="edu-toolbar-title">📏 平行与垂直判断</span>
      <span class="edu-toolbar-subtitle">上册·平行四边形和梯形</span>
    </div>
    <div class="edu-toolbar-actions">
      <button class="edu-btn edu-btn-outline" onclick="resetLines()">重置</button>
    </div>
  </div>
  <div class="edu-content">
    <div class="main-layout">
      <div class="canvas-area">
        <canvas id="main-canvas" class="edu-canvas-full"></canvas>
      </div>
      <div class="control-panel">
        <div class="ctrl-section">
          <div class="ctrl-label">两条直线的关系</div>
          <div class="info-box" id="relation-box">
            <div id="relation-text">拖拽端点改变直线位置</div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">测量数据</div>
          <div class="info-box">
            <div>夹角：<strong><span id="angle-val">—</span></strong></div>
            <div>交点距离：<strong><span id="dist-val">—</span></strong></div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-section">
          <div class="ctrl-label">知识卡片</div>
          <div class="info-box" style="font-size:11px;line-height:1.7;">
            <strong>平行线</strong>：在同一平面内不相交的两条直线。<br/>
            <strong>互相垂直</strong>：两条直线相交成直角。<br/>
            <strong>垂线</strong>：两条直线互相垂直，其中一条是另一条的垂线。<br/>
            <strong>垂足</strong>：两条垂线的交点。
          </div>
        </div>
        <div class="divider"></div>
        <div class="hint-text">拖拽红色或蓝色的端点来改变直线方向。</div>
      </div>
    </div>
  </div>
</div>
<script src="../edu-lib/edu-tools.js"></script>
<script>
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
let W, H;

// two lines, each defined by two endpoints
let lines = [
  { x1: 150, y1: 200, x2: 500, y2: 200, color: '#ef4444', name: '直线 a' },
  { x1: 200, y1: 120, x2: 450, y2: 350, color: '#3b82f6', name: '直线 b' }
];

let dragging = null; // { lineIdx, pointIdx }

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX - rect.left, y: t.clientY - rect.top };
}

function findPoint(mx, my) {
  const threshold = 14;
  for (let li = 0; li < lines.length; li++) {
    const l = lines[li];
    for (let pi = 0; pi < 2; pi++) {
      const px = pi === 0 ? l.x1 : l.x2;
      const py = pi === 0 ? l.y1 : l.y2;
      if (Math.hypot(mx - px, my - py) < threshold) {
        return { lineIdx: li, pointIdx: pi };
      }
    }
  }
  return null;
}

canvas.addEventListener('mousedown', e => {
  const p = getCanvasPos(e);
  dragging = findPoint(p.x, p.y);
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const p = getCanvasPos(e);
  dragging = findPoint(p.x, p.y);
}, { passive: false });

function onMove(e) {
  if (!dragging) return;
  e.preventDefault();
  const p = getCanvasPos(e);
  const l = lines[dragging.lineIdx];
  if (dragging.pointIdx === 0) { l.x1 = p.x; l.y1 = p.y; }
  else { l.x2 = p.x; l.y2 = p.y; }
  updateInfo();
  render();
}
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('touchmove', onMove, { passive: false });
function onUp() { dragging = null; }
document.addEventListener('mouseup', onUp);
document.addEventListener('touchend', onUp);

// line math
function lineParams(l) {
  const A = l.y2 - l.y1;
  const B = l.x1 - l.x2;
  const C = l.x2 * l.y1 - l.x1 * l.y2;
  return { A, B, C };
}

function intersection(l1, l2) {
  const p1 = lineParams(l1), p2 = lineParams(l2);
  const det = p1.A * p2.B - p2.A * p1.B;
  if (Math.abs(det) < 0.001) return null; // parallel
  return {
    x: (p1.B * p2.C - p2.B * p1.C) / det,
    y: (p2.A * p1.C - p1.A * p2.C) / det
  };
}

function angleBetween(l1, l2) {
  const dx1 = l1.x2 - l1.x1, dy1 = l1.y2 - l1.y1;
  const dx2 = l2.x2 - l2.x1, dy2 = l2.y2 - l2.y1;
  const dot = dx1 * dx2 + dy1 * dy2;
  const cross = dx1 * dy2 - dy1 * dx2;
  let angle = Math.abs(Math.atan2(cross, dot)) * 180 / Math.PI;
  if (angle > 90) angle = 180 - angle;
  return angle;
}

function minDistBetweenParallel(l1, l2) {
  const { A, B, C } = lineParams(l1);
  const denom = Math.sqrt(A * A + B * B);
  if (denom < 0.001) return Infinity;
  return Math.abs(A * l2.x1 + B * l2.y1 + C) / denom;
}

function updateInfo() {
  const a = angleBetween(lines[0], lines[1]);
  const ip = intersection(lines[0], lines[1]);
  const relText = document.getElementById('relation-text');
  const angleEl = document.getElementById('angle-val');
  const distEl = document.getElementById('dist-val');

  if (Math.abs(a) < 0.5 || Math.abs(a - 180) < 0.5) {
    const dist = minDistBetweenParallel(lines[0], lines[1]);
    relText.innerHTML = '<span class="relation-badge" style="background:#22c55e20;color:#22c55e;">平行</span>';
    angleEl.textContent = '0°（平行）';
    distEl.textContent = fmt(dist, 1) + ' px';
  } else if (Math.abs(a - 90) < 1) {
    relText.innerHTML = '<span class="relation-badge" style="background:#8b5cf620;color:#8b5cf6;">互相垂直</span>';
    angleEl.textContent = '90°（直角）';
    distEl.textContent = ip ? `交点 (${fmt(ip.x,0)}, ${fmt(ip.y,0)})` : '—';
  } else {
    relText.innerHTML = `<span class="relation-badge" style="background:#f9731620;color:#f97316;">相交</span> <span style="font-size:12px;">(夹角 ${fmt(a, 1)}°)</span>`;
    angleEl.textContent = fmt(a, 1) + '°';
    distEl.textContent = ip ? `交点 (${fmt(ip.x,0)}, ${fmt(ip.y,0)})` : '—';
  }
}

function render() {
  const dpr = window.devicePixelRatio || 1;
  W = canvas.clientWidth; H = canvas.clientHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  drawGrid(ctx, W, H, 40, '#e2e8f020');

  const a = angleBetween(lines[0], lines[1]);
  const ip = intersection(lines[0], lines[1]);

  // extend lines across canvas
  lines.forEach(l => {
    const dx = l.x2 - l.x1, dy = l.y2 - l.y1;
    const len = Math.hypot(dx, dy);
    if (len < 1) return;
    const nx = dx / len, ny = dy / len;
    const ext = Math.max(W, H) * 2;
    ctx.beginPath();
    ctx.moveTo(l.x1 - nx * ext, l.y1 - ny * ext);
    ctx.lineTo(l.x2 + nx * ext, l.y2 + ny * ext);
    ctx.strokeStyle = l.color + '30';
    ctx.lineWidth = 2;
    ctx.stroke();
  });

  // draw segments (bold)
  lines.forEach(l => {
    ctx.beginPath();
    ctx.moveTo(l.x1, l.y1);
    ctx.lineTo(l.x2, l.y2);
    ctx.strokeStyle = l.color;
    ctx.lineWidth = 3;
    ctx.stroke();

    // endpoint dots
    [{ x: l.x1, y: l.y1 }, { x: l.x2, y: l.y2 }].forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 7, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.strokeStyle = l.color;
      ctx.lineWidth = 2.5;
      ctx.stroke();
    });
  });

  // right angle mark
  if (Math.abs(a - 90) < 1 && ip) {
    const sz = 18;
    const d1x = lines[0].x2 - lines[0].x1, d1y = lines[0].y2 - lines[0].y1;
    const d2x = lines[1].x2 - lines[1].x1, d2y = lines[1].y2 - lines[1].y1;
    const len1 = Math.hypot(d1x, d1y), len2 = Math.hypot(d2x, d2y);
    if (len1 > 0 && len2 > 0) {
      const u1x = d1x / len1 * sz, u1y = d1y / len1 * sz;
      const u2x = d2x / len2 * sz, u2y = d2y / len2 * sz;
      ctx.beginPath();
      ctx.moveTo(ip.x + u1x, ip.y + u1y);
      ctx.lineTo(ip.x + u1x + u2x, ip.y + u1y + u2y);
      ctx.lineTo(ip.x + u2x, ip.y + u2y);
      ctx.strokeStyle = '#8b5cf6';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  // intersection point
  if (ip && ip.x > -50 && ip.x < W + 50 && ip.y > -50 && ip.y < H + 50) {
    ctx.beginPath();
    ctx.arc(ip.x, ip.y, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#8b5cf6';
    ctx.fill();
  }

  // labels
  ctx.font = 'bold 13px ' + getComputedStyle(document.body).fontFamily;
  lines.forEach(l => {
    const mx = (l.x1 + l.x2) / 2, my = (l.y1 + l.y2) / 2;
    ctx.fillStyle = l.color;
    ctx.textAlign = 'center';
    ctx.fillText(l.name, mx, my - 12);
  });
}

function resetLines() {
  lines[0] = { x1: 150, y1: H * 0.45, x2: W * 0.7, y2: H * 0.45, color: '#ef4444', name: '直线 a' };
  lines[1] = { x1: W * 0.3, y1: H * 0.15, x2: W * 0.55, y2: H * 0.75, color: '#3b82f6', name: '直线 b' };
  updateInfo();
  render();
}

window.addEventListener('resize', () => { resetLines(); });
// init after layout
setTimeout(() => { resetLines(); }, 50);
</script>
</body>
</html>
